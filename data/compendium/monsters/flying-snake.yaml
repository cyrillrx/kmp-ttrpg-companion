  en:
    name: Flying Snake
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Flyby</em>**. The snake doesn't provoke an Opportunity Attack when it flies out of an enemy's reach.</p>
      <h2>Actions</h2>
      <p>** <em>Bite</em>**. <em>Melee Attack Roll</em> : +4, reach 5 ft. <em>Hit</em> : 1 Piercing damage plus 5 (2d4) Poison damage.</p>
    senses: Blindsight 10 ft., Passive Perception 11
    languages:
    - None
  fr:
    name: Serpent volant
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Repli aérien</em>**. Le serpent ne provoque pas d'attaque d'Opportunité lorsqu'il quitte la zone d'allonge d'un ennemi en volant.</p>
      <h2>Actions</h2>
      <p>** <em>Morsure</em>**. <em>Corps à corps</em> : +4, allonge 1,50 m. <em>Touché</em> : 1 dégât perforant plus 5 (2d4) dégâts de poison.</p>
    senses: Vision aveugle 3 m, Perception passive 11
