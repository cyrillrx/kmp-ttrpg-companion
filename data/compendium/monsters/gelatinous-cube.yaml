translations:
  en:
    name: Gelatinous Cube
    subtype: null
    description: |-
      ## Traits

      ***Ooze Cube***. The cube fills its entire space and is transparent. Other creatures can enter that space, but a creature that does so is subjected to the cube's Engulf and has Disadvantage on the saving throw. Creatures inside the cube have Total Cover, and the cube can hold one Large creature or up to four Medium or Small creatures inside itself at a time. As an action, a creature within 5 feet of the cube can pull a creature or an object out of the cube by succeeding on a DC 12 Strength (Athletics) check, and the puller takes 10 (3d6) Acid damage.

      ***Transparent***. Even when the cube is in plain sight, a creature must succeed on a DC 15 Wisdom (Perception) check to notice the cube if the creature hasn't witnessed the cube move or otherwise act.

      ## Actions

      ***Pseudopod***. *Melee Attack Roll* : +4, reach 5 ft. *Hit* : 12 (3d6 + 2) Acid damage.

      ***Engulf***. The cube moves up to its Speed without provoking Opportunity Attacks. The cube can move through the spaces of Large or smaller creatures if it has room inside itself to contain them (see the Ooze Cube trait). *Dexterity Saving Throw* : DC 12, each creature whose space the cube enters for the first time during this move. *Failure* : 10 (3d6) Acid damage, and the target is engulfed. An engulfed target is suffocating, can't cast spells with a Verbal component, has the Restrained condition, and takes 10 (3d6) Acid damage at the start of each of the cube's turns. When the cube moves, the engulfed target moves with it. An engulfed target can try to escape by taking an action to make a DC 12 Strength (Athletics) check. On a successful check, the target escapes and enters the nearest unoccupied space. *Success* : Half damage, and the target moves to an unoccupied space within 5 feet of the cube. If there is no unoccupied space, the target fails the save instead.
    senses: Blindsight 60 ft., Passive Perception 8
    languages:
    - None
  fr:
    name: Cube gélatineux
    subtype: null
    description: |-
      ## Traits

      ***Cube de vase***. Le cube emplit la totalité de son espace et il est transparent. D'autres créatures peuvent entrer dans cet espace, mais ce faisant, elles se soumettent à l'Enveloppement du cube en subissant un Désavantage au jet de sauvegarde. Les créatures dans le cube bénéficient d'un Abri total, sachant que le cube peut contenir une créature de taille G ou jusqu'à quatre créatures de taille M ou P. Au prix d'une action, une créature dans un rayon de 1,50 m du cube peut en extraire une autre ou un objet à condition de réussir un jet de Force (Athlétisme) DD 12, l'opération lui infligeant 10 (3d6) dégâts d'acide.

      ***Transparent***. Même lorsque rien ne cache le cube, une créature doit réussir un jet de Sagesse (Perception) DD 15 pour remarquer sa présence si elle ne l'a pas déjà vu se déplacer ni agir.

      ## Actions

      ***Pseudopode***. *Corps à corps* : +4, allonge 1,50 m. *Touché* : 12 (3d6 + 2) dégâts d'acide.

      ***Enveloppement***. Le cube se déplace dans les limites de sa Vitesse sans provoquer d'attaque d'Opportunité. Il peut se déplacer à travers les espaces de créatures de taille G ou inférieure s'il a encore de la place pour les accueillir dans sa masse (voir le trait Cube de vase). *JdS Dextérité* : DD 12, chaque créature dans l'espace de laquelle le cube pénètre pour la première fois de ce déplacement. *Échec* : 10 (3d6) dégâts d'acide, et la cible est enveloppée. Une cible enveloppée s'asphyxie, ne peut pas lancer de sorts à composante verbale, subit l'état Entravé, ainsi que 10 (3d6) dégâts d'acide au début de chacun des tours du cube. Quand le cube se déplace, la cible enveloppée l'accompagne. Une créature enveloppée peut tenter de s'extraire du cube au prix d'une action et d'un jet de Force (Athlétisme) DD 12. En cas de réussite, la cible s'évade dans l'espace inoccupé le plus proche. *Réussite* : demi-dégâts, et la cible se déplace en un espace inoccupé dans un rayon de 1,50 m du cube. S'il n'y a pas d'espace inoccupé dans ce rayon, la cible rate en fait son JdS.
    senses: Vision aveugle 18 m, Perception passive 8
    languages:
    - aucune
