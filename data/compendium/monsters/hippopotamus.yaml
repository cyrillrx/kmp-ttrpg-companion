    description: |-
      <h2>Traits</h2>
      <p>** <em>Hold Breath</em>**. The hippopotamus can hold its breath for 10 minutes.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The hippopotamus makes two Bite attacks.</p>
      <p><strong><em>Bite</em></strong>. <em>Melee Attack Roll</em> : +7, reach 5 ft. <em>Hit</em> : 16 (2d10 + 5) Piercing damage.</p>
