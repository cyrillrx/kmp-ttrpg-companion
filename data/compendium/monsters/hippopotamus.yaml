      <p>** <em>Apnée</em>**. L'hippopotame peut retenir son souffle pendant 10 minutes.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. L'hippopotame effectue deux attaques de Morsure.</p>
      <p><strong><em>Morsure</em></strong>. <em>Corps à corps</em> : +7, allonge 1,50 m. <em>Touché</em> : 16 (2d10 + 5) dégâts perforants.</p>
