translations:
  en:
    name: Giant Insect
    subtype: null
    description: |-
      ## Traits

      ***Spider Climb***. The insect can climb difficult surfaces, including along ceilings, without needing to make an ability check.

      ## Actions

      ***Multiattack***. The insect makes a number of attacks equal to half this spell's level (round down).

      ***Poison Jab***. *Melee Attack Roll* : Bonus equals your spell attack modifier, reach 10 ft. *Hit* : 1d6 + 3 + the spell's level Piercing damage plus 1d4 Poison damage.

      ***Web Bolt (Spider Only)***. *Ranged Attack Roll* : Bonus equals your spell attack modifier, range 60 ft. *Hit* : 1d10 + 3 + the spell's level Bludgeoning damage, and the target's Speed is reduced to 0 until the start of the insect's next turn.

      ## Bonus actions

      ***Venomous Spew (Centipede Only)***. *Constitution Saving Throw* : DC equals your spell save DC, one creature the insect can see within 10 feet. *Failure* : The target has the Poisoned condition until the start of the insect's next turn.
    senses: Darkvision 60 ft., Passive Perception 12
    languages:
    - Understands the languages you know
  fr:
    name: Insecte géant
    subtype: null
    description: |-
      ## Traits

      ***Pattes d'araignée***. L'insecte peut escalader des surfaces difficiles, y compris le long des plafonds, sans avoir besoin de faire un jet de caractéristique.

      ## Actions

      ***Attaques multiples***. L'insecte effectue un nombre d'attaques égal à la moitié du niveau de ce sort (arrondir à l'inférieur).

      ***Piqûre toxique***. *Corps à corps* : bonus égal à votre modificateur d'attaque des sorts, allonge 3 m. *Touché* : 1d6 + 3 + le niveau du sort dégâts perforants plus 1d4 dégâts de poison.

      ***Jet de toile (araignée uniquement)***. *À distance* : bonus égal à votre modificateur d'attaque des sorts, portée 18 m. *Touché* : 1d10 + 3 + le niveau du sort dégâts contondants, et la Vitesse de la cible est réduite à 0 jusqu'au début du prochain tour de l'insecte.

      ## Actions Bonus

      ***Crachat venimeux (mille-pattes uniquement)***. *JdS Constitution* : DD égal au DD de sauvegarde de vos sorts, une créature que l'insecte peut voir dans un rayon de 3 m. *Échec* : la cible subit l'état Empoisonné jusqu'au début du prochain tour de l'insecte.
    senses: Vision dans le noir 18 m, Perception passive 12
    languages:
    - comprend les langues que vous connaissez
