translations:
  en:
    name: Berserker Commander
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Bloodied Frenzy</em>**. While Bloodied, the berserker has Advantage on attack rolls and saving throws.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The berserker makes three attacks, using Greataxe or Javelin in any combination.</p>
      <p><strong><em>Greataxe</em></strong>. <em>Melee Attack Roll</em> : +7, reach 5 ft. <em>Hit</em> : 10 (1d12 + 4) Slashing damage, plus 10 (3d6) Thunder damage to the target or another creature within 5 feet of the target.</p>
      <p><strong><em>Javelin</em></strong>. <em>Melee or Ranged Attack Roll</em> : +7, reach 5 ft. or range 30/120 ft. <em>Hit</em> : 18 (4d6 + 4) Piercing damage, and the target's Speed decreases by 5 feet until the start of the berserker's next turn.</p>
      <h2>Bonus actions</h2>
      <p>** <em>Frenzied Rush</em>**. Each ally within 30 feet of the berserker can take a Reaction to move up to half the ally's Speed without provoking Opportunity Attacks. The berserker can also move up to half its Speed without provoking Opportunity Attacks.</p>
    senses: Passive Perception 15
    languages:
    - Common
  fr:
    name: Berserker, chef
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Frénésie du péril</em>**. Lorsqu'il est En péril, le berserker a un Avantage aux jets d'attaque et de sauvegarde.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le berserker effectue trois attaques, réparties à sa guise entre Hache à deux mains et Javeline.</p>
      <p><strong><em>Hache à deux mains</em></strong>. <em>Corps à corps</em> : +7, allonge 1,50 m. <em>Touché</em> : 10 (1d12 + 4) dégâts tranchants, plus 10 (3d6) dégâts de tonnerre contre la cible ou une autre créature dans un rayon de 1,50 m autour de la cible.</p>
      <p><strong><em>Javeline</em></strong>. <em>Corps à corps ou à distance</em> : +7, allonge 1,50 m ou portée 30/36 m. <em>Touché</em> : 18 (4d6 + 4) dégâts perforants, et la Vitesse de la cible est réduite de 1,50 m jusqu'au début du prochain tour du berserker.</p>
      <h2>Actions Bonus</h2>
      <p>** <em>Ruée frénétique</em>**. Chaque allié dans un rayon de 9 m autour du berserker peut prendre une Réaction pour se déplacer jusqu'à la moitié de sa Vitesse sans provoquer d'attaques d'Opportunité. Le berserker peut également se déplacer jusqu'à la moitié de sa vitesse sans provoquer d'attaques d'Opportunité.</p>
    senses: Perception passive 15
    languages:
    - commun
