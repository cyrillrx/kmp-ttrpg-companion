translations:
  en:
    name: Kobold Warrior
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Pack Tactics</em>**. The kobold has Advantage on an attack roll against a creature if at least one of the kobold's allies is within 5 feet of the creature and the ally doesn't have the Incapacitated condition.</p>
      <p><strong><em>Sunlight Sensitivity</em></strong>. While in sunlight, the kobold has Disadvantage on ability checks and attack rolls.</p>
      <h2>Actions</h2>
      <p>** <em>Dagger</em>**. <em>Melee or Ranged Attack Roll</em> : +4, reach 5 ft. or range 20/60 ft. <em>Hit</em> : 4 (1d4 + 2) Piercing damage.</p>
    senses: Darkvision 60 ft., Passive Perception 8
    languages:
    - Common
    - Draconic
  fr:
    name: Kobold, combattant
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Sensibilité au soleil</em>**. Tant qu'il est exposé à la lumière du soleil, le kobold subit un Désavantage aux jets de caractéristique et aux jets d'attaque.</p>
      <p><strong><em>Tactique de meute</em></strong>. Quand au moins un de ses alliés non Incapable d'agir se situe dans un rayon de 1,50 m de la créature qu'il cible, le kobold a un Avantage au jet d'attaque correspondant.</p>
      <h2>Actions</h2>
      <p>** <em>Dague</em>**. <em>Corps à corps ou à distance</em> : +4, allonge 1,50 m ou portée 6/18 m. <em>Touché</em> : 4 (1d4 + 2) dégâts perforants.</p>
    senses: Vision dans le noir 18 m, Perception passive 8
    languages:
    - commun
    - draconique
