      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le singe effectue deux attaques de Poing.</p>
      <p><strong><em>Poing</em></strong>. <em>Corps à corps</em> : +5, allonge 1,50 m. <em>Touché</em> : 5 (1d4 + 3) dégâts contondants.</p>
      <p><strong><em>Rocher (recharge 6)</em></strong>. <em>À distance</em> : +5, portée 7,50/15 m. <em>Touché</em> : 10 (2d6 + 3) dégâts contondants.</p>
