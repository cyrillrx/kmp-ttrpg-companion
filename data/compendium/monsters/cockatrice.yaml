translations:
  en:
    name: Cockatrice
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Petrifying Bite</em>**. <em>Melee Attack Roll</em> : +3, reach 5 ft. <em>Hit</em> : 3 (1d4 + 1) Piercing damage. If the target is a creature, it is subjected to the following effect. <em>Constitution Saving Throw</em> : DC 11. <em>First Failure</em> : The target has the Restrained condition. The target repeats the save at the end of its next turn if it is still Restrained, ending the effect on itself on a success. <em>Second Failure</em> : The target has the Petrified condition, instead of the Restrained condition, for 24 hours.</p>
    senses: Darkvision 60 ft., Passive Perception 11
    languages:
    - None
  fr:
    name: Cockatrice
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Morsure pétrifiante</em>**. <em>Corps à corps</em> : +3, allonge 1,50 m. <em>Touché</em> : 3 (1d4 + 1) dégâts perforants. Si la cible est une créature, elle est soumise à l'effet suivant. <em>JdS Constitution</em> : DD 11. <em>Premier échec</em> : la cible subit l'état Entravé. Elle réitère le JdS à la fin de son tour suivant si elle est toujours Entravée, et met un terme à l'effet sur elle-même en cas de réussite. <em>Deuxième échec</em> : la cible subit l'état Pétrifié, qui remplace l'état Entravé, pendant 24 heures.</p>
    senses: Vision dans le noir 18 m, Perception passive 11
    languages:
    - aucune
