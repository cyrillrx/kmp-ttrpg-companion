  en:
    name: Giant Wolf Spider
    subtype: null
    description: '## Traits


      ***Spider Climb***. The spider can climb difficult surfaces, including along
      ceilings, without needing to make an ability check.


      ## Actions


      ***Bite***. *Melee Attack Roll* : +5, reach 5 ft. *Hit* : 5 (1d4 + 3) Piercing
      damage plus 5 (2d4) Poison damage.'
    senses: Blindsight 10 ft., Darkvision 60 ft., Passive Perception 13
    languages:
    - None
  fr:
    name: Araignée-loup géante
    subtype: null
    description: '## Traits


      ***Pattes d''araignée***. L''araignée peut parcourir les parois les plus difficiles
      à escalader, y compris les plafonds, sans passer par un jet de caractéristique.


      ## Actions


      ***Morsure***. *Corps à corps* : +5, allonge 1,50 m. *Touché* : 5 (1d4 + 3)
      dégâts perforants plus 5 (2d4) dégâts de poison.'
    senses: Vision aveugle 3 m, Vision dans le noir 18 m, Perception passive 13
    languages:
    - aucune
