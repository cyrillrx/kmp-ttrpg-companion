  en:
    name: Giant Wolf Spider
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Spider Climb</em>**. The spider can climb difficult surfaces, including along ceilings, without needing to make an ability check.</p>
      <h2>Actions</h2>
      <p>** <em>Bite</em>**. <em>Melee Attack Roll</em> : +5, reach 5 ft. <em>Hit</em> : 5 (1d4 + 3) Piercing damage plus 5 (2d4) Poison damage.</p>
    senses: Blindsight 10 ft., Darkvision 60 ft., Passive Perception 13
    languages:
    - None
  fr:
    name: Araignée-loup géante
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Pattes d'araignée</em>**. L'araignée peut parcourir les parois les plus difficiles à escalader, y compris les plafonds, sans passer par un jet de caractéristique.</p>
      <h2>Actions</h2>
      <p>** <em>Morsure</em>**. <em>Corps à corps</em> : +5, allonge 1,50 m. <em>Touché</em> : 5 (1d4 + 3) dégâts perforants plus 5 (2d4) dégâts de poison.</p>
    senses: Vision aveugle 3 m, Vision dans le noir 18 m, Perception passive 13
    languages:
    - aucune
