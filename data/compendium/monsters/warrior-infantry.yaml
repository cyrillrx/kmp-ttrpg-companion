translations:
  en:
    name: Warrior Infantry
    subtype: null
    description: |-
      ## Traits

      ***Pack Tactics***. The warrior has Advantage on an attack roll against a creature if at least one of the warrior's allies is within 5 feet of the creature and the ally doesn't have the Incapacitated condition.

      ## Actions

      ***Spear***. *Melee or Ranged Attack Roll* : +3, reach 5 ft. or range 20/60 ft. *Hit* : 4 (1d6 + 1) Piercing damage.
    senses: Passive Perception 10
    languages:
    - Common
  fr:
    name: Combattant, fantassin
    subtype: null
    description: |-
      ## Traits

      ***Tactique de meute***. Quand au moins un de ses alliés non Incapable d'agir se situe dans un rayon de 1,50 m de la créature qu'il cible, le combattant a un Avantage au jet d'attaque correspondant.

      ## Actions

      ***Lance***. *Corps à corps ou à distance* : +3, allonge 1,50 m ou portée 6/18 m. *Touché* : 4 (1d6 + 1) dégâts perforants.
    senses: Perception passive 10
    languages:
    - commun
