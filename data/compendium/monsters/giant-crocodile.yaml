translations:
  en:
    name: Giant Crocodile
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Hold Breath</em>**. The crocodile can hold its breath for 1 hour.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The crocodile makes one Bite attack and one Tail attack.</p>
      <p><strong><em>Bite</em></strong>. <em>Melee Attack Roll</em> : +8, reach 5 ft. <em>Hit</em> : 21 (3d10 + 5) Piercing damage. If the target is a Large or smaller creature, it has the Grappled condition (escape DC 15). While Grappled, the target has the Restrained condition and can't be targeted by the crocodile's Tail.</p>
      <p><strong><em>Tail</em></strong>. <em>Melee Attack Roll</em> : +8, reach 10 ft. <em>Hit</em> : 18 (3d8 + 5) Bludgeoning damage. If the target is a Large or smaller creature, it has the Prone condition.</p>
    senses: Passive Perception 10
    languages:
    - None
  fr:
    name: Crocodile géant
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Apnée</em>**. Le crocodile peut retenir son souffle pendant 1 heure.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le crocodile effectue une attaque de Morsure et une de Queue.</p>
      <p><strong><em>Morsure</em></strong>. <em>Corps à corps</em> : +8, allonge 1,50 m. <em>Touché</em> : 21 (3d10 + 5) dégâts perforants. Si la cible est une créature de taille G ou inférieure, elle subit l'état Agrippé (évasion DD 15). Ainsi Agrippée, la cible subit aussi l'état Entravé et ne peut pas être ciblée par la Queue du crocodile.</p>
      <p><strong><em>Queue</em></strong>. <em>Corps à corps</em> : +8, allonge 3 m. <em>Touché</em> : 18 (3d8 + 5) dégâts contondants. Si la cible est une créature de taille G ou inférieure, elle subit l'état À terre.</p>
    senses: Perception passive 10
    languages:
    - aucune
