translations:
  en:
    name: Yuan-ti Abomination
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Magic Resistance</em>**. The yuan-ti has Advantage on saving throws against spells and other magical effects.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The yuan-ti makes two Bite attacks, and it can use Spellcasting to cast <em><a href="https://www.aidedd.org/spell/suggestion">Suggestion</a></em> if available.</p>
      <p><strong><em>Bite</em></strong>. <em>Melee Attack Roll</em> : +7, reach 5 ft. <em>Hit</em> : 11 (2d6 + 4) Piercing damage plus 10 (3d6) Poison damage.</p>
      <p><strong><em>Constrict</em></strong>. <em>Strength Saving Throw</em> : DC 15, one Large or smaller creature within 5 feet. <em>Failure</em> : 28 (7d6 + 4) Bludgeoning damage. The target has the Grappled condition (escape DC 14), and it has the Restrained condition until the grapple ends. <em>Success</em> : Half damage only.</p>
      <p><strong><em>Poison Spray (Recharge 5–6)</em></strong>. <em>Constitution Saving Throw</em> : DC 14, each creature in a 30-foot Cone. <em>Failure</em> : 21 (6d6) Poison damage, and the target has the Poisoned condition until the end of the yuan-ti's next turn. While Poisoned, the target has the Blinded condition. <em>Success</em> : Half damage only.</p>
      <p><strong><em>Spellcasting (Yuan-ti Form Only)</em></strong>. The yuan-ti casts one of the following spells, requiring no Material components and using Wisdom as the spellcasting ability (spell save DC 15):</p>
      <p>At will: <em><a href="https://www.aidedd.org/spell/animal-friendship">Animal Friendship</a></em> (snakes only)<br />
      3/day: <em><a href="https://www.aidedd.org/spell/suggestion">Suggestion</a></em>  </p>
      <h2>Bonus actions</h2>
      <p>** <em>Shape-Shift</em>**. The yuan-ti shape-shifts into a Large snake or returns to its true form. If it dies, it stays in its current form. The yuan-ti's game statistics are the same in each form, except where noted. Any equipment it is wearing or carrying isn't transformed.</p>
    senses: Darkvision 60 ft., Passive Perception 17
    languages:
    - Abyssal
    - Common
    - Draconic
  fr:
    name: Yuan-ti, abomination
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Résistance à la magie</em>**. Le yuan-ti a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le yuan-ti effectue deux attaques de Morsure, et peut utiliser Incantation pour lancer <em><a href="https://www.aidedd.org/spell/fr/suggestion">suggestion</a></em> si disponible.</p>
      <p><strong><em>Morsure</em></strong>. <em>Corps à corps</em> : +7, allonge 1,50 m. <em>Touché</em> : 11 (2d6 + 4) dégâts perforants plus 10 (3d6) dégâts de poison.</p>
      <p><strong><em>Constriction</em></strong>. <em>JdS Force</em> : DD 15, une créature de taille G ou inférieure dans un rayon de 1,50 m. <em>Échec</em> : 28 (7d6 + 4) dégâts contondants. La cible subit l'état Agrippé (évasion DD 14) et l'état Entravé tant qu'elle est agrippée. <em>Réussite</em> : demi-dégâts.</p>
      <p><strong><em>Bouffée de poison (recharge 5–6)</em></strong>. <em>JdS Constitution</em> : DD 14, chaque créature dans un Cône de 9 m. <em>Échec</em> : 21 (6d6) dégâts de poison, et la cible subit l'état Empoisonné jusqu'à la fin du prochain tour du yuan-ti. Tant qu'elle est empoisonnée, la cible subit l'état Aveuglé. <em>Réussite</em> : demi-dégâts uniquement.</p>
      <p><strong><em>Incantation (forme de yuan-ti uniquement)</em></strong>. Le yuan-ti lance l'un des sorts suivants sans composantes matérielles, la Sagesse étant sa caractéristique d'incantation (DD de sauvegarde 15) :</p>
      <p>À volonté : <em><a href="https://www.aidedd.org/spell/fr/amitie-avec-les-animaux">amitié avec les animaux</a></em> (serpents uniquement)<br />
      3/jour : <em><a href="https://www.aidedd.org/spell/fr/suggestion">suggestion</a></em>  </p>
      <h2>Actions Bonus</h2>
      <p>** <em>Changement d'aspect</em>**. Le yuan-ti se métamorphose en serpent de taille M ou reprend sa forme véritable. S'il meurt, il conserve sa forme actuelle. Son profil reste le même quelle que soit sa forme, sauf indication contraire. Rien de ce qu'il porte n'est transformé.</p>
    senses: Vision dans le noir 18 m, Perception passive 17
    languages:
    - abyssal
    - commun
    - draconique
