  en:
    name: Goblin Minion
    subtype: Goblinoid
    description: |-
      ## Actions

      ***Dagger***. *Melee or Ranged Attack Roll* : +4, reach 5 ft. or range 20/60 ft. *Hit* : 4 (1d4 + 2) Piercing damage.

      ## Bonus actions

      ***Nimble Escape***. The goblin takes the Disengage or Hide action.
