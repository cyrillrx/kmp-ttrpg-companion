    description: |-
      ## Actions

      ***Dague***. *Corps à corps ou à distance* : +4, allonge 1,50 m ou portée 6/18 m. *Touché* : 4 (1d4 + 2) dégâts perforants.

      ## Actions Bonus

      ***Fuite agile***. Le gobelin entreprend l'action Désengagement ou Furtivité.
    senses: Vision dans le noir 18 m, Perception passive 9
