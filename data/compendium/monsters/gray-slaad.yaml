  en:
    name: Gray Slaad
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Magic Resistance</em>**. The slaad has Advantage on saving throws against spells and other magical effects.</p>
      <p><strong><em>Regeneration</em></strong>. The slaad regains 10 Hit Points at the start of each of its turns if it has at least 1 Hit Point.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The slaad makes two Chaos Claw attacks.</p>
      <p><strong><em>Chaos Claw</em></strong>. <em>Melee Attack Roll</em> : +8, reach 10 ft. <em>Hit</em> : 9 (1d10 + 4) Slashing damage plus 11 (2d10) Necrotic damage. Until the start of the slaad's next turn, the target has a condition determined by rolling 1d4: on a <strong>1</strong> , Charmed; on a <strong>2</strong> , Frightened; on a <strong>3</strong> , Poisoned; or on a <strong>4~~, Incapacitated.~~</strong></p>
      <p><strong><em>Spellcasting</em></strong>. The slaad casts one of the following spells, requiring no Material components and using Charisma as the spellcasting ability (spell save DC 16):</p>
      <p>At will: <em><a href="https://www.aidedd.org/spell/detect-magic">Detect Magic</a>, <a href="https://www.aidedd.org/spell/detect-thoughts">Detect Thoughts</a>, <a href="https://www.aidedd.org/spell/invisibility">Invisibility</a></em> (self only), <em><a href="https://www.aidedd.org/spell/mage-hand">Mage Hand</a>, <a href="https://www.aidedd.org/spell/major-image">Major Image</a></em><br />
      1/day each: <em><a href="https://www.aidedd.org/spell/cloudkill">Cloudkill</a>, <a href="https://www.aidedd.org/spell/fly">Fly</a>, <a href="https://www.aidedd.org/spell/plane-shift">Plane Shift</a></em> (self only), <em><a href="https://www.aidedd.org/spell/tongues">Tongues</a></em>  </p>
      <h2>Bonus actions</h2>
      <p>** <em>Shape-Shift</em>**. The slaad shape-shifts into a Small or Medium Humanoid, or it returns to its true form. Other than its size, its game statistics are the same in each form. Any equipment it is wearing or carrying isn't transformed.</p>
    senses: Blindsight 60 ft., Darkvision 60 ft., Passive Perception 17
    languages:
    - Common
    - Slaad; telepathy 60 ft.
  fr:
    name: Slaad gris
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Résistance à la magie</em>**. Le slaad a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.</p>
      <p><strong><em>Régénération</em></strong>. Le slaad récupère 10 points de vie au début de chacun de ses tours s'il lui reste au moins 1 point de vie.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le slaad effectue deux attaques de Griffe du chaos.</p>
      <p><strong><em>Griffe du chaos</em></strong>. <em>Corps à corps</em> : +8, allonge 3 m. <em>Touché</em> : 9 (1d10 + 4) dégâts tranchants plus 11 (2d10) dégâts nécrotiques. Jusqu'au début du prochain tour du slaad, la cible subit un état déterminé en lançant 1d4 : <strong>1</strong> , Charmé ; <strong>2</strong> , Effrayé ; <strong>3</strong> , Empoisonné ; <strong>4</strong> , Incapable d'agir.</p>
      <p><strong><em>Incantation</em></strong>. Le slaad lance l'un des sorts suivants sans composantes matérielles, le Charisme étant sa caractéristique d'incantation (DD de sauvegarde 16) :</p>
      <p>À volonté : <em><a href="https://www.aidedd.org/spell/fr/detection-de-la-magie">détection de la magie</a>, <a href="https://www.aidedd.org/spell/fr/detection-des-pensees">détection des pensées</a>, <a href="https://www.aidedd.org/spell/fr/invisibilite">invisibilité</a></em> (soi-même uniquement), <em><a href="https://www.aidedd.org/spell/fr/main-de-mage">main de mage</a>, <a href="https://www.aidedd.org/spell/fr/image-majeure">image majeure</a></em><br />
      1/jour chacun : <em><a href="https://www.aidedd.org/spell/cloudkill">brume mortelle</a>, <a href="https://www.aidedd.org/spell/fr/vol">vol</a>, <a href="https://www.aidedd.org/spell/fr/changement-de-plan">changement de plan</a></em> (soi-même uniquement), <em><a href="https://www.aidedd.org/spell/fr/don-des-langues">don des langues</a></em>  </p>
      <h2>Actions Bonus</h2>
      <p>** <em>Changement d'aspect</em>**. Le slaad se transforme en Humanoïde de taille P ou M, ou bien retrouve sa forme véritable. Hormis sa catégorie de taille, son profil reste le même, quelle que soit sa forme. Rien de ce qu'il porte n'est transformé.</p>
    senses: Vision aveugle 18 m, Vision dans le noir 18 m, Perception passive 17
    languages:
    - commun
    - slaad ; télépathie 18 m
