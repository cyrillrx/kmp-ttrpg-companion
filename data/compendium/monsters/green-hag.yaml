translations:
  en:
    name: Green Hag
    subtype: null
    description: |-
      ## Traits

      ***Amphibious***. The hag can breathe air and water.

      ***Coven Magic***. While within 30 feet of at least two hag allies, the hag can cast one of the following spells, requiring no Material components, using the spell's normal casting time, and using Intelligence as the spellcasting ability (spell save DC 11): *[Augury](https://www.aidedd.org/spell/augury), [Find Familiar](https://www.aidedd.org/spell/find-familiar), [Identify](https://www.aidedd.org/spell/identify), [Locate Object](https://www.aidedd.org/spell/locate-object), [Scrying](https://www.aidedd.org/spell/scrying)*, or *[Unseen Servant](https://www.aidedd.org/spell/unseen-servant)*. The hag must finish a Long Rest before using this trait to cast that spell again.

      ***Mimicry***. The hag can mimic animal sounds and humanoid voices. A creature that hears the sounds can tell they are imitations only with a successful DC 14 Wisdom (Insight) check.

      ## Actions

      ***Multiattack***. The hag makes two Claw attacks.

      ***Claw***. *Melee Attack Roll* : +6, reach 5 ft. *Hit* : 8 (1d8 + 4) Slashing damage plus 3 (1d6) Poison damage.

      ***Spellcasting***. The hag casts one of the following spells, requiring no Material components and using Wisdom as the spellcasting ability (spell save DC 12, +4 to hit with spell attacks):

      At Will: *[Dancing Lights](https://www.aidedd.org/spell/dancing-lights), [Disguise Self](https://www.aidedd.org/spell/disguise-self)* (24-hour duration), *[Invisibility](https://www.aidedd.org/spell/invisibility)* (self only, and the hag leaves no tracks while Invisible), *[Minor Illusion](https://www.aidedd.org/spell/minor-illusion), [Ray of Sickness](https://www.aidedd.org/spell/ray-of-sickness)* (level 3 version)
    senses: Darkvision 60 ft., Passive Perception 14
    languages:
    - Common
    - Elvish
    - Sylvan
  fr:
    name: Guenaude verte
    subtype: null
    description: |-
      ## Traits

      ***Amphibie***. La guenaude peut respirer sous l'eau comme à l'air libre.

      ***Imitation***. La guenaude imite à merveille les bruits des animaux et les voix humanoïdes. Une créature qui l'entend se rend compte qu'il s'agit d'une imitation si elle réussit un jet de Sagesse (Intuition) DD 14.

      ***Magie d'assemblée***. Tant qu'elle se trouve dans un rayon de 9 m d'au moins deux alliées guenaudes, la guenaude peut lancer l'un des sorts suivants sans composantes matérielles, avec le temps d'incantation normal, l'Intelligence étant sa caractéristique d'incantation (DD de sauvegarde 11) : *[appel de familier](https://www.aidedd.org/spell/fr/appel-de-familier), [augure](https://www.aidedd.org/spell/fr/augure), [identification](https://www.aidedd.org/spell/fr/identification), [localisation d'objet](https://www.aidedd.org/spell/localisation-d-objet), [scrutation](https://www.aidedd.org/spell/fr/scrutation) ou [serviteur invisible](https://www.aidedd.org/spell/fr/serviteur invisible)*. La guenaude doit terminer un Repos long avant de pouvoir relancer ce sort par ce trait.

      ## Actions

      ***Attaques multiples***. La guenaude effectue deux attaques de Griffe.

      ***Griffe***. *Corps à corps* : +6, allonge 1,50 m. *Touché* : 8 (1d8 + 4) dégâts tranchants plus 3 (1d6) dégâts de poison.

      ***Incantation***. La guenaude lance l'un des sorts suivants sans composantes matérielles, la Sagesse étant sa caractéristique d'incantation (DD de sauvegarde 12, +4 pour toucher) :

      À volonté : *déguisement* (durée : 24 heures), *[illusion mineure](https://www.aidedd.org/spell/fr/illusion-mineure), [invisibilité](https://www.aidedd.org/spell/fr/invisibilite)* (soi-même uniquement ; la guenaude ne laisse aucune trace tant qu'elle est Invisible), *lumières dansantes, rayon empoisonné* (au niveau 3)
    senses: Vision dans le noir 18 m, Perception passive 14
    languages:
    - commun
    - elfe
    - sylvestre
