  en:
    name: Spider
    subtype: null
    description: |-
      ## Traits

      ***Spider Climb***. The spider can climb difficult surfaces, including along ceilings, without needing to make an ability check.

      ***Web Walker***. The spider ignores movement restrictions caused by webs, and the spider knows the location of any other creature in contact with the same web.

      ## Actions

      ***Bite***. *Melee Attack Roll* : +4, reach 5 ft. *Hit* : 1 Piercing damage plus 2 (1d4) Poison damage.
    senses: Darkvision 30 ft., Passive Perception 10
    languages:
    - None
  fr:
    name: Araignée
    subtype: null
    description: |-
      ## Traits

      ***Pattes d'araignée***. L'araignée peut parcourir les parois les plus difficiles à escalader, y compris les plafonds, sans passer par un jet de caractéristique.

      ***Marche dans les toiles***. L'araignée ignore les restrictions de mouvement causées par les toiles et connaît l'emplacement de toute autre créature en contact avec la même toile.

      ## Actions

      ***Morsure***. *Corps à corps* : +4, allonge 1,50 m. *Touché* : 1 dégât perforant plus 2 (1d4) dégâts de poison.
    senses: Vision dans le noir 9 m, Perception passive 10
    languages:
    - aucune
