  fr:
    name: Élan / Grand cervidé
    subtype: null
    description: |-
      ## Actions

      ***Coup de bélier***. *Corps à corps* : +5, allonge 1,50 m. *Touché* : 6 (1d6 + 3) dégâts contondants. Si l'élan s'est déplacé d'au moins 6 m en ligne droite vers la cible juste avant de la toucher, la cible subit 3 (1d6) dégâts contondants supplémentaires et, si elle est de taille TG ou inférieure, elle subit l'état À terre.
    senses: Vision dans le noir 18 m, Perception passive 12
    languages:
    - aucune
