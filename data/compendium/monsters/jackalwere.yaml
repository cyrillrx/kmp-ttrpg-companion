translations:
  en:
    name: Jackalwere
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Pack Tactics</em>**. The jackalwere has Advantage on an attack roll against a creature if at least one of the jackalwere's allies is within 5 feet of the creature and the ally doesn't have the Incapacitated condition.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The jackalwere makes two Rend or Slam attacks.</p>
      <p><strong><em>Rend (Jackal or Hybrid Form Only)</em></strong>. <em>Melee Attack Roll</em> : +4, reach 5 ft. <em>Hit</em> : 5 (1d6 + 2) Piercing damage.</p>
      <p><strong><em>Slam (Human or Hybrid Form Only)</em></strong>. <em>Melee Attack Roll</em> : +4, reach 5 ft. <em>Hit</em> : 4 (1d4 + 2) Bludgeoning damage.</p>
      <p><strong><em>Sleep Gaze (Recharge 5–6)</em></strong>. <em>Wisdom Saving Throw</em> : DC 10, one creature the jackalwere can see within 30 feet (Constructs and Undead succeed automatically). <em>Failure</em> : The target has the Unconscious condition for 10 minutes or until it takes damage or a creature within 5 feet of it takes an action to wake it. <em>Success</em> : The target is immune to this jackalwere's Sleep Gaze for 24 hours.</p>
      <h2>Bonus actions</h2>
      <p>** <em>Shape-Shift</em>**. The jackalwere shape-shifts into a Medium human or a Medium jackal-humanoid hybrid, or it returns to its true form (that of a Small jackal). Other than its size, its game statistics are the same in each form. Any equipment it is wearing or carrying isn't transformed.</p>
    senses: Darkvision 90 ft., Passive Perception 14
    languages:
    - Common
