  en:
    name: Boar
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Bloodied Fury</em>**. While Bloodied, the boar has Advantage on attack rolls.</p>
      <h2>Actions</h2>
      <p>** <em>Gore</em>**. <em>Melee Attack Roll</em> : +3, reach 5 ft. <em>Hit</em> : 4 (1d6 + 1) Piercing damage. If the target is a Medium or smaller creature and the boar moved 20+ feet straight toward it immediately before the hit, the target takes an extra 3 (1d6) Piercing damage and has the Prone condition.</p>
    senses: Passive Perception 9
    languages:
    - None
  fr:
    name: Sanglier
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Fureur du péril</em>**. Tant qu'il est En péril, le sanglier a un Avantage aux jets d'attaque.</p>
      <h2>Actions</h2>
      <p>** <em>Coup de défense</em>**. <em>Corps à corps</em> : +3, allonge 1,50 m. <em>Touché</em> : 4 (1d6 + 1) dégâts perforants. Si la cible est une créature de taille M ou inférieure et que le sanglier s'est déplacé d'au moins 6 m en ligne droite juste avant de toucher, la cible subit 3 (1d6) dégâts perforants supplémentaires et subit l'état À terre.</p>
    senses: Perception passive 9
    languages:
    - aucune
