translations:
  en:
    name: Fey Spirit
    subtype: null
    description: '## Actions


      ***Multiattack***. The spirit makes a number of Fey Blade attacks equal to half
      this spell''s level (round down).


      ***Fey Blade***. *Melee Attack Roll* : Bonus equals your spell attack modifier,
      reach 5 ft. *Hit* : 2d6 + 3 + the spell''s level Force damage.


      ## Bonus actions


      ***Fey Step***. The spirit magically teleports up to 30 feet to an unoccupied
      space it can see. Then one of the following effects occurs, based on the spirit''s
      chosen mood:


      ***Fuming***. The spirit has Advantage on the next attack roll it makes before
      the end of this turn.


      ***Mirthful***. *Wisdom Saving Throw* : DC equals your spell save DC, one creature
      the spirit can see within 10 feet of itself. *Failure* : The target is Charmed
      by you and the spirit for 1 minute or until the target takes any damage.


      ***Tricksy***. The spirit fills a 10-foot Cube within 5 feet of it with magical
      Darkness, which lasts until the end of its next turn.'
    senses: Darkvision 60 ft., Passive Perception 10
    languages:
    - Sylvan
    - understands the languages you know
  fr:
    name: Esprit féerique
    subtype: null
    description: '## Actions


      ***Attaques multiples***. L''esprit effectue un nombre d''attaques de Lame féerique
      égal à la moitié du niveau de ce sort (arrondir à l''inférieur).


      ***Lame féerique***. *Corps à corps* : bonus égal à votre modificateur d''attaque
      des sorts, allonge 1,50 m. *Touché* : 2d6 + 3 + le niveau du sort dégâts de
      force.


      ## Actions Bonus


      ***Foulée féerique***. L''esprit se téléporte magiquement jusqu''à 9 m dans
      un espace inoccupé qu''il peut voir. Ensuite, l''un des effets suivants se produit,
      selon l''humeur choisie par l''esprit :


      ***Furibond***. L''esprit a un Avantage à son prochain jet d''attaque avant
      la fin de ce tour.


      ***Rieur***. *JdS Sagesse* : DD égal à votre DD de sauvegarde des sorts, une
      créature que l''esprit peut voir dans un rayon de 3 m. *Échec* : la cible est
      Charmée par vous et l''esprit pendant 1 minute ou jusqu''à ce qu''elle subisse
      des dégâts.


      ***Espiègle***. L''esprit remplit un cube de 3 m de côté, dans un rayon de 1,50
      m autour de lui, de Ténèbres magiques. L''effet jusqu''à la fin de son prochain
      tour.'
    senses: Vision dans le noir 18 m, Perception passive 10
    languages:
    - sylvestre
    - comprend les langues que vous connaissez
