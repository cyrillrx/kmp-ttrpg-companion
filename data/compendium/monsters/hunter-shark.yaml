      <p>** <em>Respiration aquatique</em>**. Le requin ne peut respirer que sous l'eau.</p>
      <h2>Actions</h2>
      <p>** <em>Morsure</em>**. <em>Corps à corps</em> : +6 (avec Avantage si la cible n'a pas tous ses pv), allonge 1,50 m. <em>Touché</em> : 14 (3d6 + 4) dégâts perforants.</p>
    senses: Vision aveugle 18 m, Perception passive 12
