    description: |-
      <h2>Traits</h2>
      <p>** <em>Water Breathing</em>**. The shark can breathe only underwater.</p>
      <h2>Actions</h2>
      <p>** <em>Bite</em>**. <em>Melee Attack Roll</em> : +6 (with Advantage if the target doesn't have all its Hit Points), reach 5 ft. <em>Hit</em> : 14 (3d6 + 4) Piercing damage.</p>
    senses: Blindsight 60 ft., Passive Perception 12
