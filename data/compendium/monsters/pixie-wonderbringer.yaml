translations:
  en:
    name: Pixie Wonderbringer
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Magic Resistance</em>**. The pixie has Advantage on saving throws against spells and other magical effects.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The pixie makes two Faerie Dust attacks.</p>
      <p><strong><em>Faerie Dust</em></strong>. <em>Melee or Ranged Attack Roll</em> : +7, reach 5 ft. or range 60 ft. <em>Hit</em> : 15 (2d10 + 4) Radiant damage, and the target has the Charmed or Poisoned condition (pixie's choice) until the start of the pixie's next turn.</p>
      <p><strong><em>Spellcasting</em></strong>. The pixie casts one of the following spells, requiring no Material components and using Charisma as the spellcasting ability (spell save DC 15):</p>
      <p>At will: <em><a href="https://www.aidedd.org/spell/dancing-lights">Dancing Lights</a>, <a href="https://www.aidedd.org/spell/druidcraft">Druidcraft</a>, <a href="https://www.aidedd.org/spell/invisibility">Invisibility</a></em> (self only)<br />
      1/day each: <em><a href="https://www.aidedd.org/spell/detect-thoughts">Detect Thoughts</a>, Fly, <a href="https://www.aidedd.org/spell/major-image">Major Image</a></em>  </p>
      <h2>Bonus actions</h2>
      <p>** <em>Burst of Wonder (Recharge 5–6)</em>**. The pixie casts <em><a href="https://www.aidedd.org/spell/entangle">Entangle</a>, <a href="https://www.aidedd.org/spell/polymorph">Polymorph</a></em>, or <em><a href="https://www.aidedd.org/spell/tasha-s-hideous-laughter">Tasha's Hideous Laughter</a></em> , requiring no Material components and using the same spellcasting ability as Spellcasting.</p>
    senses: Passive Perception 15
    languages:
    - Common
    - Elvish
    - Sylvan
  fr:
    name: Pixie émerveilleuse
    subtype: null
