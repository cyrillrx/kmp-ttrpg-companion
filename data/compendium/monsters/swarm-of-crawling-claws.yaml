translations:
  en:
    name: Swarm of Crawling Claws
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Swarm</em>**. The swarm can occupy another creature's space and vice versa, and the swarm can move through any opening large enough for a Tiny creature. The swarm can't regain Hit Points or gain Temporary Hit Points.</p>
      <h2>Actions</h2>
      <p>** <em>Swarm of Grasping Hands</em>**. <em>Melee Attack Roll</em> : +4, reach 5 ft. <em>Hit</em> : 20 (4d8 + 2) Necrotic damage, or 11 (2d8 + 2) Necrotic damage if the swarm is Bloodied. If the target is a Medium or smaller creature, it has the Prone condition.</p>
    senses: Blindsight 30 ft., Passive Perception 10
    languages:
    - Understands Common but can't speak
  fr:
    name: Nuée de griffes rampantes / sénestres
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Nuée</em>**. La nuée peut occuper l'espace d'une autre créature et réciproquement, et elle peut se déplacer par toute ouverture assez large pour une créature de taille TP. La nuée ne peut ni récupérer de points de vie ni recevoir de points de vie temporaires.</p>
      <h2>Actions</h2>
      <p>** <em>Nuée de sénestres</em>**. <em>Corps à corps</em> : +4, allonge 1,50 m. <em>Touché</em> : 20 (4d8 + 2) dégâts nécrotiques, ou 11 (2d8 + 2) dégâts nécrotiques si la nuée est En péril. Si la cible est une créature de taille M ou inférieure, elle subit l'état À terre.</p>
    senses: Vision aveugle 9 m, Perception passive 10
    languages:
    - comprend le commun mais ne parle pas
