translations:
  en:
    name: Copper Dragon Wyrmling
    subtype: Metallic
    description: |-
      <h2>Actions</h2>
      <p>** <em>Rend</em>**. <em>Melee Attack Roll</em> : +4, reach 5 ft. <em>Hit</em> : 7 (1d10 + 2) Slashing damage.</p>
      <p><strong><em>Acid Breath (Recharge 5–6)</em></strong>. <em>Dexterity Saving Throw</em> : DC 11, each creature in a 20-foot-long, 5-foot-wide Line. <em>Failure</em> : 18 (4d8) Acid damage. <em>Success</em> : Half damage.</p>
      <p><strong><em>Slowing Breath</em></strong>. <em>Constitution Saving Throw</em> : DC 11, each creature in a 15-foot Cone. <em>Failure</em> : The target can't take Reactions; its Speed is halved; and it can take either an action or a Bonus Action on its turn, not both. This effect lasts until the end of its next turn.</p>
    senses: Blindsight 10 ft., Darkvision 60 ft., Passive Perception 14
    languages:
    - Draconic
  fr:
    name: Dragon de cuivre, dragonnet
    subtype: Métallique
    description: |-
      <h2>Actions</h2>
      <p>** <em>Saignée</em>**. <em>Corps à corps</em> : +4, allonge 1,50 m. <em>Touché</em> : 7 (1d10 + 2) dégâts tranchants.</p>
      <p><strong><em>Souffle d'acide (recharge 5–6)</em></strong>. <em>JdS Dextérité</em> : DD 11, chaque créature dans une Ligne de 6 m de long sur 1,50 m de large. <em>Échec</em> : 18 (4d8) dégâts d'acide. <em>Réussite</em> : demi-dégâts.</p>
      <p><strong><em>Souffle ralentissant</em></strong>. <em>JdS Constitution</em> : DD 11, chaque créature dans un Cône de 4,50 m. <em>Échec</em> : la cible voit sa Vitesse réduite de moitié, ne peut pas jouer de Réaction et peut entreprendre une action ou une action Bonus à son tour, mais pas les deux. L'effet persiste jusqu'à la fin de son tour suivant.</p>
    senses: Vision aveugle 3 m, Vision dans le noir 18 m, Perception passive 14
    languages:
    - draconique
