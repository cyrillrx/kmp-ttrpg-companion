translations:
  en:
    name: Copper Dragon Wyrmling
    subtype: Metallic
    description: |-
      ## Actions

      ***Rend***. *Melee Attack Roll* : +4, reach 5 ft. *Hit* : 7 (1d10 + 2) Slashing damage.

      ***Acid Breath (Recharge 5–6)***. *Dexterity Saving Throw* : DC 11, each creature in a 20-foot-long, 5-foot-wide Line. *Failure* : 18 (4d8) Acid damage. *Success* : Half damage.

      ***Slowing Breath***. *Constitution Saving Throw* : DC 11, each creature in a 15-foot Cone. *Failure* : The target can't take Reactions; its Speed is halved; and it can take either an action or a Bonus Action on its turn, not both. This effect lasts until the end of its next turn.
    senses: Blindsight 10 ft., Darkvision 60 ft., Passive Perception 14
    languages:
    - Draconic
  fr:
    name: Dragon de cuivre, dragonnet
    subtype: Métallique
    description: |-
      ## Actions

      ***Saignée***. *Corps à corps* : +4, allonge 1,50 m. *Touché* : 7 (1d10 + 2) dégâts tranchants.

      ***Souffle d'acide (recharge 5–6)***. *JdS Dextérité* : DD 11, chaque créature dans une Ligne de 6 m de long sur 1,50 m de large. *Échec* : 18 (4d8) dégâts d'acide. *Réussite* : demi-dégâts.

      ***Souffle ralentissant***. *JdS Constitution* : DD 11, chaque créature dans un Cône de 4,50 m. *Échec* : la cible voit sa Vitesse réduite de moitié, ne peut pas jouer de Réaction et peut entreprendre une action ou une action Bonus à son tour, mais pas les deux. L'effet persiste jusqu'à la fin de son tour suivant.
    senses: Vision aveugle 3 m, Vision dans le noir 18 m, Perception passive 14
    languages:
    - draconique
