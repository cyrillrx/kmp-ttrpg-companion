translations:
  en:
    name: Frost Giant
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The giant makes two attacks, using Frost Axe or Great Bow in any combination.</p>
      <p><strong><em>Frost Axe</em></strong>. <em>Melee Attack Roll</em> : +9, reach 10 ft. <em>Hit</em> : 19 (2d12 + 6) Slashing damage plus 9 (2d8) Cold damage.</p>
      <p><strong><em>Great Bow</em></strong>. <em>Ranged Attack Roll</em> : +9, range 150/600 ft. <em>Hit</em> : 17 (2d10 + 6) Piercing damage plus 7 (2d6) Cold damage, and the target's Speed decreases by 10 feet until the end of its next turn.</p>
      <h2>Bonus actions</h2>
      <p>** <em>War Cry (Recharge 5–6)</em>**. The giant or one creature of its choice that can see or hear it gains 16 (2d10 + 5) Temporary Hit Points and has Advantage on attack rolls until the start of the giant's next turn.</p>
    senses: Passive Perception 13
    languages:
    - Giant
  fr:
    name: Géant du givre
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le géant effectue deux attaques, réparties à sa guise entre Hache de givre et Grand arc.</p>
      <p><strong><em>Hache de givre</em></strong>. <em>Corps à corps</em> : +9, allonge 3 m. <em>Touché</em> : 19 (2d12 + 6) dégâts tranchants plus 9 (2d8) dégâts de froid.</p>
      <p><strong><em>Grand arc</em></strong>. <em>À distance</em> : +9, portée 45/180 m. <em>Touché</em> : 17 (2d10 + 6) dégâts perforants plus 7 (2d6) dégâts de froid, et la Vitesse de la cible est réduite de 3 m jusqu'à la fin de son tour suivant.</p>
      <h2>Actions Bonus</h2>
      <p>** <em>Cri de guerre (recharge 5–6)</em>**. Le géant ou une créature de son choix parmi celles qui l'entendent ou le voient reçoit 16 (2d10 + 5) points de vie temporaires, ainsi qu'un Avantage aux jets d'attaque jusqu'au début du tour suivant du géant.</p>
    senses: Perception passive 13
    languages:
    - géant
