translations:
  en:
    name: Goristro
    subtype: Demon
    description: |-
      <h2>Traits</h2>
      <p>** <em>Demonic Restoration</em>**. If the goristro dies outside the Abyss, its body dissolves into ichor, and it gains a new body instantly, reviving with all its Hit Points somewhere in the Abyss.</p>
      <p><strong><em>Magic Resistance</em></strong>. The goristro has Advantage on saving throws against spells and other magical effects.</p>
      <p><strong><em>Siege Monster</em></strong>. The goristro deals double damage to objects and structures.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The goristro makes one Brutal Gore attack and two Slam attacks.</p>
      <p><strong><em>Brutal Gore</em></strong>. <em>Melee Attack Roll</em> : +13, reach 10 ft. <em>Hit</em> : 40 (6d10 + 7) Piercing damage. If the target is a Huge or smaller creature, it is pushed up to 20 feet straight away from the goristro and has the Prone condition.</p>
      <p><strong><em>Slam</em></strong>. <em>Melee Attack Roll</em> : +13, reach 10 ft. <em>Hit</em> : 29 (4d10 + 7) Bludgeoning damage.</p>
      <h2>Bonus actions</h2>
      <p>** <em>Charge</em>**. The goristro moves up to half its Speed straight toward an enemy it can see.</p>
    senses: Darkvision 120 ft., Passive Perception 17
    languages:
    - Abyssal
  fr:
    name: Goristro
    subtype: Démon
    description: |-
      <h2>Traits</h2>
      <p>** <em>Restauration démoniaque</em>**. Si le goristro meurt hors des Abysses, son corps se dissout en ichor et il en acquiert aussitôt un nouveau en revenant à la vie avec tous ses pv, quelque part dans les Abysses.</p>
      <p><strong><em>Résistance à la magie</em></strong>. Le goristro a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.</p>
      <p><strong><em>Monstre de siège</em></strong>. Le goristro inflige des dégâts doublés aux objets et aux structures.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le goristro effectue une attaque de Coup de boutoir et deux attaques de Coup.</p>
      <p><strong><em>Coup de boutoir</em></strong>. <em>Corps à corps</em> : +13, allonge 3 m. <em>Touché</em> : 40 (6d10 + 7) dégâts perforants. Si la cible est une créature de taille Gig ou inférieure, elle est repoussée du goristro jusqu'à 6 m en ligne droite et subit l'état À terre.</p>
      <p><strong><em>Coup</em></strong>. <em>Corps à corps</em> : +13, allonge 3 m. <em>Touché</em> : 29 (4d10 + 7) dégâts contondants.</p>
      <h2>Actions Bonus</h2>
      <p>** <em>Charge</em>**. Le goristro se déplace en ligne droite à concurrence de la moitié de sa Vitesse vers un ennemi qu'il voit.</p>
    senses: Vision dans le noir 36 m, Perception passive 17
    languages:
    - abyssal
