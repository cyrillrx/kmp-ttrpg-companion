translations:
  en:
    name: Abominable Yeti
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Fear of Fire</em>**. If the yeti takes Fire damage, it has Disadvantage on attack rolls and ability checks until the end of its next turn.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The yeti can use its Chilling Gaze and makes two attacks, using Claw or Ice Throw in any combination.</p>
      <p><strong><em>Claw</em></strong>. <em>Melee Attack Roll</em> : +11, reach 5 ft. <em>Hit</em> : 14 (2d6 + 7) Slashing damage plus 7 (2d6) Cold damage.</p>
      <p><strong><em>Ice Throw</em></strong>. <em>Ranged Attack Roll</em> : +11, range 60/240 ft. <em>Hit</em> : 12 (2d4 + 7) Bludgeoning damage plus 7 (2d6) Cold damage.</p>
      <p><strong><em>Chilling Gaze</em></strong>. <em>Constitution Saving Throw</em> : DC 18, one creature the yeti can see within 30 feet. <em>Failure</em> : 21 (6d6) Cold damage, and the target has the Paralyzed condition until the start of the yeti's next turn unless the target has Immunity to Cold damage. <em>Success</em> : The target is immune to this yeti's Chilling Gaze for 1 hour.</p>
      <p><strong><em>Cold Breath (Recharge 6)</em></strong>. <em>Constitution Saving Throw</em> : DC 18, each creature in a 30-foot Cone. <em>Failure</em> : 45 (10d8) Cold damage. <em>Success</em> : Half damage.</p>
    senses: Darkvision 60 ft., Passive Perception 19
    languages:
    - Yeti
  fr:
    name: Yéti abominable
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Aversion du feu</em>**. Si le yéti subit des dégâts de Feu, il a un Désavantage aux jets d'attaque et aux jets de caractéristique jusqu'à la fin de son prochain tour.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le yéti peut utiliser son Regard glaçant et effectuer deux attaques, réparties à sa guise entre Griffe et Lancer de glace.</p>
      <p><strong><em>Griffe</em></strong>. <em>Corps à corps</em> : +11, allonge 1,50 m. <em>Touché</em> : 14 (2d6 + 7) dégâts tranchants plus 7 (2d6) dégâts de froid.</p>
      <p><strong><em>Lancer de glace</em></strong>. <em>À distance</em> : +11, portée 60/72 m. <em>Touché</em> : 12 (2d4 + 7) dégâts contondants plus 7 (2d6) dégâts de froid.</p>
      <p><strong><em>Regard glaçant</em></strong>. <em>JdS Constitution</em> : DD 18 une créature que le yéti peut voir dans un rayon de 9 m. <em>Échec</em> : 21 (6d6) dégâts de froid, et la cible subit l'état Paralysé jusqu'au début du prochain tour du yéti, sauf si elle est immunisée contre les dégâts de froid. <em>Réussite</em> : la cible est immunisée contre le Regard glaçant de tous les yétis pendant 1 heure.</p>
      <p><strong><em>Souffle glacial (recharge 6)</em></strong>. <em>JdS Constitution</em> : DD 18, chaque créature dans un Cône de 9 m. <em>Échec</em> : 45 (10d8) dégâts de froid. <em>Réussite</em> : demi-dégâts.</p>
    senses: Vision dans le noir 18 m, Perception passive 19
    languages:
    - yéti
