translations:
  en:
    name: Young Silver Dragon
    subtype: Metallic
    description: |-
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The dragon makes three Rend attacks. It can replace one attack with a use of Paralyzing Breath.</p>
      <p><strong><em>Rend</em></strong>. <em>Melee Attack Roll</em> : +10, reach 10 ft. <em>Hit</em> : 15 (2d8 + 6) Slashing damage.</p>
      <p><strong><em>Cold Breath (Recharge 5–6)</em></strong>. <em>Constitution Saving Throw</em> : DC 17, each creature in a 30-foot Cone. <em>Failure</em> : 49 (11d8) Cold damage. <em>Success</em> : Half damage.</p>
      <p><strong><em>Paralyzing Breath</em></strong>. <em>Constitution Saving Throw</em> : DC 17, each creature in a 30-foot Cone. <em>First Failure</em> : The target has the Incapacitated condition until the end of its next turn, when it repeats the save. <em>Second Failure</em> : The target has the Paralyzed condition, and it repeats the save at the end of each of its turns, ending the effect on itself on a success. After 1 minute, it succeeds automatically.</p>
    senses: Blindsight 30 ft., Darkvision 120 ft., Passive Perception 18
    languages:
    - Common
    - Draconic
  fr:
    name: Dragon d'argent, jeune
    subtype: Métallique
    description: |-
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le dragon effectue trois attaques de Saignée. Il peut remplacer l'une de ces attaques par une utilisation de Souffle paralysant.</p>
      <p><strong><em>Saignée</em></strong>. <em>Corps à corps</em> : +10, allonge 3 m. <em>Touché</em> : 15 (2d8 + 6) dégâts tranchants.</p>
      <p><strong><em>Souffle glacial (recharge 5–6)</em></strong>. <em>JdS Constitution</em> : DD 17, chaque créature dans un Cône de 9 m. <em>Échec</em> : 49 (11d8) dégâts de froid. <em>Réussite</em> : 1/2 dégâts.</p>
      <p><strong><em>Souffle paralysant</em></strong>. <em>JdS Constitution</em> : DD 17, chaque créature dans un Cône de 9 m. <em>Premier échec</em> : la cible subit l'état Incapable d'agir jusqu'à la fin de son tour suivant, et réitère alors son JdS. <em>Deuxième échec</em> : la cible subit l'état Paralysé et réitère le JdS à la fin de chacun de ses tours ; elle met un terme à l'effet sur elle-même en cas de réussite. Au bout de 1 minute, elle réussit automatiquement ce JdS.</p>
    senses: Vision aveugle 9 m, Vision dans le noir 36 m, Perception passive 18
    languages:
    - commun
    - draconique
