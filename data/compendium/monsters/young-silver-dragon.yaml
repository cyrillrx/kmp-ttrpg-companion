translations:
  en:
    name: Young Silver Dragon
    subtype: Metallic
    description: |-
      ## Actions

      ***Multiattack***. The dragon makes three Rend attacks. It can replace one attack with a use of Paralyzing Breath.

      ***Rend***. *Melee Attack Roll* : +10, reach 10 ft. *Hit* : 15 (2d8 + 6) Slashing damage.

      ***Cold Breath (Recharge 5–6)***. *Constitution Saving Throw* : DC 17, each creature in a 30-foot Cone. *Failure* : 49 (11d8) Cold damage. *Success* : Half damage.

      ***Paralyzing Breath***. *Constitution Saving Throw* : DC 17, each creature in a 30-foot Cone. *First Failure* : The target has the Incapacitated condition until the end of its next turn, when it repeats the save. *Second Failure* : The target has the Paralyzed condition, and it repeats the save at the end of each of its turns, ending the effect on itself on a success. After 1 minute, it succeeds automatically.
    senses: Blindsight 30 ft., Darkvision 120 ft., Passive Perception 18
    languages:
    - Common
    - Draconic
  fr:
    name: Dragon d'argent, jeune
    subtype: Métallique
    description: |-
      ## Actions

      ***Attaques multiples***. Le dragon effectue trois attaques de Saignée. Il peut remplacer l'une de ces attaques par une utilisation de Souffle paralysant.

      ***Saignée***. *Corps à corps* : +10, allonge 3 m. *Touché* : 15 (2d8 + 6) dégâts tranchants.

      ***Souffle glacial (recharge 5–6)***. *JdS Constitution* : DD 17, chaque créature dans un Cône de 9 m. *Échec* : 49 (11d8) dégâts de froid. *Réussite* : 1/2 dégâts.

      ***Souffle paralysant***. *JdS Constitution* : DD 17, chaque créature dans un Cône de 9 m. *Premier échec* : la cible subit l'état Incapable d'agir jusqu'à la fin de son tour suivant, et réitère alors son JdS. *Deuxième échec* : la cible subit l'état Paralysé et réitère le JdS à la fin de chacun de ses tours ; elle met un terme à l'effet sur elle-même en cas de réussite. Au bout de 1 minute, elle réussit automatiquement ce JdS.
    senses: Vision aveugle 9 m, Vision dans le noir 36 m, Perception passive 18
    languages:
    - commun
    - draconique
