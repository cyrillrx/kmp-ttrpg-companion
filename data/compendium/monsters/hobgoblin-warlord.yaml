translations:
  en:
    name: Hobgoblin Warlord
    subtype: Goblinoid
    description: |-
      <h2>Traits</h2>
      <p>** <em>Aura of Authority</em>**. While in a 30-foot Emanation originating from the hobgoblin, the hobgoblin and its allies have Advantage on attack rolls and saving throws, provided the hobgoblin doesn't have the Incapacitated condition.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The hobgoblin makes three attacks, using Javelin or Longsword in any combination.</p>
      <p><strong><em>Javelin</em></strong>. <em>Melee or Ranged Attack Roll</em> : +6, reach 5 ft. or range 30/120 ft. <em>Hit</em> : 11 (2d6 + 4) Piercing damage, and the target's Speed decreases by 10 feet until the start of the hobgoblin's next turn.</p>
      <p><strong><em>Longsword</em></strong>. <em>Melee Attack Roll</em> : +6, reach 5 ft. <em>Hit</em> : 12 (2d8 + 3) Slashing damage.</p>
      <h2>Reactions</h2>
      <p>** <em>Parry</em>**. <em>Trigger</em> : The hobgoblin is hit by a melee attack roll while holding a weapon. <em>Response</em> : The hobgoblin adds 3 to its AC against that attack, possibly causing it to miss.</p>
    senses: Darkvision 60 ft., Passive Perception 10
    languages:
    - Common
    - Goblin
  fr:
    name: Hobgobelin, seigneur de guerre
    subtype: Gobelinoïde
    description: |-
      <h2>Traits</h2>
      <p>** <em>Aura d'autorité</em>**. Tant qu'ils se trouvent dans une Émanation de 3 m centrée sur le hobgobelin et à condition que celui-ci ne subisse pas l'état Incapable d'agir, le hobgobelin et ses alliés ont un Avantage aux jets d'attaque et jets de sauvegarde.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le hobgobelin effectue trois attaques, réparties à sa guise entre Javeline et Épée longue.</p>
      <p><strong><em>Javeline</em></strong>. <em>Corps à corps ou à distance</em> : +6, allonge 1,50 m ou portée 30/36 m. <em>Touché</em> : 11 (2d6 + 4) dégâts perforants, et la Vitesse de la cible est réduite de 3 m jusqu'au début du prochain tour du hobgobelin.</p>
      <p><strong><em>Épée longue</em></strong>. <em>Corps à corps</em> : +6, allonge 1,50 m. <em>Touché</em> : 12 (2d8 + 3) dégâts tranchants.</p>
      <h2>Réactions</h2>
      <p>** <em>Parade</em>**. <em>Déclencheur</em> : le hobgobelin est touché par un jet d'attaque de corps à corps alors qu'il tient une arme. <em>Conséquences</em> : le hobgobelin ajoute 3 à sa CA contre cette attaque, ce qui peut la faire rater.</p>
    senses: Vision dans le noir 18 m, Perception passive 10
    languages:
    - commun
    - gobelin
