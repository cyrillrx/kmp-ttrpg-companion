translations:
  en:
    name: Vampire Nightbringer
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Sunlight Hypersensitivity</em>**. The vampire takes 10 Radiant damage if it starts its turn in sunlight. While in sunlight, it has Disadvantage on attack rolls and ability checks.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The vampire makes one Bite attack and one Shadow Strike attack.</p>
      <p><strong><em>Bite</em></strong>. <em>Melee Attack Roll</em> : +7, reach 5 ft. <em>Hit</em> : 7 (1d6 + 4) Piercing damage plus 10 (3d6) Necrotic damage. The target's Hit Point maximum decreases by an amount equal to the Necrotic damage taken, and the vampire regains Hit Points equal to that amount.</p>
      <p><strong><em>Shadow Strike</em></strong>. <em>Melee Attack Roll</em> : +7, reach 5 ft. <em>Hit</em> : 7 (1d6 + 4) Slashing damage plus 14 (4d6) Cold damage.</p>
      <h2>Bonus actions</h2>
      <p>** <em>Shadow Stealth</em>**. While in Dim Light or Darkness, the vampire takes the Hide action.</p>
    senses: Darkvision 120 ft., Passive Perception 15
    languages:
    - Common plus one other language
  fr:
    name: Vampire, héraut de la nuit
    subtype: null
    description: |-
      <h2>Traits</h2>
