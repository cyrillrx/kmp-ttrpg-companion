translations:
  en:
    name: Kenku
    subtype: null
    description: |-
      ## Traits

      ***Mimicry***. The kenku can mimic any sounds it has heard, including voices. A creature that hears the sounds can tell they are imitations with a successful DC 14 Wisdom (Insight) check.

      ## Actions

      ***Shadow Blade***. *Melee or Ranged Attack Roll* : +5, reach 5 ft. or range 60 ft. *Hit* : 6 (1d6 + 3) Necrotic damage. *Hit or Miss* : The blade magically returns to the kenku's hand immediately after a ranged attack.

      ## Bonus actions

      ***Eldritch Lantern (Recharge 4–6)***. The kenku casts *[Faerie Fire](https://www.aidedd.org/spell/faerie-fire)* , using Intelligence as the spellcasting ability (spell save DC 10).
    senses: Darkvision 60 ft., Passive Perception 12
    languages:
    - Common
    - Primordial (Auran)
  fr:
    name: Kenku
    subtype: null
    description: |-
      ## Traits

      ***Imitation***. Le kenku peut imiter tous les sons qu'il a entendus, y compris les voix. Une créature qui entend ces sons peut les reconnaître comme des imitations en réussissant un jet de Sagesse (Intuition) DD 14.

      ## Actions

      ***Lame d'ombre***. *Corps à corps ou à distance* : +5, allonge 1,50 m ou portée 18 m. *Touché* : 6 (1d6 + 3) dégâts nécrotiques. *Touché ou raté* : la lame retourne magiquement dans la main du kenku immédiatement après une attaque à distance.

      ## Actions Bonus

      ***Lanterne occulte (recharge 4–6)***. Le kenku lance *[lueurs féeriques](https://www.aidedd.org/spell/fr/lueurs-feeriques)* , en utilisant l'Intelligence comme caractéristique d'incantation (DD de sauvegarde 10).
    senses: Vision dans le noir 18 m, Perception passive 12
    languages:
    - commun
    - primordial (aérien)
