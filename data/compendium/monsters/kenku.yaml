translations:
  en:
    name: Kenku
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Mimicry</em>**. The kenku can mimic any sounds it has heard, including voices. A creature that hears the sounds can tell they are imitations with a successful DC 14 Wisdom (Insight) check.</p>
      <h2>Actions</h2>
      <p>** <em>Shadow Blade</em>**. <em>Melee or Ranged Attack Roll</em> : +5, reach 5 ft. or range 60 ft. <em>Hit</em> : 6 (1d6 + 3) Necrotic damage. <em>Hit or Miss</em> : The blade magically returns to the kenku's hand immediately after a ranged attack.</p>
      <h2>Bonus actions</h2>
      <p>** <em>Eldritch Lantern (Recharge 4–6)</em>**. The kenku casts <em><a href="https://www.aidedd.org/spell/faerie-fire">Faerie Fire</a></em> , using Intelligence as the spellcasting ability (spell save DC 10).</p>
    senses: Darkvision 60 ft., Passive Perception 12
    languages:
    - Common
    - Primordial (Auran)
  fr:
    name: Kenku
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Imitation</em>**. Le kenku peut imiter tous les sons qu'il a entendus, y compris les voix. Une créature qui entend ces sons peut les reconnaître comme des imitations en réussissant un jet de Sagesse (Intuition) DD 14.</p>
      <h2>Actions</h2>
      <p>** <em>Lame d'ombre</em>**. <em>Corps à corps ou à distance</em> : +5, allonge 1,50 m ou portée 18 m. <em>Touché</em> : 6 (1d6 + 3) dégâts nécrotiques. <em>Touché ou raté</em> : la lame retourne magiquement dans la main du kenku immédiatement après une attaque à distance.</p>
      <h2>Actions Bonus</h2>
      <p>** <em>Lanterne occulte (recharge 4–6)</em>**. Le kenku lance <em><a href="https://www.aidedd.org/spell/fr/lueurs-feeriques">lueurs féeriques</a></em> , en utilisant l'Intelligence comme caractéristique d'incantation (DD de sauvegarde 10).</p>
    senses: Vision dans le noir 18 m, Perception passive 12
    languages:
    - commun
    - primordial (aérien)
