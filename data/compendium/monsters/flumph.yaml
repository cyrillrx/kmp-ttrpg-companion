translations:
  en:
    name: Flumph
    subtype: null
    description: |-
      ## Traits

      ***Advanced Telepathy***. The flumph perceives the content of any telepathic communication within 60 feet of it.

      ***Prone Deficiency***. If the flumph receives the Prone condition, roll a die. On an odd number, it has the Incapacitated condition. At the end of each of its turns, the flumph makes a DC 10 Dexterity saving throw, ending the Incapacitated condition on a success.

      ***Telepathic Shroud***. The flumph's thoughts can't be read by any means, and magic can't detect its location or observe it remotely.

      ## Actions

      ***Tentacle***. *Melee Attack Roll* : +4, reach 5 ft. *Hit* : 4 (1d4 + 2) Acid damage.

      ***Stench Spray (1/Day)***. *Dexterity Saving Throw* : DC 10, one creature the flumph can see within 15 feet. *Failure* : The target is coated in a foul-smelling liquid, exudes a stench for 1d4 hours, and has the Poisoned condition while the stench lasts. Other creatures have the Poisoned condition while in a 5-foot Emanation originating from the coated target. The target can remove the stench on itself if it bathes during a Short or Long Rest.
    senses: Darkvision 60 ft., Passive Perception 12
    languages:
    - Understands Undercommon but can't speak; telepathy 60 ft.
  fr:
    name: Flumph
    subtype: null
    description: |-
      ## Traits

      ***Télépathie avancée***. Le flumph perçoit le contenu de toute communication télépathique dans un rayon de 18 m autour de lui.

      ***Syndrome de la tortue***. Si le flumph subit l'état À terre, lancez un dé. Sur un résultat impair, il subit également l'état Incapable d'agir. À la fin de chacun de ses tours, le flumph effectue un jet de sauvegarde de Dextérité DD 10, mettant fin à l'état Incapable d'agir en cas de réussite.

      ***Camouflage télépathique***. Les pensées du flumph sont impossibles à lire par aucun moyen, et la magie ne peut ni détecter sa position ni l'observer à distance.

      ## Actions

      ***Tentacule***. *Corps à corps* : +4, allonge 1,50 m. *Touché* : 4 (1d4 + 2) dégâts d'acide.

      ***Aspersion nauséabonde (1/jour)***. *JdS Dextérité* : DD 10, une créature que le flumph peut voir dans un rayon de 4,50 m. *Échec* : la cible est recouverte d'un liquide nauséabond, dégage une puanteur pendant 1d4 heures et subit l'état Empoisonné tant que dure l'odeur. Les autres créatures subissent l'état Empoisonné tant qu'elles sont dans une Émanation de 1,50 m de rayon centrée sur la cible recouverte. La cible peut se débarrasser de la puanteur en prenant un bain pendant un Repos court ou long.
    senses: Vision dans le noir 18 m, Perception passive 12
    languages:
    - comprend le commun des profondeurs mais ne parle pas ; télépathie 18 m
