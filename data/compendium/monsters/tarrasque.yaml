  en:
    name: Tarrasque
    subtype: Titan
    description: |-
      ## Traits

      ***Legendary Resistance (6/Day)***. If the tarrasque fails a saving throw, it can choose to succeed instead.

      ***Magic Resistance***. The tarrasque has Advantage on saving throws against spells and other magical effects.

      ***Reflective Carapace***. If the tarrasque is targeted by a *[Magic Missile](https://www.aidedd.org/spell/magic-missile)* spell or a spell that requires a ranged attack roll, roll 1d6. On a 1-5, the tarrasque is unaffected. On a 6, the tarrasque is unaffected and reflects the spell, turning the caster into the target.

      ***Siege Monster***. The tarrasque deals double damage to objects and structures.

      ## Actions

      ***Multiattack***. The tarrasque makes one Bite attack and three other attacks, using Claw or Tail in any combination.

      ***Bite***. *Melee Attack Roll* : +19, reach 15 ft. *Hit* : 36 (4d12 + 10) Piercing damage, and the target has the Grappled condition (escape DC 20). Until the grapple ends, the target has the Restrained condition and can't teleport.

      ***Claw***. *Melee Attack Roll* : +19, reach 15 ft. *Hit* : 28 (4d8 + 10) Slashing damage.

      ***Tail***. *Melee Attack Roll* : +19, reach 30 ft. *Hit* : 23 (3d8 + 10) Bludgeoning damage. If the target is a Huge or smaller creature, it has the Prone condition.

      ***Thunderous Bellow (Recharge 5–6)***. *Constitution Saving Throw* : DC 27, each creature and each object that isn't being worn or carried in a 150-foot Cone. *Failure* : 78 (12d12) Thunder damage, and the target has the Deafened and Frightened conditions until the end of its next turn. *Success* : Half damage only.

      ## Bonus actions

      ***Swallow***. *Strength Saving Throw* : DC 27, one Large or smaller creature Grappled by the tarrasque (it can have up to six creatures swallowed at a time). *Failure* : The target is swallowed, and the Grappled condition ends. A swallowed creature has the Blinded and Restrained conditions and can't teleport, it has Total Cover against attacks and other effects outside the tarrasque, and it takes 56 (16d6) Acid damage at the start of each of the tarrasque's turns. If the tarrasque takes 60 damage or more on a single turn from a creature inside it, the tarrasque must succeed on a DC 20 Constitution saving throw at the end of that turn or regurgitate all swallowed creatures, each of which falls in a space within 10 feet of the tarrasque and has the Prone condition. If the tarrasque dies, any swallowed creature no longer has the Restrained condition and can escape from the corpse using 20 feet of movement, exiting Prone.

      ## Legendary actions

      Legendary Action Uses: 3. Immediately after another creature's turn, The tarrasque can expend a use to take one of the following actions. The tarrasque regains all expended uses at the start of each of its turns.

      ***Onslaught***. The tarrasque moves up to half its Speed, and it makes one Claw or Tail attack.

      ***World-Shaking Movement***. The tarrasque moves up to its Speed. At the end of this movement, the tarrasque creates an instantaneous shock wave in a 60-foot Emanation originating from itself. Creatures in that area lose Concentration and, if Medium or smaller, have the Prone condition. The tarrasque can't take this action again until the start of its next turn.
    senses: Blindsight 120 ft., Passive Perception 19
    languages:
    - None
  fr:
    name: Tarasque
    subtype: Titan
    description: |-
      ## Traits

      ***Carapace réfléchissante***. Si la tarasque est la cible du sort *projectile magique* ou de tout autre sort qui nécessite un jet d'attaque à distance, lancez 1d6. Sur un résultat de 1 à 5, la tarasque n'est pas affectée. Sur un 6, la tarasque n'est pas affectée et renvoie le sort, l'incantateur en devenant la cible.

      ***Monstre de siège***. La tarasque inflige des dégâts doublés aux objets et aux structures.

      ***Résistance à la magie***. La tarasque a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.

      ***Résistance légendaire (6/jour)***. Si La tarasque rate un jet de sauvegarde, elle peut décider de le réussir tout de même.

      ## Actions

      ***Attaques multiples***. La tarasque effectue une attaque de Morsure et trois autres attaques, réparties à sa guise entre Griffe et Queue.

      ***Griffe***. *Corps à corps* : +19, allonge 4,50 m. *Touché* : 28 (4d8 + 10) dégâts tranchants.

      ***Morsure***. *Corps à corps* : +19, allonge 4,50 m. *Touché* : 36 (4d12 + 10) dégâts perforants, et la cible subit l'état Agrippé (évasion DD 20). Tant qu'elle est agrippée, la cible subit en outre l'état Entravé et la téléportation lui est impossible.

      ***Queue***. *Corps à corps* : +19, allonge 9 m. *Touché* : 23 (3d8 + 10) dégâts contondants. Si la cible est une créature de taille TG ou inférieure, elle subit l'état À terre.

      ***Mugissement tonitruant (recharge 5–6)***. *JdS Constitution* : DD 27, chaque créature et chaque objet qui n'est porté par personne dans un Cône de 45 m. *Échec* : 78 (12d12) dégâts de tonnerre, et la cible subit les états Assourdi et Effrayé jusqu'à la fin de son tour suivant. *Réussite* : demi-dégâts uniquement.

      ## Actions Bonus

      ***Engloutissement***. *JdS Force* : DD 27, une créature de taille G ou inférieure Agrippée par la tarasque (qui peut contenir simultanément un maximum de six créatures). *Échec* : la cible est engloutie, et l'état Agrippé prend fin. La créature engloutie subit les états Aveuglé et Entravé, la téléportation lui est impossible, elle bénéficie d'un Abri total contre les attaques et effets émanant de l'extérieur de la tarasque, et subit 56 (16d6) dégâts d'acide au début de chacun des tours du monstre. Si la tarasque subit 60 dégâts ou plus lors d'un même tour de la part d'une créature engloutie, elle doit réussir un jet de sauvegarde de Constitution DD 20 à la fin de ce tour sous peine de régurgiter toutes les créatures englouties, chacune tombant dans un espace situé dans un rayon de 3 m d'elle et subissant l'état À terre. Si la tarasque meurt, les créatures englouties ne subissent plus l'état Entravé et peuvent s'extraire du cadavre en dépensant 6 m de déplacement, pour se retrouver avec l'état À terre.

      ## Actions Légendaires

      Utilisations d'action Légendaire : 3. Aussitôt après le tour d'une autre créature, la tarasque peut dépenser une utilisation pour entreprendre l'une des actions ci-après. La tarasque récupère toutes ses utilisations dépensées au début de chacun de ses tours.

      ***Déplacement sismique***. La tarasque se déplace dans les limites de sa Vitesse. À l'issue de ce déplacement, elle produit une onde de choc instantanée sous forme d'une Émanation de 18 m centrée sur elle-même. Les créatures de la zone perdent leur Concentration, celles de taille M et inférieure subissant en outre l'état À terre. La tarasque ne peut alors plus entreprendre cette action jusqu'au début de son tour suivant.

      ***Offensive***. La tarasque se déplace à concurrence de la moitié de sa Vitesse et effectue une attaque de Griffe ou de Queue.
    senses: Vision aveugle 36 m, Perception passive 19
    languages:
    - aucune
