translations:
  en:
    name: Gnoll Fang of Yeenoghu
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The gnoll makes one Bite attack and two Bone Flail attacks.</p>
      <p><strong><em>Bite</em></strong>. <em>Melee Attack Roll</em> : +5, reach 5 ft. <em>Hit</em> : 6 (1d6 + 3) Piercing damage plus 7 (2d6) Poison damage, and the target has the Poisoned condition until the start of the gnoll's next turn.</p>
      <p><strong><em>Bone Flail</em></strong>. <em>Melee Attack Roll</em> : +5, reach 10 ft. <em>Hit</em> : 7 (1d8 + 3) Piercing damage.</p>
      <h2>Bonus actions</h2>
      <p>** <em>Rampage (2/Day)</em>**. Immediately after dealing damage to a creature that is already Bloodied, the gnoll moves up to half its Speed, and it makes one Bite attack.</p>
    senses: Darkvision 60 ft., Passive Perception 10
    languages:
    - Abyssal
    - Gnoll
  fr:
    name: Gnoll, croc de Yeenoghu
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le gnoll effectue une attaque de Morsure et deux attaques de Fléau osseux.</p>
      <p><strong><em>Morsure</em></strong>. <em>Corps à corps</em> : +5, allonge 1,50 m. <em>Touché</em> : 6 (1d6 + 3) dégâts perforants plus 7 (2d6) dégâts de poison, et la cible subit l'état Empoisonné jusqu'au début du prochain tour du gnoll.</p>
      <p><strong><em>Fléau osseux</em></strong>. <em>Corps à corps</em> : +5, allonge 3 m. <em>Touché</em> : 7 (1d8 + 3) dégâts perforants.</p>
      <h2>Actions Bonus</h2>
      <p>** <em>Déchaînement (2/jour)</em>**. Immédiatement après avoir infligé des dégâts à une créature déjà En péril, le gnoll se déplace jusqu'à la moitié de sa Vitesse et effectue une attaque de Morsure.</p>
    senses: Vision dans le noir 18 m, Perception passive 10
    languages:
    - abyssal
    - Gnoll
