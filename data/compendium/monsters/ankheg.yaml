translations:
  en:
    name: Ankheg
    subtype: null
    description: '## Traits


      ***Tunneler***. The ankheg can burrow through solid rock at half its Burrow
      Speed and leaves a 10-foot-diameter tunnel in its wake.


      ## Actions


      ***Bite***. *Melee Attack Roll* : +5 (with Advantage if the target is Grappled
      by the ankheg), reach 5 ft. *Hit* : 10 (2d6 + 3) Slashing damage plus 3 (1d6)
      Acid damage. If the target is a Large or smaller creature, it has the Grappled
      condition (escape DC 13).


      ***Acid Spray (Recharge 6)***. *Dexterity Saving Throw* : DC 12, each creature
      in a 30-foot-long, 5-foot-wide Line. *Failure* : 14 (4d6) Acid damage. *Success*
      : Half damage.'
    senses: Darkvision 60 ft., Tremorsense 60 ft., Passive Perception 11
    languages: []
  fr:
    name: Ankheg
    subtype: null
    description: '## Traits


      ***Fouisseur***. L''ankheg peut creuser à travers la roche à concurrence de
      la moitié de sa Vitesse de fouissement en laissant un tunnel de 3 m de diamètre
      dans son sillage.


      ## Actions


      ***Morsure***. *Corps à corps* : +5 (avec Avantage si la cible est agrippée
      par l''ankheg), allonge 1,50 m. *Touché* : 10 (2d6 + 3) dégâts tranchants plus
      3 (1d6) dégâts d''acide. Si la cible est une créature de taille G ou inférieure,
      elle subit l''état Agrippé (évasion DD 13).


      ***Aspersion acide (recharge 6)***. *JdS Dextérité* : DD 12, chaque créature
      dans une Ligne de 9 m de long sur 1,50 m de large. *Échec* : 14 (4d6) dégâts
      d''acide. *Réussite* : demi-dégâts.'
    senses: Vision dans le noir 18 m, perception des vibrations 18 m, Perception passive
      11
    languages: []
