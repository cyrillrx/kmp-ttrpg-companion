translations:
  en:
    name: Young Bronze Dragon
    subtype: Metallic
    description: |-
      <h2>Traits</h2>
      <p>** <em>Amphibious</em>**. The dragon can breathe air and water.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The dragon makes three Rend attacks. It can replace one attack with a use of Repulsion Breath.</p>
      <p><strong><em>Rend</em></strong>. <em>Melee Attack Roll</em> : +8, reach 10 ft. <em>Hit</em> : 16 (2d10 + 5) Slashing damage.</p>
      <p><strong><em>Lightning Breath (Recharge 5–6)</em></strong>. <em>Dexterity Saving Throw</em> : DC 15, each creature in a 60-foot-long, 5-foot-wide Line. <em>Failure</em> : 49 (9d10) Lightning damage. <em>Success</em> : Half damage.</p>
      <p><strong><em>Repulsion Breath</em></strong>. <em>Strength Saving Throw</em> : DC 15, each creature in a 30-foot Cone. <em>Failure</em> : The target is pushed up to 40 feet straight away from the dragon and has the Prone condition.</p>
    senses: Blindsight 30 ft., Darkvision 120 ft., Passive Perception 17
    languages:
    - Common
    - Draconic
  fr:
    name: Dragon de bronze, jeune
    subtype: Métallique
    description: |-
      <h2>Traits</h2>
      <p>** <em>Amphibie</em>**. Le dragon peut respirer sous l'eau comme à l'air libre.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le dragon effectue trois attaques de Saignée. Il peut remplacer l'une de ces attaques par une utilisation de Souffle répulsif.</p>
      <p><strong><em>Saignée</em></strong>. <em>Corps à corps</em> : +8, allonge 3 m. <em>Touché</em> : 16 (2d10 + 5) dégâts tranchants.</p>
      <p><strong><em>Souffle de foudre (recharge 5–6)</em></strong>. <em>JdS Dextérité</em> : DD 15, chaque créature dans une Ligne de 18 m de long sur 1,50 m de large. <em>Échec</em> : 49 (9d10) dégâts de foudre. <em>Réussite</em> : demi-dégâts.</p>
      <p><strong><em>Souffle répulsif</em></strong>. <em>JdS Force</em> : DD 15, chaque créature dans un Cône de 9 m. <em>Échec</em> : la cible est repoussée du dragon sur 12 m en ligne droite et subit l'état À terre.</p>
    senses: Vision aveugle 9 m, Vision dans le noir 36 m, Perception passive 17
    languages:
    - commun
    - draconique
