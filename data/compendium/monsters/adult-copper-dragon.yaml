translations:
  en:
    name: Adult Copper Dragon
    subtype: Metallic
    description: |-
      <h2>Traits</h2>
      <p>** <em>Legendary Resistance (3/Day, or 4/Day in Lair)</em>**. If the dragon fails a saving throw, it can choose to succeed instead.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The dragon makes three Rend attacks. It can replace one attack with a use of (A) Slowing Breath or (B) Spellcasting to cast <em><a href="https://www.aidedd.org/spell/mind-spike">Mind Spike</a></em> (level 4 version).</p>
      <p><strong><em>Rend</em></strong>. <em>Melee Attack Roll</em> : +11, reach 10 ft. <em>Hit</em> : 17 (2d10 + 6) Slashing damage plus 4 (1d8) Acid damage.</p>
      <p><strong><em>Acid Breath (Recharge 5–6)</em></strong>. <em>Dexterity Saving Throw</em> : DC 18, each creature in an 60-foot-long, 5-foot-wide Line. <em>Failure</em> : 54 (12d8) Acid damage. <em>Success</em> : Half damage.</p>
      <p><strong><em>Slowing Breath</em></strong>. <em>Constitution Saving Throw</em> : DC 18, each creature in a 60-foot Cone. <em>Failure</em> : The target can't take Reactions; its Speed is halved; and it can take either an action or a Bonus Action on its turn, not both. This effect lasts until the end of its next turn.</p>
      <p><strong><em>Spellcasting</em></strong>. The dragon casts one of the following spells, requiring no Material components and using Charisma as the spellcasting ability (spell save DC 17):</p>
      <p>At Will: <em><a href="https://www.aidedd.org/spell/detect-magic">Detect Magic</a>, <a href="https://www.aidedd.org/spell/mind-spike">Mind Spike</a></em> (level 4 version), <em><a href="https://www.aidedd.org/spell/minor-illusion">Minor Illusion</a>, <a href="https://www.aidedd.org/spell/shapechange">Shapechange</a></em> (Beast or Humanoid form only, no Temporary Hit Points gained from the spell, and no Concentration or Temporary Hit Points required to maintain the spell)<br />
      1/Day Each: <em><a href="https://www.aidedd.org/spell/greater-restoration">Greater Restoration</a>, <a href="https://www.aidedd.org/spell/major-image">Major Image</a></em>  </p>
      <h2>Legendary actions</h2>
      <p>Legendary Action Uses: 3 (4 in Lair). Immediately after another creature's turn, the dragon can expend a use to take one of the following actions. The dragon regains all expended uses at the start of each of its turns. </p>
      <p><strong><em>Giggling Magic</em></strong>. <em>Charisma Saving Throw</em> : DC 17, one creature the dragon can see within 90 feet. <em>Failure</em> : 24 (7d6) Psychic damage. Until the end of its next turn, the target rolls 1d6 whenever it makes an ability check or attack roll and subtracts the number rolled from the D20 Test. <em>Failure or Success</em> : The dragon can't take this action again until the start of its next turn.</p>
      <p><strong><em>Mind Jolt</em></strong>. The dragon uses Spellcasting to cast <em><a href="https://www.aidedd.org/spell/mind-spike">Mind Spike</a></em> (level 4 version). The dragon can't take this action again until the start of its next turn.</p>
      <p><strong><em>Pounce</em></strong>. The dragon moves up to half its Speed, and it makes one Rend attack.</p>
    senses: Blindsight 60 ft., Darkvision 120 ft., Passive Perception 22
    languages:
    - Common
    - Draconic
  fr:
    name: Dragon de cuivre, adulte
    subtype: Métallique
    description: |-
      <h2>Traits</h2>
      <p>** <em>Résistance légendaire (3/jour, ou 4/jour dans son antre)</em>**. Si le dragon rate un jet de sauvegarde, il peut décider de le réussir tout de même.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le dragon effectue trois attaques de Saignée. Il peut remplacer l'une de ces attaques par une utilisation de (A) Incantation pour lancer <em>épine mentale</em> (au niveau 4) ou (B) Souffle ralentissant.</p>
      <p><strong><em>Saignée</em></strong>. <em>Corps à corps</em> : +11, allonge 3 m. <em>Touché</em> : 17 (2d10 + 6) dégâts tranchants plus 4 (1d8) dégâts d'acide.</p>
      <p><strong><em>Incantation</em></strong>. Le dragon lance l'un des sorts suivants sans composantes matérielles, le Charisme étant sa caractéristique d'incantation (DD de sauvegarde 17) :</p>
      <p>À volonté : <em><a href="https://www.aidedd.org/spell/fr/changement-de-forme">changement de forme</a></em> (Bête ou Humanoïde uniquement, le sort ne fait pas gagner de points de vie temporaires, ni Concentration ni points de vie temporaires nécessaires pour maintenir le sort), <em><a href="https://www.aidedd.org/spell/fr/detection-de-la-magie">détection de la magie</a>, épine mentale</em> (au niveau 4), <em><a href="https://www.aidedd.org/spell/fr/illusion-mineure">illusion mineure</a></em><br />
      1/jour chacun : <em><a href="https://www.aidedd.org/spell/fr/image-majeure">image majeure</a>, <a href="https://www.aidedd.org/spell/fr/restauration-supreme">restauration suprême</a></em>  </p>
      <p>** <em>Souffle d'acide (recharge 5–6)</em>**. <em>JdS Dextérité</em> : DD 18, chaque créature dans une Ligne de 18 m de long sur 1,50 m de large. <em>Échec</em> : 54 (12d8) dégâts d'acide. <em>Réussite</em> : demi-dégâts.</p>
      <p><strong><em>Souffle ralentissant</em></strong>. <em>JdS Constitution</em> : DD 18, chaque créature dans un Cône de 18 m. <em>Échec</em> : la cible voit sa Vitesse réduite de moitié, ne peut pas jouer de Réaction et peut entreprendre une action ou une action Bonus à son tour, mais pas les deux. L'effet persiste jusqu'à la fin de son tour suivant.</p>
      <h2>Actions Légendaires</h2>
      <p>Utilisations d'action Légendaire : 3 (4 dans son antre). Aussitôt après le tour d'une autre créature, le dragon peut dépenser une utilisation pour entreprendre l'une des actions ci-après. Le dragon récupère toutes ses utilisations dépensées au début de chacun de ses tours. </p>
      <p><strong><em>Assaut incisif</em></strong>. Le dragon se déplace à concurrence de la moitié de sa Vitesse et effectue une attaque de Saignée.</p>
      <p><strong><em>Décharge mentale</em></strong>. Le dragon recourt à Incantation pour lancer <em>épine mentale</em> (au niveau 4). Le dragon ne peut alors plus entreprendre cette action jusqu'au début de son tour suivant.</p>
      <p><strong><em>Gloussement magique</em></strong>. <em>JdS Charisme</em> : DD 17, une créature que le dragon voit dans un rayon de 27 m. <em>Échec</em> : 24 (7d6) dégâts psychiques. Jusqu'à la fin de son tour suivant, la cible lance 1d6 chaque fois qu'elle effectue un jet de caractéristique ou un jet d'attaque et soustrait le résultat obtenu au jet de d20. <em>Échec ou réussite</em> : Le dragon ne peut alors plus entreprendre cette action jusqu'au début de son tour suivant.</p>
    senses: Vision aveugle 18 m, Vision dans le noir 36 m, Perception passive 22
    languages:
    - commun
    - draconique
