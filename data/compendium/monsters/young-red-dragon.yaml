translations:
  en:
    name: Young Red Dragon
    subtype: Chromatic
    description: |-
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The dragon makes three Rend attacks.</p>
      <p><strong><em>Rend</em></strong>. <em>Melee Attack Roll</em> : +10, reach 10 ft. <em>Hit</em> : 13 (2d6 + 6) Slashing damage plus 3 (1d6) Fire damage.</p>
      <p><strong><em>Fire Breath (Recharge 5–6)</em></strong>. <em>Dexterity Saving Throw</em> : DC 17, each creature in a 30-foot Cone. <em>Failure</em> : 56 (16d6) Fire damage. <em>Success</em> : Half damage.</p>
    senses: Blindsight 30 ft., Darkvision 120 ft., Passive Perception 18
    languages:
    - Common
    - Draconic
  fr:
    name: Dragon rouge, jeune
    subtype: Chromatique
    description: |-
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le dragon effectue trois attaques de Saignée.</p>
      <p><strong><em>Saignée</em></strong>. <em>Corps à corps</em> : +10, allonge 3 m. <em>Touché</em> : 13 (2d6 + 6) dégâts tranchants plus 3 (1d6) dégâts de feu.</p>
      <p><strong><em>Souffle de feu (recharge 5–6)</em></strong>. <em>JdS Dextérité</em> : DD 17, chaque créature dans un Cône de 9 m. <em>Échec</em> : 56 (16d6) dégâts de feu. <em>Réussite</em> : demi-dégâts.</p>
    senses: Vision aveugle 9 m, Vision dans le noir 36 m, Perception passive 18
    languages:
    - commun
    - draconique
