translations:
  en:
    name: Young Red Dragon
    subtype: Chromatic
    description: |-
      ## Actions

      ***Multiattack***. The dragon makes three Rend attacks.

      ***Rend***. *Melee Attack Roll* : +10, reach 10 ft. *Hit* : 13 (2d6 + 6) Slashing damage plus 3 (1d6) Fire damage.

      ***Fire Breath (Recharge 5–6)***. *Dexterity Saving Throw* : DC 17, each creature in a 30-foot Cone. *Failure* : 56 (16d6) Fire damage. *Success* : Half damage.
    senses: Blindsight 30 ft., Darkvision 120 ft., Passive Perception 18
    languages:
    - Common
    - Draconic
  fr:
    name: Dragon rouge, jeune
    subtype: Chromatique
    description: |-
      ## Actions

      ***Attaques multiples***. Le dragon effectue trois attaques de Saignée.

      ***Saignée***. *Corps à corps* : +10, allonge 3 m. *Touché* : 13 (2d6 + 6) dégâts tranchants plus 3 (1d6) dégâts de feu.

      ***Souffle de feu (recharge 5–6)***. *JdS Dextérité* : DD 17, chaque créature dans un Cône de 9 m. *Échec* : 56 (16d6) dégâts de feu. *Réussite* : demi-dégâts.
    senses: Vision aveugle 9 m, Vision dans le noir 36 m, Perception passive 18
    languages:
    - commun
    - draconique
