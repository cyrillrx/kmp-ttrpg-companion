translations:
  en:
    name: Harpy
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Claw</em>**. <em>Melee Attack Roll</em> : +3, reach 5 ft. <em>Hit</em> : 6 (2d4 + 1) Slashing damage.</p>
      <p><strong><em>Luring Song</em></strong>. The harpy sings a magical melody, which lasts until the harpy's Concentration ends on it. <em>Wisdom Saving Throw</em> : DC 11, each Humanoid and Giant in a 300-foot Emanation originating from the harpy when the song starts. <em>Failure</em> : The target has the Charmed condition until the song ends and repeats the save at the end of each of its turns. While Charmed, the target has the Incapacitated condition and ignores the Luring Song of other harpies. If the target is more than 5 feet from the harpy, the target moves on its turn toward the harpy by the most direct route, trying to get within 5 feet of the harpy. It doesn't avoid Opportunity Attacks; however, before moving into damaging terrain (such as lava or a pit) and whenever it takes damage from a source other than the harpy, the target repeats the save. <em>Success</em> : The target is immune to this harpy's Luring Song for 24 hours.</p>
    senses: Passive Perception 10
    languages:
    - Common
  fr:
    name: Harpie
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Griffe</em>**. <em>Corps à corps</em> : +3, allonge 1,50 m. <em>Touché</em> : 6 (2d4 + 1) dégâts tranchants.</p>
      <p><strong><em>Chant captivant</em></strong>. La harpie chante une mélodie magique qui persiste jusqu'à ce que cesse la Concentration de la harpie. <em>JdS Sagesse</em> : DD 11, chaque Humanoïde et Géant dans une Émanation de 90 m centrée sur la harpie quand le chant débute. <em>Échec</em> : la cible subit l'état Charmé jusqu'à ce que le chant cesse et réitère le JdS à la fin de chacun de ses tours. Tant qu'elle est ainsi Charmée, la cible subit l'état Incapable d'agir et ignore le Chant captivant des autres harpies. Si la cible se trouve à plus de 1,50 m de la harpie, elle doit à son tour consacrer son déplacement pour se rapprocher du monstre par le chemin le plus direct, jusqu'à terminer dans un rayon de 1,50 m de lui. La cible ne cherche pas à éviter les attaques d'Opportunité, mais si elle doit traverser un terrain dangereux (comme une fosse de lave), elle peut réitérer le JdS, même chose chaque fois qu'elle subit des dégâts d'une source autre que la harpie. <em>Réussite</em> : la cible est immunisée contre le Chant captivant de cette harpie pendant 24 heures.</p>
    senses: Perception passive 10
    languages:
    - commun
