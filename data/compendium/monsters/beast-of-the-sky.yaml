translations:
  en:
    name: Beast of the Sky
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Flyby</em>**. The beast doesn't provoke Opportunity Attacks when it flies out of an enemy's reach.</p>
      <p><strong><em>Primal Bond</em></strong>. Add your Proficiency Bonus to any ability check or saving throw the beast makes.</p>
      <h2>Actions</h2>
      <p>** <em>Beast's Strike</em>**. <em>Melee Attack Roll</em> : Bonus equals your spell attack modifier, reach 5 ft. <em>Hit</em> : 1d4 + 3 plus your Wisdom modifier Slashing damage.</p>
    senses: Darkvision 60 ft., Passive Perception 12
    languages:
    - Understands the languages you know
  fr:
    name: Bête des cieux
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Repli aérien</em>**. La bête ne provoque pas d'attaque d'Opportunité lorsqu'elle quitte l'allonge d'un ennemi en volant.</p>
      <p><strong><em>Lien primordial</em></strong>. Ajoutez votre bonus de maîtrise à tout jet de caractéristique ou de sauvegarde effectué par la bête.</p>
      <h2>Actions</h2>
      <p>** <em>Frappe de la Bête</em>**. <em>Corps à corps</em> : bonus égal à votre modificateur d'attaque des sorts, allonge 1,50 m. <em>Touché</em> : 1d4 + 3 + votre modificateur de Sagesse dégâts tranchants.</p>
    senses: Vision dans le noir 18 m, Perception passive 12
    languages:
    - comprend les langues que vous parlez
