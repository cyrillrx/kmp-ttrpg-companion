translations:
  en:
    name: Werewolf
    subtype: Lycanthrope
    description: |-
      <h2>Traits</h2>
      <p>** <em>Pack Tactics</em>**. The werewolf has Advantage on an attack roll against a creature if at least one of the werewolf's allies is within 5 feet of the creature and the ally doesn't have the Incapacitated condition.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The werewolf makes two attacks, using Scratch or Longbow in any combination. It can replace one attack with a Bite attack.</p>
      <p><strong><em>Bite (Wolf or Hybrid Form Only)</em></strong>. <em>Melee Attack Roll</em> : +5, reach 5 ft. <em>Hit</em> : 12 (2d8 + 3) Piercing damage. If the target is a Humanoid, it is subjected to the following effect. <em>Constitution Saving Throw</em> : DC 12. <em>Failure</em> : The target is cursed. If the cursed target drops to 0 Hit Points, it instead becomes a <strong>Werewolf</strong> under the DM's control and has 10 Hit Points. <em>Success</em> : The target is immune to this werewolf's curse for 24 hours.</p>
      <p><strong><em>Scratch</em></strong>. <em>Melee Attack Roll</em> : +5, reach 5 ft. <em>Hit</em> : 10 (2d6 + 3) Slashing damage.</p>
      <p><strong><em>Longbow (Humanoid or Hybrid Form Only)</em></strong>. <em>Ranged Attack Roll</em> : +4, range 150/600 ft. <em>Hit</em> : 11 (2d8 + 2) Piercing damage.</p>
      <h2>Bonus actions</h2>
      <p>** <em>Shape-Shift</em>**. The werewolf shape-shifts into a Large wolf-humanoid hybrid or a Medium wolf, or it returns to its true humanoid form. Its game statistics, other than its size, are the same in each form. Any equipment it is wearing or carrying isn't transformed.</p>
    senses: Darkvision 60 ft., Passive Perception 14
    languages:
    - Common (can't speak in wolf form)
  fr:
    name: Loup-garou
    subtype: Lycanthrope
    description: |-
      <h2>Traits</h2>
      <p>** <em>Tactique de meute</em>**. Quand au moins un de ses alliés non Incapable d'agir se situe dans un rayon de 1,50 m de la créature qu'il cible, le loup-garou a un Avantage au jet d'attaque correspondant.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le loup-garou effectue deux attaques, réparties à sa guise entre Éraflure et Arc long. Il peut en remplacer une par une attaque de Morsure.</p>
      <p><strong><em>Éraflure</em></strong>. <em>Corps à corps</em> : +5, allonge 1,50 m. <em>Touché</em> : 10 (2d6 + 3) dégâts tranchants.</p>
      <p><strong><em>Morsure (forme de loup ou hybride uniquement)</em></strong>. <em>Corps à corps</em> : +5, allonge 1,50 m. <em>Touché</em> : 12 (2d8 + 3) dégâts perforants. Si la cible est un Humanoïde, elle est soumise à l'effet suivant. <em>JdS Constitution</em> : DD 12. <em>Échec</em> : la cible est maudite. Si la cible maudite tombe à 0 point de vie, elle se retrouve en fait à 10 pv et devient un <strong>loup-garou</strong> sous le contrôle du MD. <em>Réussite</em> : La cible est immunisée contre la malédiction de ce loup-garou pendant 24 heures.</p>
      <p><strong><em>Arc long (forme humanoïde ou hybride uniquement)</em></strong>. <em>À distance</em> : +4, portée 45/180 m. <em>Touché</em> : 11 (2d8 + 2) dégâts perforants.</p>
      <h2>Actions Bonus</h2>
      <p>** <em>Changement d'aspect</em>**. Le loup-garou se transforme en hybride loup-humanoïde de taille G ou en loup de taille M, ou bien retrouve sa forme véritable d'humanoïde. En dehors de sa catégorie de taille, son profil reste le même, quelle que soit la forme. Rien de ce qu'il porte n'est transformé.</p>
    senses: Vision dans le noir 18 m, Perception passive 14
    languages:
    - commun (ne parle pas sous forme de loup)
