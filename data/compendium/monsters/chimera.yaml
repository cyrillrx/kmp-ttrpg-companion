translations:
  en:
    name: Chimera
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The chimera makes one Ram attack, one Bite attack, and one Claw attack. It can replace the Claw attack with a use of Fire Breath if available.</p>
      <p><strong><em>Bite</em></strong>. <em>Melee Attack Roll</em> : +7, reach 5 ft. <em>Hit</em> : 11 (2d6 + 4) Piercing damage, or 18 (4d6 + 4) Piercing damage if the chimera had Advantage on the attack roll.</p>
      <p><strong><em>Claw</em></strong>. <em>Melee Attack Roll</em> : +7, reach 5 ft. <em>Hit</em> : 7 (1d6 + 4) Slashing damage.</p>
      <p><strong><em>Ram</em></strong>. <em>Melee Attack Roll</em> : +7, reach 5 ft. <em>Hit</em> : 10 (1d12 + 4) Bludgeoning damage. If the target is a Medium or smaller creature, it has the Prone condition.</p>
      <p><strong><em>Fire Breath (Recharge 5–6)</em></strong>. <em>Dexterity Saving Throw</em> : DC 15, each creature in a 15-foot Cone. <em>Failure</em> : 31 (7d8) Fire damage. <em>Success</em> : Half damage.</p>
    senses: Darkvision 60 ft., Passive Perception 18
    languages:
    - Understands Draconic but can't speak
  fr:
    name: Chimère
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. La chimère effectue trois attaques : une de Coup de bélier, une de Griffe et une de Morsure. Elle peut remplacer l'attaque de Griffe par une utilisation de son Souffle de feu si disponible.</p>
      <p><strong><em>Coup de bélier</em></strong>. <em>Corps à corps</em> : +7, allonge 1,50 m. <em>Touché</em> : 10 (1d12 + 4) dégâts contondants. Si la cible est une créature de taille M ou inférieure, elle subit l'état À terre.</p>
      <p><strong><em>Griffe</em></strong>. <em>Corps à corps</em> : +7, allonge 1,50 m. <em>Touché</em> : 7 (1d6 + 4) dégâts tranchants.</p>
      <p><strong><em>Morsure</em></strong>. <em>Corps à corps</em> : +7, allonge 1,50 m. <em>Touché</em> : 11 (2d6 + 4) dégâts perforants, ou 18 (4d6 + 4) dégâts perforants si la chimère avait un Avantage au jet d'attaque.</p>
      <p><strong><em>Souffle de feu (recharge 5–6)</em></strong>. <em>JdS Dextérité</em> : DD 15, chaque créature dans un Cône de 4,50 m. <em>Échec</em> : 31 (7d8) dégâts de feu. <em>Réussite</em> : demi-dégâts.</p>
    senses: Vision dans le noir 18 m, Perception passive 18
    languages:
    - comprend le draconique mais ne parle pas
