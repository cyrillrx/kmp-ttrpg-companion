translations:
  en:
    name: Chimera
    subtype: null
    description: |-
      ## Actions

      ***Multiattack***. The chimera makes one Ram attack, one Bite attack, and one Claw attack. It can replace the Claw attack with a use of Fire Breath if available.

      ***Bite***. *Melee Attack Roll* : +7, reach 5 ft. *Hit* : 11 (2d6 + 4) Piercing damage, or 18 (4d6 + 4) Piercing damage if the chimera had Advantage on the attack roll.

      ***Claw***. *Melee Attack Roll* : +7, reach 5 ft. *Hit* : 7 (1d6 + 4) Slashing damage.

      ***Ram***. *Melee Attack Roll* : +7, reach 5 ft. *Hit* : 10 (1d12 + 4) Bludgeoning damage. If the target is a Medium or smaller creature, it has the Prone condition.

      ***Fire Breath (Recharge 5–6)***. *Dexterity Saving Throw* : DC 15, each creature in a 15-foot Cone. *Failure* : 31 (7d8) Fire damage. *Success* : Half damage.
    senses: Darkvision 60 ft., Passive Perception 18
    languages:
    - Understands Draconic but can't speak
  fr:
    name: Chimère
    subtype: null
    description: |-
      ## Actions

      ***Attaques multiples***. La chimère effectue trois attaques : une de Coup de bélier, une de Griffe et une de Morsure. Elle peut remplacer l'attaque de Griffe par une utilisation de son Souffle de feu si disponible.

      ***Coup de bélier***. *Corps à corps* : +7, allonge 1,50 m. *Touché* : 10 (1d12 + 4) dégâts contondants. Si la cible est une créature de taille M ou inférieure, elle subit l'état À terre.

      ***Griffe***. *Corps à corps* : +7, allonge 1,50 m. *Touché* : 7 (1d6 + 4) dégâts tranchants.

      ***Morsure***. *Corps à corps* : +7, allonge 1,50 m. *Touché* : 11 (2d6 + 4) dégâts perforants, ou 18 (4d6 + 4) dégâts perforants si la chimère avait un Avantage au jet d'attaque.

      ***Souffle de feu (recharge 5–6)***. *JdS Dextérité* : DD 15, chaque créature dans un Cône de 4,50 m. *Échec* : 31 (7d8) dégâts de feu. *Réussite* : demi-dégâts.
    senses: Vision dans le noir 18 m, Perception passive 18
    languages:
    - comprend le draconique mais ne parle pas
