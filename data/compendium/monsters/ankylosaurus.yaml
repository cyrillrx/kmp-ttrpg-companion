    name: Ankylosaure
    subtype: Dinosaure
    description: |-
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. L'ankylosaure effectue deux attaques de Queue.</p>
      <p><strong><em>Queue</em></strong>. <em>Corps à corps</em> : +6, allonge 3 m. <em>Touché</em> : 9 (1d10 + 4) dégâts contondants. Si la cible est une créature de taille TG ou inférieure, elle subit l'état À terre.</p>
    senses: Perception passive 11
    languages:
    - aucune
