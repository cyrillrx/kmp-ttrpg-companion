  en:
    name: Ankylosaurus
    subtype: Dinosaur
    description: |-
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The ankylosaurus makes two Tail attacks.</p>
      <p><strong><em>Tail</em></strong>. <em>Melee Attack Roll</em> : +6, reach 10 ft. <em>Hit</em> : 9 (1d10 + 4) Bludgeoning damage. If the target is a Huge or smaller creature, it has the Prone condition.</p>
    senses: Passive Perception 11
    languages:
    - None
