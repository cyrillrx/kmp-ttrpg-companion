translations:
  en:
    name: Doppelganger
    subtype: null
    description: |-
      ## Actions

      ***Multiattack***. The doppelganger makes two Slam attacks and uses Unsettling Visage if available.

      ***Slam***. *Melee Attack Roll* : +6 (with Advantage during the first round of each combat), reach 5 ft. *Hit* : 11 (2d6 + 4) Bludgeoning damage.

      ***Read Thoughts***. The doppelganger casts *[Detect Thoughts](https://www.aidedd.org/spell/detect-thoughts)* , requiring no spell components and using Charisma as the spellcasting ability (spell save DC 12).

      ***Unsettling Visage (Recharge 6)***. *Wisdom Saving Throw* : DC 12, each creature in a 15-foot Emanation originating from the doppelganger that can see the doppelganger. *Failure* : The target has the Frightened condition and repeats the save at the end of each of its turns, ending the effect on itself on a success. After 1 minute, it succeeds automatically.

      ## Bonus actions

      ***Shape-Shift***. The doppelganger shape-shifts into a Medium or Small Humanoid, or it returns to its true form. Its game statistics, other than its size, are the same in each form. Any equipment it is wearing or carrying isn't transformed.
    senses: Darkvision 60 ft., Passive Perception 11
    languages:
    - Common plus three other languages
  fr:
    name: Doppelganger
    subtype: null
    description: |-
      ## Actions

      ***Attaques multiples***. Le doppelganger effectue deux attaques de Coup et recourt à Visage déstabilisant si disponible.

      ***Coup***. *Corps à corps* : +6 (avec Avantage au premier round de chaque combat), allonge 1,50 m. *Touché* : 11 (2d6 + 4) dégâts contondants.

      ***Lecture des pensées***. Le doppelganger lance *[détection des pensées](https://www.aidedd.org/spell/fr/detection-des-pensees)* sans composantes de sort, le Charisme étant sa caractéristique d'incantation (DD de sauvegarde 12).

      ***Visage déstabilisant (recharge 6)***. *JdS Sagesse* : DD 12, chaque créature dans une Émanation de 4,50 m centrée sur le doppelganger et qui voit celui-ci. *Échec* : la cible subit l'état Effrayé et réitère le JdS à la fin de chacun de ses tours ; elle met un terme à l'effet sur elle-même en cas de réussite. Au bout de 1 minute, elle réussit automatiquement ce JdS.

      ## Actions Bonus

      ***Changement d'aspect***. Le doppelganger se transforme en Humanoïde de taille M ou P, ou bien reprend sa forme véritable. En dehors de sa catégorie de taille, son profil reste le même, quelle que soit la forme. Rien de ce qu'il porte n'est transformé.
    senses: Vision dans le noir 18 m, Perception passive 11
    languages:
    - commun plus trois autres langues
