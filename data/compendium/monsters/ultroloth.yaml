translations:
  en:
    name: Ultroloth
    subtype: Yugoloth
    description: |-
      <h2>Traits</h2>
      <p>** <em>Fiendish Restoration</em>**. If the ultroloth dies outside Gehenna, its body dissolves into ichor, and it gains a new body instantly, reviving with all its Hit Points somewhere in Gehenna.</p>
      <p><strong><em>Magic Resistance</em></strong>. The ultroloth has Advantage on saving throws against spells and other magical effects.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The ultroloth uses Hypnotic Gaze and makes two Mercurial Whip attacks.</p>
      <p><strong><em>Mercurial Whip</em></strong>. <em>Melee Attack Roll</em> : +9, reach 15 ft. <em>Hit</em> : 25 (6d6 + 4) Force damage, and the ultroloth can teleport the target up to 10 feet to an unoccupied space the ultroloth can see that isn't in the air.</p>
      <p><strong><em>Hypnotic Gaze</em></strong>. <em>Wisdom Saving Throw</em> : DC 17, each creature in a 30-foot Cone. <em>Failure</em> : 10 (3d6) Psychic damage, and the target has the Stunned condition until the start of the ultroloth's next turn. <em>Success</em> : The target is immune to this ultroloth's Hypnotic Gaze for 24 hours.</p>
      <p><strong><em>Spellcasting</em></strong>. The ultroloth casts one of the following spells, requiring no Material components and using Intelligence as the spellcasting ability (spell save DC 17):</p>
      <p>At will: <em><a href="https://www.aidedd.org/spell/alter-self">Alter Self</a>, <a href="https://www.aidedd.org/spell/clairvoyance">Clairvoyance</a>, <a href="https://www.aidedd.org/spell/detect-magic">Detect Magic</a></em><br />
      1/day each: <em><a href="https://www.aidedd.org/spell/dimension-door">Dimension Door</a>, <a href="https://www.aidedd.org/spell/fireball">Fireball</a></em> (level 5 version), <em><a href="https://www.aidedd.org/spell/wall-of-fire">Wall of Fire</a></em>  </p>
      <h2>Bonus actions</h2>
      <p>** <em>Fiendish Guile (Recharge 4–6)</em>**. The ultroloth casts <em><a href="https://www.aidedd.org/spell/dispel-magic">Dispel Magic</a>, <a href="https://www.aidedd.org/spell/invisibility">Invisibility</a></em> (self only), <em><a href="https://www.aidedd.org/spell/misty-step">Misty Step</a></em> , or <em><a href="https://www.aidedd.org/spell/suggestion">Suggestion</a></em> , requiring no Material components and using the same spellcasting ability as Spellcasting.</p>
    senses: Truesight 120 ft., Passive Perception 17
    languages:
    - Abyssal
    - Infernal; telepathy 120 ft.
  fr:
    name: Ultroloth
    subtype: Yugoloth
    description: |-
      <h2>Traits</h2>
      <p>** <em>Restauration fiélonne</em>**. Si l'ultroloth meurt hors de Géhenne, son corps se dissout en ichor et il en acquiert aussitôt un nouveau et revient à la vie avec tous ses pv, quelque part dans Géhenne.</p>
      <p><strong><em>Résistance à la magie</em></strong>. L'ultroloth a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. L'ultroloth utilise Regard hypnotisant et effectue deux attaques de Fouet labile.</p>
      <p><strong><em>Fouet labile</em></strong>. <em>Corps à corps</em> : +9, allonge 4,50 m. <em>Touché</em> : 25 (6d6 + 4) dégâts de force, et l'ultroloth peut téléporter la cible jusqu'à 3 m dans un espace inoccupé qu'il peut voir et qui n'est pas dans les airs.</p>
      <p><strong><em>Regard hypnotisant</em></strong>. <em>JdS Sagesse</em> : DD 17, chaque créature dans un Cône de 9 m. <em>Échec</em> : 10 (3d6) dégâts psychiques, et la cible subit l'état Étourdie jusqu'au début du prochain tour de l'ultroloth. <em>Réussite</em> : la cible est immunisée contre le Regard hypnotisant de cet ultroloth pendant 24 heures.</p>
      <p><strong><em>Incantation</em></strong>. L'ultroloth lance l'un des sorts suivants sans composantes matérielles, l'Intelligence étant sa caractéristique d'incantation (DD de sauvegarde 17) :</p>
      <p>À volonté : <em><a href="https://www.aidedd.org/spell/fr/modification-d-apparence">modification d'apparence</a>, <a href="https://www.aidedd.org/spell/fr/clairvoyance">clairvoyance</a>, <a href="https://www.aidedd.org/spell/fr/detection-de-la-magie&quot;">détection de la magie</a></em><br />
      1/jour chacun : <em><a href="https://www.aidedd.org/spell/fr/porte-dimensionnelle">porte dimensionnelle</a>, <a href="https://www.aidedd.org/spell/fr/boule-de-feu">boule de feu</a></em> (au niveau 5), <em><a href="https://www.aidedd.org/spell/fr/mur-de-feu">mur de feu</a></em>  </p>
      <h2>Actions Bonus</h2>
      <p>** <em>Ruse fiélonne (recharge 4–6)</em>**. L'ultroloth lance <em><a href="https://www.aidedd.org/spell/fr/dissipation-de-la-magie">dissipation de la magie</a>, <a href="https://www.aidedd.org/spell/fr/invisibilite">invisibilité</a></em> (soi-même uniquement), <em><a href="https://www.aidedd.org/spell/fr/foulee-brumeuse&quot;">foulée brumeuse</a></em> , ou <em><a href="https://www.aidedd.org/spell/fr/suggestion">suggestion</a></em> , sans composantes matérielles et avec la même caractéristique d'incantation que pour Incantation.</p>
    senses: vision véritable 36 m, Perception passive 17
    languages:
    - abyssal
    - infernal ; télépathie 36 m
