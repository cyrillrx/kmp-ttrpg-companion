  en:
    name: Giant Lizard
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Spider Climb</em>**. The lizard can climb difficult surfaces, including along ceilings, without needing to make an ability check.</p>
      <h2>Actions</h2>
      <p>** <em>Bite</em>**. <em>Melee Attack Roll</em> : +4, reach 5 ft. <em>Hit</em> : 6 (1d8 + 2) Piercing damage.</p>
    senses: Darkvision 60 ft., Passive Perception 10
    languages:
    - None
  fr:
    name: Lézard géant
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Pattes d'araignée</em>**. Le lézard peut parcourir les parois les plus difficiles à escalader, y compris les plafonds, sans passer par un jet de caractéristique.</p>
      <h2>Actions</h2>
      <p>** <em>Morsure</em>**. <em>Corps à corps</em> : +4, allonge 1,50 m. <em>Touché</em> : 6 (1d8 + 2) dégâts perforants.</p>
    senses: Vision dans le noir 18 m, Perception passive 10
    languages:
    - aucune
