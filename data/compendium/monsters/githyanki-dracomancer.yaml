translations:
  en:
    name: Githyanki Dracomancer
    subtype: Gith
    description: '## Actions


      ***Multiattack***. The githyanki makes three Draconic Strike attacks.


      ***Draconic Strike***. *Melee or Ranged Attack Roll* : +10, reach 10 ft. or
      range 120 ft. *Hit* : 12 (2d6 + 5) Slashing damage plus 17 (5d6) Fire damage,
      and the target has the Frightened condition until the start of the githyanki''s
      next turn.


      ***Conjured Dragon''s Breath (Recharge 5–6)***. *Dexterity Saving Throw* : DC
      18, each creature in a 90-foot Cone. *Failure* : 27 (6d8) Fire damage plus 27
      (6d8) Force damage. *Success* : Half damage.


      ***Spellcasting***. The githyanki casts one of the following spells, requiring
      no spell components and using Intelligence as the spellcasting ability (spell
      save DC 18, +10 to hit with spell attacks):


      At will: *[Mage Hand](https://www.aidedd.org/spell/mage-hand)* (the hand is
      Invisible)


      2/day each: *[Nondetection](https://www.aidedd.org/spell/nondetection)* (self
      only), *[Plane Shift](https://www.aidedd.org/spell/plane-shift), [Tongues](https://www.aidedd.org/spell/tongues)*


      ## Bonus actions


      ***Misty Step (3/Day)***. The githyanki casts *[Misty Step](https://www.aidedd.org/spell/misty-step)*
      , requiring no spell components and using the same spellcasting ability as Spellcasting.'
    senses: Blindsight 30 ft., Passive Perception 18
    languages:
    - Common
    - Draconic
    - Gith
