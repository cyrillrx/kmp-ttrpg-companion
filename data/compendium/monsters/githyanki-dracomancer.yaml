translations:
  en:
    name: Githyanki Dracomancer
    subtype: Gith
    description: |-
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The githyanki makes three Draconic Strike attacks.</p>
      <p><strong><em>Draconic Strike</em></strong>. <em>Melee or Ranged Attack Roll</em> : +10, reach 10 ft. or range 120 ft. <em>Hit</em> : 12 (2d6 + 5) Slashing damage plus 17 (5d6) Fire damage, and the target has the Frightened condition until the start of the githyanki's next turn.</p>
      <p><strong><em>Conjured Dragon's Breath (Recharge 5–6)</em></strong>. <em>Dexterity Saving Throw</em> : DC 18, each creature in a 90-foot Cone. <em>Failure</em> : 27 (6d8) Fire damage plus 27 (6d8) Force damage. <em>Success</em> : Half damage.</p>
      <p><strong><em>Spellcasting</em></strong>. The githyanki casts one of the following spells, requiring no spell components and using Intelligence as the spellcasting ability (spell save DC 18, +10 to hit with spell attacks):</p>
      <p>At will: <em><a href="https://www.aidedd.org/spell/mage-hand">Mage Hand</a></em> (the hand is Invisible)<br />
      2/day each: <em><a href="https://www.aidedd.org/spell/nondetection">Nondetection</a></em> (self only), <em><a href="https://www.aidedd.org/spell/plane-shift">Plane Shift</a>, <a href="https://www.aidedd.org/spell/tongues">Tongues</a></em>  </p>
      <h2>Bonus actions</h2>
      <p>** <em>Misty Step (3/Day)</em>**. The githyanki casts <em><a href="https://www.aidedd.org/spell/misty-step">Misty Step</a></em> , requiring no spell components and using the same spellcasting ability as Spellcasting.</p>
    senses: Blindsight 30 ft., Passive Perception 18
    languages:
    - Common
    - Draconic
    - Gith
