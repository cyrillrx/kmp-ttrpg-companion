translations:
  en:
    name: Green Slaad
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Magic Resistance</em>**. The slaad has Advantage on saving throws against spells and other magical effects.</p>
      <p><strong><em>Regeneration</em></strong>. The slaad regains 10 Hit Points at the start of each of its turns if it has at least 1 Hit Point.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The slaad makes three Chaos Staff attacks.</p>
      <p><strong><em>Chaos Staff</em></strong>. <em>Melee or Ranged Attack Roll</em> : +7, reach 10 ft. or range 60 ft. <em>Hit</em> : 8 (1d8 + 4) Force damage. Until the start of the slaad's next turn, the target has a condition determined by rolling 1d4: on a <strong>1</strong> , Charmed; on a <strong>2</strong> , Frightened; on a <strong>3</strong> , Poisoned; or on a <strong>4</strong> , Incapacitated.</p>
      <p><strong><em>Spellcasting</em></strong>. The slaad casts one of the following spells, requiring no Material components and using Charisma as the spellcasting ability (spell save DC 14, +6 to hit with spell attacks):</p>
      <p>At will: <em><a href="https://www.aidedd.org/spell/detect-magic">Detect Magic</a>, <a href="https://www.aidedd.org/spell/detect-thoughts">Detect Thoughts</a>, <a href="https://www.aidedd.org/spell/mage-hand">Mage Hand</a></em><br />
      1/day each: <em><a href="https://www.aidedd.org/spell/fireball">Fireball</a>, <a href="https://www.aidedd.org/spell/invisibility">Invisibility</a></em> (self only)  </p>
      <h2>Bonus actions</h2>
      <p>** <em>Shape-Shift</em>**. The slaad shape-shifts into a Small or Medium Humanoid, or it returns to its true form. Other than its size, its game statistics are the same in each form. Any equipment it is wearing or carrying isn't transformed.</p>
    senses: Blindsight 30 ft., Darkvision 60 ft., Passive Perception 12
    languages:
    - Common
    - Slaad; telepathy 60 ft.
  fr:
    name: Slaad vert
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Résistance à la magie</em>**. Le slaad a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.</p>
      <p><strong><em>Régénération</em></strong>. Le slaad récupère 10 points de vie au début de chacun de ses tours s'il lui reste au moins 1 point de vie.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le slaad effectue trois attaques de Bâton du chaos.</p>
      <p><strong><em>Bâton du chaos</em></strong>. <em>Corps à corps ou à distance</em> : +7, allonge 3 m ou portée 18 m. <em>Touché</em> : 8 (1d8 + 4) dégâts de force. Jusqu'au début du prochain tour du slaad, la cible subit un état déterminé en lançant 1d4 : <strong>1</strong> , Charmé ; <strong>2</strong> , Effrayé ; <strong>3</strong> , Empoisonné ; <strong>4</strong> , Incapable d'agir.</p>
      <p><strong><em>Incantation</em></strong>. Le slaad lance l'un des sorts suivants sans composantes matérielles, le Charisme étant sa caractéristique d'incantation (DD de sauvegarde 14, +6 à l'attaque) :</p>
      <p>À volonté : <em><a href="https://www.aidedd.org/spell/fr/detection-de-la-magie">détection de la magie</a>, <a href="https://www.aidedd.org/spell/fr/detection-des-pensees">détection des pensées</a>, <a href="https://www.aidedd.org/spell/fr/main-de-mage">main de mage</a></em><br />
      1/jour chacun : <em><a href="https://www.aidedd.org/spell/fr/boule-de-feu">boule de feu</a>, <a href="https://www.aidedd.org/spell/fr/invisibilite">invisibilité</a></em> (soi-même uniquement)  </p>
      <h2>Actions Bonus</h2>
      <p>** <em>Changement d'aspect</em>**. Le slaad se transforme en Humanoïde de taille P ou M, ou bien retrouve sa forme véritable. Hormis sa catégorie de taille, son profil reste le même, quelle que soit sa forme. Rien de ce qu'il porte n'est transformé.</p>
    senses: Vision aveugle 9 m, Vision dans le noir 18 m, Perception passive 12
    languages:
    - commun
    - slaad ; télépathie 18 m
