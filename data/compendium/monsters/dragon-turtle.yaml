translations:
  en:
    name: Dragon Turtle
    subtype: null
    description: |-
      ## Traits

      ***Amphibious***. The dragon can breathe air and water.

      ## Actions

      ***Multiattack***. The dragon makes three Bite attacks. It can replace one attack with a Tail attack.

      ***Bite***. *Melee Attack Roll* : +13, reach 15 ft. *Hit* : 23 (3d10 + 7) Piercing damage plus 7 (2d6) Fire damage. Being underwater doesn't grant Resistance to this Fire damage.

      ***Tail***. *Melee Attack Roll* : +13, reach 15 ft. *Hit* : 18 (2d10 + 7) Bludgeoning damage. If the target is a Huge or smaller creature, it has the Prone condition.

      ***Steam Breath (Recharge 5–6)***. *Constitution Saving Throw* : DC 19, each creature in a 60-foot Cone. *Failure* : 56 (16d6) Fire damage. *Success* : Half damage. *Failure or Success* : Being underwater doesn't grant Resistance to this Fire damage.
    senses: Darkvision 120 ft., Passive Perception 11
    languages:
    - Draconic
    - Primordial (Aquan)
  fr:
    name: Dragon-tortue
    subtype: null
    description: |-
      ## Traits

      ***Amphibie***. Le dragon peut respirer sous l'eau comme à l'air libre.

      ## Actions

      ***Attaques multiples***. Le dragon effectue trois attaques de Morsure. Il peut en remplacer une par une attaque de Queue.

      ***Morsure***. *Corps à corps* : +13, allonge 4,50 m. *Touché* : 23 (3d10 + 7) dégâts perforants plus 7 (2d6) dégâts de feu. Être immergé dans l'eau n'octroie pas la Résistance à ces dégâts de feu.

      ***Queue***. *Corps à corps* : +13, allonge 4,50 m. *Touché* : 18 (2d10 + 7) dégâts contondants. Si la cible est une créature de taille TG ou inférieure, elle subit l'état À terre.

      ***Souffle de vapeur (recharge 5–6)***. *JdS Constitution* : DD 19, chaque créature dans un Cône de 18 m. *Échec* : 56 (16d6) dégâts de feu. *Réussite* : demi-dégâts. *Échec ou réussite* : être immergé dans l'eau n'octroie pas la Résistance à ces dégâts de feu.
    senses: Vision dans le noir 36 m, Perception passive 11
    languages:
    - draconique
    - primordial (aquatique)
