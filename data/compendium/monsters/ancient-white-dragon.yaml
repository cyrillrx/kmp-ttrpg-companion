translations:
  en:
    name: Ancient White Dragon
    subtype: Chromatic
    description: |-
      <h2>Traits</h2>
      <p>** <em>Ice Walk</em>**. The dragon can move across and climb icy surfaces without needing to make an ability check. Additionally, Difficult Terrain composed of ice or snow doesn't cost it extra movement.</p>
      <p><strong><em>Legendary Resistance (4/Day, or 5/Day in Lair)</em></strong>. If the dragon fails a saving throw, it can choose to succeed instead.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The dragon makes three Rend attacks.</p>
      <p><strong><em>Rend</em></strong>. <em>Melee Attack Roll</em> : +14, reach 15 ft. <em>Hit</em> : 17 (2d8 + 8) Slashing damage plus 7 (2d6) Cold damage.</p>
      <p><strong><em>Cold Breath (Recharge 5–6)</em></strong>. <em>Constitution Saving Throw</em> : DC 22, each creature in a 90-foot Cone. <em>Failure</em> : 63 (14d8) Cold damage. <em>Success</em> : Half damage.</p>
      <h2>Legendary actions</h2>
      <p>Legendary Action Uses: 3 (4 in Lair). Immediately after another creature's turn, the dragon can expend a use to take one of the following actions. The dragon regains all expended uses at the start of each of its turns. </p>
      <p><strong><em>Freezing Burst</em></strong>. <em>Constitution Saving Throw</em> : DC 20, each creature in a 30-foot-radius Sphere centered on a point the dragon can see within 120 feet. <em>Failure</em> : 14 (4d6) Cold damage, and the target's Speed is 0 until the end of the target's next turn. <em>Failure or Success</em> : The dragon can't take this action again until the start of its next turn.</p>
      <p><strong><em>Frightful Presence</em></strong>. The dragon casts <em><a href="https://www.aidedd.org/spell/fear">Fear</a></em> , requiring no Material components and using Charisma as the spellcasting ability (spell save DC 18). The dragon can't take this action again until the start of its next turn.</p>
      <p><strong><em>Pounce</em></strong>. The dragon moves up to half its Speed, and it makes one Rend attack.</p>
    senses: Blindsight 60 ft., Darkvision 120 ft., Passive Perception 23
    languages:
    - Common
    - Draconic
  fr:
    name: Dragon blanc, ancien
    subtype: Chromatique
    description: |-
      <h2>Traits</h2>
      <p>** <em>Marche sur la glace</em>**. Le dragon peut parcourir et gravir toute surface gelée sans passer par le moindre jet de caractéristique. En outre, tout Terrain difficile composé de glace ou de neige ne lui demande aucune dépense de déplacement supplémentaire.</p>
      <p><strong><em>Résistance légendaire (4/jour, ou 5/jour dans son antre)</em></strong>. Si le dragon rate un jet de sauvegarde, il peut décider de le réussir tout de même.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le dragon effectue trois attaques de Saignée.</p>
      <p><strong><em>Saignée</em></strong>. <em>Corps à corps</em> : +14, allonge 4,50 m. <em>Touché</em> : 17 (2d8 + 8) dégâts tranchants plus 7 (2d6) dégâts de froid.</p>
      <p><strong><em>Souffle glacial (recharge 5–6)</em></strong>. <em>JdS Constitution</em> : DD 22, chaque créature dans un Cône de 27 m. <em>Échec</em> : 63 (14d8) dégâts de froid. <em>Réussite</em> : demi-dégâts.</p>
      <h2>Actions Légendaires</h2>
      <p>Utilisations d'action Légendaire : 3 (4 dans son antre). Aussitôt après le tour d'une autre créature, le dragon peut dépenser une utilisation pour entreprendre l'une des actions ci-après. Le dragon récupère toutes ses utilisations dépensées au début de chacun de ses tours. </p>
      <p><strong><em>Assaut incisif</em></strong>. Le dragon se déplace à concurrence de la moitié de sa Vitesse et effectue une attaque de Saignée.</p>
      <p><strong><em>Décharge de gel</em></strong>. <em>JdS Constitution</em> : DD 20, chaque créature dans une Sphère de 9 m de rayon centrée sur un point que le dragon voit dans un rayon de 36 m. <em>Échec</em> : 14 (4d6) dégâts de froid, et la Vitesse de la cible est de 0 jusqu'à la fin de son tour suivant. <em>Échec ou réussite</em> : Le dragon ne peut alors plus entreprendre cette action jusqu'au début de son tour suivant.</p>
      <p><strong><em>Présence terrifiante</em></strong>. Le dragon lance <em>peur</em> sans composantes matérielles, le Charisme étant sa caractéristique d'incantation (DD de sauvegarde 18). Le dragon ne peut alors plus entreprendre cette action jusqu'au début de son tour suivant.</p>
    senses: Vision aveugle 18 m, Vision dans le noir 36 m, Perception passive 23
    languages:
    - commun
    - draconique
