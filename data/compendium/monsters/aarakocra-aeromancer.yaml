translations:
  en:
    name: Aarakocra Aeromancer
    subtype: null
    description: |-
      ## Actions

      ***Multiattack***. The aarakocra makes two Wind Staff attacks, and it can use Spellcasting to cast *[Gust of Wind](https://www.aidedd.org/spell/gust-of-wind)*.

      ***Spellcasting***. The aarakocra casts one of the following spells, requiring no Material components and using Wisdom as the spellcasting ability (spell save DC 13):

      At will: *[Elementalism](https://www.aidedd.org/spell/elementalism), [Gust of Wind](https://www.aidedd.org/spell/gust-of-wind), [Mage Hand](https://www.aidedd.org/spell/mage-hand), [Message](https://www.aidedd.org/spell/message)*\
      1/day: *[Lightning Bolt](https://www.aidedd.org/spell/lightning-bolt)*

      ***Wind Staff***. *Melee or Ranged Attack Roll* : +5, reach 5 ft. or range 120 ft. *Hit* : 7 (1d8 + 3) Bludgeoning damage plus 11 (2d10) Lightning damage.

      ## Reactions

      ***Feather Fall (1/Day)***. The aarakocra casts *[Feather Fall](https://www.aidedd.org/spell/feather-fall)* in response to that spell's trigger, using the same spellcasting ability as Spellcasting.
    senses: Passive Perception 17
    languages:
    - Aarakocra
    - Primordial (Auran)
  fr:
    name: Aarakocre, aéromancien
    subtype: null
    description: |-
      ## Actions

      ***Attaques multiples***. L'aarakocre effectue deux attaques de Bâton des vents, et peut utiliser Incantation pour lancer *[bourrasque](https://www.aidedd.org/spell/fr/bourrasque)*.

      ***Bâton des vents***. *Corps à corps ou à distance* : +5, allonge 1,50 m ou portée 36 m. *Touché* : 7 (1d8 + 3) dégâts contondants plus 11 (2d10) dégâts de foudre.

      ***Incantation***. L'aarakocre lance l'un des sorts suivants sans composantes matérielles, la Sagesse étant sa caractéristique d'incantation (DD de sauvegarde 13) :

      À volonté : *[élémentalisme](https://www.aidedd.org/spell/fr/elementalisme), [bourrasque](https://www.aidedd.org/spell/fr/bourrasque), [main de mage](https://www.aidedd.org/spell/fr/main-de-mage), [message](https://www.aidedd.org/spell/fr/message)*\
      1/jour : *[Éclair](https://www.aidedd.org/spell/fr/eclair)*

      ***Bâton de vent***. Jet d'attaque au corps à corps ou à distance : +5, portée 1,5 m ou 36 m. Touché : 7 (1d8 + 3) dégâts contondants plus 11 (2d10) dégâts de foudre.

      ## Réactions

      ***Feuille morte (1/jour)***. L'aarakocre lance *[feuille morte](https://www.aidedd.org/spell/fr/feuille-morte)* en réponse au déclencheur de ce sort, en utilisant la même caractéristique d'incantation que pour Incantation.
    senses: Perception passive 17
    languages:
    - aarakocre
    - primordial (aérien)
