translations:
  en:
    name: Young Copper Dragon
    subtype: Metallic
    description: |-
      ## Actions

      ***Multiattack***. The dragon makes three Rend attacks. It can replace one attack with a use of Slowing Breath.

      ***Rend***. *Melee Attack Roll* : +7, reach 10 ft. *Hit* : 15 (2d10 + 4) Slashing damage.

      ***Acid Breath (Recharge 5–6)***. *Dexterity Saving Throw* : DC 14, each creature in a 40-foot-long, 5-foot-wide Line. *Failure* : 40 (9d8) Acid damage. *Success* : Half damage.

      ***Slowing Breath***. *Constitution Saving Throw* : DC 14, each creature in a 30-foot Cone. *Failure* : The target can't take Reactions; its Speed is halved; and it can take either an action or a Bonus Action on its turn, not both. This effect lasts until the end of its next turn.
    senses: Blindsight 30 ft., Darkvision 120 ft., Passive Perception 17
    languages:
    - Common
    - Draconic
  fr:
    name: Dragon de cuivre, jeune
    subtype: Métallique
    description: |-
      ## Actions

      ***Attaques multiples***. Le dragon effectue trois attaques de Saignée. Il peut remplacer l'une de ces attaques par une utilisation de Souffle ralentissant.

      ***Saignée***. *Corps à corps* : +7, allonge 3 m. *Touché* : 15 (2d10 + 4) dégâts tranchants.

      ***Souffle d'acide (recharge 5–6)***. *JdS Dextérité* : DD 14, chaque créature dans une Ligne de 12 m de long sur 1,50 m de large. *Échec* : 40 (9d8) dégâts d'acide. *Réussite* : demi-dégâts.

      ***Souffle ralentissant***. *JdS Constitution* : DD 14, chaque créature dans un Cône de 9 m. *Échec* : la cible voit sa Vitesse réduite de moitié, ne peut pas jouer de Réaction et peut entreprendre une action ou une action Bonus à son tour, mais pas les deux. L'effet persiste jusqu'à la fin de son tour suivant.
    senses: Vision aveugle 9 m, Vision dans le noir 36 m, Perception passive 17
    languages:
    - commun
    - draconique
