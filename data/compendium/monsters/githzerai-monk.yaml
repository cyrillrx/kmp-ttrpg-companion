translations:
  en:
    name: Githzerai Monk
    subtype: Gith
    description: |-
      ## Actions

      ***Multiattack***. The githzerai makes two Psi Strike attacks.

      ***Psi Strike***. *Melee Attack Roll* : +4, reach 5 ft. *Hit* : 6 (1d8 + 2) Bludgeoning damage plus 9 (2d8) Psychic damage.

      ***Spellcasting***. The githzerai casts one of the following spells, requiring no spell components and using Wisdom as the spellcasting ability:

      At will: *[Mage Hand](https://www.aidedd.org/spell/mage-hand)* (the hand is Invisible)

      1/day: *[See Invisibility](https://www.aidedd.org/spell/see-invisibility)*

      ## Bonus actions

      ***Psi-Powered Leap (2/Day)***. The githzerai casts *[Jump](https://www.aidedd.org/spell/jump)* , requiring no spell components and using the same spellcasting ability as Spellcasting.

      ## Reactions

      ***Psionic Defense (2/Day)***. The githzerai casts *[Feather Fall](https://www.aidedd.org/spell/feather-fall)* or *[Shield](https://www.aidedd.org/spell/shield)* in response to the spell's trigger, requiring no spell components and using the same spellcasting ability as Spellcasting.
    senses: Passive Perception 14
    languages:
    - Common
    - Gith
