translations:
  en:
    name: Young Black Dragon
    subtype: Chromatic
    description: |-
      <h2>Traits</h2>
      <p>** <em>Amphibious</em>**. The dragon can breathe air and water.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The dragon makes three Rend attacks.</p>
      <p><strong><em>Rend</em></strong>. <em>Melee Attack Roll</em> : +7, reach 10 ft. <em>Hit</em> : 9 (2d4 + 4) Slashing damage plus 3 (1d6) Acid damage.</p>
      <p><strong><em>Acid Breath (Recharge 5–6)</em></strong>. <em>Dexterity Saving Throw</em> : DC 14, each creature in a 30-foot-long, 5-foot-wide Line. <em>Failure</em> : 49 (14d6) Acid damage. <em>Success</em> : Half damage.</p>
    senses: Blindsight 30 ft., Darkvision 120 ft., Passive Perception 16
    languages:
    - Common
    - Draconic
  fr:
    name: Dragon noir, jeune
    subtype: Chromatique
    description: |-
      <h2>Traits</h2>
      <p>** <em>Amphibie</em>**. Le dragon peut respirer sous l'eau comme à l'air libre.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le dragon effectue trois attaques de Saignée.</p>
      <p><strong><em>Saignée</em></strong>. <em>Corps à corps</em> : +7, allonge 3 m. <em>Touché</em> : 9 (2d4 + 4) dégâts tranchants plus 3 (1d6) dégâts d'acide.</p>
      <p><strong><em>Souffle d'acide (recharge 5–6)</em></strong>. <em>JdS Dextérité</em> : DD 14, chaque créature dans une Ligne de 9 m de long sur 1,50 m de large. <em>Échec</em> : 49 (14d6) dégâts d'acide. <em>Réussite</em> : demi-dégâts.</p>
    senses: Vision aveugle 9 m, Vision dans le noir 36 m, Perception passive 16
    languages:
    - commun
    - draconique
