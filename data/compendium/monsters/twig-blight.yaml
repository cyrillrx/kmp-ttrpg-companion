translations:
  en:
    name: Twig Blight
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Pack Tactics</em>**. The blight has Advantage on an attack roll against a creature if at least one of the blight's allies is within 5 feet of the creature and the ally doesn't have the Incapacitated condition.</p>
      <h2>Actions</h2>
      <p>** <em>Claw</em>**. <em>Melee Attack Roll</em> : +4, reach 5 ft. <em>Hit</em> : 4 (1d4 + 2) Slashing damage.</p>
    senses: Blindsight 60 ft., Passive Perception 9
    languages:
    - Understands Common but can't speak
  fr:
    name: Nielleux
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Tactique de meute</em>**. Quand au moins un de ses alliés non Incapable d'agir se situe dans un rayon de 1,50 m de la créature qu'il cible, le nielleux a un Avantage au jet d'attaque correspondant contre cette créature.</p>
      <h2>Actions</h2>
      <p>** <em>Griffes</em>**. <em>Corps à corps</em> : +4, allonge 1,50 m. <em>Touché</em> : 4 (1d4 + 2) dégâts tranchants.</p>
    senses: Vision aveugle 18 m, Perception passive 9
    languages:
    - comprend le commun mais ne parle pas
