translations:
  en:
    name: Twig Blight
    subtype: null
    description: '## Traits


      ***Pack Tactics***. The blight has Advantage on an attack roll against a creature
      if at least one of the blight''s allies is within 5 feet of the creature and
      the ally doesn''t have the Incapacitated condition.


      ## Actions


      ***Claw***. *Melee Attack Roll* : +4, reach 5 ft. *Hit* : 4 (1d4 + 2) Slashing
      damage.'
    senses: Blindsight 60 ft., Passive Perception 9
    languages:
    - Understands Common but can't speak
  fr:
    name: Nielleux
    subtype: null
    description: '## Traits


      ***Tactique de meute***. Quand au moins un de ses alliés non Incapable d''agir
      se situe dans un rayon de 1,50 m de la créature qu''il cible, le nielleux a
      un Avantage au jet d''attaque correspondant contre cette créature.


      ## Actions


      ***Griffes***. *Corps à corps* : +4, allonge 1,50 m. *Touché* : 4 (1d4 + 2)
      dégâts tranchants.'
    senses: Vision aveugle 18 m, Perception passive 9
    languages:
    - comprend le commun mais ne parle pas
