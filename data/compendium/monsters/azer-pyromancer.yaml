translations:
  en:
    name: Azer Pyromancer
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Fire Aura</em>**. At the end of each of the azer's turns, each creature of the azer's choice in a 5-foot Emanation originating from the azer takes 11 (2d10) Fire damage unless the azer has the Incapacitated condition.</p>
      <p><strong><em>Illumination</em></strong>. The azer sheds Bright Light in a 10-foot radius and Dim Light for an additional 10 feet.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The azer makes two Flame Burst attacks.</p>
      <p><strong><em>Flame Burst</em></strong>. <em>Melee or Ranged Attack Roll</em> : +7, reach 5 ft. or range 120 ft. <em>Hit</em> : 15 (2d10 + 4) Fire damage.</p>
      <p><strong><em>Spellcasting</em></strong>. The azer casts one of the following spells, requiring no Material components and using Wisdom as the spellcasting ability (spell save DC 15):</p>
      <p>At will: <em><a href="https://www.aidedd.org/spell/elementalism">Elementalism</a>, <a href="https://www.aidedd.org/spell/mage-hand">Mage Hand</a></em><br />
      1/day: <em><a href="https://www.aidedd.org/spell/fireball">Fireball</a></em>  </p>
      <h2>Reactions</h2>
      <p>** <em>Hellish Rebuke (2/Day)</em>**. The azer casts <em><a href="https://www.aidedd.org/spell/hellish-rebuke">Hellish Rebuke</a></em> in response to that spell's trigger, using the same spellcasting ability as Spellcasting.</p>
    senses: Passive Perception 17
    languages:
    - Primordial (Ignan)
