translations:
  en:
    name: Hobgoblin Warrior
    subtype: Goblinoid
    description: '## Traits


      ***Pack Tactics***. The hobgoblin has Advantage on an attack roll against a
      creature if at least one of the hobgoblin''s allies is within 5 feet of the
      creature and the ally doesn''t have the Incapacitated condition.


      ## Actions


      ***Longsword***. *Melee Attack Roll* : +3, reach 5 ft. *Hit* : 12 (2d10 + 1)
      Slashing damage.


      ***Longbow***. *Ranged Attack Roll* : +3, range 150/600 ft. *Hit* : 5 (1d8 +
      1) Piercing damage plus 7 (3d4) Poison damage.'
    senses: Darkvision 60 ft., Passive Perception 10
    languages:
    - Common
    - Goblin
  fr:
    name: Hobgobelin, combattant
    subtype: Gobelinoïde
    description: '## Traits


      ***Tactique de meute***. Quand au moins un de ses alliés non Incapable d''agir
      se situe dans un rayon de 1,50 m de la créature qu''il cible, le hobgobelin
      a un Avantage au jet d''attaque correspondant contre cette créature.


      ## Actions


      ***Épée longue***. *Corps à corps* : +3, allonge 1,50 m. *Touché* : 12 (2d10
      + 1) dégâts tranchants.


      ***Arc long***. *À distance* : +3, portée 45/180 m. *Touché* : 5 (1d8 + 1) dégâts
      perforants plus 7 (3d4) dégâts de poison.'
    senses: Vision dans le noir 18 m, Perception passive 10
    languages:
    - commun
    - gobelin
