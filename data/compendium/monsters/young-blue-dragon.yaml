translations:
  en:
    name: Young Blue Dragon
    subtype: Chromatic
    description: |-
      ## Actions

      ***Multiattack***. The dragon makes three Rend attacks.

      ***Rend***. *Melee Attack Roll* : +9, reach 10 ft. *Hit* : 12 (2d6 + 5) Slashing damage plus 5 (1d10) Lightning damage.

      ***Lightning Breath (Recharge 5–6)***. *Dexterity Saving Throw* : DC 16, each creature in a 60-foot-long, 5-foot-wide Line. *Failure* : 55 (10d10) Lightning damage. *Success* : Half damage.
    senses: Blindsight 30 ft., Darkvision 120 ft., Passive Perception 19
    languages:
    - Common
    - Draconic
  fr:
    name: Dragon bleu, jeune
    subtype: Chromatique
    description: |-
      ## Actions

      ***Attaques multiples***. Le dragon effectue trois attaques de Saignée.

      ***Saignée***. *Corps à corps* : +9, allonge 3 m. *Touché* : 12 (2d6 + 5) dégâts tranchants plus 5 (1d10) dégâts de foudre.

      ***Souffle de foudre (recharge 5–6)***. *JdS Dextérité* : DD 16, chaque créature dans une Ligne de 18 m de long sur 1,50 m de large. *Échec* : 55 (10d10) dégâts de foudre. *Réussite* : demi-dégâts.
    senses: Vision aveugle 9 m, Vision dans le noir 36 m, Perception passive 19
    languages:
    - commun
    - draconique
