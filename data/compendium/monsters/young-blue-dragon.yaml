translations:
  en:
    name: Young Blue Dragon
    subtype: Chromatic
    description: |-
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The dragon makes three Rend attacks.</p>
      <p><strong><em>Rend</em></strong>. <em>Melee Attack Roll</em> : +9, reach 10 ft. <em>Hit</em> : 12 (2d6 + 5) Slashing damage plus 5 (1d10) Lightning damage.</p>
      <p><strong><em>Lightning Breath (Recharge 5–6)</em></strong>. <em>Dexterity Saving Throw</em> : DC 16, each creature in a 60-foot-long, 5-foot-wide Line. <em>Failure</em> : 55 (10d10) Lightning damage. <em>Success</em> : Half damage.</p>
    senses: Blindsight 30 ft., Darkvision 120 ft., Passive Perception 19
    languages:
    - Common
    - Draconic
  fr:
    name: Dragon bleu, jeune
    subtype: Chromatique
    description: |-
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le dragon effectue trois attaques de Saignée.</p>
      <p><strong><em>Saignée</em></strong>. <em>Corps à corps</em> : +9, allonge 3 m. <em>Touché</em> : 12 (2d6 + 5) dégâts tranchants plus 5 (1d10) dégâts de foudre.</p>
      <p><strong><em>Souffle de foudre (recharge 5–6)</em></strong>. <em>JdS Dextérité</em> : DD 16, chaque créature dans une Ligne de 18 m de long sur 1,50 m de large. <em>Échec</em> : 55 (10d10) dégâts de foudre. <em>Réussite</em> : demi-dégâts.</p>
    senses: Vision aveugle 9 m, Vision dans le noir 36 m, Perception passive 19
    languages:
    - commun
    - draconique
