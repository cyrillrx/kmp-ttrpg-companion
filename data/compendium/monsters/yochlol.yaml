translations:
  en:
    name: Yochlol
    subtype: Demon
    description: |-
      <h2>Traits</h2>
      <p>** <em>Demonic Restoration</em>**. If the yochlol dies outside the Abyss, its body dissolves, and it gains a new body instantly, reviving with all its Hit Points in the Abyss.</p>
      <p><strong><em>Magic Resistance</em></strong>. The yochlol has Advantage on saving throws against spells and other magical effects.</p>
      <p><strong><em>Spider Climb</em></strong>. The yochlol can climb difficult surfaces, including along ceilings, without needing to make an ability check.</p>
      <p><strong><em>Web Walker</em></strong>. The yochlol ignores movement restrictions caused by webs.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The yochlol makes two Caustic Lash attacks, and it can use Spellcasting to cast <em><a href="https://www.aidedd.org/spell/web">Web</a></em> or <em><a href="https://www.aidedd.org/spell/dominate-person">Dominate Person</a></em> if available.</p>
      <p><strong><em>Caustic Lash</em></strong>. <em>Melee or Ranged Attack Roll</em> : +8, reach 10 ft. or range 120 ft. <em>Hit</em> : 25 (6d6 + 4) Acid damage.</p>
      <p><strong><em>Spellcasting</em></strong>. The yochlol casts one of the following spells, requiring no Material components and using Charisma as the spellcasting ability (spell save DC 15):</p>
      <p>At will: <em><a href="https://www.aidedd.org/spell/detect-thoughts">Detect Thoughts</a>, <a href="https://www.aidedd.org/spell/gaseous-form">Gaseous Form</a></em> (self only), <em><a href="https://www.aidedd.org/spell/web">Web</a></em><br />
      1/day: <em><a href="https://www.aidedd.org/spell/dominate-person">Dominate Person</a></em>  </p>
      <h2>Bonus actions</h2>
      <p>** <em>Shape-Shift</em>**. The yochlol shape-shifts into a Medium Humanoid or a Medium spider or back into its true form. Its game statistics are the same in each form. Any equipment it is wearing or carrying isn't transformed.</p>
      <h2>Reactions</h2>
      <p>** <em>Toxic Escape</em>**. <em>Trigger</em> : The yochlol is hit by an attack roll. <em>Response</em> : The yochlol halves the attack's damage to itself (round down), and it teleports to an unoccupied space it can see within 30 feet of itself. <em>Constitution Saving Throw</em> : DC 15, each creature within 5 feet of the yochlol's destination space. <em>Failure</em> : The target has the Poisoned condition until the end of its next turn. While Poisoned, it has the Incapacitated condition.</p>
    senses: Darkvision 120 ft., Passive Perception 12
    languages:
    - Abyssal
    - Elvish
    - Undercommon
  fr:
    name: Yochlol
    subtype: Démon
    description: |-
      <h2>Traits</h2>
      <p>** <em>Restauration démoniaque</em>**. Si le yochlol meurt hors des Abysses, son corps se dissout en ichor et il en acquiert aussitôt un nouveau en revenant à la vie avec tous ses pv, quelque part dans les Abysses.</p>
      <p><strong><em>Résistance à la magie</em></strong>. Le yochlol a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.</p>
      <p><strong><em>Pattes d'araignée</em></strong>. Le yochlol peut parcourir les parois les plus difficiles à escalader, y compris les plafonds, sans passer par un jet de caractéristique.</p>
      <p><strong><em>Marche dans les toiles</em></strong>. Le yochlol n'est pas soumise aux contraintes de déplacement imposées par les toiles.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le yochlol effectue deux attaques de Vrille caustique, et il peut utiliser Incantation pour lancer <em><a href="https://www.aidedd.org/spell/fr/toile-d-araignee">toile d'araignée</a></em> ou <em><a href="https://www.aidedd.org/spell/fr/domination-de-personne">domination de personne</a></em> si disponible.</p>
      <p><strong><em>Vrille caustique</em></strong>. <em>Corps à corps ou à distance</em> : +8, allonge 3 m ou portée 36 m. <em>Touché</em> : 25 (6d6 + 4) acide damage.</p>
      <p><strong><em>Incantation</em></strong>. Le yochlol lance l'un des sorts suivants sans composantes matérielles, le Charisme étant sa caractéristique d'incantation (DD de sauvegarde 15) :</p>
      <p>À volonté : <em><a href="https://www.aidedd.org/spell/fr/detection-des-pensees">détection des pensées</a>, <a href="https://www.aidedd.org/spell/fr/forme-gazeuse">forme gazeuse</a></em> (soi-même uniquement), <em><a href="https://www.aidedd.org/spell/fr/toile-d-araignee">toile d'araignée</a></em><br />
      1/jour chacun : <em><a href="https://www.aidedd.org/spell/fr/domination-de-personne">domination de personne</a></em>  </p>
      <h2>Actions Bonus</h2>
      <p>** <em>Changement d'aspect</em>**. Le yochlol se transforme en Humanoïde de taille M ou en araignée de M, ou bien retrouve sa forme véritable. Son profil reste le même, quelle que soit la forme. Rien de ce qu'il porte n'est transformé.</p>
      <h2>Réactions</h2>
      <p>** <em>Évasion toxique</em>**. <em>Déclencheur</em> : le yochlol est touché par un jet d'attaque. <em>Conséquences</em> : le yochlol réduit de moitié les dégâts qu'il subit (arrondi à l'inférieur) et se téléporte dans un espace libre qu'il peut voir dans un rayon de 9 m. <em>JdS Constitution</em> : DD 15, chaque créature dans un rayon de 1,50 m autour de l'espace de destination du yochlol. <em>Échec</em> : la cible subit l'état Empoisonné jusqu'à la fin de son prochain tour. Tant qu'elle est empoisonnée, elle subit l'état Incapable d'agir.</p>
    senses: Vision dans le noir 36 m, Perception passive 12
    languages:
    - abyssal
    - elfe
    - commun des profondeurs
