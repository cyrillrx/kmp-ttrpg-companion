translations:
  en:
    name: Homunculus
    subtype: null
    description: |-
      ## Traits

      ***Telepathic Bond***. While the homunculus is on the same plane of existence as its master, the two of them can communicate telepathically with each other.

      ## Actions

      ***Bite***. *Melee Attack Roll* : +4, reach 5 ft. *Hit* : 1 Piercing damage, and the target is subjected to the following effect. *Constitution Saving Throw* : DC 12. *Failure* : The target has the Poisoned condition until the end of the homunculus's next turn. Failure by 5 or More: The target has the Poisoned condition for 1 minute. While Poisoned, the target has the Unconscious condition, which ends early if the target takes any damage.
    senses: Darkvision 60 ft., Passive Perception 10
    languages:
    - Understands Common plus one other language but can't speak
  fr:
    name: Homoncule
    subtype: null
    description: |-
      ## Traits

      ***Lien télépathique***. Tant que l'homoncule et son maître se trouvent sur le même plan d'existence, ils peuvent communiquer entre eux par télépathie.

      ## Actions

      ***Morsure***. *Corps à corps* : +4, allonge 1,50 m. *Touché* : 1 dégât perforant, et la cible subit l'effet suivant. *JdS Constitution* : DD 12. *Échec* : la cible subit l'état Empoisonné jusqu'à la fin du tour suivant de l'homoncule. Échec de 5 ou plus : La cible subit l'état Empoisonné pendant 1 minute. Ainsi Empoisonnée, la cible subit en outre l'état Inconscient, qui prend fin prématurément si la cible subit des dégâts.
    senses: Vision dans le noir 18 m, Perception passive 10
    languages:
    - comprend le commun plus une autre langue mais ne parle pas
