translations:
  en:
    name: Flameskull
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Illumination</em>**. The flameskull sheds Bright Light in a 15-foot radius and Dim Light for an additional 15 feet.</p>
      <p><strong><em>Magic Resistance</em></strong>. The flameskull has Advantage on saving throws against spells and other magical effects.</p>
      <p><strong><em>Undead Restoration</em></strong>. If the flameskull is destroyed, it regains all its Hit Points in 1 hour unless Holy Water is sprinkled on its remains or the <em><a href="https://www.aidedd.org/spell/dispel-evil-and-good">Dispel Evil and Good</a></em> spell is cast on them.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The flameskull makes two Fire Ray attacks.</p>
      <p><strong><em>Fire Ray</em></strong>. <em>Melee or Ranged Attack Roll</em> : +5, reach 5 ft. or range 60 ft. <em>Hit</em> : 13 (3d6 + 3) Fire damage.</p>
      <p><strong><em>Spellcasting</em></strong>. The flameskull casts one of the following spells, requiring no Somatic or Material components and using Intelligence as the spellcasting ability (spell save DC 13):</p>
      <p>At will: <em><a href="https://www.aidedd.org/spell/mage-hand">Mage Hand</a></em><br />
      2/day: <em><a href="https://www.aidedd.org/spell/magic-missile">Magic Missile</a></em> (level 2 version)<br />
      1/day: <em><a href="https://www.aidedd.org/spell/fireball">Fireball</a></em></p>
    senses: Darkvision 60 ft., Passive Perception 12
    languages:
    - Common plus two other languages
  fr:
    name: Crânefeu
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Illumination</em>**. Le crânefeu émet une Lumière vive sur un rayon de 4,50 m et une Lumière faible sur 4,50 m de plus.</p>
      <p><strong><em>Résistance à la magie</em></strong>. Le crânefeu a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.</p>
      <p><strong><em>Restauration funeste</em></strong>. S'il est détruit, le crânefeu récupère tous ses points de vie en 1 heure à moins que de l'eau bénite ne soit aspergée sur ses restes ou que le sort <em><a href="https://www.aidedd.org/spell/fr/dissipation-du-mal-et-du-bien">dissipation du mal et du bien</a></em> ne soit lancé sur eux.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le crânefeu effectue deux attaques de Rayon de Feu.</p>
      <p><strong><em>Rayon de feu</em></strong>. <em>Corps à corps ou à distance</em> : +5, allonge 1,50 m ou portée 18 m. <em>Touché</em> : 13 (3d6 + 3) dégâts de feu.</p>
      <p><strong><em>Incantation</em></strong>. Le crânefeu lance l'un des sorts suivants sans composantes somatiques ou matérielles, l'Intelligence étant sa caractéristique d'incantation (DD de sauvegarde 13) :</p>
      <p>À volonté : <em><a href="https://www.aidedd.org/spell/fr/main-de-mage">main de mage</a></em><br />
      2/jour : <em><a href="https://www.aidedd.org/spell/fr/projectile-magique">projectile magique</a></em> (au niveau 2)<br />
      1/jour : <em><a href="https://www.aidedd.org/spell/fr/boule-de-feu">boule de feu</a></em></p>
    senses: Vision dans le noir 18 m, Perception passive 12
    languages:
    - commun plus deux autres langues
