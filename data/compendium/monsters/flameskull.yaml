translations:
  en:
    name: Flameskull
    subtype: null
    description: |-
      ## Traits

      ***Illumination***. The flameskull sheds Bright Light in a 15-foot radius and Dim Light for an additional 15 feet.

      ***Magic Resistance***. The flameskull has Advantage on saving throws against spells and other magical effects.

      ***Undead Restoration***. If the flameskull is destroyed, it regains all its Hit Points in 1 hour unless Holy Water is sprinkled on its remains or the *[Dispel Evil and Good](https://www.aidedd.org/spell/dispel-evil-and-good)* spell is cast on them.

      ## Actions

      ***Multiattack***. The flameskull makes two Fire Ray attacks.

      ***Fire Ray***. *Melee or Ranged Attack Roll* : +5, reach 5 ft. or range 60 ft. *Hit* : 13 (3d6 + 3) Fire damage.

      ***Spellcasting***. The flameskull casts one of the following spells, requiring no Somatic or Material components and using Intelligence as the spellcasting ability (spell save DC 13):

      At will: *[Mage Hand](https://www.aidedd.org/spell/mage-hand)*\
      2/day: *[Magic Missile](https://www.aidedd.org/spell/magic-missile)* (level 2 version)\
      1/day: *[Fireball](https://www.aidedd.org/spell/fireball)*
    senses: Darkvision 60 ft., Passive Perception 12
    languages:
    - Common plus two other languages
  fr:
    name: Crânefeu
    subtype: null
    description: |-
      ## Traits

      ***Illumination***. Le crânefeu émet une Lumière vive sur un rayon de 4,50 m et une Lumière faible sur 4,50 m de plus.

      ***Résistance à la magie***. Le crânefeu a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.

      ***Restauration funeste***. S'il est détruit, le crânefeu récupère tous ses points de vie en 1 heure à moins que de l'eau bénite ne soit aspergée sur ses restes ou que le sort *[dissipation du mal et du bien](https://www.aidedd.org/spell/fr/dissipation-du-mal-et-du-bien)* ne soit lancé sur eux.

      ## Actions

      ***Attaques multiples***. Le crânefeu effectue deux attaques de Rayon de Feu.

      ***Rayon de feu***. *Corps à corps ou à distance* : +5, allonge 1,50 m ou portée 18 m. *Touché* : 13 (3d6 + 3) dégâts de feu.

      ***Incantation***. Le crânefeu lance l'un des sorts suivants sans composantes somatiques ou matérielles, l'Intelligence étant sa caractéristique d'incantation (DD de sauvegarde 13) :

      À volonté : *[main de mage](https://www.aidedd.org/spell/fr/main-de-mage)*\
      2/jour : *[projectile magique](https://www.aidedd.org/spell/fr/projectile-magique)* (au niveau 2)\
      1/jour : *[boule de feu](https://www.aidedd.org/spell/fr/boule-de-feu)*
    senses: Vision dans le noir 18 m, Perception passive 12
    languages:
    - commun plus deux autres langues
