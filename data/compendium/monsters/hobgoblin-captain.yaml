translations:
  en:
    name: Hobgoblin Captain
    subtype: Goblinoid
    description: |-
      <h2>Traits</h2>
      <p>** <em>Aura of Authority</em>**. While in a 10-foot Emanation originating from the hobgoblin, the hobgoblin and its allies have Advantage on attack rolls and saving throws, provided the hobgoblin doesn't have the Incapacitated condition.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The hobgoblin makes two attacks, using Greatsword or Longbow in any combination.</p>
      <p><strong><em>Greatsword</em></strong>. <em>Melee Attack Roll</em> : +4, reach 5 ft. <em>Hit</em> : 9 (2d6 + 2) Slashing damage plus 3 (1d6) Poison damage.</p>
      <p><strong><em>Longbow</em></strong>. <em>Ranged Attack Roll</em> : +4, range 150/600 ft. <em>Hit</em> : 6 (1d8 + 2) Piercing damage plus 5 (2d4) Poison damage.</p>
    senses: Darkvision 60 ft., Passive Perception 10
    languages:
    - Common
    - Goblin
  fr:
    name: Hobgobelin, capitaine
    subtype: Gobelinoïde
    description: |-
      <h2>Traits</h2>
      <p>** <em>Aura d'autorité</em>**. Tant qu'ils se trouvent dans une Émanation de 3 m centrée sur le hobgobelin et à condition que celui-ci ne subisse pas l'état Incapable d'agir, le hobgobelin et ses alliés ont un Avantage aux jets d'attaque et jets de sauvegarde.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le hobgobelin effectue deux attaques, réparties à sa guise entre Épée à deux mains et Arc long.</p>
      <p><strong><em>Épée à deux mains</em></strong>. <em>Corps à corps</em> : +4, allonge 1,50 m. <em>Touché</em> : 9 (2d6 + 2) dégâts tranchants plus 3 (1d6) dégâts de poison.</p>
      <p><strong><em>Arc long</em></strong>. <em>À distance</em> : +4, portée 45/180 m. <em>Touché</em> : 6 (1d8 + 2) dégâts perforants plus 5 (2d4) dégâts de poison.</p>
    senses: Vision dans le noir 18 m, Perception passive 10
    languages:
    - commun
    - gobelin
