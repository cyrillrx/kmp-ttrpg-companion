translations:
  en:
    name: Giant Elk
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Ram</em>**. <em>Melee Attack Roll</em> : +6, reach 10 ft. <em>Hit</em> : 11 (2d6 + 4) Bludgeoning damage plus 5 (2d4) Radiant damage. If the target is a Huge or smaller creature and the elk moved 20+ feet straight toward it immediately before the hit, the target takes an extra 5 (2d4) Bludgeoning damage and has the Prone condition.</p>
    senses: Darkvision 90 ft., Passive Perception 14
    languages:
    - Celestial; understands Common
    - Elvish
    - and Sylvan but can't speak them
  fr:
    name: Élan géant / Cervidé géant
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Ramure</em>**. <em>Corps à corps</em> : +6, allonge 3 m. <em>Touché</em> : 11 (2d6 + 4) dégâts contondants plus 5 (2d4) dégâts radiants. Si la cible est une créature de taille TG ou inférieure et si l'élan s'est déplacé en ligne droite d'un minimum de 6 m juste avant de la toucher, la cible subit 5 (2d4) dégâts contondants supplémentaires, ainsi que l'état À terre.</p>
    senses: Vision dans le noir 27 m, Perception passive 14
    languages:
    - céleste ; comprend le commun
    - l'elfique et le sylvestre
    - mais ne peut pas les parler
