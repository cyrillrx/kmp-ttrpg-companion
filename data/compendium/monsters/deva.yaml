translations:
  en:
    name: Deva
    subtype: Angel
    description: |-
      <h2>Traits</h2>
      <p>** <em>Exalted Restoration</em>**. If the deva dies outside Mount Celestia, its body disappears, and it gains a new body instantly, reviving with all its Hit Points somewhere in Mount Celestia.</p>
      <p><strong><em>Magic Resistance</em></strong>. The deva has Advantage on saving throws against spells and other magical effects.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The deva makes two Holy Mace attacks.</p>
      <p><strong><em>Holy Mace</em></strong>. <em>Melee Attack Roll</em> : +8, reach 5 ft. <em>Hit</em> : 7 (1d6 + 4) Bludgeoning damage plus 18 (4d8) Radiant damage.</p>
      <p><strong><em>Spellcasting</em></strong>. The deva casts one of the following spells, requiring no Material components and using Charisma as the spellcasting ability (spell save DC 17):</p>
      <p>At Will: <em><a href="https://www.aidedd.org/spell/detect-evil-and-good">Detect Evil and Good</a>, <a href="https://www.aidedd.org/spell/shapechange">Shapechange</a></em> (Beast or Humanoid form only, no Temporary Hit Points gained from the spell, and no Concentration or Temporary Hit Points required to maintain the spell)<br />
      1/Day Each: <em><a href="https://www.aidedd.org/spell/commune">Commune</a>, <a href="https://www.aidedd.org/spell/raise-dead">Raise Dead</a></em>  </p>
      <h2>Bonus actions</h2>
      <p>** <em>Divine Aid (2/Day)</em>**. The deva casts <em><a href="https://www.aidedd.org/spell/cure-wounds">Cure Wounds</a>, <a href="https://www.aidedd.org/spell/lesser-restoration">Lesser Restoration</a></em>, or <em><a href="https://www.aidedd.org/spell/remove-curse">Remove Curse</a></em> , using the same spellcasting ability as Spellcasting.</p>
    senses: Darkvision 120 ft., Passive Perception 19
    languages:
    - All; telepathy 120 ft.
  fr:
    name: Déva
    subtype: Ange
    description: |-
      <h2>Traits</h2>
      <p>** <em>Résistance à la magie</em>**. Le déva a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.</p>
      <p><strong><em>Restauration exaltée</em></strong>. Si le déva meurt hors du Mont Céleste, son corps disparaît et il en acquiert aussitôt un nouveau en revenant à la vie avec tous ses pv, quelque part sur le Mont Céleste.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le déva effectue deux attaques de Masse sainte.</p>
      <p><strong><em>Masse sainte</em></strong>. <em>Corps à corps</em> : +8, allonge 1,50 m. <em>Touché</em> : 7 (1d6 + 4) dégâts contondants plus 18 (4d8) dégâts radiants.</p>
      <p><strong><em>Incantation</em></strong>. Le déva lance l'un des sorts suivants, sans composantes matérielles, le Charisme étant sa caractéristique d'incantation (DD de sauvegarde 17) :</p>
      <p>À volonté : <em><a href="https://www.aidedd.org/spell/fr/changement-de-forme">changement de forme</a></em> (Bête ou Humanoïde uniquement, le sort ne fait pas gagner de points de vie temporaires, ni Concentration ni points de vie temporaires nécessaires pour maintenir le sort), <em><a href="https://www.aidedd.org/spell/fr/detection-du-mal-et-du-bien">détection du mal et du bien</a></em><br />
      1/jour chacun : <em>communion, rappel à la vie</em>  </p>
      <h2>Actions Bonus</h2>
      <p>** <em>Soutien divin (2/jour)</em>**. Le déva lance <em><a href="https://www.aidedd.org/spell/fr/delivrance-des-maledictions">délivrance des malédictions</a>, restauration partielle</em> ou <em>soins</em> , avec la même caractéristique d'incantation que pour Incantation.</p>
    senses: Vision dans le noir 36 m, Perception passive 19
    languages:
    - toutes ; télépathie 36 m
