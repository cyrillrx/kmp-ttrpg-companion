translations:
  en:
    name: Giant Rat
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Pack Tactics</em>**. The rat has Advantage on an attack roll against a creature if at least one of the rat's allies is within 5 feet of the creature and the ally doesn't have the Incapacitated condition.</p>
      <h2>Actions</h2>
      <p>** <em>Bite</em>**. <em>Melee Attack Roll</em> : +5, reach 5 feet. <em>Hit</em> : 5 (1d4 + 3) Piercing damage.</p>
    senses: Darkvision 60 ft., Passive Perception 12
    languages:
    - None
  fr:
    name: Rat géant
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Tactique de meute</em>**. Quand au moins un de ses alliés non Incapable d'agir se situe dans un rayon de 1,50 m de la créature qu'il cible, le rat a un Avantage au jet d'attaque correspondant.</p>
      <h2>Actions</h2>
      <p>** <em>Morsure</em>**. <em>Corps à corps</em> : +5, allonge 1,50 m. <em>Touché</em> : 5 (1d4 + 3) dégâts perforants.</p>
    senses: Vision dans le noir 18 m, Perception passive 12
    languages:
    - aucune
