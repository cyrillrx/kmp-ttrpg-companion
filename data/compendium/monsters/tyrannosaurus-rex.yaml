translations:
  en:
    name: Tyrannosaurus Rex
    subtype: Dinosaur
    description: |-
      ## Actions

      ***Multiattack***. The tyrannosaurus makes one Bite attack and one Tail attack.

      ***Bite***. *Melee Attack Roll* : +10, reach 10 ft. *Hit* : 33 (4d12 + 7) Piercing damage. If the target is a Large or smaller creature, it has the Grappled condition (escape DC 17). While Grappled, the target has the Restrained condition and can't be targeted by the tyrannosaurus's Tail.

      ***Tail***. *Melee Attack Roll* : +10, reach 15 ft. *Hit* : 25 (4d8 + 7) Bludgeoning damage. If the target is a Huge or smaller creature, it has the Prone condition.
    senses: Passive Perception 14
    languages:
    - None
  fr:
    name: Tyrannosaure Rex
    subtype: Dinosaure
    description: |-
      ## Actions

      ***Attaques multiples***. Le tyrannosaure effectue une attaque de Morsure et une de Queue.

      ***Morsure***. *Corps à corps* : +10, allonge 3 m. *Touché* : 33 (4d12 + 7) dégâts perforants. Si la cible est une créature de taille G ou inférieure, elle subit l'état Agrippé (évasion DD 17). Ainsi Agrippée, la cible subit aussi l'état Entravé et ne peut pas être ciblée par la Queue du tyrannosaure.

      ***Queue***. *Corps à corps* : +10, allonge 4,50 m. *Touché* : 25 (4d8 + 7) dégâts contondants. Si la cible est une créature de taille TG ou inférieure, elle subit l'état À terre.
    senses: Perception passive 14
    languages:
    - aucune
