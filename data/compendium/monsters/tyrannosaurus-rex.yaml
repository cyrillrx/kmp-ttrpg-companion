translations:
  en:
    name: Tyrannosaurus Rex
    subtype: Dinosaur
    description: |-
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The tyrannosaurus makes one Bite attack and one Tail attack.</p>
      <p><strong><em>Bite</em></strong>. <em>Melee Attack Roll</em> : +10, reach 10 ft. <em>Hit</em> : 33 (4d12 + 7) Piercing damage. If the target is a Large or smaller creature, it has the Grappled condition (escape DC 17). While Grappled, the target has the Restrained condition and can't be targeted by the tyrannosaurus's Tail.</p>
      <p><strong><em>Tail</em></strong>. <em>Melee Attack Roll</em> : +10, reach 15 ft. <em>Hit</em> : 25 (4d8 + 7) Bludgeoning damage. If the target is a Huge or smaller creature, it has the Prone condition.</p>
    senses: Passive Perception 14
    languages:
    - None
  fr:
    name: Tyrannosaure Rex
    subtype: Dinosaure
    description: |-
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le tyrannosaure effectue une attaque de Morsure et une de Queue.</p>
      <p><strong><em>Morsure</em></strong>. <em>Corps à corps</em> : +10, allonge 3 m. <em>Touché</em> : 33 (4d12 + 7) dégâts perforants. Si la cible est une créature de taille G ou inférieure, elle subit l'état Agrippé (évasion DD 17). Ainsi Agrippée, la cible subit aussi l'état Entravé et ne peut pas être ciblée par la Queue du tyrannosaure.</p>
      <p><strong><em>Queue</em></strong>. <em>Corps à corps</em> : +10, allonge 4,50 m. <em>Touché</em> : 25 (4d8 + 7) dégâts contondants. Si la cible est une créature de taille TG ou inférieure, elle subit l'état À terre.</p>
    senses: Perception passive 14
    languages:
    - aucune
