translations:
  en:
    name: Sphinx of Secrets
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Inscrutable</em>**. No magic can observe the sphinx remotely or detect its thoughts without its permission. Wisdom (Insight) checks made to ascertain its intentions or sincerity are made with Disadvantage.</p>
      <p><strong><em>Magic Resistance</em></strong>. The sphinx has Advantage on saving throws against spells and other magical effects.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The sphinx makes three Claw attacks. It can replace one attack with a use of Curse of the Riddle.</p>
      <p><strong><em>Claw</em></strong>. <em>Melee Attack Roll</em> : +7, reach 5 ft. <em>Hit</em> : 13 (2d8 + 4) Slashing damage plus 7 (2d6) Radiant damage.</p>
      <p><strong><em>Curse of the Riddle</em></strong>. <em>Intelligence Saving Throw</em> : DC 15, one creature the sphinx can see within 60 feet. <em>Failure</em> : 21 (6d6) Psychic damage, and the target is cursed with a riddle. The cursed target has Disadvantage on ability checks and attack rolls. In addition, if it takes the Magic action, it must succeed on a DC 15 Intelligence saving throw or that action is wasted. The cursed target can take a Study action to make a DC 15 Intelligence check, solving the riddle and ending the curse on a success. The curse ends early if the sphinx curses another target.</p>
      <p><strong><em>Spellcasting</em></strong>. The sphinx casts one of the following spells, requiring no Material components and using Intelligence as the spellcasting ability (spell save DC 15):</p>
      <p>At will: <em><a href="https://www.aidedd.org/spell/detect-magic">Detect Magic</a>, <a href="https://www.aidedd.org/spell/identify">Identify</a>, <a href="https://www.aidedd.org/spell/prestidigitation">Prestidigitation</a></em><br />
      1/day each: <em><a href="https://www.aidedd.org/spell/locate-object">Locate Object</a>, Remove Curse</em></p>
    senses: Truesight 60 ft., Passive Perception 17
    languages:
    - Celestial
    - Common
