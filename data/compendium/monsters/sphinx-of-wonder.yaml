translations:
  en:
    name: Sphinx of Wonder
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Magic Resistance</em>**. The sphinx has Advantage on saving throws against spells and other magical effects.</p>
      <h2>Actions</h2>
      <p>** <em>Rend</em>**. <em>Melee Attack Roll</em> : +5, reach 5 ft. <em>Hit</em> : 5 (1d4 + 3) Slashing damage plus 7 (2d6) Radiant damage.</p>
      <h2>Reactions</h2>
      <p>** <em>Burst of Ingenuity (2/Day)</em>**. <em>Trigger</em> : The sphinx or another creature within 30 feet makes an ability check or a saving throw. <em>Response</em> : The sphinx adds 2 to the roll.</p>
    senses: Darkvision 60 ft., Passive Perception 11
    languages:
    - Celestial
    - Common
  fr:
    name: Sphinx merveilleux
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Résistance à la magie</em>**. Le sphinx a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.</p>
      <h2>Actions</h2>
      <p>** <em>Saignée</em>**. <em>Corps à corps</em> : +5, allonge 1,50 m. <em>Touché</em> : 5 (1d4 + 3) dégâts tranchants plus 7 (2d6) dégâts radiants.</p>
      <h2>Réactions</h2>
      <p>** <em>Accès d'ingéniosité (2/jour)</em>**. <em>Déclencheur</em> : le sphinx ou une autre créature dans un rayon de 9 m effectue un jet de caractéristique ou de sauvegarde. <em>Conséquences</em> : le sphinx ajoute 2 au jet.</p>
    senses: Vision dans le noir 18 m, Perception passive 11
    languages:
    - céleste
    - commun
