    description: |-
      <h2>Traits</h2>
      <p>Animal Lordship.<br />
      Legendary Resistance (4/Day).<br />
      Lordly Presence.<br />
      Captivated (Forager Only).<br />
      Fearful (Hunter Only).<br />
      Mired (Sage Only).<br />
      Magic Resistance.  </p>
      <h2>Actions</h2>
      <p>Multiattack.<br />
      Rend.<br />
      Radiant Ray.<br />
      Animal Spirit.<br />
      Fortify (Forager Only).<br />
      Marked as Prey (Hunter Only).<br />
      Pesky Swarm (Sage Only).<br />
      Spellcasting.  </p>
      <h2>Bonus actions</h2>
      <p>Shape-Shift.  </p>
      <h2>Legendary actions</h2>
      <p>Legendary Action Uses: 3. </p>
      <p>Feral Strike.<br />
      Radiant Strike.</p>
