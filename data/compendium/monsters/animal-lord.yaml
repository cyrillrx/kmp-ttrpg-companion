      Captivé (cueilleur uniquement).<br />
      Craintif (chasseur uniquement).<br />
      Stupéfié (sage uniquement).<br />
      Résistance à la magie.  </p>
      <h2>Actions</h2>
      <p>Attaques multiples.<br />
      Saignée.<br />
      Rayon radiant.<br />
      Esprit animal.<br />
      Fortifiant (cueilleur uniquement).<br />
      Proie marquée (chasseur uniquement).<br />
      Nuée importune (sage uniquement).<br />
      Incantation.  </p>
