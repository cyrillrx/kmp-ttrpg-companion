translations:
  en:
    name: Pixie
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Magic Resistance</em>**. The pixie has Advantage on saving throws against spells and other magical effects.</p>
      <h2>Actions</h2>
      <p>** <em>Faerie Dust</em>**. <em>Melee or Ranged Attack Roll</em> : +4, reach 5 ft. or range 60 ft. <em>Hit</em> : 1 Radiant damage, and the target has the Charmed or Poisoned condition (pixie's choice) until the start of the pixie's next turn.</p>
      <p><strong><em>Spellcasting</em></strong>. The pixie casts one of the following spells, requiring no Material components and using Charisma as the spellcasting ability (spell save DC 12):</p>
      <p>At will: <em><a href="https://www.aidedd.org/spell/dancing-lights">Dancing Lights</a>, <a href="https://www.aidedd.org/spell/druidcraft">Druidcraft</a>, <a href="https://www.aidedd.org/spell/invisibility">Invisibility</a></em> (self only)<br />
      1/day each: <em><a href="https://www.aidedd.org/spell/detect-thoughts">Detect Thoughts</a>, <a href="https://www.aidedd.org/spell/fly">Fly</a>, <a href="https://www.aidedd.org/spell/sleep">Sleep</a></em></p>
    senses: Passive Perception 14
    languages:
    - Sylvan
  fr:
    name: Pixie
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Résistance à la magie</em>**. La pixie a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.</p>
      <h2>Actions</h2>
      <p>** <em>Poussière féerique</em>**. <em>Corps à corps ou à distance</em> : +4, allonge 1,50 m ou portée 18 m. <em>Touché</em> : 1 dégât radiant, et la cible subit l'état Charmé ou Empoisonné (au choix de la pixie) jusqu'au début du prochain tour de la pixie.</p>
      <p><strong><em>Incantation</em></strong>. La pixie lance l'un des sorts suivants sans composantes matérielles, le Charisme étant sa caractéristique d'incantation (DD de sauvegarde 12) :</p>
      <p>À volonté : <em><a href="https://www.aidedd.org/spell/fr/lumieres-dansantes">lumières dansantes</a>, <a href="https://www.aidedd.org/spell/fr/druidisme">druidisme</a>, <a href="https://www.aidedd.org/spell/fr/invisibilite">invisibilité</a></em> (soi-même uniquement)<br />
      1/jour chacun : <em><a href="https://www.aidedd.org/spell/fr/detection-des-pensees">détection des pensées</a>, <a href="https://www.aidedd.org/spell/fr/vol">vol</a>, <a href="https://www.aidedd.org/spell/fr/sommeil">sommeil</a></em></p>
    senses: Perception passive 14
    languages:
    - sylvestre
