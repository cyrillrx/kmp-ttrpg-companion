translations:
  en:
    name: Pixie
    subtype: null
    description: |-
      ## Traits

      ***Magic Resistance***. The pixie has Advantage on saving throws against spells and other magical effects.

      ## Actions

      ***Faerie Dust***. *Melee or Ranged Attack Roll* : +4, reach 5 ft. or range 60 ft. *Hit* : 1 Radiant damage, and the target has the Charmed or Poisoned condition (pixie's choice) until the start of the pixie's next turn.

      ***Spellcasting***. The pixie casts one of the following spells, requiring no Material components and using Charisma as the spellcasting ability (spell save DC 12):

      At will: *[Dancing Lights](https://www.aidedd.org/spell/dancing-lights), [Druidcraft](https://www.aidedd.org/spell/druidcraft), [Invisibility](https://www.aidedd.org/spell/invisibility)* (self only)

      1/day each: *[Detect Thoughts](https://www.aidedd.org/spell/detect-thoughts), [Fly](https://www.aidedd.org/spell/fly), [Sleep](https://www.aidedd.org/spell/sleep)*
    senses: Passive Perception 14
    languages:
    - Sylvan
  fr:
    name: Pixie
    subtype: null
    description: |-
      ## Traits

      ***Résistance à la magie***. La pixie a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.

      ## Actions

      ***Poussière féerique***. *Corps à corps ou à distance* : +4, allonge 1,50 m ou portée 18 m. *Touché* : 1 dégât radiant, et la cible subit l'état Charmé ou Empoisonné (au choix de la pixie) jusqu'au début du prochain tour de la pixie.

      ***Incantation***. La pixie lance l'un des sorts suivants sans composantes matérielles, le Charisme étant sa caractéristique d'incantation (DD de sauvegarde 12) :

      À volonté : *[lumières dansantes](https://www.aidedd.org/spell/fr/lumieres-dansantes), [druidisme](https://www.aidedd.org/spell/fr/druidisme), [invisibilité](https://www.aidedd.org/spell/fr/invisibilite)* (soi-même uniquement)

      1/jour chacun : *[détection des pensées](https://www.aidedd.org/spell/fr/detection-des-pensees), [vol](https://www.aidedd.org/spell/fr/vol), [sommeil](https://www.aidedd.org/spell/fr/sommeil)*
    senses: Perception passive 14
    languages:
    - sylvestre
