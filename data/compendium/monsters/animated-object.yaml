  en:
    name: Animated Object
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Slam</em>**. <em>Melee Attack Roll</em> : Bonus equals your spell attack modifier, reach 5 ft. <em>Hit</em> : Force damage equal to 1d4 + 3 (Medium or smaller), 2d6 + 3 + your spellcasting ability modifier (Large), or 2d12 + 3 + your spellcasting ability modifier (Huge).</p>
    senses: Blindsight 30 ft., Passive Perception 6
    languages:
    - Understands the languages you know
  fr:
    name: Objet animé
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Coup</em>**. <em>Corps à corps</em> : bonus égal à votre modificateur d'attaque des sorts, allonge 1,50 m. <em>Touché</em> : dégâts de force égaux à 1d4 + 3 (M ou inférieure), 2d6 + 3 + votre modificateur de caractéristique d'incantation (G), ou 2d12 + 3 + votre modificateur de caractéristique d'incantation (TG).</p>
    senses: Vision aveugle 9 m, Perception passive 6
    languages:
    - comprend les langues que vous connaissez
