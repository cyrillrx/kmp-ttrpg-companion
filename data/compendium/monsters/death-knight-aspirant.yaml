translations:
  en:
    name: Death Knight Aspirant
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Magic Resistance</em>**. The aspirant has Advantage on saving throws against spells and other magical effects.</p>
      <p><strong><em>Marshal Undead</em></strong>. Undead creatures of the aspirant's choice (excluding itself) in a 60-foot Emanation originating from it have Advantage on attack rolls and saving throws. It can't use this trait if it has the Incapacitated condition.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The aspirant makes three Dread Blade attacks.</p>
      <p><strong><em>Dread Blade</em></strong>. <em>Melee Attack Roll</em> : +9, reach 5 ft. <em>Hit</em> : 14 (2d8 + 5) Slashing damage plus 10 (3d6) Necrotic damage.</p>
      <p><strong><em>Hellfire Orb (Recharge 5–6)</em></strong>. <em>Dexterity Saving Throw</em> : DC 15, each creature in a 20-foot-radius Sphere centered on a point the aspirant can see within 120 feet of itself. <em>Failure</em> : 21 (6d6) Fire damage plus 21 (6d6) Necrotic damage. <em>Success</em> : Half damage.</p>
      <p><strong><em>Spellcasting</em></strong>. The aspirant casts one of the following spells, using Charisma as the spellcasting ability (spell save DC 15):</p>
      <p>At will: <em><a href="https://www.aidedd.org/spell/phantom-steed">Phantom Steed</a></em><br />
      1/day each: <em><a href="https://www.aidedd.org/spell/destructive-wave">Destructive Wave</a></em> (Necrotic), <em><a href="https://www.aidedd.org/spell/dispel-magic">Dispel Magic</a></em>  </p>
      <h2>Reactions</h2>
      <p>** <em>Parry</em>**. <em>Trigger</em> : The aspirant is hit by a melee attack roll while holding a weapon. <em>Response</em> : The aspirant adds 4 to its AC against that attack, possibly causing it to miss.</p>
    senses: Darkvision 120 ft., Passive Perception 11
    languages:
    - Abyssal
    - Common
