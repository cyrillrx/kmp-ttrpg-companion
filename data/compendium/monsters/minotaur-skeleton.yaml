translations:
  en:
    name: Minotaur Skeleton
    subtype: null
    description: |-
      ## Actions

      ***Gore***. *Melee Attack Roll* : +6, reach 5 ft. *Hit* : 11 (2d6 + 4) Piercing damage. If the target is a Large or smaller creature and the skeleton moved 20+ feet straight toward it immediately before the hit, the target takes an extra 9 (2d8) Piercing damage and has the Prone condition.

      ***Slam***. *Melee Attack Roll* : +6, reach 5 ft. *Hit* : 15 (2d10 + 4) Bludgeoning damage.
    senses: Darkvision 60 ft., Passive Perception 9
    languages:
    - Understands Abyssal but can't speak
  fr:
    name: Minotaure squelette
    subtype: null
    description: |-
      ## Actions

      ***Coup***. *Corps à corps* : +6, allonge 1,50 m. *Touché* : 15 (2d10 + 4) dégâts contondants.

      ***Coup de corne***. *Corps à corps* : +6, allonge 1,50 m. *Touché* : 11 (2d6 + 4) dégâts perforants. Si la cible est une créature de taille G ou inférieure et si le squelette s'est déplacé en ligne droite d'un minimum de 6 m juste avant de la toucher, la cible subit 9 (2d8) dégâts perforants supplémentaires, ainsi que l'état À terre.
    senses: Vision dans le noir 18 m, Perception passive 9
    languages:
    - comprend l'abyssal mais ne parle pas
