translations:
  en:
    name: Minotaur Skeleton
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Gore</em>**. <em>Melee Attack Roll</em> : +6, reach 5 ft. <em>Hit</em> : 11 (2d6 + 4) Piercing damage. If the target is a Large or smaller creature and the skeleton moved 20+ feet straight toward it immediately before the hit, the target takes an extra 9 (2d8) Piercing damage and has the Prone condition.</p>
      <p><strong><em>Slam</em></strong>. <em>Melee Attack Roll</em> : +6, reach 5 ft. <em>Hit</em> : 15 (2d10 + 4) Bludgeoning damage.</p>
    senses: Darkvision 60 ft., Passive Perception 9
    languages:
    - Understands Abyssal but can't speak
  fr:
    name: Minotaure squelette
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Coup</em>**. <em>Corps à corps</em> : +6, allonge 1,50 m. <em>Touché</em> : 15 (2d10 + 4) dégâts contondants.</p>
      <p><strong><em>Coup de corne</em></strong>. <em>Corps à corps</em> : +6, allonge 1,50 m. <em>Touché</em> : 11 (2d6 + 4) dégâts perforants. Si la cible est une créature de taille G ou inférieure et si le squelette s'est déplacé en ligne droite d'un minimum de 6 m juste avant de la toucher, la cible subit 9 (2d8) dégâts perforants supplémentaires, ainsi que l'état À terre.</p>
    senses: Vision dans le noir 18 m, Perception passive 9
    languages:
    - comprend l'abyssal mais ne parle pas
