translations:
  en:
    name: Zombie
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Undead Fortitude</em>**. If damage reduces the zombie to 0 Hit Points, it must make a Constitution saving throw (DC 5 plus the damage taken) unless the damage is Radiant or from a Critical Hit. On a successful save, the zombie drops to 1 Hit Point instead.</p>
      <h2>Actions</h2>
      <p>** <em>Slam</em>**. <em>Melee Attack Roll</em> : +3, reach 5 ft. <em>Hit</em> : 5 (1d8 + 1) Bludgeoning damage.</p>
    senses: darkvision 60 ft., Passive Perception 8
    languages:
    - Understands Common plus one other language but can't speak
  fr:
    name: Zombi
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Robustesse de la non-vie</em>**. Si des dégâts font tomber le zombi à 0 point de vie, il effectue un jet de sauvegarde de Constitution (DD 5 + les dégâts subis), sauf en cas de dégâts radiants ou de Coup critique. En cas de réussite, le zombi se retrouve en fait à 1 point de vie.</p>
      <h2>Actions</h2>
      <p>** <em>Coup</em>**. <em>Corps à corps</em> : +3, allonge 1,50 m. <em>Touché</em> : 5 (1d8 + 1) dégâts contondants.</p>
    senses: Vision dans le noir 18 m, Perception passive 8
    languages:
    - comprend le commun plus une autre langue
    - mais ne parle pas
