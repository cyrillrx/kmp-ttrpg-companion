translations:
  en:
    name: Magma Mephit
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Death Burst</em>**. The mephit explodes when it dies. <em>Dexterity Saving Throw</em> : DC 11, each creature in a 5-foot Emanation originating from the mephit. <em>Failure</em> : 7 (2d6) Fire damage. <em>Success</em> : Half damage.</p>
      <h2>Actions</h2>
      <p>** <em>Claw</em>**. <em>Melee Attack Roll</em> : +3, reach 5 ft. <em>Hit</em> : 3 (1d4 + 1) Slashing damage plus 3 (1d6) Fire damage.</p>
      <p><strong><em>Fire Breath (Recharge 6)</em></strong>. <em>Dexterity Saving Throw</em> : DC 11, each creature in a 15-foot Cone. <em>Failure</em> : 7 (2d6) Fire damage. <em>Success</em> : Half damage.</p>
    senses: Darkvision 60 ft., Passive Perception 10
    languages:
    - Primordial (Ignan
    - Terran)
  fr:
    name: Méphite magmatique
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Explosion finale</em>**. Le méphite explose quand il meurt. <em>JdS Dextérité</em> : DD 11, chaque créature dans une Émanation de 1,50 m centrée sur le méphite. <em>Échec</em> : 7 (2d6) dégâts de feu. <em>Réussite</em> : demi-dégâts.</p>
      <h2>Actions</h2>
      <p>** <em>Griffe</em>**. <em>Corps à corps</em> : +3, allonge 1,50 m. <em>Touché</em> : 3 (1d4 + 1) dégâts tranchants plus 3 (1d6) dégâts de feu.</p>
      <p><strong><em>Souffle de feu (recharge 6)</em></strong>. <em>JdS Dextérité</em> : DD 11, chaque créature dans un Cône de 4,50 m. <em>Échec</em> : 7 (2d6) dégâts de feu. <em>Réussite</em> : demi-dégâts.</p>
    senses: Vision dans le noir 18 m, Perception passive 10
    languages:
    - primordial (igné
    - terreux)
