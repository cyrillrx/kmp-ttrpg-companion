translations:
  en:
    name: Magma Mephit
    subtype: null
    description: |-
      ## Traits

      ***Death Burst***. The mephit explodes when it dies. *Dexterity Saving Throw* : DC 11, each creature in a 5-foot Emanation originating from the mephit. *Failure* : 7 (2d6) Fire damage. *Success* : Half damage.

      ## Actions

      ***Claw***. *Melee Attack Roll* : +3, reach 5 ft. *Hit* : 3 (1d4 + 1) Slashing damage plus 3 (1d6) Fire damage.

      ***Fire Breath (Recharge 6)***. *Dexterity Saving Throw* : DC 11, each creature in a 15-foot Cone. *Failure* : 7 (2d6) Fire damage. *Success* : Half damage.
    senses: Darkvision 60 ft., Passive Perception 10
    languages:
    - Primordial (Ignan
    - Terran)
  fr:
    name: Méphite magmatique
    subtype: null
    description: |-
      ## Traits

      ***Explosion finale***. Le méphite explose quand il meurt. *JdS Dextérité* : DD 11, chaque créature dans une Émanation de 1,50 m centrée sur le méphite. *Échec* : 7 (2d6) dégâts de feu. *Réussite* : demi-dégâts.

      ## Actions

      ***Griffe***. *Corps à corps* : +3, allonge 1,50 m. *Touché* : 3 (1d4 + 1) dégâts tranchants plus 3 (1d6) dégâts de feu.

      ***Souffle de feu (recharge 6)***. *JdS Dextérité* : DD 11, chaque créature dans un Cône de 4,50 m. *Échec* : 7 (2d6) dégâts de feu. *Réussite* : demi-dégâts.
    senses: Vision dans le noir 18 m, Perception passive 10
    languages:
    - primordial (igné
    - terreux)
