translations:
  en:
    name: Merrow
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Amphibious</em>**. The merrow can breathe air and water.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The merrow makes two attacks, using Bite, Claw, or Harpoon in any combination.</p>
      <p><strong><em>Bite</em></strong>. <em>Melee Attack Roll</em> : +6, reach 5 ft. <em>Hit</em> : 6 (1d4 + 4) Piercing damage, and the target has the Poisoned condition until the end of the merrow's next turn.</p>
      <p><strong><em>Claw</em></strong>. <em>Melee Attack Roll</em> : +6, reach 5 ft. <em>Hit</em> : 9 (2d4 + 4) Slashing damage.</p>
      <p><strong><em>Harpoon</em></strong>. <em>Melee or Ranged Attack Roll</em> : +6, reach 5 ft. or range 20/60 ft. <em>Hit</em> : 11 (2d6 + 4) Piercing damage. If the target is a Large or smaller creature, the merrow pulls the target up to 15 feet straight toward itself.</p>
    senses: Darkvision 60 ft., Passive Perception 10
    languages:
    - Abyssal
    - Primordial (Aquan)
  fr:
    name: Merrow
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Amphibie</em>**. Le merrow peut respirer sous l'eau comme à l'air libre.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le merrow effectue deux attaques, réparties à sa guise entre Griffe, Morsure et Harpon.</p>
      <p><strong><em>Griffe</em></strong>. <em>Corps à corps</em> : +6, allonge 1,50 m. <em>Touché</em> : 9 (2d4 + 4) dégâts tranchants.</p>
      <p><strong><em>Harpon</em></strong>. <em>Corps à corps ou à distance</em> : +6, allonge 1,50 m ou portée 6/18 m. <em>Touché</em> : 11 (2d6 + 4) dégâts perforants. Si la cible est une créature de taille G ou inférieure, le merrow la tire en ligne droite vers lui d'un maximum de 4,50 m.</p>
      <p><strong><em>Morsure</em></strong>. <em>Corps à corps</em> : +6, allonge 1,50 m. <em>Touché</em> : 6 (1d4 + 4) dégâts perforants, et la cible subit l'état Empoisonné jusqu'à la fin du tour suivant du merrow.</p>
    senses: Vision dans le noir 18 m, Perception passive 10
    languages:
    - abyssal
    - primordial (aquatique)
