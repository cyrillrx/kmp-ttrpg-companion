translations:
  en:
    name: Triceratops
    subtype: Dinosaur
    description: |-
      ## Actions

      ***Multiattack***. The triceratops makes two Gore attacks.

      ***Gore***. *Melee Attack Roll* : +9, reach 5 ft. *Hit* : 19 (2d12 + 6) Piercing damage. If the target is Huge or smaller and the triceratops moved 20+ feet straight toward it immediately before the hit, the target takes an extra 9 (2d8) Piercing damage and has the Prone condition.
    senses: Passive Perception 10
    languages:
    - None
  fr:
    name: Tricératops
    subtype: Dinosaure
    description: |-
      ## Actions

      ***Attaques multiples***. Le tricératops effectue deux attaques de Coup de corne.

      ***Coup de corne***. *Corps à corps* : +9, allonge 1,50 m. *Touché* : 19 (2d12 + 6) dégâts perforants. Si la cible est une créature de taille TG ou inférieure et si le tricératops s'est déplacé en ligne droite d'un minimum de 6 m juste avant de la toucher, la cible subit 9 (2d8) dégâts perforants supplémentaires, ainsi que l'état À terre.
    senses: Perception passive 10
    languages:
    - aucune
