translations:
  en:
    name: Gold Dragon Wyrmling
    subtype: Metallic
    description: |-
      <h2>Traits</h2>
      <p>** <em>Amphibious</em>**. The dragon can breathe air and water.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The dragon makes two Rend attacks.</p>
      <p><strong><em>Rend</em></strong>. <em>Melee Attack Roll</em> : +6, reach 5 ft. <em>Hit</em> : 9 (1d10 + 4) Slashing damage.</p>
      <p><strong><em>Fire Breath (Recharge 5–6)</em></strong>. <em>Dexterity Saving Throw</em> : DC 13, each creature in a 15-foot Cone. <em>Failure</em> : 22 (4d10) Fire damage. <em>Success</em> : Half damage.</p>
      <p><strong><em>Weakening Breath</em></strong>. <em>Strength Saving Throw</em> : DC 13, each creature that isn't currently affected by this breath in a 15-foot Cone. <em>Failure</em> : The target has Disadvantage on Strength-based D20 Tests and subtracts 2 (1d4) from its damage rolls. It repeats the save at the end of each of its turns, ending the effect on itself on a success. After 1 minute, it succeeds automatically.</p>
    senses: Blindsight 10 ft., Darkvision 60 ft., Passive Perception 14
    languages:
    - Draconic
  fr:
    name: Dragon d'or, dragonnet
    subtype: Métallique
    description: |-
      <h2>Traits</h2>
      <p>** <em>Amphibie</em>**. Le dragon peut respirer sous l'eau comme à l'air libre.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le dragon effectue deux attaques de Saignée.</p>
      <p><strong><em>Saignée</em></strong>. <em>Corps à corps</em> : +6, allonge 1,50 m. <em>Touché</em> : 9 (1d10 + 4) dégâts tranchants.</p>
      <p><strong><em>Souffle affaiblissant</em></strong>. <em>JdS Force</em> : DD 13, chaque créature non encore affectée par ce souffle dans un Cône de 4,50 m. <em>Échec</em> : la cible subit un Désavantage aux jets de d20 basés sur la Force et soustrait 2 (1d4) à ses jets de dégâts. Elle réitère le JdS à la fin de chacun de ses tours, et met un terme à l'effet sur elle-même en cas de réussite. Au bout de 1 minute, elle réussit automatiquement ce JdS.</p>
      <p><strong><em>Souffle de feu (recharge 5–6)</em></strong>. <em>JdS Dextérité</em> : DD 13, chaque créature dans un Cône de 4,50 m. <em>Échec</em> : 22 (4d10) dégâts de feu. <em>Réussite</em> : demi-dégâts.</p>
    senses: Vision aveugle 3 m, Vision dans le noir 18 m, Perception passive 14
    languages:
    - draconique
