translations:
  en:
    name: Gold Dragon Wyrmling
    subtype: Metallic
    description: |-
      ## Traits

      ***Amphibious***. The dragon can breathe air and water.

      ## Actions

      ***Multiattack***. The dragon makes two Rend attacks.

      ***Rend***. *Melee Attack Roll* : +6, reach 5 ft. *Hit* : 9 (1d10 + 4) Slashing damage.

      ***Fire Breath (Recharge 5–6)***. *Dexterity Saving Throw* : DC 13, each creature in a 15-foot Cone. *Failure* : 22 (4d10) Fire damage. *Success* : Half damage.

      ***Weakening Breath***. *Strength Saving Throw* : DC 13, each creature that isn't currently affected by this breath in a 15-foot Cone. *Failure* : The target has Disadvantage on Strength-based D20 Tests and subtracts 2 (1d4) from its damage rolls. It repeats the save at the end of each of its turns, ending the effect on itself on a success. After 1 minute, it succeeds automatically.
    senses: Blindsight 10 ft., Darkvision 60 ft., Passive Perception 14
    languages:
    - Draconic
  fr:
    name: Dragon d'or, dragonnet
    subtype: Métallique
    description: |-
      ## Traits

      ***Amphibie***. Le dragon peut respirer sous l'eau comme à l'air libre.

      ## Actions

      ***Attaques multiples***. Le dragon effectue deux attaques de Saignée.

      ***Saignée***. *Corps à corps* : +6, allonge 1,50 m. *Touché* : 9 (1d10 + 4) dégâts tranchants.

      ***Souffle affaiblissant***. *JdS Force* : DD 13, chaque créature non encore affectée par ce souffle dans un Cône de 4,50 m. *Échec* : la cible subit un Désavantage aux jets de d20 basés sur la Force et soustrait 2 (1d4) à ses jets de dégâts. Elle réitère le JdS à la fin de chacun de ses tours, et met un terme à l'effet sur elle-même en cas de réussite. Au bout de 1 minute, elle réussit automatiquement ce JdS.

      ***Souffle de feu (recharge 5–6)***. *JdS Dextérité* : DD 13, chaque créature dans un Cône de 4,50 m. *Échec* : 22 (4d10) dégâts de feu. *Réussite* : demi-dégâts.
    senses: Vision aveugle 3 m, Vision dans le noir 18 m, Perception passive 14
    languages:
    - draconique
