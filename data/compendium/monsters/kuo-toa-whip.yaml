translations:
  en:
    name: Kuo-toa Whip
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Amphibious</em>**. The kuo-toa can breathe air and water.</p>
      <p><strong><em>Sunlight Sensitivity</em></strong>. While in sunlight, the kuo-toa has Disadvantage on ability checks and attack rolls.</p>
      <h2>Actions</h2>
      <p>** <em>Pincer Staff</em>**. <em>Melee Attack Roll</em> : +4, reach 10 ft. <em>Hit</em> : 9 (2d6 + 2) Piercing damage. If the target is a Medium or smaller creature, it has the Grappled condition (escape DC 12). Until the grapple ends, the kuo-toa can't make Pincer Staff attacks.</p>
      <p><strong><em>Conjure Slimy Glob</em></strong>. <em>Ranged Attack Roll</em> : +4, range 60 ft. <em>Hit</em> : 9 (3d4 + 2) Acid damage.</p>
      <h2>Bonus actions</h2>
      <p>** <em>Shield of Faith (2/Day)</em>**. The kuo-toa casts <em><a href="https://www.aidedd.org/spell/shield-of-faith">Shield of Faith</a></em> , using Wisdom as the spellcasting ability.</p>
    senses: Darkvision 120 ft., Truesight 30 ft., Passive Perception 16
    languages:
    - Undercommon
  fr:
    name: Kuo-toa fouet
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Amphibie</em>**. Le kuo-toa peut respirer sous l'eau comme à l'air libre.</p>
      <p><strong><em>Sensibilité au soleil</em></strong>. Tant qu'il est exposé à la lumière du soleil, le kuo-toa subit un Désavantage aux jets de caractéristique et aux jets d'attaque.</p>
      <h2>Actions</h2>
      <p>** <em>Bâton-tenaille</em>**. <em>Corps à corps</em> : +4, allonge 3 m. <em>Touché</em> : 9 (2d6 + 2) dégâts perforants. Si la cible est une créature de taille M ou inférieure, elle subit l'état Agrippé (évasion DD 12). Tant qu'il agrippe une créature, le kuo-toa ne peut pas effectuer d'attaques avec son Bâton-tenaille.</p>
      <p><strong><em>Invocation de globule</em></strong>. <em>À distance</em> : +4, portée 18 m. <em>Touché</em> : 9 (3d4 + 2) acide damage.</p>
      <h2>Actions Bonus</h2>
      <p>** <em>Bouclier de la foi (2/jour)</em>**. Le kuo-toa lance <em><a href="https://www.aidedd.org/spell/fr/bouclier-de-la-foi">bouclier de la Foi</a></em> , en utilisant la Sagesse comme caractéristique d'incantation.</p>
    senses: Vision dans le noir 36 m, vision véritable 9 m, Perception passive 16
    languages:
    - commun des profondeurs
