    name: Serpent constricteur
    subtype: null
    description: |-
      ## Actions

      ***Morsure***. *Corps à corps* : +4, allonge 1,50 m. *Touché* : 6 (1d8 + 2) dégâts perforants.

      ***Constriction***. *JdS Force* : DD 12, une créature de taille M ou inférieure que le serpent peut voir dans un rayon de 1,50 m. *Échec* : 7 (3d4) dégâts contondants, et la cible subit l'état Agrippé (évasion DD 12).
    senses: Vision aveugle 3 m, Perception passive 12
