translations:
  en:
    name: Pseudodragon
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Magic Resistance</em>**. The pseudodragon has Advantage on saving throws against spells and other magical effects.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The pseudodragon makes two Bite attacks.</p>
      <p><strong><em>Bite</em></strong>. <em>Melee Attack Roll</em> : +4, reach 5 ft. <em>Hit</em> : 4 (1d4 + 2) Piercing damage.</p>
      <p><strong><em>Sting</em></strong>. <em>Constitution Saving Throw</em> : DC 12, one creature the pseudodragon can see within 5 feet. <em>Failure</em> : 5 (2d4) Poison damage, and the target has the Poisoned condition for 1 hour. While Poisoned, the target also has the Unconscious condition, which ends early if the target takes damage or a creature within 5 feet of it takes an action to wake it.</p>
    senses: Blindsight 10 ft., Darkvision 60 ft., Passive Perception 15
    languages:
    - Understands Common and Draconic but can't speak
  fr:
    name: Pseudodragon
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Résistance à la magie</em>**. Le pseudodragon a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le pseudodragon effectue deux attaques de Morsure.</p>
      <p><strong><em>Morsure</em></strong>. <em>Corps à corps</em> : +4, allonge 1,50 m. <em>Touché</em> : 4 (1d4 + 2) dégâts perforants.</p>
      <p><strong><em>Dard</em></strong>. <em>JdS Constitution</em> : DD 12, une créature que le pseudodragon peut voir dans un rayon de 1,50 m. <em>Échec</em> : 5 (2d4) dégâts de poison, et la cible subit l'état Empoisonné pendant 1 heure. Tant qu'elle est empoisonnée, la cible a également l'état Inconscient, qui prend fin prématurément si la cible subit des dégâts ou si une créature dans un rayon de 1,50 m prend une action pour la réveiller.</p>
    senses: Vision aveugle 3 m, Vision dans le noir 18 m, Perception passive 15
    languages:
    - comprend le commun et le draconique
    - mais ne parle pas
