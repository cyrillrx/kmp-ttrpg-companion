translations:
  en:
    name: Behir
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The behir makes one Bite attack and uses Constrict.</p>
      <p><strong><em>Bite</em></strong>. <em>Melee Attack Roll</em> : +10, reach 10 ft. <em>Hit</em> : 19 (2d12 + 6) Piercing damage plus 11 (2d10) Lightning damage.</p>
      <p><strong><em>Constrict</em></strong>. <em>Strength Saving Throw</em> : DC 18, one Large or smaller creature the behir can see within 5 feet. <em>Failure</em> : 28 (5d8 + 6) Bludgeoning damage. The target has the Grappled condition (escape DC 16), and it has the Restrained condition until the grapple ends.</p>
      <p><strong><em>Lightning Breath (Recharge 5–6)</em></strong>. <em>Dexterity Saving Throw</em> : DC 16, each creature in a 90-foot-long, 5-foot-wide Line. <em>Failure</em> : 66 (12d10) Lightning damage. <em>Success</em> : Half damage.</p>
      <h2>Bonus actions</h2>
      <p>** <em>Swallow</em>**. <em>Dexterity Saving Throw</em> : DC 18, one Large or smaller creature Grappled by the behir (the behir can have only one creature swallowed at a time). <em>Failure</em> : The behir swallows the target, which is no longer Grappled. While swallowed, a creature has the Blinded and Restrained conditions, has Total Cover against attacks and other effects outside the behir, and takes 21 (6d6) Acid damage at the start of each of the behir's turns. If the behir takes 30 damage or more on a single turn from the swallowed creature, the behir must succeed on a DC 14 Constitution saving throw at the end of that turn or regurgitate the creature, which falls in a space within 10 feet of the behir and has the Prone condition. If the behir dies, a swallowed creature is no longer Restrained and can escape from the corpse by using 15 feet of movement, exiting Prone.</p>
    senses: Darkvision 90 ft., Passive Perception 16
    languages:
    - Draconic
  fr:
    name: Béhir
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le béhir effectue une attaque de Morsure et recourt à Constriction.</p>
      <p><strong><em>Morsure</em></strong>. <em>Corps à corps</em> : +10, allonge 3 m. <em>Touché</em> : 19 (2d12 + 6) dégâts perforants plus 11 (2d10) dégâts de foudre.</p>
      <p><strong><em>Constriction</em></strong>. <em>JdS Force</em> : DD 18, une créature de taille G ou inférieure que le béhir voit dans un rayon de 1,50 m. <em>Échec</em> : 28 (5d8 + 6) dégâts contondants. La cible subit l'état Agrippé (évasion DD 16), ainsi que l'état Entravé tant qu'elle est agrippée.</p>
      <p><strong><em>Souffle de foudre (recharge 5–6)</em></strong>. <em>JdS Dextérité</em> : DD 16, chaque créature dans une Ligne de 27 m de long sur 1,50 m de large. <em>Échec</em> : 66 (12d10) dégâts de foudre. <em>Réussite</em> : demi-dégâts.</p>
      <h2>Actions Bonus</h2>
      <p>** <em>Engloutissement</em>**. <em>JdS Dextérité</em> : DD 18, une créature de taille G ou inférieure Agrippée par le béhir (celui-ci ne peut contenir qu'une seule créature engloutie). <em>Échec</em> : le béhir engloutit la cible, qui n'est plus Agrippée. La créature engloutie subit les états Aveuglé et Entravé, bénéficie d'un Abri total contre les attaques et effets émanant de l'extérieur du béhir et subit 21 (6d6) dégâts d'acide au début de chacun des tours du monstre. Si le béhir subit 30 dégâts ou plus lors d'un même tour de la part de la créature engloutie, il doit réussir un jet de sauvegarde de Constitution DD 14 à la fin du tour concerné sous peine de régurgiter la créature, qui se retrouve avec l'état À terre dans un espace situé dans un rayon de 3 m du monstre. Si le béhir meurt, la créature engloutie n'est plus Entravée par lui et peut s'en extraire en dépensant 4,50 m de déplacement pour se retrouver À terre près du cadavre.</p>
    senses: Vision dans le noir 27 m, Perception passive 16
    languages:
    - draconique
