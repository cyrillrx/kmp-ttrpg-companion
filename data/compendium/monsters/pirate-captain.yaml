translations:
  en:
    name: Pirate Captain
    subtype: null
    description: |-
      ## Actions

      ***Multiattack***. The pirate makes three attacks, using Rapier or Pistol in any combination.

      ***Rapier***. *Melee Attack Roll* : +7, reach 5 ft. *Hit* : 13 (2d8 + 4) Piercing damage, and the pirate has Advantage on the next attack roll it makes before the end of this turn.

      ***Pistol***. *Ranged Attack Roll* : +7, range 30/90 ft. *Hit* : 15 (2d10+ 4) Piercing damage.

      ## Bonus actions

      ***Captain's Charm***. *Wisdom Saving Throw* : DC 14, one creature the pirate can see within 30 feet. *Failure* : The target has the Charmed condition until the start of the pirate's next turn.

      ## Reactions

      ***Riposte***. *Trigger* : The pirate is hit by a melee attack roll while holding a weapon. *Response* : The pirate adds 3 to its AC against that attack, possibly causing the attack to miss. On a miss, the pirate makes one Rapier attack against the triggering creature if within range.
    senses: Passive Perception 15
    languages:
    - Common plus one other language
  fr:
    name: Pirate, capitaine
    subtype: null
    description: |-
      ## Actions

      ***Attaques multiples***. Le pirate effectue trois attaques, réparties à sa guise entre Rapière et Pistolet.

      ***Rapière***. *Corps à corps* : +7, allonge 1,50 m. *Touché* : 13 (2d8 + 4) dégâts perforants, et le pirate a un Avantage au prochain jet d'attaque qu'il effectue avant la fin de ce tour.

      ***Pistolet***. *À distance* : +7, portée 9/27 m. *Touché* : 15 (2d10 + 4) dégâts perforants.

      ## Actions Bonus

      ***Charme du capitaine***. *JdS Sagesse* : DD 14, une créature que le pirate voit dans un rayon de 9 m. *Échec* : la cible subit l'état Charmé jusqu'au début du tour suivant du pirate.

      ## Réactions

      ***Parade-riposte***. *Déclencheur* : le pirate est touché par un jet d'attaque de corps à corps alors qu'il tient une arme. *Conséquences* : le pirate ajoute 3 à sa CA contre cette attaque, ce qui peut la faire rater. En cas d'échec, le pirate effectue une attaque de Rapière contre la créature qui a déclenché sa Réaction si celle-ci est à portée.
    senses: Perception passive 15
    languages:
    - commun plus une autre langue
