translations:
  en:
    name: Rakshasa
    subtype: null
    description: |-
      ## Traits

      ***Greater Magic Resistance***. The rakshasa automatically succeeds on saving throws against spells and other magical effects, and the attack rolls of spells automatically miss it. Without the rakshasa's permission, no spell can observe the rakshasa remotely or detect its thoughts, creature type, or alignment.

      ***Fiendish Restoration***. If the rakshasa dies outside the Nine Hells, its body turns to ichor, and it gains a new body instantly, reviving with all its Hit Points somewhere in the Nine Hells.

      ## Actions

      ***Multiattack***. The rakshasa makes three Cursed Touch attacks.

      ***Cursed Touch***. *Melee Attack Roll* : +10, reach 5 ft. *Hit* : 12 (2d6 + 5) Slashing damage plus 19 (3d12) Necrotic damage. If the target is a creature, it is cursed. While cursed, the target gains no benefit from finishing a Short or Long Rest.

      ***Baleful Command (Recharge 5–6)***. *Wisdom Saving Throw* : DC 18, each enemy in a 30-foot Emanation originating from the rakshasa. *Failure* : 28 (8d6) Psychic damage, and the target has the Frightened and Incapacitated conditions until the start of the rakshasa's next turn.

      ***Spellcasting***. The rakshasa casts one of the following spells, requiring no Material components and using Charisma as the spellcasting ability (spell save DC 18):

      At Will: *[Detect Magic](https://www.aidedd.org/spell/detect-magic), [Detect Thoughts](https://www.aidedd.org/spell/detect-thoughts), [Disguise Self](https://www.aidedd.org/spell/disguise-self), [Mage Hand](https://www.aidedd.org/spell/mage-hand), [Minor Illusion](https://www.aidedd.org/spell/minor-illusion)*
      
      1/Day Each: *[Fly](https://www.aidedd.org/spell/fly), [Invisibility](https://www.aidedd.org/spell/invisibility), [Major Image](https://www.aidedd.org/spell/major-image), [Plane Shift](https://www.aidedd.org/spell/plane-shift)*
    senses: Truesight 60 ft., Passive Perception 18
    languages:
    - Common
    - Infernal
  fr:
    name: Rakshasa
    subtype: null
    description: |-
      ## Traits

      ***Résistance à la magie suprême***. Le rakshasa réussit automatiquement les jets de sauvegarde contre les sorts et autres effets magiques, et les jets d'attaque des sorts le ratent automatiquement. Nul sort ne permet d'observer le rakshasa à distance ni de détecter ses pensées, son type de créature ou son alignement sans son consentement.

      ***Restauration fiélonne***. Si le rakshasa meurt hors des Neuf Enfers, son corps se dissout en ichor et il en acquiert aussitôt un nouveau et revient à la vie avec tous ses pv, quelque part dans les Neuf Enfers.

      ## Actions

      ***Attaques multiples***. Le rakshasa effectue trois attaques de Contact maudit.

      ***Contact maudit***. *Corps à corps* : +10, allonge 1,50 m. *Touché* : 12 (2d6 + 5) dégâts tranchants plus 19 (3d12) dégâts nécrotiques. Si la cible est une créature, elle est maudite. Une cible ainsi maudite ne tire aucun bénéfice lorsqu'elle termine un Repos court ou long.

      ***Incantation***. Le rakshasa lance l'un des sorts suivants sans composantes matérielles, le Charisme étant sa caractéristique d'incantation (DD de sauvegarde 18) :

      À volonté : *déguisement,[détection de la magie](https://www.aidedd.org/spell/fr/detection-de-la-magie), [détection des pensées](https://www.aidedd.org/spell/fr/detection-des-pensees), [illusion mineure](https://www.aidedd.org/spell/fr/illusion-mineure), [main de mage](https://www.aidedd.org/spell/fr/main-de-mage)*
      
      1/jour chacun : *[changement de plan](https://www.aidedd.org/spell/fr/changement-de-plan), [image majeure](https://www.aidedd.org/spell/fr/image-majeure), [invisibilité](https://www.aidedd.org/spell/fr/invisibilite), vol*

      ***Injonction lugubre (recharge 5–6)***. *JdS Sagesse* : DD 18, chaque ennemi dans une Émanation de 9 m centrée sur le rakshasa. *Échec* : 28 (8d6) dégâts psychiques, et la cible subit l'état Effrayé et Incapable d'agir jusqu'au début du tour suivant du rakshasa.
    senses: vision véritable 18 m, Perception passive 18
    languages:
    - commun
    - infernal
