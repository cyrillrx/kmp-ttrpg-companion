translations:
  en:
    name: Nightmare
    subtype: null
    description: |-
      ## Traits

      ***Confer Fire Resistance***. The nightmare can grant Resistance to Fire damage to a rider while it is on the nightmare.

      ***Illumination***. The nightmare sheds Bright Light in a 10-foot radius and Dim Light for an additional 10 feet.

      ## Actions

      ***Hooves***. *Melee Attack Roll* : +6, reach 5 ft. *Hit* : 13 (2d8 + 4) Bludgeoning damage plus 10 (3d6) Fire damage.

      ***Ethereal Stride***. The nightmare and up to three willing creatures within 5 feet of it teleport to the Ethereal Plane from the Material Plane or vice versa.
    senses: Passive Perception 11
    languages:
    - Understands Abyssal
    - Common
    - and Infernal but can't speak
  fr:
    name: Horriflamme
    subtype: null
    description: |-
      ## Traits

      ***Illumination***. L'horriflamme émet une Lumière vive sur un rayon de 3 m et une Lumière faible sur 3 m de plus.

      ***Protection contre les flammes***. L'horriflamme peut octroyer la Résistance aux dégâts de feu à son cavalier tant que celui-ci la chevauche.

      ## Actions

      ***Sabots***. *Corps à corps* : +6, allonge 1,50 m. *Touché* : 13 (2d8 + 4) dégâts contondants plus 10 (3d6) dégâts de feu.

      ***Chevauchée éthérée***. L'horriflamme et un maximum de trois créatures consentantes dans un rayon de 1,50 m se téléportent sur le Plan Éthéré depuis le Plan Matériel, ou inversement.
    senses: Perception passive 11
    languages:
    - comprend l'abyssal
    - le commun et l'infernal mais ne parle pas
