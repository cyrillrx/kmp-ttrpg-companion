translations:
  en:
    name: Stirge
    subtype: null
    description: |-
      ## Actions

      ***Proboscis***. *Melee Attack Roll* : +5, reach 5 ft. *Hit* : 6 (1d6 + 3) Piercing damage, and the stirge attaches to the target. While attached, the stirge can't make Proboscis attacks, and the target takes 5 (2d4) Necrotic damage at the start of each of the stirge's turns. The stirge can detach itself by spending 5 feet of its movement. The target or a creature within 5 feet of it can detach the stirge as an action.
    senses: Darkvision 60 ft., Passive Perception 9
    languages:
    - None
  fr:
    name: Strige
    subtype: null
    description: |-
      ## Actions

      ***Trompe***. *Corps à corps* : +5, allonge 1,50 m. *Touché* : 6 (1d6 + 3) dégâts perforants, et la strige se fixe à la cible. Tant qu'elle est ainsi fixée, la strige ne peut pas effectuer d'attaques de Trompe et la cible subit 5 (2d4) dégâts nécrotiques au début de chaque tour de la strige. La strige peut se détacher de la cible en y consacrant 1,50 m de déplacement. La cible ou une créature dans un rayon de 1,50 m d'elle peut décrocher la strige au prix d'une action.
    senses: Vision dans le noir 18 m, Perception passive 9
    languages:
    - aucune
