translations:
  en:
    name: Allosaurus
    subtype: Dinosaur
    description: |-
      ## Actions

      ***Bite***. *Melee Attack Roll* : +6, reach 5 ft. *Hit* : 15 (2d10 + 4) Piercing damage.

      ***Claws***. *Melee Attack Roll* : +6, reach 5 ft. *Hit* : 8 (1d8 + 4) Slashing damage. If the target is a Large or smaller creature and the allosaurus moved 30+ feet straight toward it immediately before the hit, the target has the Prone condition, and the allosaurus can make one Bite attack against it.
    senses: Passive Perception 15
    languages:
    - None
  fr:
    name: Allosaure
    subtype: Dinosaure
    description: |-
      ## Actions

      ***Griffes***. *Corps à corps* : +6, allonge 1,50 m. *Touché* : 8 (1d8 + 4) dégâts tranchants. Si la cible est une créature de taille G ou inférieure et si l'allosaure s'est déplacé en ligne droite d'un minimum de 9 m juste avant de la toucher, la cible subit l'état À terre et l'allosaure peut effectuer contre elle une attaque de Morsure.

      ***Morsure***. *Corps à corps* : +6, allonge 1,50 m. *Touché* : 15 (2d10 + 4) dégâts perforants.
    senses: Perception passive 15
    languages:
    - aucune
