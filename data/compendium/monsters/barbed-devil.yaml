translations:
  en:
    name: Barbed Devil
    subtype: Devil
    description: |-
      ## Traits

      ***Barbed Hide***. At the start of each of its turns, the devil deals 5 (1d10) Piercing damage to any creature it is grappling or any creature grappling it.

      ***Diabolical Restoration***. If the devil dies outside the Nine Hells, its body disappears in sulfurous smoke, and it gains a new body instantly, reviving with all its Hit Points somewhere in the Nine Hells.

      ***Magic Resistance***. The devil has Advantage on saving throws against spells and other magical effects.

      ## Actions

      ***Multiattack***. The devil makes one Claws attack and one Tail attack, or it makes two Hurl Flame attacks.

      ***Claws***. *Melee Attack Roll* : +6, reach 5 ft. *Hit* : 10 (2d6 + 3) Piercing damage. If the target is a Large or smaller creature, it has the Grappled condition (escape DC 13) from both claws.

      ***Tail***. *Melee Attack Roll* : +6, reach 10 ft. *Hit* : 14 (2d10 + 3) Slashing damage.

      ***Hurl Flame***. *Ranged Attack Roll* : +5, range 150 ft. *Hit* : 17 (5d6) Fire damage. If the target is a flammable object that isn't being worn or carried, it starts burning.
    senses: Darkvision 120 ft. (unimpeded by magical Darkness), Passive Perception
      18
    languages:
    - Infernal; telepathy 120 ft.
  fr:
    name: Diable barbelé
    subtype: Diable
    description: |-
      ## Traits

      ***Peau barbelée***. Au début de chacun de ses tours, le diable barbelé inflige 5 (1d10) dégâts perforants à toute créature qui l'agrippe ou que lui-même agrippe.

      ***Résistance à la magie***. Le diable a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.

      ***Restauration diabolique***. Si le diable meurt hors des Neuf Enfers, son corps disparaît dans un nuage de fumée sulfureuse, tandis qu'il en acquiert aussitôt un nouveau et revient à la vie avec tous ses pv quelque part dans les Neuf Enfers.

      ## Actions

      ***Attaques multiples***. Le diable effectue une attaque de Griffes et une de Queue, ou bien il effectue deux attaques de Jet de flammes.

      ***Griffes***. *Corps à corps* : +6, allonge 1,50 m. *Touché* : 10 (2d6 + 3) dégâts perforants. Si la cible est une créature de taille G ou inférieure, elle subit l'état Agrippé (évasion DD 13) par les deux griffes.

      ***Queue***. *Corps à corps* : +6, allonge 3 m. *Touché* : 14 (2d10 + 3) dégâts tranchants.

      ***Jet de flammes***. *À distance* : +5, portée 45 m. *Touché* : 17 (5d6) dégâts de feu. Si la cible est un objet inflammable qui n'est porté par personne, elle s'embrase.
    senses: Vision dans le noir 36 m (perce les Ténèbres magiques), Perception passive
      18
    languages:
    - infernal ; télépathie 36 m
