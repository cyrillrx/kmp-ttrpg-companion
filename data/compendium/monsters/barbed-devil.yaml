translations:
  en:
    name: Barbed Devil
    subtype: Devil
    description: |-
      <h2>Traits</h2>
      <p>** <em>Barbed Hide</em>**. At the start of each of its turns, the devil deals 5 (1d10) Piercing damage to any creature it is grappling or any creature grappling it.</p>
      <p><strong><em>Diabolical Restoration</em></strong>. If the devil dies outside the Nine Hells, its body disappears in sulfurous smoke, and it gains a new body instantly, reviving with all its Hit Points somewhere in the Nine Hells.</p>
      <p><strong><em>Magic Resistance</em></strong>. The devil has Advantage on saving throws against spells and other magical effects.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The devil makes one Claws attack and one Tail attack, or it makes two Hurl Flame attacks.</p>
      <p><strong><em>Claws</em></strong>. <em>Melee Attack Roll</em> : +6, reach 5 ft. <em>Hit</em> : 10 (2d6 + 3) Piercing damage. If the target is a Large or smaller creature, it has the Grappled condition (escape DC 13) from both claws.</p>
      <p><strong><em>Tail</em></strong>. <em>Melee Attack Roll</em> : +6, reach 10 ft. <em>Hit</em> : 14 (2d10 + 3) Slashing damage.</p>
      <p><strong><em>Hurl Flame</em></strong>. <em>Ranged Attack Roll</em> : +5, range 150 ft. <em>Hit</em> : 17 (5d6) Fire damage. If the target is a flammable object that isn't being worn or carried, it starts burning.</p>
    senses: Darkvision 120 ft. (unimpeded by magical Darkness), Passive Perception
      18
    languages:
    - Infernal; telepathy 120 ft.
  fr:
    name: Diable barbelé
    subtype: Diable
    description: |-
      <h2>Traits</h2>
      <p>** <em>Peau barbelée</em>**. Au début de chacun de ses tours, le diable barbelé inflige 5 (1d10) dégâts perforants à toute créature qui l'agrippe ou que lui-même agrippe.</p>
      <p><strong><em>Résistance à la magie</em></strong>. Le diable a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.</p>
      <p><strong><em>Restauration diabolique</em></strong>. Si le diable meurt hors des Neuf Enfers, son corps disparaît dans un nuage de fumée sulfureuse, tandis qu'il en acquiert aussitôt un nouveau et revient à la vie avec tous ses pv quelque part dans les Neuf Enfers.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le diable effectue une attaque de Griffes et une de Queue, ou bien il effectue deux attaques de Jet de flammes.</p>
      <p><strong><em>Griffes</em></strong>. <em>Corps à corps</em> : +6, allonge 1,50 m. <em>Touché</em> : 10 (2d6 + 3) dégâts perforants. Si la cible est une créature de taille G ou inférieure, elle subit l'état Agrippé (évasion DD 13) par les deux griffes.</p>
      <p><strong><em>Queue</em></strong>. <em>Corps à corps</em> : +6, allonge 3 m. <em>Touché</em> : 14 (2d10 + 3) dégâts tranchants.</p>
      <p><strong><em>Jet de flammes</em></strong>. <em>À distance</em> : +5, portée 45 m. <em>Touché</em> : 17 (5d6) dégâts de feu. Si la cible est un objet inflammable qui n'est porté par personne, elle s'embrase.</p>
    senses: Vision dans le noir 36 m (perce les Ténèbres magiques), Perception passive
      18
    languages:
    - infernal ; télépathie 36 m
