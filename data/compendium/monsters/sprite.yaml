translations:
  en:
    name: Sprite
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Needle Sword</em>**. <em>Melee Attack Roll</em> : +6, reach 5 ft. <em>Hit</em> : 6 (1d4 + 4) Piercing damage.</p>
      <p><strong><em>Enchanting Bow</em></strong>. <em>Ranged Attack Roll</em> : +6, range 40/160 ft. <em>Hit</em> : 1 Piercing damage, and the target has the Charmed condition until the start of the sprite's next turn.</p>
      <p><strong><em>Heart Sight</em></strong>. <em>Charisma Saving Throw</em> : DC 10, one creature within 5 feet the sprite can see (Celestials, Fiends, and Undead automatically fail the save). <em>Failure</em> : The sprite knows the target's emotions and alignment.</p>
      <p><strong><em>Invisibility</em></strong>. The sprite casts <em><a href="https://www.aidedd.org/spell/invisibility">Invisibility</a></em> on itself, requiring no spell components and using Charisma as the spellcasting ability.</p>
    senses: Passive Perception 13
    languages:
    - Common
    - Elvish
    - Sylvan
  fr:
    name: Esprit follet
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Épée-ingle</em>**. <em>Corps à corps</em> : +6, allonge 1,50 m. <em>Touché</em> : 6 (1d4 + 4) dégâts perforants.</p>
      <p><strong><em>Arc enchanté</em></strong>. <em>À distance</em> : +6, portée 12/48 m. <em>Touché</em> : 1 dégât perforant, et la cible subit l'état Charmé jusqu'au début du prochain tour de l'esprit follet.</p>
      <p><strong><em>Perception du for intérieur</em></strong>. <em>JdS Charisme</em> : DD 10, une créature dans un rayon de 1,50 m que l'esprit follet peut voir (Célestes, Fiélons et Morts-vivants échouent automatiquement au jet de sauvegarde). <em>Échec</em> : l'esprit follet perçoit les émotions et l'alignement de la cible.</p>
      <p><strong><em>Invisibilité</em></strong>. L'esprit follet lance <em><a href="https://www.aidedd.org/spell/fr/invisibilite">invisibilité</a></em> sur lui-même, sans avoir besoin de composantes de sort et en utilisant le Charisme comme caractéristique d'incantation.</p>
    senses: Perception passive 13
    languages:
    - commun
    - elfique
    - sylvestre
