translations:
  en:
    name: Blink Dog
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Bite</em>**. <em>Melee Attack Roll</em> : +5, reach 5 ft. <em>Hit</em> : 5 (1d4 + 3) Piercing damage.</p>
      <h2>Bonus actions</h2>
      <p>** <em>Teleport (Recharge 4-6)</em>**. The dog teleports up to 40 feet to an unoccupied space it can see.</p>
    senses: Darkvision 60 ft., Passive Perception 15
    languages:
    - Blink Dog; understands Elvish and Sylvan but can't speak them
  fr:
    name: Chien esquiveur
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Morsure</em>**. <em>Corps à corps</em> : +5, allonge 1,50 m. <em>Touché</em> : 5 (1d4 + 3) dégâts perforants.</p>
      <h2>Actions Bonus</h2>
      <p>** <em>Téléportation (recharge 4–6)</em>**. Le chien se téléporte d'un maximum de 12 m dans un espace inoccupé qu'il voit.</p>
    senses: Vision dans le noir 18 m, Perception passive 15
    languages:
    - chien esquiveur ; comprend l'elfe et le sylvestre mais ne les parle pas
