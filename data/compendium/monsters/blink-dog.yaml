translations:
  en:
    name: Blink Dog
    subtype: null
    description: '## Actions


      ***Bite***. *Melee Attack Roll* : +5, reach 5 ft. *Hit* : 5 (1d4 + 3) Piercing
      damage.


      ## Bonus actions


      ***Teleport (Recharge 4-6)***. The dog teleports up to 40 feet to an unoccupied
      space it can see.'
    senses: Darkvision 60 ft., Passive Perception 15
    languages:
    - Blink Dog; understands Elvish and Sylvan but can't speak them
  fr:
    name: Chien esquiveur
    subtype: null
    description: '## Actions


      ***Morsure***. *Corps à corps* : +5, allonge 1,50 m. *Touché* : 5 (1d4 + 3)
      dégâts perforants.


      ## Actions Bonus


      ***Téléportation (recharge 4–6)***. Le chien se téléporte d''un maximum de 12
      m dans un espace inoccupé qu''il voit.'
    senses: Vision dans le noir 18 m, Perception passive 15
    languages:
    - chien esquiveur ; comprend l'elfe et le sylvestre mais ne les parle pas
