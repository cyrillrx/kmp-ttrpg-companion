  fr:
    name: Requin géant
    subtype: null
    description: |-
      ## Traits

      ***Respiration aquatique***. Le requin ne peut respirer que sous l'eau.

      ## Actions

      ***Attaques multiples***. Le requin effectue deux attaques de Morsure.

      ***Morsure***. *Corps à corps* : +9 (avec Avantage si la cible n'a pas tous ses pv), allonge 1,50 m. *Touché* : 22 (3d10 + 6) dégâts perforants.
    senses: Vision aveugle 18 m, Perception passive 13
