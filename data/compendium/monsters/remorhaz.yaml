translations:
  en:
    name: Remorhaz
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Heat Aura</em>**. At the end of each of the remorhaz's turns, each creature in a 5-foot Emanation originating from the remorhaz takes 16 (3d10) Fire damage.</p>
      <h2>Actions</h2>
      <p>** <em>Bite</em>**. <em>Melee Attack Roll</em> : +11, reach 10 ft. <em>Hit</em> : 18 (2d10 + 7) Piercing damage plus 14 (4d6) Fire damage. If the target is a Large or smaller creature, it has the Grappled condition (escape DC 17), and it has the Restrained condition until the grapple ends.</p>
      <h2>Bonus actions</h2>
      <p>** <em>Swallow</em>**. <em>Strength Saving Throw</em> : DC 19, one Large or smaller creature Grappled by the remorhaz (it can have up to two creatures swallowed at a time). <em>Failure</em> : The target is swallowed by the remorhaz, and the Grappled condition ends. A swallowed creature has the Blinded and Restrained conditions, it has Total Cover against attacks and other effects outside the remorhaz, and it takes 10 (3d6) Acid damage plus 10 (3d6) Fire damage at the start of each of the remorhaz's turns. If the remorhaz takes 30 damage or more on a single turn from a creature inside it, the remorhaz must succeed on a DC 15 Constitution saving throw at the end of that turn or regurgitate all swallowed creatures, each of which falls in a space within 5 feet of the remorhaz and has the Prone condition. If the remorhaz dies, any swallowed creature no longer has the Restrained condition and can escape from the corpse by using 15 feet of movement, exiting Prone.</p>
    senses: Darkvision 60 ft., Tremorsense 60 ft., Passive Perception 10
    languages: []
  fr:
    name: Remorhaz
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Aura de chaleur</em>**. À la fin de chacun des tours du remorhaz, chaque créature dans une Émanation de 1,50 m centrée sur lui subit 16 (3d10) dégâts de feu.</p>
      <h2>Actions</h2>
      <p>** <em>Morsure</em>**. <em>Corps à corps</em> : +11, allonge 3 m. <em>Touché</em> : 18 (2d10 + 7) dégâts perforants plus 14 (4d6) dégâts de feu. Si la cible est une créature de taille G ou inférieure, elle subit l'état Agrippé (évasion DD 17), ainsi que l'état Entravé tant qu'elle est agrippée.</p>
      <h2>Actions Bonus</h2>
      <p>** <em>Engloutissement</em>**. <em>JdS Force</em> : DD 19, une créature de taille G ou inférieure Agrippée par le remorhaz (qui peut contenir simultanément un maximum de deux créatures englouties). <em>Échec</em> : la cible est engloutie par le remorhaz, et l'état Agrippé prend fin. Une créature engloutie subit les états Aveuglé et Entravé, bénéficie d'un Abri total contre les attaques et effets émanant de l'extérieur du remorhaz et subit 10 (3d6) dégâts d'acide plus 10 (3d6) dégâts de feu au début de chacun des tours du monstre. Si le remorhaz subit 30 dégâts ou plus lors d'un même tour de la part d'une créature engloutie, il doit réussir un jet de sauvegarde de Constitution DD 15 à la fin de ce tour sous peine de régurgiter toutes les créatures englouties, chacune tombant dans un espace situé dans un rayon de 1,50 m et subissant l'état À terre. Si le remorhaz meurt, les créatures englouties ne subissent plus l'état Entravé et peuvent s'extraire du cadavre en dépensant 4,50 m de déplacement, pour se retrouver avec l'état À terre.</p>
    senses: Vision dans le noir 18 m, perception des vibrations 18 m, Perception passive
      10
