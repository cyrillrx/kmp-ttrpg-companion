  en:
    name: Hippogriff
    subtype: null
    description: |-
      ## Traits

      ***Flyby***. The hippogriff doesn't provoke an Opportunity Attack when it flies out of an enemy's reach.

      ## Actions

      ***Multiattack***. The hippogriff makes two Rend attacks.

      ***Rend***. *Melee Attack Roll* : +5, reach 5 ft. *Hit* : 7 (1d8 + 3) Slashing damage.
    senses: Passive Perception 15
    languages:
    - None
  fr:
    name: Hippogriffe
    subtype: null
    description: |-
      ## Traits

      ***Repli aérien***. L'hippogriffe ne provoque pas d'attaque d'Opportunité lorsqu'il quitte la zone d'allonge d'un ennemi en volant.

      ## Actions

      ***Attaques multiples***. L'hippogriffe effectue deux attaques de Saignée.

      ***Saignée***. *Corps à corps* : +5, allonge 1,50 m. *Touché* : 7 (1d8 + 3) dégâts tranchants.
    senses: Perception passive 15
    languages:
    - aucune
