  en:
    name: Vampire Umbral Lord
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Legendary Resistance (3/Day, or 4/Day in Lair)</em>**. If the vampire fails a saving throw, it can choose to succeed instead.</p>
      <p><strong><em>Shadow Escape</em></strong>. If the vampire drops to 0 Hit Points outside its resting place, it teleports into its resting place unless it is in running water or sunlight. If it can't teleport, it is destroyed. Once inside its resting place, it has the Paralyzed condition for 1 hour, after which it regains 1 Hit Point.</p>
      <p><strong><em>Vampire Weakness</em></strong>. The vampire has these weaknesses:</p>
      <p><strong><em>Forbiddance</em></strong>. The vampire can't enter a residence without an invitation from an occupant.</p>
      <p><strong><em>Running Water</em></strong>. The vampire takes 20 Acid damage if it ends its turn in running water.</p>
      <p><strong><em>Stake to the Heart</em></strong>. If a weapon that deals Piercing damage is driven into the vampire's heart while the vampire has the Incapacitated condition in its resting place, the vampire has the Paralyzed condition until the weapon is removed.</p>
      <p><strong><em>Sunlight</em></strong>. The vampire takes 20 Radiant damage if it starts its turn in sunlight. While in sunlight, it has Disadvantage on attack rolls and ability checks.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The vampire makes two attacks, using Grave Strike or Sickening Ray in any combination.</p>
      <p><strong><em>Grave Strike</em></strong>. <em>Melee Attack Roll</em> : +10, reach 5 ft. <em>Hit</em> : 9 (1d8 + 5) Slashing damage plus 13 (3d8) Necrotic damage.</p>
      <p><strong><em>Hunger of Hadar (Recharge 5–6)</em></strong>. The vampire casts <em><a href="https://www.aidedd.org/spell/hunger-of-hadar">Hunger of Hadar</a></em> (level 5 version), requiring no spell components and using Charisma as the spellcasting ability (spell save DC 18).</p>
      <p><strong><em>Sickening Ray</em></strong>. <em>Ranged Attack Roll</em> : +10, range 120 ft. <em>Hit</em> : 16 (2d10 + 5) Necrotic damage, and the target has the Poisoned condition until the start of the vampire's next turn.</p>
      <h2>Bonus actions</h2>
      <p>** <em>Sanguine Drain</em>**. <em>Constitution Saving Throw</em> : DC 18, one creature the vampire can see within 30 feet that isn't a Construct or an Undead. <em>Failure</em> : 14 (4d6) Necrotic damage. The target's Hit Point maximum decreases by an amount equal to the damage taken, and the vampire regains Hit Points equal to that amount.</p>
      <h2>Legendary actions</h2>
      <p>Legendary Action Uses: 3 (4 in Lair). Immediately after another creature's turn, the vampire umbral lord can expend a use to take one of the following actions. The vampire umbral lord regains all expended uses at the start of each of its turns. </p>
      <p><strong><em>Beguile</em></strong>. The vampire casts <em><a href="https://www.aidedd.org/spell/command">Command</a></em> , requiring no spell components and using Charisma as the spellcasting ability (spell save DC 18). The vampire can't take this action again until the start of its next turn.</p>
      <p><strong><em>Umbral Strike</em></strong>. The vampire moves up to half its Speed, and it makes one Grave Strike or Sickening Ray attack.</p>
    senses: Blindsight 120 ft., Passive Perception 23
    languages:
    - Common plus three other languages
