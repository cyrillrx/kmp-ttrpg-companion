translations:
  en:
    name: Hell Hound
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Pack Tactics</em>**. The hound has Advantage on an attack roll against a creature if at least one of the hound's allies is within 5 feet of the creature and the ally doesn't have the Incapacitated condition.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The hound makes two Bite attacks.</p>
      <p><strong><em>Bite</em></strong>. <em>Melee Attack Roll</em> : +5, reach 5 ft. <em>Hit</em> : 7 (1d8 + 3) Piercing damage plus 3 (1d6) Fire damage.</p>
      <p><strong><em>Fire Breath (Recharge 5–6)</em></strong>. <em>Dexterity Saving Throw</em> : DC 12, each creature in a 15-foot Cone. <em>Failure</em> : 17 (5d6) Fire damage. <em>Success</em> : Half damage.</p>
    senses: Darkvision 60 ft., Passive Perception 15
    languages:
    - Understands Infernal but can't speak
  fr:
    name: Molosse infernal
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Tactique de meute</em>**. Quand au moins un de ses alliés non Incapable d'agir se situe dans un rayon de 1,50 m de la créature qu'il cible, le molosse a un Avantage au jet d'attaque correspondant contre cette créature.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le molosse effectue deux attaques de Morsure.</p>
      <p><strong><em>Morsure</em></strong>. <em>Corps à corps</em> : +5, allonge 1,50 m. <em>Touché</em> : 7 (1d8 + 3) dégâts perforants plus 3 (1d6) dégâts de feu.</p>
      <p><strong><em>Souffle de feu (recharge 5–6)</em></strong>. <em>JdS Dextérité</em> : DD 12, chaque créature dans un Cône de 4,50 m. <em>Échec</em> : 17 (5d6) dégâts de feu. <em>Réussite</em> : demi-dégâts.</p>
    senses: Vision dans le noir 18 m, Perception passive 15
    languages:
    - comprend l'infernal mais ne parle pas
