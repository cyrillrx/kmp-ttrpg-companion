translations:
  en:
    name: Bandit Deceiver
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The bandit makes three Dagger attacks.</p>
      <p><strong><em>Dagger</em></strong>. <em>Melee or Ranged Attack Roll</em> : +6, reach 5 ft. or range 20/60 ft. <em>Hit</em> : 8 (2d4 + 3) Piercing damage plus 10 (3d6) Poison damage.</p>
      <p><strong><em>Blinding Flash (Recharge 4–6)</em></strong>. <em>Constitution Saving Throw</em> : DC 14, each creature in a 10-foot-radius Sphere centered on a point the bandit can see within 120 feet. <em>Failure</em> : 13 (3d6 + 3) Radiant damage, and the target has the Blinded condition until the start of the bandit's next turn. <em>Success</em> : Half damage only.</p>
      <p><strong><em>Spellcasting</em></strong>. The bandit casts one of the following spells, using Intelligence as the spellcasting ability (spell save DC 14):</p>
      <p>At will: <em><a href="https://www.aidedd.org/spell/disguise-self">Disguise Self</a>, <a href="https://www.aidedd.org/spell/mage-hand">Mage Hand</a>, <a href="https://www.aidedd.org/spell/minor-illusion">Minor Illusion</a></em><br />
      1/day each: <em><a href="https://www.aidedd.org/spell/hold-person">Hold Person</a></em> (level 4 version), <em><a href="https://www.aidedd.org/spell/mage-armor">Mage Armor</a></em> (included in AC), <em><a href="https://www.aidedd.org/spell/major-image">Major Image</a></em></p>
    senses: Passive Perception 14
    languages:
    - Common
    - Thieves' Cant
  fr:
    name: Bandit, embrouilleur
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le bandit effectue trois attaques de Dague.</p>
      <p><strong><em>Dague</em></strong>. <em>Corps à corps ou à distance</em> : +6, allonge 1,50 m ou portée 6/18 m. <em>Touché</em> : 8 (2d4 + 3) dégâts perforants plus 10 (3d6) dégâts de poison.</p>
      <p><strong><em>Éclat aveuglant (recharge 4–6)</em></strong>. <em>JdS Constitution</em> : DD 14, chaque créature dans une Sphère de 3 m de rayon centrée sur un point que le bandit peut voir dans un rayon de 36 m. <em>Échec</em> : 13 (3d6 + 3) dégâts radiants, et la cible subit l'état Aveuglé jusqu'au début du prochain tour du bandit. <em>Réussite</em> : demi-dégâts uniquement.</p>
      <p><strong><em>Incantation</em></strong>. Le bandit lance l'un des sorts suivants, l'Intelligence étant sa caractéristique d'incantation (DD de sauvegarde 14) :</p>
      <p>À volonté : <em><a href="https://www.aidedd.org/spell/fr/déguisement">déguisement</a>, <a href="https://www.aidedd.org/spell/fr/main-de-mage">main de mage</a>, <a href="https://www.aidedd.org/spell/fr/illusion-mineure">illusion mineure</a></em><br />
      1/jour chacun : <em><a href="https://www.aidedd.org/spell/fr/immobilisation-de-personne">immobilisation de personne</a></em> (au niveau 4), <em><a href="https://www.aidedd.org/spell/fr/armure-de-mage">armure de mage</a></em> (compris dans la CA), <em><a href="https://www.aidedd.org/spell/fr/image-majeure">image majeure</a></em></p>
    senses: Perception passive 14
    languages:
    - commun
    - jargon des voleurs
