translations:
  en:
    name: Nothic
    subtype: null
    description: '## Actions


      ***Multiattack***. The nothic makes two Claw attacks.


      ***Claw***. *Melee Attack Roll* : +5, reach 5 ft. *Hit* : 8 (1d10 + 3) Slashing
      damage.


      ***Rotting Gaze***. *Constitution Saving Throw* : DC 13, one creature the nothic
      can see within 120 feet. *Failure* : 17 (5d6) Necrotic damage. *Success* : Half
      damage.


      ## Bonus actions


      ***Weird Insight (Recharge 6)***. *Wisdom Saving Throw* : DC 14, one creature
      the nothic can see within 120 feet. *Failure* : The nothic magically learns
      one fact or secret about the target.'
    senses: Truesight 120 ft., Passive Perception 14
    languages:
    - Undercommon
  fr:
    name: Nothic
    subtype: null
    description: '## Actions


      ***Attaques multiples***. Le nothic effectue deux attaques de Griffe.


      ***Griffe***. *Corps à corps* : +5, allonge 1,50 m. *Touché* : 8 (1d10 + 3)
      dégâts tranchants.


      ***Regard putréfiant***. *JdS Constitution* : DD 13, une créature que le nothic
      voit dans un rayon de 36 m. *Échec* : 17 (5d6) dégâts nécrotiques. *Réussite*
      : demi-dégâts.


      ## Actions Bonus


      ***Intuition étrange (recharge 6)***. *JdS Sagesse* : DD 14, une créature que
      le nothic voit dans un rayon de 36 m. *Échec* : le nothic apprend magiquement
      un fait ou un secret concernant la cible.'
    senses: vision véritable 36 m, Perception passive 14
    languages:
    - commun des profondeurs
