translations:
  en:
    name: Nothic
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The nothic makes two Claw attacks.</p>
      <p><strong><em>Claw</em></strong>. <em>Melee Attack Roll</em> : +5, reach 5 ft. <em>Hit</em> : 8 (1d10 + 3) Slashing damage.</p>
      <p><strong><em>Rotting Gaze</em></strong>. <em>Constitution Saving Throw</em> : DC 13, one creature the nothic can see within 120 feet. <em>Failure</em> : 17 (5d6) Necrotic damage. <em>Success</em> : Half damage.</p>
      <h2>Bonus actions</h2>
      <p>** <em>Weird Insight (Recharge 6)</em>**. <em>Wisdom Saving Throw</em> : DC 14, one creature the nothic can see within 120 feet. <em>Failure</em> : The nothic magically learns one fact or secret about the target.</p>
    senses: Truesight 120 ft., Passive Perception 14
    languages:
    - Undercommon
  fr:
    name: Nothic
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le nothic effectue deux attaques de Griffe.</p>
      <p><strong><em>Griffe</em></strong>. <em>Corps à corps</em> : +5, allonge 1,50 m. <em>Touché</em> : 8 (1d10 + 3) dégâts tranchants.</p>
      <p><strong><em>Regard putréfiant</em></strong>. <em>JdS Constitution</em> : DD 13, une créature que le nothic voit dans un rayon de 36 m. <em>Échec</em> : 17 (5d6) dégâts nécrotiques. <em>Réussite</em> : demi-dégâts.</p>
      <h2>Actions Bonus</h2>
      <p>** <em>Intuition étrange (recharge 6)</em>**. <em>JdS Sagesse</em> : DD 14, une créature que le nothic voit dans un rayon de 36 m. <em>Échec</em> : le nothic apprend magiquement un fait ou un secret concernant la cible.</p>
    senses: vision véritable 36 m, Perception passive 14
    languages:
    - commun des profondeurs
