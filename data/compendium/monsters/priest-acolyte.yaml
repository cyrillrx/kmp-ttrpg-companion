translations:
  en:
    name: Priest Acolyte
    subtype: Cleric
    description: |-
      ## Actions

      ***Mace***. *Melee Attack Roll* : +4, reach 5 ft. *Hit* : 5 (1d6 + 2) Bludgeoning damage plus 2 (1d4) Radiant damage.

      ***Radiant Flame***. *Ranged Attack Roll* : +4, range 60 ft. *Hit* : 7 (2d6) Radiant damage.

      ***Spellcasting***. The priest casts one of the following spells, using Wisdom as the spellcasting ability:

      At will: *[Light](https://www.aidedd.org/spell/light), [Thaumaturgy](https://www.aidedd.org/spell/thaumaturgy)*

      ## Bonus actions

      ***Divine Aid (1/Day)***. The priest casts *[Bless](https://www.aidedd.org/spell/bless), [Healing Word](https://www.aidedd.org/spell/healing-word)*, or *[Sanctuary](https://www.aidedd.org/spell/sanctuary)* , using the same spellcasting ability as Spellcasting.
    senses: Passive Perception 12
    languages:
    - Common
  fr:
    name: Prêtre, acolyte
    subtype: Clerc
    description: |-
      ## Actions

      ***Masse d'armes***. *Corps à corps* : +4, allonge 1,50 m. *Touché* : 5 (1d6 + 2) dégâts contondants plus 2 (1d4) dégâts radiants.

      ***Flamme radiante***. *À distance* : +4, portée 18 m. *Touché* : 7 (2d6) dégâts radiants.

      ***Incantation***. Le prêtre lance l'un des sorts suivants, la Sagesse étant sa caractéristique d'incantation :

      À volonté : *lumière,[thaumaturgie](https://www.aidedd.org/spell/fr/thaumaturgie)*

      ## Actions Bonus

      ***Soutien divin (1/jour)***. L'acolyte lance *bénédiction, mot de guérison* ou *sanctuaire* , avec la même caractéristique d'incantation que pour Incantation.
    senses: Perception passive 12
    languages:
    - commun
