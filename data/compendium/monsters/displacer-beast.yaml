translations:
  en:
    name: Displacer Beast
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Avoidance</em>**. If the displacer beast is subjected to an effect that allows it to make a saving throw to take only half damage, it instead takes no damage if it succeeds on the save and half damage if it fails. It can't use this trait if it has the Incapacitated condition.</p>
      <p><strong><em>Displacement</em></strong>. Attack rolls against the displacer beast have Disadvantage, since it projects an illusion that makes it appear to be near its actual location. This trait is suppressed while the displacer beast has the Incapacitated condition.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The displacer beast makes one Rend attack and one Tentacle attack.</p>
      <p><strong><em>Rend</em></strong>. <em>Melee Attack Roll</em> : +6, reach 5 ft. <em>Hit</em> : 9 (1d10 + 4) Slashing damage. If target is a Large or smaller creature, it has the Prone condition.</p>
      <p><strong><em>Tentacle</em></strong>. <em>Melee Attack Roll</em> : +6, reach 10 ft. <em>Hit</em> : 11 (2d6 + 4) Piercing damage.</p>
    senses: Darkvision 60 ft., Passive Perception 11
    languages:
    - Understands Sylvan but can't speak
  fr:
    name: Bête éclipsante
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Évitement</em>**. Si la bête éclipsante est soumise à un effet lui permettant d'effectuer un jet de sauvegarde pour ne subir que la moitié des dégâts, elle ne subit aucun dégât en cas de réussite et la moitié en cas d'échec. Elle ne peut pas utiliser cette capacité si elle subit l'état Incapable d'agir.</p>
      <p><strong><em>Décalage</em></strong>. Les jets d'attaque contre la bête éclipsante ont un Désavantage, car elle projette une illusion la faisant apparaître proche de son emplacement réel. Cet effet est supprimé si la bête éclipsante subit l'effet Incapable d'agir.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. La bête éclipsante effectue une attaque de Saignée et une attaque de Tentacule.</p>
      <p><strong><em>Saignée</em></strong>. <em>Corps à corps</em> : +6, allonge 1,50 m. <em>Touché</em> : 9 (1d10 + 4) dégâts tranchants. Si la cible est une créature de taille G ou inférieure, elle subit l'état À terre.</p>
      <p><strong><em>Tentacule</em></strong>. <em>Corps à corps</em> : +6, allonge 3 m. <em>Touché</em> : 11 (2d6 + 4) dégâts perforants.</p>
    senses: Vision dans le noir 18 m, Perception passive 11
    languages:
    - comprend le sylvestre mais ne parle pas
