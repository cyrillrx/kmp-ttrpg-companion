translations:
  en:
    name: Knight
    subtype: null
    description: |-
      ## Actions

      ***Multiattack***. The knight makes two attacks, using Greatsword or Heavy Crossbow in any combination.

      ***Greatsword***. *Melee Attack Roll* : +5, reach 5 ft. *Hit* : 10 (2d6+ 3) Slashing damage plus 4 (1d8) Radiant damage.

      ***Heavy Crossbow***. *Ranged Attack Roll* : +2, range 100/400 ft. *Hit* : 11 (2d10) Piercing damage plus 4 (1d8) Radiant damage.

      ## Reactions

      ***Parry***. *Trigger* : The knight is hit by a melee attack roll while holding a weapon. *Response* : The knight adds 2 to its AC against that attack, possibly causing it to miss.
    senses: Passive Perception 10
    languages:
    - Common plus one other language
  fr:
    name: Chevalier
    subtype: null
    description: |-
      ## Actions

      ***Attaques multiples***. Le chevalier effectue deux attaques, réparties à sa guise entre Épée à deux mains et Arbalète lourde.

      ***Épée à deux mains***. *Corps à corps* : +5, allonge 1,50 m. *Touché* : 10 (2d6 + 3) dégâts tranchants plus 4 (1d8) dégâts radiants.

      ***Arbalète lourde***. *À distance* : +2, portée 30/120 m. *Touché* : 11 (2d10) dégâts perforants plus 4 (1d8) dégâts radiants.

      ## Réactions

      ***Parade***. *Déclencheur* : le chevalier est touché par un jet d'attaque de corps à corps alors qu'il tient une arme. *Conséquences* : le chevalier ajoute 2 à sa CA contre cette attaque, ce qui peut la faire rater.
    senses: Perception passive 10
    languages:
    - commun plus une autre langue
