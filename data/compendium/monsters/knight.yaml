translations:
  en:
    name: Knight
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The knight makes two attacks, using Greatsword or Heavy Crossbow in any combination.</p>
      <p><strong><em>Greatsword</em></strong>. <em>Melee Attack Roll</em> : +5, reach 5 ft. <em>Hit</em> : 10 (2d6+ 3) Slashing damage plus 4 (1d8) Radiant damage.</p>
      <p><strong><em>Heavy Crossbow</em></strong>. <em>Ranged Attack Roll</em> : +2, range 100/400 ft. <em>Hit</em> : 11 (2d10) Piercing damage plus 4 (1d8) Radiant damage.</p>
      <h2>Reactions</h2>
      <p>** <em>Parry</em>**. <em>Trigger</em> : The knight is hit by a melee attack roll while holding a weapon. <em>Response</em> : The knight adds 2 to its AC against that attack, possibly causing it to miss.</p>
    senses: Passive Perception 10
    languages:
    - Common plus one other language
  fr:
    name: Chevalier
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le chevalier effectue deux attaques, réparties à sa guise entre Épée à deux mains et Arbalète lourde.</p>
      <p><strong><em>Épée à deux mains</em></strong>. <em>Corps à corps</em> : +5, allonge 1,50 m. <em>Touché</em> : 10 (2d6 + 3) dégâts tranchants plus 4 (1d8) dégâts radiants.</p>
      <p><strong><em>Arbalète lourde</em></strong>. <em>À distance</em> : +2, portée 30/120 m. <em>Touché</em> : 11 (2d10) dégâts perforants plus 4 (1d8) dégâts radiants.</p>
      <h2>Réactions</h2>
      <p>** <em>Parade</em>**. <em>Déclencheur</em> : le chevalier est touché par un jet d'attaque de corps à corps alors qu'il tient une arme. <em>Conséquences</em> : le chevalier ajoute 2 à sa CA contre cette attaque, ce qui peut la faire rater.</p>
    senses: Perception passive 10
    languages:
    - commun plus une autre langue
