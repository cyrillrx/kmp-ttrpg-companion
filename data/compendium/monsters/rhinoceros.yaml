      <h2>Actions</h2>
      <p>** <em>Gore</em>**. <em>Melee Attack Roll</em> : +7, reach 5 ft. <em>Hit</em> : 14 (2d8 + 5) Piercing damage. If target is a Large or smaller creature and the rhinoceros moved 20+ feet straight toward it immediately before the hit, the target takes an extra 9 (2d8) Piercing damage and has the Prone condition.</p>
