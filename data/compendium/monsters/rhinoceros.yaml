    description: |-
      <h2>Actions</h2>
      <p>** <em>Coup de corne</em>**. <em>Corps à corps</em> : +7, allonge 1,50 m. <em>Touché</em> : 14 (2d8 + 5) dégâts perforants. Si la cible est une créature de taille G ou inférieure et si le rhinocéros s'est déplacé en ligne droite d'un minimum de 6 m juste avant de la toucher, la cible subit 9 (2d8) dégâts perforants supplémentaires, ainsi que l'état À terre.</p>
    senses: Perception passive 11
