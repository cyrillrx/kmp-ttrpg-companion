  en:
    name: Archelon
    subtype: Dinosaur
    description: |-
      <h2>Traits</h2>
      <p>** <em>Amphibious</em>**. The archelon can breathe air and water.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The archelon makes two Bite attacks.</p>
      <p><strong><em>Bite</em></strong>. <em>Melee Attack Roll</em> : +6, reach 5 ft. <em>Hit</em> : 14 (3d6 + 4) Piercing damage.</p>
    senses: Passive Perception 12
    languages:
    - None
  fr:
    name: Archélon
    subtype: Dinosaure
    description: |-
      <h2>Traits</h2>
      <p>** <em>Amphibie</em>**. L'archélon peut respirer sous l'eau comme à l'air libre.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. L'archélon effectue deux attaques de Morsure.</p>
      <p><strong><em>Morsure</em></strong>. <em>Corps à corps</em> : +6, allonge 1,50 m. <em>Touché</em> : 14 (3d6 + 4) dégâts perforants.</p>
    senses: Perception passive 12
