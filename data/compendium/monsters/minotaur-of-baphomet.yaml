translations:
  en:
    name: Minotaur of Baphomet
    subtype: null
    description: '## Actions


      ***Abyssal Glaive***. *Melee Attack Roll* : +6, reach 10 ft. *Hit* : 10 (1d12
      + 4) Slashing damage plus 10 (3d6) Necrotic damage.


      ***Gore (Recharge 5–6)***. *Melee Attack Roll* : +6, reach 5 ft. *Hit* : 18
      (4d6 + 4) Piercing damage. If the target is a Large or smaller creature and
      the minotaur moved 10+ feet straight toward it immediately before the hit, the
      target takes an extra 10 (3d6) Piercing damage and has the Prone condition.'
    senses: Darkvision 60 ft., Passive Perception 17
    languages:
    - Abyssal
  fr:
    name: Minotaure de Baphomet
    subtype: null
    description: '## Actions


      ***Coup de corne (recharge 5–6)***. *Corps à corps* : +6, allonge 1,50 m. *Touché*
      : 18 (4d6 + 4) dégâts perforants. Si la cible est une créature de taille G ou
      inférieure et si le minotaure s''est déplacé en ligne droite d''un minimum de
      3 m juste avant de la toucher, la cible subit 10 (3d6) dégâts perforants supplémentaires,
      ainsi que l''état À terre.


      ***Coutille abyssale***. *Corps à corps* : +6, allonge 3 m. *Touché* : 10 (1d12
      + 4) dégâts tranchants plus 10 (3d6) dégâts nécrotiques.'
    senses: Vision dans le noir 18 m, Perception passive 17
    languages:
    - abyssal
