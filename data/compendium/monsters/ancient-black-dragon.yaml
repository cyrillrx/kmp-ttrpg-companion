translations:
  en:
    name: Ancient Black Dragon
    subtype: Chromatic
    description: |-
      <h2>Traits</h2>
      <p>** <em>Amphibious</em>**. The dragon can breathe air and water.</p>
      <p><strong><em>Legendary Resistance (4/Day, or 5/Day in Lair)</em></strong>. If the dragon fails a saving throw, it can choose to succeed instead.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The dragon makes three Rend attacks. It can replace one attack with a use of Spellcasting to cast <em><a href="https://www.aidedd.org/spell/melf-s-acid-arrow">Melf's Acid Arrow</a></em> (level 4 version).</p>
      <p><strong><em>Rend</em></strong>. <em>Melee Attack Roll</em> : +15, reach 15 ft. <em>Hit</em> : 17 (2d8 + 8) Slashing damage plus 9 (2d8) Acid damage.</p>
      <p><strong><em>Acid Breath (Recharge 5–6)</em></strong>. <em>Dexterity Saving Throw</em> : DC 22, each creature in a 90-foot-long, 10-foot-wide Line. <em>Failure</em> : 67 (15d8) Acid damage. <em>Success</em> : Half damage.</p>
      <p><strong><em>Spellcasting</em></strong>. The dragon casts one of the following spells, requiring no Material components and using Charisma as the spellcasting ability (spell save DC 21, +13 to hit with spell attacks):</p>
      <p>At Will: <em><a href="https://www.aidedd.org/spell/detect-magic">Detect Magic</a>, <a href="https://www.aidedd.org/spell/fear">Fear</a>, <a href="https://www.aidedd.org/spell/melf-s-acid-arrow">Melf's Acid Arrow</a></em> (level 4 version)<br />
      1/Day Each: <em><a href="https://www.aidedd.org/spell/create-undead">Create Undead</a>, <a href="https://www.aidedd.org/spell/speak-with-dead">Speak with Dead</a>, <a href="https://www.aidedd.org/spell/vitriolic-sphere">Vitriolic Sphere</a></em> (level 5 version)  </p>
      <h2>Legendary actions</h2>
      <p>Legendary Action Uses: 3 (4 in Lair). Immediately after another creature's turn, the dragon can expend a use to take one of the following actions. The dragon regains all expended uses at the start of each of its turns. </p>
      <p><strong><em>Cloud of Insects</em></strong>. <em>Dexterity Saving Throw</em> : DC 21, one creature the dragon can see within 120 feet. <em>Failure</em> : 33 (6d10) Poison damage, and the target has Disadvantage on saving throws to maintain Concentration until the end of its next turn. <em>Failure or Success</em> : The dragon can't take this action again until the start of its next turn.</p>
      <p><strong><em>Frightful Presence</em></strong>. The dragon uses Spellcasting to cast <em><a href="https://www.aidedd.org/spell/fear">Fear</a></em>. The dragon can't take this action again until the start of its next turn.</p>
      <p><strong><em>Pounce</em></strong>. The dragon moves up to half its Speed, and it makes one Rend attack.</p>
    senses: Blindsight 60 ft., Darkvision 120 ft., Passive Perception 26
    languages:
    - Common
    - Draconic
  fr:
    name: Dragon noir, ancien
    subtype: Chromatique
    description: |-
      <h2>Traits</h2>
      <p>** <em>Amphibie</em>**. Le dragon peut respirer sous l'eau comme à l'air libre.</p>
      <p><strong><em>Résistance légendaire (4/jour, ou 5/jour dans son antre)</em></strong>. Si le dragon rate un jet de sauvegarde, il peut décider de le réussir tout de même.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le dragon effectue trois attaques de Saignée. Il peut remplacer l'une de ces attaques par une utilisation d'Incantation pour lancer <em>flèche acide</em> (au niveau 4).</p>
      <p><strong><em>Saignée</em></strong>. <em>Corps à corps</em> : +15, allonge 4,50 m. <em>Touché</em> : 17 (2d8 + 8) dégâts tranchants plus 9 (2d8) dégâts d'acide.</p>
      <p><strong><em>Incantation</em></strong>. Le dragon lance l'un des sorts suivants, sans composantes matérielles, le Charisme étant sa caractéristique d'incantation (DD de sauvegarde 21, +13 pour toucher) :</p>
      <p>À volonté : <em><a href="https://www.aidedd.org/spell/fr/detection-de-la-magie">détection de la magie</a>, flèche acide</em> (au niveau 4), <em>peur</em><br />
      1/jour chacun : <em>communication avec les morts, création de mort-vivant, sphère de vitriol</em> (au niveau 4)  </p>
      <p><strong><em>Souffle d'acide (recharge 5–6)</em></strong>. <em>JdS Dextérité</em> : DD 22, chaque créature dans une Ligne de 27 m de long sur 3 m de large. <em>Échec</em> : 67 (15d8) dégâts d'acide. <em>Réussite</em> : demi-dégâts.</p>
      <h2>Actions Légendaires</h2>
      <p>Utilisations d'action Légendaire : 3 (4 dans son antre). Aussitôt après le tour d'une autre créature, le dragon peut dépenser une utilisation pour entreprendre l'une des actions ci-après. Le dragon récupère toutes ses utilisations dépensées au début de chacun de ses tours. </p>
      <p><strong><em>Assaut incisif</em></strong>. Le dragon se déplace à concurrence de la moitié de sa Vitesse et effectue une attaque de Saignée.</p>
      <p><strong><em>Nuage d'insectes</em></strong>. <em>JdS Dextérité</em> : DD 21, une créature que le dragon voit dans un rayon de 36 m. <em>Échec</em> : 33 (6d10) dégâts de poison, et la cible subit un Désavantage aux jets de sauvegarde visant à maintenir sa Concentration, jusqu'à la fin de son tour suivant. <em>Échec ou réussite</em> : Le dragon ne peut alors plus entreprendre cette action jusqu'au début de son tour suivant.</p>
      <p><strong><em>Présence terrifiante</em></strong>. Le dragon recourt à Incantation pour lancer <em>peur</em>. Le dragon ne peut alors plus entreprendre cette action jusqu'au début de son tour suivant.</p>
    senses: Vision aveugle 18 m, Vision dans le noir 36 m, Perception passive 26
    languages:
    - commun
    - draconique
