translations:
  en:
    name: Bestial Spirit
    subtype: null
    description: |-
      ## Traits

      ***Flyby (Air Only)***. The spirit doesn't provoke Opportunity Attacks when it flies out of an enemy's reach.

      ***Pack Tactics (Land and Water Only)***. The spirit has Advantage on an attack roll against a creature if at least one of the spirit's allies is within 5 feet of the creature and the ally doesn't have the Incapacitated condition.

      ***Water Breathing (Water Only)***. The spirit can breathe only underwater.

      ## Actions

      ***Multiattack***. The spirit makes a number of Rend attacks equal to half this spell's level (round down).

      ***Rend***. *Melee Attack Roll* : Bonus equals your spell attack modifier, reach 5 ft. *Hit* : 1d8 + 4 + the spell's level Piercing damage.
    senses: Darkvision 60 ft., Passive Perception 12
    languages:
    - understands the languages you know
  fr:
    name: Esprit bestial
    subtype: null
    description: |-
      ## Traits

      ***Repli aérien (air uniquement)***. L'esprit ne provoque pas d'attaque d'Opportunité lorsqu'il quitte l'allonge d'un ennemi en volant.

      ***Tactique de meute (terre et eau uniquement)***. L'esprit a un Avantage au jet d'attaque contre une créature si au moins un de ses alliés se trouve dans un rayon de 1,50 m autour de la créature et si cet allié ne subit pas l'état Incapable d'agir.

      ***Respiration aquatique (eau uniquement)***. L'esprit ne peut respirer que sous l'eau.

      ## Actions

      ***Attaques multiples***. L'esprit effectue un nombre d'attaques de Saignée égal à la moitié du niveau de ce sort (arrondir à l'inférieur).

      ***Saignée***. *Corps à corps* : bonus égal à votre modificateur d'attaque des sorts, allonge 1,50 m. *Touché* : 1d8 + 4 + le niveau du sort dégâts perforants.
    senses: Vision dans le noir 18 m, Perception passive 12
    languages:
    - comprend les langues que vous connaissez
