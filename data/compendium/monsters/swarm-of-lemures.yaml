translations:
  en:
    name: Swarm of Lemures
    subtype: Devil
    description: |-
      ## Traits

      ***Hellish Restoration***. If the swarm dies in the Nine Hells, it revives with all its Hit Points in 1d10 days unless it is killed by a creature under the effects of a *[Bless](https://www.aidedd.org/spell/bless)* spell or its remains are sprinkled with Holy Water.

      ***Swarm***. The swarm can occupy another creature's space and vice versa, and the swarm can move through an opening large enough for a Medium creature. The swarm can't regain Hit Points or gain Temporary Hit Points.

      ## Actions

      ***Multiattack***. The swarm makes two Vile Slime attacks.

      ***Vile Slime***. *Melee Attack Roll* : +4, reach 5 ft. *Hit* : 11 (2d8 + 2) Poison damage, or 9 (2d6 + 2) Poison damage if the swarm is Bloodied.
    senses: Darkvision 120 ft. (unimpeded by magical Darkness), Passive Perception
      11
    languages:
    - Understands Infernal but can't speak
  fr:
    name: Nuée de lémures
    subtype: Diable
    description: |-
      ## Traits

      ***Restauration infernale***. Si la nuée meurt dans les Neuf Enfers, elle revient à la vie avec tous ses pv en 1d10 jours sauf si elle est tuée par une créature sous les effets du sort *[bénédiction](https://www.aidedd.org/spell/fr/benediction)* ou si ce qu'il en reste est aspergé d'eau bénite.

      ***Nuée***. La nuée peut occuper l'espace d'une autre créature et réciproquement, et elle peut se déplacer par toute ouverture assez large pour une créature de taille M. La nuée ne peut ni récupérer de points de vie ni recevoir de points de vie temporaires.

      ## Actions

      ***Attaques multiples***. La nuée effectue deux attaques de Limon abject.

      ***Limon abject***. *Corps à corps* : +4, allonge 1,50 m. *Touché* : 11 (2d8 + 2) dégâts de poison, ou 9 (2d6 + 2) dégâts de poison si la nuée est En péril.
    senses: Vision dans le noir 36 m (perce les Ténèbres magiques), Perception passive
      11
    languages:
    - comprend l'infernal mais ne parle pas
