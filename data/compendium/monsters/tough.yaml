translations:
  en:
    name: Tough
    subtype: null
    description: '## Traits


      ***Pack Tactics***. The tough has Advantage on an attack roll against a creature
      if at least one of the tough''s allies is within 5 feet of the creature and
      the ally doesn''t have the Incapacitated condition.


      ## Actions


      ***Mace***. *Melee Attack Roll* : +4, reach 5 ft. *Hit* : 5 (1d6 + 2) Bludgeoning
      damage.


      ***Heavy Crossbow***. *Ranged Attack Roll* : +3, range 100/400 ft. *Hit* : 6
      (1d10 + 1) Piercing damage.'
    senses: Passive Perception 10
    languages:
    - Common
  fr:
    name: Gros-bras
    subtype: null
    description: '## Traits


      ***Tactique de meute***. Quand au moins un de ses alliés non Incapable d''agir
      se situe dans un rayon de 1,50 m de la créature qu''il cible, le gros-bras a
      un Avantage au jet d''attaque correspondant.


      ## Actions


      ***Masse d''armes***. *Corps à corps* : +4, allonge 1,50 m. *Touché* : 5 (1d6
      + 2) dégâts contondants.


      ***Arbalète lourde***. *À distance* : +3, portée 30/120 m. *Touché* : 6 (1d10
      + 1) dégâts perforants.'
    senses: Perception passive 10
    languages:
    - commun
