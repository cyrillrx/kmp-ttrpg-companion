translations:
  en:
    name: Empyrean Iota
    subtype: Titan
    description: |-
      <h2>Traits</h2>
      <p>** <em>Incorporeal Movement</em>**. The empyrean can move through other creatures and objects as if they were Difficult Terrain. It takes 5 (1d10) Force damage if it ends its turn inside an object.</p>
      <p><strong><em>Magic Resistance</em></strong>. The empyrean has Advantage on saving throws against spells and other magical effects.</p>
      <h2>Actions</h2>
      <p>** <em>Otherworldly Strike</em>**. <em>Melee or Ranged Attack Roll</em> : +5. reach 5 ft. or range 30 ft. <em>Hit</em> : 7 (1d8 + 3) Necrotic or Radiant damage (empyrean's choice).</p>
      <p><strong><em>Spellcasting</em></strong>. The empyrean casts one of the following spells, requiring no Material components and using Wisdom as the spellcasting ability.</p>
      <p>1/Day Each: <em><a href="https://www.aidedd.org/spell/bless">Bless</a>, <a href="https://www.aidedd.org/spell/lesser-restoration">Lesser Restoration</a></em> (as an action)  </p>
      <h2>Bonus actions</h2>
      <p>** <em>Healing Word (1/Day)</em>**. The empyrean casts <em><a href="https://www.aidedd.org/spell/healing-word">Healing Word</a></em> , using the same spellcasting ability as Spellcasting.</p>
    senses: Truesight 30 ft., Passive Perception 15
    languages:
    - All
