translations:
  en:
    name: Couatl
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Shielded Mind</em>**. The couatl's thoughts can't be read by any means, and other creatures can communicate with it telepathically only if it allows them.</p>
      <h2>Actions</h2>
      <p>** <em>Bite</em>**. <em>Melee Attack Roll</em> : +7, reach 5 ft. <em>Hit</em> : 11 (1d12 + 5) Piercing damage, and the target has the Poisoned condition until the end of the couatl's next turn.</p>
      <p><strong><em>Constrict</em></strong>. <em>Strength Saving Throw</em> : DC 15, one Medium or smaller creature the couatl can see within 5 feet. <em>Failure</em> : 8 (1d6 + 5) Bludgeoning damage. The target has the Grappled condition (escape DC 13), and it has the Restrained condition until the grapple ends.</p>
      <p><strong><em>Spellcasting</em></strong>. The couatl casts one of the following spells, requiring no spell components and using Wisdom as the spellcasting ability (spell save DC 15):</p>
      <p>At Will: <em><a href="https://www.aidedd.org/spell/detect-evil-and-good">Detect Evil and Good</a>, <a href="https://www.aidedd.org/spell/detect-magic">Detect Magic</a>, <a href="https://www.aidedd.org/spell/detect-thoughts">Detect Thoughts</a>, <a href="https://www.aidedd.org/spell/shapechange">Shapechange</a></em> (Beast or Humanoid form only, no Temporary Hit Points gained from the spell, and no Concentration or Temporary Hit Points required to maintain the spell)<br />
      1/Day Each: <em><a href="https://www.aidedd.org/spell/create-food-and-water">Create Food and Water</a>, <a href="https://www.aidedd.org/spell/dream">Dream</a>, <a href="https://www.aidedd.org/spell/greater-restoration">Greater Restoration</a>, <a href="https://www.aidedd.org/spell/scrying">Scrying</a>, <a href="https://www.aidedd.org/spell/sleep">Sleep</a></em>  </p>
      <h2>Bonus actions</h2>
      <p>** <em>Divine Aid (2/Day)</em>**. The couatl casts <em><a href="https://www.aidedd.org/spell/bless">Bless</a>, <a href="https://www.aidedd.org/spell/lesser-restoration">Lesser Restoration</a></em>, or <em><a href="https://www.aidedd.org/spell/sanctuary">Sanctuary</a></em> , requiring no spell components and using the same spellcasting ability as Spellcasting.</p>
    senses: Truesight 120 ft., Passive Perception 15
    languages:
    - All; telepathy 120 ft.
  fr:
    name: Couatl
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Esprit protégé</em>**. Rien ne peut lire les pensées du couatl, et les autres créatures ne peuvent communiquer avec lui par télépathie que s'il le permet.</p>
      <h2>Actions</h2>
      <p>** <em>Morsure</em>**. <em>Corps à corps</em> : +7, allonge 1,50 m. <em>Touché</em> : 11 (1d12 + 5) dégâts perforants, et la cible subit l'état Empoisonné jusqu'à la fin du tour suivant du couatl.</p>
      <p><strong><em>Constriction</em></strong>. <em>JdS Force</em> : DD 15, une créature de taille M ou inférieure que le couatl voit dans un rayon de 1,50 m. <em>Échec</em> : 8 (1d6 + 5) dégâts contondants. La cible subit l'état Agrippé (évasion DD 13), ainsi que l'état Entravé tant qu'elle est agrippée.</p>
      <p><strong><em>Incantation</em></strong>. Le couatl lance l'un des sorts suivants sans la moindre composante, la Sagesse étant sa caractéristique d'incantation (DD de sauvegarde 15) :</p>
      <p>À volonté : <em><a href="https://www.aidedd.org/spell/fr/changement-de-forme">changement de forme</a></em> (Bête ou Humanoïde uniquement, le sort ne fait pas gagner de points de vie temporaires, ni Concentration ni points de vie temporaires nécessaires pour maintenir le sort), <em><a href="https://www.aidedd.org/spell/fr/detection-de-la-magie">détection de la magie</a>, <a href="https://www.aidedd.org/spell/fr/detection-des-pensees">détection des pensées</a>, <a href="https://www.aidedd.org/spell/fr/detection-du-mal-et-du-bien">détection du mal et du bien</a></em><br />
      1/jour chacun : <em>création de nourriture et d'eau,<a href="https://www.aidedd.org/spell/fr/restauration-supreme">restauration suprême</a>, <a href="https://www.aidedd.org/spell/fr/scrutation">scrutation</a>, sommeil, songe</em>  </p>
      <h2>Actions Bonus</h2>
      <p>** <em>Soutien divin (2/jour)</em>**. Le couatl lance <em>bénédiction, restauration partielle</em> ou <em>sanctuaire</em> sans la moindre composante et avec la même caractéristique d'incantation que pour Incantation.</p>
    senses: vision véritable 36 m, Perception passive 15
    languages:
    - toutes ; télépathie 36 m
