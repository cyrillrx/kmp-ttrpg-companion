translations:
  en:
    name: Swarm of Dretches
    subtype: Demon
    description: |-
      ## Traits

      ***Fetid Aura***. *Constitution Saving Throw* : DC 12, any creature that starts its turn in a 10-foot Emanation originating from the swarm. *Failure* : The target has the Poisoned condition until the start of its next turn. While Poisoned, the target can take either an action or a Bonus Action on its turn, not both, and it can't take Reactions.

      ***Swarm***. The swarm can occupy another creature's space and vice versa, and the swarm can move through any opening large enough for a Small creature. The swarm can't regain Hit Points or gain Temporary Hit Points.

      ## Actions

      ***Multiattack***. The swarm makes two Rend attacks.

      ***Rend***. *Melee Attack Roll* : +4, reach 5 ft. *Hit* : 12 (3d6 + 2) Slashing damage, or 9 (3d4 + 2) Slashing damage if the swarm is Bloodied.
    senses: Darkvision 60 ft., Passive Perception 9
    languages:
    - Abyssal; telepathy 60 ft. (works only with creatures that understand abyssal)
  fr:
    name: Nuée de dretches
    subtype: Démon
    description: |-
      ## Traits

      ***Aura fétide***. *JdS Constitution* : DD 12, toute créature commençant son tour dans une Émanation de 3 m de rayon centrée sur la nuée. *Échec* : la cible subit l'état Empoisonné jusqu'au début de son prochain tour. Tant qu'elle est empoisonnée, la cible ne peut prendre qu'une action ou une action Bonus, pas les deux, et elle ne peut pas prendre de Réaction.

      ***Nuée***. La nuée peut occuper l'espace d'une autre créature et réciproquement, et elle peut se déplacer par toute ouverture assez large pour une créature de taille P. La nuée ne peut ni récupérer de points de vie ni recevoir de points de vie temporaires.

      ## Actions

      ***Attaques multiples***. La nuée effectue deux attaques de Saignée.

      ***Saignée***. *Corps à corps* : +4, allonge 1,50 m. *Touché* : 12 (3d6 + 2) dégâts tranchants, ou 9 (3d4 + 2) dégâts tranchants si la nuée est En péril.
    senses: Vision dans le noir 18 m, Perception passive 9
    languages:
    - abyssal ; télépathie 18 m (ne fonctionne qu'avec des créatures qui comprennent
      l'abyssal)
