translations:
  en:
    name: Young Green Dragon
    subtype: Chromatic
    description: |-
      <h2>Traits</h2>
      <p>** <em>Amphibious</em>**. The dragon can breathe air and water.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The dragon makes three Rend attacks.</p>
      <p><strong><em>Rend</em></strong>. <em>Melee Attack Roll</em> : +7, reach 10 ft. <em>Hit</em> : 11 (2d6 + 4) Slashing damage plus 7 (2d6) Poison damage.</p>
      <p><strong><em>Poison Breath (Recharge 5–6)</em></strong>. <em>Constitution Saving Throw</em> : DC 14, each creature in a 30-foot Cone. <em>Failure</em> : 42 (12d6) Poison damage. <em>Success</em> : Half damage.</p>
    senses: Blindsight 30 ft., Darkvision 120 ft., Passive Perception 17
    languages:
    - Common
    - Draconic
  fr:
    name: Dragon vert, jeune
    subtype: Chromatique
    description: |-
      <h2>Traits</h2>
      <p>** <em>Amphibie</em>**. Le dragon peut respirer sous l'eau comme à l'air libre.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le dragon effectue trois attaques de Saignée.</p>
      <p><strong><em>Saignée</em></strong>. <em>Corps à corps</em> : +7, allonge 3 m. <em>Touché</em> : 11 (2d6 + 4) dégâts tranchants plus 7 (2d6) dégâts de poison.</p>
      <p><strong><em>Souffle empoisonné (recharge 5–6)</em></strong>. <em>JdS Constitution</em> : DD 14, chaque créature dans un Cône de 9 m. <em>Échec</em> : 42 (12d6) dégâts de poison. <em>Réussite</em> : demi-dégâts.</p>
    senses: Vision aveugle 9 m, Vision dans le noir 36 m, Perception passive 17
    languages:
    - commun
    - draconique
