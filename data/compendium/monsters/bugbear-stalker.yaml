translations:
  en:
    name: Bugbear Stalker
    subtype: Goblinoid
    description: |-
      <h2>Traits</h2>
      <p>** <em>Abduct</em>**. The bugbear needn't spend extra movement to move a creature it is grappling.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The bugbear makes two Javelin or Morningstar attacks.</p>
      <p><strong><em>Javelin</em></strong>. <em>Melee or Ranged Attack Roll</em> : +5, reach 10 ft. or range 30/120 ft. <em>Hit</em> : 13 (3d6 + 3) Piercing damage.</p>
      <p><strong><em>Morningstar</em></strong>. <em>Melee Attack Roll</em> : +5 (with Advantage if the target is Grappled by the bugbear), reach 10 ft. <em>Hit</em> : 12 (2d8 + 3) Piercing damage.</p>
      <h2>Bonus actions</h2>
      <p>** <em>Quick Grapple</em>**. <em>Dexterity Saving Throw</em> : DC 13, one Medium or smaller creature the bugbear can see within 10 feet. <em>Failure</em> : The target has the Grappled condition (escape DC 13).</p>
    senses: Darkvision 60 ft., Passive Perception 11
    languages:
    - Common
    - Goblin
  fr:
    name: Gobelours, traqueur
    subtype: Gobelinoïde
    description: |-
      <h2>Traits</h2>
      <p>** <em>Rapt</em>**. Le gobelours n'a pas besoin de dépenser de déplacement supplémentaire pour déplacer une créature qu'il agrippe.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le gobelours effectue deux attaques de Javeline ou de Morgenstern.</p>
      <p><strong><em>Javeline</em></strong>. <em>Corps à corps ou à distance</em> : +5, allonge 3 m ou portée 9/36 m. <em>Touché</em> : 13 (3d6 + 3) dégâts perforants.</p>
      <p><strong><em>Morgenstern</em></strong>. <em>Corps à corps</em> : +5 (avec Avantage si la cible est agrippée par le gobelours), allonge 3 m. <em>Touché</em> : 12 (2d8 + 3) dégâts perforants.</p>
      <h2>Actions Bonus</h2>
      <p>** <em>Lutte rapide</em>**. <em>JdS Dextérité</em> : DD 13, une créature de taille M ou inférieure que le gobelours voit dans un rayon de 3 m. <em>Échec</em> : la cible subit l'état Agrippé (évasion DD 13).</p>
    senses: Vision dans le noir 18 m, Perception passive 11
    languages:
    - commun
    - gobelin
