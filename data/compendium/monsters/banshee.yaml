translations:
  en:
    name: Banshee
    subtype: null
    description: '## Traits


      ***Detect Life***. The banshee magically senses the direction of creatures up
      to 1 mile away that aren''t Constructs or Undead.


      ***Incorporeal Movement***. The banshee can move through other creatures and
      objects as if they were Difficult Terrain. It takes 5 (1d10) Force damage if
      it ends its turn inside an object.


      ## Actions


      ***Multiattack***. The banshee makes two Corrupting Touch attacks and uses Horrify.


      ***Corrupting Touch***. *Melee Attack Roll* : +5, reach 5 ft. *Hit* : 7 (1d8
      + 3) Necrotic damage.


      ***Horrify***. *Wisdom Saving Throw* : DC 13, one creature the banshee can see
      within 60 feet that can see the banshee. *Failure* : The target has the Frightened
      condition until the start of the banshee''s next turn. *Success* : The target
      is immune to this banshee''s Horrify for 24 hours.


      ***Deathly Wail (1/Day)***. The banshee releases a mournful wail if it isn''t
      in sunlight. *Constitution Saving Throw* : DC 13, each creature within 30 feet
      that can hear the wail and isn''t a Construct or an Undead. *Failure* : If the
      target has 25 Hit Points or fewer, it drops to 0 Hit Points. Otherwise, the
      target takes 10 (3d6) Psychic damage.'
    senses: Darkvision 60 ft., Passive Perception 10
    languages:
    - Common
    - Elvish
  fr:
    name: Banshie
    subtype: null
    description: '## Traits


      ***Détection de vie***. La banshie perçoit magiquement la direction dans laquelle
      se trouvent des créatures situées jusqu''à 1,5 km de distance, à l''exception
      des Artificiels et des Morts-vivants.


      ***Déplacement intangible***. La banshie peut traverser d''autres créatures
      et objets comme s''il s''agissait d''un Terrain difficile. Elle subit 5 (1d10)
      dégâts de force si elle termine son tour à l''intérieur d''un objet.


      ## Actions


      ***Attaques multiples***. La banshie effectue deux attaques de Contact corrupteur
      et utilise Horreur.


      ***Contact corrupteur***. *Corps à corps* : +5, allonge 1,50 m. *Touché* : 7
      (1d8 + 3) dégâts nécrotiques.


      ***Horreur***. *JdS Sagesse* : DD 13, une créature que la banshie peut voir
      dans un rayon de 18 m et qui peut voir la banshie. *Échec* : la cible subit
      l''état Effrayé jusqu''au début du prochain tour de la banshie. *Réussite* :
      la cible est immunisée contre l''effet Horreur de cette banshie pendant 24 heures.


      ***Plainte funeste (1/jour)***. La banshie pousse un gémissement funèbre si
      elle n''est pas exposée à la lumière du soleil. *JdS Constitution* : DD 13,
      chaque créature dans un rayon de 9 m qui peut entendre le gémissement et qui
      n''est ni un Artificiel ni un Mort-vivant. *Échec* : si la cible a 25 points
      de vie ou moins, elle tombe à 0 point de vie. Sinon, elle subit 10 (3d6) dégâts
      psychiques.'
    senses: Vision dans le noir 18 m, Perception passive 10
    languages:
    - commun
    - elfe
