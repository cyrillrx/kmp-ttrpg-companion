translations:
  en:
    name: Kuo-toa
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Amphibious</em>**. The kuo-toa can breathe air and water.</p>
      <p><strong><em>Sunlight Sensitivity</em></strong>. While in sunlight, the kuo-toa has Disadvantage on ability checks and attack rolls.</p>
      <h2>Actions</h2>
      <p>** <em>Spear</em>**. <em>Melee or Ranged Attack Roll</em> : +3, reach 5 ft. or range 20/60 ft. <em>Hit</em> : 5 (1d8 + 1) Piercing damage.</p>
      <p><strong><em>Sticky Net (1/Day)</em></strong>. <em>Dexterity Saving Throw</em> : DC 10, one Large or smaller creature the kuo-toa can see within 15 feet. <em>Failure</em> : The target has the Restrained condition until the net is destroyed (AC 10; HP 5; Immunity to Bludgeoning, Poison, and Psychic damage). A creature can take an action to make a DC 10 Strength (Athletics) check to free itself or another creature in a net within 5 feet, destroying the net on a success.</p>
      <h2>Reactions</h2>
      <p>** <em>Sticky Shield</em>**. <em>Trigger</em> : A creature misses the kuo-toa with a melee attack roll using a weapon. Response— <em>Strength Saving Throw</em> : DC 11, the triggering creature. <em>Failure</em> : The attack's weapon sticks to the kuo-toa's shield. If the target doesn't let go of the weapon, the target has the Grappled condition while the weapon is stuck (escape DC 11). While stuck, the weapon can't be used. The target can take an action to make a DC 11 Strength (Athletics) check, freeing the weapon on a success.</p>
    senses: Darkvision 120 ft., Truesight 30 ft., Passive Perception 14
    languages:
    - Undercommon
  fr:
    name: Kuo-toa
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Amphibie</em>**. Le kuo-toa peut respirer sous l'eau comme à l'air libre.</p>
      <p><strong><em>Sensibilité au soleil</em></strong>. Tant qu'il est exposé à la lumière du soleil, le kuo-toa subit un Désavantage aux jets de caractéristique et aux jets d'attaque.</p>
      <h2>Actions</h2>
      <p>** <em>Lance</em>**. <em>Corps à corps ou à distance</em> : +3, allonge 1,50 m ou portée 6/18 m. <em>Touché</em> : 5 (1d8 + 1) dégâts perforants.</p>
      <p><strong><em>Filet collant (1/jour)</em></strong>. <em>JdS Dextérité</em> : DD 10, une créature de taille G ou inférieure que le kuo-toa peut voir dans un rayon de 4,50 m. <em>Échec</em> : la cible subit l'état Entravé jusqu'à la destruction du filet (CA 10 ; 5 pv ; Immunité aux dégâts contondants, au poison et aux dégâts psychiques). Une créature peut prendre une action pour effectuer un jet de Force (Athlétisme) DD 10 afin de se libérer ou de libérer une autre créature prise dans un filet dans un rayon de 1,50 m. En cas de réussite, le filet est détruit.</p>
      <h2>Réactions</h2>
      <p>** <em>Bouclier collant</em>**. <em>Déclencheur</em> : une créature rate le kuo-toa lors d'un jet d'attaque au corps à corps avec une arme. <em>Conséquences—JdS Force</em> : DD 11, la créature ayant déclenché la Réaction. <em>Échec</em> : l'arme de l'attaque reste collée au bouclier du kuo-toa. Si la cible ne lâche pas l'arme, elle subit l'état Agrippé tant que l'arme est collée (évasion DD 11). Tant qu'elle est collée, l'arme est inutilisable. La cible peut prendre une action pour effectuer un jet de Force (Athlétisme) DD 11 et libérer l'arme en cas de réussite.</p>
    senses: Vision dans le noir 36 m, vision véritable 9 m, Perception passive 14
    languages:
    - commun des profondeurs
