translations:
  en:
    name: Ancient Gold Dragon
    subtype: Metallic
    description: |-
      ## Traits

      ***Amphibious***. The dragon can breathe air and water.

      ***Legendary Resistance (4/Day, or 5/Day in Lair)***. If the dragon fails a saving throw, it can choose to suc ceed instead.

      ## Actions

      ***Multiattack***. The dragon makes three Rend attacks. It can replace one attack with a use of (A) Spellcasting to cast *[Guiding Bolt](https://www.aidedd.org/spell/guiding-bolt)* (level 4 version) or (B) Weakening Breath.

      ***Rend***. *Melee Attack Roll* : +17 to hit, reach 15 ft. *Hit* : 19 (2d8+ 10) Slashing damage plus 9 (2d8) Fire damage.

      ***Fire Breath (Recharge 5-6)***. *Dexterity Saving Throw* : DC 24, each creature in a 90-foot Cone. *Failure* : 71 (13d10) Fire damage. *Success* : Half damage.

      ***Spellcasting***. The dragon casts one of the following spells, requiring no Material components and using Charisma as the spellcasting ability (spell save DC 24):

      At Will: *[Detect Magic](https://www.aidedd.org/spell/detect-magic), [Guiding Bolt](https://www.aidedd.org/spell/guiding-bolt)* (level 4 version), *[Shapechange](https://www.aidedd.org/spell/shapechange)* (Beast or Humanoid form only, no Temporary Hit Points gained from the spell, and no Concentration or Temporary Hit Points required to maintain the spell)\
      1/Day Each: *[Flame Strike](https://www.aidedd.org/spell/flame-strike)* (level 6 version), *[Word of Recall](https://www.aidedd.org/spell/word-of-recall), [Zone of Truth](https://www.aidedd.org/spell/zone-of-truth)*

      ***Weakening Breath***. *Strength Saving Throw* : DC 24, each creature that isn't currently affected by this breath in a 90-foot Cone. *Failure* : The target has Disadvantage on Strength-based D20 Tests and subtracts 5 (1d10) from its damage rolls. It repeats the save at the end of each of its turns, ending the effect on itself on a success. After 1 minute, it succeeds automatically.

      ## Legendary actions

      Legendary Action Uses: 3 (4 in Lair). Immediately after another creature's turn, the dragon can expend a use to take one of the following actions. The dragon regains all expended uses at the start of each of its turns.

      ***Banish***. *Charisma Saving Throw* : DC 24, one creature the dragon can see within 120 feet. *Failure* : 24 (7d6) Force damage, and the target has the Incapacitated condition and is transported to a harmless demiplane until the start of the dragon's next turn, at which point it reappears in an unoccupied space of the dragon's choice within 120 feet of the dragon. *Failure or Success* : The dragon can't take this action again until the start of its next turn.

      ***Guiding Light***. The dragon uses Spellcasting to cast *[Guiding Bolt](https://www.aidedd.org/spell/guiding-bolt)* (level 4 version).

      ***Pounce***. The dragon moves up to half its Speed, and it makes one Rend attack.
    senses: Blindsight 60 ft., Darkvision 120 ft., Passive Perception 27
    languages:
    - Common
    - Draconic
  fr:
    name: Dragon d'or, ancien
    subtype: Métallique
    description: |-
      ## Traits

      ***Amphibie***. Le dragon peut respirer sous l'eau comme à l'air libre.

      ***Résistance légendaire (4/jour, ou 5/jour dans son antre)***. Si le dragon rate un jet de sauvegarde, il peut décider de le réussir tout de même.

      ## Actions

      ***Attaques multiples***. Le dragon effectue trois attaques de Saignée. Il peut remplacer l'une de ces attaques par une utilisation de (A) Incantation pour lancer *[rayon traçant](https://www.aidedd.org/spell/fr/rayon-tracant)* (au niveau 4) ou (B) Souffle affaiblissant.

      ***Saignée***. *Corps à corps* : +17, allonge 4,50 m. *Touché* : 19 (2d8 + 10) dégâts tranchants plus 9 (2d8) dégâts de feu.

      ***Incantation***. Le dragon lance l'un des sorts suivants sans composantes matérielles, le Charisme étant sa caractéristique d'incantation (DD de sauvegarde 24, +16 pour toucher) :

      À volonté : *[changement de forme](https://www.aidedd.org/spell/fr/changement-de-forme)* (Bête ou Humanoïde uniquement, le sort ne fait pas gagner de points de vie temporaires, ni Concentration ni points de vie temporaires nécessaires pour maintenir le sort), *[détection de la magie](https://www.aidedd.org/spell/fr/detection-de-la-magie), [rayon traçant](https://www.aidedd.org/spell/fr/rayon-tracant)* (au niveau 4)\
      1/jour chacun : *[colonne de flamme](https://www.aidedd.org/spell/fr/colonne-de-flamme)* (au niveau 6), *mot de retour, zone de vérité*

      ***Souffle affaiblissant***. *JdS Force* : DD 24, chaque créature non encore affectée par ce souffle dans un Cône de 27 m. *Échec* : la cible subit un Désavantage aux jets de d20 basés sur la Force et soustrait 5 (1d10) à ses jets de dégâts. Elle réitère le JdS à la fin de chacun de ses tours, et met un terme à l'effet sur elle-même en cas de réussite. Au bout de 1 minute, elle réussit automatiquement ce JdS.

      ***Souffle de feu (recharge 5–6)***. *JdS Dextérité* : DD 24, chaque créature dans un Cône de 27 m. *Échec* : 71 (13d10) dégâts de feu. *Réussite* : demi-dégâts.

      ## Actions Légendaires

      Utilisations d'action Légendaire : 3 (4 dans son antre). Aussitôt après le tour d'une autre créature, le dragon peut dépenser une utilisation pour entreprendre l'une des actions ci-après. Le dragon récupère toutes ses utilisations dépensées au début de chacun de ses tours.

      ***Assaut incisif***. Le dragon se déplace à concurrence de la moitié de sa Vitesse et effectue une attaque de Saignée.

      ***Bannissement***. *JdS Charisme* : DD 24, une créature que le dragon voit dans un rayon de 36 m. *Échec* : 24 (7d6) dégâts de force ; la cible subit l'état Incapable d'agir et elle est transportée sur un demi-plan qui ne présente pas de danger jusqu'au début du tour suivant du dragon, puis elle réapparaît en un espace inoccupé au choix du dragon dans un rayon de 36 m. *Échec ou réussite* : le dragon ne peut alors plus entreprendre cette action jusqu'au début de son tour suivant.

      ***Lumière traçante***. Le dragon recourt à Incantation pour lancer *[rayon traçant](https://www.aidedd.org/spell/fr/rayon-tracant)* (au niveau 4).
    senses: Vision aveugle 18 m, Vision dans le noir 36 m, Perception passive 27
    languages:
    - commun
    - draconique
