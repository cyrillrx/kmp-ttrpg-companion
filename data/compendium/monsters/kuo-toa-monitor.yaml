translations:
  en:
    name: Kuo-toa Monitor
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Amphibious</em>**. The kuo-toa can breathe air and water.</p>
      <p><strong><em>Sunlight Sensitivity</em></strong>. While in sunlight, the kuo-toa has Disadvantage on ability checks and attack rolls.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The kuo-toa makes two Bone Whip attacks.</p>
      <p><strong><em>Bone Whip</em></strong>. <em>Melee Attack Roll</em> : +5, reach 10 ft. <em>Hit</em> : 6 (1d6 + 3) Slashing damage plus 7 (2d6) Lightning damage, and the target can't make Opportunity Attacks until the start of the kuo-toa's next turn.</p>
    senses: Darkvision 120 ft., Truesight 30 ft., Passive Perception 16
    languages:
    - Undercommon
  fr:
    name: Kuo-toa cornac
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Amphibie</em>**. Le kuo-toa peut respirer sous l'eau comme à l'air libre.</p>
      <p><strong><em>Sensibilité au soleil</em></strong>. Tant qu'il est exposé à la lumière du soleil, le kuo-toa subit un Désavantage aux jets de caractéristique et aux jets d'attaque.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le kuo-toa effectue deux attaques de Fouet osseux.</p>
      <p><strong><em>Fouet osseux</em></strong>. <em>Corps à corps</em> : +5, allonge 3 m. <em>Touché</em> : 6 (1d6 + 3) dégâts tranchants plus 7 (2d6) dégâts de foudre, et la cible ne peut pas effectuer d'attaques d'Opportunité jusqu'au début du prochain tour du kuo-toa.</p>
    senses: Vision dans le noir 36 m, vision véritable 9 m, Perception passive 16
    languages:
    - commun des profondeurs
