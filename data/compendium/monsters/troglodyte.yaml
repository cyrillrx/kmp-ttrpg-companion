translations:
  en:
    name: Troglodyte
    subtype: null
    description: |-
      ## Traits

      ***Stench***. *Constitution Saving Throw* : DC 12, any creature (other than a troglodyte) that starts its turn in a 5-foot Emanation originating from the troglodyte. *Failure* : The target has the Poisoned condition until the start of its next turn. *Success* : The target is immune to the Stench of all troglodytes for 1 hour.

      ***Sunlight Sensitivity***. While in sunlight, the troglodyte has Disadvantage on ability checks and attack rolls.

      ## Actions

      ***Rend***. *Melee Attack Roll* : +4, reach 5 ft. *Hit* : 5 (1d6 + 2) Slashing damage.
    senses: Darkvision 60 ft., Passive Perception 10
    languages:
    - Troglodyte
  fr:
    name: Troglodyte
    subtype: null
    description: |-
      ## Traits

      ***Puanteur***. *JdS Constitution* : DD 12, toute créature (autre qu'un troglodyte) qui commence son tour dans une Émanation de 1,50 m centrée sur le troglodyte. *Échec* : la cible subit l'état Empoisonné jusqu'au début de son prochain tour. *Réussite* : la cible est immunisée contre la puanteur de tous les troglodytes pendant 1 heure.

      ***Sensibilité au soleil***. Tant qu'il est exposé à la lumière du soleil, le troglodyte subit un Désavantage aux jets de caractéristique et aux jets d'attaque.

      ## Actions

      ***Saignée***. *Corps à corps* : +4, allonge 1,50 m. *Touché* : 5 (1d6 + 2) dégâts tranchants.
    senses: Vision dans le noir 18 m, Perception passive 10
    languages:
    - troglodyte
