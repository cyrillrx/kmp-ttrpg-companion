translations:
  en:
    name: Spined Devil
    subtype: Devil
    description: |-
      ## Traits

      ***Flyby***. The devil doesn't provoke an Opportunity Attack when it flies out of an enemy's reach.

      ***Magic Resistance***. The devil has Advantage on saving throws against spells and other magical effects.

      ## Actions

      ***Multiattack***. The devil makes two attacks, using Infernal Fork and Tail Spine in any combination.

      ***Infernal Fork***. *Melee Attack Roll* : +4, reach 5 ft. *Hit* : 5 (1d6 + 2) Piercing damage plus 3 (1d6) Fire damage.

      ***Tail Spine***. *Ranged Attack Roll* : +4, range 20/80 ft. *Hit* : 4 (1d4 + 2) Piercing damage plus 3 (1d6) Fire damage.
    senses: Darkvision 120 ft. (unimpeded by magical Darkness), Passive Perception
      12
    languages:
    - Infernal; telepathy 120 ft.
  fr:
    name: Diable épineux
    subtype: Diable
    description: |-
      ## Traits

      ***Repli aérien***. Le diable ne provoque pas d'attaque d'Opportunité lorsqu'il quitte la zone d'allonge d'un ennemi en volant.

      ***Résistance à la magie***. Le diable a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.

      ## Actions

      ***Attaques multiples***. Le diable effectue deux attaques, réparties à sa guise entre Fourche infernale et Épine caudale.

      ***Fourche infernale***. *Corps à corps* : +4, allonge 1,50 m. *Touché* : 5 (1d6 + 2) dégâts perforants plus 3 (1d6) dégâts de feu.

      ***Épine caudale***. *À distance* : +4, portée 6/24 m. *Touché* : 4 (1d4 + 2) dégâts perforants plus 3 (1d6) dégâts de feu.
    senses: Vision dans le noir 36 m (perce les Ténèbres magiques), Perception passive
      12
    languages:
    - infernal ; télépathie 36 m
