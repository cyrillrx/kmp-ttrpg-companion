translations:
  en:
    name: Merfolk Skirmisher
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Amphibious</em>**. The merfolk can breathe air and water.</p>
      <h2>Actions</h2>
      <p>** <em>Ocean Spear</em>**. <em>Melee or Ranged Attack Roll</em> : +2, reach 5 ft. or range 20/60 ft. <em>Hit</em> : 3 (1d6) Piercing damage plus 2 (1d4) Cold damage. If the target is a creature, its Speed decreases by 10 feet until the end of its next turn. <em>Hit or Miss</em> : The spear magically returns to the merfolk's hand immediately after a ranged attack.</p>
    senses: Passive Perception 12
    languages:
    - Common
    - Primordial (Aquan)
  fr:
    name: Thalasséen, tirailleur
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Amphibie</em>**. Le thalasséen peut respirer sous l'eau comme à l'air libre.</p>
      <h2>Actions</h2>
      <p>** <em>Lance océanique</em>**. <em>Corps à corps ou à distance</em> : +2, allonge 1,50 m ou portée 6/18 m. <em>Touché</em> : 3 (1d6) dégâts perforants plus 2 (1d4) dégâts de froid. Si la cible est une créature, sa Vitesse est réduite de 3 m jusqu'à la fin de son tour suivant. <em>Touché ou raté</em> : aussitôt après une attaque à distance, la lance retourne magiquement dans la main du thalasséen.</p>
    senses: Perception passive 12
    languages:
    - commun
    - primordial (aquatique)
