translations:
  en:
    name: Swarm of Bats
    subtype: null
    description: |-
      ## Traits

      ***Swarm***. The swarm can occupy another creature's space and vice versa, and the swarm can move through any opening large enough for a Tiny bat. The swarm can't regain Hit Points or gain Temporary Hit Points.

      ## Actions

      ***Bites***. *Melee Attack Roll* : +4, reach 5 ft. *Hit* : 5 (2d4) Piercing damage, or 2 (1d4) Piercing damage if the swarm is Bloodied.
    senses: Blindsight 60 ft., Passive Perception 11
    languages:
    - None
  fr:
    name: Nuée de chauves-souris
    subtype: null
    description: |-
      ## Traits

      ***Nuée***. La nuée peut occuper l'espace d'une autre créature et réciproquement, et elle peut se déplacer par toute ouverture assez large pour une chauve-souris de taille TP. La nuée ne peut ni récupérer de points de vie ni recevoir de points de vie temporaires.

      ## Actions

      ***Morsures***. *Corps à corps* : +4, allonge 1,50 m. *Touché* : 5 (2d4) dégâts perforants, ou 2 (1d4) dégâts perforants si la nuée est En péril.
    senses: Vision aveugle 18 m, Perception passive 11
    languages:
    - aucune
