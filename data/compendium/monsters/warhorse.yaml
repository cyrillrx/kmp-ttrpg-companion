    description: |-
      <h2>Actions</h2>
      <p>** <em>Sabots</em>**. <em>Corps à corps</em> : +6, allonge 1,50 m. <em>Touché</em> : 9 (2d4 + 4) dégâts contondants. Si le cheval s'est déplacé d'au moins 6 m en ligne droite vers la cible juste avant de la toucher, la cible subit 5 (2d4) dégâts contondants supplémentaires et, si elle est de taille TG ou inférieure, elle subit l'état À terre.</p>
    senses: Perception passive 11
