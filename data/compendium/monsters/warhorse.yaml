    description: |-
      <h2>Actions</h2>
      <p>** <em>Hooves</em>**. <em>Melee Attack Roll</em> : +6, reach 5 ft. <em>Hit</em> : 9 (2d4 + 4) Bludgeoning damage. If the horse moved at least 20 feet straight toward the target immediately before the hit, the target takes an extra 5 (2d4) Bludgeoning damage and, if it is Huge or smaller, has the Prone condition.</p>
