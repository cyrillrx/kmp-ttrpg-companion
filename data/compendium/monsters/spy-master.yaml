translations:
  en:
    name: Spy Master
    subtype: null
    description: |-
      ## Actions

      ***Multiattack***. The spy makes three attacks, using Rapier or Hand Crossbow in any combination.

      ***Rapier***. *Melee Attack Roll* : +9, reach 5 ft. *Hit* : 14 (2d8 + 5) Piercing damage plus 7 (2d6) Poison damage.

      ***Hand Crossbow***. *Ranged Attack Roll* : +9, range 30/120 ft. *Hit* : 12 (2d6 + 5) Piercing damage plus 9 (2d8) Poison damage.

      ***Smoke Bomb (1/Day)***. The spy throws a bomb to a point it can see within 30 feet of itself. *Constitution Saving Throw* : DC 16, each creature in a 20-foot-radius Sphere centered on that point. *Failure* : 28 (8d6) Poison damage, and the target has the Blinded condition until the end of the spy's next turn. *Success* : Half damage only.

      ## Bonus actions

      ***Cunning Action***. The spy takes the Dash, Disengage, or Hide action.
    senses: Passive Perception 21
    languages:
    - Common plus two other languages
  fr:
    name: Espion, maître
    subtype: null
    description: |-
      ## Actions

      ***Attaques multiples***. L'espion réalise trois attaques, réparties à sa guise entre Rapière et Arbalète de poing.

      ***Rapière***. *Corps à corps* : +9, allonge 1,50 m. *Touché* : 14 (2d8 + 5) dégâts perforants plus 7 (2d6) dégâts de poison.

      ***Arbalète de poing***. *À distance* : +9, portée 9/36 m. *Touché* : 12 (2d6 + 5) dégâts perforants plus 9 (2d8) dégâts de poison.

      ***Bombe fumigène (1/jour)***. L'espion lance une bombe vers un point qu'il peut voir dans un rayon de 9 m. *JdS Constitution* : DD 16, chaque créature dans une Sphère de 6 m de rayon centrée sur ce point. *Échec* : 28 (8d6) dégâts de poison, et la cible subit l'état Aveuglé jusqu'à la fin du prochain tour de l'espion. *Réussite* : demi-dégâts uniquement.

      ## Actions Bonus

      ***Ruse***. L'espion prend l'action Se désengager, Se cacher ou Foncer.
    senses: Perception passive 21
    languages:
    - commun plus deux autres langues
