translations:
  en:
    name: Spy Master
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The spy makes three attacks, using Rapier or Hand Crossbow in any combination.</p>
      <p><strong><em>Rapier</em></strong>. <em>Melee Attack Roll</em> : +9, reach 5 ft. <em>Hit</em> : 14 (2d8 + 5) Piercing damage plus 7 (2d6) Poison damage.</p>
      <p><strong><em>Hand Crossbow</em></strong>. <em>Ranged Attack Roll</em> : +9, range 30/120 ft. <em>Hit</em> : 12 (2d6 + 5) Piercing damage plus 9 (2d8) Poison damage.</p>
      <p><strong><em>Smoke Bomb (1/Day)</em></strong>. The spy throws a bomb to a point it can see within 30 feet of itself. <em>Constitution Saving Throw</em> : DC 16, each creature in a 20-foot-radius Sphere centered on that point. <em>Failure</em> : 28 (8d6) Poison damage, and the target has the Blinded condition until the end of the spy's next turn. <em>Success</em> : Half damage only.</p>
      <h2>Bonus actions</h2>
      <p>** <em>Cunning Action</em>**. The spy takes the Dash, Disengage, or Hide action.</p>
    senses: Passive Perception 21
    languages:
    - Common plus two other languages
  fr:
    name: Espion, maître
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. L'espion réalise trois attaques, réparties à sa guise entre Rapière et Arbalète de poing.</p>
      <p><strong><em>Rapière</em></strong>. <em>Corps à corps</em> : +9, allonge 1,50 m. <em>Touché</em> : 14 (2d8 + 5) dégâts perforants plus 7 (2d6) dégâts de poison.</p>
      <p><strong><em>Arbalète de poing</em></strong>. <em>À distance</em> : +9, portée 9/36 m. <em>Touché</em> : 12 (2d6 + 5) dégâts perforants plus 9 (2d8) dégâts de poison.</p>
      <p><strong><em>Bombe fumigène (1/jour)</em></strong>. L'espion lance une bombe vers un point qu'il peut voir dans un rayon de 9 m. <em>JdS Constitution</em> : DD 16, chaque créature dans une Sphère de 6 m de rayon centrée sur ce point. <em>Échec</em> : 28 (8d6) dégâts de poison, et la cible subit l'état Aveuglé jusqu'à la fin du prochain tour de l'espion. <em>Réussite</em> : demi-dégâts uniquement.</p>
      <h2>Actions Bonus</h2>
      <p>** <em>Ruse</em>**. L'espion prend l'action Se désengager, Se cacher ou Foncer.</p>
    senses: Perception passive 21
    languages:
    - commun plus deux autres langues
