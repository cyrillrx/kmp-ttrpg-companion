translations:
  en:
    name: Dire Wolf
    subtype: null
    description: |-
      ## Traits

      ***Pack Tactics***. The wolf has Advantage on an attack roll against a creature if at least one of the wolf's allies is within 5 feet of the creature and the ally doesn't have the Incapacitated condition.

      ## Actions

      ***Bite***. *Melee Attack Roll* : +5, reach 5 ft. *Hit* : 8 (1d10 + 3) Piercing damage. If the target is a Large or smaller creature, it has the Prone condition.
    senses: Darkvision 60 ft., Passive Perception 15
    languages:
    - None
  fr:
    name: Loup sanguinaire
    subtype: null
    description: |-
      ## Traits

      ***Tactique de meute***. Le loup a un Avantage aux jets d'attaque contre une créature si au moins l'un de ses alliés est à 1,50 m ou moins de la créature et si l'allié n'a pas l'état Incapable d'agir.

      ## Actions

      ***Morsure***. *Corps à corps* : +5, allonge 1,50 m. *Touché* : 8 (1d10 + 3) dégâts perforants. Si la cible est de taille G ou inférieure, elle subit l'état À terre.
    senses: Vision dans le noir 18 m, Perception passive 15
    languages:
    - aucune
