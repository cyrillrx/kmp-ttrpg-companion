translations:
  en:
    name: Phase Spider
    subtype: null
    description: '## Traits


      ***Ethereal Sight***. The spider can see 60 feet into the Ethereal Plane while
      on the Material Plane and vice versa.


      ***Spider Climb***. The spider can climb difficult surfaces, including along
      ceilings, without needing to make an ability check.


      ***Web Walker***. The spider ignores movement restrictions caused by webs, and
      the spider knows the location of any other creature in contact with the same
      web.


      ## Actions


      ***Multiattack***. The spider makes two Bite attacks.


      ***Bite***. *Melee Attack Roll* : +5, reach 5 ft. *Hit* : 8 (1d10 + 3) Piercing
      damage plus 9 (2d8) Poison damage. If this damage reduces the target to 0 Hit
      Points, the target becomes Stable, and it has the Poisoned condition for 1 hour.
      While Poisoned, the target also has the Paralyzed condition.


      ## Bonus actions


      ***Ethereal Jaunt***. The spider teleports from the Material Plane to the Ethereal
      Plane or vice versa.'
    senses: Darkvision 60 ft., Passive Perception 10
    languages: []
  fr:
    name: Araignée de phase
    subtype: null
    description: '## Traits


      ***Marche dans les toiles***. L''araignée n''est pas soumise aux contraintes
      de déplacement imposées par les toiles et connaît la position de toute autre
      créature en contact avec la même toile qu''elle.


      ***Pattes d''araignée***. L''araignée peut parcourir les parois les plus difficiles
      à escalader, y compris les plafonds, sans passer par un jet de caractéristique.


      ***Vision éthérée***. L''araignée voit à 18 m dans le Plan Éthéré quand elle
      est sur le Plan Matériel, et inversement.


      ## Actions


      ***Attaques multiples***. L''araignée effectue deux attaques de Morsure.


      ***Morsure***. *Corps à corps* : +5, allonge 1,50 m. *Touché* : 8 (1d10 + 3)
      dégâts perforants plus 9 (2d8) dégâts de poison. Si ces dégâts réduisent la
      cible à 0 point de vie, celle-ci devient Stabilisée et subit l''état Empoisonné
      pendant 1 heure. Tant qu''elle est ainsi Empoisonnée, la cible subit en outre
      l''état Paralysé.


      ## Actions Bonus


      ***Saut éthéré***. L''araignée se téléporte du Plan Matériel vers le Plan Éthéré
      ou vice versa.'
    senses: Vision dans le noir 18 m, Perception passive 10
    languages: []
