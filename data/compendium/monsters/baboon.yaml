  fr:
    name: Babouin
    subtype: null
    description: |-
      ## Traits

      ***Tactique de meute***. Quand au moins un de ses alliés non Incapable d'agir se situe dans un rayon de 1,50 m de la créature qu'il cible, le babouin a un Avantage au jet d'attaque correspondant.

      ## Actions

      ***Morsure***. *Corps à corps* : +1, allonge 1,50 m. *Touché* : 1 (1d4 − 1) dégâts perforants.
