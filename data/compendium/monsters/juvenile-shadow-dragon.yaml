translations:
  en:
    name: Juvenile Shadow Dragon
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Living Shadow</em>**. While in Dim Light or Darkness, the dragon has Resistance to damage that isn't Force, Psychic, or Radiant.</p>
      <p><strong><em>Sunlight Sensitivity</em></strong>. While in sunlight, the dragon has Disadvantage on ability checks and attack rolls.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The dragon makes two Rend attacks.</p>
      <p><strong><em>Rend</em></strong>. <em>Melee Attack Roll</em> : +5, reach 10 ft. <em>Hit</em> : 7 (1d8 + 3) Slashing damage plus 3 (1d6) Necrotic damage.</p>
      <p><strong><em>Shadow Breath (Recharge 5–6)</em></strong>. <em>Dexterity Saving Throw</em> : DC 13, each creature in a 30-foot Cone. <em>Failure</em> : 17 (5d6) Necrotic damage. <em>Success</em> : Half damage. <em>Failure or Success</em> : A Humanoid reduced to 0 Hit Points by this damage dies, and a Shadow rises from its corpse. The shadow is under the dragon's control and shares the dragon's Initiative count but acts immediately after the dragon.</p>
      <h2>Bonus actions</h2>
      <p>** <em>Shadow Stealth</em>**. While in Dim Light or Darkness, the dragon takes the Hide action.</p>
    senses: Blindsight 10 ft., Darkvision 60 ft., Passive Perception 14
    languages:
    - Common
    - Draconic
  fr:
