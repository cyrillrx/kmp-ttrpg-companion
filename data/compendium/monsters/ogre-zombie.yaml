translations:
  en:
    name: Ogre Zombie
    subtype: null
    description: |-
      ## Traits

      ***Undead Fortitude***. If damage reduces the zombie to 0 Hit Points, it makes a Constitution saving throw (DC 5 plus the damage taken) unless the damage is Radiant or from a Critical Hit. On a successful save, the zombie drops to 1 Hit Point instead.

      ## Actions

      ***Slam***. *Melee Attack Roll* : +6, reach 5 ft. *Hit* : 13 (2d8 + 4) Bludgeoning damage.
    senses: Darkvision 60 ft., Passive Perception 8
    languages:
    - Understands Common and Giant but can't speak
  fr:
    name: Ogre zombi
    subtype: null
    description: |-
      ## Traits

      ***Robustesse de la non-vie***. Si des dégâts font tomber le zombi à 0 point de vie, il effectue un jet de sauvegarde de Constitution (DD 5 + les dégâts subis), sauf en cas de dégâts radiants ou de Coup critique. En cas de réussite, le zombi se retrouve en fait à 1 point de vie.

      ## Actions

      ***Coup***. *Corps à corps* : +6, allonge 1,50 m. *Touché* : 13 (2d8 + 4) dégâts contondants.
    senses: Vision dans le noir 18 m, Perception passive 8
    languages:
    - comprend le commun et le géant mais ne parle pas
