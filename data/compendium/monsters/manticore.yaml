translations:
  en:
    name: Manticore
    subtype: null
    description: |-
      ## Actions

      ***Multiattack***. The manticore makes three attacks, using Rend or Tail Spike in any combination.

      ***Rend***. *Melee Attack Roll* : +5, reach 5 ft. *Hit* : 7 (1d8 + 3) Slashing damage.

      ***Tail Spike***. *Ranged Attack Roll* : +5, range 100/200 ft. *Hit* : 7 (1d8 + 3) Piercing damage.
    senses: Darkvision 60 ft., Passive Perception 11
    languages:
    - Common
  fr:
    name: Manticore
    subtype: null
    description: |-
      ## Actions

      ***Attaques multiples***. La manticore effectue trois attaques, réparties à sa guise entre Saignée et Piquant caudal.

      ***Saignée***. *Corps à corps* : +5, allonge 1,50 m. *Touché* : 7 (1d8 + 3) dégâts tranchants.

      ***Piquant caudal***. *À distance* : +5, portée 30/60 m. *Touché* : 7 (1d8 + 3) dégâts perforants.
    senses: Vision dans le noir 18 m, Perception passive 11
    languages:
    - commun
