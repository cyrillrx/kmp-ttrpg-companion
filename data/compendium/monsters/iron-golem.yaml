translations:
  en:
    name: Iron Golem
    subtype: null
    description: |-
      ## Traits

      ***Fire Absorption***. Whenever the golem is subjected to Fire damage, it regains a number of Hit Points equal to the Fire damage dealt.

      ***Immutable Form***. The golem can't shape-shift.

      ***Magic Resistance***. The golem has Advantage on saving throws against spells and other magical effects.

      ## Actions

      ***Multiattack***. The golem makes two attacks, using Bladed Arm or Fiery Bolt in any combination.

      ***Bladed Arm***. *Melee Attack Roll* : +12, reach 10 ft. *Hit* : 20 (3d8 + 7) Slashing damage plus 10 (3d6) Fire damage.

      ***Fiery Bolt***. *Ranged Attack Roll* : +10, range 120 ft. *Hit* : 36 (8d8) Fire damage.

      ***Poison Breath (Recharge 6)***. *Constitution Saving Throw* : DC 18, each creature in a 60-foot Cone. *Failure* : 55 (10d10) Poison damage. *Success* : Half damage.
    senses: Darkvision 120 ft., Passive Perception 10
    languages:
    - Understands Common plus two other languages but can't speak
  fr:
    name: Golem de fer
    subtype: null
    description: |-
      ## Traits

      ***Absorption du feu***. Chaque fois que le golem est soumis à des dégâts de feu, il récupère en fait autant de points de vie que les dégâts de feu infligés.

      ***Forme immuable***. Le golem ne peut pas être métamorphosé.

      ***Résistance à la magie***. Le golem a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.

      ## Actions

      ***Attaques multiples***. Le golem effectue deux attaques, réparties à sa guise entre Lame brachiale et Trait enflammé.

      ***Lame brachiale***. *Corps à corps* : +12, allonge 3 m. *Touché* : 20 (3d8 + 7) dégâts tranchants plus 10 (3d6) dégâts de feu.

      ***Trait enflammé***. *À distance* : +10, portée 36 m. *Touché* : 36 (8d8) dégâts de feu.

      ***Souffle empoisonné (recharge 6)***. *JdS Constitution* : DD 18, chaque créature dans un Cône de 18 m. *Échec* : 55 (10d10) dégâts de poison. *Réussite* : demi-dégâts.
    senses: Vision dans le noir 36 m, Perception passive 10
    languages:
    - comprend le commun plus deux autres langues
    - mais ne parle pas
