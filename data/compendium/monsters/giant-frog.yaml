translations:
  en:
    name: Giant Frog
    subtype: null
    description: |-
      ## Traits

      ***Amphibious***. The frog can breathe air and water.

      ***Standing Leap***. The frog's Long Jump is up to 20 feet and its High Jump is up to 10 feet with or without a running start.

      ## Actions

      ***Bite***. *Melee Attack Roll* : +3, reach 5 ft. *Hit* : 5 (1d6 + 2) Piercing damage. If the target is a Medium or smaller creature, it has the Grappled condition (escape DC 11).

      ***Swallow***. The frog swallows a Small or smaller target it is grappling. While swallowed, the target isn't Grappled but has the Blinded and Restrained conditions, and it has Total Cover against attacks and other effects outside the frog. While swallowing the target, the frog can't use Bite, and if the frog dies, the swallowed target is no longer Restrained and can escape from the corpse using 5 feet of movement, exiting with the Prone condition. At the end of the frog's next turn, the swallowed target takes 5 (2d4) Acid damage. If that damage doesn't kill it, the frog disgorges it, causing it to exit Prone.
    senses: Darkvision 30 ft., Passive Perception 12
    languages:
    - None
  fr:
    name: Grenouille géante
    subtype: null
    description: |-
      ## Traits

      ***Amphibie***. La grenouille peut respirer sous l'eau comme à l'air libre.

      ***Saut sans élan***. Les sauts en longueur de la grenouille peuvent atteindre 6 m et ses sauts en hauteur 3 m, avec ou sans élan.

      ## Actions

      ***Morsure***. *Corps à corps* : +3, allonge 1,50 m. *Touché* : 5 (1d6 + 2) dégâts perforants. Si la cible est une créature de taille M ou inférieure, elle subit l'état Agrippé (évasion DD 11).

      ***Engloutissement***. La grenouille engloutit une cible de taille P ou inférieure qu'elle agrippe. Tant qu'elle est engloutie, la cible n'est pas Agrippée mais subit les états Aveuglé et Entravé, et bénéficie d'un Abri total contre les attaques et autres effets émanant de l'extérieur de la grenouille. Tant qu'elle engloutit la cible, la grenouille ne peut pas recourir à Morsure. Si la grenouille meurt, la cible engloutie n'est plus Entravée et peut s'extraire du cadavre avec l'état À terre en y consacrant 1,50 m de déplacement. À la fin du tour suivant de la grenouille, la cible engloutie subit 5 (2d4) dégâts d'acide. Si ces dégâts ne la tuent pas, la cible est régurgitée par la grenouille, dont elle sort avec l'état À terre.
    senses: Vision dans le noir 9 m, Perception passive 12
    languages:
    - aucune
