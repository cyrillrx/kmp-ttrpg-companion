translations:
  en:
    name: Reef Shark
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Pack Tactics</em>**. The shark has Advantage on an attack roll against a creature if at least one of the shark's allies is within 5 feet of the creature and the ally doesn't have the Incapacitated condition.</p>
      <p><strong><em>Water Breathing</em></strong>. The shark can breathe only underwater.</p>
      <h2>Actions</h2>
      <p>** <em>Bite</em>**. <em>Melee Attack Roll</em> : +4, reach 5 ft. <em>Hit</em> : 7 (2d4 + 2) Piercing damage.</p>
    senses: Blindsight 30 ft., Passive Perception 12
    languages:
    - None
  fr:
    name: Requin de récif
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Tactique de meute</em>**. Le requin a un Avantage aux jets d'attaque contre une créature si au moins l'un de ses alliés est à 1,50 m ou moins de la créature et si l'allié n'a pas l'état Incapable d'agir.</p>
      <p><strong><em>Respiration aquatique</em></strong>. Le requin ne peut respirer que sous l'eau.</p>
      <h2>Actions</h2>
      <p>** <em>Morsure</em>**. <em>Corps à corps</em> : +4, allonge 1,50 m. <em>Touché</em> : 7 (2d4 + 2) dégâts perforants.</p>
    senses: Vision aveugle 9 m, Perception passive 12
    languages:
    - aucune
