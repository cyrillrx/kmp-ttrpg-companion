translations:
  en:
    name: Mezzoloth
    subtype: Yugoloth
    description: |-
      ## Traits

      ***Fiendish Restoration***. If the mezzoloth dies outside Gehenna, its body dissolves into ichor, and it gains a new body instantly, reviving with all its Hit Points somewhere in Gehenna.

      ***Magic Resistance***. The mezzoloth has Advantage on saving throws against spells and other magical effects.

      ## Actions

      ***Multiattack***. The mezzoloth makes two attacks, using Claws or Mercurial Trident in any combination.

      ***Claws***. *Melee Attack Roll* : +7, reach 5 ft. *Hit* : 9 (2d4 + 4) Slashing damage. If the target is a Large or smaller creature, it has the Grappled condition (escape DC 14) from two of four claws, and it has the Restrained condition until the grapple ends.

      ***Mercurial Trident***. *Melee or Ranged Attack Roll* : +7, reach 5 ft. or range 20/60 ft. *Hit* : 8 (1d8 + 4) Piercing damage plus 10 (3d6) Force damage. *Hit or Miss* : The trident magically returns to the mezzoloth's claw immediately after a ranged attack.

      ***Spellcasting***. The mezzoloth casts one of the following spells, requiring no Material components and using Wisdom as the spellcasting ability (spell save DC 13):

      1/day each: *[Cloudkill](https://www.aidedd.org/spell/cloudkill), [Darkness](https://www.aidedd.org/spell/darkness), [Dispel Magic](https://www.aidedd.org/spell/dispel-magic)*

      ## Bonus actions

      ***Teleport (Recharge 5–6)***. The mezzoloth teleports up to 60 feet to an unoccupied space it can see. It can teleport one creature it is grappling to an unoccupied space within 5 feet of its destination space.
    senses: Blindsight 60 ft., Darkvision 60 ft., Passive Perception 15
    languages:
    - Abyssal
    - Infernal; telepathy 60 ft.
  fr:
    name: Mezzoloth
    subtype: Yugoloth
    description: |-
      ## Traits

      ***Restauration fiélonne***. Si le mezzoloth meurt hors de Géhenne, son corps se dissout en ichor et il en acquiert aussitôt un nouveau et revient à la vie avec tous ses pv, quelque part dans Géhenne.

      ***Résistance à la magie***. Le mezzoloth a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.

      ## Actions

      ***Attaques multiples***. Le mezzoloth effectue deux attaques, réparties à sa guise entre Griffes et Trident labile.

      ***Pinces***. *Corps à corps* : +7, allonge 1,50 m. *Touché* : 9 (2d4 + 4) dégâts tranchants. Si la cible est une créature de taille G ou inférieure, elle subit l'état Agrippé (évasion DD 14) de deux des quatre pinces, et elle subit l'état Entravé tant qu'elle est agrippée.

      ***Trident labile***. *Corps à corps ou à distance* : +7, allonge 1,50 m ou portée 6/18 m. *Touché* : 8 (1d8 + 4) dégâts perforants plus 10 (3d6) dégâts de force. *Échec ou réussite* : le trident retourne magiquement dans la pince du mezzoloth immédiatement après une attaque à distance.

      ***Incantation***. Le mezzoloth lance l'un des sorts suivants sans composantes matérielles, la Sagesse étant sa caractéristique d'incantation (DD de sauvegarde 13) :

      1/jour chacun : *[brume mortelle](https://www.aidedd.org/spell/fr/brume-mortelle), [ténèbres](https://www.aidedd.org/spell/fr/tenebres), [dissipation de la magie](https://www.aidedd.org/spell/fr/dissipation-de-la-magie)*

      ## Actions Bonus

      ***Téléportation (recharge 5–6)***. Le mezzoloth se téléporte jusqu'à 18 m vers un espace libre qu'il peut voir. Il peut téléporter une créature qu'il agrippe vers un espace libre situé dans un rayon de 1,50 m autour de son espace de destination.
    senses: Vision aveugle 18 m, Vision dans le noir 18 m, Perception passive 15
    languages:
    - abyssal
    - infernal ; télépathie 18 m
