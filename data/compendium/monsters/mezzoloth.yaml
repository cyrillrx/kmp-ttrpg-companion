translations:
  en:
    name: Mezzoloth
    subtype: Yugoloth
    description: |-
      <h2>Traits</h2>
      <p>** <em>Fiendish Restoration</em>**. If the mezzoloth dies outside Gehenna, its body dissolves into ichor, and it gains a new body instantly, reviving with all its Hit Points somewhere in Gehenna.</p>
      <p><strong><em>Magic Resistance</em></strong>. The mezzoloth has Advantage on saving throws against spells and other magical effects.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The mezzoloth makes two attacks, using Claws or Mercurial Trident in any combination.</p>
      <p><strong><em>Claws</em></strong>. <em>Melee Attack Roll</em> : +7, reach 5 ft. <em>Hit</em> : 9 (2d4 + 4) Slashing damage. If the target is a Large or smaller creature, it has the Grappled condition (escape DC 14) from two of four claws, and it has the Restrained condition until the grapple ends.</p>
      <p><strong><em>Mercurial Trident</em></strong>. <em>Melee or Ranged Attack Roll</em> : +7, reach 5 ft. or range 20/60 ft. <em>Hit</em> : 8 (1d8 + 4) Piercing damage plus 10 (3d6) Force damage. <em>Hit or Miss</em> : The trident magically returns to the mezzoloth's claw immediately after a ranged attack.</p>
      <p><strong><em>Spellcasting</em></strong>. The mezzoloth casts one of the following spells, requiring no Material components and using Wisdom as the spellcasting ability (spell save DC 13):</p>
      <p>1/day each: <em><a href="https://www.aidedd.org/spell/cloudkill">Cloudkill</a>, <a href="https://www.aidedd.org/spell/darkness">Darkness</a>, <a href="https://www.aidedd.org/spell/dispel-magic">Dispel Magic</a></em>  </p>
      <h2>Bonus actions</h2>
      <p>** <em>Teleport (Recharge 5–6)</em>**. The mezzoloth teleports up to 60 feet to an unoccupied space it can see. It can teleport one creature it is grappling to an unoccupied space within 5 feet of its destination space.</p>
    senses: Blindsight 60 ft., Darkvision 60 ft., Passive Perception 15
    languages:
    - Abyssal
    - Infernal; telepathy 60 ft.
  fr:
    name: Mezzoloth
    subtype: Yugoloth
    description: |-
      <h2>Traits</h2>
      <p>** <em>Restauration fiélonne</em>**. Si le mezzoloth meurt hors de Géhenne, son corps se dissout en ichor et il en acquiert aussitôt un nouveau et revient à la vie avec tous ses pv, quelque part dans Géhenne.</p>
      <p><strong><em>Résistance à la magie</em></strong>. Le mezzoloth a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le mezzoloth effectue deux attaques, réparties à sa guise entre Griffes et Trident labile.</p>
      <p><strong><em>Pinces</em></strong>. <em>Corps à corps</em> : +7, allonge 1,50 m. <em>Touché</em> : 9 (2d4 + 4) dégâts tranchants. Si la cible est une créature de taille G ou inférieure, elle subit l'état Agrippé (évasion DD 14) de deux des quatre pinces, et elle subit l'état Entravé tant qu'elle est agrippée.</p>
      <p><strong><em>Trident labile</em></strong>. <em>Corps à corps ou à distance</em> : +7, allonge 1,50 m ou portée 6/18 m. <em>Touché</em> : 8 (1d8 + 4) dégâts perforants plus 10 (3d6) dégâts de force. <em>Échec ou réussite</em> : le trident retourne magiquement dans la pince du mezzoloth immédiatement après une attaque à distance.</p>
      <p><strong><em>Incantation</em></strong>. Le mezzoloth lance l'un des sorts suivants sans composantes matérielles, la Sagesse étant sa caractéristique d'incantation (DD de sauvegarde 13) :</p>
      <p>1/jour chacun : <em><a href="https://www.aidedd.org/spell/fr/brume-mortelle">brume mortelle</a>, <a href="https://www.aidedd.org/spell/fr/tenebres">ténèbres</a>, <a href="https://www.aidedd.org/spell/fr/dissipation-de-la-magie">dissipation de la magie</a></em>  </p>
      <h2>Actions Bonus</h2>
      <p>** <em>Téléportation (recharge 5–6)</em>**. Le mezzoloth se téléporte jusqu'à 18 m vers un espace libre qu'il peut voir. Il peut téléporter une créature qu'il agrippe vers un espace libre situé dans un rayon de 1,50 m autour de son espace de destination.</p>
    senses: Vision aveugle 18 m, Vision dans le noir 18 m, Perception passive 15
    languages:
    - abyssal
    - infernal ; télépathie 18 m
