translations:
  en:
    name: Cloaker
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Light Sensitivity</em>**. While in Bright Light, the cloaker has Disadvantage on attack rolls.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The cloaker makes one Attach attack and two Tail attacks.</p>
      <p><strong><em>Attach</em></strong>. <em>Melee Attack Roll</em> : +6, reach 5 ft. <em>Hit</em> : 13 (3d6 + 3) Piercing damage. If the target is a Large or smaller creature, the cloaker attaches to it. While the cloaker is attached, the target has the Blinded condition, and the cloaker can't make Attach attacks against other targets. In addition, the cloaker halves the damage it takes (round down), and the target takes the same amount of damage. The cloaker can detach itself by spending 5 feet of movement. The target or a creature within 5 feet of it can take an action to try to detach the cloaker, doing so by succeeding on a DC 14 Strength (Athletics) check.</p>
      <p><strong><em>Tail</em></strong>. <em>Melee Attack Roll</em> : +6, reach 10 ft. <em>Hit</em> : 8 (1d10 + 3) Slashing damage.</p>
      <h2>Bonus actions</h2>
      <p>** <em>Moan</em>**. <em>Wisdom Saving Throw</em> : DC 13, each creature in a 60-foot Emanation originating from the cloaker. <em>Failure</em> : The target has the Frightened condition until the end of the cloaker's next turn. <em>Success</em> : The target is immune to this cloaker's Moan for the next 24 hours.</p>
      <p><strong><em>Phantasms (Recharge after a Short or Long Rest)</em></strong>. The cloaker casts the <em><a href="https://www.aidedd.org/spell/mirror-image">Mirror Image</a></em> spell, requiring no spell components and using Wisdom as the spellcasting ability. The spell ends early if the cloaker starts or ends its turn in Bright Light.</p>
    senses: Darkvision 120 ft., Passive Perception 12
    languages:
    - Deep Speech
    - Undercommon
  fr:
    name: Manteleur
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Sensibilité à la lumière</em>**. Exposé à une Lumière vive, le manteleur subit un Désavantage aux jets d'attaque.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le manteleur effectue une attaque d'Enveloppement et deux attaques de Queue.</p>
      <p><strong><em>Drapement</em></strong>. <em>Corps à corps</em> : +6, allonge 1,50 m. <em>Touché</em> : 13 (3d6 + 3) dégâts perforants. Si la cible est une créature de taille G ou inférieure, le manteleur l'enveloppe. Tant que la cible est enveloppée par le manteleur, celle-ci subit l'état Aveuglé et le manteleur ne peut pas effectuer d'attaque d'Enveloppement sur une autre cible. En outre, le manteleur divise par deux les dégâts qu'il subit (arrondis à l'inférieur), et la cible subit le même montant de dégâts. Pour se décrocher, le manteleur doit dépenser 1,50 m de déplacement. La cible ou une créature dans un rayon de 1,50 m peut entreprendre une action pour tenter de décrocher le manteleur, ce qui nécessite de réussir un jet de Force (Athlétisme) DD 14.</p>
      <p><strong><em>Queue</em></strong>. <em>Corps à corps</em> : +6, allonge 3 m. <em>Touché</em> : 8 (1d10 + 3) dégâts tranchants.</p>
      <h2>Actions Bonus</h2>
      <p>** <em>Fantasmagories (recharge après un Repos court ou long)</em>**. Le manteleur lance le sort <em>image miroir</em> , sans composantes matérielles, la Sagesse étant sa caractéristique d'incantation. Le sort prend fin prématurément si le manteleur démarre son tour sous une Lumière vive.</p>
      <p><strong><em>Lamentation</em></strong>. <em>JdS Sagesse</em> : DD 13, chaque créature dans une Émanation de 18 m centrée sur le manteleur. <em>Échec</em> : la cible subit l'état Effrayé jusqu'à la fin du tour suivant du manteleur. <em>Réussite</em> : la cible est immunisée contre la Lamentation de ce manteleur pendant 24 heures.</p>
    senses: Vision dans le noir 36 m, Perception passive 12
    languages:
    - profond
    - commun des profondeurs
