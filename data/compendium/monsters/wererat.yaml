translations:
  en:
    name: Wererat
    subtype: Lycanthrope
    description: |-
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The wererat makes two attacks, using Scratch or Hand Crossbow in any combination. It can replace one attack with a Bite attack.</p>
      <p><strong><em>Bite (Rat or Hybrid Form Only)</em></strong>. <em>Melee Attack Roll</em> : +5, reach 5 ft. <em>Hit</em> : 8 (2d4 + 3) Piercing damage. If the target is a Humanoid, it is subjected to the following effect. <em>Constitution Saving Throw</em> : DC 11. <em>Failure</em> : The target is cursed. If the cursed target drops to 0 Hit Points, it instead becomes a <strong>Wererat</strong> under the DM's control and has 10 Hit Points. <em>Success</em> : The target is immune to this wererat's curse for 24 hours.</p>
      <p><strong><em>Scratch</em></strong>. <em>Melee Attack Roll</em> : +5, reach 5 ft. <em>Hit</em> : 6 (1d6 + 3) Slashing damage.</p>
      <p><strong><em>Hand Crossbow (Humanoid or Hybrid Form Only)</em></strong>. <em>Ranged Attack Roll</em> : +5, range 30/120 ft. <em>Hit</em> : 6 (1d6 + 3) Piercing damage.</p>
      <h2>Bonus actions</h2>
      <p>** <em>Shape-Shift</em>**. The wererat shape-shifts into a Medium rat-humanoid hybrid or a Small rat, or it returns to its true humanoid form. Its game statistics, other than its size, are the same in each form. Any equipment it is wearing or carrying isn't transformed.</p>
    senses: Darkvision 60 ft., Passive Perception 14
    languages:
    - Common (can't speak in rat form)
  fr:
    name: Rat-garou
    subtype: Lycanthrope
    description: |-
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le rat-garou effectue deux attaques, réparties à sa guise entre Éraflure et Arbalète de poing. Il peut en remplacer une par une attaque de Morsure.</p>
      <p><strong><em>Éraflure</em></strong>. <em>Corps à corps</em> : +5, allonge 1,50 m. <em>Touché</em> : 6 (1d6 + 3) dégâts tranchants.</p>
      <p><strong><em>Morsure (formes de rat et hybride uniquement)</em></strong>. <em>Corps à corps</em> : +5, allonge 1,50 m. <em>Touché</em> : 8 (2d4 + 3) dégâts perforants. Si la cible est un Humanoïde, elle est soumise à l'effet suivant. <em>JdS Constitution</em> : DD 11. <em>Échec</em> : la cible est maudite. Si la cible maudite tombe à 0 point de vie, elle se retrouve en fait à 10 pv et devient un <strong>rat-garou</strong> sous le contrôle du MD. <em>Réussite</em> : la cible est immunisée contre la malédiction de ce rat-garou pendant 24 heures.</p>
      <p><strong><em>Arbalète de poing (forme humanoïde ou hybride uniquement)</em></strong>. <em>À distance</em> : +5, portée 9/36 m. <em>Touché</em> : 6 (1d6 + 3) dégâts perforants.</p>
      <h2>Actions Bonus</h2>
      <p>** <em>Changement d'aspect</em>**. Le rat-garou se transforme en hybride rat-humanoïde de taille M ou en rat de taille P, ou bien retrouve sa forme véritable d'humanoïde. En dehors de sa catégorie de taille, son profil reste le même, quelle que soit la forme. Rien de ce qu'il porte n'est transformé.</p>
    senses: Vision dans le noir 18 m, Perception passive 14
    languages:
    - commun (ne peut pas parler sous forme de rat)
