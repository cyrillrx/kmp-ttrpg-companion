    - None
  fr:
    name: Grenouille
    subtype: null
    description: |-
      ## Traits

      ***Amphibie***. La grenouille peut respirer aussi bien à l'air libre que sous l'eau.

      ***Saut sans élan***. Le saut en longueur de la grenouille peut atteindre 3 m et son saut en hauteur peut atteindre 1,50 m avec ou sans élan.

      ## Actions

      ***Morsure***. *Corps à corps* : +3, allonge 1,50 m. *Touché* : 1 dégât perforant.
    senses: Vision dans le noir 9 m, Perception passive 11
    languages:
    - aucune
