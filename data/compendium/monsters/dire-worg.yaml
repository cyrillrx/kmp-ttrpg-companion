translations:
  en:
    name: Dire Worg
    subtype: null
    description: |-
      ## Traits

      ***Magic Resistance***. The worg has Advantage on saving throws against spells and other magical effects.

      ## Actions

      ***Multiattack***. The worg makes three Bite attacks.

      ***Bite***. *Melee Attack Roll* : +10, reach 5 ft. *Hit* : 15 (2d8 + 6) Piercing damage plus 7 (2d6) Poison damage, and the target has the Poisoned condition until the start of the worg's next turn. While Poisoned, the target can't regain Hit Points.

      ***Dreadful Howl (Recharge 5–6)***. *Wisdom Saving Throw* : DC 16, each creature within 30 feet that isn't a worg. *Failure* : 36 (8d8) Psychic damage, and the target has the Frightened condition until the start of the worg's next turn. *Success* : Half damage only.

      ## Bonus actions

      ***Warp Step***. The worg teleports, along with a willing creature of its choice within 5 feet of it, up to 30 feet to an unoccupied space it can see.
    senses: Darkvision 120 ft., Passive Perception 21
    languages:
    - Goblin
    - Sylvan
    - Worg
  fr:
    name: Worg sanguinaire
    subtype: null
    description: |-
      ## Traits

      ***Résistance à la magie***. Le worg a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.

      ## Actions

      ***Attaques multiples***. Le worg effectue trois attaques de Morsure.

      ***Morsure***. *Corps à corps* : +10, allonge 1,50 m. *Touché* : 15 (2d8 + 6) dégâts perforants plus 7 (2d6) dégâts de poison, et la cible subit l'état Empoisonné jusqu'au début du prochain tour du worg. Tant qu'elle est empoisonnée, la cible ne peut pas récupérer de points de vie.

      ***Hurlement (recharge 5–6)***. *JdS Sagesse* : DD 16, chaque créature dans un rayon de 9 m qui n'est pas un worg. *Échec* : 36 (8d8) dégâts psychiques, et la cible subit l'état Effrayé jusqu'au début du prochain tour du worg. *Réussite* : demi-dégâts uniquement.

      ## Actions Bonus

      ***Soubresaut***. Le worg se téléporte, avec une créature consentante de son choix se trouvant dans un rayon de 1,50 m, jusqu'à 9 m de distance vers un espace inoccupé qu'il peut voir.
    senses: Vision dans le noir 36 m, Perception passive 21
    languages:
    - gobelin
    - sylvestre
    - worg
