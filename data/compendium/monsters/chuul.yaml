translations:
  en:
    name: Chuul
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Amphibious</em>**. The chuul can breathe air and water.</p>
      <p><strong><em>Sense Magic</em></strong>. The chuul senses magic within 120 feet of itself. This trait otherwise works like the <em><a href="https://www.aidedd.org/spell/detect-magic">Detect Magic</a></em> spell but isn't itself magical.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The chuul makes two Pincer attacks and uses Paralyzing Tentacles.</p>
      <p><strong><em>Pincer</em></strong>. <em>Melee Attack Roll</em> : +6, reach 10 ft. <em>Hit</em> : 9 (1d10 + 4) Bludgeoning damage. If the target is a Large or smaller creature, it has the Grappled condition (escape DC 14) from one of two pincers.</p>
      <p><strong><em>Paralyzing Tentacles</em></strong>. <em>Constitution Saving Throw</em> : DC 13, one creature Grappled by the chuul. <em>Failure</em> : The target has the Poisoned condition and repeats the save at the end of each of its turns, ending the effect on itself on a success. After 1 minute, it succeeds automatically. While Poisoned, the target has the Paralyzed condition.</p>
    senses: Darkvision 60 ft., Passive Perception 14
    languages:
    - Understands Deep Speech but can't speak
  fr:
    name: Chuul
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Amphibie</em>**. Le chuul peut respirer sous l'eau comme à l'air libre.</p>
      <p><strong><em>Perception de la magie</em></strong>. Le chuul perçoit la magie dans un rayon de 36 m. Ce trait fonctionne pour le reste comme le sort <em><a href="https://www.aidedd.org/spell/fr/detection-de-la-magie">détection de la magie</a></em> , même s'il n'est pas magique en lui-même.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le chuul effectue deux attaques de Pince et recourt à Tentacules paralysants.</p>
      <p><strong><em>Pince</em></strong>. <em>Corps à corps</em> : +6, allonge 3 m. <em>Touché</em> : 9 (1d10 + 4) dégâts contondants. Si la cible est une créature de taille G ou inférieure, elle subit l'état Agrippé (évasion DD 14) par l'une des deux pinces.</p>
      <p><strong><em>Tentacules paralysants</em></strong>. <em>JdS Constitution</em> : DD 13, une créature Agrippée par le chuul. <em>Échec</em> : la cible subit l'état Empoisonné et réitère le JdS à la fin de chacun de ses tours ; elle met un terme à l'effet sur elle-même en cas de réussite. Au bout de 1 minute, elle réussit automatiquement ce JdS. Tant qu'elle est ainsi Empoisonnée, la cible subit l'état Paralysé.</p>
    senses: Vision dans le noir 18 m, Perception passive 14
    languages:
    - comprend le profond mais ne parle pas
