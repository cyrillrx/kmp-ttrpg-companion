  en:
    name: Shrieker Fungus
    subtype: null
    description: '## Reactions


      ***Shriek***. *Trigger* : A creature or a source of Bright Light moves within
      30 feet of the shrieker. *Response* : The shrieker emits a shriek audible within
      300 feet of itself for 1 minute or until the shrieker dies.'
    senses: Blindsight 30 ft., Passive Perception 6
    languages: []
  fr:
    name: Thallophyte, criard
    subtype: null
    description: '## Réactions


      ***Criaillement***. *Déclencheur* : une créature ou une source de Lumière vive
      se déplace dans un rayon de 9 m du criard. *Conséquences* : le criard émet un
      hurlement audible dans un rayon de 90 m pendant 1 minute (le cri cesse s''il
      meurt).'
    senses: Vision aveugle 9 m, Perception passive 6
    languages: []
