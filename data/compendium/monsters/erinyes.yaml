    - Infernal; telepathy 120 ft.
  fr:
    name: Érinye
    subtype: Diable
    description: '## Traits


      ***Corde magique***. L''érinye possède une corde magique. Tant qu''elle la porte
      sur elle, elle peut recourir à l''action Rets implacables. La corde présente
      le profil suivant : CA 20, 90 pv, Immunité contre les dégâts psychiques et de
      poison. La corde est réduite en poussière si elle tombe à 0 point de vie, se
      trouve à 1,50 m ou plus de l''érinye pendant au moins 1 heure ou si l''érinye
      meurt. Si la corde subit des dégâts ou est détruite, l''érinye peut la restaurer
      entièrement en terminant un Repos court ou long.


      ***Résistance à la magie***. L''érinye a un Avantage aux jets de sauvegarde
      contre les sorts et autres effets magiques.


      ***Restauration diabolique***. Si l''érinye meurt hors des Neuf Enfers, son
      corps disparaît dans un nuage de fumée sulfureuse et elle en acquiert aussitôt
      un nouveau en revenant à la vie avec tous ses pv, quelque part dans les Neuf
      Enfers.


      ## Actions


      ***Attaques multiples***. L''érinye effectue trois attaques d''Épée flétrissante
      et peut recourir à Rets implacables.


      ***Épée flétrissante***. *Corps à corps* : +8, allonge 1,50 m. *Touché* : 13
      (2d8 + 4) dégâts tranchants plus 11 (2d10) dégâts nécrotiques.


      ***Rets implacables (corde magique requise)***. *JdS Force* : DD 16, une créature
      que l''érinye voit dans un rayon de 36 m. *Échec* : 14 (4d6) dégâts de force,
      et la cible subit l''état Entravé jusqu''à ce que la corde soit détruite, que
      l''érinye la libère par une action Bonus ou que l''érinye recoure de nouveau
      à Rets implacables.


      ## Réactions


      ***Parade***. *Déclencheur* : l''érinye est touchée par un jet d''attaque de
      corps à corps alors qu''elle tient une arme. *Conséquences* : l''érinye ajoute
      4 à sa CA contre cette attaque, ce qui peut la faire rater.'
    senses: vision véritable 36 m, Perception passive 16
    languages:
    - infernal ; télépathie 36 m
