translations:
  en:
    name: Erinyes
    subtype: Devil
    description: |-
      <h2>Traits</h2>
      <p>** <em>Diabolical Restoration</em>**. If the erinyes dies outside the Nine Hells, its body disappears in sulfurous smoke, and it gains a new body instantly, reviving with all its Hit Points somewhere in the Nine Hells.</p>
      <p><strong><em>Magic Resistance</em></strong>. The erinyes has Advantage on saving throws against spells and other magical effects.</p>
      <p><strong><em>Magic Rope</em></strong>. The erinyes has a magic rope. While bearing it, the erinyes can use the Entangling Rope action. The rope has AC 20, HP 90, and Immunity to Poison and Psychic damage. The rope turns to dust if reduced to 0 Hit Points, if it is 5+ feet away from the erinyes for 1 hour or more, or if the erinyes dies. If the rope is damaged or destroyed, the erinyes can fully restore it when finishing a Short or Long Rest.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The erinyes makes three Withering Sword attacks and can use Entangling Rope.</p>
      <p><strong><em>Withering Sword</em></strong>. <em>Melee Attack Roll</em> : +8, reach 5 ft. <em>Hit</em> : 13 (2d8 + 4) Slashing damage plus 11 (2d10) Necrotic damage.</p>
      <p><strong><em>Entangling Rope (Requires Magic Rope)</em></strong>. <em>Strength Saving Throw</em> : DC 16, one creature the erinyes can see within 120 feet. <em>Failure</em> : 14 (4d6) Force damage, and the target has the Restrained condition until the rope is destroyed, the erinyes uses a Bonus Action to release the target, or the erinyes uses Entangling Rope again.</p>
      <h2>Reactions</h2>
      <p>** <em>Parry</em>**. <em>Trigger</em> : The erinyes is hit by a melee attack roll while holding a weapon. <em>Response</em> : The erinyes adds 4 to its AC against that attack, possibly causing it to m</p>
    senses: Truesight 120 ft., Passive Perception 16
    languages:
    - Infernal; telepathy 120 ft.
  fr:
    name: Érinye
    subtype: Diable
    description: |-
      <h2>Traits</h2>
      <p>** <em>Corde magique</em>**. L'érinye possède une corde magique. Tant qu'elle la porte sur elle, elle peut recourir à l'action Rets implacables. La corde présente le profil suivant : CA 20, 90 pv, Immunité contre les dégâts psychiques et de poison. La corde est réduite en poussière si elle tombe à 0 point de vie, se trouve à 1,50 m ou plus de l'érinye pendant au moins 1 heure ou si l'érinye meurt. Si la corde subit des dégâts ou est détruite, l'érinye peut la restaurer entièrement en terminant un Repos court ou long.</p>
      <p><strong><em>Résistance à la magie</em></strong>. L'érinye a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.</p>
      <p><strong><em>Restauration diabolique</em></strong>. Si l'érinye meurt hors des Neuf Enfers, son corps disparaît dans un nuage de fumée sulfureuse et elle en acquiert aussitôt un nouveau en revenant à la vie avec tous ses pv, quelque part dans les Neuf Enfers.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. L'érinye effectue trois attaques d'Épée flétrissante et peut recourir à Rets implacables.</p>
      <p><strong><em>Épée flétrissante</em></strong>. <em>Corps à corps</em> : +8, allonge 1,50 m. <em>Touché</em> : 13 (2d8 + 4) dégâts tranchants plus 11 (2d10) dégâts nécrotiques.</p>
      <p><strong><em>Rets implacables (corde magique requise)</em></strong>. <em>JdS Force</em> : DD 16, une créature que l'érinye voit dans un rayon de 36 m. <em>Échec</em> : 14 (4d6) dégâts de force, et la cible subit l'état Entravé jusqu'à ce que la corde soit détruite, que l'érinye la libère par une action Bonus ou que l'érinye recoure de nouveau à Rets implacables.</p>
      <h2>Réactions</h2>
      <p>** <em>Parade</em>**. <em>Déclencheur</em> : l'érinye est touchée par un jet d'attaque de corps à corps alors qu'elle tient une arme. <em>Conséquences</em> : l'érinye ajoute 4 à sa CA contre cette attaque, ce qui peut la faire rater.</p>
    senses: vision véritable 36 m, Perception passive 16
    languages:
    - infernal ; télépathie 36 m
