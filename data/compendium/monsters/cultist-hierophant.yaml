translations:
  en:
    name: Cultist Hierophant
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The cultist makes three attacks, using Pact Blade or Radiant Ray in any combination.</p>
      <p><strong><em>Pact Blade</em></strong>. <em>Melee Attack Roll</em> : +9, reach 5 ft. <em>Hit</em> : 12 (2d6 + 5) Slashing damage plus 18 (4d8) Radiant damage.</p>
      <p><strong><em>Radiant Ray</em></strong>. <em>Ranged Attack Roll</em> : +9, range 120 ft. <em>Hit</em> : 31 (4d12 + 5) Radiant damage.</p>
      <p><strong><em>Spellcasting</em></strong>. The cultist casts one of the following spells, using Charisma as the spellcasting ability (spell save DC 17):</p>
      <p>At will: <em><a href="https://www.aidedd.org/spell/thaumaturgy">Thaumaturgy</a></em><br />
      1/day each: <em><a href="https://www.aidedd.org/spell/jallarzi-s-storm-of-radiance">Jallarzi's Storm of Radiance</a></em> (level 7 version), <em><a href="https://www.aidedd.org/spell/mass-suggestion">Mass Suggestion</a></em></p>
    senses: Passive Perception 17
    languages:
    - Celestial
    - Common
  fr:
    name: Cultiste, hiérophante
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le cultiste effectue trois attaques, réparties à sa guise entre Lame de pacte et Rayon radiant.</p>
      <p><strong><em>Lame de pacte</em></strong>. <em>Corps à corps</em> : +9, allonge 1,50 m. <em>Touché</em> : 12 (2d6 + 5) dégâts tranchants plus 18 (4d8) dégâts radiants.</p>
      <p><strong><em>Rayon radiant</em></strong>. <em>À distance</em> : +9, portée 36 m. <em>Touché</em> : 31 (4d12 + 5) dégâts radiants</p>
      <p>** <em>Incantation</em>**. Le cultiste lance l'un des sorts suivants, le Charisme étant sa caractéristique d'incantation (DD de sauvegarde 17) :</p>
      <p>À volonté : <em><a href="https://www.aidedd.org/spell/fr/thaumaturgie">thaumaturgie</a></em><br />
      1/jour chacun : <em><a href="https://www.aidedd.org/spell/fr/tempete-radieuse-de-jallarzi&quot;">tempête radieuse de Jallarzi</a></em> (au niveau 7), <em><a href="https://www.aidedd.org/spell/fr/suggestion-de-groupe">suggestion de groupe</a></em></p>
    senses: Perception passive 17
    languages:
    - céleste
    - commun
