  en:
    name: Vampire
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Legendary Resistance (3/Day, or 4/Day in Lair)</em>**. If the vampire fails a saving throw, it can choose to succeed instead.</p>
      <p><strong><em>Misty Escape</em></strong>. If the vampire drops to 0 Hit Points outside its resting place, the vampire uses Shape-Shift to become mist (no action required). If it can't use Shape-Shift, it is destroyed. While it has 0 Hit Points in mist form, it can't return to its vampire form, and it must reach its resting place within 2 hours or be destroyed. Once in its resting place, it returns to its vampire form and has the Paralyzed condition until it regains any Hit Points, and it regains 1 Hit Point after spending 1 hour there.</p>
      <p><strong><em>Spider Climb</em></strong>. The vampire can climb difficult surfaces, including along ceilings, without needing to make an ability check.</p>
      <p><strong><em>Vampire Weakness</em></strong>. The vampire has these weaknesses:</p>
      <p><strong><em>Forbiddance</em></strong>. The vampire can't enter a residence without an invitation from an occupant.</p>
      <p><strong><em>Running Water</em></strong>. The vampire takes 20 Acid damage if it ends its turn in running water.</p>
      <p><strong><em>Stake to the Heart</em></strong>. If a weapon that deals Piercing damage is driven into the vampire's heart while the vampire has the Incapacitated condition in its resting place, the vampire has the Paralyzed condition until the weapon is removed.</p>
      <p><strong><em>Sunlight</em></strong>. The vampire takes 20 Radiant damage if it starts its turn in sunlight. While in sunlight, it has Disadvantage on attack rolls and ability checks.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack (Vampire Form Only)</em>**. The vampire makes two Grave Strike attacks and uses Bite.</p>
      <p><strong><em>Grave Strike (Vampire Form Only)</em></strong>. <em>Melee Attack Roll</em> : +9, reach 5 ft. <em>Hit</em> : 8 (1d8 + 4) Bludgeoning damage plus 7 (2d6) Necrotic damage. If the target is a Large or smaller creature, it has the Grappled condition (escape DC 14) from one of two hands.</p>
      <p><strong><em>Bite (Bat or Vampire Form Only)</em></strong>. <em>Constitution Saving Throw</em> : DC 17, one creature within 5 feet that is willing or that has the Grappled, Incapacitated, or Restrained condition. <em>Failure</em> : 6 (1d4 + 4) Piercing damage plus 13 (3d8) Necrotic damage. The target's Hit Point maximum decreases by an amount equal to the Necrotic damage taken, and the vampire regains Hit Points equal to that amount. A Humanoid reduced to 0 Hit Points by this damage and then buried rises the following sunset as a Vampire Spawn under the vampire's control.</p>
      <h2>Bonus actions</h2>
      <p>** <em>Shape-Shift</em>**. If the vampire isn't in sunlight or running water, it shape-shifts into a Tiny bat (Speed 5 ft., Fly Speed 30 ft.) or a Medium cloud of mist (Speed 5 ft., Fly Speed 20 ft. [hover]), or it returns to its vampire form. Anything it is wearing transforms with it. While in bat form, the vampire can't speak. Its game statistics, other than its size and Speed, are unchanged. While in mist form, the vampire can't take any actions, speak, or manipulate objects. It is weightless and can enter an enemy's space and stop there. If air can pass through a space, the mist can do so, but it can't pass through liquid. It has Resistance to all damage, except the damage it takes from sunlight.</p>
      <p><strong><em>Charm (Recharge 5–6)</em></strong>. The vampire casts <em><a href="https://www.aidedd.org/spell/charm-person">Charm Person</a></em> , requiring no spell components and using Charisma as the spellcasting ability (spell save DC 17), and the duration is 24 hours. The Charmed target is a willing recipient of the vampire's Bite, the damage of which doesn't end the spell. When the spell ends, the target is unaware it was Charmed by the vampire.</p>
      <h2>Legendary actions</h2>
      <p>Legendary Action Uses: 3 (4 in Lair). Immediately after another creature's turn, The vampire can expend a use to take one of the following actions. The vampire regains all expended uses at the start of each of its turns. </p>
      <p><strong><em>Deathless Strike</em></strong>. The vampire moves up to half its Speed, and it makes one Grave Strike attack.</p>
      <p><strong><em>Beguile</em></strong>. The vampire casts <em><a href="https://www.aidedd.org/spell/command">Command</a></em> , requiring no spell components and using Charisma as the spellcasting ability (spell save DC 17). The vampire can't take this action again until the start of its next turn.</p>
    senses: Darkvision 120 ft., Passive Perception 17
    languages:
    - Common plus two other languages
  fr:
    name: Vampire
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Échappatoire brumeuse</em>**. Si le vampire tombe à 0 point de vie hors de son refuge, il recourt à Changement d'aspect pour se transformer en brume (pas d'action requise). S'il ne peut pas utiliser Changement d'aspect, il est détruit. Tant qu'il est à 0 point de vie sous forme de brume, il ne peut pas retrouver sa forme de vampire et doit atteindre son refuge dans les 2 heures sous peine d'être détruit. Une fois son refuge atteint, il retrouve sa forme de vampire et subit l'état Paralysé jusqu'à ce qu'il ait récupéré au moins 1 point de vie, sachant qu'il récupère 1 pv au bout de 1 heure passée à son refuge.</p>
      <p><strong><em>Faiblesses des vampires</em></strong>. Le vampire présente les faiblesses suivantes :</p>
      <p><strong><em>Défense d'entrer</em></strong>. Le vampire ne peut pas entrer dans une habitation sans y avoir été invité par l'un de ses occupants.</p>
      <p><strong><em>Eau vive</em></strong>. Le vampire subit 20 dégâts d'acide s'il termine son tour dans l'eau vive.</p>
      <p><strong><em>Pieu dans le coeur</em></strong>. Si une arme infligeant des dégâts perforants est fichée dans son coeur alors que le vampire subit l'état Incapable d'agir dans son refuge, il subit l'état Paralysé jusqu'à ce que l'arme soit retirée.</p>
      <p><strong><em>Lumière du soleil</em></strong>. Le vampire subit 20 dégâts radiants lorsqu'il commence son tour exposé au soleil. Exposé à la lumière du soleil, il subit un Désavantage aux jets d'attaque ainsi qu'aux jets de caractéristique.</p>
      <p><strong><em>Pattes d'araignée</em></strong>. Le vampire peut parcourir les parois les plus difficiles à escalader, y compris les plafonds, sans passer par un jet de caractéristique.</p>
      <p><strong><em>Résistance légendaire (3/jour, ou 4/jour dans son antre)</em></strong>. Si le vampire rate un jet de sauvegarde, il peut décider de le réussir tout de même.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples (forme de vampire uniquement)</em>**. Le vampire effectue deux attaques de Frappe funéraire et recourt à Morsure.</p>
      <p><strong><em>Frappe funéraire (forme de vampire uniquement)</em></strong>. <em>Corps à corps</em> : +9, allonge 1,50 m. <em>Touché</em> : 8 (1d8 + 4) dégâts contondants plus 7 (2d6) dégâts nécrotiques. Si la cible est une créature de taille G ou inférieure, elle subit l'état Agrippé (évasion DD 14) par l'une des deux mains.</p>
      <p><strong><em>Morsure (forme de chauve-souris ou de vampire uniquement)</em></strong>. <em>JdS Constitution</em> : DD 17, une créature dans un rayon de 1,50 m, consentante ou subissant l'état Agrippé, Entravé ou Incapable d'agir. <em>Échec</em> : 6 (1d4 + 4) dégâts perforants plus 13 (3d8) dégâts nécrotiques. Le maximum de points de vie de la cible est réduit d'un montant égal aux dégâts nécrotiques subis et le vampire récupère autant de points de vie que ce même montant. Un Humanoïde que ces dégâts font tomber à 0 point de vie et qui est ensuite enterré se relève au couchant suivant sous forme de vampirien sous le contrôle du vampire.</p>
      <h2>Actions Bonus</h2>
      <p>** <em>Changement d'aspect</em>**. Si le vampire n'est pas exposé au soleil ni dans l'eau vive, il se transforme en chauve-souris de taille TP (Vitesse 1,50 m, Vitesse de vol 9 m) ou en nuage de brume de taille M (Vitesse 1,50 m, Vitesse de vol 6 m [vol stationnaire]), ou bien retrouve sa forme de vampire. Tous ses vêtements et atours se transforment avec lui. Tant qu'il est sous forme de chauve-souris, il ne peut pas parler. Son profil de jeu, outre sa catégorie de taille et sa Vitesse, reste le même. Tant qu'il est sous forme de brume, le vampire ne peut entreprendre aucune action, ni parler, ni manipuler d'objets. Il ne pèse rien, peut entrer dans l'espace d'un ennemi et s'y arrêter. Tout espace dans lequel l'air peut circuler laisse aussi pénétrer cette brume, mais elle ne peut traverser les liquides. Le vampire bénéficie de la Résistance à tous les dégâts, sauf ceux que lui inflige la lumière du soleil.</p>
      <p><strong><em>Charme (recharge 5–6)</em></strong>. Le vampire lance <em>charme-personne</em> sans composantes de sort, le Charisme étant sa caractéristique d'incantation (DD de sauvegarde 17) et la durée étant de 24 heures. La cible Charmée est aussi un sujet consentant de la Morsure du vampire, dont les dégâts ne mettent pas fin au sort. Quand le sort prend fin, la cible ignore qu'elle a été Charmée par le vampire.</p>
      <h2>Actions Légendaires</h2>
      <p>Utilisations d'action Légendaire : 3 (4 dans son antre). Aussitôt après le tour d'une autre créature, le vampire peut dépenser une utilisation pour entreprendre l'une des actions ci-après. Le vampire récupère toutes ses utilisations dépensées au début de chacun de ses tours. </p>
      <p><strong><em>Frappe immortelle</em></strong>. Le vampire se déplace à concurrence de la moitié de sa Vitesse et effectue une attaque de Frappe funéraire.</p>
      <p><strong><em>Subjugation</em></strong>. Le vampire lance <em><a href="https://www.aidedd.org/spell/fr/injonction">injonction</a></em> sans composantes de sort, le Charisme étant sa caractéristique d'incantation (DD de sauvegarde 17). Le vampire ne peut alors plus entreprendre cette action jusqu'au début de son tour suivant.</p>
    senses: Vision dans le noir 36 m, Perception passive 17
    languages:
    - commun plus deux autres langues
