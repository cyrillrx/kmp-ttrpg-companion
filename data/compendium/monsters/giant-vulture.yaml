translations:
  en:
    name: Giant Vulture
    subtype: null
    description: |-
      ## Traits

      ***Pack Tactics***. The vulture has Advantage on an attack roll against a creature if at least one of the vulture's allies is within 5 feet of the creature and the ally doesn't have the Incapacitated condition.

      ## Actions

      ***Gouge***. *Melee Attack Roll* : +4, reach 5 ft. *Hit* : 9 (2d6 + 2) Piercing damage, and the target has the Poisoned condition until the end of its next turn.
    senses: Darkvision 60 ft., Passive Perception 13
    languages:
    - Understands Common but can't speak
  fr:
    name: Vautour géant
    subtype: null
    description: |-
      ## Traits

      ***Tactique de meute***. Quand au moins un de ses alliés non Incapable d'agir se situe dans un rayon de 1,50 m de la créature qu'il cible, le vautour a un Avantage au jet d'attaque correspondant.

      ## Actions

      ***Incision***. *Corps à corps* : +4, allonge 1,50 m. *Touché* : 9 (2d6 + 2) dégâts perforants, et la cible subit l'état Empoisonné jusqu'à la fin de son tour suivant.
    senses: Vision dans le noir 18 m, Perception passive 13
    languages:
    - comprend le commun mais ne parle pas
