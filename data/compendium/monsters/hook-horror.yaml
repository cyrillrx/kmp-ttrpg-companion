translations:
  en:
    name: Hook Horror
    subtype: null
    description: |-
      ## Actions

      ***Multiattack***. The hook horror makes two Hook attacks.

      ***Hook***. *Melee Attack Roll* : +6, reach 10 ft. *Hit* : 11 (2d6 + 4) Piercing damage. If the target is a Large or smaller creature, the hook horror moves the target 5 feet straight toward or away from itself.
    senses: Blindsight 60 ft., Darkvision 120 ft., Passive Perception 15
    languages:
    - Hook Horror
  fr:
    name: Horreur crochue
    subtype: null
    description: |-
      ## Actions

      ***Attaques multiples***. L'horreur crochue effectue deux attaques de Crochet.

      ***Crochet***. *Corps à corps* : +6, allonge 3 m. *Touché* : 11 (2d6 + 4) dégâts perforants. Si la cible est une créature de taille G ou inférieure, l'horreur crochue déplace la cible de 1,50 m vers elle ou loin d'elle.
    senses: Vision aveugle 18 m, Vision dans le noir 36 m, Perception passive 15
    languages:
    - horreur crochue
