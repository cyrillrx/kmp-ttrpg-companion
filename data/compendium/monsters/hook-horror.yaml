translations:
  en:
    name: Hook Horror
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The hook horror makes two Hook attacks.</p>
      <p><strong><em>Hook</em></strong>. <em>Melee Attack Roll</em> : +6, reach 10 ft. <em>Hit</em> : 11 (2d6 + 4) Piercing damage. If the target is a Large or smaller creature, the hook horror moves the target 5 feet straight toward or away from itself.</p>
    senses: Blindsight 60 ft., Darkvision 120 ft., Passive Perception 15
    languages:
    - Hook Horror
  fr:
    name: Horreur crochue
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. L'horreur crochue effectue deux attaques de Crochet.</p>
      <p><strong><em>Crochet</em></strong>. <em>Corps à corps</em> : +6, allonge 3 m. <em>Touché</em> : 11 (2d6 + 4) dégâts perforants. Si la cible est une créature de taille G ou inférieure, l'horreur crochue déplace la cible de 1,50 m vers elle ou loin d'elle.</p>
    senses: Vision aveugle 18 m, Vision dans le noir 36 m, Perception passive 15
    languages:
    - horreur crochue
