translations:
  en:
    name: Mud Mephit
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Death Burst</em>**. The mephit explodes when it dies. <em>Dexterity Saving Throw</em> : DC 11, each creature in a 5-foot Emanation originating from the mephit. <em>Failure</em> : The target has the Restrained condition until the end of its next turn.</p>
      <h2>Actions</h2>
      <p>** <em>Slam</em>**. <em>Melee Attack Roll</em> : +3, reach 5 ft. <em>Hit</em> : 4 (1d6 + 1) Bludgeoning damage.</p>
      <p><strong><em>Mud Breath (Recharge 6)</em></strong>. <em>Dexterity Saving Throw</em> : DC 11, one creature the mephit can see within 15 feet. <em>Failure</em> : The target has the Restrained condition until the end of the mephit's next turn.</p>
    senses: Darkvision 60 ft., Passive Perception 10
    languages:
    - Primordial (Aquan
    - Terran)
  fr:
    name: Méphite boueux
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Explosion finale</em>**. Le méphite explose quand il meurt. <em>JdS Dextérité</em> : DD 11, chaque créature dans une Émanation de 1,50 m centrée sur le méphite. <em>Échec</em> : la cible subit l'état Entravé jusqu'à la fin de son prochain tour.</p>
      <h2>Actions</h2>
      <p>** <em>Coup</em>**. <em>Corps à corps</em> : +3, allonge 1,50 m. <em>Touché</em> : 4 (1d6 + 1) dégâts contondants.</p>
      <p><strong><em>Souffle de boue (recharge 6)</em></strong>. <em>JdS Dextérité</em> : DD 11, une créature que le méphite peut voir dans un rayon de 4,50 m. <em>Échec</em> : la cible subit l'état Entravé jusqu'à la fin du prochain tour du méphite.</p>
    senses: Vision dans le noir 18 m, Perception passive 10
    languages:
    - primordial (aquatique
    - terreux)
