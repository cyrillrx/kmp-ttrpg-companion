translations:
  en:
    name: Invisible Stalker
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Air Form</em>**. The stalker can enter an enemy's space and stop there. It can move through a space as narrow as 1 inch without expending extra movement to do so.</p>
      <p><strong><em>Invisibility</em></strong>. The stalker has the Invisible condition.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The stalker makes three Wind Swipe attacks. It can replace one attack with a use of Vortex.</p>
      <p><strong><em>Wind Swipe</em></strong>. <em>Melee Attack Roll</em> : +7, reach 5 ft. <em>Hit</em> : 11 (2d6 + 4) Force damage.</p>
      <p><strong><em>Vortex</em></strong>. <em>Constitution Saving Throw</em> : DC 14, one Large or smaller creature in the stalker's space. <em>Failure</em> : 7 (1d8 + 3) Thunder damage, and the target has the Grappled condition (escape DC 13). Until the grapple ends, the target can't cast spells with a Verbal component and takes 7 (2d6) Thunder damage at the start of each of the stalker's turns.</p>
    senses: Darkvision 60 ft., Passive Perception 18
    languages:
    - Common
    - Primordial (Auran)
  fr:
    name: Traqueur invisible
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Corps d'air</em>**. Le traqueur peut pénétrer dans un espace occupé par un ennemi et s'y arrêter. Il peut se déplacer dans un espace étroit d'une largeur minimale de 2,50 cm sans dépense supplémentaire en déplacement.</p>
      <p><strong><em>Invisibilité</em></strong>. Le traqueur bénéficie de l'état Invisible.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le traqueur effectue trois attaques de Pique de vent. Il peut remplacer l'une de ces attaques par une utilisation de Vortex.</p>
      <p><strong><em>Pique de vent</em></strong>. <em>Corps à corps</em> : +7, allonge 1,50 m. <em>Touché</em> : 11 (2d6 + 4) dégâts de force.</p>
      <p><strong><em>Vortex</em></strong>. <em>JdS Constitution</em> : DD 14, une créature de taille G ou inférieure dans l'espace du traqueur. <em>Échec</em> : 7 (1d8 + 3) dégâts de tonnerre, et la cible subit l'état Agrippé (évasion DD 13). Tant qu'elle est agrippée, la cible ne peut pas lancer de sorts à composante verbale et subit 7 (2d6) dégâts de tonnerre au début de chacun des tours du traqueur.</p>
    senses: Vision dans le noir 18 m, Perception passive 18
    languages:
    - commun
    - primordial (aérien)
