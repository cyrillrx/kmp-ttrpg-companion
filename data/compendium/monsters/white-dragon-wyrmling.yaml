translations:
  en:
    name: White Dragon Wyrmling
    subtype: Chromatic
    description: '## Traits


      ***Ice Walk***. The dragon can move across and climb icy surfaces without needing
      to make an ability check. Additionally, Difficult Terrain composed of ice or
      snow doesn''t cost it extra movement.


      ## Actions


      ***Multiattack***. The dragon makes two Rend attacks.


      ***Rend***. *Melee Attack Roll* : +4, reach 5 ft. *Hit* : 6 (1d8 + 2) Slashing
      damage plus 2 (1d4) Cold damage.


      ***Cold Breath (Recharge 5–6)***. *Constitution Saving Throw* : DC 12, each
      creature in a 15-foot Cone. *Failure* : 22 (5d8) Cold damage. *Success* : Half
      damage.'
    senses: Blindsight 10 ft., Darkvision 60 ft., Passive Perception 14
    languages:
    - Draconic
  fr:
    name: Dragon blanc, dragonnet
    subtype: Chromatique
    description: '## Traits


      ***Marche sur la glace***. Le dragon peut parcourir et gravir toute surface
      gelée sans passer par le moindre jet de caractéristique. En outre, tout Terrain
      difficile composé de glace ou de neige ne lui demande aucune dépense de déplacement
      supplémentaire.


      ## Actions


      ***Attaques multiples***. Le dragon effectue deux attaques de Saignée.


      ***Saignée***. *Corps à corps* : +4, allonge 1,50 m. *Touché* : 6 (1d8 + 2)
      dégâts tranchants plus 2 (1d4) dégâts de froid.


      ***Souffle glacial (recharge 5–6)***. *JdS Constitution* : DD 12, chaque créature
      dans un Cône de 4,50 m. *Échec* : 22 (5d8) dégâts de froid. *Réussite* : demi-dégâts.'
    senses: Vision aveugle 3 m, Vision dans le noir 18 m, Perception passive 14
    languages:
    - draconique
