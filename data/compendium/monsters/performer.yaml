    description: |-
      ## Actions

      ***Shortsword***. *Melee Attack Roll* : +5, reach 5 ft. *Hit* : 6 (1d6 + 3) Piercing damage.

      ## Reactions

      ***Uncanny Dodge***. *Trigger* : The performer is hit by an attack roll. *Response* : The performer halves the damage (round down) it takes from that attack.
    senses: Passive Perception 12
    languages:
    - Common plus one other language
  fr:
    name: Saltimbanque
    subtype: null
    description: |-
      ## Actions

      ***Épée courte***. *Corps à corps* : +5, allonge 1,50 m. *Touché* : 6 (1d6 + 3) dégâts perforants.

      ## Réactions

      ***Esquive instinctive***. *Déclencheur* : le saltimbanque est touché par un jet d'attaque. *Conséquences* : le saltimbanque réduit de moitié les dégâts (arrondis à l'inférieur) subis lors de cette attaque.
    senses: Perception passive 12
    languages:
    - commun plus une autre langue
