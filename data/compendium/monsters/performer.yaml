translations:
  en:
    name: Performer
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Shortsword</em>**. <em>Melee Attack Roll</em> : +5, reach 5 ft. <em>Hit</em> : 6 (1d6 + 3) Piercing damage.</p>
      <h2>Reactions</h2>
      <p>** <em>Uncanny Dodge</em>**. <em>Trigger</em> : The performer is hit by an attack roll. <em>Response</em> : The performer halves the damage (round down) it takes from that attack.</p>
    senses: Passive Perception 12
    languages:
    - Common plus one other language
  fr:
    name: Saltimbanque
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Épée courte</em>**. <em>Corps à corps</em> : +5, allonge 1,50 m. <em>Touché</em> : 6 (1d6 + 3) dégâts perforants.</p>
      <h2>Réactions</h2>
      <p>** <em>Esquive instinctive</em>**. <em>Déclencheur</em> : le saltimbanque est touché par un jet d'attaque. <em>Conséquences</em> : le saltimbanque réduit de moitié les dégâts (arrondis à l'inférieur) subis lors de cette attaque.</p>
    senses: Perception passive 12
    languages:
    - commun plus une autre langue
