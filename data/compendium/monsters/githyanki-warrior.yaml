translations:
  en:
    name: Githyanki Warrior
    subtype: Gith
    description: |-
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The githyanki makes two Psi Blade attacks.</p>
      <p><strong><em>Psi Blade</em></strong>. <em>Melee Attack Roll</em> : +4, reach 5 ft. <em>Hit</em> : 9 (2d6 + 2) Slashing damage plus 7 (2d6) Psychic damage.</p>
      <p><strong><em>Spellcasting</em></strong>. The githyanki casts one of the following spells, requiring no spell components and using Intelligence as the spellcasting ability:</p>
      <p>At will: <em><a href="https://www.aidedd.org/spell/mage-hand">Mage Hand</a></em> (the hand is Invisible)<br />
      2/day: <em><a href="https://www.aidedd.org/spell/nondetection">Nondetection</a></em> (self only)  </p>
      <h2>Bonus actions</h2>
      <p>** <em>Misty Step (2/Day)</em>**. The githyanki casts <em><a href="https://www.aidedd.org/spell/misty-step">Misty Step</a></em> , requiring no spell components and using the same spellcasting ability as Spellcasting.</p>
    senses: Passive Perception 11
    languages:
    - Common
    - Gith
