translations:
  en:
    name: Githyanki Warrior
    subtype: Gith
    description: |-
      ## Actions

      ***Multiattack***. The githyanki makes two Psi Blade attacks.

      ***Psi Blade***. *Melee Attack Roll* : +4, reach 5 ft. *Hit* : 9 (2d6 + 2) Slashing damage plus 7 (2d6) Psychic damage.

      ***Spellcasting***. The githyanki casts one of the following spells, requiring no spell components and using Intelligence as the spellcasting ability:

      At will: *[Mage Hand](https://www.aidedd.org/spell/mage-hand)* (the hand is Invisible)\
      2/day: *[Nondetection](https://www.aidedd.org/spell/nondetection)* (self only)

      ## Bonus actions

      ***Misty Step (2/Day)***. The githyanki casts *[Misty Step](https://www.aidedd.org/spell/misty-step)* , requiring no spell components and using the same spellcasting ability as Spellcasting.
    senses: Passive Perception 11
