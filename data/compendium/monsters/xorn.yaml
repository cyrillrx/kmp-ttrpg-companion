translations:
  en:
    name: Xorn
    subtype: null
    description: |-
      ## Traits

      ***Earth Glide***. The xorn can burrow through nonmagical, unworked earth and stone. While doing so, the xorn doesn't disturb the material it moves through.

      ***Treasure Sense***. The xorn can pinpoint the location of precious metals and stones within 60 feet of itself.

      ## Actions

      ***Multiattack***. The xorn makes one Bite attack and three Claw attacks.

      ***Bite***. *Melee Attack Roll* : +6, reach 5 ft. *Hit* : 17 (4d6 + 3) Piercing damage.

      ***Claw***. *Melee Attack Roll* : +6, reach 5 ft. *Hit* : 8 (1d10 + 3) Slashing damage.

      ## Bonus actions

      ***Charge***. The xorn moves up to its Speed or Burrow Speed straight toward an enemy it can sense.
    senses: Darkvision 60 ft., Tremorsense 60 ft., Passive Perception 16
    languages:
    - Primordial (Terran)
  fr:
    name: Xorn
    subtype: null
    description: |-
      ## Traits

      ***Déplacement tellurique***. Le xorn peut se déplacer par fouissement dans la pierre et la terre brutes et non magiques. Ce faisant, il laisse intacte la structure de ce qu'il traverse.

      ***Perception des trésors***. Le xorn localise précisément les pierres et métaux précieux dans un rayon de 18 m.

      ## Actions

      ***Attaques multiples***. Le xorn effectue trois attaques de Griffe et une de Morsure.

      ***Griffe***. *Corps à corps* : +6, allonge 1,50 m. *Touché* : 8 (1d10 + 3) dégâts tranchants.

      ***Morsure***. *Corps à corps* : +6, allonge 1,50 m. *Touché* : 17 (4d6 + 3) dégâts perforants.

      ## Actions Bonus

      ***Charge***. Le xorn se déplace en ligne droite dans les limites de sa Vitesse ou de sa Vitesse de fouissement vers un ennemi qu'il perçoit.
    senses: Vision dans le noir 18 m, perception des vibrations 18 m, Perception passive
      16
    languages:
    - primordial (terreux)
