translations:
  en:
    name: Flaming Skeleton
    subtype: null
    description: |-
      ## Traits

      ***Death Burst***. The skeleton explodes when it dies. *Dexterity Saving Throw* : DC 12, each creature in a 10-foot Emanation originating from the skeleton. *Failure* : 14 (4d6) Fire damage. *Success* : Half damage.

      ***Illumination***. The skeleton sheds Bright Light in a 15-foot radius and Dim Light for an additional 15 feet.

      ## Actions

      ***Multiattack***. The skeleton makes two attacks, using Flame Scepter or Hurl Flame in any combination.

      ***Flame Scepter***. *Melee Attack Roll* : +4, reach 5 ft. *Hit* : 5 (1d6 + 2) Bludgeoning damage plus 3 (1d6) Fire damage.

      ***Hurl Flame***. *Ranged Attack Roll* : +4, range 60 ft. *Hit* : 7 (1d10 + 2) Fire damage.
    senses: Darkvision 60 ft., Passive Perception 12
    languages:
    - Understands Common plus one other language but can't speak
  fr:
    name: Squelette enflammé
    subtype: null
    description: |-
      ## Traits

      ***Explosion finale***. Le squelette explose quand il meurt. *JdS Dextérité* : DD 12, chaque créature dans une Émanation de 3 m centrée sur le squelette. *Échec* : 14 (4d6) dégâts de feu. *Réussite* : demi-dégâts.

      ***Illumination***. Le squelette projette une Lumière vive sur un rayon de 4,50 m, et une Lumière faible sur 4,50 m de plus.

      ## Actions

      ***Attaques multiples***. Le squelette effectue deux attaques, réparties à sa guise entre Sceptre enflammé et Jet de flammes.

      ***Sceptre enflammé***. *Corps à corps* : +4, allonge 1,50 m. *Touché* : 5 (1d6 + 2) dégâts contondants plus 3 (1d6) dégâts de feu.

      ***Jet de flammes***. *À distance* : +4, portée 18 m. *Touché* : 7 (1d10 + 2) dégâts de feu.
    senses: Vision dans le noir 18 m, Perception passive 12
    languages:
    - comprend le commun plus une autre langue mais ne parle pas
