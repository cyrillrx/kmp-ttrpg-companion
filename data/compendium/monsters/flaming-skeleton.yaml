translations:
  en:
    name: Flaming Skeleton
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Death Burst</em>**. The skeleton explodes when it dies. <em>Dexterity Saving Throw</em> : DC 12, each creature in a 10-foot Emanation originating from the skeleton. <em>Failure</em> : 14 (4d6) Fire damage. <em>Success</em> : Half damage.</p>
      <p><strong><em>Illumination</em></strong>. The skeleton sheds Bright Light in a 15-foot radius and Dim Light for an additional 15 feet.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The skeleton makes two attacks, using Flame Scepter or Hurl Flame in any combination.</p>
      <p><strong><em>Flame Scepter</em></strong>. <em>Melee Attack Roll</em> : +4, reach 5 ft. <em>Hit</em> : 5 (1d6 + 2) Bludgeoning damage plus 3 (1d6) Fire damage.</p>
      <p><strong><em>Hurl Flame</em></strong>. <em>Ranged Attack Roll</em> : +4, range 60 ft. <em>Hit</em> : 7 (1d10 + 2) Fire damage.</p>
    senses: Darkvision 60 ft., Passive Perception 12
    languages:
    - Understands Common plus one other language but can't speak
  fr:
    name: Squelette enflammé
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Explosion finale</em>**. Le squelette explose quand il meurt. <em>JdS Dextérité</em> : DD 12, chaque créature dans une Émanation de 3 m centrée sur le squelette. <em>Échec</em> : 14 (4d6) dégâts de feu. <em>Réussite</em> : demi-dégâts.</p>
      <p><strong><em>Illumination</em></strong>. Le squelette projette une Lumière vive sur un rayon de 4,50 m, et une Lumière faible sur 4,50 m de plus.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le squelette effectue deux attaques, réparties à sa guise entre Sceptre enflammé et Jet de flammes.</p>
      <p><strong><em>Sceptre enflammé</em></strong>. <em>Corps à corps</em> : +4, allonge 1,50 m. <em>Touché</em> : 5 (1d6 + 2) dégâts contondants plus 3 (1d6) dégâts de feu.</p>
      <p><strong><em>Jet de flammes</em></strong>. <em>À distance</em> : +4, portée 18 m. <em>Touché</em> : 7 (1d10 + 2) dégâts de feu.</p>
    senses: Vision dans le noir 18 m, Perception passive 12
    languages:
    - comprend le commun plus une autre langue mais ne parle pas
