translations:
  en:
    name: Pteranodon
    subtype: Dinosaur
    description: |-
      <h2>Traits</h2>
      <p>** <em>Flyby</em>**. The pteranodon doesn't provoke an Opportunity Attack when it flies out of an enemy's reach.</p>
      <h2>Actions</h2>
      <p>** <em>Bite</em>**. <em>Melee Attack Roll</em> : +4, reach 5 ft. <em>Hit</em> : 6 (1d8 + 2) Piercing damage.</p>
    senses: Passive Perception 11
    languages:
    - None
  fr:
    name: Ptéranodon
    subtype: Dinosaure
    description: |-
      <h2>Traits</h2>
      <p>** <em>Repli aérien</em>**. Le ptéranodon ne provoque pas d'attaque d'Opportunité lorsqu'il quitte la zone d'allonge d'un ennemi en volant.</p>
      <h2>Actions</h2>
      <p>** <em>Morsure</em>**. <em>Corps à corps</em> : +4, allonge 1,50 m. <em>Touché</em> : 6 (1d8 + 2) dégâts perforants.</p>
    senses: Perception passive 11
    languages:
    - aucune
