translations:
  en:
    name: Steam Mephit
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Blurred Form</em>**. Attack rolls against the mephit are made with Disadvantage unless the mephit has the Incapacitated condition.</p>
      <p><strong><em>Death Burst</em></strong>. The mephit explodes when it dies. <em>Dexterity Saving Throw</em> : DC 10, each creature in a 5-foot Emanation originating from the mephit. <em>Failure</em> : 5 (2d4) Fire damage. <em>Success</em> : Half damage.</p>
      <h2>Actions</h2>
      <p>** <em>Claw</em>**. <em>Melee Attack Roll</em> : +2, reach 5 ft. <em>Hit</em> : 2 (1d4) Slashing damage plus 2 (1d4) Fire damage.</p>
      <p><strong><em>Steam Breath (Recharge 6)</em></strong>. <em>Constitution Saving Throw</em> : DC 10, each creature in a 15-foot Cone. <em>Failure</em> : 5 (2d4) Fire damage, and the target's Speed decreases by 10 feet until the end of the mephit's next turn. <em>Success</em> : Half damage only. <em>Failure or Success</em> : Being underwater doesn't grant Resistance to this Fire damage.</p>
    senses: Darkvision 60 ft., Passive Perception 10
    languages:
    - Primordial (Aquan
    - Ignan)
  fr:
    name: Méphite vaporeux
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Explosion finale</em>**. Le méphite explose quand il meurt. <em>JdS Dextérité</em> : DD 10, chaque créature dans une Émanation de 1,50 m centrée sur le méphite. <em>Échec</em> : 5 (2d4) dégâts de feu. <em>Réussite</em> : demi-dégâts.</p>
      <p><strong><em>Forme floue</em></strong>. Les jets d'attaque contre le méphite subissent un Désavantage sauf si le méphite subit l'état Incapable d'agir.</p>
      <h2>Actions</h2>
      <p>** <em>Griffe</em>**. <em>Corps à corps</em> : +2, allonge 1,50 m. <em>Touché</em> : 2 (1d4) dégâts tranchants plus 2 (1d4) dégâts de feu.</p>
      <p><strong><em>Souffle de vapeur (recharge 6)</em></strong>. <em>JdS Constitution</em> : DD 10, chaque créature dans un Cône de 4,50 m. <em>Échec</em> : 5 (2d4) dégâts de feu, et la Vitesse de la cible est réduite de 3 m jusqu'à la fin du tour suivant du méphite. <em>Réussite</em> : demi-dégâts uniquement. <em>Échec ou réussite</em> : être immergé dans l'eau n'octroie pas la Résistance à ces dégâts de feu.</p>
    senses: Vision dans le noir 18 m, Perception passive 10
    languages:
    - primordial (aquatique
    - igné)
