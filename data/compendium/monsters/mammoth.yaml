translations:
  en:
    name: Mammoth
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The mammoth makes two Gore attacks.</p>
      <p><strong><em>Gore</em></strong>. <em>Melee Attack Roll</em> : +10, reach 10 ft. <em>Hit</em> : 18 (2d10 + 7) Piercing damage. If the target is a Huge or smaller creature and the mammoth moved 20+ feet straight toward it immediately before the hit, the target has the Prone condition.</p>
      <h2>Bonus actions</h2>
      <p>** <em>Trample</em>**. <em>Dexterity Saving Throw</em> : DC 18, one creature within 5 feet that has the Prone condition. <em>Failure</em> : 29 (4d10 + 7) Bludgeoning damage. <em>Success</em> : Half damage.</p>
    senses: Passive Perception 10
    languages:
    - None
  fr:
    name: Mammouth
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le mammouth effectue deux attaques de Coup de défense.</p>
      <p><strong><em>Coup de défense</em></strong>. <em>Corps à corps</em> : +10, allonge 3 m. <em>Touché</em> : 18 (2d10 + 7) dégâts perforants. Si la cible est une créature de taille TG ou inférieure et si le mammouth s'est déplacé en ligne droite d'un minimum de 6 m juste avant de la toucher, la cible subit l'état À terre.</p>
      <h2>Actions Bonus</h2>
      <p>** <em>Piétinement</em>**. <em>JdS Dextérité</em> : DD 18, une créature À terre dans un rayon de 1,50 m. <em>Échec</em> : 29 (4d10 + 7) dégâts contondants. <em>Réussite</em> : demi-dégâts.</p>
    senses: Perception passive 10
    languages:
    - aucune
