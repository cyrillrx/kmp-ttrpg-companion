      ***Imitation***. Le corbeau peut imiter des bruits simples qu'il a entendus, comme un murmure ou des pépiements. Un auditeur peut discerner que ces sons sont des imitations en réussissant un jet de Sagesse (Intuition) DD 10.

      ## Actions

