translations:
  en:
    name: Githzerai Zerth
    subtype: Gith
    description: |-
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The githzerai makes two Psi Strike attacks.</p>
      <p><strong><em>Psi Strike</em></strong>. <em>Melee Attack Roll</em> : +7, reach 5 ft. <em>Hit</em> : 11 (2d6 + 4) Bludgeoning damage plus 13 (3d8) Psychic damage.</p>
      <p><strong><em>Spellcasting</em></strong>. The githzerai casts one of the following spells, requiring no spell components and using Wisdom as the spellcasting ability (spell save DC 14):</p>
      <p>At will: <em><a href="https://www.aidedd.org/spell/mage-hand">Mage Hand</a></em> (the hand is Invisible)<br />
      1/day each: <em><a href="https://www.aidedd.org/spell/phantasmal-killer">Phantasmal Killer</a></em> (level 6 version), <em><a href="https://www.aidedd.org/spell/plane-shift">Plane Shift</a>, <a href="https://www.aidedd.org/spell/see-invisibility">See Invisibility</a></em>  </p>
      <h2>Bonus actions</h2>
      <p>** <em>Psi-Powered Leap (2/Day)</em>**. The githzerai casts <em><a href="https://www.aidedd.org/spell/jump">Jump</a></em> , requiring no spell components and using the same spellcasting ability as Spellcasting.</p>
      <h2>Reactions</h2>
      <p>** <em>Psionic Defense (2/Day)</em>**. The githzerai casts <em><a href="https://www.aidedd.org/spell/feather-fall">Feather Fall</a></em> or <em><a href="https://www.aidedd.org/spell/shield">Shield</a></em> in response to the spell's trigger, requiring no spell components and using the same spellcasting ability as Spellcasting.</p>
    senses: Passive Perception 16
    languages:
    - Common
    - Gith
