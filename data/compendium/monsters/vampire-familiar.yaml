translations:
  en:
    name: Vampire Familiar
    subtype: null
    description: |-
      ## Traits

      ***Vampiric Connection***. While the familiar and its vampire master are on the same plane of existence, the vampire can communicate with the familiar telepathically, and the vampire can perceive through the familiar's senses.

      ## Actions

      ***Multiattack***. The familiar makes two Umbral Dagger attacks.

      ***Umbral Dagger***. *Melee or Ranged Attack Roll* : +5, reach 5 ft. or range 20/60 ft. *Hit* : 5 (1d4 + 3) Piercing damage plus 7 (3d4) Necrotic damage. If the target is reduced to 0 Hit Points by this attack, the target becomes Stable but has the Poisoned condition for 1 hour. While it has the Poisoned condition, the target has the Paralyzed condition.

      ## Bonus actions

      ***Deathless Agility***. The familiar takes the Dash or Disengage action.
    senses: Darkvision 60 ft., Passive Perception 14
    languages:
    - Common plus one other language
  fr:
    name: Familier de vampire
    subtype: null
    description: |-
      ## Traits

      ***Lien vampirique***. Tant que le familier et son maître vampire sont sur le même plan d'existence, le vampire peut communiquer avec son familier par télépathie et percevoir l'environnement du familier par les sens de ce dernier.

      ## Actions

      ***Attaques multiples***. Le familier effectue deux attaques de Dague des ombres.

      ***Dague des ombres***. *Corps à corps ou à distance* : +5, allonge 1,50 m ou portée 6/18 m. *Touché* : 5 (1d4 + 3) dégâts perforants plus 7 (3d4) dégâts nécrotiques. Si la cible tombe à 0 point de vie en raison de cette attaque, elle se retrouve Stabilisée mais subit l'état Empoisonné pendant 1 heure. Tant qu'elle a l'état Empoisonné, la cible subit l'état Paralysé.

      ## Actions Bonus

      ***Agilité immortelle***. Le familier effectue l'action Désengagement ou Pointe.
    senses: Vision dans le noir 18 m, Perception passive 14
    languages:
    - commun plus une autre langue
