translations:
  en:
    name: Sea Hag
    subtype: null
    description: |-
      ## Traits

      ***Amphibious***. The hag can breathe air and water.

      ***Coven Magic***. While within 30 feet of at least two hag allies, the hag can cast one of the following spells, requiring no Material components, using the spell's normal casting time, and using Intelligence as the spellcasting ability (spell save DC 11): *[Augury](https://www.aidedd.org/spell/augury), [Find Familiar](https://www.aidedd.org/spell/find-familiar), [Identify](https://www.aidedd.org/spell/identify), [Locate Object](https://www.aidedd.org/spell/locate-object), [Scrying](https://www.aidedd.org/spell/scrying)*, or *[Unseen Servant](https://www.aidedd.org/spell/unseen-servant)*. The hag must finish a Long Rest before using this trait to cast that spell again.

      ***Vile Appearance***. *Wisdom Saving Throw* : DC 11, any Beast or Humanoid that starts its turn within 30 feet of the hag and can see the hag's true form. *Failure* : The target has the Frightened condition until the start of its next turn. *Success* : The target is immune to this hag's Vile Appearance for 24 hours.

      ## Actions

      ***Claw***. *Melee Attack Roll* : +5, reach 5 ft. *Hit* : 10 (2d6 + 3) Slashing damage.

      ***Death Glare (Recharge 5–6)***. *Wisdom Saving Throw* : DC 11, one Frightened creature the hag can see within 30 feet. *Failure* : If the target has 20 Hit Points or fewer, it drops to 0 Hit Points. Otherwise, the target takes 13 (3d8) Psychic damage.

      ***Illusory Appearance***. The hag casts *[Disguise Self](https://www.aidedd.org/spell/disguise-self)* , using Constitution as the spellcasting ability (spell save DC 13). The spell's duration is 24 hours.
    senses: Darkvision 60 ft., Passive Perception 11
    languages:
    - Common
    - Giant
    - Primordial (Aquan)
  fr:
    name: Guenaude marine
    subtype: null
    description: |-
      ## Traits

      ***Amphibie***. La guenaude peut respirer sous l'eau comme à l'air libre.

      ***Laideur effroyable***. *JdS Sagesse* : DD 11, tout Humanoïde ou Bête qui commence son tour dans un rayon de 9 m de la guenaude et qui voit sa forme véritable. *Échec* : la cible subit l'état Effrayé jusqu'au début de son tour suivant. *Réussite* : la cible est immunisée contre la Laideur effroyable de cette guenaude pendant 24 heures.

      ***Magie d'assemblée***. Tant qu'elle se trouve dans un rayon de 9 m d'au moins deux alliées guenaudes, la guenaude peut lancer l'un des sorts suivants sans composantes matérielles, avec le temps d'incantation normal, l'Intelligence étant sa caractéristique d'incantation (DD de sauvegarde 11) : *[appel de familier](https://www.aidedd.org/spell/fr/appel-de-familier), [augure](https://www.aidedd.org/spell/fr/augure), [identification](https://www.aidedd.org/spell/fr/identification), [localisation d'objet](https://www.aidedd.org/spell/localisation-d-objet), [scrutation](https://www.aidedd.org/spell/fr/scrutation) ou [serviteur invisible](https://www.aidedd.org/spell/fr/serviteur invisible)*. La guenaude doit terminer un Repos long avant de pouvoir relancer ce sort par ce trait.

      ## Actions

      ***Griffe***. *Corps à corps* : +5, allonge 1,50 m. *Touché* : 10 (2d6 + 3) dégâts tranchants.

      ***Regard mortel (recharge 5–6)***. *JdS Sagesse* : DD 11, une créature Effrayée que la guenaude voit dans un rayon de 9 m. *Échec* : si la cible a 20 points de vie ou moins, elle tombe à 0 point de vie. Sinon, la cible subit 13 (3d8) dégâts psychiques.

      ***Apparence illusoire***. La guenaude lance *déguisement* , la Constitution étant sa caractéristique d'incantation (DD de sauvegarde 13). La durée du sort est de 24 heures.
    senses: Vision dans le noir 18 m, Perception passive 11
    languages:
    - commun
    - géant
    - primordial (aquatique)
