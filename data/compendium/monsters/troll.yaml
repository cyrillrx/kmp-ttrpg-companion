translations:
  en:
    name: Troll
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Loathsome Limbs (4/Day)</em>**. If the troll ends any turn Bloodied and took 15+ Slashing damage during that turn, one of the troll's limbs is severed, falls into the troll's space, and becomes a Troll Limb. The limb acts immediately after the troll's turn. The troll has 1 Exhaustion level for each missing limb, and it grows replacement limbs the next time it regains Hit Points.</p>
      <p><strong><em>Regeneration</em></strong>. The troll regains 15 Hit Points at the start of each of its turns. If the troll takes Acid or Fire damage, this trait doesn't function on the troll's next turn. The troll dies only if it starts its turn with 0 Hit Points and doesn't regenerate.n.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The troll makes three Rend attacks.</p>
      <p><strong><em>Rend</em></strong>. <em>Melee Attack Roll</em> : +7, reach 10 ft. <em>Hit</em> : 11 (2d6 + 4) Slashing damage.</p>
      <h2>Bonus actions</h2>
      <p>** <em>Charge</em>**. The troll moves up to half its Speed straight toward an enemy it can see.</p>
    senses: Darkvision 60 ft., Passive Perception 15
    languages:
    - Giant
  fr:
    name: Troll
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Membres abominables (4/jour)</em><strong>. Si le troll termine un tour En péril et subit au moins 15 dégâts tranchants à ce tour, l'un de ses membres est sectionné et tombe dans l'espace du monstre, pour devenir un </strong>abattis de troll** , sorte de membre autonome. L'abattis agit juste après le tour du troll. Le troll subit 1 niveau d'Épuisement par membre manquant, sachant qu'un nouveau membre pousse pour le remplacer la prochaine fois qu'il récupère des points de vie.</p>
      <p><strong><em>Régénération</em></strong>. Le troll récupère 15 points de vie au début de chacun de ses tours. S'il subit des dégâts d'acide ou de feu, ce trait ne fonctionne pas à son tour suivant. Le troll ne meurt que s'il commence son tour à 0 point de vie et ne se régénère pas.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le troll effectue trois attaques de Saignée.</p>
      <p><strong><em>Saignée</em></strong>. <em>Corps à corps</em> : +7, allonge 3 m. <em>Touché</em> : 11 (2d6 + 4) dégâts tranchants.</p>
      <h2>Actions Bonus</h2>
      <p>** <em>Charge</em>**. Le troll se déplace en ligne droite à concurrence de la moitié de sa Vitesse vers un ennemi qu'il voit.</p>
    senses: Vision dans le noir 18 m, Perception passive 15
    languages:
    - géant
