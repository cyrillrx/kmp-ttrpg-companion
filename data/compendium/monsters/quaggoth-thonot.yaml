translations:
  en:
    name: Quaggoth Thonot
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Bloodied Fury</em>**. While Bloodied, the quaggoth has Advantage on attack rolls.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The quaggoth makes two Claw attacks.</p>
      <p><strong><em>Claw</em></strong>. <em>Melee Attack Roll</em> : +5, reach 5 ft. <em>Hit</em> : 6 (1d6 + 3) Slashing damage plus 5 (2d4) Psychic damage.</p>
      <p><strong><em>Spellcasting</em></strong>. The quaggoth casts one of the following spells, requiring no spell components and using Wisdom as the spellcasting ability (spell save DC 12):</p>
      <p>At will: <em><a href="https://www.aidedd.org/spell/mage-hand">Mage Hand</a></em> (the hand is Invisible), <em><a href="https://www.aidedd.org/spell/minor-illusion">Minor Illusion</a></em><br />
      2/day: <em><a href="https://www.aidedd.org/spell/mind-spike">Mind Spike</a></em>  </p>
      <h2>Reactions</h2>
      <p>** <em>Psionic Defense (3/Day)</em>**. The quaggoth casts <em><a href="https://www.aidedd.org/spell/feather-fall">Feather Fall</a></em> or <em><a href="https://www.aidedd.org/spell/shield">Shield</a></em> in response to the spell's trigger, requiring no spell components and using the same spellcasting ability as Spellcasting.</p>
    senses: Darkvision 120 ft., Passive Perception 12
    languages:
    - Undercommon
  fr:
    name: Quaggoth thonot
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Fureur du péril</em>**. Lorsqu'il est En péril, le quaggoth a un Avantage aux jets d'attaque.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le quaggoth effectue deux attaques de Griffes.</p>
      <p><strong><em>Griffes</em></strong>. <em>Corps à corps</em> : +5, allonge 1,50 m. <em>Touché</em> : 6 (1d6 + 3) dégâts tranchants plus 5 (2d4) dégâts psychiques.</p>
      <p><strong><em>Incantation</em></strong>. Le quaggoth lance l'un des sorts suivants sans composantes de sort, la Sagesse étant sa caractéristique d'incantation (DD de sauvegarde 12) :</p>
      <p>À volonté : <em><a href="https://www.aidedd.org/spell/fr/main-de-mage">main de mage</a></em> (la main est invisible), <em><a href="https://www.aidedd.org/spell/fr/illusion-mineure">illusion mineure</a></em><br />
      2/jour : <em><a href="https://www.aidedd.org/spell/fr/epine-mentale">épine mentale</a></em>  </p>
      <h2>Réactions</h2>
      <p>Défense psionique (3/jour).</p>
    senses: Vision dans le noir 36 m, Perception passive 12
    languages:
    - commun des profondeurs
