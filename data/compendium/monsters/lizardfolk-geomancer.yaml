translations:
  en:
    name: Lizardfolk Geomancer
    subtype: null
    description: |-
      ## Actions

      ***Multiattack***. The lizardfolk makes two Earth Burst attacks.

      ***Earth Burst***. *Melee or Ranged Attack Roll* : +4, reach 5 ft. or range 60 ft. *Hit* : 9 (2d6 + 2) Bludgeoning damage.

      ***Hail of Stone (Recharge 5–6)***. *Constitution Saving Throw* : DC 12, each creature in a 20-foot-radius, 40-foot-high Cylinder centered on a point the lizardfolk can see within 60 feet. *Failure* : 15 (6d4) Bludgeoning damage, and the target has the Prone condition. *Success* : Half damage only.

      ***Spellcasting***. The lizardfolk casts one of the following spells, requiring no Material components and using Wisdom as the spellcasting ability (spell save DC 12):

      At will: *[Elementalism](https://www.aidedd.org/spell/elementalism)*

      1/day each: *[Meld into Stone](https://www.aidedd.org/spell/meld-into-stone), [Speak with Plants](https://www.aidedd.org/spell/speak-with-plants), [Spike Growth](https://www.aidedd.org/spell/spike-growth)*
    senses: Passive Perception 14
    languages:
    - Draconic
    - Primordial (Terran)
  fr:
    name: Saurial, géomancien
    subtype: null
    description: |-
      ## Actions

      ***Attaques multiples***. Le saurial effectue deux attaques d'Explosion terreuse.

      ***Explosion terreuse***. *Corps à corps ou à distance* : +4, allonge 1,50 m ou portée 18 m. *Touché* : 9 (2d6 + 2) dégâts contondants.

      ***Grêle de pierres (recharge 5–6)***. JdS Constitution : DD 12, chaque créature dans un Cylindre de 6 m de rayon et 12 m de haut centré sur un point que le saurial peut voir dans un rayon de 18 m. Échec : 15 (6d4) dégâts contondants, et la cible subit l'état À terre. Succès : demi-dégâts uniquement.

      ***Incantation***. Le saurial lance l'un des sorts suivants sans composantes matérielles, la Sagesse étant sa caractéristique d'incantation (DD de sauvegarde 12) :

      À volonté : *[élementalisme](https://www.aidedd.org/spell/fr/elementalisme)*

      1/jour chacun : *[fusion dans la pierre](https://www.aidedd.org/spell/fr/fusion-dans-la-pierre), [communication avec les plantes](https://www.aidedd.org/spell/fr/communication-avec-les-plantes), [croissance d'épines](https://www.aidedd.org/spell/fr/croissance-d-epines)*
    senses: Perception passive 14
    languages:
    - draconique
    - primordial (terreux)
