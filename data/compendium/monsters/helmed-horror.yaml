translations:
  en:
    name: Helmed Horror
    subtype: null
    description: |-
      ## Traits

      ***Magic Resistance***. The helmed horror has Advantage on saving throws against spells and other magical effects.

      ***Spell Immunity***. The helmed horror is immune to three spells chosen by its creator. Typical choices include *[Heat Metal](https://www.aidedd.org/spell/heat-metal), [Lightning Bolt](https://www.aidedd.org/spell/lightning-bolt)*, and *[Magic Missile](https://www.aidedd.org/spell/magic-missile)*.

      ## Actions

      ***Multiattack***. The helmed horror makes two Arcane Sword attacks.

      ***Arcane Sword***. *Melee Attack Roll* : +6, reach 5 ft. *Hit* : 8 (1d8 + 4) Slashing damage plus 5 (1d10) Force damage.
    senses: Blindsight 60 ft., Passive Perception 14
    languages:
    - Understands Common plus one other language but can't speak
  fr:
    name: Horreur casquée
    subtype: null
    description: |-
      ## Traits

      ***Résistance à la magie***. L'horreur casquée a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.

      ***Immunité magique***. L'horreur casquée est immunisée contre trois sorts choisis par son créateur. Les choix typiques incluent *[métal brûlant](https://www.aidedd.org/spell/fr/metal-brulant), [éclair](https://www.aidedd.org/spell/fr/eclair)* et *[projectile magique](https://www.aidedd.org/spell/fr/projectile-magique)*.

      ## Actions

      ***Attaques multiples***. L'horreur casquée effectue deux attaques d'Épée arcanique.

      ***Épée arcanique***. *Corps à corps* : +6, allonge 1,50 m. *Touché* : 8 (1d8 + 4) dégâts tranchants plus 5 (1d10) dégâts de force.
    senses: Vision aveugle 18 m, Perception passive 14
    languages:
    - comprend le commun plus une autre langue mais ne parle pas
