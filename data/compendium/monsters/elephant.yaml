translations:
  en:
    name: Elephant
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The elephant makes two Gore attacks.</p>
      <p><strong><em>Gore</em></strong>. <em>Melee Attack Roll</em> : +8, reach 5 ft. <em>Hit</em> : 15 (2d8 + 6) Piercing damage. If the target is a Huge or smaller creature and the elephant moved 20+ feet straight toward it immediately before the hit, the target has the Prone condition.</p>
      <h2>Bonus actions</h2>
      <p>** <em>Trample</em>**. <em>Dexterity Saving Throw</em> : DC 16, one creature within 5 feet that has the Prone condition. <em>Failure</em> : 17 (2d10 + 6) Bludgeoning damage. <em>Success</em> : Half damage.</p>
    senses: Passive Perception 10
    languages:
    - None
  fr:
    name: Éléphant
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. L'éléphant effectue deux attaques de Coup de défense.</p>
      <p><strong><em>Coup de défense</em></strong>. <em>Corps à corps</em> : +8, allonge 1,50 m. <em>Touché</em> : 15 (2d8 + 6) dégâts perforants. Si la cible est une créature de taille TG ou inférieure et que l'éléphant s'est déplacé d'au moins 6 m en ligne droite vers elle juste avant de la toucher, la cible subit l'état À terre.</p>
      <h2>Actions Bonus</h2>
      <p>** <em>Piétinement</em>**. <em>JdS Dextérité</em> : DD 16, une créature dans un rayon de 1,50 m qui subit l'état À terre. <em>Échec</em> : 17 (2d10 + 6) dégâts contondants. <em>Réussite</em> : demi-dégâts uniquement.</p>
    senses: Perception passive 10
    languages:
    - aucune
