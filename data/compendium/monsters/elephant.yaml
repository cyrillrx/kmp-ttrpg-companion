translations:
  en:
    name: Elephant
    subtype: null
    description: |-
      ## Actions

      ***Multiattack***. The elephant makes two Gore attacks.

      ***Gore***. *Melee Attack Roll* : +8, reach 5 ft. *Hit* : 15 (2d8 + 6) Piercing damage. If the target is a Huge or smaller creature and the elephant moved 20+ feet straight toward it immediately before the hit, the target has the Prone condition.

      ## Bonus actions

      ***Trample***. *Dexterity Saving Throw* : DC 16, one creature within 5 feet that has the Prone condition. *Failure* : 17 (2d10 + 6) Bludgeoning damage. *Success* : Half damage.
    senses: Passive Perception 10
    languages:
    - None
  fr:
    name: Éléphant
    subtype: null
    description: |-
      ## Actions

      ***Attaques multiples***. L'éléphant effectue deux attaques de Coup de défense.

      ***Coup de défense***. *Corps à corps* : +8, allonge 1,50 m. *Touché* : 15 (2d8 + 6) dégâts perforants. Si la cible est une créature de taille TG ou inférieure et que l'éléphant s'est déplacé d'au moins 6 m en ligne droite vers elle juste avant de la toucher, la cible subit l'état À terre.

      ## Actions Bonus

      ***Piétinement***. *JdS Dextérité* : DD 16, une créature dans un rayon de 1,50 m qui subit l'état À terre. *Échec* : 17 (2d10 + 6) dégâts contondants. *Réussite* : demi-dégâts uniquement.
    senses: Perception passive 10
    languages:
    - aucune
