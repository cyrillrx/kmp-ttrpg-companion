    description: |-
      <h2>Actions</h2>
      <p>** <em>Hooves</em>**. <em>Melee Attack Roll</em> : +6, reach 5 ft. <em>Hit</em> : 7 (1d6 + 4) Bludgeoning damage. If the target is a Large or smaller creature and the skeleton moved 20+ feet straight toward it immediately before the hit, the target has the Prone condition.</p>
