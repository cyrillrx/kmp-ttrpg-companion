  fr:
    name: Cheval de guerre squelette
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Sabots</em>**. <em>Corps à corps</em> : +6, allonge 1,50 m. <em>Touché</em> : 7 (1d6 + 4) dégâts contondants. Si la cible est une créature de taille G ou inférieure et si le squelette s'est déplacé en ligne droite d'un minimum de 6 m juste avant de la toucher, la cible subit l'état À terre.</p>
    senses: Vision dans le noir 18 m, Perception passive 9
    languages:
    - aucune
