translations:
  en:
    name: Rust Monster
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Iron Scent</em>**. The rust monster can pinpoint the location of ferrous metal within 30 feet of itself.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The rust monster makes one Bite attack and uses Antennae twice.</p>
      <p><strong><em>Bite</em></strong>. <em>Melee Attack Roll</em> : +3, reach 5 ft. <em>Hit</em> : 5 (1d8 + 1) Piercing damage.</p>
      <p><strong><em>Antennae</em></strong>. The rust monster targets one nonmagical metal object—armor or a weapon—worn or carried by a creature within 5 feet of itself. <em>Dexterity Saving Throw</em> : DC 11, the creature with the object. <em>Failure</em> : The object takes a −1 penalty to the AC it offers (armor) or to its attack rolls (weapon). Armor is destroyed if the penalty reduces its AC to 10, and a weapon is destroyed if its penalty reaches −5. The penalty can be removed by casting the <em><a href="https://www.aidedd.org/spell/mending">Mending</a></em> spell on the armor or weapon.</p>
      <p><strong><em>Destroy Metal</em></strong>. The rust monster touches a nonmagical metal object within 5 feet of itself that isn't being worn or carried. The touch destroys a 1-foot Cube of the object.</p>
      <h2>Reactions</h2>
      <p>** <em>Reflexive Antennae</em>**. <em>Trigger</em> : An attack roll hits the rust monster. <em>Response</em> : The rust monster uses Antennae.</p>
    senses: Darkvision 60 ft., Passive Perception 11
    languages: []
  fr:
    name: Oxydeur
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Perception du fer</em>**. L'oxydeur perçoit précisément la position de tout métal ferreux dans un rayon de 9 m.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. L'oxydeur effectue une attaque de Morsure et recourt deux fois à Antennes.</p>
      <p><strong><em>Morsure</em></strong>. <em>Corps à corps</em> : +3, allonge 1,50 m. <em>Touché</em> : 5 (1d8 + 1) dégâts perforants.</p>
      <p><strong><em>Antennes</em></strong>. L'oxydeur cible un objet en métal non magique, armure ou arme, porté par une créature dans un rayon de 1,50 m. <em>JdS Dextérité</em> : DD 11, la créature porteuse de l'objet. <em>Échec</em> : l'objet subit un malus de −1 à la CA qu'il octroie (armure) ou à ses jets d'attaque (arme). L'armure est détruite si ce malus réduit sa CA à 10, et l'arme est détruite quand le malus cumulé atteint −5. On peut annuler ce malus en lançant le sort <em>réparation</em> sur l'arme ou l'armure concernée.</p>
      <p><strong><em>Destruction du métal</em></strong>. L'oxydeur touche un objet en métal non magique dans un rayon de 1,50 m qui n'est porté par personne. Ce contact détruit un Cube de 30 cm de l'objet.</p>
      <h2>Réactions</h2>
      <p>** <em>Antennes réactives</em>**. <em>Déclencheur</em> : un jet d'attaque touche l'oxydeur. <em>Conséquences</em> : l'oxydeur recourt à Antennes.</p>
    senses: Vision dans le noir 18 m, Perception passive 11
    languages: []
