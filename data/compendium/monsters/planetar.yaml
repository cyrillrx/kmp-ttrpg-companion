translations:
  en:
    name: Planetar
    subtype: Angel
    description: |-
      <h2>Traits</h2>
      <p>** <em>Divine Awareness</em>**. The planetar knows if it hears a lie.</p>
      <p><strong><em>Exalted Restoration</em></strong>. If the planetar dies outside Mount Celestia, its body disappears, and it gains a new body instantly, reviving with all its Hit Points somewhere in Mount Celestia.</p>
      <p><strong><em>Magic Resistance</em></strong>. The planetar has Advantage on saving throws against spells and other magical effects.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The planetar makes three Radiant Sword attacks or uses Holy Burst twice.</p>
      <p><strong><em>Radiant Sword</em></strong>. <em>Melee Attack Roll</em> : +12, reach 10 ft. <em>Hit</em> : 14 (2d6 + 7) Slashing damage plus 18 (4d8) Radiant damage.</p>
      <p><strong><em>Holy Burst</em></strong>. <em>Dexterity Saving Throw</em> : DC 20, each enemy in a 20-foot-radius Sphere centered on a point the planetar can see within 120 feet. <em>Failure</em> : 24 (7d6) Radiant damage. <em>Success</em> : Half damage.</p>
      <p><strong><em>Spellcasting</em></strong>. The planetar casts one of the following spells, requiring no Material components and using Charisma as spellcasting ability (spell save DC 20):</p>
      <p>At Will: <em><a href="https://www.aidedd.org/spell/detect-evil-and-good">Detect Evil and Good</a></em><br />
      1/Day Each: <em><a href="https://www.aidedd.org/spell/commune">Commune</a>, <a href="https://www.aidedd.org/spell/control-weather">Control Weather</a>, <a href="https://www.aidedd.org/spell/dispel-evil-and-good">Dispel Evil and Good</a>, <a href="https://www.aidedd.org/spell/raise-dead">Raise Dead</a></em>  </p>
      <h2>Bonus actions</h2>
      <p>** <em>Divine Aid (2/Day)</em>**. The planetar casts <em><a href="https://www.aidedd.org/spell/cure-wounds">Cure Wounds</a>, <a href="https://www.aidedd.org/spell/invisibility">Invisibility</a>, <a href="https://www.aidedd.org/spell/lesser-restoration">Lesser Restoration</a></em>, or <em><a href="https://www.aidedd.org/spell/remove-curse">Remove Curse</a></em> , using the same spellcasting ability as Spellcasting.</p>
    senses: Truesight 120 ft., Passive Perception 21
    languages:
    - All; telepathy 120 ft.
  fr:
    name: Planétar
    subtype: Ange
    description: |-
      <h2>Traits</h2>
      <p>** <em>Résistance à la magie</em>**. Le planétar a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.</p>
      <p><strong><em>Restauration exaltée</em></strong>. Si le planétar meurt hors du Mont Céleste, son corps disparaît et il en acquiert aussitôt un nouveau en revenant à la vie avec tous ses pv, quelque part sur le Mont Céleste.</p>
      <p><strong><em>Vigilance divine</em></strong>. Le planétar reconnaît un mensonge quand il en entend un.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le planétar effectue trois attaques d'Épée radiante ou recourt deux fois à Éruption bénie.</p>
      <p><strong><em>Épée radiante</em></strong>. <em>Corps à corps</em> : +12, allonge 3 m. <em>Touché</em> : 14 (2d6 + 7) dégâts tranchants plus 18 (4d8) dégâts radiants.</p>
      <p><strong><em>Éruption bénie</em></strong>. <em>JdS Dextérité</em> : DD 20, chaque ennemi dans une Sphère de 6 m de rayon centrée sur un point que le planétar voit dans un rayon de 36 m. <em>Échec</em> : 24 (7d6) dégâts radiants. <em>Réussite</em> : demi-dégâts.</p>
      <p><strong><em>Incantation</em></strong>. Le planétar lance l'un des sorts suivants sans composantes matérielles, le Charisme étant sa caractéristique d'incantation (DD de sauvegarde 20) :</p>
      <p>À volonté : <em><a href="https://www.aidedd.org/spell/fr/detection-du-mal-et-du-bien">détection du mal et du bien</a></em><br />
      1/jour chacun : <em>communion, contrôle du climat,<a href="https://www.aidedd.org/spell/fr/dissipation-du-mal-et-du-bien">dissipation du mal et du bien</a>, rappel à la vie</em>  </p>
      <h2>Actions Bonus</h2>
      <p>** <em>Soutien divin (2/jour)</em>**. Le planétar lance <em><a href="https://www.aidedd.org/spell/fr/delivrance-des-maledictions">délivrance des malédictions</a>, <a href="https://www.aidedd.org/spell/fr/invisibilite">invisibilité</a>, restauration partielle</em> ou <em>soins</em> , avec la même caractéristique d'incantation que pour Incantation.</p>
    senses: vision véritable 36 m, Perception passive 21
    languages:
    - toutes ; télépathie 36 m
