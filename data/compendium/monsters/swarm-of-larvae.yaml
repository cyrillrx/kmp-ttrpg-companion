translations:
  en:
    name: Swarm of Larvae
    subtype: null
    description: |-
      ## Traits

      ***Swarm***. The swarm can occupy another creature's space and vice versa, and the swarm can move through an opening large enough for a Medium creature. The swarm can't regain Hit Points or gain Temporary Hit Points.

      ## Actions

      ***Bites***. *Melee Attack Roll* : +4, reach 5 ft. *Hit* : 9 (2d6 + 2) Necrotic damage, or 7 (2d4 + 2) Necrotic damage if the swarm is Bloodied.
    senses: Darkvision 60 ft., Passive Perception 11
    languages:
    - Understands all but can't speak
  fr:
    name: Nuée de larves
    subtype: null
    description: |-
      ## Traits

      ***Nuée***. La nuée peut occuper l'espace d'une autre créature et réciproquement, et elle peut se déplacer par toute ouverture assez large pour une créature de taille M. La nuée ne peut ni récupérer de points de vie ni recevoir de points de vie temporaires.

      ## Actions

      ***Morsures***. *Corps à corps* : +4, allonge 1,50 m. *Touché* : 9 (2d6 + 2) dégâts nécrotiques, ou 7 (2d4 + 2) dégâts nécrotiques si la nuée est En péril.
    senses: Vision dans le noir 18 m, Perception passive 11
    languages:
    - les comprend toutes mais ne parle pas
