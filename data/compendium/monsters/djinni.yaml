translations:
  en:
    name: Djinni
    subtype: Genie
    description: |-
      ## Traits

      ***Elemental Restoration***. If the djinni dies outside the Elemental Plane of Air, its body dissolves into mist, and it gains a new body in 1d4 days, reviving with all its Hit Points somewhere on the Plane of Air.

      ***Magic Resistance***. The djinni has Advantage on saving throws against spells and other magical effects.

      ***Wishes***. The djinni has a 30 percent chance of knowing the *[Wish](https://www.aidedd.org/spell/wish)* spell. If the djinni knows it, the djinni can cast it only on behalf of a non-genie creature who communicates a wish in a way the djinni can understand. If the djinni casts the spell for the creature, the djinni suffers none of the spell's stress. Once the djinni has cast it three times, the djinni can't do so again for 365 days.

      ## Actions

      ***Multiattack***. The djinni makes three attacks, using Storm Blade or Storm Bolt in any combination.

      ***Storm Blade***. *Melee Attack Roll* : +9, reach 5 ft. *Hit* : 12 (2d6 + 5) Slashing damage plus 7 (2d6) Lightning damage.

      ***Storm Bolt***. *Ranged Attack Roll* : +9, range 120 ft. *Hit* : 13 (3d8) Thunder damage. If the target is a Large or smaller creature, it has the Prone condition.

      ***Create Whirlwind***. The djinni conjures a whirlwind at a point it can see within 120 feet. The whirlwind fills a 20-foot-radius, 60-foot-high Cylinder centered on that point. The whirlwind lasts until the djinni's Concentration on it ends. The djinni can move the whirlwind up to 20 feet at the start of each of its turns. Whenever the whirlwind enters a creature's space or a creature enters the whirlwind, that creature is subjected to the following effect. *Strength Saving Throw* : DC 17 (a creature makes this save only once per turn, and the djinni is unaffected). *Failure* : While in the whirlwind, the target has the Restrained condition and moves with the whirlwind. At the start of each of its turns, the Restrained target takes 21 (6d6) Thunder damage. At the end of each of its turns, the target repeats the save, ending the effect on itself on a success.

      ***Spellcasting***. The djinni casts one of the following spells, requiring no Material components and using Charisma as the spellcasting ability (spell save DC 17):

      At Will: *[Detect Evil and Good](https://www.aidedd.org/spell/detect-evil-and-good), [Detect Magic](https://www.aidedd.org/spell/detect-magic)*\
      2/Day Each: *[Create Food and Water](https://www.aidedd.org/spell/create-food-and-water)* (can create wine instead of water), *[Tongues](https://www.aidedd.org/spell/tongues), Wind Walk*\
      1/Day Each: *[Creation](https://www.aidedd.org/spell/creation), [Gaseous Form](https://www.aidedd.org/spell/gaseous-form), [Invisibility](https://www.aidedd.org/spell/invisibility), [Major Image](https://www.aidedd.org/spell/major-image), [Plane Shift](https://www.aidedd.org/spell/plane-shift)*
    senses: Darkvision 120 ft., Passive Perception 13
    languages:
    - Primordial (Auran)
  fr:
    name: Djinn
    subtype: Génie
    description: |-
      ## Traits

      ***Résistance à la magie***. Le djinn a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.

      ***Restauration élémentaire***. Si le djinn meurt hors du Plan Élémentaire de l'Air, son corps se dissipe en brume et il en acquiert un nouveau en 1d4 jours, pour revenir à la vie avec tous ses pv quelque part dans le Plan de l'Air.

      ***Souhaits***. Le djinn a 30 % de chances de connaître le sort *souhait*. Si tel est le cas, il ne peut le lancer que pour une créature autre qu'un génie, qui doit communiquer son souhait d'une manière intelligible pour le djinn. Si le djinn lance le sort pour la créature, il ne subit pas les effets délétères normalement liés à cette épreuve. Après que le djinn a lancé trois fois ce sort, il doit attendre 365 jours pour pouvoir le relancer.

      ## Actions

      ***Attaques multiples***. Le djinn effectue trois attaques, réparties à sa guise entre Lame d'orage et Trait d'orage.

      ***Lame d'orage***. *Corps à corps* : +9, allonge 1,50 m. *Touché* : 12 (2d6 + 5) dégâts tranchants plus 7 (2d6) dégâts de foudre.

      ***Trait d'orage***. *À distance* : +9, portée 36 m. *Touché* : 13 (3d8) dégâts de tonnerre. Si la cible est une créature de taille G ou inférieure, elle subit l'état À terre.

      ***Création de tourbillon***. Le djinn invoque un tourbillon en un point qu'il voit dans un rayon de 36 m. Le tourbillon emplit un Cylindre de 6 m de rayon et 18 m de haut, centré sur ce point. Le tourbillon persiste jusqu'à ce que cesse la Concentration du djinn sur lui. Le djinn peut déplacer le tourbillon d'un maximum de 6 m au début de chacun de ses tours. Chaque fois que le tourbillon pénètre dans l'espace d'une créature ou qu'une créature entre dans le tourbillon, celle-ci est soumise à l'effet suivant. *JdS Force* : DD 17 (une même créature n'effectue en aucun cas ce JdS plus d'une fois par tour et le djinn n'est pas affecté). *Échec* : Tant qu'elle est dans le tourbillon, la cible subit l'état Entravé et se déplace avec le tourbillon. Au début de chacun de ses tours, la cible Entravée subit 21 (6d6) dégâts de tonnerre. La cible réitère le JdS à la fin de chacun de ses tours et met un terme à l'effet sur elle-même en cas de réussite.

      ***Incantation***. Le djinn lance l'un des sorts suivants, sans composantes matérielles, le Charisme étant sa caractéristique d'incantation (DD de sauvegarde 17) :

      À volonté : *[détection de la magie](https://www.aidedd.org/spell/fr/detection-de-la-magie), [détection du mal et du bien](https://www.aidedd.org/spell/fr/detection-du-mal-et-du-bien)*\
      2/jour chacun : *création de nourriture et d'eau* (peut produire du vin plutôt que de l'eau), *don des langues, vent divin*\
      1/jour chacun : *création,[changement de plan](https://www.aidedd.org/spell/fr/changement-de-plan), forme gazeuse, [image majeure](https://www.aidedd.org/spell/fr/image-majeure), [invisibilité](https://www.aidedd.org/spell/fr/invisibilite)*
    senses: Vision dans le noir 36 m, Perception passive 13
    languages:
    - primordial (aérien)
