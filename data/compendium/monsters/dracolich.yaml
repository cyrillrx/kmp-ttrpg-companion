translations:
  en:
    name: Dracolich
    subtype: null
    description: '## Traits


      ***Legendary Resistance (3/Day, or 4/Day in Lair)***. If the dracolich fails
      a saving throw, it can choose to succeed instead.


      ***Life Suppression***. Creatures within 60 feet of the dracolich can''t regain
      Hit Points.


      ***Magic Resistance***. The dracolich has Advantage on saving throws against
      spells and other magical effects.


      ***Soul Gem***. The dracolich has a magical gem. If the dracolich is destroyed
      while the gem is on the same plane of existence as it, the dracolich gains a
      new body in 1d20 days, regaining all its Hit Points and appearing within 5 feet
      of the gem. The gem is a Tiny object that has AC 20; HP 50; and Immunity to
      Necrotic, Poison, and Psychic damage. The gem regains all its Hit Points at
      the end of every turn, but it turns to dust if reduced to 0 Hit Points. If the
      gem is destroyed, the dracolich can create a new one by completing an 8-hour
      ritual using a gem worth 1,000+ GP and by expending 5,000 GP, which the ritual
      consumes.


      ## Actions


      ***Multiattack***. The dracolich makes three Rend attacks. It can replace one
      attack with a use of Spellcasting to cast *[Ray of Sickness](https://www.aidedd.org/spell/ray-of-sickness)*
      (level 2 version).


      ***Rend***. *Melee Attack Roll* : +13, reach 10 ft. *Hit* : 18 (2d10 + 7) Slashing
      damage plus 4 (1d8) Necrotic damage.


      ***Necrotic Breath (Recharge 5–6)***. *Constitution Saving Throw* : DC 20, each
      creature in a 60-foot Cone. *Failure* : 52 (8d12) Necrotic damage. *Success*
      : Half damage.


      ***Spellcasting***. The dracolich casts one of the following spells, requiring
      no Material components and using Charisma as the spellcasting ability (spell
      save DC 19, +11 to hit with spell attacks):


      At will: *[Detect Magic](https://www.aidedd.org/spell/detect-magic), [Ray of
      Sickness](https://www.aidedd.org/spell/ray-of-sickness)* (level 2 version)


      1/day each: *[Create Undead](https://www.aidedd.org/spell/create-undead)* (level
      8 version), *[Finger of Death](https://www.aidedd.org/spell/finger-of-death)*


      ## Legendary actions


      Legendary Action Uses: 3 (4 in Lair). Immediately after another creature''s
      turn, the dracolich can expend a use to take one of the following actions. The
      dracolich regains all expended uses at the start of each of its turns.


      ***Pounce***. The dracolich moves up to half its Speed, and it makes one Rend
      attack.


      ***Sickening Ray***. The dracolich uses Spellcasting to cast *[Ray of Sickness](https://www.aidedd.org/spell/ray-of-sickness)*
      (level 2 version). The dracolich can''t take this action again until the start
      of its next turn.


      ***Terrifying Presence***. *Wisdom Saving Throw* : DC 19, each creature in a
      30-foot Emanation originating from the dracolich. *Failure* : 11 (2d10) Psychic
      damage, and the target has the Frightened condition until the end of its next
      turn. *Failure or Success* : The dracolich can''t take this action again until
      the start of its next turn.'
    senses: Blindsight 60 ft., Darkvision 120 ft., Passive Perception 24
    languages:
    - Common
    - Draconic
