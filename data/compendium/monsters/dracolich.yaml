translations:
  en:
    name: Dracolich
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Legendary Resistance (3/Day, or 4/Day in Lair)</em>**. If the dracolich fails a saving throw, it can choose to succeed instead.</p>
      <p><strong><em>Life Suppression</em></strong>. Creatures within 60 feet of the dracolich can't regain Hit Points.</p>
      <p><strong><em>Magic Resistance</em></strong>. The dracolich has Advantage on saving throws against spells and other magical effects.</p>
      <p><strong><em>Soul Gem</em></strong>. The dracolich has a magical gem. If the dracolich is destroyed while the gem is on the same plane of existence as it, the dracolich gains a new body in 1d20 days, regaining all its Hit Points and appearing within 5 feet of the gem. The gem is a Tiny object that has AC 20; HP 50; and Immunity to Necrotic, Poison, and Psychic damage. The gem regains all its Hit Points at the end of every turn, but it turns to dust if reduced to 0 Hit Points. If the gem is destroyed, the dracolich can create a new one by completing an 8-hour ritual using a gem worth 1,000+ GP and by expending 5,000 GP, which the ritual consumes.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The dracolich makes three Rend attacks. It can replace one attack with a use of Spellcasting to cast <em><a href="https://www.aidedd.org/spell/ray-of-sickness">Ray of Sickness</a></em> (level 2 version).</p>
      <p><strong><em>Rend</em></strong>. <em>Melee Attack Roll</em> : +13, reach 10 ft. <em>Hit</em> : 18 (2d10 + 7) Slashing damage plus 4 (1d8) Necrotic damage.</p>
      <p><strong><em>Necrotic Breath (Recharge 5–6)</em></strong>. <em>Constitution Saving Throw</em> : DC 20, each creature in a 60-foot Cone. <em>Failure</em> : 52 (8d12) Necrotic damage. <em>Success</em> : Half damage.</p>
      <p><strong><em>Spellcasting</em></strong>. The dracolich casts one of the following spells, requiring no Material components and using Charisma as the spellcasting ability (spell save DC 19, +11 to hit with spell attacks):</p>
      <p>At will: <em><a href="https://www.aidedd.org/spell/detect-magic">Detect Magic</a>, <a href="https://www.aidedd.org/spell/ray-of-sickness">Ray of Sickness</a></em> (level 2 version)<br />
      1/day each: <em><a href="https://www.aidedd.org/spell/create-undead">Create Undead</a></em> (level 8 version), <em><a href="https://www.aidedd.org/spell/finger-of-death">Finger of Death</a></em>  </p>
      <h2>Legendary actions</h2>
      <p>Legendary Action Uses: 3 (4 in Lair). Immediately after another creature's turn, the dracolich can expend a use to take one of the following actions. The dracolich regains all expended uses at the start of each of its turns. </p>
      <p><strong><em>Pounce</em></strong>. The dracolich moves up to half its Speed, and it makes one Rend attack.</p>
      <p><strong><em>Sickening Ray</em></strong>. The dracolich uses Spellcasting to cast <em><a href="https://www.aidedd.org/spell/ray-of-sickness">Ray of Sickness</a></em> (level 2 version). The dracolich can't take this action again until the start of its next turn.</p>
      <p><strong><em>Terrifying Presence</em></strong>. <em>Wisdom Saving Throw</em> : DC 19, each creature in a 30-foot Emanation originating from the dracolich. <em>Failure</em> : 11 (2d10) Psychic damage, and the target has the Frightened condition until the end of its next turn. <em>Failure or Success</em> : The dracolich can't take this action again until the start of its next turn.</p>
    senses: Blindsight 60 ft., Darkvision 120 ft., Passive Perception 24
    languages:
    - Common
    - Draconic
