translations:
  en:
    name: Yuan-ti Infiltrator
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Magic Resistance</em>**. The yuan-ti has Advantage on saving throws against spells and other magical effects.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The yuan-ti makes two Scimitar attacks.</p>
      <p><strong><em>Scimitar</em></strong>. <em>Melee Attack Roll</em> : +3, reach 5 ft. <em>Hit</em> : 4 (1d6 + 1) Slashing damage.</p>
      <p><strong><em>Poison Ray</em></strong>. <em>Ranged Attack Roll</em> : +4, range 120 ft. <em>Hit</em> : 9 (2d6 + 2) Poison damage.</p>
      <p><strong><em>Spellcasting</em></strong>. The yuan-ti casts one of the following spells, requiring no Material components and using Wisdom as the spellcasting ability (spell save DC 12):</p>
      <p>At will: <em><a href="https://www.aidedd.org/spell/animal-friendship">Animal Friendship</a></em> (snakes only)<br />
      2/day: <em><a href="https://www.aidedd.org/spell/suggestion">Suggestion</a></em></p>
    senses: Darkvision 60 ft., Passive Perception 14
    languages:
    - Abyssal
    - Common
    - Draconic
  fr:
    name: Yuan-ti, infiltrateur
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Résistance à la magie</em>**. Le yuan-ti a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le yuan-ti effectue deux attaques de Cimeterre.</p>
      <p><strong><em>Cimeterre</em></strong>. <em>Corps à corps</em> : +3, allonge 1,50 m. <em>Touché</em> : 4 (1d6 + 1) dégâts tranchants.</p>
      <p><strong><em>Rayon toxique</em></strong>. <em>À distance</em> : +4, portée 36 m. <em>Touché</em> : 9 (2d6 + 2) dégâts de poison.</p>
      <p><strong><em>Incantation</em></strong>. Le yuan-ti lance l'un des sorts suivants sans composantes matérielles, la Sagesse étant sa caractéristique d'incantation (DD de sauvegarde 12) :</p>
      <p>À volonté : <em><a href="https://www.aidedd.org/spell/fr/amitie-avec-les-animaux">amitié avec les animaux</a></em> (serpents uniquement)<br />
      2/jour : <em><a href="https://www.aidedd.org/spell/fr/suggestion">suggestion</a></em></p>
    senses: Vision dans le noir 18 m, Perception passive 14
    languages:
    - abyssal
    - commun
    - draconique
