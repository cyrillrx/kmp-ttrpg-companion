translations:
  en:
    name: Hydra
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Hold Breath</em>**. The hydra can hold its breath for 1 hour.</p>
      <p><strong><em>Multiple Heads</em></strong>. The hydra has five heads. Whenever the hydra takes 25 damage or more on a single turn, one of its heads dies. The hydra dies if all its heads are dead. At the end of each of its turns when it has at least one living head, the hydra grows two heads for each of its heads that died since its last turn, unless it has taken Fire damage since its last turn. The hydra regains 20 Hit Points when it grows new heads.</p>
      <p><strong><em>Reactive Heads</em></strong>. For each head the hydra has beyond one, it gets an extra Reaction that can be used only for Opportunity Attacks.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The hydra makes as many Bite attacks as it has heads.</p>
      <p><strong><em>Bite</em></strong>. <em>Melee Attack Roll</em> : +8, reach 10 ft. <em>Hit</em> : 10 (1d10 + 5) Piercing damage.</p>
    senses: Darkvision 60 ft., Passive Perception 16
    languages: []
  fr:
    name: Hydre
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Apnée</em>**. L'hydre peut retenir son souffle pendant 1 heure.</p>
      <p><strong><em>Têtes multiples</em></strong>. L'hydre est dotée de cinq têtes. Chaque fois que l'hydre subit au moins 25 dégâts dans un même tour, l'une de ses têtes meurt. L'hydre meurt quand toutes ses têtes sont mortes. À la fin de chacun de ses tours et à condition d'avoir au moins une tête vivante, deux têtes lui repoussent par tête morte depuis son tour précédent, sauf si elle a subi des dégâts de feu entre-temps. L'hydre récupère 20 points de vie quand il lui pousse de nouvelles têtes.</p>
      <p><strong><em>Têtes réactives</em></strong>. Chaque tête dont est dotée l'hydre en plus de la première lui octroie une Réaction supplémentaire qu'elle ne peut jouer que pour effectuer une attaque d'Opportunité.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. L'hydre effectue autant d'attaques de Morsure qu'elle a de têtes.</p>
      <p><strong><em>Morsure</em></strong>. <em>Corps à corps</em> : +8, allonge 3 m. <em>Touché</em> : 10 (1d10 + 5) dégâts perforants.</p>
    senses: Vision dans le noir 18 m, Perception passive 16
    languages: []
