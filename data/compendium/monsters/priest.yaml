translations:
  en:
    name: Priest
    subtype: Cleric
    description: '## Actions


      ***Multiattack***. The priest makes two attacks, using Mace or Radiant Flame
      in any combination.


      ***Mace***. *Melee Attack Roll* : +5, reach 5 ft. *Hit* : 6 (1d6 + 3) Bludgeoning
      damage plus 5 (2d4) Radiant damage.


      ***Radiant Flame***. *Ranged Attack Roll* : +5, range 60 ft. *Hit* : 11 (2d10)
      Radiant damage.


      ***Spellcasting***. The priest casts one of the following spells, using Wisdom
      as the spellcasting ability:


      At will: *[Light](https://www.aidedd.org/spell/light), [Thaumaturgy](https://www.aidedd.org/spell/thaumaturgy)*


      1/day: *[Spirit Guardians](https://www.aidedd.org/spell/spirit-guardians)*


      ## Bonus actions


      ***Divine Aid (3/Day)***. The priest casts *[Bless](https://www.aidedd.org/spell/bless),
      [Dispel Magic](https://www.aidedd.org/spell/dispel-magic), [Healing Word](https://www.aidedd.org/spell/healing-word)*,
      or *[Lesser Restoration](https://www.aidedd.org/spell/lesser-restoration)* ,
      using the same spellcasting ability as Spellcasting.'
    senses: Passive Perception 15
    languages:
    - Common plus one other language
  fr:
    name: Prêtre
    subtype: Clerc
    description: '## Actions


      ***Attaques multiples***. Le prêtre effectue deux attaques, réparties à sa guise
      entre Masse d''armes et Flamme radiante.


      ***Masse d''armes***. *Corps à corps* : +5, allonge 1,50 m. *Touché* : 6 (1d6
      + 3) dégâts contondants plus 5 (2d4) dégâts radiants.


      ***Flamme radiante***. *À distance* : +5, portée 18 m. *Touché* : 11 (2d10)
      dégâts radiants.


      ***Incantation***. Le prêtre lance l''un des sorts suivants, la Sagesse étant
      sa caractéristique d''incantation (DD de sauvegarde 13) :


      À volonté : *lumière,[thaumaturgie](https://www.aidedd.org/spell/fr/thaumaturgie)*


      1/jour : *esprits gardiens*


      ## Actions Bonus


      ***Soutien divin (3/jour)***. Le prêtre lance *bénédiction,[dissipation de la
      magie](https://www.aidedd.org/spell/fr/dissipation-de-la-magie), mot de guérison*
      ou *restauration partielle* , avec la même caractéristique d''incantation que
      pour Incantation.'
    senses: Perception passive 15
    languages:
    - commun plus une autre langue
