translations:
  en:
    name: Priest
    subtype: Cleric
    description: |-
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The priest makes two attacks, using Mace or Radiant Flame in any combination.</p>
      <p><strong><em>Mace</em></strong>. <em>Melee Attack Roll</em> : +5, reach 5 ft. <em>Hit</em> : 6 (1d6 + 3) Bludgeoning damage plus 5 (2d4) Radiant damage.</p>
      <p><strong><em>Radiant Flame</em></strong>. <em>Ranged Attack Roll</em> : +5, range 60 ft. <em>Hit</em> : 11 (2d10) Radiant damage.</p>
      <p><strong><em>Spellcasting</em></strong>. The priest casts one of the following spells, using Wisdom as the spellcasting ability:</p>
      <p>At will: <em><a href="https://www.aidedd.org/spell/light">Light</a>, <a href="https://www.aidedd.org/spell/thaumaturgy">Thaumaturgy</a></em><br />
      1/day: <em><a href="https://www.aidedd.org/spell/spirit-guardians">Spirit Guardians</a></em>  </p>
      <h2>Bonus actions</h2>
      <p>** <em>Divine Aid (3/Day)</em>**. The priest casts <em><a href="https://www.aidedd.org/spell/bless">Bless</a>, <a href="https://www.aidedd.org/spell/dispel-magic">Dispel Magic</a>, <a href="https://www.aidedd.org/spell/healing-word">Healing Word</a></em>, or <em><a href="https://www.aidedd.org/spell/lesser-restoration">Lesser Restoration</a></em> , using the same spellcasting ability as Spellcasting.</p>
    senses: Passive Perception 15
    languages:
    - Common plus one other language
  fr:
    name: Prêtre
    subtype: Clerc
    description: |-
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le prêtre effectue deux attaques, réparties à sa guise entre Masse d'armes et Flamme radiante.</p>
      <p><strong><em>Masse d'armes</em></strong>. <em>Corps à corps</em> : +5, allonge 1,50 m. <em>Touché</em> : 6 (1d6 + 3) dégâts contondants plus 5 (2d4) dégâts radiants.</p>
      <p><strong><em>Flamme radiante</em></strong>. <em>À distance</em> : +5, portée 18 m. <em>Touché</em> : 11 (2d10) dégâts radiants.</p>
      <p><strong><em>Incantation</em></strong>. Le prêtre lance l'un des sorts suivants, la Sagesse étant sa caractéristique d'incantation (DD de sauvegarde 13) :</p>
      <p>À volonté : <em>lumière,<a href="https://www.aidedd.org/spell/fr/thaumaturgie">thaumaturgie</a></em><br />
      1/jour : <em>esprits gardiens</em>  </p>
      <h2>Actions Bonus</h2>
      <p>** <em>Soutien divin (3/jour)</em>**. Le prêtre lance <em>bénédiction,<a href="https://www.aidedd.org/spell/fr/dissipation-de-la-magie">dissipation de la magie</a>, mot de guérison</em> ou <em>restauration partielle</em> , avec la même caractéristique d'incantation que pour Incantation.</p>
    senses: Perception passive 15
    languages:
    - commun plus une autre langue
