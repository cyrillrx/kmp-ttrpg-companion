  en:
    name: Giant Wasp
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Flyby</em>**. The wasp doesn't provoke an Opportunity Attack when it flies out of an enemy's reach.</p>
      <h2>Actions</h2>
      <p>** <em>Sting</em>**. <em>Melee Attack Roll</em> : +4, reach 5 ft. <em>Hit</em> : 5 (1d6 + 2) Piercing damage plus 5 (2d4) Poison damage.</p>
    senses: Passive Perception 10
    languages:
    - None
  fr:
    name: Guêpe géante
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Repli aérien</em>**. La guêpe ne provoque pas d'attaque d'Opportunité lorsqu'elle quitte la zone d'allonge d'un ennemi en volant.</p>
      <h2>Actions</h2>
      <p>** <em>Dard</em>**. <em>Corps à corps</em> : +4, allonge 1,50 m. <em>Touché</em> : 5 (1d6 + 2) dégâts perforants plus 5 (2d4) dégâts de poison.</p>
    senses: Perception passive 10
