translations:
  en:
    name: Marilith
    subtype: Demon
    description: |-
      <h2>Traits</h2>
      <p>** <em>Demonic Restoration</em>**. If the marilith dies outside the Abyss, its body dissolves into ichor, and it gains a new body instantly, reviving with all its Hit Points somewhere in the Abyss.</p>
      <p><strong><em>Magic Resistance</em></strong>. The marilith has Advantage on saving throws against spells and other magical effects.</p>
      <p><strong><em>Reactive</em></strong>. The marilith can take one Reaction on every turn of combat.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The marilith makes six Pact Blade attacks and uses Constrict.</p>
      <p><strong><em>Pact Blade</em></strong>. <em>Melee Attack Roll</em> : +10, reach 5 ft. <em>Hit</em> : 10 (1d10 + 5) Slashing damage plus 7 (2d6) Necrotic damage.</p>
      <p><strong><em>Constrict</em></strong>. <em>Strength Saving Throw</em> : DC 17, one Medium or smaller creature the marilith can see within 5 feet. <em>Failure</em> : 15 (2d10 + 4) Bludgeoning damage. The target has the Grappled condition (escape DC 14), and it has the Restrained condition until the grapple ends.</p>
      <h2>Bonus actions</h2>
      <p>** <em>Teleport (Recharge 5–6)</em>**. The marilith teleports up to 120 feet to an unoccupied space it can see.</p>
      <h2>Reactions</h2>
      <p>** <em>Parry</em>**. <em>Trigger</em> : The marilith is hit by a melee attack roll while holding a weapon. <em>Response</em> : The marilith adds 5 to its AC against that attack, possibly causing it to miss.</p>
    senses: Truesight 120 ft., Passive Perception 18
    languages:
    - Abyssal; telepathy 120 ft.
  fr:
    name: Marilith
    subtype: Démon
    description: |-
      <h2>Traits</h2>
      <p>** <em>Réactivité</em>**. La marilith peut jouer une Réaction à chaque tour d'un combat.</p>
      <p><strong><em>Résistance à la magie</em></strong>. La marilith a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.</p>
      <p><strong><em>Restauration démoniaque</em></strong>. Si la marilith meurt hors des Abysses, son corps se dissout en ichor et elle en acquiert aussitôt un nouveau en revenant à la vie avec tous ses pv, quelque part dans les Abysses.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. La marilith effectue six attaques de Lame de pacte et recourt à Constriction.</p>
      <p><strong><em>Lame de pacte</em></strong>. <em>Corps à corps</em> : +10, allonge 1,50 m. <em>Touché</em> : 10 (1d10 + 5) dégâts tranchants plus 7 (2d6) dégâts nécrotiques.</p>
      <p><strong><em>Constriction</em></strong>. <em>JdS Force</em> : DD 17, une créature de taille M ou inférieure que la marilith voit dans un rayon de 1,50 m. <em>Échec</em> : 15 (2d10 + 4) dégâts contondants. La cible subit l'état Agrippé (évasion DD 14), ainsi que l'état Entravé tant qu'elle est agrippée.</p>
      <h2>Actions Bonus</h2>
      <p>** <em>Téléportation (recharge 5–6)</em>**. La marilith se téléporte d'un maximum de 36 m en un espace inoccupé qu'elle voit.</p>
      <h2>Réactions</h2>
      <p>** <em>Parade</em>**. <em>Déclencheur</em> : la marilith est touchée par jet d'attaque de corps à corps alors qu'elle tient une arme. <em>Conséquences</em> : la marilith ajoute 5 à sa CA contre cette attaque, ce qui peut la faire rater.</p>
    senses: vision véritable 36 m, Perception passive 18
    languages:
    - abyssal ; télépathie 36 m
