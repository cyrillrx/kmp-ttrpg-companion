translations:
  en:
    name: Hyena
    subtype: null
    description: |-
      ## Traits

      ***Pack Tactics***. The hyena has Advantage on an attack roll against a creature if at least one of the hyena's allies is within 5 feet of the creature and the ally doesn't have the Incapacitated condition.

      ## Actions

      ***Bite***. *Melee Attack Roll* : +2, reach 5 ft. *Hit* : 3 (1d6) Piercing damage.
    senses: Darkvision 60 ft., Passive Perception 13
    languages:
    - None
  fr:
    name: Hyène
    subtype: null
    description: |-
      ## Traits

      ***Tactique de meute***. Quand au moins un de ses alliés non Incapable d'agir se situe dans un rayon de 1,50 m de la créature qu'elle cible, la hyène a un Avantage au jet d'attaque correspondant.

      ## Actions

      ***Morsure***. *Corps à corps* : +2, allonge 1,50 m. *Touché* : 3 (1d6) dégâts perforants.
    senses: Vision dans le noir 18 m, Perception passive 13
    languages:
    - aucune
