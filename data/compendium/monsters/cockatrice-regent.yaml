translations:
  en:
    name: Cockatrice Regent
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Flyby</em>**. The cockatrice doesn't provoke an Opportunity Attack when it flies out of an enemy's reach.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The cockatrice makes one Petrifying Bite attack and two Talons attacks.</p>
      <p><strong><em>Petrifying Bite</em></strong>. <em>Melee Attack Roll</em> : +7, reach 5 ft. <em>Hit</em> : 13 (2d8 + 4) Piercing damage. If the target is a creature, it is subjected to the following effect. <em>Constitution Saving Throw</em> : DC 14. <em>First Failure</em> : The target has the Restrained condition and repeats the save at the end of its next turn if it is still Restrained, ending the effect on itself on a success. <em>Second Failure</em> : The target has the Petrified condition instead of the Restrained condition.</p>
      <p><strong><em>Talons</em></strong>. <em>Melee Attack Roll</em> : +7, reach 5 ft. <em>Hit</em> : 18 (4d6 + 4) Slashing damage.</p>
      <h2>Reactions</h2>
      <p>** <em>Magical Backlash</em>**. <em>Trigger</em> : A creature within 120 feet of the cockatrice deals damage to it. Response— <em>Dexterity Saving Throw</em> : DC 14, the triggering creature. <em>Failure</em> : 13 (3d6 + 3) Force damage.</p>
    senses: Darkvision 120 ft., Passive Perception 13
    languages: []
