translations:
  en:
    name: Unicorn
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Legendary Resistance (3/Day)</em>**. If the unicorn fails a saving throw, it can choose to succeed instead.</p>
      <p><strong><em>Magic Resistance</em></strong>. The unicorn has Advantage on saving throws against spells and other magical effects.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The unicorn makes one Hooves attack and one Radiant Horn attack.</p>
      <p><strong><em>Hooves</em></strong>. <em>Melee Attack Roll</em> : +7, reach 5 ft. <em>Hit</em> : 11 (2d6 + 4) Bludgeoning damage.</p>
      <p><strong><em>Radiant Horn</em></strong>. <em>Melee Attack Roll</em> : +7, reach 5 ft. <em>Hit</em> : 9 (1d10 + 4) Radiant damage.</p>
      <p><strong><em>Spellcasting</em></strong>. The unicorn casts one of the following spells, requiring no spell components and using Charisma as the spellcasting ability (spell save DC 14):</p>
      <p>At Will: <em><a href="https://www.aidedd.org/spell/detect-evil-and-good">Detect Evil and Good</a>, <a href="https://www.aidedd.org/spell/druidcraft">Druidcraft</a></em><br />
      1/Day Each: <em><a href="https://www.aidedd.org/spell/calm-emotions">Calm Emotions</a>, <a href="https://www.aidedd.org/spell/dispel-evil-and-good">Dispel Evil and Good</a>, <a href="https://www.aidedd.org/spell/entangled">Entangle</a>, <a href="https://www.aidedd.org/spell/pass-without-trace">Pass without Trace</a>, <a href="https://www.aidedd.org/spell/word-of-recall">Word of Recall</a></em>  </p>
      <h2>Bonus actions</h2>
      <p>** <em>Unicorn's Blessing (3/Day)</em>**. The unicorn touches another creature with its horn and casts <em><a href="https://www.aidedd.org/spell/cure-wounds">Cure Wounds</a></em> or <em><a href="https://www.aidedd.org/spell/lesser-restoration">Lesser Restoration</a></em> on that creature, using the same spellcasting ability as Spellcasting.</p>
      <h2>Legendary actions</h2>
      <p>Legendary Action Uses: 3. Immediately after another creature's turn, the unicorn can expend a use to take one of the following actions. The unicorn regains all expended uses at the start of each of its turns. </p>
      <p><strong><em>Charging Horn</em></strong>. The unicorn moves up to half its Speed without provoking Opportunity Attacks, and it makes one Radiant Horn attack.</p>
      <p><strong><em>Shimmering Shield</em></strong>. The unicorn targets itself or one creature it can see within 60 feet of itself. The target gains 10 (3d6) Temporary Hit Points, and its AC increases by 2 until the end of the unicorn's next turn. The unicorn can't take this action again until the start of its next turn.</p>
    senses: Darkvision 60 ft., Passive Perception 13
    languages:
    - Celestial
    - Elvish
    - Sylvan; telepathy 120 ft.
  fr:
    name: Licorne
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Résistance à la magie</em>**. La licorne a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.</p>
      <p><strong><em>Résistance légendaire (3/jour)</em></strong>. Si la licorne rate un jet de sauvegarde, elle peut décider de le réussir tout de même.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. La licorne effectue une attaque de Corne radiante et une de Sabots.</p>
      <p><strong><em>Corne radiante</em></strong>. <em>Corps à corps</em> : +7, allonge 1,50 m. <em>Touché</em> : 9 (1d10 + 4) dégâts radiants.</p>
      <p><strong><em>Sabots</em></strong>. <em>Corps à corps</em> : +7, allonge 1,50 m. <em>Touché</em> : 11 (2d6 + 4) dégâts contondants.</p>
      <p><strong><em>Incantation</em></strong>. La licorne lance l'un des sorts suivants, sans composantes de sort, le Charisme étant sa caractéristique d'incantation (DD de sauvegarde 14) :</p>
      <p>À volonté : <em><a href="https://www.aidedd.org/spell/fr/detection-du-mal-et-du-bien">détection du mal et du bien</a>, <a href="https://www.aidedd.org/spell/fr/druidisme">druidisme</a></em><br />
      1/jour chacun : <em>apaisement des émotions,<a href="https://www.aidedd.org/spell/fr/dissipation-du-mal-et-du-bien">dissipation du mal et du bien</a>, <a href="https://www.aidedd.org/spell/fr/enchevetrement">enchevêtrement</a>, mot de retour, <a href="https://www.aidedd.org/spell/fr/passage-sans-trace">passage sans trace</a></em>  </p>
      <h2>Actions Bonus</h2>
      <p>** <em>Faveur de la licorne (3/jour)</em>**. La licorne touche physiquement une autre créature avec sa corne et lance <em>restauration partielle</em> ou <em>soins</em> sur cette créature, avec la même caractéristique d'incantation que pour Incantation.</p>
      <h2>Actions Légendaires</h2>
      <p>Utilisations d'action Légendaire : 3. Aussitôt après le tour d'une autre créature, la licorne peut dépenser une utilisation pour entreprendre l'une des actions ci-après. La licorne récupère toutes ses utilisations dépensées au début de chacun de ses tours. </p>
      <p><strong><em>Corne la première</em></strong>. La licorne se déplace à concurrence de la moitié de sa Vitesse sans provoquer d'attaque d'Opportunité, et elle effectue une attaque de Corne radiante.</p>
      <p><strong><em>Pavois chatoyant</em></strong>. La licorne cible une créature qu'elle voit dans un rayon de 18 m (ou bien elle-même). La cible reçoit 10 (3d6) points de vie temporaires et sa CA augmente de 2 jusqu'à la fin du tour suivant de la licorne. La licorne ne peut alors plus entreprendre cette action jusqu'au début de son tour suivant.</p>
    senses: Vision dans le noir 18 m, Perception passive 13
    languages:
    - céleste
    - elfe
    - sylvestre ; télépathie 36 m
