translations:
  en:
    name: Blue Dragon Wyrmling
    subtype: Chromatic
    description: '## Actions


      ***Multiattack***. The dragon makes two Rend attacks.


      ***Rend***. *Melee Attack Roll* : +5, reach 5 ft. *Hit* : 8 (1d10 + 3) Slashing
      damage plus 3 (1d6) Lightning damage.


      ***Lightning Breath (Recharge 5–6)***. *Dexterity Saving Throw* : DC 12, each
      creature in a 30-foot-long, 5-foot-wide Line. *Failure* : 21 (6d6) Lightning
      damage. *Success* : Half damage.'
    senses: Blindsight 10 ft., Darkvision 60 ft., Passive Perception 14
    languages:
    - Draconic
  fr:
    name: Dragon bleu, dragonnet
    subtype: Chromatique
    description: '## Actions


      ***Attaques multiples***. Le dragon effectue deux attaques de Saignée.


      ***Saignée***. *Corps à corps* : +5, allonge 1,50 m. *Touché* : 8 (1d10 + 3)
      dégâts tranchants plus 3 (1d6) dégâts de foudre.


      ***Souffle de foudre (recharge 5–6)***. *JdS Dextérité* : DD 12, chaque créature
      dans une Ligne de 9 m de long sur 1,50 m de large. *Échec* : 21 (6d6) dégâts
      de foudre. *Réussite* : demi-dégâts.'
    senses: Vision aveugle 3 m, Vision dans le noir 18 m, Perception passive 14
    languages:
    - draconique
