translations:
  en:
    name: Dust Mephit
    subtype: null
    description: |-
      ## Traits

      ***Death Burst***. The mephit explodes when it dies. *Dexterity Saving Throw* : DC 10, each creature in a 5-foot Emanation originating from the mephit. *Failure* : 5 (2d4) Bludgeoning damage. *Success* : Half damage.

      ## Actions

      ***Claw***. *Melee Attack Roll* : +4, reach 5 ft. *Hit* : 4 (1d4 + 2) Slashing damage.

      ***Blinding Breath (Recharge 6)***. *Dexterity Saving Throw* : DC 10, each creature in a 15-foot Cone. *Failure* : The target has the Blinded condition until the end of the mephit's next turn.

      ***Sleep (1/Day)***. The mephit casts the *[Sleep](https://www.aidedd.org/spell/sleep)* spell, requiring no spell components and using Charisma as the spellcasting ability (spell save DC 10).
    senses: Darkvision 60 ft., Passive Perception 12
    languages:
    - Primordial (Auran
    - Terran)
  fr:
    name: Méphite poussiéreux
    subtype: null
    description: |-
      ## Traits

      ***Explosion finale***. Le méphite explose quand il meurt. *JdS Dextérité* : DD 10, chaque créature dans une Émanation de 1,50 m centrée sur le méphite. *Échec* : 5 (2d4) dégâts contondants. *Réussite* : demi-dégâts.

      ## Actions

      ***Griffe***. *Corps à corps* : +4, allonge 1,50 m. *Touché* : 4 (1d4 + 2) dégâts tranchants.

      ***Sommeil (1/jour)***. Le méphite lance *sommeil* sans composantes de sort, le Charisme étant sa caractéristique d'incantation (DD de sauvegarde 10).

      ***Souffle aveuglant (recharge 6)***. *JdS Dextérité* : DD 10, chaque créature dans un Cône de 4,50 m. *Échec* : la cible subit l'état Aveuglé jusqu'à la fin du tour suivant du méphite.
    senses: Vision dans le noir 18 m, Perception passive 12
    languages:
    - primordial (aérien
    - terreux)
