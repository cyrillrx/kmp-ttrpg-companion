translations:
  en:
    name: Dust Mephit
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Death Burst</em>**. The mephit explodes when it dies. <em>Dexterity Saving Throw</em> : DC 10, each creature in a 5-foot Emanation originating from the mephit. <em>Failure</em> : 5 (2d4) Bludgeoning damage. <em>Success</em> : Half damage.</p>
      <h2>Actions</h2>
      <p>** <em>Claw</em>**. <em>Melee Attack Roll</em> : +4, reach 5 ft. <em>Hit</em> : 4 (1d4 + 2) Slashing damage.</p>
      <p><strong><em>Blinding Breath (Recharge 6)</em></strong>. <em>Dexterity Saving Throw</em> : DC 10, each creature in a 15-foot Cone. <em>Failure</em> : The target has the Blinded condition until the end of the mephit's next turn.</p>
      <p><strong><em>Sleep (1/Day)</em></strong>. The mephit casts the <em><a href="https://www.aidedd.org/spell/sleep">Sleep</a></em> spell, requiring no spell components and using Charisma as the spellcasting ability (spell save DC 10).</p>
    senses: Darkvision 60 ft., Passive Perception 12
    languages:
    - Primordial (Auran
    - Terran)
  fr:
    name: Méphite poussiéreux
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Explosion finale</em>**. Le méphite explose quand il meurt. <em>JdS Dextérité</em> : DD 10, chaque créature dans une Émanation de 1,50 m centrée sur le méphite. <em>Échec</em> : 5 (2d4) dégâts contondants. <em>Réussite</em> : demi-dégâts.</p>
      <h2>Actions</h2>
      <p>** <em>Griffe</em>**. <em>Corps à corps</em> : +4, allonge 1,50 m. <em>Touché</em> : 4 (1d4 + 2) dégâts tranchants.</p>
      <p><strong><em>Sommeil (1/jour)</em></strong>. Le méphite lance <em>sommeil</em> sans composantes de sort, le Charisme étant sa caractéristique d'incantation (DD de sauvegarde 10).</p>
      <p><strong><em>Souffle aveuglant (recharge 6)</em></strong>. <em>JdS Dextérité</em> : DD 10, chaque créature dans un Cône de 4,50 m. <em>Échec</em> : la cible subit l'état Aveuglé jusqu'à la fin du tour suivant du méphite.</p>
    senses: Vision dans le noir 18 m, Perception passive 12
    languages:
    - primordial (aérien
    - terreux)
