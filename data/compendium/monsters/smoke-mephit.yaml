translations:
  en:
    name: Smoke Mephit
    subtype: null
    description: |-
      ## Traits

      ***Death Burst***. The mephit explodes when it dies. *Constitution Saving Throw* : DC 11, each creature in a 5-foot Emanation originating from the mephit. *Failure* : The target has the Poisoned condition until the end of its next turn.

      ## Actions

      ***Claw***. *Melee Attack Roll* : +4, reach 5 ft. *Hit* : 4 (1d4 + 2) Slashing damage.

      ***Cinder Breath (Recharge 6)***. *Dexterity Saving Throw* : DC 11, one creature the mephit can see within 15 feet. *Failure* : The target has the Blinded condition until the end of the mephit's next turn.
    senses: Darkvision 60 ft., Passive Perception 12
    languages:
    - Primordial (Auran
    - Ignan)
  fr:
    name: Méphite fumant
    subtype: null
    description: |-
      ## Traits

      ***Explosion finale***. Le méphite explose quand il meurt. *JdS Constitution* : DD 11, chaque créature dans une Émanation de 1,50 m centrée sur le méphite. *Échec* : la cible subit l'état Empoisonné jusqu'à la fin de son prochain tour.

      ## Actions

      ***Griffes***. Griffe. *Corps à corps* : +4, allonge 1,50 m. *Touché* : 4 (1d4 + 2) dégâts tranchants.

      ***Souffle de scories (recharge 6)***. *JdS Dextérité* : DD 11, une créature que le méphite peut voir dans un rayon de 4,50 m. *Échec* : la cible subit l'état Aveuglé jusqu'à la fin du prochain tour du méphite.
    senses: Vision dans le noir 18 m, Perception passive 12
    languages:
    - primordial (aérien
    - igné)
