translations:
  en:
    name: Gray Ooze
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Amorphous</em>**. The ooze can move through a space as narrow as 1 inch without expending extra movement to do so.</p>
      <p><strong><em>Corrosive Form</em></strong>. Nonmagical ammunition is destroyed immediately after hitting the ooze and dealing any damage. Any nonmagical weapon takes a cumulative -1 penalty to attack rolls immediately after dealing damage to the ooze and coming into contact with it. The weapon is destroyed if the penalty reaches -5. The penalty can be removed by casting the <em><a href="https://www.aidedd.org/spell/mending">Mending</a></em> spell on the weapon. The ooze can eat through 2-inch-thick, nonmagical metal or wood in 1 round.</p>
      <h2>Actions</h2>
      <p>** <em>Pseudopod</em>**. <em>Melee Attack Roll</em> : +3, reach 5 ft. <em>Hit</em> : 10 (2d8 + 1) Acid damage. Nonmagical armor worn by the target takes a -1 penalty to the AC it offers. The armor is destroyed if the penalty reduces its AC to 10. The penalty can be removed by casting the <em><a href="https://www.aidedd.org/spell/mending">Mending</a></em> spell on the armor.</p>
    senses: Blindsight 60 ft., Passive Perception 8
    languages:
    - None
  fr:
    name: Vase grise
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Informe</em>**. La vase peut se déplacer dans un espace étroit d'une largeur minimale de 2,50 cm sans dépense supplémentaire en déplacement.</p>
      <p><strong><em>Masse corrosive</em></strong>. Les projectiles non magiques sont détruits dès qu'ils ont touché la vase et infligé le moindre dégât. Toute arme non magique qui inflige des dégâts à la vase en la touchant physiquement subit aussitôt un malus cumulatif de –1 aux jets d'attaque. L'arme est détruite si ce malus atteint –5. On peut annuler ce malus en lançant le sort <em>réparation</em> sur l'arme. La vase ronge le métal et le bois non magiques à raison de 5 cm d'épaisseur par round.</p>
      <h2>Actions</h2>
      <p>** <em>Pseudopode</em>**. <em>Corps à corps</em> : +3, allonge 1,50 m. <em>Touché</em> : 10 (2d8 + 1) dégâts d'acide. Toute armure non magique portée par la cible subit un malus cumulatif de –1 à la CA qu'elle confère. L'armure est détruite si ce malus réduit sa CA à 10. On peut annuler ce malus en lançant le sort <em>réparation</em> sur l'armure.</p>
    senses: Vision aveugle 18 m, Perception passive 8
    languages:
    - aucune
