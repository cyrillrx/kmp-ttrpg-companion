translations:
  en:
    name: Psychic Gray Ooze
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Amorphous</em>**. The ooze can move through a space as narrow as 1 inch without expending extra movement to do so.</p>
      <h2>Actions</h2>
      <p>** <em>Pseudopod</em>**. <em>Melee Attack Roll</em> : +3, reach 5 ft. <em>Hit</em> : 11 (3d6 + 1) Acid damage, and the target has Disadvantage on Intelligence saving throws until the end of the ooze's next turn.</p>
      <p><strong><em>Psychic Crush</em></strong>. <em>Intelligence Saving Throw</em> : DC 10, one creature the ooze can see within 60 feet. <em>Failure</em> : 13 (3d8) Psychic damage.</p>
      <h2>Reactions</h2>
      <p>** <em>Mind Corrosion</em>**. <em>Trigger</em> : The ooze fails a saving throw against a spell or another magical effect created by a creature. <em>Response</em> : The triggering creature takes 3 (1d6) Psychic damage.</p>
    senses: Blindsight 60 ft., Passive Perception 8
    languages: []
