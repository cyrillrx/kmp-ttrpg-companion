translations:
  en:
    name: Psychic Gray Ooze
    subtype: null
    description: |-
      ## Traits

      ***Amorphous***. The ooze can move through a space as narrow as 1 inch without expending extra movement to do so.

      ## Actions

      ***Pseudopod***. *Melee Attack Roll* : +3, reach 5 ft. *Hit* : 11 (3d6 + 1) Acid damage, and the target has Disadvantage on Intelligence saving throws until the end of the ooze's next turn.

      ***Psychic Crush***. *Intelligence Saving Throw* : DC 10, one creature the ooze can see within 60 feet. *Failure* : 13 (3d8) Psychic damage.

      ## Reactions

      ***Mind Corrosion***. *Trigger* : The ooze fails a saving throw against a spell or another magical effect created by a creature. *Response* : The triggering creature takes 3 (1d6) Psychic damage.
    senses: Blindsight 60 ft., Passive Perception 8
    languages: []
