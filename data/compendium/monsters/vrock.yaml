translations:
  en:
    name: Vrock
    subtype: Demon
    description: |-
      <h2>Traits</h2>
      <p>** <em>Demonic Restoration</em>**. If the vrock dies outside the Abyss, its body dissolves into ichor, and it gains a new body instantly, reviving with all its Hit Points somewhere in the Abyss.</p>
      <p><strong><em>Magic Resistance</em></strong>. The vrock has Advantage on saving throws against spells and other magical effects.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The vrock makes two Shred attacks.</p>
      <p><strong><em>Shred</em></strong>. <em>Melee Attack Roll</em> : +6, reach 5 ft. <em>Hit</em> : 10 (2d6 + 3) Piercing damage plus 10 (3d6) Poison damage.</p>
      <p><strong><em>Spores (Recharge 6)</em></strong>. <em>Constitution Saving Throw</em> : DC 15, each creature in a 20-foot Emanation originating from the vrock. <em>Failure</em> : The target has the Poisoned condition and repeats the save at the end of each of its turns, ending the effect on itself on a success. While Poisoned, the target takes 5 (1d10) Poison damage at the start of each of its turns. Emptying a flask of Holy Water on the target ends the effect early.</p>
      <p><strong><em>Stunning Screech (1/Day)</em></strong>. <em>Constitution Saving Throw</em> : DC 15, each creature in a 20-foot Emanation originating from the vrock (demons succeed automatically). <em>Failure</em> : 10 (3d6) Thunder damage, and the target has the Stunned condition until the end of the vrock's next turn.</p>
    senses: Darkvision 120 ft., Passive Perception 11
    languages:
    - Abyssal; telepathy 120 ft.
  fr:
    name: Vrock
    subtype: Démon
    description: |-
      <h2>Traits</h2>
      <p>** <em>Résistance à la magie</em>**. Le vrock a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.</p>
      <p><strong><em>Restauration démoniaque</em></strong>. Si le vrock meurt hors des Abysses, son corps se dissout en ichor et il en acquiert aussitôt un nouveau en revenant à la vie avec tous ses pv, quelque part dans les Abysses.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le vrock effectue deux attaques de Déchiquetage.</p>
      <p><strong><em>Déchiquetage</em></strong>. <em>Corps à corps</em> : +6, allonge 1,50 m. <em>Touché</em> : 10 (2d6 + 3) dégâts perforants plus 10 (3d6) dégâts de poison.</p>
      <p><strong><em>Piaillement étourdissant (1/jour)</em></strong>. <em>JdS Constitution</em> : DD 15, chaque créature dans une Émanation de 6 m centrée sur le vrock (les démons réussissent automatiquement). <em>Échec</em> : 10 (3d6) dégâts de tonnerre, et la cible subit l'état Étourdi jusqu'à la fin du tour suivant du vrock.</p>
      <p><strong><em>Spores (recharge 6)</em></strong>. <em>JdS Constitution</em> : DD 15, chaque créature dans une Émanation de 6 m centrée sur le vrock. <em>Échec</em> : la cible subit l'état Empoisonné et réitère le JdS à la fin de chacun de ses tours ; elle met un terme à l'effet sur elle-même en cas de réussite. Ainsi Empoisonnée, une cible subit 5 (1d10) dégâts de poison au début de chacun de ses tours. Vider une flasque d'eau bénite sur la cible met prématurément fin à l'effet.</p>
    senses: Vision dans le noir 36 m, Perception passive 11
    languages:
    - abyssal ; télépathie 36 m
