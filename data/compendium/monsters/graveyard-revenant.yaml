translations:
  en:
    name: Graveyard Revenant
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Undead Restoration</em>**. If the revenant dies, it revives 24 hours later unless <em><a href="https://www.aidedd.org/spell/dispel-evil-and-good">Dispel Evil and Good</a></em> is cast on its remains. If it revives, it animates another group of corpses elsewhere on the same plane of existence; it now looks different but uses the same stat block and returns with all its Hit Points.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The revenant makes two Suffocate attacks.</p>
      <p><strong><em>Suffocate</em></strong>. <em>Melee Attack Roll</em> : +8, reach 10 ft. <em>Hit</em> : 10 (1d10 + 5) Bludgeoning damage plus 10 (3d6) Necrotic damage. If the target is a Large or smaller creature, it has the Grappled condition (escape DC 15). Until the grapple ends, the target is suffocating. The revenant can have up to two targets Grappled in this way at a time.</p>
      <p><strong><em>Haunting Glare (Recharge 5–6)</em></strong>. <em>Wisdom Saving Throw</em> : DC 15, each creature in a 30-foot Emanation originating from the revenant. <em>Failure</em> : The target has the Paralyzed condition and repeats the save at the end of each of its turns, ending the effect on itself on a success. After 1 minute, it succeeds automatically.</p>
    senses: Darkvision 120 ft., Passive Perception 13
    languages:
    - Common plus two other languages
  fr:
    name: Revenant, charnier
    subtype: null
    description: |-
