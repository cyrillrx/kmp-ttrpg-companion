translations:
  en:
    name: Ghoul
    subtype: null
    description: |-
      ## Actions

      ***Multiattack***. The ghoul makes two Bite attacks.

      ***Bite***. *Melee Attack Roll* : +4, reach 5 ft. *Hit* : 5 (1d6 + 2) Piercing damage plus 3 (1d6) Necrotic damage.

      ***Claw***. *Melee Attack Roll* : +4, reach 5 ft. *Hit* : 4 (1d4 + 2) Slashing damage. If the target is a creature that isn't an Undead or elf, it is subjected to the following effect. *Constitution Saving Throw* : DC 10. *Failure* : The target has the Paralyzed condition until the end of its next turn.
    senses: Darkvision 60 ft., Passive Perception 10
    languages:
    - Common
  fr:
    name: Goule
    subtype: null
    description: |-
      ## Actions

      ***Attaques multiples***. La goule effectue deux attaques de Morsure.

      ***Griffe***. *Corps à corps* : +4, allonge 1,50 m. *Touché* : 4 (1d4 + 2) dégâts tranchants. Si la cible est une créature qui n'est ni un Mort-vivant ni un elfe, elle est soumise à l'effet suivant. *JdS Constitution* : DD 10. *Échec* : la cible subit l'état Paralysé jusqu'à la fin de son tour suivant.

      ***Morsure***. *Corps à corps* : +4, allonge 1,50 m. *Touché* : 5 (1d6 + 2) dégâts perforants plus 3 (1d6) dégâts nécrotiques.
    senses: Vision dans le noir 18 m, Perception passive 10
    languages:
    - commun
