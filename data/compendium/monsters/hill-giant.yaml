translations:
  en:
    name: Hill Giant
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The giant makes two attacks, using Tree Club or Trash Lob in any combination.</p>
      <p><strong><em>Tree Club</em></strong>. <em>Melee Attack Roll</em> : +8, reach 10 ft. <em>Hit</em> : 18 (3d8 + 5) Bludgeoning damage. If the target is a Large or smaller creature, it has the Prone condition.</p>
      <p><strong><em>Trash Lob</em></strong>. <em>Ranged Attack Roll</em> : +8, range 60/240 ft. <em>Hit</em> : 16 (2d10 + 5) Bludgeoning damage, and the target has the Poisoned condition until the end of its next turn.</p>
    senses: Passive Perception 12
    languages:
    - Giant
  fr:
    name: Géant des collines
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le géant effectue deux attaques, réparties à sa guise entre Arbre-massue et Lancer de détritus.</p>
      <p><strong><em>Arbre-massue</em></strong>. <em>Corps à corps</em> : +8, allonge 3 m. <em>Touché</em> : 18 (3d8 + 5) dégâts contondants. Si la cible est une créature de taille G ou inférieure, elle subit l'état À terre.</p>
      <p><strong><em>Lancer de détritus</em></strong>. <em>À distance</em> : +8, portée 18/72 m. <em>Touché</em> : 16 (2d10 + 5) dégâts contondants, et la cible subit l'état Empoisonné jusqu'à la fin de son tour suivant.</p>
    senses: Perception passive 12
    languages:
    - géant
