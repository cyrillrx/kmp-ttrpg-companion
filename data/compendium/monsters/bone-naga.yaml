translations:
  en:
    name: Bone Naga
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The naga makes two Bite attacks. It can replace any attack with a use of Serpentine Gaze.</p>
      <p><strong><em>Bite</em></strong>. <em>Melee Attack Roll</em> : +5, reach 10 ft. <em>Hit</em> : 10 (2d6 + 3) Piercing damage plus 7 (2d6) Necrotic damage.</p>
      <p><strong><em>Serpentine Gaze</em></strong>. <em>Wisdom Saving Throw</em> : DC 13, one creature the naga can see within 60 feet. <em>Failure</em> : 13 (3d6 + 3) Psychic damage, and the target has the Charmed condition until the start of the naga's next turn.</p>
      <p><strong><em>Spellcasting</em></strong>. The naga casts one of the following spells, requiring no Material components and using Intelligence as the spellcasting ability (spell save DC 13):</p>
      <p>At will: <em><a href="https://www.aidedd.org/spell/mage-hand">Mage Hand</a>, <a href="https://www.aidedd.org/spell/thaumaturgy">Thaumaturgy</a></em><br />
      1/day each: <em><a href="https://www.aidedd.org/spell/command">Command</a>, <a href="https://www.aidedd.org/spell/detect-thoughts">Detect Thoughts</a>, <a href="https://www.aidedd.org/spell/lightning-bolt">Lightning Bolt</a></em></p>
    senses: Darkvision 60 ft., Passive Perception 12
    languages:
    - Common plus one other language
  fr:
    name: Naga osseux
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le naga effectue deux attaques de Morsure. Il peut remplacer n'importe quelle attaque par une utilisation de Regard ophidien.</p>
      <p><strong><em>Morsure</em></strong>. <em>Corps à corps</em> : +5, allonge 3 m. <em>Touché</em> : 10 (2d6 + 3) dégâts perforants plus 7 (2d6) dégâts nécrotiques.</p>
      <p><strong><em>Regard ophidien</em></strong>. <em>JdS Sagesse</em> : DD 13, une créature que le naga peut voir dans un rayon de 18 m. <em>Échec</em> : 13 (3d6 + 3) dégâts psychiques, et la cible subit l'état Charmé jusqu'au début du prochain tour du naga.</p>
      <p><strong><em>Incantation</em></strong>. Le naga lance l'un des sorts suivants sans composantes matérielles, l'Intelligence étant sa caractéristique d'incantation (DD de sauvegarde 13) :</p>
      <p>À volonté : <em><a href="https://www.aidedd.org/spell/fr/main-de-mage">main de mage</a>, <a href="https://www.aidedd.org/spell/fr/thaumaturgie">thaumaturgie</a></em><br />
      1/jour chacun : <em><a href="https://www.aidedd.org/spell/fr/injonction&quot;">injonction</a>, <a href="https://www.aidedd.org/spell/fr/detection-des-pensees">détection des pensées</a>, <a href="https://www.aidedd.org/spell/fr/eclair">éclair</a></em></p>
    senses: Vision dans le noir 18 m, Perception passive 12
    languages:
    - commun plus une autre langue
