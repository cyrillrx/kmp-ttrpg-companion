translations:
  en:
    name: Bone Naga
    subtype: null
    description: '## Actions


      ***Multiattack***. The naga makes two Bite attacks. It can replace any attack
      with a use of Serpentine Gaze.


      ***Bite***. *Melee Attack Roll* : +5, reach 10 ft. *Hit* : 10 (2d6 + 3) Piercing
      damage plus 7 (2d6) Necrotic damage.


      ***Serpentine Gaze***. *Wisdom Saving Throw* : DC 13, one creature the naga
      can see within 60 feet. *Failure* : 13 (3d6 + 3) Psychic damage, and the target
      has the Charmed condition until the start of the naga''s next turn.


      ***Spellcasting***. The naga casts one of the following spells, requiring no
      Material components and using Intelligence as the spellcasting ability (spell
      save DC 13):


      At will: *[Mage Hand](https://www.aidedd.org/spell/mage-hand), [Thaumaturgy](https://www.aidedd.org/spell/thaumaturgy)*


      1/day each: *[Command](https://www.aidedd.org/spell/command), [Detect Thoughts](https://www.aidedd.org/spell/detect-thoughts),
      [Lightning Bolt](https://www.aidedd.org/spell/lightning-bolt)*'
    senses: Darkvision 60 ft., Passive Perception 12
    languages:
    - Common plus one other language
  fr:
    name: Naga osseux
    subtype: null
    description: '## Actions


      ***Attaques multiples***. Le naga effectue deux attaques de Morsure. Il peut
      remplacer n''importe quelle attaque par une utilisation de Regard ophidien.


      ***Morsure***. *Corps à corps* : +5, allonge 3 m. *Touché* : 10 (2d6 + 3) dégâts
      perforants plus 7 (2d6) dégâts nécrotiques.


      ***Regard ophidien***. *JdS Sagesse* : DD 13, une créature que le naga peut
      voir dans un rayon de 18 m. *Échec* : 13 (3d6 + 3) dégâts psychiques, et la
      cible subit l''état Charmé jusqu''au début du prochain tour du naga.


      ***Incantation***. Le naga lance l''un des sorts suivants sans composantes matérielles,
      l''Intelligence étant sa caractéristique d''incantation (DD de sauvegarde 13)
      :


      À volonté : *[main de mage](https://www.aidedd.org/spell/fr/main-de-mage), [thaumaturgie](https://www.aidedd.org/spell/fr/thaumaturgie)*


      1/jour chacun : *[injonction](https://www.aidedd.org/spell/fr/injonction"),
      [détection des pensées](https://www.aidedd.org/spell/fr/detection-des-pensees),
      [éclair](https://www.aidedd.org/spell/fr/eclair)*'
    senses: Vision dans le noir 18 m, Perception passive 12
    languages:
    - commun plus une autre langue
