translations:
  en:
    name: Bandit Crime Lord
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Evasion</em>**. If the bandit is subjected to an effect that allows it to make a Dexterity saving throw to take only half damage, the bandit instead takes no damage if it succeeds on the save and only half damage if it fails. It can't use this trait if it has the Incapacitated condition.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The bandit makes three attacks, using Scimitar or Pistol in any combination.</p>
      <p><strong><em>Scimitar</em></strong>. <em>Melee Attack Roll</em> : +9, reach 5 ft. <em>Hit</em> : 12 (2d6 + 5) Slashing damage plus 14 (4d6) Poison damage.</p>
      <p><strong><em>Pistol</em></strong>. <em>Ranged Attack Roll</em> : +9, range 30/90 ft. <em>Hit</em> : 10 (1d10 + 5) Piercing damage plus 14 (4d6) Poison damage.</p>
      <h2>Bonus actions</h2>
      <p>** <em>Deadly Aim</em>**. The bandit gives itself Advantage on the next attack roll it makes during the current turn. If that attack hits, the target takes an extra 28 (8d6) Poison damage.</p>
    senses: Passive Perception 20
    languages:
    - Common
    - Thieves' Cant
  fr:
    name: Bandit, baron du crime
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Esquive totale</em>**. Si le bandit est soumis à un effet qui lui permet d'effectuer un jet de sauvegarde de Dextérité pour réduire les dégâts de moitié, il ne subit en fait aucun dégât en cas de JdS réussi, et seulement la moitié en cas d'échec. Il ne peut pas recourir à ce trait s'il subit l'état Incapable d'agir.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le bandit effectue trois attaques, réparties à sa guise entre Cimeterre et Pistolet.</p>
      <p><strong><em>Cimeterre</em></strong>. <em>Corps à corps</em> : +9, allonge 1,50 m. <em>Touché</em> : 12 (2d6 + 5) dégâts tranchants plus 14 (4d6) dégâts de poison.</p>
      <p><strong><em>Pistolet</em></strong>. <em>À distance</em> : +9, portée 9/27 m. <em>Touché</em> : 10 (1d10 + 5) dégâts perforants plus 14 (4d6) dégâts de poison.</p>
      <h2>Actions Bonus</h2>
      <p>** <em>Visée meurtrière</em>**. Le bandit s'octroie un Avantage sur son prochain jet d'attaque durant son tour. Si l'attaque réussit, la cible subit 28 (8d6) dégâts de poison supplémentaires.</p>
    senses: Perception passive 20
    languages:
    - commun
    - jargon des voleurs
