translations:
  en:
    name: Beast of the Land
    subtype: null
    description: '## Traits


      ***Primal Bond***. Add your Proficiency Bonus to any ability check or saving
      throw the beast makes.


      ## Actions


      ***Beast''s Strike***. *Melee Attack Roll* : Bonus equals your spell attack
      modifier, reach 5 ft. *Hit* : 1d8 + 2 plus your Wisdom modifier Bludgeoning,
      Piercing, or Slashing damage (your choice when you summon the beast). If the
      beast moved at least 20 feet straight toward the target before the hit, the
      target takes an extra 1d6 damage of the same type, and the target has the Prone
      condition if it is a Large or smaller creature.'
    senses: Darkvision 60 ft., Passive Perception 12
    languages:
    - Understands the languages you know
  fr:
    name: Bête des terres
    subtype: null
    description: '## Traits


      ***Lien primordial***. Ajoutez votre bonus de maîtrise à tout jet de caractéristique
      ou de sauvegarde effectué par la bête.


      ## Actions


      ***Frappe de la Bête***. *Corps à corps* : bonus égal à votre modificateur d''attaque
      des sorts, allonge 1,50 m. *Touché* : 1d8 + 2 + votre modificateur de Sagesse
      dégâts contondants, perforants ou tranchants (à votre choix lorsque vous invoquez
      la bête). Si la bête s''est déplacée d''au moins 6 m en ligne droite vers la
      cible avant de la toucher, la cible subit 1d6 dégâts supplémentaires du même
      type et l''état À terre si elle est de taille G ou inférieure.'
    senses: Vision dans le noir 18 m, Perception passive 12
    languages:
    - comprend les langues que vous parlez
