translations:
  en:
    name: Sahuagin Warrior
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Blood Frenzy</em>**. The sahuagin has Advantage on attack rolls against any creature that doesn't have all its Hit Points.</p>
      <p><strong><em>Limited Amphibiousness</em></strong>. The sahuagin can breathe air and water, but it must be submerged at least once every 4 hours to avoid suffocating outside water.</p>
      <p><strong><em>Shark Telepathy</em></strong>. The sahuagin can magically control sharks within 120 feet of itself, using a special telepathy.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The sahuagin makes two Claw attacks.</p>
      <p><strong><em>Claw</em></strong>. <em>Melee Attack Roll</em> : +3, reach 5 ft. <em>Hit</em> : 4 (1d6 + 1) Slashing damage.</p>
      <h2>Bonus actions</h2>
      <p>** <em>Aquatic Charge</em>**. The sahuagin swims up to its Swim Speed straight toward an enemy it can see.</p>
    senses: Darkvision 120 ft., Passive Perception 15
    languages:
    - Sahuagin
  fr:
    name: Sahuagin, combattant
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Amphibiose partielle</em>**. Le sahuagin peut respirer aussi bien sous l'eau qu'à l'air libre, mais il doit s'immerger dans l'eau au moins une fois toutes les 4 heures sous peine de s'asphyxier.</p>
      <p><strong><em>Frénésie sanguinaire</em></strong>. Le sahuagin a un Avantage aux jets d'attaque contre toute créature à laquelle il manque des points de vie.</p>
      <p><strong><em>Télépathie avec les requins</em></strong>. Le sahuagin peut contrôler magiquement les requins dans un rayon de 36 m, par le biais d'une télépathie spéciale.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le sahuagin effectue deux attaques de Griffe.</p>
      <p><strong><em>Griffe</em></strong>. <em>Corps à corps</em> : +3, allonge 1,50 m. <em>Touché</em> : 4 (1d6 + 1) dégâts tranchants.</p>
      <h2>Actions Bonus</h2>
      <p>** <em>Charge aquatique</em>**. Le sahuagin se déplace en ligne droite dans les limites de sa Vitesse de nage vers un ennemi qu'il voit.</p>
    senses: Vision dans le noir 36 m, Perception passive 15
    languages:
    - sahuagin
