translations:
  en:
    name: Satyr
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Magic Resistance</em>**. The satyr has Advantage on saving throws against spells and other magical effects.</p>
      <h2>Actions</h2>
      <p>** <em>Hooves</em>**. <em>Melee Attack Roll</em> : +5, reach 5 ft. <em>Hit</em> : 5 (1d4 + 3) Bludgeoning damage. If the target is a Medium or smaller creature, the satyr pushes the target up to 10 feet straight away from itself.</p>
      <p><strong><em>Mockery</em></strong>. <em>Wisdom Saving Throw</em> : DC 12, one creature the satyr can see within 90 feet. <em>Failure</em> : 5 (1d6 + 2) Psychic damage.</p>
    senses: Passive Perception 12
    languages:
    - Common
    - Elvish
    - Sylvan
  fr:
    name: Satyre
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Résistance à la magie</em>**. Le satyre a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.</p>
      <h2>Actions</h2>
      <p>** <em>Sabots</em>**. <em>Corps à corps</em> : +5, allonge 1,50 m. <em>Touché</em> : 5 (1d4 + 3) dégâts contondants. Si la cible est une créature de taille M ou inférieure, le satyre la repousse en ligne droite d'un maximum de 3 m.</p>
      <p><strong><em>Moquerie</em></strong>. <em>JdS Sagesse</em> : DD 12, une créature que le satyre voit dans un rayon de 27 m. <em>Échec</em> : 5 (1d6 + 2) dégâts psychiques.</p>
    senses: Perception passive 12
    languages:
    - commun
    - elfe
    - sylvestre
