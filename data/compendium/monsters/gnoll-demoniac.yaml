translations:
  en:
    name: Gnoll Demoniac
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The gnoll makes two Abyssal Strike attacks.</p>
      <p><strong><em>Abyssal Strike</em></strong>. <em>Melee or Ranged Attack Roll</em> : +6, reach 5 ft. or range 60 ft. <em>Hit</em> : 20 (5d6 + 3) Poison damage.</p>
      <p><strong><em>Hunger of Yeenoghu (Recharge 5–6)</em></strong>. The gnoll conjures a 30-foot Cube of magical Darkness originating from a point it can see within 60 feet, which lasts for 1 minute or until the gnoll's Concentration ends on it. This area is Difficult Terrain. <em>Dexterity Saving Throw</em> : DC 14, any creature that starts its turn in this area or enters it for the first time on a turn. <em>Failure</em> : 28 (8d6) Necrotic damage, and the gnoll or a creature of its choice it can see gains 10 Temporary Hit Points. <em>Success</em> : Half damage only.</p>
      <h2>Bonus actions</h2>
      <p>** <em>Rampage (2/Day)</em>**. Immediately after dealing damage to a creature that is already Bloodied, the gnoll moves up to half its Speed, and it makes one Abyssal Strike attack.</p>
    senses: Darkvision 60 ft., Passive Perception 15
    languages:
    - Abyssal
    - Common
    - Gnoll
  fr:
    name: Gnoll, démoniaque
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le gnoll effectue deux attaques de Frappe abyssale.</p>
      <p><strong><em>Frappe abyssale</em></strong>. <em>Corps à corps ou à distance</em> : +6, allonge 1,50 m ou portée 18 m. <em>Touché</em> : 20 (5d6 + 3) dégâts de poison.</p>
      <p><strong><em>Voracité de Yeenoghu (recharge 5–6)</em></strong>. Le gnoll invoque un Cube de Ténèbres magiques de 9 m, centré sur un point qu'il peut voir dans un rayon de 18 m. Ce Cube persiste pendant 1 minute ou jusqu'à ce que la concentration du gnoll prenne fin. Cette zone est un Terrain difficile. <em>JdS Dextérité</em> : DD 14, toute créature commençant son tour dans cette zone ou y entrant pour la première fois. <em>Échec</em> : 28 (8d6) dégâts nécrotiques, et le gnoll ou une créature de son choix qu'il peut voir gagne 10 points de vie temporaires. <em>Réussite</em> : demi-dégâts uniquement.</p>
      <h2>Actions Bonus</h2>
      <p>** <em>Déchaînement (2/jour)</em>**. Immédiatement après avoir infligé des dégâts à une créature déjà En péril, le gnoll se déplace jusqu'à la moitié de sa Vitesse et effectue une attaque de Morsure.</p>
    senses: Vision dans le noir 18 m, Perception passive 15
    languages:
    - abyssal
    - commun
    - gnoll
