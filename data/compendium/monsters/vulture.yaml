  en:
    name: Vulture
    subtype: null
    description: '## Traits


      ***Pack Tactics***. The vulture has Advantage on an attack roll against a creature
      if at least one of the vulture''s allies is within 5 feet of the creature and
      the ally doesn''t have the Incapacitated condition.


      ## Actions


      ***Beak***. *Melee Attack Roll* : +2, reach 5 ft. *Hit* : 2 (1d4) Piercing damage.'
    senses: Passive Perception 13
    languages:
    - None
  fr:
    name: Vautour
    subtype: null
    description: '## Traits


      ***Tactique de meute***. Quand au moins un de ses alliés non Incapable d''agir
      se situe dans un rayon de 1,50 m de la créature qu''il cible, le vautour a un
      Avantage au jet d''attaque correspondant.


      ## Actions


      ***Bec***. *Corps à corps* : +2, allonge 1,50 m. *Touché* : 2 (1d4) dégâts perforants.'
    senses: Perception passive 13
    languages:
    - aucune
