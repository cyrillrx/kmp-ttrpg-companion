    description: |-
      <h2>Actions</h2>
      <p>** <em>Rend</em>**. <em>Melee Attack Roll</em> : +5, reach 5 ft. <em>Hit</em> : 10 (2d6 + 3) Slashing damage. If the target is a Large or smaller creature, it has the Prone condition.</p>
      <h2>Bonus actions</h2>
      <p>** <em>Nimble Escape</em>**. The tiger takes the Disengage or Hide action.</p>
