      <h2>Actions</h2>
      <p>** <em>Saignée</em>**. Jet d'attaque au corps à corps : +5, allonge : 1,50 m. <em>Touché</em> : 10 (2d6 + 3) dégâts tranchants. Si la cible est une créature de taille G ou inférieure, elle subit l'état À terre.</p>
      <h2>Actions Bonus</h2>
      <p>** <em>Fuite agile</em>**. Le tigre prend l'action Désengagement ou Furtivité.</p>
