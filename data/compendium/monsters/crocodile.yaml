translations:
  en:
    name: Crocodile
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Hold Breath</em>**. The crocodile can hold its breath for 1 hour.</p>
      <h2>Actions</h2>
      <p>** <em>Bite</em>**. <em>Melee Attack Roll</em> : +4, reach 5 ft. <em>Hit</em> : 6 (1d8 + 2) Piercing damage. If the target is Medium or smaller, it has the Grappled condition (escape DC 12). While Grappled, the target has the Restrained condition.</p>
    senses: Passive Perception 10
    languages:
    - None
  fr:
    name: Crocodile
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Apnée</em>**. Le crocodile peut retenir son souffle pendant 1 heure.</p>
      <h2>Actions</h2>
      <p>** <em>Morsure</em>**. <em>Corps à corps</em> : +4, allonge 1,50 m. <em>Touché</em> : 6 (1d8 + 2) dégâts perforants. Si la cible est de taille M ou inférieure, elle subit l'état Agrippé (évasion DD 12). Tant qu'elle est agrippée, elle subit l'état Entravé.</p>
    senses: Perception passive 10
    languages:
    - aucune
