translations:
  en:
    name: Octopus
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Compression</em>**. The octopus can move through a space as narrow as 1 inch without spending extra movement to do so.</p>
      <p><strong><em>Water Breathing</em></strong>. The octopus can breathe only underwater.</p>
      <h2>Actions</h2>
      <p>** <em>Tentacles</em>**. <em>Melee Attack Roll</em> : +4, reach 5 ft. <em>Hit</em> : 1 Bludgeoning damage.</p>
      <h2>Reactions</h2>
      <p>** <em>Ink Cloud (1/Day)</em>**. <em>Trigger</em> : A creature ends its turn within 5 feet of the octopus while underwater. <em>Response</em> : The octopus releases ink that fills a 5-foot Cube centered on itself, and the octopus moves up to its Swim Speed. The Cube is Heavily Obscured for 1 minute or until a strong current or similar effect disperses the ink.</p>
    senses: Darkvision 30 ft., Passive Perception 12
    languages:
    - None
  fr:
    name: Pieuvre
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Compression</em>**. La pieuvre peut se déplacer dans un espace étroit d'une largeur minimale de 2,50 cm sans dépense supplémentaire en déplacement.</p>
      <p><strong><em>Respiration aquatique</em></strong>. La pieuvre ne peut respirer que sous l'eau.</p>
      <h2>Actions</h2>
      <p>** <em>Tentacules</em>**. <em>Corps à corps</em> : +4, allonge 1,50 m. <em>Touché</em> : 1 dégât contondant.</p>
      <h2>Réactions</h2>
      <p>** <em>Nuage d'encre (1/jour)</em>**. <em>Déclencheur</em> : une créature termine son tour dans un rayon de 1,50 m de la pieuvre qui est sous l'eau. <em>Conséquences</em> : la pieuvre libère de l'encre sous forme d'un Cube de 1,50 m centré sur elle, et elle se déplace dans les limites de sa Vitesse de nage. Le Cube constitue une zone à Visibilité nulle pendant 1 minute, mais un courant important ou effet comparable disperse l'encre.</p>
    senses: Vision dans le noir 9 m, Perception passive 12
    languages:
    - aucune
