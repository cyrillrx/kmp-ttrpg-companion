translations:
  en:
    name: Octopus
    subtype: null
    description: |-
      ## Traits

      ***Compression***. The octopus can move through a space as narrow as 1 inch without spending extra movement to do so.

      ***Water Breathing***. The octopus can breathe only underwater.

      ## Actions

      ***Tentacles***. *Melee Attack Roll* : +4, reach 5 ft. *Hit* : 1 Bludgeoning damage.

      ## Reactions

      ***Ink Cloud (1/Day)***. *Trigger* : A creature ends its turn within 5 feet of the octopus while underwater. *Response* : The octopus releases ink that fills a 5-foot Cube centered on itself, and the octopus moves up to its Swim Speed. The Cube is Heavily Obscured for 1 minute or until a strong current or similar effect disperses the ink.
    senses: Darkvision 30 ft., Passive Perception 12
    languages:
    - None
  fr:
    name: Pieuvre
    subtype: null
    description: |-
      ## Traits

      ***Compression***. La pieuvre peut se déplacer dans un espace étroit d'une largeur minimale de 2,50 cm sans dépense supplémentaire en déplacement.

      ***Respiration aquatique***. La pieuvre ne peut respirer que sous l'eau.

      ## Actions

      ***Tentacules***. *Corps à corps* : +4, allonge 1,50 m. *Touché* : 1 dégât contondant.

      ## Réactions

      ***Nuage d'encre (1/jour)***. *Déclencheur* : une créature termine son tour dans un rayon de 1,50 m de la pieuvre qui est sous l'eau. *Conséquences* : la pieuvre libère de l'encre sous forme d'un Cube de 1,50 m centré sur elle, et elle se déplace dans les limites de sa Vitesse de nage. Le Cube constitue une zone à Visibilité nulle pendant 1 minute, mais un courant important ou effet comparable disperse l'encre.
    senses: Vision dans le noir 9 m, Perception passive 12
    languages:
    - aucune
