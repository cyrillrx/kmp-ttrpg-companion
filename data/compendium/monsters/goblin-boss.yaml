translations:
  en:
    name: Goblin Boss
    subtype: Goblinoid
    description: |-
      ## Actions

      ***Multiattack***. The goblin makes two attacks, using Scimitar or Shortbow in any combination.

      ***Scimitar***. *Melee Attack Roll* : +4, reach 5 ft. *Hit* : 5 (1d6 + 2) Slashing damage, plus 2 (1d4) Slashing damage if the attack roll had Advantage.

      ***Shortbow***. *Ranged Attack Roll* : +4, range 80/320 ft. *Hit* : 5 (1d6 + 2) Piercing damage, plus 2 (1d4) Piercing damage if the attack roll had Advantage.

      ## Bonus actions

      ***Nimble Escape***. The goblin takes the Disengage or Hide action.

      ## Reactions

      ***Redirect Attack***. *Trigger* : A creature the goblin can see makes an attack roll against it. *Response* : The goblin chooses a Medium or Small ally within 5 feet of itself. The goblin and that ally swap places, and the ally becomes the target of the attack instead.
    senses: Darkvision 60 ft., Passive Perception 9
    languages:
    - Common
    - Goblin
  fr:
    name: Gobelin, chef
    subtype: Gobelinoïde
    description: |-
      ## Actions

      ***Attaques multiples***. Le gobelin effectue deux attaques, réparties à sa guise entre Cimeterre et Arc court.

      ***Cimeterre***. *Corps à corps* : +4, allonge 1,50 m. *Touché* : 5 (1d6 + 2) dégâts tranchants, plus 2 (1d4) dégâts tranchants si le jet d'attaque avait un Avantage.

      ***Arc court***. *À distance* : +4, portée 24/96 m. *Touché* : 5 (1d6 + 2) dégâts perforants, plus 2 (1d4) dégâts perforants si le jet d'attaque avait un Avantage.

      ## Actions Bonus

      ***Fuite agile***. Le gobelin entreprend l'action Désengagement ou Furtivité.

      ## Réactions

      ***Attaque redirigée***. *Déclencheur* : une créature que le gobelin voit effectue un jet d'attaque contre lui. *Conséquences* : le gobelin choisit un allié de taille P ou M dans un rayon de 1,50 m. Le gobelin et cet allié échangent leurs places ; l'allié devient la nouvelle cible de l'attaque.
    senses: Vision dans le noir 18 m, Perception passive 9
    languages:
    - commun
    - gobelin
