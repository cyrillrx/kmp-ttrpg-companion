    description: |-
      <h2>Traits</h2>
      <p>** <em>Bloodied Frenzy</em>**. While Bloodied, the berserker has Advantage on attack rolls and saving throws.</p>
      <h2>Actions</h2>
      <p>** <em>Greataxe</em>**. <em>Melee Attack Roll</em> : +5, reach 5 ft. <em>Hit</em> : 9 (1d12 + 3) Slashing damage.</p>
