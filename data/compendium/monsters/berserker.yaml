    name: Berserker
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Frénésie du péril</em>**. Lorsqu'il est En péril, le berserker a un Avantage aux jets d'attaque et de sauvegarde.</p>
      <h2>Actions</h2>
      <p>** <em>Hache à deux mains</em>**. <em>Corps à corps</em> : +5, allonge 1,50 m. <em>Touché</em> : 9 (1d12 + 3) dégâts tranchants.</p>
