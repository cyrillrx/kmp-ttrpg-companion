translations:
  en:
    name: Ice Devil
    subtype: Devil
    description: |-
      <h2>Traits</h2>
      <p>** <em>Diabolical Restoration</em>**. If the devil dies outside the Nine Hells, its body disappears in sulfurous smoke, and it gains a new body instantly, reviving with all its Hit Points somewhere in the Nine Hells.</p>
      <p><strong><em>Magic Resistance</em></strong>. The devil has Advantage on saving throws against spells and other magical effects.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The devil makes three Ice Spear attacks. It can replace one attack with a Tail attack.</p>
      <p><strong><em>Ice Spear</em></strong>. <em>Melee or Ranged Attack Roll</em> : +10, reach 5 ft. or range 30/120 ft. <em>Hit</em> : 14 (2d8 + 5) Piercing damage plus 10 (3d6) Cold damage. Until the end of its next turn, the target can't take a Bonus Action or Reaction, its Speed decreases by 10 feet, and it can move or take one action on its turn, not both. <em>Hit or Miss</em> : The spear magically returns to the devil's hand immediately after a ranged attack.</p>
      <p><strong><em>Tail</em></strong>. <em>Melee Attack Roll</em> : +10, reach 10 ft. <em>Hit</em> : 15 (3d6 + 5) Bludgeoning damage plus 18 (4d8) Cold damage.</p>
      <p><strong><em>Ice Wall (Recharge 6)</em></strong>. The devil casts <em><a href="https://www.aidedd.org/spell/wall-of-ice">Wall of Ice</a></em> (level 8 version), requiring no spell components and using Intelligence as the spellcasting ability (spell save DC 17).</p>
    senses: Blindsight 120 ft., Passive Perception 17
    languages:
    - Infernal; telepathy 120 ft.
  fr:
    name: Diable gelé
    subtype: Diable
    description: |-
      <h2>Traits</h2>
      <p>** <em>Résistance à la magie</em>**. Le diable a un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques.</p>
      <p><strong><em>Restauration diabolique</em></strong>. Si le diable meurt hors des Neuf Enfers, son corps disparaît dans un nuage de fumée sulfureuse, tandis qu'il en acquiert aussitôt un nouveau et revient à la vie avec tous ses pv quelque part dans les Neuf Enfers.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le diable effectue trois attaques de Lance de glace. Il peut en remplacer une par une attaque de Queue.</p>
      <p><strong><em>Lance de glace</em></strong>. <em>Corps à corps ou à distance</em> : +10, allonge 1,50 m ou portée 9/36 m. <em>Touché</em> : 14 (2d8 + 5) dégâts perforants plus 10 (3d6) dégâts de froid. Jusqu'à la fin de son tour suivant, la cible ne peut entreprendre ni action Bonus ni Réaction, sa Vitesse est réduite de 3 m et elle peut se déplacer ou entreprendre son action à son tour, mais pas les deux. <em>Touché ou raté</em> : aussitôt après une attaque à distance, la lance retourne magiquement dans la main du diable.</p>
      <p><strong><em>Queue</em></strong>. <em>Corps à corps</em> : +10, allonge 3 m. <em>Touché</em> : 15 (3d6 + 5) dégâts contondants plus 18 (4d8) dégâts de froid.</p>
      <p><strong><em>Mur de glace (recharge 6)</em></strong>. Le diable lance <em>mur de glace</em> (au niveau 8), sans avoir besoin de composantes de sort et en utilisant l'Intelligence comme caractéristique d'incantation (DD de sauvegarde 17).</p>
    senses: Vision aveugle 36 m, Perception passive 17
    languages:
    - infernal ; télépathie 36 m
