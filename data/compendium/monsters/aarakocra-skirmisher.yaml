translations:
  en:
    name: Aarakocra Skirmisher
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Talons</em>**. <em>Melee Attack Roll</em> : +4, reach 5 ft. <em>Hit</em> : 4 (1d4 + 2) Slashing damage, or 9 (3d4 + 2) Slashing damage if the aarakocra moved 30+ feet straight toward the target immediately before the hit.</p>
      <p><strong><em>Wind Javelin</em></strong>. <em>Melee or Ranged Attack Roll</em> : +4, reach 5 ft. or range 30/120 ft. <em>Hit</em> : 5 (1d6 + 2) Piercing damage plus 2 (1d4) Thunder damage. <em>Hit or Miss</em> : The javelin magically returns to the aarakocra's hand immediately after a ranged attack.</p>
    senses: Passive Perception 15
    languages:
    - Aarakocra
    - Primordial (Auran)
  fr:
    name: Aarakocre, tirailleur
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Serres</em>**. <em>Corps à corps</em> : +4, allonge 1,50 m. <em>Touché</em> : 4 (1d4 + 2) dégâts tranchants, ou 9 (3d4 + 2) dégâts tranchants si l'aarakocre s'est déplacé d'au moins 9 m en ligne droite vers la cible juste avant de toucher.</p>
      <p><strong><em>Javeline des vents</em></strong>. <em>Corps à corps ou à distance</em> : +4, allonge 1,50 m ou portée 30/36 m. <em>Touché</em> : 5 (1d6 + 2) dégâts perforants plus 2 (1d4) dégâts de tonnerre. <em>Échec ou réussite</em> : la javeline retourne magiquement dans la main de l'aarakocre immédiatement après une attaque à distance.</p>
    senses: Perception passive 15
    languages:
    - aarakocre
    - primordial (aérien)
