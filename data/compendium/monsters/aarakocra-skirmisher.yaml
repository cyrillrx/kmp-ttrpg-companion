translations:
  en:
    name: Aarakocra Skirmisher
    subtype: null
    description: '## Actions


      ***Talons***. *Melee Attack Roll* : +4, reach 5 ft. *Hit* : 4 (1d4 + 2) Slashing
      damage, or 9 (3d4 + 2) Slashing damage if the aarakocra moved 30+ feet straight
      toward the target immediately before the hit.


      ***Wind Javelin***. *Melee or Ranged Attack Roll* : +4, reach 5 ft. or range
      30/120 ft. *Hit* : 5 (1d6 + 2) Piercing damage plus 2 (1d4) Thunder damage.
      *Hit or Miss* : The javelin magically returns to the aarakocra''s hand immediately
      after a ranged attack.'
    senses: Passive Perception 15
    languages:
    - Aarakocra
    - Primordial (Auran)
  fr:
    name: Aarakocre, tirailleur
    subtype: null
    description: '## Actions


      ***Serres***. *Corps à corps* : +4, allonge 1,50 m. *Touché* : 4 (1d4 + 2) dégâts
      tranchants, ou 9 (3d4 + 2) dégâts tranchants si l''aarakocre s''est déplacé
      d''au moins 9 m en ligne droite vers la cible juste avant de toucher.


      ***Javeline des vents***. *Corps à corps ou à distance* : +4, allonge 1,50 m
      ou portée 30/36 m. *Touché* : 5 (1d6 + 2) dégâts perforants plus 2 (1d4) dégâts
      de tonnerre. *Échec ou réussite* : la javeline retourne magiquement dans la
      main de l''aarakocre immédiatement après une attaque à distance.'
    senses: Perception passive 15
    languages:
    - aarakocre
    - primordial (aérien)
