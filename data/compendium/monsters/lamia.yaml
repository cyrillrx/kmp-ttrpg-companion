translations:
  en:
    name: Lamia
    subtype: null
    description: |-
      ## Actions

      ***Multiattack***. The lamia makes two Claw attacks. It can replace one attack with a use of Corrupting Touch.

      ***Claw***. *Melee Attack Roll* : +5, reach 5 ft. *Hit* : 7 (1d8 + 3) Slashing damage plus 7 (2d6) Psychic damage.

      ***Corrupting Touch***. *Wisdom Saving Throw* : DC 13, one creature the lamia can see within 5 feet. *Failure* : 13 (3d8) Psychic damage, and the target is cursed for 1 hour. Until the curse ends, the target has the Charmed and Poisoned conditions.

      ***Spellcasting***. The lamia casts one of the following spells, requiring no Material components and using Charisma as the spellcasting ability (spell save DC 13):

      At Will: *[Disguise Self](https://www.aidedd.org/spell/disguise-self)* (can appear as a Large or Medium biped), *[Minor Illusion](https://www.aidedd.org/spell/minor-illusion)*\
      1/Day Each: *[Geas](https://www.aidedd.org/spell/geas), [Major Image](https://www.aidedd.org/spell/major-image), [Scrying](https://www.aidedd.org/spell/scrying)*

      ## Bonus actions

      ***Leap***. The lamia jumps up to 30 feet by spending 10 feet of movement.
    senses: Darkvision 60 ft., Passive Perception 12
    languages:
    - Abyssal
    - Common
  fr:
    name: Lamie
    subtype: null
    description: |-
      ## Actions

      ***Attaques multiples***. La lamie effectue deux attaques de Griffe. Elle peut remplacer l'une de ces attaques par une utilisation de Contact corrupteur.

      ***Griffe***. *Corps à corps* : +5, allonge 1,50 m. *Touché* : 7 (1d8 + 3) dégâts tranchants plus 7 (2d6) dégâts psychiques.

      ***Contact corrupteur***. *JdS Sagesse* : DD 13, une créature que la lamie voit dans un rayon de 1,50 m. *Échec* : 13 (3d8) dégâts psychiques, et la cible est maudite pendant 1 heure. Tant que persiste la malédiction, la cible subit les états Charmé et Empoisonné.

      ***Incantation***. La lamie lance l'un des sorts suivants sans composantes matérielles, le Charisme étant sa caractéristique d'incantation (DD de sauvegarde 13) :

      À volonté : *déguisement* (comme bipède de taille M ou G), *[illusion mineure](https://www.aidedd.org/spell/fr/illusion-mineure)*\
      1/jour chacun : *[image majeure](https://www.aidedd.org/spell/fr/image-majeure), quête, [scrutation](https://www.aidedd.org/spell/fr/scrutation)*

      ## Actions Bonus

      ***Bond***. La lamie effectue un saut d'un maximum de 9 m en dépensant 3 m de déplacement.
    senses: Vision dans le noir 18 m, Perception passive 12
    languages:
    - abyssal
    - commun
