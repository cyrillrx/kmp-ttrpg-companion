translations:
  en:
    name: Swarm of Insects
    subtype: null
    description: |-
      ## Traits

      ***Spider Climb***. If the swarm has a Climb Speed, the swarm can climb difficult surfaces, including along ceilings, without needing to make an ability check.

      ***Swarm***. The swarm can occupy another creature's space and vice versa, and the swarm can move through any opening large enough for a Tiny insect. The swarm can't regain Hit Points or gain Temporary Hit Points.

      ## Actions

      ***Bites***. *Melee Attack Roll* : +3, reach 5 ft. *Hit* : 6 (2d4 + 1) Poison damage, or 3 (1d4 + 1) Poison damage if the swarm is Bloodied.
    senses: Blindsight 30 ft., Passive Perception 8
    languages:
    - None
  fr:
    name: Nuée d'insectes
    subtype: null
    description: |-
      ## Traits

      ***Nuée***. La nuée peut occuper l'espace d'une autre créature et réciproquement, et elle peut se déplacer par toute ouverture assez large pour un insecte de taille TP. La nuée ne peut ni récupérer de points de vie ni recevoir de points de vie temporaires.

      ***Pattes d'araignée***. Si la nuée dispose d'une Vitesse d'escalade, la nuée peut parcourir les parois les plus difficiles, y compris les plafonds, sans passer par un jet de caractéristique.

      ## Actions

      Morsures.
    senses: Vision aveugle 9 m, Perception passive 8
    languages:
    - aucune
