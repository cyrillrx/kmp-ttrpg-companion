translations:
  en:
    name: Gnoll Warrior
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Rend</em>**. <em>Melee Attack Roll</em> : +4, reach 5 ft. <em>Hit</em> : 5 (1d6 + 2) Piercing damage.</p>
      <p><strong><em>Bone Bow</em></strong>. <em>Ranged Attack Roll</em> : +3, range 150/600 ft. <em>Hit</em> : 6 (1d10 + 1) Piercing damage.</p>
      <h2>Bonus actions</h2>
      <p>** <em>Rampage (1/Day)</em>**. Immediately after dealing damage to a creature that is already Bloodied, the gnoll moves up to half its Speed, and it makes one Rend attack.</p>
    senses: Darkvision 60 ft., Passive Perception 10
    languages:
    - Gnoll
  fr:
    name: Gnoll, combattant
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Saignée</em>**. <em>Corps à corps</em> : +4, allonge 1,50 m. <em>Touché</em> : 5 (1d6 + 2) dégâts perforants.</p>
      <p><strong><em>Arc en os</em></strong>. <em>À distance</em> : +3, portée 45/180 m. <em>Touché</em> : 6 (1d10 + 1) dégâts perforants.</p>
      <h2>Actions Bonus</h2>
      <p>** <em>Déchaînement (1/jour)</em>**. Aussitôt après avoir infligé des dégâts à une créature déjà En péril, le gnoll se déplace à concurrence de la moitié de sa Vitesse et effectue une attaque de Saignée.</p>
    senses: Vision dans le noir 18 m, Perception passive 10
    languages:
    - gnoll
