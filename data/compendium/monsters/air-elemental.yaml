translations:
  en:
    name: Air Elemental
    subtype: null
    description: |-
      ## Traits

      ***Air Form***. The elemental can enter a creature's space and stop there. It can move through a space as narrow as 1 inch without expending extra movement to do so.

      ## Actions

      ***Multiattack***. The elemental makes two Thunderous Slam attacks.

      ***Thunderous Slam***. *Melee Attack Roll* : +8, reach 10 ft. *Hit* : 14 (2d8 + 5) Thunder damage.

      ***Whirlwind (Recharge 4–6)***. *Strength Saving Throw* : DC 13, one Medium or smaller creature in the elemental's space. *Failure* : 24 (4d10 + 2) Thunder damage, and the target is pushed up to 20 feet straight away from the elemental and has the Prone condition. *Success* : Half damage only.
    senses: Darkvision 60 ft., Passive Perception 10
    languages:
    - Primordial (Auran)
  fr:
    name: Élémentaire de l'air
    subtype: null
    description: |-
      ## Traits

      ***Corps d'air***. L'élémentaire peut entrer dans l'espace d'une créature et s'y arrêter. Il peut se déplacer dans un espace étroit d'une largeur minimale de 2,50 cm sans dépense supplémentaire en déplacement.

      ## Actions

      ***Attaques multiples***. L'élémentaire effectue deux attaques de Coup tonitruant.

      ***Coup tonitruant***. *Corps à corps* : +8, allonge 3 m. *Touché* : 14 (2d8 + 5) dégâts de tonnerre.

      ***Tourbillon (recharge 4–6)***. *JdS Force* : DD 13, une créature de taille M ou inférieure dans l'espace de l'élémentaire. *Échec* : 24 (4d10 + 2) dégâts de tonnerre, et la cible est repoussée de l'élémentaire de 6 m en ligne droite et subit l'état À terre. *Réussite* : demi-dégâts uniquement.
    senses: Vision dans le noir 18 m, Perception passive 10
    languages:
    - primordial (aérien)
