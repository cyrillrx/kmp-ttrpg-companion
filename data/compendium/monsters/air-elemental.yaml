translations:
  en:
    name: Air Elemental
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Air Form</em>**. The elemental can enter a creature's space and stop there. It can move through a space as narrow as 1 inch without expending extra movement to do so.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The elemental makes two Thunderous Slam attacks.</p>
      <p><strong><em>Thunderous Slam</em></strong>. <em>Melee Attack Roll</em> : +8, reach 10 ft. <em>Hit</em> : 14 (2d8 + 5) Thunder damage.</p>
      <p><strong><em>Whirlwind (Recharge 4–6)</em></strong>. <em>Strength Saving Throw</em> : DC 13, one Medium or smaller creature in the elemental's space. <em>Failure</em> : 24 (4d10 + 2) Thunder damage, and the target is pushed up to 20 feet straight away from the elemental and has the Prone condition. <em>Success</em> : Half damage only.</p>
    senses: Darkvision 60 ft., Passive Perception 10
    languages:
    - Primordial (Auran)
  fr:
    name: Élémentaire de l'air
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Corps d'air</em>**. L'élémentaire peut entrer dans l'espace d'une créature et s'y arrêter. Il peut se déplacer dans un espace étroit d'une largeur minimale de 2,50 cm sans dépense supplémentaire en déplacement.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. L'élémentaire effectue deux attaques de Coup tonitruant.</p>
      <p><strong><em>Coup tonitruant</em></strong>. <em>Corps à corps</em> : +8, allonge 3 m. <em>Touché</em> : 14 (2d8 + 5) dégâts de tonnerre.</p>
      <p><strong><em>Tourbillon (recharge 4–6)</em></strong>. <em>JdS Force</em> : DD 13, une créature de taille M ou inférieure dans l'espace de l'élémentaire. <em>Échec</em> : 24 (4d10 + 2) dégâts de tonnerre, et la cible est repoussée de l'élémentaire de 6 m en ligne droite et subit l'état À terre. <em>Réussite</em> : demi-dégâts uniquement.</p>
    senses: Vision dans le noir 18 m, Perception passive 10
    languages:
    - primordial (aérien)
