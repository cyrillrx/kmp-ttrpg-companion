translations:
  en:
    name: Ancient Red Dragon
    subtype: Chromatic
    description: |-
      <h2>Traits</h2>
      <p>** <em>Legendary Resistance (4/Day, or 5/Day in Lair)</em>**. If the dragon fails a saving throw, it can choose to succeed instead.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The dragon makes three Rend attacks. It can replace one attack with a use of Spellcasting to cast <em><a href="https://www.aidedd.org/spell/scorching-ray">Scorching Ray</a></em> (level 3 version).</p>
      <p><strong><em>Rend</em></strong>. <em>Melee Attack Roll</em> : +17, reach 15 ft. <em>Hit</em> : 19 (2d8 + 10) Slashing damage plus 10 (3d6) Fire damage.</p>
      <p><strong><em>Fire Breath (Recharge 5–6)</em></strong>. <em>Dexterity Saving Throw</em> : DC 24, each creature in a 90-foot Cone. <em>Failure</em> : 91 (26d6) Fire damage. <em>Success</em> : Half damage.</p>
      <p><strong><em>Spellcasting</em></strong>. The dragon casts one of the following spells, requiring no Material components and using Charisma as the spellcasting ability (spell save DC 23, +15 to hit with spell attacks):</p>
      <p>At Will: <em><a href="https://www.aidedd.org/spell/command">Command</a></em> (level 2 version), <em><a href="https://www.aidedd.org/spell/detect-magic">Detect Magic</a>, <a href="https://www.aidedd.org/spell/scorching-ray">Scorching Ray</a></em> (level 3 version)<br />
      1/Day Each: <em><a href="https://www.aidedd.org/spell/fireball">Fireball</a></em> (level 6 version), <em><a href="https://www.aidedd.org/spell/scrying">Scrying</a></em>  </p>
      <h2>Legendary actions</h2>
      <p>Legendary Action Uses: 3 (4 in Lair). Immediately after another creature's turn, the dragon can expend a use to take one of the following actions. The dragon regains all expended uses at the start of each of its turns. </p>
      <p><strong><em>Commanding Presence</em></strong>. The dragon uses Spellcasting to cast <em><a href="https://www.aidedd.org/spell/command">Command</a></em> (level 2 version). The dragon can't take this action again until the start of its next turn.</p>
      <p><strong><em>Fiery Rays</em></strong>. The dragon uses Spellcasting to cast <em><a href="https://www.aidedd.org/spell/scorching-ray">Scorching Ray</a></em> (level 3 version). The dragon can't take this action again until the start of its next turn.</p>
      <p><strong><em>Pounce</em></strong>. The dragon moves up to half its Speed, and it makes one Rend attack.</p>
    senses: Blindsight 60 ft., Darkvision 120 ft., Passive Perception 26
    languages:
    - Common
    - Draconic
  fr:
    name: Dragon rouge, ancien
    subtype: Chromatique
    description: |-
      <h2>Traits</h2>
      <p>** <em>Résistance légendaire (4/jour, ou 5/jour dans son antre)</em>**. Si le dragon rate un jet de sauvegarde, il peut décider de le réussir tout de même.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le dragon effectue trois attaques de Saignée. Il peut remplacer l'une de ces attaques par une utilisation d'Incantation pour lancer <em><a href="https://www.aidedd.org/spell/fr/rayon-ardent">rayon ardent</a></em> (au niveau 3).</p>
      <p><strong><em>Saignée</em></strong>. <em>Corps à corps</em> : +17, allonge 4,50 m. <em>Touché</em> : 19 (2d8 + 10) dégâts tranchants plus 10 (3d6) dégâts de feu.</p>
      <p><strong><em>Incantation</em></strong>. Le dragon lance l'un des sorts suivants sans composantes matérielles, le Charisme étant sa caractéristique d'incantation (DD de sauvegarde 23, +15 pour toucher) :</p>
      <p>À volonté : <em><a href="https://www.aidedd.org/spell/fr/detection-de-la-magie">détection de la magie</a>, <a href="https://www.aidedd.org/spell/fr/injonction">injonction</a></em> (au niveau 2), <em><a href="https://www.aidedd.org/spell/fr/rayon-ardent">rayon ardent</a></em> (au niveau 3)<br />
      1/jour chacun : <em><a href="https://www.aidedd.org/spell/fr/boule-de-feu">boule de feu</a></em> (au niveau 6), <em><a href="https://www.aidedd.org/spell/fr/scrutation">scrutation</a></em>  </p>
      <p>** <em>Souffle de feu (recharge 5–6)</em>**. <em>JdS Dextérité</em> : DD 24, chaque créature dans un Cône de 27 m. <em>Échec</em> : 91 (26d6) dégâts de feu. <em>Réussite</em> : demi-dégâts.</p>
      <h2>Actions Légendaires</h2>
      <p>Utilisations d'action Légendaire : 3 (4 dans son antre). Aussitôt après le tour d'une autre créature, le dragon peut dépenser une utilisation pour entreprendre l'une des actions ci-après. Le dragon récupère toutes ses utilisations dépensées au début de chacun de ses tours. </p>
      <p><strong><em>Assaut incisif</em></strong>. Le dragon se déplace à concurrence de la moitié de sa Vitesse et effectue une attaque de Saignée.</p>
      <p><strong><em>Autorité naturelle</em></strong>. Le dragon recourt à Incantation pour lancer <em><a href="https://www.aidedd.org/spell/fr/injonction">injonction</a></em> (au niveau 2). Le dragon ne peut alors plus entreprendre cette action jusqu'au début de son tour suivant.</p>
      <p><strong><em>Rayons ignés</em></strong>. Le dragon recourt à Incantation pour lancer <em><a href="https://www.aidedd.org/spell/fr/rayon-ardent">rayon ardent</a></em> (au niveau 3). Le dragon ne peut alors plus entreprendre cette action jusqu'au début de son tour suivant.</p>
    senses: Vision aveugle 18 m, Vision dans le noir 36 m, Perception passive 26
    languages:
    - commun
    - draconique
