translations:
  en:
    name: Winter Wolf
    subtype: null
    description: |-
      ## Traits

      ***Pack Tactics***. The wolf has Advantage on an attack roll against a creature if at least one of the wolf's allies is within 5 feet of the creature and the ally doesn't have the Incapacitated condition.

      ## Actions

      ***Bite***. *Melee Attack Roll* : +6, reach 5 ft. *Hit* : 11 (2d6 + 4) Piercing damage. If the target is a Large or smaller creature, it has the Prone condition.

      ***Cold Breath (Recharge 5–6)***. *Constitution Saving Throw* : DC 12, each creature in a 15-foot Cone. *Failure* : 18 (4d8) Cold damage. *Success* : Half damage.
    senses: Passive Perception 15
    languages:
    - Common
    - Giant
  fr:
    name: Loup arctique
    subtype: null
    description: |-
      ## Traits

      ***Tactique de meute***. Quand au moins un de ses alliés non Incapable d'agir se situe dans un rayon de 1,50 m de la créature qu'il cible, le loup a un Avantage au jet d'attaque correspondant.

      ## Actions

      ***Morsure***. *Corps à corps* : +6, allonge 1,50 m. *Touché* : 11 (2d6 + 4) dégâts perforants. Si la cible est une créature de taille G ou inférieure, elle subit l'état À terre.

      ***Souffle glacial (recharge 5–6)***. *JdS Constitution* : DD 12, chaque créature dans un Cône de 4,50 m. *Échec* : 18 (4d8) dégâts de froid. *Réussite* : demi-dégâts.
    senses: Perception passive 15
    languages:
    - commun
    - géant
