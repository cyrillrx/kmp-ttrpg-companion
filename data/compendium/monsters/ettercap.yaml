translations:
  en:
    name: Ettercap
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Spider Climb</em>**. The ettercap can climb difficult surfaces, including along ceilings, without needing to make an ability check.</p>
      <p><strong><em>Web Walker</em></strong>. The ettercap ignores movement restrictions caused by webs, and the ettercap knows the location of any other creature in contact with the same web.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The ettercap makes one Bite attack and one Claw attack.</p>
      <p><strong><em>Bite</em></strong>. <em>Melee Attack Roll</em> : +4, reach 5 ft. <em>Hit</em> : 5 (1d6 + 2) Piercing damage plus 2 (1d4) Poison damage, and the target has the Poisoned condition until the start of the ettercap's next turn.</p>
      <p><strong><em>Claw</em></strong>. <em>Melee Attack Roll</em> : +4, reach 5 ft. <em>Hit</em> : 7 (2d4 + 2) Slashing damage.</p>
      <p><strong><em>Web Strand (Recharge 5–6)</em></strong>. <em>Dexterity Saving Throw</em> : DC 12, one Large or smaller creature the ettercap can see within 30 feet. <em>Failure</em> : The target has the Restrained condition until the web is destroyed (AC 10; HP 5; Vulnerability to Fire damage; Immunity to Bludgeoning, Poison, and Psychic damage).</p>
      <h2>Bonus actions</h2>
      <p>** <em>Reel</em>**. The ettercap pulls one creature within 30 feet of itself that is Restrained by its Web Strand up to 25 feet straight toward itself.</p>
    senses: Darkvision 60 ft., Passive Perception 13
    languages: []
  fr:
    name: Ettercap
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Marche dans les toiles</em>**. L'ettercap n'est pas soumis aux contraintes de déplacement imposées par les toiles et connaît la position de toute autre créature en contact avec la même toile que lui.</p>
      <p><strong><em>Pattes d'araignée</em></strong>. L'ettercap peut parcourir les parois les plus difficiles à escalader, y compris les plafonds, sans passer par un jet de caractéristique.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. L'ettercap effectue une attaque de Griffe et une de Morsure.</p>
      <p><strong><em>Griffe</em></strong>. <em>Corps à corps</em> : +4, allonge 1,50 m. <em>Touché</em> : 7 (2d4 + 2) dégâts tranchants.</p>
      <p><strong><em>Morsure</em></strong>. <em>Corps à corps</em> : +4, allonge 1,50 m. <em>Touché</em> : 5 (1d6 + 2) dégâts perforants plus 2 (1d4) dégâts de poison, et la cible subit l'état Empoisonné jusqu'au début du tour suivant de l'ettercap.</p>
      <p><strong><em>Filandre (recharge 5–6)</em></strong>. <em>JdS Dextérité</em> : DD 12, une créature de taille G ou inférieure que l'ettercap voit dans un rayon de 9 m. <em>Échec</em> : la cible subit l'état Entravé jusqu'à ce que la filandre soit détruite (CA 10 ; 5 pv ; Vulnérabilité aux dégâts de feu ; Immunité contre les dégâts contondants, psychiques et de poison).</p>
      <h2>Actions Bonus</h2>
      <p>** <em>Traction</em>**. L'ettercap tire vers lui en ligne droite une créature Entravée par sa Filandre et située dans un rayon de 9 m, en la déplaçant d'un maximum de 7,50 m.</p>
    senses: Vision dans le noir 18 m, Perception passive 13
    languages: []
