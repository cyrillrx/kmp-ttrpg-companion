translations:
  en:
    name: Medusa
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The medusa makes two Claw attacks and one Snake Hair attack, or it makes three Poison Ray attacks.</p>
      <p><strong><em>Claw</em></strong>. <em>Melee Attack Roll</em> : +6, reach 5 ft. <em>Hit</em> : 10 (2d6 + 3) Slashing damage.</p>
      <p><strong><em>Snake Hair</em></strong>. <em>Melee Attack Roll</em> : +6, reach 5 ft. <em>Hit</em> : 5 (1d4 + 3) Piercing damage plus 14 (4d6) Poison damage.</p>
      <p><strong><em>Poison Ray</em></strong>. <em>Ranged Attack Roll</em> : +5, range 150 ft. <em>Hit</em> : 11 (2d8 + 2) Poison damage.</p>
      <h2>Bonus actions</h2>
      <p>** <em>Petrifying Gaze (Recharge 5–6)</em>**. <em>Constitution Saving Throw</em> : DC 13, each creature in a 30-foot Cone. If the medusa sees its reflection in the Cone, the medusa must make this save. <em>First Failure</em> : The target has the Restrained condition and repeats the save at the end of its next turn if it is still Restrained, ending the effect on itself on a success. <em>Second Failure</em> : The target has the Petrified condition instead of the Restrained condition.</p>
    senses: Darkvision 150 ft., Passive Perception 14
    languages:
    - Common plus one other language
  fr:
    name: Méduse
    subtype: null
    description: |-
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. La méduse effectue une attaque de Chevelure de serpents et deux de Griffe, ou bien elle effectue trois attaques de Rayon toxique.</p>
      <p><strong><em>Chevelure de serpents</em></strong>. <em>Corps à corps</em> : +6, allonge 1,50 m. <em>Touché</em> : 5 (1d4 + 3) dégâts perforants plus 14 (4d6) dégâts de poison.</p>
      <p><strong><em>Griffe</em></strong>. <em>Corps à corps</em> : +6, allonge 1,50 m. <em>Touché</em> : 10 (2d6 + 3) dégâts tranchants.</p>
      <p><strong><em>Rayon toxique</em></strong>. <em>À distance</em> : +5, portée 45 m. <em>Touché</em> : 11 (2d8 + 2) dégâts de poison.</p>
      <h2>Actions Bonus</h2>
      <p>** <em>Regard pétrifiant (recharge 5–6)</em>**. <em>JdS Constitution</em> : DD 13, chaque créature dans un Cône de 9 m. Si la méduse voit son reflet dans le Cône, elle effectue ce JdS. <em>Premier échec</em> : la cible subit l'état Entravé et réitère le JdS à la fin de son tour suivant si elle est toujours Entravée ; elle met un terme à l'effet sur elle-même en cas de réussite. <em>Deuxième échec</em> : la cible subit l'état Pétrifié qui remplace l'état Entravé.</p>
    senses: Vision dans le noir 45 m, Perception passive 14
    languages:
    - commun plus une autre langue
