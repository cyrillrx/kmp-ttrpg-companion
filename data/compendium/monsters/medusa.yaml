translations:
  en:
    name: Medusa
    subtype: null
    description: |-
      ## Actions

      ***Multiattack***. The medusa makes two Claw attacks and one Snake Hair attack, or it makes three Poison Ray attacks.

      ***Claw***. *Melee Attack Roll* : +6, reach 5 ft. *Hit* : 10 (2d6 + 3) Slashing damage.

      ***Snake Hair***. *Melee Attack Roll* : +6, reach 5 ft. *Hit* : 5 (1d4 + 3) Piercing damage plus 14 (4d6) Poison damage.

      ***Poison Ray***. *Ranged Attack Roll* : +5, range 150 ft. *Hit* : 11 (2d8 + 2) Poison damage.

      ## Bonus actions

      ***Petrifying Gaze (Recharge 5–6)***. *Constitution Saving Throw* : DC 13, each creature in a 30-foot Cone. If the medusa sees its reflection in the Cone, the medusa must make this save. *First Failure* : The target has the Restrained condition and repeats the save at the end of its next turn if it is still Restrained, ending the effect on itself on a success. *Second Failure* : The target has the Petrified condition instead of the Restrained condition.
    senses: Darkvision 150 ft., Passive Perception 14
    languages:
    - Common plus one other language
  fr:
    name: Méduse
    subtype: null
    description: |-
      ## Actions

      ***Attaques multiples***. La méduse effectue une attaque de Chevelure de serpents et deux de Griffe, ou bien elle effectue trois attaques de Rayon toxique.

      ***Chevelure de serpents***. *Corps à corps* : +6, allonge 1,50 m. *Touché* : 5 (1d4 + 3) dégâts perforants plus 14 (4d6) dégâts de poison.

      ***Griffe***. *Corps à corps* : +6, allonge 1,50 m. *Touché* : 10 (2d6 + 3) dégâts tranchants.

      ***Rayon toxique***. *À distance* : +5, portée 45 m. *Touché* : 11 (2d8 + 2) dégâts de poison.

      ## Actions Bonus

      ***Regard pétrifiant (recharge 5–6)***. *JdS Constitution* : DD 13, chaque créature dans un Cône de 9 m. Si la méduse voit son reflet dans le Cône, elle effectue ce JdS. *Premier échec* : la cible subit l'état Entravé et réitère le JdS à la fin de son tour suivant si elle est toujours Entravée ; elle met un terme à l'effet sur elle-même en cas de réussite. *Deuxième échec* : la cible subit l'état Pétrifié qui remplace l'état Entravé.
    senses: Vision dans le noir 45 m, Perception passive 14
    languages:
    - commun plus une autre langue
