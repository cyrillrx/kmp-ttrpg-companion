translations:
  en:
    name: Archpriest
    subtype: Cleric
    description: |-
      ## Actions

      ***Multiattack***. The archpriest makes three Radiant Burst attacks.

      ***Radiant Burst***. *Melee or Ranged Attack Roll* : +9, reach 5 ft. or range 60 ft. *Hit* : 27 (4d10 + 5) Radiant damage.

      ***Holy Word (Recharge 4–6)***. *Wisdom Saving Throw* : DC 17, each enemy in a 20-foot Emanation originating from the archpriest. *Failure* : 21 (6d6) Radiant damage, and the target has the Stunned condition until the end of the archpriest's next turn. *Success* : Half damage only.

      ***Spellcasting***. The archpriest casts one of the following spells, requiring no Material components and using Wisdom as the spellcasting ability (spell save DC 17):

      At will: *[Light](https://www.aidedd.org/spell/light), [Thaumaturgy](https://www.aidedd.org/spell/thaumaturgy)*

      1/day each: *[Flame Strike](https://www.aidedd.org/spell/flame-strike)* (level 6 version), *[Greater Restoration](https://www.aidedd.org/spell/greater-restoration), [Raise Dead](https://www.aidedd.org/spell/raise-dead), [Zone of Truth](https://www.aidedd.org/spell/zone-of-truth)*

      ## Bonus actions

      ***Divine Aid (3/Day)***. The priest casts *[Bless](https://www.aidedd.org/spell/bless), [Dispel Magic](https://www.aidedd.org/spell/dispel-magic), [Healing Word](https://www.aidedd.org/spell/healing-word)*, or *[Lesser Restoration](https://www.aidedd.org/spell/lesser-restoration)* , using the same spellcasting ability as Spellcasting.
    senses: Passive Perception 19
    languages:
    - Common plus two other languages
  fr:
    name: Archiprêtre
    subtype: Clerc
    description: |-
      ## Actions

      ***Attaques multiples***. L'archiprêtre effectue trois attaques d'Éruption radiante.

      ***Éruption radiante***. *Corps à corps ou à distance* : +9, allonge 1,50 m ou portée 18 m. *Touché* : 27 (4d10 + 5) dégâts radiants.

      ***Parole divine (recharge 4–6)***. *JdS Sagesse* : DD 17, chaque ennemi dans une Émanation de 6 m centrée sur l'archiprêtre. *Échec* : 21 (6d6) dégâts radiants, et la cible subit l'état Étourdi jusqu'à la fin du prochain tour de l'archiprêtre. *Réussite* : demi-dégâts uniquement.

      ***Incantation***. L'archiprêtre lance l'un des sorts suivants sans composantes matérielles, la Sagesse étant sa caractéristique d'incantation (DD de sauvegarde 17) :

      À volonté : *lumière,[thaumaturgie](https://www.aidedd.org/spell/fr/thaumaturgie)*

      1 fois par jour : *[colonne de flamme](https://www.aidedd.org/spell/fr/colonne-de-flamme)s* (au niveau 6), *[restauration suprême](https://www.aidedd.org/spell/fr/restauration-supreme), rappel à la vie, zone de vérité*

      ## Actions Bonus

      ***Soutien divin (3/jour)***. Le prêtre lance *bénédiction,[dissipation de la magie](https://www.aidedd.org/spell/fr/dissipation-de-la-magie), mot de guérison* ou *restauration mineure* , en utilisant la même caractéristique d'incantation que pour Incantation.
    senses: Perception passive 19
    languages:
    - commun plus deux autres langues
