translations:
  en:
    name: Drider
    subtype: null
    description: |-
      ## Traits

      ***Spider Climb***. The drider can climb difficult surfaces, including along ceilings, without needing to make an ability check.

      ***Sunlight Sensitivity***. While in sunlight, the drider has Disadvantage on ability checks and attack rolls.

      ***Web Walker***. The drider ignores movement restrictions caused by webs, and the drider knows the location of any other creature in contact with the same web.

      ## Actions

      ***Multiattack***. The drider makes three attacks, using Foreleg or Poison Burst in any combination.

      ***Foreleg***. *Melee Attack Roll* : +7, reach 10 ft. *Hit* : 13 (2d8 + 4) Piercing damage.

      ***Poison Burst***. *Ranged Attack Roll* : +6, range 120 ft. *Hit* : 13 (3d6 + 3) Poison damage.

      ## Bonus actions

      ***Magic of the Spider Queen (Recharge 5–6)***. The drider casts *[Darkness](https://www.aidedd.org/spell/darkness), [Faerie Fire](https://www.aidedd.org/spell/faerie-fire)*, or *[Web](https://www.aidedd.org/spell/web)* , requiring no Material components and using Wisdom as the spellcasting ability (spell save DC 14).
    senses: Darkvision 120 ft., Passive Perception 16
    languages:
    - Elvish
    - Undercommon
  fr:
    name: Drider
    subtype: null
    description: |-
      ## Traits

      ***Marche dans les toiles***. Le drider n'est pas soumis aux contraintes de déplacement imposées par les toiles et connaît la position de toute autre créature en contact avec la même toile que lui.

      ***Pattes d'araignée***. Le drider peut parcourir les parois les plus difficiles à escalader, y compris les plafonds, sans passer par un jet de caractéristique.

      ***Sensibilité au soleil***. Tant qu'il est exposé à la lumière du soleil, le drider subit un Désavantage aux jets de caractéristique et aux jets d'attaque.

      ## Actions

      ***Attaques multiples***. Le drider effectue trois attaques, réparties à sa guise entre Patte avant et Décharge toxique.

      ***Patte avant***. *Corps à corps* : +7, allonge 3 m. *Touché* : 13 (2d8 + 4) dégâts perforants.

      ***Décharge toxique***. *À distance* : +6, portée 36 m. *Touché* : 13 (3d6 + 3) dégâts de poison.

      ## Actions Bonus

      ***Magie de la Reine Araignée (recharge 5–6)***. Le drider lance *lueurs féeriques, ténèbres* ou *toile d'araignée* , sans composantes matérielles, la Sagesse étant sa caractéristique d'incantation (DD de sauvegarde 14).
    senses: Vision dans le noir 36 m, Perception passive 16
    languages:
    - elfe
    - commun des profondeurs
