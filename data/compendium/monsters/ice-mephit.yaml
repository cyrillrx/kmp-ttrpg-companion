translations:
  en:
    name: Ice Mephit
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Death Burst</em>**. The mephit explodes when it dies. <em>Constitution Saving Throw</em> : DC 10, each creature in a 5-foot Emanation originating from the mephit. <em>Failure</em> : 5 (2d4) Cold damage. <em>Success</em> : Half damage.</p>
      <h2>Actions</h2>
      <p>** <em>Claw</em>**. <em>Melee Attack Roll</em> : +3, reach 5 ft. <em>Hit</em> : 3 (1d4 + 1) Slashing damage plus 2 (1d4) Cold damage.</p>
      <p><strong><em>Fog Cloud (1/Day)</em></strong>. The mephit casts <em><a href="https://www.aidedd.org/spell/fog-cloud">Fog Cloud</a></em> , requiring no spell components and using Charisma as the spellcasting ability.</p>
      <p><strong><em>Frost Breath (Recharge 6)</em></strong>. <em>Constitution Saving Throw</em> : DC 10, each creature in a 15-foot Cone. <em>Failure</em> : 7 (3d4) Cold damage. <em>Success</em> : Half damage.</p>
    senses: Darkvision 60 ft., Passive Perception 12
    languages:
    - Primordial (Aquan
    - Auran)
  fr:
    name: Méphite gelé
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Explosion finale</em>**. Le méphite explose quand il meurt. <em>JdS Constitution</em> : DD 10, chaque créature dans une Émanation de 1,50 m centrée sur le méphite. <em>Échec</em> : 5 (2d4) dégâts de froid. <em>Réussite</em> : demi-dégâts.</p>
      <h2>Actions</h2>
      <p>** <em>Griffe</em>**. <em>Corps à corps</em> : +3, allonge 1,50 m. <em>Touché</em> : 3 (1d4 + 1) dégâts tranchants plus 2 (1d4) dégâts de froid.</p>
      <p><strong><em>Nappe de brouillard (1/jour)</em></strong>. Le méphite lance <em>nappe de brouillard</em> sans composantes de sort, le Charisme étant sa caractéristique d'incantation.</p>
      <p><strong><em>Souffle de givre (recharge 6)</em></strong>. <em>JdS Constitution</em> : DD 10, chaque créature dans un Cône de 4,50 m. <em>Échec</em> : 7 (3d4) dégâts de froid. <em>Réussite</em> : demi-dégâts.</p>
    senses: Vision dans le noir 18 m, Perception passive 12
    languages:
    - primordial (aquatique
    - aérien)
