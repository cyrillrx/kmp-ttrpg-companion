translations:
  en:
    name: Gibbering Mouther
    subtype: null
    description: |-
      ## Traits

      ***Aberrant Ground***. The ground in a 10-foot Emanation originating from the mouther is Difficult Terrain.

      ***Gibbering***. The mouther babbles incoherently while it doesn't have the Incapacitated condition. *Wisdom Saving Throw* : DC 10, any creature that starts its turn within 20 feet of the mouther while it is babbling. *Failure* : The target rolls 1d8 to determine what it does during the current turn:

      ***1–4***. The target does nothing.

      ***5–6***. The target takes no action or Bonus Action and uses all its movement to move in a random direction.

      ***7–8***. The target makes a melee attack against a randomly determined creature within its reach or does nothing if it can't make such an attack.

      ## Actions

      ***Bite***. *Melee Attack Roll* : +2, reach 5 ft. *Hit* : 7 (2d6) Piercing damage. If the target is a Medium or smaller creature, it has the Prone condition. The target dies if it is reduced to 0 Hit Points by this attack. Its body is then absorbed into the mouther, leaving only equipment behind.

      ***Blinding Spittle (Recharge 5–6)***. *Dexterity Saving Throw* : DC 10, each creature in a 10-foot-radius Sphere centered on a point within 30 feet. *Failure* : 7 (2d6) Radiant damage, and the target has the Blinded condition until the end of the mouther's next turn.
    senses: Darkvision 60 ft., Passive Perception 10
    languages: []
  fr:
    name: Babélien
    subtype: null
    description: |-
      ## Traits

      ***Charabia***. Le babélien bredouille de façon incohérente tant qu'il ne subit pas l'état Incapable d'agir. *JdS Sagesse* : DD 10, toute créature qui commence son tour dans un rayon de 6 m du babélien alors qu'il bredouille. *Échec* : la cible lance 1d8 pour déterminer ce qu'elle fait pour le tour en cours :

      ***1–4***. La cible ne fait rien.

      ***5–6***. La cible n'entreprend ni action ni action Bonus, et consacre tout son déplacement dans une direction aléatoire.

      ***7–8***. La cible effectue une attaque de corps à corps contre une créature déterminée aléatoirement à portée d'allonge (elle ne fait rien si une telle attaque n'est pas possible).

      ***Sol aberrant***. Le sol dans une Émanation de 3 m centrée sur le babélien est un Terrain difficile.

      ## Actions

      ***Morsure***. *Corps à corps* : +2, allonge 1,50 m. *Touché* : 7 (2d6) dégâts perforants. Si la cible est une créature de taille M ou inférieure, elle subit l'état À terre. La cible meurt si cette attaque la fait tomber à 0 point de vie. Son corps est alors absorbé par le babélien en ne laissant que son équipement.

      ***Crachat aveuglant (recharge 5–6)***. *JdS Dextérité* : DD 10, chaque créature dans une Sphère de 3 m de rayon centrée sur un point dans un rayon de 9 m. *Échec* : 7 (2d6) dégâts radiants, et la cible subit l'état Aveuglé jusqu'à la fin du tour suivant du babélien.
    senses: Vision dans le noir 18 m, Perception passive 10
    languages: []
