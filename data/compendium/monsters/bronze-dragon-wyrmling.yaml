translations:
  en:
    name: Bronze Dragon Wyrmling
    subtype: Metallic
    description: |-
      <h2>Traits</h2>
      <p>** <em>Amphibious</em>**. The dragon can breathe air and water.</p>
      <h2>Actions</h2>
      <p>** <em>Multiattack</em>**. The dragon makes two Rend attacks.</p>
      <p><strong><em>Rend</em></strong>. <em>Melee Attack Roll</em> : +5, reach 5 ft. <em>Hit</em> : 8 (1d10 + 3) Slashing damage.</p>
      <p><strong><em>Lightning Breath (Recharge 5–6)</em></strong>. <em>Dexterity Saving Throw</em> : DC 12, each creature in a 40-foot-long, 5-foot-wide Line. <em>Failure</em> : 16 (3d10) Lightning damage. <em>Success</em> : Half damage.</p>
      <p><strong><em>Repulsion Breath</em></strong>. <em>Strength Saving Throw</em> : DC 12, each creature in a 30-foot Cone. <em>Failure</em> : The target is pushed up to 30 feet straight away from the dragon and has the Prone condition.</p>
    senses: Blindsight 10 ft., Darkvision 60 ft., Passive Perception 14
    languages:
    - Draconic
  fr:
    name: Dragon de bronze, dragonnet
    subtype: Métallique
    description: |-
      <h2>Traits</h2>
      <p>** <em>Amphibie</em>**. Le dragon peut respirer sous l'eau comme à l'air libre.</p>
      <h2>Actions</h2>
      <p>** <em>Attaques multiples</em>**. Le dragon effectue deux attaques de Saignée.</p>
      <p><strong><em>Saignée</em></strong>. <em>Corps à corps</em> : +5, allonge 1,50 m. <em>Touché</em> : 8 (1d10 + 3) dégâts tranchants.</p>
      <p><strong><em>Souffle de foudre (recharge 5–6)</em></strong>. <em>JdS Dextérité</em> : DD 12, chaque créature dans une Ligne de 12 m de long sur 1,50 m de large. <em>Échec</em> : 16 (3d10) dégâts de foudre. <em>Réussite</em> : demi-dégâts.</p>
      <p><strong><em>Souffle répulsif</em></strong>. <em>JdS Force</em> : DD 12, chaque créature dans un Cône de 9 m. <em>Échec</em> : la cible est repoussée du dragon sur 9 m en ligne droite et subit l'état À terre.</p>
    senses: Vision aveugle 3 m, Vision dans le noir 18 m, Perception passive 14
    languages:
    - draconique
