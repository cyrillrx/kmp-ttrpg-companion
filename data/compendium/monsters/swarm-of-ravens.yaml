translations:
  en:
    name: Swarm of Ravens
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Swarm</em>**. The swarm can occupy another creature's space and vice versa, and the swarm can move through any opening large enough for a Tiny raven. The swarm can't regain Hit Points or gain Temporary Hit Points.</p>
      <h2>Actions</h2>
      <p>** <em>Beaks</em>**. <em>Melee Attack Roll</em> : +4, reach 5 ft. <em>Hit</em> : 5 (1d6 + 2) Piercing damage, or 2 (1d4) Piercing damage if the swarm is Bloodied.</p>
      <p><strong><em>Cacophony (Recharge 6)</em></strong>. <em>Wisdom Saving Throw</em> : DC 10, one creature in the swarm's space. <em>Failure</em> : The target has the Deafened condition until the start of the swarm's next turn. While Deafened, the target also has Disadvantage on ability checks and attack rolls.</p>
    senses: Passive Perception 15
    languages:
    - None
  fr:
    name: Nuée de corbeaux
    subtype: null
    description: |-
      <h2>Traits</h2>
      <p>** <em>Nuée</em>**. La nuée peut occuper l'espace d'une autre créature et réciproquement, et elle peut se déplacer par toute ouverture assez large pour un corbeau de taille TP. La nuée ne peut ni récupérer de points de vie ni recevoir de points de vie temporaires.</p>
      <h2>Actions</h2>
      <p>** <em>Becs</em>**. <em>Corps à corps</em> : +4, allonge 1,50 m. <em>Touché</em> : 5 (1d6 + 2) dégâts perforants, ou 2 (1d4) dégâts perforants si la nuée est En péril.</p>
      <p><strong><em>Cacophonie (recharge 6)</em></strong>. <em>JdS Sagesse</em> : DD 10, une créature dans l'espace de la nuée. <em>Échec</em> : la cible subit l'état Assourdi jusqu'au début du tour suivant de la nuée. Ainsi Assourdie, la cible subit aussi le Désavantage aux jets de caractéristique et aux jets d'attaque.</p>
    senses: Perception passive 15
    languages:
    - aucune
