translations:
  en:
    name: Ettin
    subtype: null
    description: |-
      ## Actions

      ***Multiattack***. The ettin makes one Battleaxe attack and one Morningstar attack.

      ***Battleaxe***. *Melee Attack Roll* : +7, reach 5 ft. *Hit* : 14 (2d8 + 5) Slashing damage. If the target is a Large or smaller creature, it has the Prone condition.

      ***Morningstar***. *Melee Attack Roll* : +7, reach 5 ft. *Hit* : 14 (2d8 + 5) Piercing damage, and the target has Disadvantage on the next attack roll it makes before the end of its next turn.
    senses: Darkvision 60 ft., Passive Perception 14
    languages:
    - Giant
  fr:
    name: Ettin
    subtype: null
    description: |-
      ## Actions

      ***Attaques multiples***. L'ettin effectue une attaque de Hache d'armes et une de Morgenstern.

      ***Hache d'armes***. *Corps à corps* : +7, allonge 1,50 m. *Touché* : 14 (2d8 + 5) dégâts tranchants. Si la cible est une créature de taille G ou inférieure, elle subit l'état À terre.

      ***Morgenstern***. *Corps à corps* : +7, allonge 1,50 m. *Touché* : 14 (2d8 + 5) dégâts perforants, et la cible subit un Désavantage à son prochain jet d'attaque intervenant avant la fin de son tour suivant.
    senses: Vision dans le noir 18 m, Perception passive 14
    languages:
    - géant
