id: mace-of-disruption
source: dmg_2024
type: weapon
rarity: rare
attunement: true
translations:
  en:
    name: Mace of Disruption
    subtype: Mace
    description: |-
      <p>When you hit a Fiend or an Undead with this magic weapon, that creature takes an extra 2d6 Radiant damage. If the target has 25 Hit Points or fewer after taking this damage, it must succeed on a DC 15 Wisdom saving throw or be destroyed. On a successful save, the creature has the Frightened condition until the end of your next turn.<br />
      <strong>Light</strong>. While you hold this weapon, it sheds Bright Light in a 20-foot radius and Dim Light for an additional 20 feet.</p>
  fr:
    name: Masse d'anéantissement
    subtype: masse d'armes
    description: |-
      <p>Lorsque vous touchez un Fiélon ou un Mort-vivant avec cette arme magique, cette créature subit 2d6 dégâts radiants supplémentaires. Si la cible a 25 points de vie ou moins après avoir subi ces dégâts, elle doit réussir un jet de sauvegarde de Sagesse DD 15 pour ne pas être détruite. En cas de réussite, la créature subit l'état Effrayé jusqu'à la fin de votre prochain tour.<br />
      <strong>Lumière</strong>. Lorsque vous tenez cette arme, elle diffuse une Lumière vive sur un rayon de 6 mètres et une Lumière faible sur 6 mètres supplémentaires.</p>
