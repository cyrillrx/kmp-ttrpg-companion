id: nolzur-s-marvelous-pigments
source: dmg_2024
type: wondrous_item
rarity: very_rare
attunement: false
translations:
  en:
    name: Nolzur's Marvelous Pigments
    subtype: null
    description: |-
      This fine wooden box contains 1d4 pots of pigment and a brush (weighing 1 pound in total).\
      Using the brush and expending 1 pot of pigment, you can paint any number of three-dimensional objects and terrain features (such as walls, doors, trees, flowers, weapons, webs, and pits), provided these elements are all confined to a 20-foot Cube. The effort takes 10 minutes (regardless of the number of elements you create), during which time you must remain in the Cube, and requires Concentration. If your Concentration is broken or you leave the Cube before the work is done, all the painted elements vanish, and the pot of pigment is wasted.\
      When the work is done, all the painted objects and terrain features become real. Thus, painting a door on a wall creates an actual door, which can be opened to whatever is beyond. Painting a pit creates a real pit, the entire depth of which must lie within the 20-foot Cube.\
      No object created by a pot of pigment can have a value greater than 25 GP, and the total value of all objects created by a pot of pigment can't exceed 500 GP. If you paint objects of greater value (such as a large pile of gold), they look authentic, but close inspection reveals they're made from paste, cookies, or some other worthless material.\
      If you paint a form of energy such as fire or lightning, the energy dissipates as soon as you complete the painting, doing no harm.
  fr:
    name: Pigments merveilleux de Nolzur
    subtype: null
    description: |-
      Cette belle boîte en bois contient 1d4 pots de pigment et un pinceau (d'un poids total de 500 g).\
      Avec le pinceau et en utilisant 1 pot de pigment, vous pouvez peindre autant d'objets et d'éléments de terrain tridimensionnels que vous le souhaitez (murs, portes, arbres, fleurs, armes, toiles et fosses), à condition que ces éléments soient tous confinés dans un Cube de 6 mètres. L'effort prend 10 minutes (quel que soit le nombre d'éléments créés), pendant lesquelles vous devez rester dans le Cube et faire preuve de Concentration. Si votre Concentration est rompue ou que vous quittez le Cube avant la fin du travail, tous les éléments peints disparaissent et le pot de pigment est gaspillé.\
      Une fois le travail terminé, tous les objets et éléments de terrain peints deviennent réels. Ainsi, peindre une porte sur un mur crée une porte réelle, qui peut être ouverte sur tout ce qui se trouve au-delà. Peindre une fosse crée une véritable fosse, dont toute la profondeur doit se situer dans le Cube de 6 mètres.\
      Aucun objet créé avec un pot de pigment ne peut valoir plus de 25 po, et la valeur totale de tous les objets créés avec un pot de pigment ne peut excéder 500 po. Si vous peignez des objets de plus grande valeur (comme une grosse pile d'or), ils paraissent authentiques, mais un examen attentif révèle qu'ils sont faits de pâte, de biscuits ou d'un autre matériau sans valeur.\
      Si vous peignez une forme d'énergie comme le feu ou la foudre, l'énergie se dissipe dès que vous terminez la peinture, sans causer de dommages.
