  fr:
    name: Sac à malices
    subtype: null
    description: |-
      <p>Ce sac en tissu gris, rouille ou brun semble vide. Cependant, en y plongeant la main, on découvre la présence d'un petit objet pelucheux.<br />
      Vous pouvez prendre une action Magie pour extraire l'objet pelucheux du sac et le lancer jusqu'à 6 mètres. Lorsqu'il touche le sol, l'objet se transforme en une créature que vous déterminez en lançant un dé sur la table correspondant à la couleur du sac. Consultez le <em>Manuel des Monstres</em> pour le profil de la créature. La créature disparaît à l'aube suivante ou lorsqu'elle est réduite à 0 point de vie.<br />
      La créature est amicale envers vous et vos alliés, et elle agit immédiatement après vous dans l'ordre de l'Initiative. Vous pouvez prendre une action Bonus pour commander les déplacements de la créature et son action lors de son prochain tour, comme attaquer un ennemi. En l'absence de tels ordres, la créature agit de manière appropriée à sa nature.<br />
      Une fois trois objets pelucheux extraits du sac, celui-ci ne peut plus être utilisé avant l'aube suivante.  </p>
