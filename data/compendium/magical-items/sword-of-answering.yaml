id: sword-of-answering
source: dmg_2024
type: weapon
rarity: legendary
attunement: true
translations:
  en:
    name: Sword of Answering
    subtype: Longsword
    description: You gain a +3 bonus to attack rolls and damage rolls made with this
      sword. In addition, while you hold the sword, you can take a Reaction to make
      one melee attack with it against any creature in your reach that deals damage
      to you. You have Advantage on the attack roll, and any damage dealt with this
      special attack ignores any Immunity or Resistance the target has to that damage.
  fr:
    name: Épée de réponse
    subtype: épée longue
    description: Vous obtenez un bonus de +3 aux jets d'attaque et de dégâts effectués
      avec cette épée. De plus, tant que vous tenez l'épée, vous pouvez prendre une
      Réaction pour effectuer une attaque de corps à corps contre toute créature dans
      votre allonge qui vous inflige des dégâts. Vous avez un Avantage au jet d'attaque,
      et les dégâts infligés par cette attaque spéciale ignorent toute Immunité ou
      Résistance de la cible à ce type de dégâts.
