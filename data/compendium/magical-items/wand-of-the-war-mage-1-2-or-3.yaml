id: wand-of-the-war-mage-1-2-or-3
source: dmg_2024
type: wand
rarity: uncommon
attunement: true
translations:
  en:
    name: Wand of the War Mage, +1, +2, or +3
    subtype: null
    description: <p>While holding this wand, you gain a bonus to spell attack rolls
      determined by the wand's rarity. In addition, you ignore Half Cover when making
      a spell attack roll.</p>
  fr:
    name: Baguette du mage de guerre +1, +2 ou +3
    subtype: null
    description: <p>Lorsque vous tenez cette baguette, vous bénéficiez d'un bonus
      aux jets d'attaque de sort déterminé par sa rareté. De plus, vous ignorez l'Abri
      partiel lors d'un jet d'attaque de sort.</p>
