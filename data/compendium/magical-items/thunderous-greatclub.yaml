id: thunderous-greatclub
source: dmg_2024
type: weapon
rarity: very_rare
attunement: true
translations:
  en:
    name: Thunderous Greatclub
    subtype: Greatclub
    description: |-
      While you are attuned to this magic weapon, your Strength is 20 unless your Strength is already equal to or greater than that score. The weapon deals an extra 1d8 Thunder damage to any creature it hits and an extra 3d8 Thunder damage to objects it hits that aren't being worn or carried.
      
      The weapon has the following additional properties.
      
      **Clap of Thunder**. As a Magic action, you can strike the weapon against a hard surface to create a loud clap of thunder audible out to 300 feet. You also create a 30-foot Cone of thunderous energy. Each creature in the Cone must succeed on a DC 15 Strength saving throw or have the Prone condition. Nonmagical objects in the Cone that aren't being worn or carried take 3d8 Thunder damage.
      
      **Earthquake**. As a Magic action, you can strike the weapon against the ground to create an intense seismic disturbance in a 50-foot-radius circle centered on the point of impact. Structures in contact with the ground in that area take 50 Bludgeoning damage, and each creature on the ground in that area must succeed on a DC 20 Dexterity saving throw or have the Prone condition. If that creature is also concentrating, it must succeed on a DC 20 Constitution saving throw or its Concentration is broken. In addition, you can cause a 30-foot-deep, 10-foot-wide fissure to open up on the ground anywhere in the area. Any creature on a spot where the fissure opens must succeed on a DC 20 Dexterity saving throw, falling into the fissure on a failed save or moving with the fissure's edge on a successful one. Any structure on a spot where the fissure opens collapses into the fissure. Once you use this property, it can't be used again until the next dawn.
  fr:
    name: Massue tonnante
    subtype: massue
    description: |-
      Lorsque vous êtes lié à cette arme magique, votre Force est de 20, sauf si elle est déjà égale ou supérieure à cette valeur. L'arme inflige 1d8 dégâts de tonnerre supplémentaires à toute créature touchée et 3d8 dégâts de tonnerre supplémentaires aux objets touchés qui ne sont pas portés.
      
      L'arme possède les propriétés supplémentaires suivantes :
      
      **Coup de tonnerre**. Par une action Magie, vous pouvez frapper l'arme contre une surface dure pour créer un puissant coup de tonnerre audible à 90 mètres. Vous créez également un Cône d'énergie tonitruante de 9 mètres. Chaque créature dans le Cône doit réussir un jet de sauvegarde de Force DD 15 ou subir l'état À terre. Les objets non magiques dans le Cône qui ne sont pas portés subissent 3d8 dégâts de tonnerre.
      
      **Tremblement de terre**. Par une action Magie, vous pouvez frapper le sol avec l'arme pour créer une intense perturbation sismique dans un cercle de 15 mètres de rayon centré sur le point d'impact. Les structures en contact avec le sol dans cette zone subissent 50 dégâts contondants, et chaque créature au sol dans cette zone doit réussir un jet de sauvegarde de Dextérité DD 20 ou subir l'état À terre. Si cette créature est également concentrée, elle doit réussir un jet de sauvegarde de Constitution DD 20 ou perdre sa Concentration. De plus, vous pouvez créer une fissure de 9 mètres de profondeur et 3 mètres de large au sol, n'importe où dans la zone. Toute créature se trouvant à l'endroit où la fissure s'ouvre doit réussir un jet de sauvegarde de Dextérité DD 20, tombant dans la fissure en cas d'échec ou se déplaçant sur le bord de la fissure en cas de réussite. Toute structure se trouvant à l'endroit où la fissure s'ouvre s'effondre dans la fissure. Une fois cette propriété utilisée, elle ne peut plus être utilisée avant l'aube suivante.
