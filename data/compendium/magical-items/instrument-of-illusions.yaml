id: instrument-of-illusions
source: dmg_2024
type: wondrous_item
rarity: common
attunement: false
translations:
  en:
    name: Instrument of Illusions
    subtype: null
    description: <p>While you are playing this musical instrument, you can take a
      Magic action to create harmless, illusory visual effects within a 5-foot Emanation
      originating from the instrument. If you are a Bard, the size of the Emanation
      increases to 15 feet. Sample visual effects include luminous musical notes,
      a spectral dancer, butterflies, and gently falling snow. The magical effects
      have neither substance nor sound, and they are obviously illusory. The effects
      end when you stop playing.</p>
  fr:
    name: Instrument à illusions
    subtype: null
    description: <p>Lorsque vous jouez de cet instrument, vous pouvez prendre une
      action Magie pour créer des effets visuels illusoires et inoffensifs dans une
      Émanation de 1,50 mètre de rayon centrée sur l'instrument. Si vous êtes un barde,
      la taille de l'Émanation passe à 4,50 mètres. Parmi ces effets visuels, on peut
      citer des notes de musique lumineuses, une danseuse spectrale, des papillons
      ou une douce chute de neige. Ces effets magiques sont immatériels et illusoires.
      Ils cessent dès que vous cessez de jouer.</p>
