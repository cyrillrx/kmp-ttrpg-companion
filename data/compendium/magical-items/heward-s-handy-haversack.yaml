id: heward-s-handy-haversack
source: dmg_2024
type: wondrous_item
rarity: rare
attunement: false
translations:
  en:
    name: Heward's Handy Haversack
    subtype: null
    description: |-
      This backpack has a central pouch and two side pouches, each of which is an extradimensional space. Each side pouch can hold up to 200 pounds of material, not exceeding a volume of 25 cubic feet. The central pouch can hold up to 500 pounds of material, not exceeding a volume of 64 cubic feet. The haversack always weighs 5 pounds, regardless of its contents.\
      Retrieving an item from the haversack requires a Utilize action or a Bonus Action (your choice). When you reach into the haversack for a specific item, the item is always magically on top.\
      If any of its pouches is overloaded, pierced, or torn, the haversack ruptures and is destroyed. If the haversack is destroyed, its contents are lost forever, although an Artifact always turns up again somewhere. If the haversack is turned inside out, its contents spill forth unharmed, and the haversack must be put right before it can be used again.\
      Each pouch of the haversack holds enough air for 10 minutes of breathing, divided by the number of breathing creatures inside.\
      Placing the haversack inside an extradimensional space created by a *Bag of Holding* , *Portable Hole* , or similar item instantly destroys both items and opens a gate to the Astral Plane. The gate originates where the one item was placed inside the other. Any creature within 10 feet of the gate and not behind Total Cover is sucked through it and deposited in a random location on the Astral Plane. The gate then closes. The gate is one-way only and can't be reopened.
  fr:
    name: Havresac d'Huard
    subtype: null
    description: |-
      Ce sac à dos est doté d'une poche centrale et de deux poches latérales, chacune constituant un espace extradimensionnel. Chaque poche latérale peut contenir jusqu'à 100 kg de matériel, sans dépasser un volume de 700 litres. La poche centrale peut contenir jusqu'à 250 kg de matériel, sans dépasser un volume de 1800 litres. Le sac pèse toujours 2,5 kg, quel que soit son contenu.\
      Récupérer un objet du sac nécessite une action Utilisation ou une action Bonus (au choix). Lorsque vous y plongez la main pour récupérer un objet spécifique, celui-ci se retrouve toujours magiquement au-dessus.\
      Si l'une de ses poches est surchargée, percée ou déchirée, le sac se rompt et est détruit. S'il est détruit, son contenu est perdu à jamais, mais un Artefact réapparaît toujours quelque part. Si le sac est retourné, son contenu se répand sans dommage, et il doit être remis en place avant de pouvoir être réutilisé.\
      Chaque poche du sac à dos contient suffisamment d'air pour 10 minutes de respiration, divisées par le nombre de créatures qui y respirent.\
      Placer le sac à dos dans un espace extradimensionnel créé par un *sac sans fond* , un *puits portable* ou tout objet similaire détruit instantanément les deux objets et ouvre un portail vers le plan Astral. Le portail prend naissance là où l'un des objets a été placé dans l'autre. Toute créature dans un rayon de 3 mètres autour du portail et non protégée par un Abri total est aspirée et déposée dans un lieu aléatoire du plan Astral. Le portail se ferme ensuite. Il est à sens unique et ne peut être rouvert.
