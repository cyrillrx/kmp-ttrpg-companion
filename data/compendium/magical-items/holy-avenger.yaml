id: holy-avenger
source: dmg_2024
type: weapon
rarity: legendary
attunement: true
translations:
  en:
    name: Holy Avenger
    subtype: Any Simple or Martial
    description: |-
      You gain a +3 bonus to attack rolls and damage rolls made with this magic weapon. When you hit a Fiend or an Undead with it, that creature takes an extra 2d10 Radiant damage.\
      While you hold the drawn weapon, it creates a 10-foot Emanation originating from you. You and all creatures Friendly to you in the Emanation have Advantage on saving throws against spells and other magical effects. If you have 17 or more levels in the Paladin class, the size of the Emanation increases to 30 feet.
  fr:
    name: Vengeresse sacrée
    subtype: courante ou de guerre
    description: |-
      Vous bénéficiez d'un bonus de +3 aux jets d'attaque et de dégâts effectués avec cette arme magique. Lorsque vous touchez un Fiélon ou un Mort-vivant avec cette arme, la créature subit 2d10 dégâts radiants supplémentaires.\
      Lorsque vous tenez l'arme au clair, elle crée une Émanation de 3 mètres centrée sur vous. Vous et toutes les créatures amies dans l'Émanation bénéficiez d'un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques. Si vous avez 17 niveaux ou plus dans la classe de Paladin, la taille de l'Émanation passe à 9 mètres.
