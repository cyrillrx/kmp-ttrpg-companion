id: mariner-s-armor
source: dmg_2024
type: armor
rarity: uncommon
attunement: false
translations:
  en:
    name: Mariner's Armor
    subtype: Any Light, Medium, or Heavy
    description: |-
      <p>While wearing this armor, you have a Swim Speed equal to your Speed. In addition, if you start your turn underwater with 0 Hit Points, you immediately regain 1d4 Hit Points. The armor can't heal anyone again until the next dawn.<br />
      The armor is decorated with fish and shell motifs.</p>
  fr:
    name: Armure du matelot
    subtype: légère, intermédiaire ou lourde
    description: |-
      <p>Lorsque vous portez cette armure, vous avez une Vitesse de nage égale à votre Vitesse. De plus, si vous commencez votre tour sous l'eau avec 0 point de vie, vous regagnez immédiatement 1d4 points de vie. L'armure ne peut plus soigner personne avant l'aube suivante.<br />
      L'armure est décorée de motifs de poissons et de coquillages.</p>
