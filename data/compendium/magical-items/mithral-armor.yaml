id: mithral-armor
source: dmg_2024
type: armor
rarity: uncommon
attunement: false
translations:
  en:
    name: Mithral Armor
    subtype: Any Medium or Heavy, Except Hide Armor
    description: |-
      Mithral is a light, flexible metal. Armor made of this substance can be worn under normal clothes. If the armor normally imposes Disadvantage on Dexterity (Stealth) checks or has a Strength requirement, the mithral version of the armor doesn't.
  fr:
    name: Armure de mithral
    subtype: intermédiaire ou lourde, sauf armure de peaux
    description: |-
      Le mithral est un métal léger et flexible. Les armures fabriquées dans cette substance peuvent être portées sous des vêtements normaux. Si l'armure impose normalement un Désavantage aux jets de Dextérité (Discrétion) ou une condition de Force, la version en mithral ne l'impose pas.
