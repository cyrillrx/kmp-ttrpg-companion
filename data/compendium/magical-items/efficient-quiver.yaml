id: efficient-quiver
source: srd_5.1
type: wondrous_item
rarity: uncommon
attunement: false
translations:
  en:
    name: Efficient Quiver
    subtype: null
    description: |-
      This quiver has three compartments, each connected to an extradimensional space that allows it to hold many objects without ever weighing more than 2 pounds. The shortest compartment can hold up to sixty arrows, bolts, or similar objects. The medium-sized compartment can hold up to eighteen javelins or similar objects, and the longest can hold up to six long objects, such as bows, staffs, or spears.

      You can draw these objects from the quiver as you would from a normal quiver or scabbard.
  fr:
    name: Carquois efficace
    subtype: null
    description: |-
      Ce carquois dispose de trois compartiments, chacun étant relié à un espace extradimensionnel qui lui permet de contenir de nombreux objets sans jamais peser plus de 1 kilo. Le compartiment le plus court peut accueillir jusqu'à soixante flèches, carreaux ou objets similaires. Le compartiment de taille intermédiaire peut recevoir jusqu'à dix-huit javelines ou objets similaires et le plus long peut contenir six objets tout en longueur, comme des arcs, des bâtons ou des lances.

      Vous pouvez tirer ces objets du carquois comme vous le feriez avec un carquois ou un fourreau ordinaire.
