id: mirror-of-life-trapping
source: dmg_2024
type: wondrous_item
rarity: very_rare
attunement: false
translations:
  en:
    name: Mirror of Life Trapping
    subtype: null
    description: |-
      <p>When this 4-foot-tall, 2-foot-wide mirror is viewed indirectly, its surface shows faint images of creatures. The mirror weighs 50 pounds, and it has AC 11, HP 10, Immunity to Poison and Psychic damage, and Vulnerability to Bludgeoning damage. It shatters and is destroyed when reduced to 0 Hit Points.<br />
      If the mirror is hanging on a vertical surface and you are within 5 feet of it, you can take a Magic action and use a command word to activate it. It remains activated until you take a Magic action and repeat the command word to deactivate it.<br />
      Any creature other than you that sees its reflection in the activated mirror while within 30 feet of the mirror must succeed on a DC 15 Charisma saving throw or be trapped, along with anything it is wearing or carrying, in one of the mirror's twelve extradimensional cells. A creature that knows the mirror's nature makes the save with Advantage, and Constructs succeed on the save automatically.<br />
      An extradimensional cell is an infinite expanse filled with thick fog that reduces visibility to 10 feet. Creatures trapped in the mirror's cells don't age, and they don't need to eat, drink, or sleep. A creature trapped within a cell can escape using magic that permits planar travel. Otherwise, the creature is confined to the cell until freed.<br />
      If the mirror traps a creature but its twelve extradimensional cells are already occupied, the mirror frees one trapped creature at random to accommodate the new prisoner. A freed creature appears in an unoccupied space within sight of the mirror but facing away from it. If the mirror is shattered, all creatures it contains are freed and appear in unoccupied spaces near it.<br />
      While within 5 feet of the mirror, you can take a Magic action to name one creature trapped in it or call out a particular cell by number. The creature named or contained in the named cell appears as an image on the mirror's surface. You and the creature can then communicate.<br />
      In a similar way, you can take a Magic action and use a second command word to free one creature trapped in the mirror. The freed creature appears, along with its possessions, in the unoccupied space nearest to the mirror and facing away from it.<br />
      Placing the mirror inside an extradimensional space created by a <em>Bag of Holding</em> , <em>Portable Hole</em> , or similar item instantly destroys both items and opens a gate to the Astral Plane. The gate originates where the one item was placed inside the other. Any creature within 10 feet of the gate and not behind Total Cover is sucked through it to a random location on the Astral Plane. The gate then closes. The gate is one-way only and can't be reopened.</p>
  fr:
    name: Miroir d'emprisonnement
    subtype: null
    description: |-
      <p>Lorsqu'on regarde indirectement dans ce miroir de 1,20 m de haut et 60 cm de large, sa surface laisse apparaître de faibles images de créatures. Il pèse 25 kg et possède une CA de 11, 10 pv, une Immunité au poison et aux dégâts psychiques, ainsi qu'une Vulnérabilité aux dégâts contondants. Il se brise et est détruit lorsqu'il est réduit à 0 point de vie.<br />
      Si le miroir est accroché à une surface verticale et que vous vous trouvez à 1,50 m ou moins de lui, vous pouvez prendre une action Magie et utiliser un mot de commande pour l'activer. Il reste activé jusqu'à ce que vous preniez une action Magie et répétiez le mot de commande pour le désactiver.<br />
      Toute créature autre que vous qui voit son reflet dans le miroir activé et se trouve dans un rayon de 9 m de celui-ci doit réussir un jet de sauvegarde de Charisme DD 15 sous peine d'être piégée, avec tout ce qu'elle porte, dans l'une des douze cellules extradimensionnelles du miroir. Une créature connaissant la nature du miroir réussit ce jet avec un Avantage, et les Artificiels le réussissent automatiquement. Une cellule extradimensionnelle est une étendue infinie recouverte d'un épais brouillard qui réduit la visibilité à 3 mètres. Les créatures piégées dans les cellules du miroir ne vieillissent pas et n'ont pas besoin de manger, de boire ou de dormir. Une créature emprisonnée dans une cellule peut s'échapper grâce à une magie qui permet le voyage entre les plans. Sinon, la créature y est confinée jusqu'à sa libération.<br />
      Si le miroir piège une créature mais que ses douze cellules extradimensionnelles sont déjà occupées, il libère une créature piégée au hasard pour accueillir le nouveau prisonnier. Une créature libérée apparaît dans un espace libre que vous pouvez voir à côté du miroir, mais lui tournant le dos. Si le miroir est brisé, toutes les créatures qu'il contient sont libérées et apparaissent dans les espaces libres proches.<br />
      Dans un rayon de 1,50 mètre autour du miroir, vous pouvez prendre une action Magie pour nommer une créature piégée ou nommer une cellule particulière par son numéro. La créature nommée ou contenue dans la cellule nommée apparaît sous forme d'image à la surface du miroir. Vous et la créature pouvez alors communiquer. De la même manière, vous pouvez prendre une action Magie et utiliser un second mot de commande pour libérer une créature piégée dans le miroir. La créature libérée apparaît, avec ses possessions, dans l'espace libre le plus proche du miroir et lui faisant face.<br />
      Placer le miroir dans un espace extradimensionnel créé par un <em>sac sans fond</em> , un <em>puits portable</em> ou tout autre objet similaire détruit instantanément les deux objets et ouvre un portail vers le plan Astral. Le portail prend naissance là où l'un des objets a été placé dans l'autre. Toute créature dans un rayon de 3 mètres autour du portail et non protégée par un Abri total est aspirée et déposée dans un lieu aléatoire du plan Astral. Le portail se ferme ensuite. Il est à sens unique et ne peut être rouvert.</p>
