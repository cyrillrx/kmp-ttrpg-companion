id: pipes-of-the-sewers
source: dmg_2024
type: wondrous_item
rarity: uncommon
attunement: true
translations:
  en:
    name: Pipes of the Sewers
    subtype: null
    description: |-
      <p>While these pipes are on your person, ordinary rats and giant rats are Indifferent toward you and won't attack you unless you threaten or harm them.<br />
      The pipes have 3 charges and regain 1d3 expended charges daily at dawn. If you play the pipes as a Magic action, you can take a Bonus Action to expend 1 to 3 charges, calling forth one <strong><a href="https://www.aidedd.org/monster/swarm-of-rats">Swarm of Rats</a></strong> with each expended charge if enough rats are within half a mile of you to be called in this fashion (as determined by the DM). If there aren't enough rats to form a swarm, the charge is wasted. Called swarms move toward the music by the shortest available route but aren't under your control otherwise.<br />
      Whenever a <strong>Swarm of Rats</strong> that isn't under another creature's control comes within 30 feet of you while you are playing the pipes, the swarm makes a DC 15 Wisdom saving throw. On a successful save, the swarm behaves as it normally would and can't be swayed by the pipes' music for the next 24 hours. On a failed save, the swarm is swayed by the pipes' music and becomes Friendly to you and your allies for as long as you continue to play the pipes each round as a Magic action. A Friendly swarm obeys your commands. If you issue no commands to a Friendly swarm, it defends itself but otherwise takes no actions. If a Friendly swarm starts its turn more than 30 feet away from you, your control over that swarm ends, and the swarm behaves as it normally would and can't be swayed by the pipes' music for the next 24 hours.</p>
  fr:
    name: Flûte des égouts
    subtype: null
    description: |-
      <p>Lorsque vous portez ces flûtes, les rats ordinaires et les rats géants sont indifférents à votre égard et ne vous attaqueront que si vous les menacez ou les blessez.<br />
      Les flûtes ont 3 charges et récupèrent 1d3 charges dépensées chaque jour à l'aube. Si vous jouez les flûtes par une action Magie, vous pouvez prendre une action Bonus pour dépenser 1 à 3 charges, invoquant une <strong><a href="https://www.aidedd.org/monster/fr/nuee-de-rats">nuée de rats</a></strong> pour chaque charge dépensée si suffisamment de rats se trouvent dans un rayon de 750 m pour être appelés de cette manière (à la décision du MD). S'il n'y a pas assez de rats pour former une nuée, la charge est gaspillée. Les nuées appelées se dirigent vers la musique par le chemin le plus court, mais ne sont pas sous votre contrôle.<br />
      Lorsqu'une <strong>nuée de rats</strong> non contrôlée par une autre créature s'approche à 9 mètres ou moins de vous pendant que vous jouez les flûtes, la nuée effectue un jet de sauvegarde de Sagesse DD 15. En cas de sauvegarde réussie, la nuée se comporte normalement et ne peut être influencée par la musique des flûtes pendant les 24 heures suivantes. En cas d'échec, la nuée est influencée par la musique des flûtes et devient amicale envers vous et vos alliés tant que vous continuez à jouer des flûtes à chaque tour (action Magie). Une nuée amicale obéit à vos ordres. Si vous ne lui donnez aucun ordre, elle se défend, mais n'effectue aucune autre action. Si une nuée amicale commence son tour à plus de 9 mètres de vous, votre contrôle sur celle-ci prend fin, elle se comporte normalement et ne peut être influencée par la musique des flûtes pendant les 24 heures suivantes.</p>
