id: iron-flask
source: dmg_2024
type: wondrous_item
rarity: legendary
attunement: false
translations:
  en:
    name: Iron Flask
    subtype: null
    description: |-
      While holding this brass-stoppered iron flask, you can take a Magic action to target a creature that you can see within 60 feet of yourself. If the flask is empty and the target is native to a plane of existence other than the one you're on, the target must succeed on a DC 17 Wisdom saving throw or be trapped in the flask. If the target has been trapped by the flask before, it has Advantage on the save. Once trapped, a creature remains in the flask until released. The flask can hold only one creature at a time. A creature trapped in the flask doesn't age and doesn't need to breathe, eat, or drink.

      You can take a Magic action to remove the flask's stopper and release the creature in the flask. The creature then obeys your commands for 1 hour, understanding those commands even if it doesn't know the language in which the commands are given. If you issue no commands or give the creature a command that is likely to result in its death or imprisonment, it defends itself but otherwise takes no actions. At the end of the duration, the creature acts in accordance with its normal disposition and alignment.

      An *[Identify](https://www.aidedd.org/spell/identify)* spell reveals if the flask contains a creature, but the only way to determine the type of creature is to open the flask. A newly discovered *Iron Flask* might already contain a creature chosen by the DM or determined randomly by rolling on the following table.

      | 1d100 | Contents |
      | --- | --- |
      | 01–50 | No creature |
      | 51 | Arcanaloth |
      | 52–54 | Bone Devil |
      | 55–56 | Cambion |
      | 57–58 | Dao |
      | 59 | Deva |
      | 60–61 | Djinni |
      | 62–63 | Efreeti |
      | 64–65 | Erinyes |
      | 66–67 | Fomorian |
      | 68 | Githyanki Knight |
      | 69 | Githzerai Zerth |
      | 70–71 | Glabrezu |
      | 72–74 | Hezrou |
      | 75 | Incubus |
      | 76–77 | Invisible Stalker |
      | 78–79 | Marid |
      | 80 | Marilith |
      | 81–82 | Mezzoloth |
      | 83–84 | Nalfeshnee |
      | 85–86 | Night Hag |
      | 87–88 | Nycaloth |
      | 89 | Planetar |
      | 90–91 | Red Slaad |
      | 92–93 | Salamander |
      | 94 | Solar |
      | 95 | Succubus |
      | 96 | Ultroloth |
      | 97–99 | Vrock |
      | 00 | Xorn |
  fr:
    name: Flasque de fer
    subtype: null
    description: |-
      Lorsque vous tenez cette fiole de fer au bouchon en laiton, vous pouvez prendre une action Magie pour cibler une créature que vous pouvez voir dans un rayon de 18 mètres. Si la fiole est vide et que la cible est originaire d'un plan d'existence autre que celui où vous vous trouvez, elle doit réussir un jet de sauvegarde de Sagesse DD 17 pour ne pas être piégée dans la fiole. Si la cible a déjà été piégée par la fiole, elle bénéficie d'un Avantage. Une fois piégée, une créature reste dans la fiole jusqu'à sa libération. La fiole ne peut contenir qu'une seule créature à la fois. Une créature piégée dans la fiole ne vieillit pas et n'a pas besoin de respirer, de manger ni de boire.

      Vous pouvez prendre une action Magie pour retirer le bouchon de la fiole et libérer la créature qu'elle contient. La créature obéit alors à vos ordres pendant 1 heure, les comprenant même si elle ne connaît pas la langue dans laquelle ils sont donnés. Si vous ne donnez aucun ordre à la créature ou si vous lui donnez un ordre susceptible de la tuer ou de l'emprisonner, elle se défend, mais n'entreprend aucune autre action. À la fin de la durée, la créature agit conformément à sa personnalité et à son alignement.

      Un sort d'*[identification](https://www.aidedd.org/spell/fr/identification)* révèle si la fiole contient une créature, mais le seul moyen de déterminer le type de créature est de l'ouvrir. Une *flasque de fer* récemment découverte peut déjà contenir une créature choisie par le MD ou déterminée aléatoirement par un jet de dés sur la table suivante.

      | 1d100 | Contenu |
      | --- | --- |
      | 01–50 | Pas de créature |
      | 51 | Arcanaloth |
      | 52–54 | Diable osseux |
      | 55–56 | Cambion |
      | 57–58 | Dao |
      | 59 | Déva |
      | 60–61 | Djinn |
      | 62–63 | Éfrit |
      | 64–65 | Érinye |
      | 66–67 | Fomoire |
      | 68 | Chevalier githyanki |
      | 69 | Githzerai Zerth |
      | 70–71 | Glabrezu |
      | 72–74 | Hezrou |
      | 75 | Incube |
      | 76–77 | Traqueur invisible |
      | 78–79 | Maride |
      | 80 | Marilith |
      | 81–82 | Mezzoloth |
      | 83–84 | Nalfeshnie |
      | 85–86 | Guenaude nocturne |
      | 87–88 | Nycaloth |
      | 89 | Planétar |
      | 90–91 | Slaad rouge |
      | 92–93 | Salamandre |
      | 94 | Solar |
      | 95 | Succube |
      | 96 | Ultroloth |
      | 97–99 | Vrock |
      | 00 | Xorn |
