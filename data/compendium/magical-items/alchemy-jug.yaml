id: alchemy-jug
source: dmg_2024
type: wondrous_item
rarity: uncommon
attunement: false
translations:
  en:
    name: Alchemy Jug
    subtype: null
    description: |-
      This ceramic jug appears to be able to hold a gallon of liquid and weighs 12 pounds whether full or empty. The jug sloshes when it is shaken, even if the jug is empty.\
      You can take a Magic action and name one liquid from the table to cause the jug to produce the chosen liquid. Afterward, you can uncork the jug as a Utilize action and pour that liquid out, up to 2 gallons per minute. The maximum amount of liquid the jug can produce depends on the liquid you named.\
      Once the jug starts producing a liquid, it can't produce a different one, or more of one that has reached its maximum, until the next dawn.\
      | Liquid | Max. Amount |
      | --- | --- |
      | Acid | 8 ounces |
      | Basic Poison | 4 ounces |
      | Beer | 4 gallons |
      | Honey | 1 gallon |
      | Mayonnaise | 2 gallons |
      | Oil | 1 quart |
      | Vinegar | 2 gallons |
      | Water, fresh | 8 gallons |
      | Water, salt | 12 gallons |
      | Wine | 1 gallon |
  fr:
    name: Cruche alchimique
    subtype: null
    description: |-
      Cette cruche en céramique semble pouvoir contenir 4 litres de liquide et pèse 6 kg, qu'elle soit pleine ou vide. On entend un clapotis lorsqu'on la secoue, même si elle est vide.\
      Vous pouvez prendre une action Magie et nommer un liquide de la table suivante afin que la cruche produise le liquide choisi. Vous pouvez ensuite déboucher la cruche avec une action Utilisation et verser ce liquide, jusqu'à 8 litres par minute. La quantité maximale de liquide que la cruche peut produire dépend du liquide nommé.\
      Lorsque la cruche commence à produire un liquide, elle ne peut pas en produire un autre, ni augmenter la quantité d'un liquide ayant atteint sa limite maximale, avant l'aube suivante.\
      | Liquide | Quantité maximale |
      | --- | --- |
      | Acide | 25 cl |
      | Poison standard | 12,50 cl |
      | Bière | 16 litres |
      | Miel | 4 litres |
      | Mayonnaise | 8 litres |
      | Huile | 1 litre |
      | Vinaigre | 8 litres |
      | Eau douce | 32 litres |
      | Eau salée | 48 litres |
      | Vin | 4 litres |
