id: luck-blade
source: dmg_2024
type: weapon
rarity: legendary
attunement: true
translations:
  en:
    name: Luck Blade
    subtype: Glaive, Greatsword, Longsword, Rapier, Scimitar, Sickle, or Shortsword
    description: |-
      <p>You gain a +1 bonus to attack rolls and damage rolls made with this magic weapon. While the weapon is on your person, you also gain a +1 bonus to saving throws.<br />
      <strong>Luck</strong>. If the weapon is on your person, you can call on its luck (no action required) to reroll one failed D20 Test if you don't have the Incapacitated condition. You must use the second roll. Once used, this property can't be used again until the next dawn.<br />
      <strong>Wish</strong>. The weapon has 1d3 charges. While holding it, you can expend 1 charge and cast <em>Wish</em> from it. Once used, this property can't be used again until the next dawn. The weapon loses this property if it has no charges.</p>
  fr:
    name: Lame porte-bonheur
    subtype: coutille, épée à deux mains, épée longue, rapière, cimeterre ou épée
      courte
    description: |-
      <p>Vous obtenez un bonus de +1 aux jets d'attaque et de dégâts effectués avec cette arme magique. Lorsque vous portez l'arme, vous obtenez également un bonus de +1 aux jets de sauvegarde.<br />
      <strong>Chance</strong>. Si vous portez l'arme, vous pouvez faire appel à sa chance (aucune action requise) pour relancer un d20 raté si vous n'avez pas l'état Incapable d'agir. Vous devez utiliser le second jet. Une fois utilisée, cette propriété ne peut plus être utilisée avant l'aube suivante.<br />
      <strong>Souhait</strong>. L'arme possède 1d3 charges. Lorsque vous la tenez, vous pouvez dépenser 1 charge et lancer <em>souhait</em> depuis elle. Une fois utilisée, cette propriété ne peut plus être utilisée avant l'aube suivante. L'arme perd cette propriété si elle n'a plus de charges.</p>
