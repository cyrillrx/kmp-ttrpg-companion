id: trident-of-fish-command
source: dmg_2024
type: weapon
rarity: uncommon
attunement: true
translations:
  en:
    name: Trident of Fish Command
    subtype: Trident
    description: <p>This magic weapon has 3 charges, and it regains 1d3 expended charges
      daily at dawn. While you carry it, you can expend 1 charge to cast <em><a href="https://www.aidedd.org/spell/dominate-beast">Dominate
      Beast</a></em> (save DC 15) from it on a Beast that has a Swim Speed.</p>
  fr:
    name: Trident de domination aquatique
    subtype: trident
    description: <p>Cette arme magique possède 3 charges et récupère 1d3 charges dépensées
      chaque jour à l'aube. Lorsque vous la portez, vous pouvez dépenser 1 charge
      pour lancer <em><a href="https://www.aidedd.org/spell/fr/domination-de-bete">domination
      de bête</a></em> (sauvegarde DD 15) sur une Bête dotée d'une Vitesse de nage.</p>
