id: mystery-key
source: dmg_2024
type: wondrous_item
rarity: common
attunement: false
translations:
  en:
    name: Mystery Key
    subtype: null
    description: |-
      A question mark is worked into the head of this key. The key has a 5 percent chance of unlocking any lock into which it's inserted. Once it unlocks something, the key disappears.
  fr:
    name: Clef mystérieuse
    subtype: null
    description: |-
      Un point d'interrogation est gravé sur la tête de cette clé. Elle a 5 % de chances d'ouvrir n'importe quelle serrure. Une fois qu'elle a ouvert une serrure, la clé disparaît.
