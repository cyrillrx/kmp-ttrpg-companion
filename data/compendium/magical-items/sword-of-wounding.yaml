id: sword-of-wounding
source: dmg_2024
type: weapon
rarity: rare
attunement: true
translations:
  en:
    name: Sword of Wounding
    subtype: Glaive, Greatsword, Longsword, Rapier, Scimitar, or Shortsword
    description: |-
      When you hit a creature with an attack using this magic weapon, the target takes an extra 2d6 Necrotic damage and must succeed on a DC 15 Constitution saving throw or be unable to regain Hit Points for 1 hour. The target repeats the save at the end of each of its turns, ending the effect on itself on a success.
  fr:
    name: Épée mordante
    subtype: coutille, épée à deux mains, épée longue, rapière, cimeterre ou épée
      courte
    description: |-
      Lorsque vous touchez une créature avec une attaque utilisant cette arme magique, la cible subit 2d6 dégâts nécrotiques supplémentaires et doit réussir un jet de sauvegarde de Constitution DD 15, sous peine de ne pas pouvoir récupérer de points de vie pendant 1 heure. La cible renouvelle ce jet à la fin de chacun de ses tours, mettant fin à l'effet en cas de réussite.
