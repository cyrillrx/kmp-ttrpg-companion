id: staff-of-swarming-insects
source: dmg_2024
type: staff
rarity: rare
attunement: true
translations:
  en:
    name: Staff of Swarming Insects
    subtype: null
    description: |-
      This staff has 10 charges.\
      **Insect Cloud**. While holding the staff, you can take a Magic action and expend 1 charge to cause a swarm of harmless flying insects to fill a 30-foot Emanation originating from you. The insects remain for 10 minutes, making the area Heavily Obscured for creatures other than you. A strong wind (like that created by *[Gust of Wind](https://www.aidedd.org/spell/gust-of-wind)*) disperses the swarm and ends the effect.\
      **Spells**. While holding the staff, you can cast one of the spells on the following table from it, using your spell save DC and spell attack modifier. The table indicates how many charges you must expend to cast the spell.\
      | Spell | Charge Cost |
      | --- | --- |
      | *[Giant Insect](https://www.aidedd.org/spell/giant-insect)* | 4 |
      | *[Insect Plague](https://www.aidedd.org/spell/insect-plague)* | 5 |

      **Regaining Charges**. The staff regains 1d6 + 4 expended charges daily at dawn. If you expend the last charge, roll 1d20. On a 1, a swarm of insects consumes and destroys the staff, then disperses.
  fr:
    name: Bâton du grand essaim
    subtype: null
    description: |-
      Ce bâton possède 10 charges.\
      **Nuage d'insectes**. Lorsque vous tenez le bâton, vous pouvez prendre une action Magie et dépenser 1 charge pour qu'une nuée d'insectes volants inoffensifs remplisse une Émanation de 9 mètres centrée sur vous. Les insectes restent sur place pendant 10 minutes, rendant la zone à Visibilité nulle pour les créatures autres que vous. Un vent fort (comme celui créé par *[bourrasque](https://www.aidedd.org/spell/fr/bourrasque)*) disperse la nuée et met fin à l'effet.\
      **Sorts**. Lorsque vous tenez le bâton, vous pouvez lancer l'un des sorts de la table suivante, en utilisant votre DD de sauvegarde des sorts et votre modificateur d'attaque de sorts. La table indique le nombre de charges à dépenser pour lancer le sort.\
      | Sort | Coût en charges |
      | --- | --- |
      | *[insecte géant](https://www.aidedd.org/spell/fr/insecte-geant)* | 4 |
      | *[fléau d'insectes](https://www.aidedd.org/spell/fr/fleau-d-insectes)* | 5 |

      **Récupération des charges**. Le bâton récupère 1d6 + 4 charges dépensées chaque jour à l'aube. Si vous dépensez la dernière charge, lancez 1d20. Sur un 1, une nuée d'insectes consume et détruit le bâton, puis se disperse.
