id: wave
source: dmg_2024
type: weapon
rarity: artifact
attunement: true
translations:
  en:
    name: Wave
    subtype: Trident
    description: |-
      <p>Held in the dungeon of White Plume Mountain, <em>Wave</em> is engraved with images of waves, shells, and sea creatures.<br />
      You gain a +3 bonus to attack rolls and damage rolls made with this magic weapon. When you roll a 20 on the d20 for an attack roll with this weapon, the target takes an extra 21 Necrotic damage.<br />
      While holding <em>Wave</em> , you gain the following benefits:<br />
      <strong>Combat Ready</strong>. You have Advantage on Initiative rolls.<br />
      <strong>Underwater Adaptation</strong>. A bubble of air forms around your head while you are underwater, allowing you to breathe normally in that environment.<br />
      <strong>Aquatic Command</strong>. <em>Wave</em> has 3 charges and regains 1d3 expended charges daily at dawn. While you carry it, you can expend 1 charge to cast Dominate Beast (save DC 20) from it on a Beast that has a Swim Speed.<br />
      <strong>Globe of Invulnerability</strong>. While holding <em>Wave</em> , you can cast the level 9 version of Globe of Invulnerability from it. Once used, this property can't be used again until the next dawn.<br />
      <strong>Sentience</strong>. <em>Wave</em> is a sentient weapon of Neutral alignment, with an Intelligence of 14, a Wisdom of 10, and a Charisma of 18. It has hearing and Darkvision out to 120 feet.<br />
      The weapon communicates telepathically with its wielder and speaks Aquan.<br />
      <strong>Personality</strong>. <em>Wave</em> zealously encourages mortals to worship sea gods and has a habit of humming sea chanteys. Conflict arises if the wielder fails to further the weapon's objectives in the world.<br />
      <strong>Destroying Wave</strong>. <em>Wave</em> can be destroyed only on the island of Thunderforge, where it was forged. The weapon must be melted down by a storm giant or someone imbued with a storm giant's strength. Destroying <em>Wave</em> angers a god of the sea, who sends powerful agents to attack the island and punish the destroyers.</p>
  fr:
    name: Vague
    subtype: trident
    description: |-
      Held in the dungeon of White Plume Mountain, this trident is an exquisite weapon engraved with images of waves, shells, and sea creatures. Although you must worship a god of the sea to attune to this weapon, <em>Wave</em> happily accepts new converts.
      <br>You gain a +3 bonus to attack and damage rolls made with this magic weapon. If you score a critical hit with it, the target takes extra necrotic damage equal to half its hit point maximum.
      <br>The weapon also functions as a <em><a href="https://www.aidedd.org/dnd/om.php?vo=trident-of-fish-command">trident of fish command</a></em> and a <em><a href="https://www.aidedd.org/dnd/om.php?vo=weapon-of-warning">weapon of warning</a></em>. It can confer the benefit of a <em><a href="https://www.aidedd.org/dnd/om.php?vo=cap-of-water-breathing">cap of water breathing</a></em> while you hold it, and you can use it as a <em><a href="https://www.aidedd.org/dnd/om.php?vo=cube-of-force">cube of force</a></em> by choosing the effect, instead of pressing cube sides to select it.
      <br><strong>Sentience</strong>. <em>Wave</em> is a sentient weapon of neutral alignment, with an Intelligence of 14, a Wisdom of 10, and a Charisma of 18. It has hearing and darkvision out to a range of 120 feet.
      <br>The weapon communicates telepathically with its wielder and can speak, read, and understand Aquan. It can also speak with aquatic animals as if using a <em><a href="https://www.aidedd.org/dnd/sorts.php?vo=speak-with-animals">speak with animals</a></em> spell, using telepathy to involve its wielder in the conversation.
      <br><strong>Personality</strong>. When it grows restless, <em>Wave</em> has a habit of humming tunes that vary from sea chanteys to sacred hymns of the sea gods.
      <br><em>Wave</em> zealously desires to convert mortals to the worship of one or more sea gods, or else to consign the faithless to death. Conflict arises if the wielder fails to further the weapon's objectives in the world.
      <br>The trident has a nostalgic attachment to the place where it was forged, a desolate island called Thunderforge. A sea god imprisoned a family of storm giants there, and the giants forged <em>Wave</em> in an act of devotion to — or rebellion against — that god.
      <br><em>Wave</em> harbors a secret doubt about its own nature and purpose. For all its devotion to the sea gods, <em>Wave</em> fears that it was intended to bring about a particular sea god's demise. This destiny is something <em>Wave</em> might not be able to avert.
      <br>
