id: apparatus-of-kwalish
source: dmg_2024
type: wondrous_item
rarity: legendary
attunement: false
translations:
  en:
    name: Apparatus of Kwalish
    subtype: null
    description: |-
      <p>This item first appears to be a sealed iron barrel weighing 500 pounds. The barrel has a hidden catch, which can be found with a successful DC 20 Intelligence (Investigation) check. Releasing the catch unlocks a hatch at one end of the barrel, allowing two Medium or smaller creatures to crawl inside. Ten levers are set in a row at the far end, each in a neutral position, able to move up or down. When certain levers are used, the apparatus transforms to resemble a giant lobster.<br />
      The <em>Apparatus of Kwalish</em> is a Large object with the following statistics: AC 20; HP 200; Speed 30 ft., Swim 30 ft. (or 0 ft. for both if the legs aren't extended); Immunity to Poison and Psychic damage.<br />
      To be used as a vehicle, the apparatus requires one pilot. While the apparatus's hatch is closed, the compartment is airtight and watertight. The compartment holds enough air for 10 hours of breathing, divided by the number of breathing creatures inside.<br />
      The apparatus floats on water. It can also go underwater to a depth of 900 feet. Below that, the vehicle takes 2d6 Bludgeoning damage each minute from pressure.<br />
      A creature in the compartment can take a Utilize action to move as many as two of the apparatus's levers up or down. After each use, a lever goes back to its neutral position. Each lever, from left to right, functions as shown in the <em>Apparatus of Kwalish</em> Levers table.<br />
      Lever| Up| Down<br />
      ---|---|---<br />
      1| Legs extend, allowing the apparatus to walk and swim.| Legs retract, reducing the apparatus's Speed and Swim Speed to 0 and making it unable to benefit from bonuses to speed.<br />
      2| Forward window shutter opens.| Forward window shutter closes.<br />
      3| Side window shutters open (two per side).| Side window shutters close (two per side).<br />
      4| Two claws extend from the front side of the apparatus.| The claws retract.<br />
      5| Each extended claw makes the following melee attack: +8 to hit, reach 5 ft. <em>Hit</em> : 7 (2d6) Bludgeoning damage.| Each extended claw makes the following melee attack: +8 to hit, reach 5 ft. <em>Hit</em> : The target has the Grappled condition (escape DC 15).<br />
      6| The apparatus walks or swims forward provided its legs are extended.| The apparatus walks or swims backward provided its legs are extended.<br />
      7| The apparatus turns 90 degrees counterclockwise provided its legs are extended.| The apparatus turns 90 degrees clockwise provided its legs are extended.<br />
      8| Eyelike fixtures emit Bright Light in a 30-foot radius and Dim Light for an additional 30 feet.| The light turns off.<br />
      9| The apparatus sinks up to 20 feet if it's in liquid.| The apparatus rises up to 20 feet if it's in liquid.<br />
      10| The rear hatch unseals and opens.| The rear hatch closes and seals.</p>
  fr:
    name: Submersible de Kwalish
    subtype: null
    description: |-
      <p>Cet objet ressemble à première vue à un tonneau en fer scellé pesant 250 kg. Il possède un loquet caché, accessible grâce à un jet d'Intelligence (Investigation) DD 20 réussi. Libérer le loquet déverrouille une trappe à une extrémité du tonneau, permettant à deux créatures de taille M ou plus petite de s'y glisser. Dix leviers sont alignés à l'extrémité, chacun en position neutre, et peuvent être actionnés vers le haut ou vers le bas. L'utilisation de certains leviers transforme l'appareil en un homard géant.<br />
      Le <em>submersible de Kwalish</em> est un objet de taille G avec le profil suivant : CA 20 ; 200 pv ; Vitesse 9 m, nage 9 m (ou 0 m pour les deux si les jambes ne sont pas déployées) ; Immunité au poison et aux dégâts psychiques.<br />
      Pour être utilisé comme véhicule, l'appareil nécessite un pilote. Lorsque la trappe de l'appareil est fermée, le compartiment est étanche à l'air et à l'eau. Le compartiment contient suffisamment d'air pour 10 heures de respiration, divisé par le nombre de créatures qui s'y trouvent.<br />
      Le <em>submersible de Kwalish</em> flotte sur l'eau. Il peut également aller sous l'eau jusqu'à une profondeur de 270 mètres. En dessous, le véhicule subit 2d6 dégâts contondants par minute dus à la pression.<br />
      Une créature dans le compartiment peut prendre une action Utilisation pour déplacer jusqu'à deux leviers de l'appareil vers le haut ou vers le bas. Après chaque utilisation, un levier revient à sa position neutre. Chaque levier, de gauche à droite, fonctionne comme indiqué dans la table suivante.<br />
      Levier| Haut| Bas<br />
      ---|---|---<br />
      1| Les pattes se déploient permettant à l'appareil de marcher et de nager.| Les pattes se rétractent, réduisant la Vitesse et la Vitesse de nage de l'appareil à 0 et l'empêchant de bénéficier des bonus de vitesse.<br />
      2| Le volet du hublot avant s'ouvre.| Le volet du hublot avant se ferme.<br />
      3| Les volets des hublots latéraux s'ouvrent (deux par côté).| Les volets des hublots latéraux se ferment (deux par côté).<br />
      4| Deux pinces se déploient à l'avant du submersible.| Les pinces se rétractent.<br />
      5| Chaque pince déployée effectue l'attaque de corps à corps suivante : +8 pour toucher, allonge 1,50 m. <em>Touché</em> : 7 (2d6) dégâts contondants.| Chaque pince déployée effectue l'attaque de corps à corps suivante : +8 pour toucher, allonge 1,50 m. <em>Touché</em> : la cible subit l'état Agrippé (évasion DD 15).<br />
      6| Le submersible marche ou nage vers l'avant à condition que ses pattes soient déployées.| Le submersible marche ou nage vers l'arrière à condition que ses pattes soient déployées.<br />
      7| Le submersible tourne de 90 degrés dans le sens inverse des aiguilles d'une montre à condition que ses pattes soient déployées.| L'appareil tourne de 90 degrés dans le sens des aiguilles d'une montre à condition que ses pattes soient déployées.<br />
      8| Des yeux mécaniques émettent une Lumière vive sur un rayon de 9 mètres et une Lumière faible sur 9 mètres supplémentaires.| La lumière s'éteint.<br />
      9| Le submersible coule jusqu'à 6 mètres s'il est dans un liquide.| L'appareil monte jusqu'à 6 mètres s'il est dans un liquide.<br />
      10| L'écoutille arrière s'ouvre.| L'écoutille arrière se ferme hermétiquement.</p>
