id: ring-of-spell-turning
source: dmg_2024
type: ring
rarity: legendary
attunement: true
translations:
  en:
    name: Ring of Spell Turning
    subtype: null
    description: |-
      While wearing this ring, you have Advantage on saving throws against spells. If you succeed on the save for a spell of level 7 or lower, the spell has no effect on you. If that spell targeted only you and didn't create an area of effect, you can take a Reaction to deflect the spell back at the spell's caster; the caster must make a saving throw against the spell using their own spell save DC.
  fr:
    name: Anneau de renvoi des sorts
    subtype: null
    description: |-
      Lorsque vous portez cet anneau, vous bénéficiez d'un Avantage aux jets de sauvegarde contre les sorts. Si vous réussissez votre jet de sauvegarde contre un sort de niveau 7 ou inférieur, le sort n'a aucun effet sur vous. Si ce sort ne ciblait que vous et ne créait pas de zone d'effet, vous pouvez prendre une Réaction pour renvoyer le sort vers le lanceur ; ce dernier doit effectuer un jet de sauvegarde contre le sort en utilisant son propre DD de sauvegarde des sorts.
