id: gem-of-brightness
source: dmg_2024
type: wondrous_item
rarity: uncommon
attunement: false
translations:
  en:
    name: Gem of Brightness
    subtype: null
    description: |-
      <p>This prism has 50 charges. While you are holding it, you can take a Magic action and use one of three command words to cause one of the following effects:<br />
      <strong>First Command Word</strong>. The gem sheds Bright Light in a 30-foot radius and Dim Light for an additional 30 feet. This effect doesn't expend a charge. It lasts until you take a Bonus Action to repeat the command word or until you use another function of the gem.<br />
      <strong>Second Command Word</strong>. You expend 1 charge and cause the gem to fire a brilliant beam of light at one creature you can see within 60 feet of yourself. The creature must succeed on a DC 15 Constitution saving throw or have the Blinded condition for 1 minute. The creature repeats the save at the end of each of its turns, ending the effect on itself on a success.<br />
      <strong>Third Command Word</strong>. You expend 5 charges and cause the gem to flare with intense light in a 30-foot Cone. Each creature in the Cone makes a saving throw as if struck by the beam created with the second command word.<br />
      When all of the gem's charges are expended, the gem becomes a nonmagical jewel worth 50 GP.</p>
  fr:
    name: Gemme d'illumination
    subtype: null
    description: |-
      <p>Ce prisme possède 50 charges. Lorsque vous le tenez, vous pouvez prendre une action Magie et utiliser l'un des trois mots de commande pour provoquer l'un des effets suivants :<br />
      <strong>Premier mot de commande</strong>. La gemme diffuse une Lumière vive sur un rayon de 9 mètres et une Lumière faible sur 9 mètres supplémentaires. Cet effet ne dépense aucune charge. Il dure jusqu'à ce que vous preniez une action Bonus pour répéter le mot de commande ou que vous utilisiez une autre fonction de la gemme.<br />
      <strong>Deuxième mot de commande</strong>. Vous dépensez 1 charge et la gemme projette un rayon de lumière intense sur une créature que vous pouvez voir dans un rayon de 18 mètres. La créature doit réussir un jet de sauvegarde de Constitution DD 15 ou subir l'état Aveuglé pendant 1 minute. La créature répète ce jet de sauvegarde à la fin de chacun de ses tours, mettant fin à l'effet sur elle-même en cas de réussite.<br />
      <strong>Troisième mot de commande</strong>. Vous dépensez 5 charges et la gemme projette une lumière intense dans un cône de 9 mètres. Chaque créature dans le cône effectue un jet de sauvegarde comme si elle était frappée par le rayon créé par le deuxième mot de commande.<br />
      Une fois toutes les charges de la gemme dépensées, elle devient un joyau non magique d'une valeur de 50 po.</p>
