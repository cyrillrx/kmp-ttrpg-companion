id: robe-of-eyes
source: dmg_2024
type: wondrous_item
rarity: rare
attunement: true
translations:
  en:
    name: Robe of Eyes
    subtype: null
    description: |-
      This robe is adorned with eyelike patterns. While you wear the robe, you gain the following benefits:
      
      **All-Around Vision**. The robe gives you Advantage on Wisdom (Perception) checks that rely on sight.
      
      **Special Senses**. You have Darkvision and Truesight, both with a range of 120 feet.
      
      **Drawbacks**. A *[Light](https://www.aidedd.org/spell/light)* spell cast on the robe or a *[Daylight](https://www.aidedd.org/spell/daylight)* spell cast within 5 feet of the robe gives you the Blinded condition for 1 minute. At the end of each of your turns, you make a Constitution saving throw (DC 11 for *Light* or DC 15 for *Daylight*), ending the condition on yourself on a success.
  fr:
    name: Robe de vision totale
    subtype: null
    description: |-
      Cette robe est ornée de motifs représentant des yeux. Lorsque vous la portez, vous bénéficiez des avantages suivants :
      
      **Vision panoramique**. La robe vous confère un Avantage aux jets de Sagesse (Perception) qui utilisent la vue.
      
      **Sens spéciaux**. Vous possédez Vision dans le noir et Vision véritable, tous deux sur une portée de 36 mètres.
      
      **Inconvénients**. Un sort de *[lumière](https://www.aidedd.org/spell/fr/lumiere)* lancé sur la robe ou un sort de *[lumière du jour](https://www.aidedd.org/spell/fr/lumiere-du-jour)* lancé à 1,50 mètre ou moins de la robe vous fait subir l'effet Aveuglé pendant 1 minute. À la fin de chacun de vos tours, vous effectuez un jet de sauvegarde de Constitution (DD 11 pour *lumière* ou DD 15 pour *lumière du jour*), mettant fin à l'état en cas de réussite.
