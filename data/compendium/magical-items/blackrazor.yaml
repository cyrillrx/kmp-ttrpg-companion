id: blackrazor
source: dmg_2024
type: weapon
rarity: artifact
attunement: true
translations:
  en:
    name: Blackrazor
    subtype: Greatsword
    description: |-
      Hidden in the dungeon of White Plume Mountain, *Blackrazor* shines like a piece of night sky filled with stars. Its black scabbard is decorated with pieces of cut obsidian.
      \
      You gain a +3 bonus to attack and damage rolls made with this magic weapon. It has the following additional properties.
      \
      **Devour Soul**. Whenever you use it to reduce a creature to 0 hit points, the sword slays the creature and devours its soul, unless it is a construct or an undead. A creature whose soul has been devoured by *Blackrazor* can be restored to life only by a *[wish](https://www.aidedd.org/dnd/sorts.php?vo=wish)* spell.
      \
      When it devours a soul, *Blackrazor* grants you temporary hit points equal to the slain creature's hit point maximum. These hit points fade after 24 hours. As long as these temporary hit points last and you keep *Blackrazor* in hand, you have advantage on attack rolls, saving throws, and ability checks.
      \
      If you hit an undead with this weapon, you take 1d10 necrotic damage and the target regains 1d10 hit points. If this necrotic damage reduces you to 0 hit points, *Blackrazor* devours your soul.
      \
      **Soul Hunter**. While you hold the weapon. you are aware of the presence of Tiny or larger creatures within 60 feet of you that aren't constructs or undead. You also can't be charmed or frightened.
      \
      *Blackrazor* can cast the *[haste](https://www.aidedd.org/dnd/sorts.php?vo=haste)* spell on you once per day. It decides when to cast the spell and maintains concentration on it so that you don't have to.
      \
      **Sentience**. *Blackrazor* is a sentient chaotic neutral weapon with an Intelligence of 17, a Wisdom of 10, and a Charisma of 19. It has hearing and darkvision out to a range of 120 feet.
      \
      The weapon can speak, read, and understand Common, and can communicate with its wielder telepathically. Its voice is deep and echoing. While you are attuned to it, *Blackrazor* also understands every language you know.
      \
      **Personality**. *Blackrazor* speaks with an imperious tone, as though accustomed to being obeyed. The sword's purpose is to consume souls. It doesn't care whose souls it eats, including the wielder's. The sword believes that all matter and energy sprang from a void of negative energy and will one day return to it. *Blackrazor* is meant to hurry that process along.
      \
      Despite its nihilism, *Blackrazor* feels a strange kinship to *[Wave](https://www.aidedd.org/dnd/om.php?vo=wave)* and *[Whelm](https://www.aidedd.org/dnd/om.php?vo=whelm)*, two other weapons locked away under White Plume Mountain. It wants the three weapons to be united again and wielded together in combat, even though it violently disagrees with *Whelm* and finds *Wave* tedious.
      \
      *Blackrazor*'s hunger for souls must be regularly fed. If the sword goes three days or more without consuming a soul, a conflict between it and its wielder occurs at the next sunset.
      \
  fr:
    name: Noirtranchant
    subtype: épée à deux mains
    description: |-
      Dissimulée dans le donjon de la Montagne de la Plume Blanche, *Noir rasoir* scintille tel un pan de ciel nocturne constellé d'étoiles. Son fourreau noir est décoré de fragments d'obsidienne.
      \
      Vous obtenez un bonus de +3 aux jets d'attaque et de dégâts effectués avec cette arme magique. Elle possède les propriétés supplémentaires suivantes.
      \
      **Dévoreur d'âme**. À chaque fois qu'en utilisant cette arme vous faîtes tomber les points de vie d'une créature à 0, l'épée tue la créature et dévore son âme, à moins que ce ne soit un artificiel ou un mort-vivant. Une créature dont l'âme a été dévorée par *Noir rasoir* ne peut être ramenée à la vie que par un sort de *[souhait](https://www.aidedd.org/dnd/sorts.php?vf=souhait)*.
      \
      Lorsqu'elle dévore une âme, *Noir rasoir* vous confère un nombre de points de vie temporaires égal au maximum de points de vie de la créature qu'elle a abattu. Ces points de vie disparaissent au bout de 24 heures. Tant que vous bénéficiez de ces points de vie temporaires et que vous tenez *Noir rasoir* en main, vous avez un avantage aux jets d'attaque, de sauvegarde et de caractéristiques.
      \
      Si vous frappez un mort-vivant avec cette arme, vous subissez 1d10 dégâts nécrotiques et la cible récupère 1d10 points de vie. Si les dégâts nécrotiques font tomber vos points de vie à 0, *Noir rasoir* dévore votre âme.
      \
      **Chasseur d'âme**. Tant que vous tenez l'arme en main, vous êtes averti de la présence de créature de taille TP ou supérieure se trouvant dans un rayon de 18 mètres autour de vous, à l'exception des artificiels et des morts-vivants. De plus, vous ne pouvez pas être charmé ni effrayé.
      \
      *Noir rasoir* peut lancer le sort *[hâte](https://www.aidedd.org/dnd/sorts.php?vf=hate)* sur vous une fois par jour. C'est elle qui décide quand lancer ce sort et maintient la concentration, vous n'avez pas à le faire.
      \
      **Conscience**. *Noir rasoir* est une arme intelligente chaotique neutre qui possède une Intelligence de 17, une Sagesse de 10 et un Charisme de 19. Elle est capable d'entendre et possède la vision dans le noir à 36 mètres.
      \
      L'arme peut parler, lire et comprendre le commun, et peut communiquer avec son porteur par télépathie. Sa voix est profonde et résonne. Tant que vous êtes lié à *Noir rasoir*, elle comprend également toutes les langues que vous connaissez.
      \
      **Personnalité**. *Noir rasoir* parle d'un ton impérieux, comme si elle avait l'habitude qu'on lui obéisse. L'objectif de l'épée est de dévorer des âmes. Elle se moque de savoir à qui appartiennent les âmes qu'elle absorbe, y compris celle de son porteur. L'épée pense que toute matière ou énergie provient d'un néant d'énergie négative et que tout finit toujours par y retourner. *Noir rasoir* a l'intention d'accélérer ce processus.
      \
      En dépit de son nihilisme, *Noir rasoir* ressent un étrange lien de parenté avec *[Vague](https://www.aidedd.org/dnd/om.php?vf=vague)* et *[Déluge](https://www.aidedd.org/dnd/om.php?vf=deluge)*, deux autres armes enfermées dans la Montagne de la Plume Blanche. Elle souhaite que les trois armes soient de nouveau réunies et portées ensemble au combat, même si elle est en désaccord violent avec *Déluge* et trouve *Vague* ennuyeuse.
      \
      La faim insatiable de *Noir rasoir* pour de nouvelles âmes doit être régulièrement satisfaite. Si l'épée passe trois jours ou plus sans consommer d'âme, un conflit survient entre elle et son porteur au coucher de soleil qui suit.
      \
