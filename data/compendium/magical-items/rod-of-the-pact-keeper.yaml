id: rod-of-the-pact-keeper
source: dmg_2024
type: rod
rarity: uncommon
attunement: true
translations:
  en:
    name: Rod of the Pact Keeper
    subtype: null
    description: |-
      <p>While holding this rod, you gain a bonus to spell attack rolls and to the saving throw DCs of your Warlock spells. The bonus is determined by the rod's rarity.<br />
      In addition, you can regain one spell slot as a Magic action while holding the rod. You can't use this property again until you finish a Long Rest.</p>
  fr:
    name: Sceptre du gardien des pactes
    subtype: null
    description: |-
      <p>Lorsque vous tenez cette baguette, vous obtenez un bonus aux jets d'attaque de sorts et au DD des jets de sauvegarde de vos sorts d'occultiste. Le bonus dépend de la rareté de la baguette.<br />
      De plus, vous pouvez récupérer un emplacement de sort par une action Magie lorsque vous tenez la baguette. Vous ne pouvez plus utiliser cette propriété avant d'avoir terminé un Repos long.</p>
