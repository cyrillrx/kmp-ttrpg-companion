id: boots-of-striding-and-springing
source: dmg_2024
type: wondrous_item
rarity: uncommon
attunement: true
translations:
  en:
    name: Boots of Striding and Springing
    subtype: null
    description: |-
      <p>While you wear these boots, your Speed becomes 30 feet unless your Speed is higher, and your Speed isn't reduced by you carrying weight in excess of your carrying capacity or wearing Heavy Armor.<br />
      Once on each of your turns, you can jump up to 30 feet by spending only 10 feet of movement.</p>
  fr:
    name: Bottes de sept lieues
    subtype: null
    description: |-
      <p>Lorsque vous portez ces bottes, votre Vitesse passe à 9 mètres, sauf si elle est supérieure. Votre vitesse n'est pas réduite par un poids supérieur à votre capacité de charge ou par le port d'une armure lourde.<br />
      Une fois par tour, vous pouvez sauter jusqu'à 9 mètres en dépensant seulement 3 mètres de mouvement.</p>
