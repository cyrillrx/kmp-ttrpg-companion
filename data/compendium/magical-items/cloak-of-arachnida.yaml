id: cloak-of-arachnida
source: dmg_2024
type: wondrous_item
rarity: very_rare
attunement: true
translations:
  en:
    name: Cloak of Arachnida
    subtype: null
    description: |-
      <p>This fine garment is made of black silk interwoven with faint, silvery threads. While wearing it, you gain the following benefits.<br />
      <strong>Poison Resistance</strong>. You have Resistance to Poison damage.<br />
      <strong>Spider Climb</strong>. You have a Climb Speed equal to your Speed and can move up, down, and across vertical surfaces and along ceilings, while leaving your hands free.<br />
      <strong>Spider Walk</strong>. You can't be caught in webs of any sort and can move through webs as if they were Difficult Terrain.<br />
      <strong>Web</strong>. You can cast <em><a href="https://www.aidedd.org/spell/web">Web</a></em> (save DC 13). The web created by the spell fills twice its normal area. Once used, this property can't be used again until the next dawn.</p>
  fr:
    name: Cape de l'arachnide
    subtype: null
    description: |-
      <p>Ce vêtement raffiné est fait de soie noire entrelacée de fils argentés subtils. En le portant, vous bénéficiez des avantages suivants :<br />
      <strong>Résistance au poison</strong>. Vous bénéficiez d'une Résistance aux dégâts de poison.<br />
      <strong>Pattes d'araignée</strong>. Votre avez une Vitesse d'escalade égale à votre Vitesse et vous pouvez vous déplacer le long de surfaces verticales et aux plafonds tout en gardant les mains libres.<br />
      <strong>Déplacement arachnéen</strong>. Vous ne pouvez pas être pris dans des toiles, quelles qu'elles soient, et vous pouvez vous déplacer à travers elles comme s'il s'agissait d'un Terrain difficile.<br />
      <strong>Toile d'araignée</strong>. Vous pouvez lancer <em><a href="https://www.aidedd.org/spell/fr/toile-d-araignee">toile d'araignée</a></em> (sauvegarde DD 13). La toile créée par le sort remplit deux fois sa surface normale. Une fois utilisée, cette propriété ne peut plus être utilisée avant l'aube suivante.</p>
