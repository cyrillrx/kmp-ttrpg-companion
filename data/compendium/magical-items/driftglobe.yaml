id: driftglobe
source: dmg_2024
type: wondrous_item
rarity: uncommon
attunement: false
translations:
  en:
    name: Driftglobe
    subtype: null
    description: |-
      This small sphere of thick glass weighs 1 pound. If you are within 60 feet of it, you can command it to emanate light equivalent to that of the *Light* or *Daylight* spell (your choice). Once used, the *Daylight* effect can't be used again until the next dawn.

      You can issue another command as a Magic action to make the illuminated globe rise into the air and float no more than 5 feet off the ground. The globe hovers in this way until you or another creature grasps it. If you move more than 60 feet from the hovering globe, it follows you until it is within 60 feet of you. It takes the shortest route to do so. If prevented from moving, the globe sinks gently to the ground and becomes inactive, and its light winks out.
  fr:
    name: Globe flottant
    subtype: null
    description: |-
      Cette petite sphère de verre épais pèse 500 g. Si vous vous trouvez dans un rayon de 18 mètres d'elle, vous pouvez lui ordonner d'émettre une lumière équivalente à celle du sort *lumière* ou *lumière du jour* (à votre choix). Une fois utilisé, l'effet *lumière du jour* ne peut être réutilisé avant l'aube suivante.

      Vous pouvez également, par une action Magie, ordonner à la sphère illuminée de s'élever dans les airs et de flotter à une hauteur maximale de 1,50 mètre du sol. La sphère reste ainsi en suspension jusqu'à ce que vous ou une autre créature la saisissiez. Si vous vous éloignez de plus de 18 mètres de la sphère, elle vous suit jusqu'à se trouver dans un rayon de 18 mètres de vous. Elle emprunte pour cela le chemin le plus court. Si vous l'empêchez de se déplacer, la sphère retombe doucement au sol et devient inactive, sa lumière s'éteignant.
