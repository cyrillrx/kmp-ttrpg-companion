id: horn-of-blasting
source: dmg_2024
type: wondrous_item
rarity: rare
attunement: false
translations:
  en:
    name: Horn of Blasting
    subtype: null
    description: |-
      You can take a Magic action to blow the horn, which emits a thunderous blast in a 30-foot Cone that is audible out to 600 feet. Each creature in the Cone makes a DC 15 Constitution saving throw. On a failed save, a creature takes 5d8 Thunder damage and has the Deafened condition for 1 minute. On a successful save, a creature takes half as much damage only. Glass or crystal objects in the Cone that aren't being worn or carried take 10d8 Thunder damage.

      Each use of the horn's magic has a 20 percent chance of causing the horn to explode. The explosion deals 10d6 Force damage to the user and destroys the horn.
  fr:
    name: Cor de dévastation
    subtype: null
    description: |-
      Vous pouvez prendre une action Magie pour souffler dans le cor, qui émet alors un coup de tonnerre dans un cône de 9 mètres, audible jusqu'à 180 mètres. Chaque créature dans le cône effectue un jet de sauvegarde de Constitution DD 15. En cas d'échec, la créature subit 5d8 dégâts de tonnerre et l'état Assourdie pendant 1 minute. En cas de réussite, la créature subit la moitié de ces dégâts. Les objets en verre ou en cristal dans le cône qui ne sont pas portés subissent 10d8 dégâts de tonnerre.

      Chaque utilisation de la magie du cor a 20 % de chances de le faire exploser. L'explosion inflige 10d6 dégâts de force à l'utilisateur et détruit le cor.
