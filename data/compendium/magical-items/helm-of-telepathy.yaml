id: helm-of-telepathy
source: dmg_2024
type: wondrous_item
rarity: uncommon
attunement: true
translations:
  en:
    name: Helm of Telepathy
    subtype: null
    description: While wearing this helm, you have telepathy with a range of 30 feet,
      and you can cast *[Detect Thoughts](https://www.aidedd.org/spell/detect-thoughts)*
      or *[Suggestion](https://www.aidedd.org/spell/suggestion)* (save DC 13) from
      the helm. Once either spell is cast from the helm, that spell can't be cast
      from it again until the next dawn.
  fr:
    name: Heaume de télépathie
    subtype: null
    description: Lorsque vous portez ce heaume, vous bénéficiez de télépathie à une
      portée de 9 mètres et pouvez lancer *[détection des pensées](https://www.aidedd.org/spell/fr/detection-des-pensees)*
      ou *[suggestion](https://www.aidedd.org/spell/fr/suggestion)* (sauvegarde DD
      13) par son biais. Une fois l'un de ces sorts lancé depuis le heaume, il ne
      peut plus être lancé avant l'aube suivante.
