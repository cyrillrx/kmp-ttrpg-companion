id: lantern-of-revealing
source: dmg_2024
type: wondrous_item
rarity: uncommon
attunement: false
translations:
  en:
    name: Lantern of Revealing
    subtype: null
    description: While lit, this hooded lantern burns for 6 hours on 1 pint of oil,
      shedding Bright Light in a 30-foot radius and Dim Light for an additional 30
      feet. Invisible creatures and objects are visible as long as they are in the
      lantern's Bright Light. You can take a Utilize action to lower the hood, reducing
      the lantern's light to Dim Light in a 5-foot radius.
  fr:
    name: Lanterne de révélation
    subtype: null
    description: Allumée, cette lanterne à capuchon brûle pendant 6 heures avec 50
      cl d'huile, diffusant une Lumière vive sur un rayon de 9 mètres et une Lumière
      faible sur 9 mètres supplémentaires. Les créatures et objets invisibles sont
      visibles s'ils sont dans la Lumière vive de la lanterne. Vous pouvez prendre
      une action Utilisation pour abaisser le capuchon et réduire la Lumière de la
      lanterne à une Lumière faible sur un rayon de 1,50 mètre.
