id: talisman-of-the-sphere
source: dmg_2024
type: wondrous_item
rarity: legendary
attunement: true
translations:
  en:
    name: Talisman of the Sphere
    subtype: null
    description: <p>While holding or wearing this talisman, you have Advantage on
      any Intelligence (Arcana) check you make to control a <em>Sphere of Annihilation</em>.
      In addition, when you start your turn in control of a <em>Sphere of Annihilation</em>
      , you can take a Magic action to move it 10 feet plus a number of additional
      feet equal to 10 times your Intelligence modifier. This movement doesn't have
      to be in a straight line.</p>
  fr:
    name: Talisman de la sphère
    subtype: null
    description: <p>Lorsque vous portez ce talisman, vous bénéficiez d'un Avantage
      à tout jet d'Intelligence (Arcanes) effectué pour contrôler une <em>sphère d'annihilation</em>.
      De plus, lorsque vous commencez votre tour en contrôlant une <em>sphère d'annihilation</em>
      , vous pouvez prendre une action Magie pour la déplacer de 3 mètres, plus un
      nombre de mètres supplémentaire égal à 3 fois votre modificateur d'Intelligence.
      Ce déplacement n'est pas nécessairement en ligne droite.</p>
