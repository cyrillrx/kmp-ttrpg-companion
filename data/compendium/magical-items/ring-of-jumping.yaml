id: ring-of-jumping
source: dmg_2024
type: ring
rarity: uncommon
attunement: true
translations:
  en:
    name: Ring of Jumping
    subtype: null
    description: |-
      While wearing this ring, you can cast *[Jump](https://www.aidedd.org/spell/jump)* from it, but can target only yourself when you do so.
  fr:
    name: Anneau de saut
    subtype: null
    description: |-
      Lorsque vous portez cet anneau, vous pouvez lancer *[saut](https://www.aidedd.org/spell/fr/saut)* par son biais, mais vous ne pouvez cibler que vous-même lorsque vous le faites.
