id: axe-of-the-dwarvish-lords
source: dmg_2024
type: weapon
rarity: artifact
attunement: true
translations:
  en:
    name: Axe of the Dwarvish Lords
    subtype: Battleaxe
    description: |-
      <p>A young dwarf prince set out to forge a weapon that would be regarded as a symbol of unity among his people. Venturing deep under the mountains, deeper than any dwarf had ever delved, the prince came to the blazing heart of a great volcano. With the aid of Moradin, a god of creation, he first crafted four mighty tools: the Starmetal Pick, the Earthheart Forge, the Anvil of Songs, and the Shaping Hammer. With these tools, he forged the <em>Axe of the Dwarvish Lords</em>.<br />
      Armed with the Artifact, the prince brought peace to the dwarf clans, ending grudges and answering slights. The clans became allies, and they threw back their enemies and enjoyed an era of prosperity. This young dwarf is remembered as the First King. When he became old, he passed the weapon, which had become his badge of office, to his heir. The rightful inheritors passed the axe on for many generations.<br />
      Later, in an era marked by treachery and wickedness, the axe was lost in a bloody civil war fomented by greed for its power and the status it bestowed. Centuries later, the dwarves still search for the axe, and many adventurers have made careers of chasing after rumors and plundering old vaults to find it.<br />
      <strong>Magic Weapon</strong>. The <em>Axe of the Dwarvish Lords</em> is a magic weapon that grants a +3 bonus to attack rolls and damage rolls made with it.<br />
      When you attack a creature with the axe and roll a 20 on the d20 for the attack roll, the axe deals an extra 20 Slashing damage.<br />
      The axe has the Thrown property with a normal range of 20 feet and a long range of 60 feet. When you hit with a ranged attack using this weapon, it deals an extra 1d8 Force damage, or an extra 2d8 Force damage if the target is a creature of the Giant type. Immediately after hitting or missing, the weapon flies back to your hand.<br />
      <strong>Blessings of Moradin</strong>. While attuned to the axe, you gain the following benefits:<br />
      <strong>Darkvision</strong>. You gain Darkvision with a range of 60 feet. If you already have Darkvision, its range increases by 60 feet.<br />
      <strong>Fortitude of Stone</strong>. Your Constitution increases by 2, to a maximum of 20.<br />
      <strong>Gifts of the Creator</strong>. You have proficiency with Brewer's Supplies, Mason's Tools, and Smith's Tools.<br />
      <strong>One with the Forge</strong>. You have Immunity to Poison damage and Resistance to Fire damage.<br />
      <strong>Sunder</strong>. When you hit an object with the axe, the object takes the maximum amount of damage possible.<br />
      <strong>Conjure Earth Elemental</strong>. While holding the axe, you can take a Magic action to summon an Earth Elemental. It appears in an unoccupied space you choose within 30 feet of yourself, understands your languages, obeys your commands, and takes its turn immediately after you on your Initiative count. The elemental disappears after 24 hours, when it dies, or when you dismiss it as a Bonus Action. You can't use this property again until the next dawn.<br />
      <strong>Random Properties</strong>. The axe has the following random properties (see the <em>Dungeon Master's Guide</em>):<br />
      • 2 minor beneficial properties<br />
      • 1 major beneficial property<br />
      • 2 minor detrimental properties<br />
      <strong>Travel the Depths</strong>. You can take a Magic action to touch the axe to a fixed piece of dwarven stonework and cast <em><a href="https://www.aidedd.org/spell/teleport">Teleport</a></em> from the axe. If your intended destination is underground, there is no chance of a mishap or arriving somewhere unexpected. You can't use this property again until 3 days have passed.<br />
      <strong>Destroying the Axe</strong>. The only way to destroy the axe is to melt it down in the Earthheart Forge, where it was created. It must remain in the burning forge for 50 years before it finally succumbs to the fire and is consumed.</p>
  fr:
    name: Hache des seigneurs nains
    subtype: hache d'armes
    description: |
      Seeing the peril his people faced, a young dwarf prince came to believe that his people needed something to unite them. Thus, he set out to forge a weapon that would be such a symbol.
      <br>Venturing deep under the mountains, deeper than any dwarf had ever delved, the young prince came to the blazing heart of a great volcano. With the aid of Moradin, the dwarven god of creation, he first crafted four great tools: the <em>Brutal Pick</em>, the <emEarthheart Forge</em>, the <em>Anvil of Songs</em>, and the <em>Shaping Hammer</em>. With them, he forged the <em>Axe of the Dwarvish Lords</em>.
      <br>Armed with the artifact, the prince returned to the dwarf clans and brought peace. His axe ended grudges and answered slights. The clans became allies, and they threw back their enemies and enjoyed an era of prosperity. This young dwarf is remembered as the First King. When he became old, he passed the weapon, which had become his badge of office, to his heir. The rightful inheritors passed the axe on for many generations.
      <br>Later, in a dark era marked by treachery and wickedness, the axe was lost in a bloody civil war fomented by greed for its power and the status it bestowed. Centuries later, the dwarves still search for the axe, and many adventurers have made careers of chasing after rumors and plundering old vaults to find it.
      <br><strong>Magic Weapon</strong>. The <em>Axe of the Dwarvish Lords</em> is a magic weapon that grants a +3 bonus to attack and damage rolls made with it. The axe also functions as a <em>Belt of Dwarvenkind</em>, a <em>Dwarven Thrower</em>, and a <em>Sword of Sharpness</em>.
      <br><strong>Random Properties</strong>. The axe has the following randomly determined properties:
      <br>• 2 minor beneficial properties
      <br>• 1 major beneficial property
      <br>• 2 minor detrimental properties
      <br><strong>Blessings of Moradin</strong>. If you are a dwarf attuned to the axe, you gain the following benefits:
      <br>• You have immunity to poison damage.
      <br>• The range of your darkvision increases by 60 feet.
      <br>• You gain proficiency with artisan's tools related to blacksmithing, brewing, and stonemasonry.
      <br><strong>Conjure Earth Elemental</strong>. If you are holding the axe, you can use your action to cast the <em>conjure elemental</em> spell from it, summoning an earth elemental. You can't use this property again until the next dawn.
      <br><strong>Travel the Depths</strong>. You can use an action to touch the axe to a fixed piece of dwarven stonework and cast the teleport spell from the axe. If your intended destination is underground, there is no chance of a mishap or arriving somewhere unexpected. You can't use this property again until 3 days have passed.
      <br><strong>Curse</strong>. The axe bears a curse that affects any nondwarf that becomes attuned to it. Even if the attunement ends, the curse remains. With each passing day, the creature's physical appearance and stature become more dwarflike. After seven days, the creature looks like a typical dwarf, but the creature neither loses its racial traits nor gains the racial traits of a dwarf. The physical changes wrought by the axe aren't considered magical in nature (and therefore can't be dispelled), but they can be undone by any effect that removes a curse, such as a <em>greater restoration</em> or <em>remove curse</em> spell.
      <br><strong>Destroying the Axe</strong>. The only way to destroy the axe is to melt it down in the <em>Earthheart Forge</em>, where it was created. It must remain in the burning forge for fifty years before it finally succumbs to the fire and is consumed.
      <br>
