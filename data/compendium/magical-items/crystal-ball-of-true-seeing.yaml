id: crystal-ball-of-true-seeing
source: dmg_2024
type: wondrous_item
rarity: legendary
attunement: true
translations:
  en:
    name: Crystal Ball of True Seeing
    subtype: null
    description: <p>While touching this crystal orb, you can cast <em><a href="https://www.aidedd.org/spell/scrying">Scrying</a></em>
      (save DC 17) with it. In addition, you have Truesight with a range of 120 feet
      centered on the spell's sensor.</p>
  fr:
    name: Boule de cristal de vision suprême
    subtype: null
    description: <p>Lorsque vous touchez cet orbe de cristal, vous pouvez lancer <em><a
      href="https://www.aidedd.org/spell/fr/scrutation">scrutation</a></em> (sauvegarde
      DD 17) par son biais. De plus, vous disposez de Vision véritable à 36 mètres
      centrée sur le capteur du sort.</p>
