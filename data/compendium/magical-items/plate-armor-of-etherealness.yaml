id: plate-armor-of-etherealness
source: dmg_2024
type: armor
rarity: legendary
attunement: true
translations:
  en:
    name: Plate Armor of Etherealness
    subtype: Half Plate Armor or Plate Armor
    description: <p>While you're wearing this armor, you can take a Magic action and
      use a command word to gain the effect of the <em><a href="https://www.aidedd.org/spell/etherealness">Etherealness</a></em>
      spell. The spell ends immediately if you remove the armor or take a Magic action
      to repeat the command word. This property of the armor can't be used again until
      the next dawn.</p>
  fr:
    name: Harnois éthéré
    subtype: demi-plate ou harnois
    description: <p>Lorsque vous portez cette armure, vous pouvez prendre une action
      Magie et utiliser un mot de commande pour bénéficier de l'effet du sort <em><a
      href="https://www.aidedd.org/spell/fr/forme-etheree">forme éthérée</a></em>.
      Le sort prend fin immédiatement si vous retirez l'armure ou prenez une action
      Magie pour répéter le mot de commande. Cette propriété de l'armure ne peut être
      réutilisée avant l'aube suivante.</p>
