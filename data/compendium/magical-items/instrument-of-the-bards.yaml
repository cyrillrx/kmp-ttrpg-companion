id: instrument-of-the-bards
source: dmg_2024
type: wondrous_item
rarity: varies
attunement: true
translations:
  en:
    name: Instrument of the Bards
    subtype: null
    description: |-
      An *Instrument of the Bards* is superior to an ordinary instrument in every way. Seven types of these instruments exist, each named after a bard college. The Instruments of the Bards table lists the spells common to all instruments, as well as the spells specific to each one and its rarity. A creature that attempts to play the instrument without being attuned to it must succeed on a DC 15 Wisdom saving throw or take 2d4 Psychic damage.
      
      You can play the instrument to cast one of its spells. Once the instrument has been used to cast a spell, it can’t be used to cast that spell again until the next dawn. The spells use your spellcasting ability and spell save DC.
      
      | Instrument | Rarity | Spells |
      | --- | --- | --- |
      | All | - | *Fly, Invisibility, Levitate, Protection from Evil and Good* , plus the spells listed for the particular instrument |
      | Anstruth harp | Very Rare | *[Cure Wounds](https://www.aidedd.org/spell/cure-wounds)* (level 5), *Ice Storm, Wall of Thorns* |
      | Canaith mandolin | Rare | *[Cure Wounds](https://www.aidedd.org/spell/cure-wounds)* (level 3), *[Dispel Magic](https://www.aidedd.org/spell/dispel-magic), Protection from Energy* (Lightning damage only) |
      | Cli lyre | Rare | *Stone Shape, Wall of Fire, Wind Wall* |
      | Doss lute | Uncommon | *[Animal Friendship](https://www.aidedd.org/spell/animal-friendship), Protection from Energy* (Fire damage only), *Protection from Poison* |
      | Fochlucan bandore | Uncommon | *Entangle, Faerie Fire, Shillelagh, Speak with Animals* |
      | Mac-Fuirmidh cittern | Uncommon | *[Barkskin](https://www.aidedd.org/spell/barkskin), [Cure Wounds](https://www.aidedd.org/spell/cure-wounds), Fog Cloud* |
      | Ollamh harp | Legendary | *Confusion, Control Weather, Fire Storm* |
  fr:
    name: Instrument des bardes
    subtype: null
    description: |-
      Un *instrument des bardes* est supérieur à un instrument ordinaire en tous points. Il en existe sept types, chacun portant le nom d'un collège de bardes. Le tableau ci-dessous répertorie les sorts communs à tous les instruments, ainsi que les sorts spécifiques à chacun, et sa rareté. Une créature qui tente de jouer de l'instrument sans y être lié doit réussir un jet de sauvegarde de Sagesse DD 15 ou subir 2d4 dégâts psychiques.
      
      Vous pouvez jouer de l'instrument pour lancer l'un de ses sorts. Une fois l'instrument utilisé pour lancer un sort, il ne peut plus servir à lancer ce sort avant l'aube suivante. Les sorts utilisent votre caractéristique d'incantation et votre DD de sauvegarde.
      
      | Instrument | Rareté | Sorts |
      | --- | --- | --- |
      | Tous | - | *vol, invisibilité, lévitation, protection contre le mal et le bien* , plus les sorts listés pour chaque instrument |
      | Harpe d'Anstruth | Très rare | *soins* (au niveau 5), *tempête de grêle, mur d'épines* |
      | Mandoline de Canaith | Rare | *soins* (au niveau 3), *dissipation de la magie, protection contre l'énergie* (dégâts de foudre uniquement) |
      | Lyre de Cli | Rare | *façonnage de la pierre, mur de feu, mur de vent* |
      | Luth de Doss | Peu courant | *amitié avec les animaux, protection contre l'énergie* (dégâts de feu uniquement), *protection contre le poison* |
      | Bandore de Fochlucan | Peu courant | *enchevêtrement, lueurs féeriques, crosse des druides, communication avec les animaux* |
      | Cistre de MacFuirmidh | Peu courant | *peu d'écorce, soins, nappe de brouillard* |
      | Harpe d'Ollamh | Légendaire | *confusion, contrôle du climat, tempête de feu* |
