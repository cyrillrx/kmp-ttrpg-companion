id: potion-of-resistance
source: dmg_2024
type: potion
rarity: uncommon
attunement: false
translations:
  en:
    name: Potion of Resistance
    subtype: null
    description: |-
      When you drink this potion, you have Resistance to one type of damage for 1 hour. The DM chooses the type or determines it randomly by rolling on the following table.
      
      | 1d10 | Damage Type |
      | --- | --- |
      | 1 | Acid |
      | 2 | Cold |
      | 3 | Fire |
      | 4 | Force |
      | 5 | Lightning |
      | 6 | Necrotic |
      | 7 | Poison |
      | 8 | Psychic |
      | 9 | Radiant |
      | 10 | Thunder |
  fr:
    name: Potion de résistance
    subtype: null
    description: |-
      Lorsque vous buvez cette potion, vous bénéficiez d'une Résistance à un type de dégâts pendant 1 heure. Le MD choisit le type de dégâts ou le détermine aléatoirement en effectuant un jet sur la table suivante.
      
      | 1d10 | Type de dégâts |
      | --- | --- |
      | 1 | Acide |
      | 2 | Froid |
      | 3 | Feu |
      | 4 | Force |
      | 5 | Foudre |
      | 6 | Nécrotique |
      | 7 | Poison |
      | 8 | Psychique |
      | 9 | Radiant |
      | 10 | Tonnerre |
