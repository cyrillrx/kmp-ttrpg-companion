id: rod-of-resurrection
source: dmg_2024
type: rod
rarity: legendary
attunement: true
translations:
  en:
    name: Rod of Resurrection
    subtype: null
    description: |-
      <p>The rod has 5 charges. While you hold it, you can cast one of the following spells from it: <em><a href="https://www.aidedd.org/spell/heal">Heal</a></em> (expends 1 charge) or <em><a href="https://www.aidedd.org/spell/resurrection">Resurrection</a></em> (expends 5 charges).<br />
      The rod regains 1 expended charge daily at dawn. If you expend the last charge, roll 1d20. On a 1, the rod disappears in a harmless burst of radiance.</p>
  fr:
    name: Sceptre de résurrection
    subtype: null
    description: |-
      <p>Le bâton possède 5 charges. Lorsque vous le tenez, vous pouvez lancer l'un des sorts suivants : <em><a href="https://www.aidedd.org/spell/fr/guerison">guérison</a></em> (dépense 1 charge) ou <em><a href="https://www.aidedd.org/spell/fr/resurrection">résurrection</a></em> (dépense 5 charges).<br />
      Le bâton récupère 1 charge dépensée chaque jour à l'aube. Si vous dépensez la dernière charge, lancez 1d20. Sur un 1, le bâton disparaît dans un éclat radieux inoffensif.</p>
