id: folding-boat
source: dmg_2024
type: wondrous_item
rarity: rare
attunement: false
translations:
  en:
    name: Folding Boat
    subtype: null
    description: |-
      This object appears as a wooden box that measures 12 inches long, 6 inches wide, and 6 inches deep. It weighs 4 pounds and floats. It can be opened to store items inside. This item also has three command words, each requiring a Magic action to use:
      
      **First Command Word**. The box unfolds into a Rowboat.
      
      **Second Command Word**. The box unfolds into a Keelboat.
      
      **Third Command Word**. The *Folding Boat* folds back into a box if no creatures are aboard. Any objects in the vessel that can't fit inside the box remain outside the box as it folds. Any objects in the vessel that can fit inside the box do so.
      
      When the box becomes a vessel, its weight becomes that of a normal vessel its size, and anything that was stored in the box remains in the boat.
      
      Statistics for the Rowboat and Keelboat appear in the *Player's Handbook*. If either vessel is reduced to 0 Hit Points, the *Folding Boat* is destroyed.
  fr:
    name: Bateau pliable
    subtype: null
    description: |-
      Cet objet se présente sous la forme d'une boîte en bois mesurant 30 cm de long, 15 cm de large et 15 cm de profondeur. Elle pèse 2 kg et flotte. Elle peut être ouverte pour y ranger des objets. Cet objet possède également trois mots de commande, chacun nécessitant une action Magie :
      
      **Premier mot de commande**. La boîte se déplie pour former une barque.
      
      **Deuxième mot de commande**. La boîte se déplie pour former une barge.
      
      **Troisième mot de commande**. Le *bateau pliable* se replie en forme de boîte si aucune créature n'est à bord. Tous les objets du récipient qui ne peuvent pas rentrer dans la boîte restent à l'extérieur lorsqu'il se replie. Tous les objets du récipient qui peuvent rentrer dans la boîte le font.
      
      Lorsque la boîte devient un récipient, son poids devient celui d'un récipient normal de sa taille, et tout ce qui était rangé dans la boîte reste dans le récipient.
      
      Les profils de la barque et de la barge sont disponibles dans le *Manuel des joueurs*. Si l'une ou l'autre est réduite à 0 point de vie, le *bateau pliable* est détruit.
