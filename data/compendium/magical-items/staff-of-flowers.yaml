id: staff-of-flowers
source: dmg_2024
type: staff
rarity: common
attunement: false
translations:
  en:
    name: Staff of Flowers
    subtype: null
    description: |-
      <p>This wooden staff has 10 charges. While holding it, you can take a Magic action to expend 1 charge from the staff and cause a flower to sprout from a patch of earth or soil within 5 feet of yourself, or from the staff itself. Unless you choose a specific kind of flower, the staff creates a mild-scented daisy. The flower is harmless and nonmagical, and it grows or withers as a normal flower would.<br />
      <strong>Regaining Charges</strong>. The staff regains 1d6 + 4 expended charges daily at dawn. If you expend the last charge, roll 1d20. On a 1, the staff turns into flower petals and is lost forever.</p>
  fr:
    name: Bâton floral
    subtype: null
    description: |-
      <p>Ce bâton de bois possède 10 charges. Lorsque vous le tenez, vous pouvez prendre une action Magie pour dépenser 1 charge et faire pousser une fleur sur un coin de terre situé dans un rayon de 1,50 mètre, ou directement sur le bâton. À moins de choisir une fleur spécifique, le bâton crée une marguerite légèrement parfumée. La fleur est inoffensive et non magique ; elle pousse et se fane comme une fleur ordinaire.<br />
      <strong>Récupération des charges</strong>. Le bâton récupère 1d6 + 4 charges dépensées chaque jour à l'aube. Si vous dépensez la dernière charge, lancez 1d20. Sur un 1, le bâton se transforme en pétales et est perdu à jamais.</p>
