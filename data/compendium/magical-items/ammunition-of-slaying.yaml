id: ammunition-of-slaying
source: dmg_2024
type: weapon
rarity: very_rare
attunement: false
translations:
  en:
    name: Ammunition of Slaying
    subtype: Any Ammunition
    description: |-
      <p>This magic ammunition is meant to slay creatures of a particular type, which the DM chooses or determines randomly by rolling on the table below. If a creature of that type takes damage from the ammunition, the creature makes a DC 17 Constitution saving throw, taking an extra 6d10 Force damage on a failed save or half as much extra damage on a successful one.<br />
      After dealing its extra damage to a creature, the ammunition becomes nonmagical.<br />
      1d100| Creature Type<br />
      ---|---<br />
      01–10| Aberrations<br />
      11–15| Beasts<br />
      16–20| Celestials<br />
      21–25| Constructs<br />
      26–35| Dragons<br />
      36–45| Elementals<br />
      46–50| Humanoids<br />
      51–60| Fey<br />
      61–70| Fiends<br />
      71–75| Giants<br />
      76–80| Monstrosities<br />
      81–85| Oozes<br />
      86–90| Plants<br />
      91–00| Undead</p>
  fr:
    name: Projectile tueur
    subtype: tout projectile
    description: |-
      <p>Ce projectile magique est destiné à tuer des créatures d'un type particulier, choisi ou déterminé aléatoirement par le MD en effectuant un jet de dés sur la table ci-dessous. Si une créature de ce type subit des dégâts du projectile, elle effectue un jet de sauvegarde de Constitution DD 17, subissant 6d10 dégâts de force supplémentaires en cas d'échec ou la moitié de ces dégâts en cas de réussite.<br />
      Après avoir infligé ces dégâts supplémentaires à une créature, le projectile devient non magique.<br />
      1d100| Type de créature<br />
      ---|---<br />
      01–10| Aberrations<br />
      11–15| Bêtes<br />
      16–20| Célestes<br />
      21–25| Artificiels<br />
      26–35| Dragons<br />
      36–45| Élémentaires<br />
      46–50| Humanoïdes<br />
      51–60| Fées<br />
      61–70| Fiélons<br />
      71–75| Géants<br />
      76–80| Monstruosités<br />
      81–85| Vases<br />
      86–90| Plantes<br />
      91–00| Morts-vivants</p>
