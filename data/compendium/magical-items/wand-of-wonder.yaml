id: wand-of-wonder
source: dmg_2024
type: wand
rarity: rare
attunement: true
translations:
  en:
    name: Wand of Wonder
    subtype: null
    description: |-
      This wand has 7 charges. While holding it, you can take a Magic action to expend 1 charge while choosing a point within 120 feet of yourself. That location becomes the point of origin of a spell or other magical effect determined by rolling on the Wand of Wonder Effects table. Spells cast from the wand have a save DC of 15. If a spell's maximum range is normally less than 120 feet, it becomes 120 feet when cast from the wand. If an effect has multiple possible subjects, the DM determines randomly which among them are affected.
      
      **Regaining Charges**. The wand regains 1d6 + 1 expended charges daily at dawn. If you expend the wand's last charge, roll 1d20. On a 1, the wand crumbles into dust and is destroyed.
      
      | 1d100 | Effect |
      | --- | --- |
      | 01–20 | You cast a spell originating from the chosen point. Roll 1d10 to determine the spell: on a 1–2, *[Darkness](https://www.aidedd.org/spell/darkness)* ; on a 3–4, *[Faerie Fire](https://www.aidedd.org/spell/faerie-fire)* ; on a 5–6, *[Fireball](https://www.aidedd.org/spell/fireball)* ; on a 7–8, *[Slow](https://www.aidedd.org/spell/slow)* ; on a 9–10, *[Stinking Cloud](https://www.aidedd.org/spell/stinking-cloud)*. |
      | 21–25 | Nothing happens at the chosen point of origin. Instead, you have the Stunned condition until the start of your next turn, believing something awesome just happened. |
      | 26–30 | You cast *[Gust of Wind](https://www.aidedd.org/spell/gust-of-wind)*. The Line created by the spell extends from you to the chosen point of origin. |
      | 31–35 | Nothing happens at the chosen point of origin. Instead, you take 1d6 Psychic damage. |
      | 36–40 | Heavy rain falls for 1 minute in a 120-foot-high, 60-foot-radius Cylinder centered on the chosen point of origin. During that time, the area of effect is Lightly Obscured. |
      | 41–45 | A cloud of 600 oversized butterflies fills a 60-foot-high, 30-foot-radius Cylinder centered on the chosen point of origin. The butterflies remain for 10 minutes, during which time the area of effect is Heavily Obscured. |
      | 46–50 | You cast *[Lightning Bolt](https://www.aidedd.org/spell/lightning-bolt)*. The Line created by the spell extends from you to the chosen point of origin. |
      | 51–55 | The creature closest to the chosen point of origin is enlarged as if you had cast *[Enlarge/Reduce](https://www.aidedd.org/spell/enlarge-reduce)* on it. If the target isn't you and can't be affected by that spell, you become the target instead. |
      | 56–60 | A magically formed creature appears in an unoccupied space as close to the chosen point of origin as possible. The creature isn't under your control, acts as it normally would, and disappears after 1 hour or when it drops to 0 Hit Points. Roll 1d4 to determine which creature appears. On a 1, a **Rhinoceros** appears; on a 2, an **Elephant** appears; and on a 3–4, a **Rat** appears. |
      | 61–64 | Grass covers a 60-foot-radius circle of ground, with the center of that circle as close to the chosen point of origin as possible. Grass that's already there grows to ten times its normal size and remains overgrown for 1 minute. |
      | 65–68 | An object of the DM's choice disappears into the Ethereal Plane. The object must be neither worn nor carried, within 120 feet of the chosen point of origin, and no larger than 10 feet in any dimension. If there are no such objects in range, nothing happens. |
      | 69–72 | Nothing happens at the chosen point of origin. Instead, you shrink as if you had cast *[Enlarge/Reduce](https://www.aidedd.org/spell/enlarge-reduce)* on yourself and remain in that state for 1 minute. |
      | 73–77 | Leaves grow from the creature nearest to the chosen point of origin. Unless they are picked off, the leaves turn brown and fall off after 24 hours. |
      | 78–82 | Nothing happens at the chosen point of origin. Instead, a burst of colorful, shimmering light extends from you in a 30-foot Emanation. Each creature in the area must succeed on a DC 15 Constitution saving throw or have the Blinded condition for 1 minute. A creature repeats the save at the end of each of its turns, ending the effect on itself on a success. |
      | 83–87 | Nothing happens at the chosen point of origin. Instead, you cast *[Invisibility](https://www.aidedd.org/spell/invisibility)* on yourself. |
      | 88–92 | Nothing happens at the chosen point of origin. Instead, a stream of 1d4 × 10 gems, each worth 1 GP, shoots from the wand's tip in a Line 30 feet long and 5 feet wide toward the chosen point of origin. Each gem deals 1 Bludgeoning damage, and the total damage of the gems is divided equally among all creatures in the Line. |
      | 93–97 | You cast *[Polymorph](https://www.aidedd.org/spell/polymorph)* , targeting the creature closest to the chosen point of origin. Roll 1d4 to determine the target's new form. On a 1, the new form is a **Black Bear** ; on a 2, the new form is a **Giant Wasp** ; on a 3–4, the new form is a **Frog**. |
      | 98–00 | The creature closest to the chosen point of origin makes a DC 15 Constitution saving throw. On a failed save, the creature has the Restrained condition and begins to turn to stone. While Restrained in this way, the creature repeats the save at the end of its next turn. On a successful save, the effect ends. On a failed save, the creature has the Petrified condition instead of the Restrained condition. The petrification lasts until the creature is freed by the *[Greater Restoration](https://www.aidedd.org/spell/greater-restoration)* spell or similar magic. |
  fr:
    name: Baguette des merveilles
    subtype: null
    description: |-
      Cette baguette possède 7 charges. Lorsque vous la tenez, vous pouvez prendre une action Magie pour dépenser 1 charge en choisissant un point situé dans un rayon de 36 mètres. Ce point devient le point d'origine d'un sort ou d'un autre effet magique, déterminé par un jet de dés sur la table suivante. Le DD de sauvegarde des sorts lancés depuis la baguette est de 15. Si la portée maximale d'un sort est normalement inférieure à 36 mètres, elle passe à 36 mètres lorsqu'il est lancé depuis la baguette. Si un effet a plusieurs cibles possibles, le MD détermine aléatoirement lesquelles sont affectées.
      
      **Récupération des charges**. La baguette récupère 1d6 + 1 charges dépensées chaque jour à l'aube. Si vous dépensez la dernière charge de la baguette, lancez 1d20. Sur un 1, la baguette tombe en poussière et est détruite.
      
      | 1d100 | Effet |
      | --- | --- |
      | 01–20 | Vous lancez un sort provenant du point choisi. Lancez 1d10 pour déterminer le sort : 1-2, *[ténèbres](https://www.aidedd.org/spell/fr/tenebres)* ; 3-4, *[lueurs féeriques](https://www.aidedd.org/spell/fr/lueurs-feeriques)* ; 5-6, *[boule de feu](https://www.aidedd.org/spell/fr/boule-de-feu)* ; 7-8, *[lenteur](https://www.aidedd.org/spell/fr/lenteur)* ; 9-10, *[nuage nauséabond](https://www.aidedd.org/spell/fr/nuage-nauseabond)*. |
      | 21-25 | Rien ne se produit au point d'origine choisi. Au lieu de cela, vous subissez l'état Étourdi jusqu'au début de votre prochain tour, persuadé que quelque chose d'extraordinaire vient de se produire. |
      | 26-30 | Vous lancez *[bourrasque](https://www.aidedd.org/spell/fr/bourrasque)*. La Ligne créée par le sort s'étend de vous jusqu'au point d'origine choisi. |
      | 31-35 | Rien ne se produit au point d'origine choisi. Au lieu de cela, vous subissez 1d6 dégâts psychiques. |
      | 36–40 | Une pluie battante tombe pendant 1 minute dans un Cylindre de 36 mètres de haut et 18 mètres de rayon centré sur le point d'origine choisi. Pendant ce temps, la zone d'effet est à Visibilité réduite. |
      | 41–45 | Un nuage de 600 papillons géants remplit un Cylindre de 18 mètres de haut et 9 mètres de rayon centré sur le point d'origine choisi. Les papillons restent là pendant 10 minutes, période pendant laquelle la zone d'effet est à Visibilité nulle |
      | 46–50 | Vous lancez *[éclair](https://www.aidedd.org/spell/fr/eclair)*. La Ligne créée par le sort s'étend de vous jusqu'au point d'origine choisi. |
      | 51–55 | La créature la plus proche du point d'origine choisi est agrandie comme si vous aviez lancé *[agrandissement/rapetissement](https://www.aidedd.org/spell/fr/agrandissement-rapetissement)* sur elle. Si vous n'êtes pas la cible et que la cible ne peut être affectée par ce sort, vous devenez la cible. |
      | 56–60 | Une créature formée magiquement apparaît dans un espace inoccupé aussi proche que possible du point d'origine choisi. La créature n'est pas sous votre contrôle, agit normalement et disparaît après 1 heure ou lorsqu'elle tombe à 0 point de vie. Lancez 1d4 pour déterminer quelle créature apparaît : 1, un **rhinocéros** ; 2, un **éléphant** ; 3–4, un **rat**. |
      | 61–64 | De l'herbe couvre un cercle de 18 mètres de rayon, le centre de ce cercle étant aussi proche que possible du point d'origine choisi. L'herbe déjà présente pousse jusqu'à dix fois sa taille normale et reste ainsi durant 1 minute. |
      | 65–68 | Un objet choisi par le MD disparaît dans le plan Éthéré. L'objet ne doit pas être porté, se situer dans un rayon de 36 mètres autour du point d'origine choisi, et ne doit pas dépasser 3 mètres dans toutes les dimensions. S'il n'y a pas d'objets de ce type à portée, rien ne se produit. |
      | 69–72 | Rien ne se passe au point d'origine choisi. Au lieu de cela, vous rétrécissez comme si vous aviez lancé *[agrandissement/rapetissement](https://www.aidedd.org/spell/fr/agrandissement-rapetissement)* sur vous-même et restez dans cet état pendant 1 minute. |
      | 73–77 | Des feuilles poussent sur la créature la plus proche du point d'origine choisi. À moins qu'elles ne soient cueillies, les feuilles brunissent et tombent au bout de 24 heures. |
      | 78–82 | Rien ne se produit au point d'origine choisi. Au lieu de cela, un éclat de lumière colorée et chatoyante remplit une Émanation de 9 mètres centrée sur vous. Chaque créature dans la zone doit réussir un jet de sauvegarde de Constitution DD 15 ou subir l'état Aveuglé pendant 1 minute. Une créature refait le jet de sauvegarde à la fin de chacun de ses tours, mettant fin à l'effet sur elle-même en cas de réussite. |
      | 83–87 | Rien ne se produit au point d'origine choisi. Au lieu de cela, vous lancez *[invisibilité](https://www.aidedd.org/spell/fr/invisibilite)* sur vous-même. |
      | 88–92 | Rien ne se passe au point d'origine choisi. Au lieu de cela, un flot de 1d4 × 10 gemmes, valant chacune 1 po, jaillit de la pointe de la baguette sur une Ligne de 9 mètres de long et 1,50 mètre de large vers le point d'origine choisi. Chaque gemme inflige 1 dégât contondant, et le total des dégâts des gemmes est divisé équitablement entre toutes les créatures sur la Ligne. |
      | 93–97 | Vous lancez *[métamorphose](https://www.aidedd.org/spell/fr/metamorphose)* en ciblant la créature la plus proche du point d'origine choisi. Lancez 1d4 pour déterminer la nouvelle forme de la cible : 1, un **ours noir** ; 2, une **guêpe géante** ; 3–4, **une grenouille**. |
      | 98–00 | La créature la plus proche du point d'origine choisi effectue un jet de sauvegarde de Constitution DD 15. En cas d'échec, la créature subit l'état Entravé et commence à se pétrifier. Tant qu'elle est entravée, la créature renouvelle son jet de sauvegarde à la fin de son prochain tour. En cas de réussite, l'effet prend fin. En cas d'échec, la créature subit l'état Pétrifié au lieu d'Entravé. La pétrification dure jusqu'à ce que la créature soit libérée par le sort *[restauration suprême](https://www.aidedd.org/spell/fr/restauration-supreme)* ou une magie similaire. |
