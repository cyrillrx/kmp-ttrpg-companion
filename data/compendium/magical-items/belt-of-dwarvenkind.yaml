id: belt-of-dwarvenkind
source: dmg_2024
type: wondrous_item
rarity: rare
attunement: true
translations:
  en:
    name: Belt of Dwarvenkind
    subtype: null
    description: |-
      <p>While wearing this belt, you gain the following benefits:<br />
      <strong>Dwarvish</strong>. You know Dwarvish.<br />
      <strong>Friend of Dwarvenkind</strong>. You have Advantage on Charisma (Persuasion) checks made to interact with dwarves and duergar.<br />
      <strong>Toughness</strong>. Your Constitution increases by 2, to a maximum of 20.<br />
      In addition, while attuned to the belt, you have a 50 percent chance each day at dawn of growing a full beard if you can grow one, or a thicker beard if you already have one.<br />
      If you aren't a dwarf or duergar, you gain the following additional benefits while wearing the belt:<br />
      <strong>Darkvision</strong>. You have Darkvision with a range of 60 feet.<br />
      <strong>Resilience</strong>. You have Resistance to Poison damage. You also have Advantage on saving throws you make to avoid or end the Poisoned condition.</p>
  fr:
    name: Ceinturon des nains
    subtype: null
    description: |-
      <p>Lorsque vous portez cette ceinture, vous bénéficiez des avantages suivants :<br />
      <strong>Nain</strong>. Vous connaissez le nain.<br />
      <strong>Ami des nains</strong>. Vous avez un Avantage aux jets de Charisme (Persuasion) effectués pour interagir avec les nains et les duergars.<br />
      <strong>Robustesse</strong>. Votre Constitution augmente de 2, jusqu'à un maximum de 20.<br />
      De plus, lorsque vous êtes lié au ceinturon, vous avez 50 % de chances chaque jour à l'aube d'avoir une barbe fournie (si vous pouvez en faire pousser une) ou une barbe plus épaisse (si vous en avez déjà une).<br />
      Si vous n'êtes ni un nain ni un duergar, vous bénéficiez des avantages supplémentaires suivants lorsque vous portez la ceinture :<br />
      <strong>Vision dans le noir</strong>. Vous avez Vision dans le noir avec une portée de 18 mètres.<br />
      <strong>Résilience</strong>. Vous bénéficiez d'une Résistance aux dégâts de poison. Vous avez également un Avantage aux jets de sauvegarde effectués pour éviter ou mettre fin à l'état Empoisonné.</p>
