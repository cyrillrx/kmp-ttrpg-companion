id: armor-of-resistance
source: dmg_2024
type: armor
rarity: rare
attunement: true
translations:
  en:
    name: Armor of Resistance
    subtype: Any Light, Medium, or Heavy
    description: |-
      You have Resistance to one type of damage while you wear this armor. The DM chooses the type or determines it randomly by rolling on the following table.
      
      | 1d10 | Damage Type |
      | --- | --- |
      | 1 | Acid |
      | 2 | Cold |
      | 3 | Fire |
      | 4 | Force |
      | 5 | Lightning |
      | 6 | Necrotic |
      | 7 | Poison |
      | 8 | Psychic |
      | 9 | Radiant |
      | 10 | Thunder |
  fr:
    name: Armure de résistance
    subtype: légère, intermédiaire ou lourde
    description: |-
      Vous bénéficiez d'une Résistance à un type de dégâts lorsque vous portez cette armure. Le MD choisit le type ou le détermine aléatoirement en effectuant un jet sur la table suivante.
      
      | 1d10 | Type de dégâts |
      | --- | --- |
      | 1 | Acide |
      | 2 | Froid |
      | 3 | Feu |
      | 4 | Force |
      | 5 | Foudre |
      | 6 | Nécrotique |
      | 7 | Poison |
      | 8 | Psychique |
      | 9 | Radiant |
      | 10 | Tonnerre |
