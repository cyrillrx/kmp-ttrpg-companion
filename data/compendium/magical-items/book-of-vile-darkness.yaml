id: book-of-vile-darkness
source: dmg_2024
type: wondrous_item
rarity: artifact
attunement: true
translations:
  en:
    name: Book of Vile Darkness
    subtype: null
    description: |-
      <p>The contents of this foul manuscript are the meat and drink of the wicked. It contains knowledge so horrid that to even glimpse the scrawled pages invites doom.<br />
      Most believe the lich-god Vecna authored the <em>Book of Vile Darkness</em>. He recorded in its pages every horrid idea, every corrupt thought, and every example of foul magic he came across or devised.<br />
      Other practitioners of evil have added their own input to the book's catalog of vile knowledge. Their additions are clear, for the writers of later works stitched whatever they were writing into the tome or, in some cases, made notations and additions to existing text. There are places where pages are missing, torn, or covered so completely with ink, blood, and scratches that the original text can't be divined.<br />
      Nature can't abide the book's presence. Ordinary plants wither in its presence, common animals are unwilling to approach it, and the book gradually destroys whatever it touches. Even stone cracks and turns to powder if the book rests on it long enough.<br />
      Whenever a creature that isn't a Fiend or an Undead attunes to the <em>Book of Vile Darkness</em> , that creature makes a DC 17 Charisma saving throw. On a failed save, the creature is magically transformed into a Larva under the DM's control. Only a <em>Wish</em> spell can reverse this vile transformation.<br />
      A creature attuned to the book must spend 80 hours reading and studying it to digest its contents and use its Adjusted Ability Scores, Tireless Form, Spells, Vile Lore, and Vile Speech properties.<br />
      The <em>Book of Vile Darkness</em> remains with you only as long as you strive to work evil in the world. If you fail to perform at least one evil act within the span of 10 days, or if you willingly perform a good act, the book disappears, your Attunement to it ends immediately, and you lose all benefits granted by it. If you die while attuned to the book, an entity of great evil claims your soul. You can't be restored to life by any means while your soul remains imprisoned.<br />
      <strong>Adjusted Ability Scores</strong>. One ability score of your choice increases by 2, to a maximum of 24. Another ability score of your choice decreases by 2, to a minimum of 3. The book can't adjust your ability scores again.<br />
      <strong>Tireless Form</strong>. While the book is on your person, you have Immunity to the Exhaustion condition.<br />
      <strong>Random Properties</strong>. The <em>Book of Vile Darkness</em> has the following random properties (see the <em>Dungeon Master's Guide</em>):<br />
      • 3 minor beneficial properties<br />
      • 1 major beneficial property<br />
      • 3 minor detrimental properties<br />
      • 2 major detrimental properties<br />
      <strong>Spells</strong>. While attuned to the book and holding it, you can cast the following spells (save DC 18) from it:<br />
      • <em>Animate Dead</em><br />
      • <em>Circle of Death</em><br />
      • <em>Dominate Monster</em><br />
      • <em>Finger of Death</em><br />
      Once you use the book to cast a spell, you can't cast that spell again from it until the next dawn.<br />
      <strong>Vile Lore</strong>. You can reference the <em>Book of Vile Darkness</em> whenever you make an Intelligence check to recall information about some aspect of evil, such as lore about demons. When you do so, you have Advantage on that check.<br />
      At the DM's discretion, the book might reveal secrets no mortal should know, such as the true names of powerful Fiends, foul rites that allow one to transform into a death knight or lich, or long-lost spells crafted by beings so evil their names ought never to be spoken aloud.<br />
      <strong>Vile Speech</strong>. While the book is on your person, you can take a Magic action to recite words from its pages in a foul, dead language. Each time you do so, you take 1d12 Psychic damage, and each creature within 15 feet of you takes 3d6 Psychic damage unless the creature is a Fiend or an Undead.<br />
      <strong>Destroying the Book</strong>. The <em>Book of Vile Darkness</em> allows pages to be torn from it, but any evil lore contained on those pages finds its way back into the book eventually, usually when a new author adds pages to the tome.<br />
      If a solar tears the book in two, the book is destroyed for 1d100 years, after which it re-forms in some far corner of the multiverse.<br />
      A creature attuned to the book for 100 years can unearth a phrase hidden in the original text that, when translated to Celestial and spoken aloud, destroys both the speaker and the book in a flash of radiance. However, as long as evil exists in the multiverse, the book re-forms 1d10 × 100 years later.</p>
