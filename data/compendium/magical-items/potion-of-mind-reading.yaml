id: potion-of-mind-reading
source: dmg_2024
type: potion
rarity: rare
attunement: false
translations:
  en:
    name: Potion of Mind Reading
    subtype: null
    description: |-
      <p>When you drink this potion, you gain the effect of the <em><a href="https://www.aidedd.org/spell/detect-thoughts">Detect Thoughts</a></em> spell (save DC 13) for 10 minutes (no Concentration required).<br />
      This potion's dense, purple liquid has an ovoid cloud of pink floating in it.</p>
  fr:
    name: Potion de lecture des pensées
    subtype: null
    description: |-
      <p>Lorsque vous buvez cette potion, vous bénéficiez de l'effet du sort <em><a href="https://www.aidedd.org/spell/fr/detection-des-pensees">détection des pensées</a></em> (sauvegarde DD 13) pendant 10 minutes (aucune concentration requise).<br />
      Le liquide violet dense de cette potion contient un nuage rose ovoïde.</p>
