id: javelin-of-lightning
source: dmg_2024
type: weapon
rarity: uncommon
attunement: false
translations:
  en:
    name: Javelin of Lightning
    subtype: Javelin
    description: |-
      <p>Each time you make an attack roll with this magic weapon and hit, you can have it deal Lightning damage instead of Piercing damage.<br />
      <strong>Lightning Bolt</strong>. When you throw this weapon at a target no farther than 120 feet from you, you can forgo making a ranged attack roll and instead turn the weapon into a bolt of lightning. This bolt forms a 5-foot-wide Line between you and the target. The target and each other creature in the Line (excluding you) makes a DC 13 Dexterity saving throw, taking 4d6 Lightning damage on a failed save or half as much damage on a successful one. Immediately after dealing this damage, the weapon reappears in your hand. This property can't be used again until the next dawn.</p>
  fr:
    name: Javeline de foudre
    subtype: javeline
    description: |-
      <p>Chaque fois que vous effectuez un jet d'attaque avec cette arme magique et que vous touchez, vous pouvez lui faire infliger des dégâts de foudre au lieu de dégâts perforants.<br />
      <strong>Éclair</strong>. Lorsque vous lancez cette arme sur une cible située dans un rayon de 36 mètres autour de vous, vous pouvez renoncer au jet d'attaque à distance et le transformer en éclair. Cet éclair forme une ligne de 1,50 mètre de large entre vous et la cible. La cible et chaque autre créature sur la ligne (à l'exception de vous) effectuent un jet de sauvegarde de Dextérité DD 13, subissant 4d6 dégâts de foudre en cas d'échec ou la moitié de ces dégâts en cas de réussite. Immédiatement après avoir infligé ces dégâts, l'arme réapparaît dans votre main. Cette propriété ne peut plus être utilisée avant l'aube suivante.</p>
