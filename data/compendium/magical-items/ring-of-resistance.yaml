id: ring-of-resistance
source: dmg_2024
type: ring
rarity: rare
attunement: false
translations:
  en:
    name: Ring of Resistance
    subtype: null
    description: |-
      You have Resistance to one damage type while wearing this ring. The gemstone in the ring indicates the type, which the DM chooses or determines randomly by rolling on the following table.\
      
      | 1d10 | Damage Type | Gemstone |
      | --- | --- | --- |
      | 1 | Acid | Pearl |
      | 2 | Cold | Tourmaline |
      | 3 | Fire | Garnet |
      | 4 | Force | Sapphire |
      | 5 | Lightning | Citrine |
      | 6 | Necrotic | Jet |
      | 7 | Poison | Amethyst |
      | 8 | Psychic | Jade |
      | 9 | Radiant | Topaz |
      | 10 | Thunder | Spinel |
  fr:
    name: Anneau de résistance
    subtype: null
    description: |-
      Vous bénéficiez d'une Résistance à un type de dégâts lorsque vous portez cet anneau. La pierre précieuse de l'anneau indique le type de dégâts, que le MD choisit ou détermine aléatoirement en utilisant la table suivante.\
      
      | 1d10 | Type de dégâts | Gemmes |
      | --- | --- | --- |
      | 1 | Acide | Perle |
      | 2 | Froid | Tourmaline |
      | 3 | Feu | Grenat |
      | 4 | Force | Saphir |
      | 5 | Foudre | Citrine |
      | 6 | Nécrotique | Jais |
      | 7 | Poison | Améthyste |
      | 8 | Psychique | Jade |
      | 9 | Radiant | Topaze |
      | 10 | Tonnerre | Spinelle |
