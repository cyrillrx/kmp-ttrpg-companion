id: demon-armor
source: dmg_2024
type: armor
rarity: very_rare
attunement: true
translations:
  en:
    name: Demon Armor
    subtype: Any Light, Medium, or Heavy
    description: |-
      While wearing this armor, you gain a +1 bonus to Armor Class, and you know Abyssal. In addition, the armor's clawed gauntlets allow your Unarmed Strikes to deal 1d8 Slashing damage instead of the usual Bludgeoning damage, and you gain a +1 bonus to the attack and damage rolls of your Unarmed Strikes.
      
      **Curse**. Once you don this cursed armor, you can't doff it unless you are targeted by a *[Remove Curse](https://www.aidedd.org/spell/remove-curse)* spell or similar magic. While wearing the armor, you have Disadvantage on attack rolls against demons and on saving throws against their spells and special abilities.
  fr:
    name: Armure démoniaque
    subtype: légère, intermédiaire ou lourde
    description: |-
      Lorsque vous portez cette armure, vous gagnez un bonus de +1 à la CA et vous connaissez l'abyssal. De plus, les gantelets griffus de l'armure permettent à vos Frappes à mains nues d'infliger 1d8 dégâts tranchants au lieu des dégâts contondants habituels, et vous gagnez un bonus de +1 aux jets d'attaque et de dégâts de vos Frappes à mains nues.
      
      **Malédiction**. Une fois cette armure maudite revêtue, vous ne pouvez la retirer que si vous êtes la cible d'un sort de *[délivrance des malédictions](https://www.aidedd.org/spell/fr/delivrance-des-maledictions)* ou d'une magie similaire. En portant cette armure, vous avez un Désavantage aux jets d'attaque contre les démons et aux jets de sauvegarde contre leurs sorts et capacités spéciales.
