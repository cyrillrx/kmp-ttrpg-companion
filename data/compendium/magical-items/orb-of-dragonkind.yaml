id: orb-of-dragonkind
source: dmg_2024
type: wondrous_item
rarity: artifact
attunement: true
translations:
  en:
    name: Orb of Dragonkind
    subtype: null
    description: |-
      <p>Long ago, in the Dragonlance setting, elves and humans waged a terrible war against chromatic dragons. When the world seemed doomed, the wizards of the Towers of High Sorcery came together and forged five <em>Orbs of Dragonkind</em> to help defeat the dragons. One orb was taken to each of the five towers, and there they were used to speed the war toward a victorious end. The wizards used the orbs to lure dragons to them, then destroyed the dragons with powerful magic.<br />
      As the Towers of High Sorcery fell in later ages, the orbs were destroyed or faded into legend, and only three are thought to survive. Their magic has been warped over the centuries. Their primary purpose of calling dragons still functions, but they also allow some measure of control over dragons.<br />
      Each orb contains the essence of an evil dragon, a presence that resents any attempt to coax magic from it. Those who try to wield an orb's magic but lack sufficient force of personality might find themselves under the orb's control.<br />
      An orb is an etched crystal globe about 10 inches in diameter. When used, it grows to about 20 inches in diameter, and mist swirls inside it.<br />
      While attuned to an orb, you can take a Magic action to peer into the orb's depths. You must then make a DC 15 Charisma saving throw. On a successful save, you control the orb for as long as you remain attuned to it. On a failed save, the orb imposes the Charmed condition on you for as long as you remain attuned to it.<br />
      While you are Charmed by the orb, you can't voluntarily end your Attunement to it, and the orb casts <em><a href="https://www.aidedd.org/spell/suggestion">Suggestion</a></em> on you at will (save DC 18), urging you to work toward the evil ends it desires. The dragon essence within the orb might want many things: the annihilation of a particular society or organization, freedom from the orb, to spread suffering in the world, to advance the worship of Tiamat, or something else the DM decides.<br />
      <strong>Random Properties</strong>. An <em>Orb of Dragonkind</em> has the following random properties (see the <em>Dungeon Master's Guide</em>):<br />
      • 2 minor beneficial properties<br />
      • 1 minor detrimental property<br />
      • 1 major detrimental property<br />
      <strong>Spells</strong>. The orb has 7 charges and regains 1d4 + 3 expended charges daily at dawn. If you control the orb, you can cast one of the spells on the following table from it. The table indicates how many charges you must expend to cast the spell.<br />
      Spell| Charge Cost<br />
      ---|---<br />
      <em><a href="https://www.aidedd.org/spell/cure-wounds">Cure Wounds</a></em> (level 9 version)| 4<br />
      <em>Daylight</em>|  1<br />
      <em>Death Ward</em>|  2<br />
      <em>Detect Magic</em>|  0<br />
      <em><a href="https://www.aidedd.org/spell/scrying">Scrying</a></em> (save DC 18)| 3  </p>
      <p><strong>Call Dragons</strong>. While you control the orb, you can take a Magic action to cause the orb to issue a telepathic call that extends in all directions for 40 miles. Chromatic dragons in range feel compelled to come to the orb as soon as possible by the most direct route. Dragon deities such as Tiamat are unaffected by this call. Chromatic dragons drawn to the orb might be Hostile toward you for compelling them against their will. Once you have used this property, it can't be used again for 1 hour.<br />
      <strong>Destroying an Orb</strong>. An <em>Orb of Dragonkind</em> has AC 20 and is destroyed if it takes damage from a <em>+3 Weapon</em> or a <em>Disintegrate</em> spell. Nothing else can harm it.</p>
  fr:
    name: Orbe des dragons
    subtype: null
    description: |-
      <p>Il y a bien longtemps, dans l'univers de Dragonlance, elfes et humains livrèrent une terrible guerre contre des dragons chromatiques. Alors que le monde semblait condamné, les magiciens des tours de Haute Sorcellerie se réunirent et forgèrent cinq <em>Orbes des Dragon</em> pour vaincre les dragons. Un orbe fut apporté à chacune des cinq tours, où ils furent utilisés pour accélérer la guerre et mener à la victoire. Les magiciens utilisèrent les orbes pour attirer les dragons, puis les détruisirent grâce à une puissante magie.<br />
      Lorsque les tours de Haute Sorcellerie s'effondrèrent au fil des âges, les orbes furent détruits ou tombèrent dans la légende. Seuls trois auraient survécu, mais leur magie a été déformée au fil des siècles. Leur fonction première, qui était d'appeler les dragons, est toujours d'actualité, mais ils permettent également un certain contrôle sur eux.<br />
      Chaque orbe renferme l'essence d'un dragon maléfique, une présence qui rejette toute tentative d'en extraire de la magie. Ceux qui tentent de maîtriser la magie d'un orbe, mais manquent de force de caractère, risquent de se retrouver sous son emprise.<br />
      Un orbe est un globe de cristal gravé d'environ 25 cm de diamètre. Lorsqu'il est utilisé, il atteint environ 50 cm de diamètre et une brume tourbillonne à l'intérieur.<br />
      Lorsque vous êtes lié à un orbe, vous pouvez prendre une action Magie pour scruter ses profondeurs. Vous devez ensuite effectuer un jet de sauvegarde de Charisme DD 15. En cas de réussite, vous contrôlez l'orbe tant que vous restez lié avec lui. En cas d'échec, l'orbe vous impose l'état Charmé tant que vous restez lié avec lui.<br />
      Tant que vous êtes charmé par l'orbe, vous ne pouvez pas mettre fin volontairement à votre lien avec lui, et l'orbe lance <em>suggestion</em> sur vous à volonté (sauvegarde DD 18), vous incitant à œuvrer pour les fins maléfiques qu'il désire. L'essence draconique contenue dans l'orbe peut avoir de multiples objectifs : l'anéantissement d'une société ou d'une organisation particulière, la libération de l'orbe, la propagation de la souffrance dans le monde, le développement du culte de Tiamat, ou tout autre objectif décidé par le MD.<br />
      <strong>Propriétés aléatoires</strong>. Un <em>Orbe des dragons</em> possède les propriétés aléatoires suivantes (voir le <em>Guide du Maître</em>) :<br />
      • 2 propriétés bénéfiques mineures<br />
      • 1 propriété néfaste mineure<br />
      • 1 propriété néfaste majeure<br />
      <strong>Sorts</strong>. L'orbe possède 7 charges et récupère 1d4 + 3 charges dépensées chaque jour à l'aube. Si vous contrôlez l'orbe, vous pouvez lancer l'un des sorts de la table suivante. Cette table indique le nombre de charges à dépenser pour lancer le sort.<br />
      Sort| Coût en charges<br />
      ---|---<br />
      <em>soins</em> (version niveau 9)| 4<br />
      <em>lumière du jour</em>|  1<br />
      <em>protection contre la mort</em>|  2<br />
      <em>détection de la magie</em>|  0<br />
      <em>scrutation</em> (sauvegarde DD 18)| 3  </p>
      <p><strong>Appel des dragons</strong>. Tant que vous contrôlez l'orbe, vous pouvez prendre une action Magie pour que l'orbe émette un appel télépathique qui s'étend dans toutes les directions sur 60 km. Les dragons chromatiques à portée se sentent obligés de rejoindre l'orbe au plus vite par le chemin le plus direct. Les divinités draconiques comme Tiamat ne sont pas affectées par cet appel. Les dragons chromatiques attirés par l'orbe peuvent se montrer hostiles envers vous pour les avoir contraints à venir. Une fois cette propriété utilisée, elle ne peut plus être utilisée pendant 1 heure.<br />
      <strong>Destruction d'un orbe</strong>. Un <em>Orbe des dragons</em> a une CA de 20 et est détruit s'il subit des dégâts d'une <em>arme +3</em> ou d'un sort de <em>désintégration</em>. Rien d'autre ne peut lui nuire.</p>
