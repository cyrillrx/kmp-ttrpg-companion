id: deck-of-illusions
source: dmg_2024
type: wondrous_item
rarity: uncommon
attunement: false
translations:
  en:
    name: Deck of Illusions
    subtype: null
    description: |-
      This box contains a set of cards. A full deck has 34 cards: 32 depicting specific creatures and two with a mirrored surface. A deck found as treasure is usually missing 1d20 - 1 cards.\
      The magic of the deck functions only if its cards are drawn at random. You can take a Magic action to draw a card at random from the deck and throw it to the ground at a point within 30 feet of yourself. An illusion of a creature, determined by rolling on the table, forms over the thrown card and remains until dispelled. The illusory creature created by the card looks and behaves like a real creature of its kind, except that it can do no harm. While you are within 120 feet of the illusory creature and can see it, you can take a Magic action to move it anywhere within 30 feet of its card.\
      Any physical interaction with the illusory creature reveals it to be false, because objects pass through it. A creature that takes a Study action to visually inspect the illusory creature identifies it as an illusion with a successful DC 15 Intelligence (Investigation) check. The illusion lasts until its card is moved or the illusion is dispelled (using a *[Dispel Magic](https://www.aidedd.org/spell/dispel-magic)* spell or a similar effect). When the illusion ends, the image on its card disappears, and that card can't be used again.\
      
      | 1d100 | Illusion\* |
      | --- | --- |
      | 01-03 | Adult Red Dragon |
      | 04-06 | Archmage |
      | 07-09 | Assassin |
      | 10-12 | Bandit Captain |
      | 13-15 | Beholder |
