  fr:
    name: Cartes d'illusion / Tarot fantasmagorique
    subtype: null
    description: |-
      Cette boîte contient un jeu de cartes. Un jeu complet se compose de 34 cartes (ou « lames ») : 32 représentent des créatures spécifiques, les deux dernières ont une surface réfléchissante. Il manque généralement 1d20 − 1 cartes à un jeu trouvé comme trésor.\
      La magie du tarot n'opère que si les lames sont piochées au hasard. Vous pouvez consacrer l'action Magie à piocher une lame au hasard et à la jeter au sol, en un point situé dans un rayon de 9 m de vous. L'illusion d'une créature, déterminée par un tirage sur la table, se forme au-dessus de la carte ainsi jetée et persiste jusqu'à dissipation. La créature illusoire créée par la lame ressemble à une vraie créature de son espèce et se comporte comme telle, mais elle est parfaitement inoffensive. Tant que vous êtes dans un rayon de 36 m de la créature illusoire et que vous la voyez, vous pouvez consacrer l'action Magie à la déplacer en n'importe quel point situé dans un rayon de 9 m de sa carte d'origine.\
      Toute interaction physique avec la créature illusoire percera l'illusion, car elle est intangible. Une créature qui entreprend l'action Étude afin d'inspecter visuellement la créature illusoire perce l'illusion pour peu qu'elle réussisse un jet d'Intelligence (Investigation) DD 15. L'illusion persiste jusqu'à sa dissipation (par le biais du sort *dissipation de la magie* ou de tout effet comparable) ou que sa carte soit déplacée. Lorsque l'illusion prend fin, l'image de la carte s'efface et cette carte ne peut pas être réutilisée.\
      
      | 1d100 | Illusion\* |
      | --- | --- |
