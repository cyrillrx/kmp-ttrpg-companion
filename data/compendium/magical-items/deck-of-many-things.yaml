id: deck-of-many-things
source: dmg_2024
type: wondrous_item
rarity: legendary
attunement: false
translations:
  en:
    name: Deck of Many Things
    subtype: null
    description: |-
      <p>Usually found in a box or pouch, this deck contains a number of cards made of ivory or vellum. Most (75 percent) of these decks have thirteen cards, but some have twenty-two. Use the appropriate column of the table when randomly determining cards drawn from the deck.<br />
      Before you draw a card, you must declare how many cards you intend to draw and then draw them randomly. Any cards drawn in excess of this number have no effect. Otherwise, as soon as you draw a card from the deck, its magic takes effect. You must draw each card no more than 1 hour after the previous draw. If you fail to draw the chosen number, the remaining number of cards fly from the deck on their own and take effect all at once.<br />
      Once a card is drawn, it disappears. Unless the card is the Fool or Jester, the card reappears in the deck, making it possible to draw the same card twice. (Once the Fool or Jester has left the deck, reroll on the table if that card comes up again.)<br />
      1d100<br />
      (13-Card Deck)| 1d100<br />
      (22-Card Deck)| Card<br />
      ---|---|---<br />
      —| 01–05| Balance<br />
      —| 06–10| Comet<br />
      —| 11–14| Donjon<br />
      01–08| 15–18| Euryale<br />
      —| 19–23| Fates<br />
      09–16| 24–27| Flames<br />
      —| 28–31| Fool<br />
      —| 32–36| Gem<br />
      17–24| 37–41| Jester<br />
      25–32| 42–46| Key<br />
      33–40| 47–51| Knight<br />
      41–48| 52–56| Moon<br />
      —| 57–60| Puzzle<br />
      49–56| 61–64| Rogue<br />
      57–64| 65–68| Ruin<br />
      —| 69–73| Sage<br />
      65–72| 74–77| Skull<br />
      73–80| 78–82| Star<br />
      81–88| 83–87| Sun<br />
      —| 88–91| Talons<br />
      89–96| 92–96| Throne<br />
      97–00| 97–00| Void  </p>
      <p>Each card's effect is described below.<br />
      <strong>Balance</strong>. You can increase one of your ability scores by 2, to a maximum of 22, provided you also decrease another one of your ability scores by 2. You can't decrease an ability that has a score of 5 or lower. Alternatively, you can choose not to adjust your ability scores, in which case this card has no effect.<br />
      <strong>Comet</strong>. The next time you enter combat against one or more Hostile creatures, you can select one of them as your foe when you roll Initiative. If you reduce your foe to 0 Hit Points during that combat, you have Advantage on Death Saving Throws for 1 year. If someone else reduces your chosen foe to 0 Hit Points or you don't choose a foe, this card has no effect.<br />
      <strong>Donjon</strong>. You disappear and become entombed in a state of suspended animation in an extradimensional sphere. Everything you're wearing and carrying disappears with you except for Artifacts, which stay behind in the space you occupied when you disappeared. You remain imprisoned until you are found and removed from the sphere. You can't be located by any Divination magic, but a <em><a href="https://www.aidedd.org/spell/wish">Wish</a></em> spell can reveal the location of your prison. You draw no more cards.<br />
      <strong>Euryale</strong>. The card's medusa-like visage curses you. You take a −2 penalty to saving throws while cursed in this way. Only a god or the magic of the Fates card can end this curse.<br />
      <strong>Fates</strong>. Reality's fabric unravels and spins anew, allowing you to avoid or erase one event as if it never happened. You can use the card's magic as soon as you draw the card or at any other time before you die.<br />
      <strong>Flames</strong>. A powerful devil becomes your enemy. The devil seeks your ruin and torments you, savoring your suffering before attempting to slay you. This enmity lasts until either you or the devil dies.<br />
      <strong>Fool</strong>. You have Disadvantage on D20 Tests for the next 72 hours. Draw another card; this draw doesn't count as one of your declared draws.<br />
      <strong>Gem</strong>. Twenty-five pieces of jewelry worth 2,000 GP each or fifty gems worth 1,000 GP each appear at your feet.<br />
      <strong>Jester</strong>. You have Advantage on D20 Tests for the next 72 hours, or you can draw two additional cards beyond your declared draws.<br />
      <strong>Key</strong>. A Rare or rarer magic weapon with which you are proficient appears on your person. The DM chooses the weapon.<br />
      <strong>Knight</strong>. You gain the service of a Knight, who magically appears in an unoccupied space you choose within 30 feet of yourself. The knight has the same alignment as you and serves you loyally until death, believing the two of you have been drawn together by fate. Work with your DM to create a name and backstory for this NPC. The DM can use a different stat block to represent the knight, as desired.<br />
      <strong>Moon</strong>. You gain the ability to cast <em><a href="https://www.aidedd.org/spell/wish">Wish</a></em> 1d3 times.<br />
      <strong>Puzzle</strong>. Permanently reduce your Intelligence or Wisdom by 1d4 + 1 (to a minimum score of 1). You can draw one additional card beyond your declared draws.<br />
      <strong>Rogue</strong>. An NPC of the DM's choice becomes Hostile toward you. You don't know the identity of this NPC until they or someone else reveals it. Nothing less than a <em><a href="https://www.aidedd.org/spell/wish">Wish</a></em> spell or divine intervention can end the NPC's hostility toward you.<br />
      <strong>Ruin</strong>. All forms of wealth that you carry or own, other than magic items, are lost to you. Portable property vanishes. Businesses, buildings, and land you own are lost in a way that alters reality the least. If you have a Bastion, it is destroyed by some calamity beyond your control. Any documentation that proves you should own something lost to this card also disappears.<br />
      <strong>Sage</strong>. At any time you choose within one year of drawing this card, you can ask a question in meditation and mentally receive a truthful answer to that question.<br />
      <strong>Skull</strong>. An <strong>Avatar of Death</strong> appears in an unoccupied space as close to you as possible. The avatar targets only you with its attacks, appearing as a ghostly skeleton clad in a tattered black robe and carrying a spectral scythe. The avatar disappears when it drops to 0 Hit Points or you die. If an ally of yours deals damage to the avatar, that ally summons another Avatar of Death. The new avatar appears in an unoccupied space as close to that ally as possible and targets only that ally with its attacks. You and your allies can each summon only one avatar as a consequence of this draw. A creature slain by an avatar can't be restored to life.<br />
      <strong>Star</strong>. Increase one of your ability scores by 2, to a maximum of 24.<br />
      <strong>Sun</strong>. A magic item (chosen by the DM) appears on your person. In addition, you gain 10 Temporary Hit Points daily at dawn until you die.<br />
      <strong>Talons</strong>. Every magic item you wear or carry disintegrates. Artifacts in your possession vanish instead.<br />
      <strong>Throne</strong>. You gain proficiency and Expertise in your choice of History, Insight, Intimidation, or Persuasion. In addition, you gain rightful ownership of a small keep somewhere in the world. However, the keep is currently home to one or more monsters, which must be cleared out before you can claim the keep as yours.<br />
      <strong>Void</strong>. Your soul is drawn from your body and contained in an object in a place of the DM's choice. One or more powerful beings guard the place. While your soul is trapped in this way, your body is inert, ceases aging, and requires no food, air, or water. A <em><a href="https://www.aidedd.org/spell/wish">Wish</a></em> spell can't return your soul to your body, but the spell reveals the location of the object that holds your soul. You draw no more cards.</p>
  fr:
    name: Cartes merveilleuses / Tarot merveilleux
    subtype: null
    description: |-
      <p>Généralement rangé dans un étui ou une sacoche, ce jeu de tarot se compose de cartes (ou « lames ») en ivoire ou en vélin. Si la plupart (75 %) de ces jeux comportent treize cartes, certains en ont vingt-deux. Référez-vous à la colonne correspondante de la table pour laisser le hasard décider des cartes que vous piochez dans le jeu.<br />
      Avant de piocher une carte, vous devez déclarer combien de cartes vous comptez tirer, puis vous les piochez au hasard. Toutes les cartes piochées au-delà du chiffre annoncé sont sans effet. Sinon, la magie d'une carte opère dès que vous piochez celle-ci dans le paquet. Vous ne devez pas laisser s'écouler plus d'une heure entre chaque pioche. Si vous renoncez à piocher le chiffre annoncé, le nombre de cartes qui reste pour atteindre ce chiffre s'envole de lui-même du paquet et prend effet simultanément.<br />
      Dès qu'une carte a été piochée, elle disparaît. À moins que cette carte soit le Fou ou le Bouffon, la carte réapparaît dans le paquet, ce qui laisse la possibilité de piocher deux fois la même carte (quand le Fou ou le Bouffon quitte le jeu, relancez sur la table si cette carte est tirée de nouveau).<br />
      1d100<br />
      (jeu de 13 cartes)| 1d100<br />
      (jeu de 22 cartes)| Carte<br />
      ---|---|---<br />
      —| 01–05| La Balance<br />
      01–08| 06–10| Le Bouffon<br />
      09–16| 11–15| Le Chevalier<br />
      17–24| 16–20| La Clef<br />
      —| 21–25| La Comète<br />
      25–32| 26–29| Le Crâne<br />
      —| 30–33| Le Donjon<br />
      —| 34–37| L'Énigme<br />
      33–40| 38–42| L'Étoile<br />
      41–48| 43–46| Euryale<br />
      49–56| 47–50| Les Flammes<br />
      —| 51–54| Le Fou<br />
      —| 55–59| La Gemme<br />
      57–64| 60–64| La Lune<br />
      65–68| 65–68| Le Néant<br />
      —| 69–73| Les Parques<br />
      69–76| 74–77| La Ruine<br />
      —| 78–81| Les Serres<br />
      77–84| 82–86| Le Soleil<br />
      85–92| 87–90| Le Traître<br />
      93–100| 91–95| Le Trône<br />
      —| 96–00| Le Vizir  </p>
      <p>L'effet de chaque carte est décrit ci-dessous.<br />
      <strong>La Balance</strong>. Vous pouvez augmenter de 2 l'une de vos valeurs de caractéristique, jusqu'à un maximum de 22, à condition de diminuer une autre valeur de caractéristique de 2. Il vous est interdit de diminuer une caractéristique dont la valeur est inférieure ou égale à 5. Vous pouvez également choisir de ne pas modifier vos valeurs de caractéristique, auquel cas cette lame est sans effet.<br />
      <strong>Le Bouffon</strong>. Vous bénéficiez de l'Avantage aux jets de d20 pendant les 72 prochaines heures, ou bien vous pouvez piocher deux cartes en plus du chiffre annoncé.<br />
      <strong>Le Chevalier</strong>. Vous recevez l'allégeance d'un chevalier, qui apparaît magiquement en un espace inoccupé dans un rayon de 9 m de vous. Ce chevalier est du même alignement que vous et vous sert loyalement jusqu'à sa mort, convaincu que vos destins sont intimement liés. Concertez-vous avec votre MD afin d'imaginer un nom et une histoire à ce PNJ. Le MD peut décider de recourir à un autre profil de jeu pour ce chevalier, à sa guise.<br />
      <strong>La Clef</strong>. Une arme magique rare ou de rareté supérieure, dont vous avez la maîtrise, apparaît dans vos mains. C'est le MD qui choisit cette arme.<br />
      <strong>La Comète</strong>. La prochaine fois que vous entrez en combat avec une ou plusieurs créatures Hostiles, vous pouvez désigner l'une d'elles comme votre ennemi au moment de jouer l'Initiative. Si vous réduisez cet ennemi à 0 point de vie lors du combat, vous bénéficierez de l'Avantage aux jets de sauvegarde contre la mort pendant 1 an. Si quelqu'un d'autre réduit votre ennemi désigné à 0 point de vie ou si vous n'en avez choisi aucun, cette lame est sans effet.<br />
      <strong>Le Crâne</strong>. Un <strong>avatar de la Mort</strong> apparaît dans un espace inoccupé, aussi près que possible de vous. L'avatar, un inquiétant squelette vêtu d'une robe noire et brandissant une faux spectrale, ne prend que vous pour cible avec ses attaques. L'avatar disparaît lorsqu'il tombe à 0 point de vie ou que vous mourez. Si l'un de vos alliés inflige des dégâts à l'avatar, cet allié convoque un autre <strong>avatar de la Mort</strong>. Le nouvel avatar apparaît dans un espace inoccupé, aussi près que possible de cet allié, et ne cible que ce dernier avec ses attaques. Vous-même et vos alliés ne pouvez convoquer chacun qu'un seul avatar en conséquence de cette pioche. Une créature tuée par un avatar ne peut pas être ramenée à la vie.<br />
      <strong>Le Donjon</strong>. Vous disparaissez et plongez dans un état d'animation suspendue au sein d'une sphère extradimensionnelle. Tout ce que vous portiez disparaît avec vous hormis les Artefacts, qui demeurent dans l'espace que vous occupiez au moment de votre disparition. Vous restez emprisonné jusqu'à ce qu'on vous trouve ou vous retire de la sphère. Il est impossible de vous localiser au moyen de la magie de Divination, mais le sort souhait révèle la position de votre prison. Vous ne piochez plus aucune carte.<br />
      <strong>L'Énigme</strong>. Réduit de façon permanente votre Intelligence ou votre Sagesse de 1d4 + 1 (valeur minimale de 1). Vous pouvez piocher une carte en plus du chiffre annoncé.<br />
      <strong>L'Étoile</strong>. L'une de vos valeurs de caractéristique augmente de 2, jusqu'à un maximum de 24.<br />
      <strong>Euryale</strong>. Le visage de méduse de la carte vous lance une malédiction. Vous subissez un malus de –2 aux jets de sauvegarde tant que persiste cette malédiction. Seul un dieu ou la magie de la carte « Les Parques » permet de lever cette malédiction.<br />
      <strong>Les Flammes</strong>. Un diable puissant devient votre ennemi. Ce diable travaille à votre perte et vous tourmente en savourant vos souffrances, avant de tenter de vous tuer. Cette haine persiste jusqu'à votre mort ou celle du diable.<br />
      <strong>Le Fou</strong>. Vous subissez le Désavantage aux jets de d20 pendant les 72 prochaines heures. Piochez une autre carte ; celle-ci n'est pas décomptée du chiffre annoncé.<br />
      <strong>La Gemme</strong>. Vingt-cinq bijoux d'une valeur unitaire de 2 000 po ou cinquante pierres précieuses d'une valeur unitaire de 1 000 po apparaissent à vos pieds.<br />
      <strong>La Lune</strong>. Vous recevez l'aptitude à lancer souhait 1d3 fois.<br />
      <strong>Le Néant</strong>. Votre âme est arrachée à votre corps et enfermée dans un objet en un lieu choisi par le MD. Une ou plusieurs entités puissantes veillent sur ce lieu. Tant que votre âme est emprisonnée de cette manière, votre corps est inerte, cesse de vieillir et n'a nul besoin de nourriture, d'air ou d'eau. Le sort souhait ne parvient pas à réunir votre corps et votre âme, mais il révèle la position de l'objet qui renferme votre âme. Vous ne piochez plus aucune carte.<br />
      <strong>Les Parques</strong>. La trame de la réalité se délite et ses fils en tissent une nouvelle, vous permettant d'échapper à un événement comme s'il ne s'était jamais produit. Vous pouvez recourir à la magie de cette carte dès que vous la piochez ou en toute autre circonstance avant de mourir.<br />
      <strong>La Ruine</strong>. Toutes les formes de richesse que vous portez ou possédez, à l'exception des objets magiques, disparaissent. Vos biens meubles s'évanouissent. Vos négoces, bâtiments et terres sont perdus de la façon qui altère le moins possible le cours de la réalité. Tous les documents attestant que vous possédiez un bien volatilisé par cette carte disparaissent eux aussi.<br />
      <strong>Les Serres</strong>. Chaque objet magique que vous portez ou transportez se désintègre. Les Artefacts en votre possession, quant à eux, ne font que disparaître.<br />
      <strong>Le Soleil</strong>. Un objet magique (choisi par le MD) apparaît sur votre personne. Vous recevez en outre quotidiennement 10 points de vie temporaires à l'aube, et ce jusqu'à votre mort.<br />
      <strong>Le Traître</strong>. Un PNJ au choix du MD devient Hostile envers vous. Vous ignorez l'identité de ce PNJ tant que lui-même ou une tierce personne ne vous la révèle pas. Rien hormis le sort souhait ou une intervention divine ne peut mettre fin à l'hostilité de ce PNJ à votre égard.<br />
      <strong>Le Trône</strong>. Vous recevez la maîtrise et l'Expertise de votre choix entre les compétences Histoire, Intimidation, Intuition ou Persuasion. En outre, vous recevez la propriété légitime d'une petite forteresse quelque part dans le monde. Cela étant, cette forteresse est actuellement occupée par un ou plusieurs monstres, qui devront être éliminés pour que vous puissiez la faire vôtre.<br />
      <strong>Le Vizir</strong>. À tout moment de votre choix au cours de l'année qui suit la pioche de cette carte, vous pouvez poser une question tout en méditant et recevez mentalement une réponse exacte à cette question.</p>
