  en:
    name: Enspelled Armor
    subtype: Any Light, Medium, or Heavy
    description: |
      <p>Source: Dungeon Master's Guide</p>
      <p><em>Armor (Any Light, Medium, or Heavy), Rarity Varies (Requires Attunement)</em></p>
      <p>Bound into this armor is a spell of level 8 or lower. The spell is determined when the armor is created and must belong to the Abjuration or Illusion school of magic. The armor has 6 charges and regains 1d6 expended charges daily at dawn. While wearing the armor, you can expend 1 charge to cast its spell.</p>
      <p>The level of the spell bound into the armor determines the spell’s saving throw DC and attack bonus, as well as the armor’s rarity, as shown in the following table.</p>
      <table class="wiki-content-table">
      <tr>
      <th>Spell Level</th>
      <th>Rarity</th>
      <th>Save DC</th>
      <th>Attack Bonus</th>
      </tr>
