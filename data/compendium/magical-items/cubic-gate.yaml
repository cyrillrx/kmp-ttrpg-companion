id: cubic-gate
source: dmg_2024
type: wondrous_item
rarity: legendary
attunement: false
translations:
  en:
    name: Cubic Gate
    subtype: null
    description: |-
      <p>This cube is 3 inches across and radiates palpable magical energy. The six sides of the cube are each keyed to a different plane of existence, one of which is the Material Plane. The other sides are linked to planes determined by the DM.<br />
      The cube has 3 charges and regains 1d3 expended charges daily at dawn. As a Magic action, you can expend 1 of the cube's charges to cast one of the following spells using the cube.<br />
      <strong>Gate</strong>. Pressing one side of the cube, you cast <em><a href="https://www.aidedd.org/spell/gate">Gate</a></em> , opening a portal to the plane of existence keyed to that side.<br />
      <strong>Plane Shift</strong>. Pressing one side of the cube twice, you cast <em><a href="https://www.aidedd.org/spell/plane-shift">Plane Shift</a></em> , transporting the targets to the plane of existence keyed to that side.</p>
  fr:
    name: Cube des plans
    subtype: null
    description: |-
      <p>Ce cube de 7,50 cm de côté irradie une énergie magique palpable. Ses six faces sont chacune reliées à un plan d'existence différent, dont le plan Matériel. Les autres faces sont liées à des plans déterminés par le MD.<br />
      Le cube possède 3 charges et récupère 1d3 charges dépensées chaque jour à l'aube. Par une action Magie, vous pouvez dépenser 1 charge du cube pour lancer l'un des sorts suivants :<br />
      <strong>Portail</strong>. En appuyant sur une face du cube, vous lancez <em><a href="https://www.aidedd.org/spell/fr/portail">portail</a></em> , ouvrant un portail vers le plan d'existence lié à cette face.<br />
      <strong>Changement de plan</strong>. En appuyant deux fois sur un côté du cube, vous lancez <em><a href="https://www.aidedd.org/spell/fr/changement-de-plan">changement de plan</a></em> , transportant les cibles vers le plan d'existence lié à ce côté.</p>
