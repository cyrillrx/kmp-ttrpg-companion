id: cube-of-summoning
source: dmg_2024
type: wondrous_item
rarity: rare
attunement: false
translations:
  en:
    name: Cube of Summoning
    subtype: null
    description: |-
      This Tiny cube looks like a jack-in-the-box. When you wind its crank as a Magic action, a merry tune emits from the box, the lid pops open, a creature appears in the nearest unoccupied space, and the lid closes. The lid can't otherwise be opened.
      
      Roll on the fllowing table to determine which spell the cube casts to summon the creature. The spell is cast at level 5 (save DC 17, +9 attack bonus) and doesn’t require Concentration, but you otherwise function as the spell’s caster.
      
      Once the cube summons a creature, the cube can't do so again until the next dawn.
      
      | 1d6 | Spell |
      | --- | --- |
      | 1 | *[Summon Aberration](https://www.aidedd.org/spell/summon-aberration)* |
      | 2 | *[Summon Beast](https://www.aidedd.org/spell/summon-beast)* |
      | 3 | *[Summon Construct](https://www.aidedd.org/spell/summon-construct)* |
      | 4 | *[Summon Dragon](https://www.aidedd.org/spell/summon-dragon)* |
      | 5 | *[Summon Elemental](https://www.aidedd.org/spell/summon-elemental)* |
      | 6 | *[Summon Fey](https://www.aidedd.org/spell/summon-fey)* |
  fr:
    name: Cube de convocation
    subtype: null
    description: |-
      Ce cube de taille TP ressemble à une boîte à surprises. Lorsque vous remontez sa manivelle par une action Magie, une mélodie joyeuse s'échappe de la boîte, le couvercle s'ouvre, une créature apparaît dans l'espace libre le plus proche, puis le couvercle se referme. Il est impossible d'ouvrir le couvercle autrement.
      
      Lancez un dé sur la table ci-dessous pour déterminer le sort que le cube lance pour invoquer la créature. Le sort est lancé au niveau 5 (DD de sauvegarde 17, bonus d'attaque +9) et ne requiert pas de Concentration, mais à part cela vous êtes considéré comme le lanceur du sort.
      
      Une fois que le cube a invoqué une créature, il ne peut plus le refaire avant l'aube suivante.
      
      | 1d6 | Sort |
      | --- | --- |
      | 1 | *[convocation d'aberration](https://www.aidedd.org/spell/fr/convocation-d-aberration)* |
      | 2 | *[convocation de bête](https://www.aidedd.org/spell/fr/convocation-de-bete)* |
      | 3 | *[convocation d'artificiel](https://www.aidedd.org/spell/fr/convocation-d-artificiel)* |
      | 4 | *[convocation de dragon](https://www.aidedd.org/spell/fr/convocation-de-dragon)* |
      | 5 | *[convocation d'élémentaire](https://www.aidedd.org/spell/fr/convocation-d-elementaire)* |
      | 6 | *[convocation de fée](https://www.aidedd.org/spell/fr/convocation-de-fee)* |
