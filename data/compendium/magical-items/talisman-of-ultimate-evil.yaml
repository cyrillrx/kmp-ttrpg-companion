id: talisman-of-ultimate-evil
source: dmg_2024
type: wondrous_item
rarity: legendary
attunement: true
translations:
  en:
    name: Talisman of Ultimate Evil
    subtype: null
    description: |-
      <p>This item symbolizes unrepentant evil. A creature that isn't a Fiend or an Undead that touches the talisman takes 8d6 Necrotic damage and takes the damage again each time it ends its turn holding or carrying the talisman.<br />
      <strong>Holy Symbol</strong>. You can use the talisman as a Holy Symbol. You gain a +2 bonus to spell attack rolls while you wear or hold it.<br />
      <strong>Ultimate End</strong>. The talisman has 6 charges. While wearing or holding the talisman, you can take a Magic action to expend 1 charge and target one creature you can see on the ground within 120 feet of yourself. A flaming fissure opens under the target, and the target makes a DC 20 Dexterity saving throw. If the target is a Celestial, it has Disadvantage on the save. On a failed save, the target falls into the fissure and is destroyed, leaving no remains. On a successful save, the target isn't cast into the fissure but takes 4d6 Psychic damage from the ordeal. In either case, the fissure then closes, leaving no trace of its existence. When you expend the last charge, the talisman dissolves into foul-smelling slime and is destroyed.</p>
  fr:
    name: Talisman du mal absolu
    subtype: null
    description: |-
      <p>Cet objet symbolise la quintessence du mal. Une créature, autre qu'un Fiélon ou un Mort-vivant, qui touche le talisman subit 8d6 dégâts nécrotiques et les subit à nouveau à la fin de chacun de ses tours tant qu'elle porte le talisman.<br />
      <strong>Symbole sacré</strong>. Vous pouvez utiliser le talisman comme symbole sacré. Vous obtenez un bonus de +2 aux jets d'attaque de sort tant que vous le portez.<br />
      <strong>Fin irrévocable</strong>. Le talisman possède 6 charges. Lorsque vous portez le talisman, vous pouvez prendre une action Magie pour dépenser 1 charge et cibler une créature sur terre que vous pouvez voir dans un rayon de 36 mètres. Une fissure enflammée s'ouvre sous la cible, et celle-ci effectue un jet de sauvegarde de Dextérité DD 20. Si la cible est un Céleste, elle a un Désavantage au jet de sauvegarde. En cas d'échec, la cible tombe dans la fissure et est détruite, ne laissant aucune trace. En cas de réussite, la cible n'est pas projetée dans la fissure, mais subit 4d6 dégâts psychiques. Dans les deux cas, la fissure se referme, ne laissant aucune trace de son existence. Lorsque vous dépensez la dernière charge, le talisman se dissout en une vase nauséabonde et est détruit.</p>
