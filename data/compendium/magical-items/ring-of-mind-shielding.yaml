id: ring-of-mind-shielding
source: dmg_2024
type: ring
rarity: uncommon
attunement: true
translations:
  en:
    name: Ring of Mind Shielding
    subtype: null
    description: |-
      <p>While wearing this ring, you are immune to magic that allows other creatures to read your thoughts, determine whether you are lying, know your alignment, or know your creature type. Creatures can telepathically communicate with you only if you allow it.<br />
      You can take a Magic action to cause the ring to become imperceptible until you take another Magic action to make it perceptible, until you remove the ring, or until you die.<br />
      If you die while wearing the ring, your soul enters it, unless it already houses a soul. You can remain in the ring or depart for the afterlife. As long as your soul is in the ring, you can telepathically communicate with any creature wearing it. A wearer can't prevent this telepathic communication.</p>
  fr:
    name: Anneau de barrière mentale
    subtype: null
    description: |-
      <p>Lorsque vous portez cet anneau, vous êtes immunisé contre la magie qui permet aux autres créatures de lire vos pensées, de déterminer si vous mentez, de connaître votre alignement ou votre type de créature. Les créatures ne peuvent communiquer télépathiquement avec vous que si vous le leur permettez.<br />
      Vous pouvez prendre une action Magie pour rendre l'anneau imperceptible jusqu'à ce que vous preniez une autre action Magie pour le rendre perceptible jusqu'à ce que vous le retiriez ou mourriez.<br />
      Si vous mourez en portant l'anneau, votre âme y pénètre, sauf si celui-ci en abrite déjà une. Vous pouvez rester dans l'anneau ou partir pour l'au-delà. Tant que votre âme est dans l'anneau, vous pouvez communiquer télépathiquement avec toute créature qui le porte. Le porteur ne peut pas empêcher cette communication télépathique.</p>
