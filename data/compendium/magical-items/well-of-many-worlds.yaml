id: well-of-many-worlds
source: dmg_2024
type: wondrous_item
rarity: legendary
attunement: false
translations:
  en:
    name: Well of Many Worlds
    subtype: null
    description: |-
      This fine black cloth, soft as silk, is folded up to the dimensions of a handkerchief. It unfolds into a circular sheet 6 feet in diameter.
      
      You can take a Magic action to unfold the *Well of Many Worlds* and place it on a solid surface, whereupon it forms a two-way, 6-foot-diameter, circular portal to another world or plane of existence. Each time the item opens a portal, the DM decides where it leads. The portal remains open until a creature within 5 feet of it takes a Magic action to close it by taking hold of the edges of the cloth and folding it up.
      
      Once the *Well of Many Worlds* has opened a portal, it can't do so again for 1d8 hours.
  fr:
    name: Puits des mondes
    subtype: null
    description: |-
      Ce fin tissu noir, doux comme de la soie, est plié aux dimensions d'un mouchoir. Il se déplie en une feuille circulaire de 1,80 mètre de diamètre.
      
      Vous pouvez prendre une action Magie pour déplier le *puits des mondes* et le placer sur une surface solide. Il forme alors un portail circulaire à double sens de 1,80 mètre de diamètre vers un autre monde ou plan d'existence. Chaque fois que l'objet ouvre un portail, le MD décide de son emplacement. Le portail reste ouvert jusqu'à ce qu'une créature à 1,50 mètre ou moins prenne une action Magie pour le refermer en saisissant les bords du tissu et en le repliant.
      
      Une fois que le *puits des mondes* a ouvert un portail, il ne peut plus le faire pendant 1d8 heures.
