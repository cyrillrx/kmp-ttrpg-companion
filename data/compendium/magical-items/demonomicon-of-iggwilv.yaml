id: demonomicon-of-iggwilv
source: dmg_2024
type: wondrous_item
rarity: artifact
attunement: true
translations:
  en:
    name: Demonomicon of Iggwilv
    subtype: null
    description: |-
      <p><em>Wondrous item, artifact (requires attunement)</em></p>
      <p>An expansive treatise documenting the Abyss's infinite layers and inhabitants, the <em>Demonomicon of Iggwilv</em> is the most thorough and blasphemous tome of demonology in the multiverse. The tome recounts both the oldest and most current profanities of the Abyss and demons. Demons have attempted to censor the text, and while sections have been ripped from the book's spine, the general chapters remain, ever revealing demonic secrets. And the book holds more than blasphemies. Caged behind lines of script roils a secret piece of the Abyss itself, which keeps the book up-to-date, no matter how many pages are removed, and it longs to be more than mere reference material.</p>
      <p><strong><em>Random Properties.</em></strong> The artifact has the following random properties, which you can determine by rolling on the tables in the "Artifacts" section of the <em>Dungeon Master's Guide</em>:</p>
      <ul>
      <li>2 minor beneficial properties</li>
      <li>1 minor detrimental property</li>
      <li>1 major detrimental property</li>
      </ul>
      <p><strong><em>Spells.</em></strong> The book has 8 charges. It regains 1d8 expended charges daily at dawn. While holding it, you can use an action to cast Tasha's Hideous Laughter from it or to expend 1 or more of its charges to cast one of the following spells (save DC 20) from it: Magic Circle (1 charge), Magic Jar (3 charges), Planar Ally (3 charges), Planar Binding (2 charges), Plane Shift (to layers of the Abyss only; 3 charges), Summon Fiend (3 charges).</p>
      <p><strong><em>Abyssal Reference.</em></strong> You can reference the <em>Demonomicon</em> whenever you make an Intelligence check to discern information about demons or a Wisdom (Survival) check related to the Abyss. When you do so, you can add double your proficiency bonus to the check.</p>
      <p><strong><em>Fiendish Scourging.</em></strong> Your magic causes pain to fiends. While carrying the book, when you make a damage roll for a spell you cast against a fiend, you use the maximum possible result instead of rolling.</p>
      <p><strong><em>Ensnarement.</em></strong> While carrying the book, whenever you cast the Magic Circle spell naming only fiends, or the Planar Binding spell targeting a fiend, the spell is cast at 9th level, regardless of what level spell slot you used, if any. Additionally, the fiend has disadvantage on its saving throw against the spell.</p>
      <p><strong><em>Containment.</em></strong> The first 10 pages of the <em>Demonomicon</em> are blank. As an action while holding the book, you can target a fiend that you can see that is trapped within a Magic Circle. The fiend must succeed on a DC 20 Charisma saving throw with disadvantage or become trapped within one of the <em>Demonomicon</em>'s empty blank pages, which fills with writing detailing the trapped creature's widely known name and depravities. Once used, this action can't be used again until the next dawn.</p>
      <p>When you finish a long rest, if you and the <em>Demonomicon</em> are on the same plane of existence, the trapped creature of the highest challenge rating within the book can attempt to possess you. You must make a DC 20 Charisma saving throw. On a failure, you are possessed by the creature, which controls you like a puppet. The possessing creature can release you as an action, appearing in the closest unoccupied space. On a successful save, the fiend can't try to possess you again for 7 days.</p>
      <p>When the tome is discovered, it has 1d4 fiends occupying its pages, typically an assortment of demons.</p>
      <p><strong><em>Destroying the Demonomicon.</em></strong> To destroy the book, six different demon lords must each tear out a sixth of the book's pages. If this occurs, the pages reappear after 24 hours. Before all those hours pass, anyone who opens the book's remaining binding is transported to a nascent layer of the Abyss that lies hidden within the book. At the heart of this deadly, semi-sentient domain lies a long-lost artifact, Fraz-Urb'luu's Staff. If the staff is dragged from the pocket plane, the tome is reduced to a mundane and quite out-of-date copy of the <em>Tome of Zyx</em>, the work that served as the foundation for the <em>Demonomicon</em>. Once the staff emerges, the demon lord Fraz-Urb'luu instantly knows.</p>
  fr:
    name: Demonomicon d'Iggwilv
    subtype: null
    description: |-
      <p><em>Objet merveilleux, artefact (harmonisation requise)</em></p>
      <p>Traité exhaustif documentant les couches infinies de l'Abîme et leurs habitants, le <em>Demonomicon d'Iggwilv</em> est le tome de démonologie le plus complet et le plus blasphématoire du multivers. Le tome recense aussi bien les plus anciennes que les plus récentes profanations de l'Abîme et des démons. Des démons ont tenté de censurer le texte, et bien que certaines sections aient été arrachées de la reliure, les chapitres généraux demeurent, révélant sans cesse les secrets démoniaques. Et le livre contient bien plus que des blasphèmes. Emprisonné derrière des lignes de texte grouille un fragment secret de l'Abîme lui-même, qui maintient le livre à jour, peu importe le nombre de pages arrachées, et qui aspire à être bien plus qu'un simple ouvrage de référence.</p>
      <p><strong><em>Propriétés aléatoires.</em></strong> L'artefact possède les propriétés aléatoires suivantes, que vous pouvez déterminer en lançant des dés sur les tables de la section « Artefacts » du <em>Manuel du Maître du Donjon</em> :</p>
      <ul>
      <li>2 propriétés mineures bénéfiques</li>
      <li>1 propriété mineure néfaste</li>
      <li>1 propriété majeure néfaste</li>
      </ul>
      <p><strong><em>Sorts.</em></strong> Le livre possède 8 charges. Il récupère 1d8 charges dépensées chaque jour à l'aube. Lorsque vous le tenez, vous pouvez utiliser une action pour lancer <em>Rire sardonique de Tasha</em> depuis le livre, ou dépenser 1 charge ou plus pour lancer l'un des sorts suivants (DD de sauvegarde 20) depuis le livre : <em>Cercle magique</em> (1 charge), <em>Transfert d'esprit</em> (3 charges), <em>Allié planaire</em> (3 charges), <em>Lien planaire</em> (2 charges), <em>Voyage planaire</em> (vers les couches de l'Abîme uniquement ; 3 charges), <em>Invocation de démon</em> (3 charges).</p>
      <p><strong><em>Référence abyssale.</em></strong> Vous pouvez consulter le <em>Demonomicon</em> chaque fois que vous effectuez un test d'Intelligence pour obtenir des informations sur les démons, ou un test de Sagesse (Survie) lié à l'Abîme. Ce faisant, vous pouvez ajouter le double de votre bonus de maîtrise au test.</p>
      <p><strong><em>Tourment des fiélons.</em></strong> Votre magie inflige des souffrances aux fiélons. Lorsque vous portez le livre et que vous effectuez un jet de dégâts pour un sort que vous lancez contre un félon, vous utilisez le résultat maximum possible au lieu de lancer les dés.</p>
      <p><strong><em>Piège.</em></strong> Lorsque vous portez le livre, chaque fois que vous lancez le sort <em>Cercle magique</em> en ne ciblant que des fiélons, ou le sort <em>Lien planaire</em> en ciblant un félon, le sort est lancé au 9e niveau, quel que soit le niveau d'emplacement de sort utilisé, le cas échéant. De plus, le félon a le désavantage à son jet de sauvegarde contre le sort.</p>
      <p><strong><em>Confinement.</em></strong> Les 10 premières pages du <em>Demonomicon</em> sont vierges. En utilisant une action tout en tenant le livre, vous pouvez cibler un félon que vous pouvez voir et qui est piégé dans un <em>Cercle magique</em>. Le félon doit réussir un jet de sauvegarde de Charisme DD 20 avec désavantage, sinon il se retrouve piégé dans l'une des pages vierges du <em>Demonomicon</em>, qui se remplit d'un texte décrivant le nom largement connu de la créature piégée et ses turpitudes. Une fois utilisée, cette action ne peut plus l'être avant l'aube suivante.</p>
      <p>Lorsque vous terminez un long repos, si vous et le <em>Demonomicon</em> vous trouvez sur le même plan d'existence, la créature piégée avec l'indice de danger le plus élevé dans le livre peut tenter de vous posséder. Vous devez réussir un jet de sauvegarde de Charisme DD 20. En cas d'échec, vous êtes possédé par la créature, qui vous contrôle comme une marionnette. La créature possédante peut vous libérer en utilisant une action, et apparaît dans l'espace inoccupé le plus proche. En cas de réussite, le félon ne peut pas tenter de vous posséder à nouveau pendant 7 jours.</p>
      <p>Lorsque le tome est découvert, il contient 1d4 fiélons dans ses pages, généralement un assortiment de démons.</p>
      <p><strong><em>Destruction du Demonomicon.</em></strong> Pour détruire le livre, six seigneurs-démons différents doivent chacun arracher un sixième des pages du livre. Si cela se produit, les pages réapparaissent au bout de 24 heures. Avant que ces heures ne s'écoulent, quiconque ouvre la reliure restante du livre est transporté dans une couche naissante de l'Abîme qui se cache dans le livre. Au cœur de ce domaine mortel et semi-conscient se trouve un artefact depuis longtemps perdu, le Bâton de Fraz-Urb'luu. Si le bâton est arraché du plan de poche, le tome est réduit à une copie banale et fort dépassée du <em>Tome de Zyx</em>, l'œuvre qui a servi de fondement au <em>Demonomicon</em>. Dès que le bâton émerge, le seigneur-démon Fraz-Urb'luu le sait instantanément.</p>
