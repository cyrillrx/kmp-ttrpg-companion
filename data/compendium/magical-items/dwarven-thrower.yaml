id: dwarven-thrower
source: dmg_2024
type: weapon
rarity: very_rare
attunement: true
translations:
  en:
    name: Dwarven Thrower
    subtype: Warhammer
    description: You gain a +3 bonus to attack rolls and damage rolls made with this
      magic weapon. It has the Thrown property with a normal range of 20 feet and
      a long range of 60 feet. When you hit with a ranged attack using this weapon,
      it deals an extra 1d8 Force damage, or an extra 2d8 Force damage if the target
      is a Giant. Immediately after hitting or missing, the weapon flies back to your
      hand.
  fr:
    name: Marteau volant des nains
    subtype: marteau de guerre
    description: Vous bénéficiez d'un bonus de +3 aux jets d'attaque et de dégâts
      effectués avec cette arme magique. Elle possède la propriété Lancer et a une
      portée normale de 6 mètres et une portée longue de 18 mètres. Lorsque vous touchez
      une cible à distance avec cette arme, elle inflige 1d8 points de dégâts de force
      supplémentaires, ou 2d8 points de dégâts de force supplémentaires si la cible
      est un Géant. Immédiatement après avoir touché ou raté, l'arme revient dans
      votre main.
