id: dancing-sword
source: dmg_2024
type: weapon
rarity: very_rare
attunement: true
translations:
  en:
    name: Dancing Sword
    subtype: Greatsword, Longsword, Rapier, Scimitar, or Shortsword
    description: |-
      <p>You can take a Bonus Action to toss this magic weapon into the air. When you do so, the weapon begins to hover, flies up to 30 feet, and attacks one creature of your choice within 5 feet of itself. The weapon uses your attack roll and adds your ability modifier to damage rolls.<br />
      While the weapon hovers, you can take a Bonus Action to cause it to fly up to 30 feet to another spot within 30 feet of you. As part of the same Bonus Action, you can cause the weapon to attack one creature within 5 feet of the weapon.<br />
      After the hovering weapon attacks for the fourth time, it flies back to you and tries to return to your hand. If you have no hand free, the weapon falls to the ground in your space. If the weapon has no unobstructed path to you, it moves as close to you as it can and then falls to the ground. It also ceases to hover if you grasp it or are more than 30 feet away from it.</p>
  fr:
    name: Épée dansante
    subtype: épée à deux mains, épée longue, rapière, cimeterre ou épée courte
    description: |-
      <p>Vous pouvez prendre une action Bonus pour lancer cette arme magique en l'air. L'arme se met alors en vol stationnaire, vole jusqu'à 9 mètres et attaque une créature de votre choix dans un rayon de 1,50 mètre autour d'elle. L'arme utilise votre jet d'attaque et ajoute votre modificateur de caractéristique aux jets de dégâts.<br />
      Lorsque l'arme est en vol stationnaire, vous pouvez prendre une action Bonus pour la faire voler jusqu'à 9 mètres vers un autre point dans un rayon de 9 mètres autour de vous. Dans le cadre de la même action Bonus, vous pouvez faire en sorte que l'arme attaque une créature dans un rayon de 1,50 mètre autour d'elle.<br />
      Après sa quatrième attaque, l'arme en vol stationnaire revient vers vous et tente de revenir dans votre main. Si vous n'avez pas de main libre, elle tombe au sol dans votre espace. Si elle n'a pas de chemin libre jusqu'à vous, elle se rapproche de vous au maximum puis tombe au sol. Elle cesse également de planer si vous la saisissez ou si vous vous en éloignez de plus de 9 mètres.</p>
