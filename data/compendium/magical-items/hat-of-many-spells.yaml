id: hat-of-many-spells
source: dmg_2024
type: wondrous_item
rarity: very_rare
attunement: true
translations:
  en:
    name: Hat of Many Spells
    subtype: null
    description: |-
      This pointed hat has the following properties.\
      **Spellcasting Focus**. While holding the hat, you can use it as a Spellcasting Focus for your Wizard spells. Any spell you cast using the hat gains a special Somatic component: you must reach into the hat and "pull" the spell out of it.\
      **Unknown Spell**. While holding the hat, you can try to cast a level 1+ spell you don't know. The spell must be on the Wizard spell list, it must be of a level you can cast, and it can't have Material components costing more than 1,000 GP. Once you decide on the spell, you must expend a spell slot of the spell's level. Then, to determine whether you cast the spell, make an Intelligence (Arcana) check (DC 10 plus the spell's level). On a successful check, you cast the spell using its normal casting time, and you can't use this property again until you finish a Short or Long Rest. On a failed check, you fail to cast the spell and a random effect occurs instead, determined by rolling on the following table.\
      Any spell you cast from the hat uses your spell save DC and spell attack bonus.\
      
      | 1d100 | Effect |
      | --- | --- |
      | 01-50 | You cast a random spell determined by rolling 1d10: on a 1, *[Enlarge/Reduce](https://www.aidedd.org/spell/enlarge-reduce)* (enlarge effect); on a 2, *[Enlarge/Reduce](https://www.aidedd.org/spell/enlarge-reduce)* (reduce effect); on a 3, *[Faerie Fire](https://www.aidedd.org/spell/faerie-fire)* ; on a 4, *[Fireball](https://www.aidedd.org/spell/fireball)* ; on a 5, *[Gust of Wind](https://www.aidedd.org/spell/gust-of-wind)* ; on a 6, *[Invisibility](https://www.aidedd.org/spell/invisibility)* (cast on yourself); on a 7, *[Lightning Bolt](https://www.aidedd.org/spell/lightning-bolt)* ; on an 8, *[Phantasmal Force](https://www.aidedd.org/spell/phantasmal-force)* ; on a 9, *[Polymorph](https://www.aidedd.org/spell/polymorph)* ; on a 10, *[Stinking Cloud](https://www.aidedd.org/spell/stinking-cloud)*. |
      | 51-55 | You have the Stunned condition until the end of your next turn, believing something awesome just happened. |
      | 56-60 | A harmless swarm of butterflies fills a 10-foot Cube within 30 feet of yourself. The swarm disperses after 1 minute. |
      | 61-65 | You pull a nonmagical object out of the hat. Roll 1d4 to determine the object: on a 1, a vial of Acid; on a 2, a flask of Alchemist's Fire; on a 3, a Crowbar; on a 4, a lit Torch. |
      | 66-70 | You suffer a bout of "magic sickness" and have the Poisoned condition for 1 hour. |
      | 71-75 | You have the Petrified condition until the end of your next turn. |
      | 76-80 | You pull a nonmagical object out of the hat. Roll 1d4 to determine the object: on a 1, a Dagger; on a 2, a Rope with a Grappling Hook tied to one end; on a 3, a bag of Caltrops; on a 4, a gem worth 50 GP. |
      | 81-85 | A creature appears in an unoccupied space as close to you as possible. The creature isn't under your control and acts as it normally would, and it disappears after 1 hour or when it drops to 0 Hit Points. Roll 1d4 to determine the creature: on a 1, a **Camel** ; on a 2, a **Constrictor Snake** ; on a 3, an **Elephant** ; on a 4, a **Mule**. |
      | 86-90 | A Hostile **Swarm of Bats** flies out of the hat, occupies your space, and attacks you. |
      | 91-95 | A vertical, 10-foot-diameter, two-way portal to another plane of existence opens in an unoccupied space within 30 feet of you and remains open until the end of your next turn. The DM determines where it leads. |
      | 96-00 | You pull a magic item out of the hat. Roll 1d6 to determine the item's rarity: on a 1-3, Common; on a 4-5, Uncommon; on a 6, Rare. The DM chooses the item, which disappears after 1 hour if it's not consumed or destroyed before then. |
  fr:
    name: Chapeau mille-sorts
    subtype: null
    description: |-
      Ce chapeau pointu possède les propriétés suivantes :\
      **Focaliseur d'incantation**. Lorsque vous tenez le chapeau, vous pouvez l'utiliser comme focaliseur d'incantation pour vos sorts de magicien. Tout sort lancé par le biais du chapeau acquiert une composante somatique spéciale : vous devez plonger votre main dans le chapeau et en extraire le sort.\
      **Sort inconnu**. Lorsque vous tenez le chapeau, vous pouvez tenter de lancer un sort de niveau 1 ou supérieur que vous ne connaissez pas. Le sort doit figurer dans la liste des sorts de magicien, être d'un niveau que vous pouvez lancer et ne pas avoir de composantes matérielles coûtant plus de 1 000 po. Une fois le sort choisi, vous devez dépenser un emplacement de sort correspondant à son niveau. Ensuite, pour déterminer si vous lancez le sort, effectuez un jet d'Intelligence (Arcanes) (DD 10 plus le niveau du sort). En cas de réussite, vous lancez le sort en utilisant son temps d'incantation normal et vous ne pouvez plus utiliser cette propriété avant d'avoir terminé un Repos court ou long. En cas d'échec, vous ne parvenez pas à lancer le sort et un effet aléatoire se produit à la place, déterminé selon la table ci-dessous.\
      Tout sort lancé depuis le chapeau utilise votre DD de sauvegarde de sort et votre bonus d'attaque de sorts.\
      
      | 1d100 | Effet |
      | --- | --- |
      | 01-50 | Vous lancez un sort aléatoire déterminé en lançant 1d10 : 1, *[agrandissement/rapetissement](https://www.aidedd.org/spell/fr/agrandissement-rapetissement)* (effet agrandissement) ; 2, *[agrandissement/rapetissement](https://www.aidedd.org/spell/fr/agrandissement-rapetissement)* (effet rapetissement) ; 3, *[lueurs féérique](https://www.aidedd.org/spell/fr/lueurs-feeriques)* ; 4, *[boule de feu](https://www.aidedd.org/spell/fr/boule-de-feu)* ; 5, *[bourrasque](https://www.aidedd.org/spell/fr/bourrasque)* ; 6, *[invisibilité](https://www.aidedd.org/spell/fr/invisibilite)* (sur vous-même) ; 7, *[éclair](https://www.aidedd.org/spell/fr/eclair)* ; 8, *[force fantasmagorique](https://www.aidedd.org/spell/fr/force-fantasmagorique)* ; 9, *[métamorphe](https://www.aidedd.org/spell/fr/metamorphose)* ; 10, *[nuage nauséabond](https://www.aidedd.org/spell/fr/nuage-nauseabond)*. |
      | 51-55 | Vous subissez l'état Étourdi jusqu'à la fin de votre prochain tour, persuadé que quelque chose d'extraordinaire vient de se produire. |
      | 56-60 | Un essaim de papillons inoffensifs remplit un Cube de 3 mètres à 9 mètres de vous. L'essaim se disperse après 1 minute. |
      | 61-65 | Vous sortez un objet non magique du chapeau. Lancez 1d4 pour déterminer l'objet : 1, une fiole d'acide ; 2, une flasque de feu grégeois ; 3, un pied-de-biche ; 4, une torche allumée. |
      | 66-70 | Vous souffrez d'une « maladie magique » et subissez l'état Empoisonné pendant 1 heure. |
      | 71-75 | Vous subissez l'état Pétrifié jusqu'à la fin de votre prochain tour. |
      | 76-80 | Vous tirez un objet non magique du chapeau. Lancez 1d4 pour déterminer l'objet : 1, une dague ; 2, une corde avec un grappin attaché à une extrémité ; 3, un sac de chausse-trappes ; 4, une gemme d'une valeur de 50 po. |
      | 81-85 | Une créature apparaît dans un espace inoccupé aussi près de vous que possible. La créature n'est pas sous votre contrôle et agit normalement. Elle disparaît après 1 heure ou lorsqu'elle tombe à 0 point de vie. Lancez 1d4 pour déterminer la créature : 1, un **chameau** ; 2, un **serpent constricteur** ; 3, un **éléphant** ; 4, une **mule**. |
      | 86-90 | Une **nuée de chauves-souris** hostile s'envole du chapeau, occupe votre emplacement et vous attaque. |
      | 91-95 | Un portail vertical de 3 mètres de diamètre vers un autre plan d'existence, à double sens, s'ouvre dans un emplacement inoccupé dans un rayon de 9 mètres autour de vous et reste ouvert jusqu'à la fin de votre prochain tour. Le MD détermine où il mène. |
      | 96-00 | Vous tirez un objet magique du chapeau. Lancez 1d6 pour déterminer la rareté de l'objet : 1-3, courant ; 4-5, peu courant ; 6, rare. Le MD choisit l'objet, qui disparaît après 1 heure s'il n'est pas consommé ou détruit avant. |
