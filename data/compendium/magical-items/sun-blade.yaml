id: sun-blade
source: dmg_2024
type: weapon
rarity: rare
attunement: true
translations:
  en:
    name: Sun Blade
    subtype: Longsword
    description: |-
      This item appears to be a sword hilt.
      
      **Blade of Radiance**. While grasping the hilt, you can take a Bonus Action to cause a blade of pure radiance to spring into existence or make the blade disappear. While the blade exists, this magic weapon functions as a Longsword with the Finesse property. If you are proficient with Longswords or Shortswords, you are proficient with the *Sun Blade*.
      
      You gain a +2 bonus to attack rolls and damage rolls made with this weapon, which deals Radiant damage instead of Slashing damage. When you hit an Undead with it, that target takes an extra 1d8 Radiant damage.
      
      **Sunlight**. The sword's luminous blade emits Bright Light in a 15-foot radius and Dim Light for an additional 15 feet. The light is sunlight. While the blade persists, you can take a Magic action to expand or reduce its radius of Bright Light and Dim Light by 5 feet each, to a maximum of 30 feet each or a minimum of 10 feet each.
  fr:
    name: Épée radieuse
    subtype: épée longue
    description: |-
      Cet objet semble être une poignée d'épée.
      
      **Lame de radiance**. En saisissant la poignée, vous pouvez prendre une action Bonus pour faire apparaître ou disparaître une lame de lumière pure. Tant que la lame existe, cette arme magique fonctionne comme une épée Longue avec la propriété Finesse. Si vous maîtrisez les épées longues ou les épées courtes, vous maîtrisez cette *épée radieuse*.
      
      Vous obtenez un bonus de +2 aux jets d'attaque et de dégâts effectués avec cette arme, qui inflige des dégâts radiants au lieu de dégâts tranchants. Si vous touchez un Mort-Vivant avec cette arme, cette cible subit 1d8 dégâts radiants supplémentaires.
      
      **Lumière du soleil**. La lame lumineuse de l'épée émet une Lumière vive sur un rayon de 4,50 mètres et une Lumière faible sur 4,50 mètres supplémentaires. La lumière est celle du soleil. Tant que la lame persiste, vous pouvez prendre une action Magie pour étendre ou réduire son rayon de Lumière vive et de Lumière faible de 1,50 mètre chacun, jusqu'à un maximum de 9 mètres ou un minimum de 3 mètres chacun.
