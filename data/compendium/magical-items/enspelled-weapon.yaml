id: enspelled-weapon
source: dmg_2024
type: weapon
rarity: varies
attunement: true
translations:
  en:
    name: Enspelled Weapon
    subtype: Any Simple or Martial
    description: |-
      *Weapon (Any Simple or Martial), Rarity Varies (Requires Attunement)*

      Bound into this weapon is a spell of level 8 or lower. The spell is determined when the weapon is created and must belong to the Conjuration, Divination, Evocation, Necromancy, or Transmutation school of magic. The weapon has 6 charges and regains 1d6 expended charges daily at dawn. While holding the weapon, you can expend 1 charge to cast its spell.

      The level of the spell bound into the weapon determines the spell’s saving throw DC and attack bonus, as well as the weapon’s rarity, as shown in the following table.

      | Spell Level | Rarity | Save DC | Attack Bonus |
      | --- | --- | --- | --- |
      | Cantrip | Uncommon | 13 | +5 |
      | 1 | Uncommon | 13 | +5 |
      | 2 | Rare | 13 | +5 |
      | 3 | Rare | 15 | +7 |
      | 4 | Very Rare | 15 | +7 |
      | 5 | Very Rare | 17 | +9 |
      | 6 | Legendary | 17 | +9 |
      | 7 | Legendary | 18 | +10 |
      | 8 | Legendary | 18 | +10 |
  fr:
    name: Arme-sortilège
    subtype: courante ou de guerre
    description: |-
      *Arme (courante ou de guerre), rareté variable (harmonisation requise)*

      Un sort de niveau 8 ou inférieur est lié à cette arme. Le sort est déterminé lors de la création de l'arme et doit appartenir à l'école d'Invocation, de Divination, d'Évocation, de Nécromancie ou de Transmutation. L'arme possède 6 charges et récupère 1d6 charges dépensées chaque jour à l'aube. Lorsque vous tenez l'arme, vous pouvez dépenser 1 charge pour lancer son sort.

      Le niveau du sort lié à l'arme détermine le DD de sauvegarde et le bonus d'attaque du sort, ainsi que la rareté de l'arme, comme indiqué dans le tableau suivant.

      | Niveau du sort | Rareté | DD de sauvegarde | Bonus d'attaque |
      | --- | --- | --- | --- |
      | Tour de magie | Peu courant | 13 | +5 |
      | 1 | Peu courant | 13 | +5 |
      | 2 | Rare | 13 | +5 |
      | 3 | Rare | 15 | +7 |
      | 4 | Très rare | 15 | +7 |
      | 5 | Très rare | 17 | +9 |
      | 6 | Légendaire | 17 | +9 |
      | 7 | Légendaire | 18 | +10 |
      | 8 | Légendaire | 18 | +10 |
