id: potion-of-gaseous-form
source: dmg_2024
type: potion
rarity: rare
attunement: false
translations:
  en:
    name: Potion of Gaseous Form
    subtype: null
    description: |-
      When you drink this potion, you gain the effect of the *[Gaseous Form](https://www.aidedd.org/spell/gaseous-form)* spell for 1 hour (no Concentration required) or until you end the effect as a Bonus Action.\
      This potion's container seems to hold fog that moves and pours like water.
  fr:
    name: Potion de forme gazeuse
    subtype: null
    description: |-
      Lorsque vous buvez cette potion, vous bénéficiez de l'effet du sort *[forme gazeuse](https://www.aidedd.org/spell/fr/forme-gazeuse)* pendant 1 heure (aucune concentration requise) ou jusqu'à ce que vous mettiez fin à l'effet par une action Bonus.\
      Le récipient de cette potion semble contenir un brouillard qui se déplace et se déverse comme de l'eau.
