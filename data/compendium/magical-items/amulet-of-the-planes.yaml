id: amulet-of-the-planes
source: dmg_2024
type: wondrous_item
rarity: very_rare
attunement: true
translations:
  en:
    name: Amulet of the Planes
    subtype: null
    description: |-
      While wearing this amulet, you can take a Magic action to name a location that you are familiar with on another plane of existence. Then make a DC 15 Intelligence (Arcana) check. On a successful check, you cast *Plane Shift*. On a failed check, you and each creature and object within 15 feet of you travel to a random destination determined by rolling 1d100 and consulting the following table.
      
      | 1d100 | Destination |
      | --- | --- |
      | 01-60 | Random location on the plane you named |
      | 61-70 | Random location on an Inner Plane determined by rolling 1d6: on a **1** , the Plane of Air; on a **2** , the Plane of Earth; on a **3** , the Plane of Fire; on a **4** , the Plane of Water; on a **5** , the Feywild; on a **6** , the Shadowfell |
      | 71-80 | Random location on an Outer Plane determined by rolling 1d8: on a **1** , Arborea; on a **2** , Arcadia; on a **3** , the Beastlands; on a **4** , Bytopia; on a **5** , Elysium; on a **6** , Mechanus; on a **7** , Mount Celestia; on an **8** , Ysgard |
      | 81-90 | Random location on an Outer Plane determined by rolling 1d8: on a **1** , the Abyss; on a **2** , Acheron; on a **3** , Carceri; on a **4** , Gehenna; on a **5** , Hades; on a **6** , Limbo; on a **7** , the Nine Hells; on an **8** , Pandemonium |
      | 91-00 | Random location on the Astral Plane |
  fr:
    name: Amulette des plans
    subtype: null
    description: |-
      Lorsque vous portez cette amulette, vous pouvez prendre une action Magie pour nommer un lieu que vous connaissez sur un autre plan d'existence. Effectuez ensuite un jet d'Intelligence (Arcanes) DD 15. En cas de réussite, vous lancez le sort *changement de plan*. En cas d'échec, vous et chaque créature et objet situé dans un rayon de 4,50 m de vous êtes transportés vers une destination aléatoire déterminée en lançant 1d100 et en consultant la table suivante.
      
      | 1d100 | Destination |
      | --- | --- |
      | 01-60 | Lieu aléatoire sur le plan que vous avez nommé |
      | 61-70 | Lieu aléatoire sur un plan Intérieur déterminé en lançant 1d6 : **1** , le plan de l'Air ; **2** , le plan de la Terre ; **3** , le plan du Feu ; **4** , le plan de l'Eau ; **5** , la Féerie ; **6** , la Gisombre |
      | 71-80 | Lieu aléatoire sur un plan Extérieur déterminé en lançant 1d8 : **1** , Arborée ; **2** , Arcadie ; **3** , les Terres des Bêtes ; **4** , Bytopie ; **5** , Élysée ; **6** , Méchanus ; **7** , Mont Céleste ; **8** , Ysgard |
      | 81-90 | Lieu aléatoire sur un plan Extérieur déterminé par un jet de 1d8 : **1** , les Abysses ; **2** , Achéron ; **3** , Carcères ; **4** , Géhenne ; **5** , Hadès ; **6** , Limbes ; **7** , les Neuf Enfers ; **8** , Pandémonium |
      | 91-00 | Lieu aléatoire sur le plan Astral |
