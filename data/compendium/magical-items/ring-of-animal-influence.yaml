id: ring-of-animal-influence
source: dmg_2024
type: ring
rarity: rare
attunement: false
translations:
  en:
    name: Ring of Animal Influence
    subtype: null
    description: |-
      <p>This ring has 3 charges, and it regains 1d3 expended charges daily at dawn. While wearing the ring, you can expend 1 charge to cast one of the following spells (save DC 13) from it:<br />
      • <em><a href="https://www.aidedd.org/spell/animal-friendship">Animal Friendship</a></em><br />
      • <em><a href="https://www.aidedd.org/spell/fear">Fear</a></em> (affects Beasts only)<br />
      • <em><a href="https://www.aidedd.org/spell/speak-with-animals">Speak with Animals</a></em></p>
  fr:
    name: Anneau d'influence animale
    subtype: null
    description: |-
      <p>Cet anneau possède 3 charges et récupère 1d3 charges dépensées chaque jour à l'aube. Lorsque vous le portez, vous pouvez dépenser 1 charge pour lancer l'un des sorts suivants (sauvegarde DD 13) :<br />
      • <em><a href="https://www.aidedd.org/spell/fr/amitie-avec-les-animaux">amitié avec les animaux</a></em><br />
      • <em><a href="https://www.aidedd.org/spell/fr/peur-terreur">peur</a></em> (affecte uniquement les Bêtes)<br />
      • <em><a href="https://www.aidedd.org/spell/fr/communication-avec-les-animaux">communication avec les animaux</a></em></p>
