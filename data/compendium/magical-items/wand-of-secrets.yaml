id: wand-of-secrets
source: dmg_2024
type: wand
rarity: uncommon
attunement: false
translations:
  en:
    name: Wand of Secrets
    subtype: null
    description: |-
      This wand has 3 charges and regains 1d3 expended charges daily at dawn. While holding it, you can take a Magic action to expend 1 charge, and if a secret door or trap is within 60 feet of you, the wand pulses and points at the one nearest to you.
  fr:
    name: Baguette des secrets
    subtype: null
    description: |-
      Cette baguette possède 3 charges et récupère 1d3 charges dépensées chaque jour à l'aube. Lorsque vous la tenez, vous pouvez prendre une action Magie pour dépenser 1 charge. Si une porte secrète ou un piège se trouve dans un rayon de 18 mètres, la baguette clignote et pointe vers le plus proche.
