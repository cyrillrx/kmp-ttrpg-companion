id: animated-shield
source: dmg_2024
type: armor
rarity: very_rare
attunement: true
translations:
  en:
    name: Animated Shield
    subtype: Shield
    description: |-
      While holding this Shield, you can take a Bonus Action to cause it to animate. The Shield leaps into the air and hovers in your space to protect you as if you were wielding it, leaving your hands free. The Shield remains animate for 1 minute, until you take a Bonus Action to end this effect, or until you die or have the Incapacitated condition, at which point the Shield falls to the ground or into your hand if you have one free.
  fr:
    name: Bouclier animé
    subtype: bouclier
    description: |-
      Lorsque vous tenez ce bouclier, vous pouvez prendre une action Bonus pour l'animer. Le bouclier bondit dans les airs et flotte dans votre espace pour vous protéger comme si vous le portiez, vous laissant les mains libres. Il reste animé pendant 1 minute, jusqu'à ce que vous preniez une action Bonus pour mettre fin à cet effet, ou jusqu'à ce que vous mourriez ou que vous ayez l'état Incapable d'agir. Le bouclier retombe alors au sol ou dans votre main si vous en avez une de libre.
