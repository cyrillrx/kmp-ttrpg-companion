id: bag-of-beans
source: dmg_2024
type: wondrous_item
rarity: rare
attunement: false
translations:
  en:
    name: Bag of Beans
    subtype: null
    description: |-
      This heavy cloth bag contains 3d4 dry beans when found. The bag weighs half a pound regardless of how many beans it contains and becomes a nonmagical item when it no longer contains any beans.\
      If you dump one or more beans out of the bag, they explode in a 10-foot-radius Sphere centered on them. All the dumped beans are destroyed in the explosion, and each creature in the Sphere, including you, makes a DC 15 Dexterity saving throw, taking 5d4 Force damage on a failed save or half as much damage on a successful one.\
      If you remove a bean from the bag, plant it in dirt or sand, and then water it, the bean disappears as it produces an effect 1 minute later from the ground where it was planted. The DM can choose an effect from the following table or determine it randomly.\
      
      | 1d100 | Effect |
      | --- | --- |
      | 01 | 5d4 toadstools sprout. If a creature eats a toadstool, roll any die. On an odd roll, the eater must succeed on a DC 15 Constitution saving throw or take 5d6 Poison damage and have the Poisoned condition for 1 hour. On an even roll, the eater gains 5d6 Temporary Hit Points for 1 hour. |
      | 02–10 | A geyser erupts and spouts water, beer, mayonnaise, tea, vinegar, wine, or oil (DM's choice) 30 feet into the air for 1d4 minutes. |
      | 11–20 | A **Treant** sprouts. Roll any die. On an odd roll, the treant is Chaotic Evil. On an even roll, the treant is Chaotic Good. |
      | 21–30 | An animate but immobile stone statue in your likeness rises and makes verbal threats against you. If you leave it and others come near, it describes you as the most heinous of villains and directs the newcomers to find and attack you. If you are on the same plane of existence as the statue, it knows where you are. The statue becomes inanimate after 24 hours. |
      | 31–40 | A campfire with green flames springs forth and burns for 24 hours or until it is extinguished. |
      | 41–50 | Three **Shrieker Fungi** sprout. |
      | 51–60 | 1d4 + 4 bright-pink toads crawl forth. Whenever a toad is touched, it transforms into a Large or smaller monster of the DM's choice that acts in accordance with its alignment and nature. The monster remains for 1 minute, then disappears in a puff of bright-pink smoke. |
      | 61–70 | A hungry **Bulette** burrows up and attacks. |
      | 71–80 | A fruit tree grows. It has 1d10 + 20 fruit, 1d8 of which act as randomly determined potions. The tree vanishes after 1 hour. Picked fruit remains, retaining any magic for 30 days. |
      | 81–90 | A nest of 1d4 + 3 rainbow-colored eggs springs up. Any creature that eats an egg makes a DC 20 Constitution saving throw. On a successful save, a creature permanently increases its lowest ability score by 1, randomly choosing among equally low scores. On a failed save, the creature takes 10d6 Force damage from an internal explosion. |
      | 91–95 | A pyramid with a 60-foot-square base bursts upward. Inside is a burial chamber containing a **Mummy** , a **Mummy Lord** , or some other Undead of the DM's choice. Its sarcophagus contains treasure of the DM's choice. |
      | 96–00 | A giant beanstalk sprouts, growing to a height of the DM's choice. The top leads where the DM chooses, such as to a great view, a cloud giant's castle, or another plane of existence. |
  fr:
    name: Sac de haricots magiques
    subtype: null
    description: |-
      Ce sac en tissu épais contient 3d4 haricots secs lorsqu'il est découvert. Il pèse 250 g, quel que soit le nombre de haricots qu'il contient, et devient un objet non magique lorsqu'il n'en contient plus.\
      Si vous jetez un ou plusieurs haricots hors du sac, ils explosent dans une Sphère de 3 mètres de rayon centrée sur eux. Tous les haricots jetés sont détruits par l'explosion, et chaque créature dans la Sphère, vous y compris, effectue un jet de sauvegarde de Dextérité DD 15, subissant 5d4 dégâts de force en cas d'échec ou la moitié de ces dégâts en cas de réussite.\
      Si vous retirez un haricot du sac, le plantez dans de la terre ou du sable, puis l'arrosez, il disparaît puis produit un effet 1 minute plus tard depuis le sol où il a été planté. Le MD peut choisir un effet dans la table suivante ou le déterminer aléatoirement.\
      
      | 1d100 | Effet |
      | --- | --- |
      | 01 | 5d4 champignons vénéneux poussent. Si une créature mange un champignon vénéneux, lancez un dé. Sur un résultat impair, le mangeur doit réussir un jet de sauvegarde de Constitution DD 15 ou subir 5d6 dégâts de poison et l'état Empoisonné pendant 1 heure. Sur un résultat pair, le mangeur gagne 5d6 points de vie temporaires pendant 1 heure. |
      | 02–10 | Un geyser jaillit et projette de l'eau, de la bière, de la mayonnaise, du thé, du vinaigre, du vin ou de l'huile (au choix du MD) à 9 mètres de hauteur pendant 1d4 minutes. |
      | 11–20 | Un **sylvanien**. Lancez un dé. Sur un jet impair, il est Chaotique Mauvais. Sur un jet pair, il est Chaotique Bon. |
      | 21–30 | Une statue de pierre à votre effigie, animée mais immobile, se lève et vous menace verbalement. Si vous partez et que d'autres s'approchent, elle vous décrit comme le plus odieux des méchants et ordonne aux nouveaux venus de vous trouver et de vous attaquer. Si vous êtes sur le même plan d'existence que la statue, elle sait où vous êtes. La statue devient inanimée après 24 heures. |
      | 31–40 | Un feu de camp aux flammes vertes jaillit et brûle pendant 24 heures ou jusqu'à ce qu'il soit éteint. |
      | 41–50 | Trois **criards** poussent. |
      | 51–60 | 1d4 + 4 crapauds rose vif rampent. Chaque fois qu'un crapaud est touché, il se transforme en un monstre de taille G ou plus petit, choisi par le MD, qui agit en fonction de son alignement et de sa nature. Le monstre reste 1 minute, puis disparaît dans un nuage de fumée rose vif. |
      | 61–70 | Une **bulette** affamée surgit du sol et attaque. |
      | 71–80 | Un arbre fruitier pousse. Il contient 1d10 + 20 fruits, dont 1d8 agissent comme des potions déterminées aléatoirement. L'arbre disparaît au bout d'une heure. Les fruits cueillis restent, conservant toute leur magie pendant 30 jours. |
      | 81–90 | Un nid contenant 1d4 + 3 oeufs aux couleurs de l'arc-en-ciel surgit. Toute créature qui mange un oeuf effectue un jet de sauvegarde de Constitution DD 20. En cas de sauvegarde réussie, la créature augmente définitivement sa valeur de caractéristique la plus basse de 1, en choisissant aléatoirement parmi des valeurs les plus basses en cas d'égalité. En cas d'échec au jet de sauvegarde, la créature subit 10d6 dégâts de force suite à une explosion interne. |
      | 91–95 | Une pyramide d'une base de 18 mètres carrés de côté s'élève. À l'intérieur se trouve une chambre funéraire contenant une **momie** , un **seigneur momie** ou un autre Mort-vivant au choix du MD. Son sarcophage renferme un trésor au choix du MD. |
      | 96–00 | Une tige de haricot géant pousse et atteint la hauteur choisie par le MD. Le sommet mène à l'endroit choisi par le MD, par exemple vers une vue imprenable, le château d'un géant des nuages ou un autre plan d'existence. |
