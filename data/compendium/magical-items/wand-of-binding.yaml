id: wand-of-binding
source: dmg_2024
type: wand
rarity: rare
attunement: true
translations:
  en:
    name: Wand of Binding
    subtype: null
    description: |-
      This wand has 7 charges.
      
      **Spells**. While holding the wand, you can cast one of the spells (save DC 17) on the following table from it. The table indicates how many charges you must expend to cast the spell.
      
      | Spell | Charge Cost |
      | --- | --- |
      | *[Hold Monster](https://www.aidedd.org/spell/hold-monster)* | 5 |
      | *[Hold Person](https://www.aidedd.org/spell/hold-person)* | 2 |

      **Regaining Charges**. The wand regains 1d6 + 1 expended charges daily at dawn. If you expend the wand's last charge, roll 1d20. On a 1, the wand crumbles into ashes and is destroyed.
  fr:
    name: Baguette des entraves
    subtype: null
    description: |-
      Cette baguette possède 7 charges.
      
      **Sorts**. Lorsque vous tenez la baguette, vous pouvez lancer l'un des sorts (DD 17) de la table suivante. Cette table indique le nombre de charges à dépenser pour lancer le sort.
      
      | Sort | Coût en charges |
      | --- | --- |
      | *[immobilisation de monstre](https://www.aidedd.org/spell/fr/immobilisation-de-monstre)* | 5 |
      | *[immobilisation de personne](https://www.aidedd.org/spell/fr/immobilisation-de-personne)* | 2 |

      **Récupération des charges**. La baguette récupère 1d6 + 1 charges dépensées chaque jour à l'aube. Si vous dépensez la dernière charge de la baguette, lancez 1d20. Sur un 1, la baguette tombe en cendres et est détruite.
