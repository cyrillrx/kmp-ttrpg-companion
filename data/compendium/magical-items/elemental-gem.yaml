id: elemental-gem
source: dmg_2024
type: wondrous_item
rarity: uncommon
attunement: false
translations:
  en:
    name: Elemental Gem
    subtype: null
    description: |-
      This gem contains a mote of elemental energy. When you take a Utilize action to break the gem, an elemental is summoned, and the gem ceases to be magical. The elemental appears in an unoccupied space as close to the broken gem as possible, understands your languages, obeys your commands, and takes its turn immediately after you on your Initiative count. The elemental disappears after 1 hour, when it dies, or when you dismiss it as a Bonus Action. The type of gem determines the elemental, as shown in the following table.
      
      | Gem | Summoned Elemental |
      | --- | --- |
      | Blue sapphire | [Air Elemental](https://www.aidedd.org/monster/air-elemental) |
      | Emerald | [Water Elemental](https://www.aidedd.org/monster/water-elemental) |
      | Red corundum | [Fire Elemental](https://www.aidedd.org/monster/fire-elemental) |
      | Yellow diamond | [Earth Elemental](https://www.aidedd.org/monster/earth-elemental) |
  fr:
    name: Gemme élémentaire
    subtype: null
    description: |-
      Cette gemme contient une particule d'énergie élémentaire. Lorsque vous prenez une action Utilisation pour la briser, un élémentaire est convoqué et la gemme perd son pouvoir magique. L'élémentaire apparaît dans un espace libre, aussi proche que possible de la gemme brisée, comprend vos langues, obéit à vos ordres et intervient immédiatement après vous dans l'ordre d'Initiative. L'élémentaire disparaît après 1 heure, lorsqu'il meurt ou lorsque vous le renvoyez par une action Bonus. Le type de gemme détermine l'élémentaire, comme indiqué dans la table suivante.
      
      | Gemme | Élémentaire convoqué |
      | --- | --- |
      | Saphir bleu | [Élémentaire de l'air](https://www.aidedd.org/monster/fr/elementaire-de-l-air) |
      | Émeraude | [Élémentaire de l'eau](https://www.aidedd.org/monster/fr/elementaire-de-l-eau) |
      | Corindon rouge | [Élémentaire du feu](https://www.aidedd.org/monster/fr/elementaire-du-feu) |
      | Diamant jaune | [Élémentaire de la terre](https://www.aidedd.org/monster/fr/elementaire-de-la-terre) |
