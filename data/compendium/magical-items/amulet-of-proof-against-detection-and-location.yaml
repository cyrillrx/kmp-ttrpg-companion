translations:
  en:
    name: Amulet of Proof against Detection and Location
    subtype: null
    description: |-
      While wearing this amulet, you can't be targeted by Divination spells or perceived through magical scrying sensors unless you allow it.
  fr:
    name: Amulette d'antidétection
    subtype: null
    description: |-
      Lorsque vous portez cette amulette, vous ne pouvez pas être ciblé par des sorts de divination ou perçu par des capteurs de divination magique, sauf si vous le permettez.
