id: cloak-of-displacement
source: dmg_2024
type: wondrous_item
rarity: rare
attunement: true
translations:
  en:
    name: Cloak of Displacement
    subtype: null
    description: <p>While you wear this cloak, it magically projects an illusion that
      makes you appear to be standing in a place near your actual location, causing
      any creature to have Disadvantage on attack rolls against you. If you take damage,
      the property ceases to function until the start of your next turn. This property
      is suppressed while your Speed is 0.</p>
  fr:
    name: Cape de déplacement
    subtype: null
    description: <p>Lorsque vous portez cette cape, elle projette magiquement une
      illusion qui vous donne l'impression de vous trouver à proximité de votre position
      réelle, ce qui confère un Désavantage à toute créature lors de ses jets d'attaque
      contre vous. Si vous subissez des dégâts, cette propriété cesse de fonctionner
      jusqu'au début de votre prochain tour. Cette propriété est supprimée si votre
      Vitesse est de 0.</p>
