id: lute-of-thunderous-thumping
source: dmg_2024
type: weapon
rarity: very_rare
attunement: false
translations:
  en:
    name: Lute of Thunderous Thumping
    subtype: Club
    description: |-
      This reinforced lute can be wielded as a magic Club that deals an extra 2d8 Thunder damage on a hit.\
      **Sing and Swing**. If you're a Bard, you can use your Charisma modifier instead of your Strength modifier when making a melee attack roll with the lute, provided you sing or hum while making the attack.
  fr:
    name: Luth tonitruant
    subtype: gourdin
    description: |-
      Ce luth renforcé peut être utilisé comme un gourdin magique infligeant 2d8 dégâts de tonnerre supplémentaires si l'attaque touche.\
      **En chantant**. Si vous êtes un barde, vous pouvez utiliser votre modificateur de Charisme au lieu de votre modificateur de Force à vos jets d'attaque au corps à corps avec le luth, à condition de chanter ou de fredonner pendant l'attaque.
