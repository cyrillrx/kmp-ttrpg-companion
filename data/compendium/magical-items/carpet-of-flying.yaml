id: carpet-of-flying
source: dmg_2024
type: wondrous_item
rarity: very_rare
attunement: false
translations:
  en:
    name: Carpet of Flying
    subtype: null
    description: |-
      <p>You can make this carpet hover and fly by taking a Magic action and using the carpet's command word. It moves according to your directions if you are within 30 feet of it.<br />
      Four sizes of <em>Carpet of Flying</em> exist. The DM chooses the size of a given carpet or determines it randomly by rolling on the following table. A carpet can carry up to twice the weight shown on the table, but its Fly Speed is halved if it carries more than its normal capacity.<br />
      1d100| Size| Capacity| Fly Speed<br />
      ---|---|---|---<br />
      01–20| 3 ft. × 5 ft.| 200 lb.| 80 feet<br />
      21–55| 4 ft. × 6 ft.| 400 lb.| 60 feet<br />
      56–80| 5 ft. × 7 ft.| 600 lb.| 40 feet<br />
      81–00| 6 ft. × 9 ft.| 800 lb.| 30 feet</p>
  fr:
    name: Tapis volant
    subtype: null
    description: |-
      <p>Vous pouvez faire planer et voler ce tapis en prenant une action Magie et en utilisant le mot de commande du tapis. Il se déplace selon vos instructions si vous vous trouvez à 9 mètres ou moins de lui.<br />
      Il existe quatre tailles de <em>tapis volant</em>. Le MD choisit la taille d'un tapis donné ou la détermine aléatoirement en tirant sur la table suivante. Un tapis peut supporter jusqu'à deux fois le poids indiqué, mais sa Vitesse de vol est divisée par deux s'il supporte une charge supérieure à sa capacité normale.<br />
      1d100| Taille| Capacité| Vitesse de vol<br />
      ---|---|---|---<br />
      01–20| 90 cm x 90 cm| 100 kg| 24 m<br />
      21–55| 1,20 m x 1,20 m| 200 kg| 18 m<br />
      56–80| 1,50 m x 1,50 m| 300 kg| 12 m<br />
      81–00| 1,80 m x 1,80 m| 400 kg| 9 m</p>
