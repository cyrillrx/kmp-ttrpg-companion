id: potion-of-growth
source: dmg_2024
type: potion
rarity: uncommon
attunement: false
translations:
  en:
    name: Potion of Growth
    subtype: null
    description: |-
      <p>When you drink this potion, you gain the "enlarge" effect of the <em><a href="https://www.aidedd.org/spell/enlarge-reduce">Enlarge/Reduce</a></em> spell for 10 minutes (no Concentration required).<br />
      The red in the potion's liquid continuously expands from a tiny bead to color the clear liquid around it and then contracts. Shaking the bottle fails to interrupt this process.</p>
  fr:
    name: Potion d'agrandissement
    subtype: null
    description: |-
      <p>Lorsque vous buvez cette potion, vous bénéficiez de l'effet « agrandissement » du sort <em><a href="https://www.aidedd.org/spell/fr/agrandissement-rapetissement">agrandissement/rapetissement</a></em> pendant 10 minutes (aucune concentration requise).<br />
      Le rouge contenu dans le liquide de la potion se dilate continuellement à partir d'une minuscule perle pour colorer le liquide transparent qui l'entoure, puis se contracte. Agiter la bouteille ne parvient pas à interrompre ce processus.</p>
