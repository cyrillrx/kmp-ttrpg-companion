id: cloak-of-many-fashions
source: dmg_2024
type: wondrous_item
rarity: common
attunement: false
translations:
  en:
    name: Cloak of Many Fashions
    subtype: null
    description: |-
      <p>While wearing this cloak, you can take a Bonus Action to change the style, color, and apparent quality of the garment. The cloak's weight doesn't change.<br />
      Regardless of its appearance, the cloak can't be anything but a cloak. Although it can duplicate the appearance of other magic cloaks, it doesn't gain their magical properties.</p>
  fr:
    name: Cape à la mode
    subtype: null
    description: |-
      <p>En portant cette cape, vous pouvez prendre une action Bonus pour modifier le style, la couleur et la qualité apparente du vêtement. Son poids reste inchangé.<br />
      Quelle que soit son apparence, la cape ne peut être qu'une cape. Bien qu'elle puisse reproduire l'apparence d'autres capes magiques, elle n'en acquiert pas les propriétés magiques.</p>
