id: hat-of-wizardry
source: dmg_2024
type: wondrous_item
rarity: common
attunement: true
translations:
  en:
    name: Hat of Wizardry
    subtype: null
    description: |-
      This cone-shaped hat is adorned with moons and stars. While you are wearing it, you gain the following benefits.

      **Spellcasting Focus**. You can use the hat as a Spellcasting Focus for your Wizard spells.

      **Unknown Spell**. As a Magic action, you can try to cast a cantrip that you don't know. The cantrip must be on the Wizard spell list and have a casting time of an action, and you make a DC 10 Intelligence (Arcana) check. On a successful check, you cast the spell. On a failed check, the spell fails, and the action used to cast the spell is wasted. In either case, you can't use this property again until you finish a Long Rest.
  fr:
    name: Chapeau de magicien
    subtype: null
    description: |-
      Ce chapeau conique est orné de lunes et d'étoiles. Lorsque vous le portez, vous bénéficiez des avantages suivants :

      **Focaliseur d'incantation**. Vous pouvez utiliser ce chapeau comme focaliseur d'incantation pour vos sorts de magicien.

      **Sort inconnu**. Par une action Magie, vous pouvez tenter de lancer un sort mineur que vous ne connaissez pas. Ce sort doit figurer sur la liste des sorts de magicien et avoir un temps d'incantation d'une action. Vous devez effectuer un jet d'Intelligence (Arcanes) DD 10. En cas de réussite, vous lancez le sort. En cas d'échec, le sort échoue et l'action utilisée est perdue. Dans les deux cas, vous ne pouvez plus utiliser cette propriété avant d'avoir terminé un Repos long.
