id: dagger-of-venom
source: dmg_2024
type: weapon
rarity: rare
attunement: false
translations:
  en:
    name: Dagger of Venom
    subtype: Dagger
    description: |-
      You gain a +1 bonus to attack rolls and damage rolls made with this magic weapon.
      
      You can take a Bonus Action to magically coat the blade with poison. The poison remains for 1 minute or until an attack using this weapon hits a creature. That creature must succeed on a DC 15 Constitution saving throw or take 2d10 Poison damage and have the Poisoned condition for 1 minute. The weapon can't be used this way again until the next dawn.
  fr:
    name: Dague venimeuse
    subtype: dague
    description: |-
      Vous obtenez un bonus de +1 aux jets d'attaque et de dégâts effectués avec cette arme magique. Vous pouvez prendre une action Bonus pour enduire magiquement la lame de poison. Le poison reste présent pendant 1 minute ou jusqu'à ce qu'une attaque utilisant cette arme touche une créature. Cette créature doit alors réussir un jet de sauvegarde de Constitution DD 15 ou subir 2d10 dégâts de poison et l'état Empoisonné pendant 1 minute. L'arme ne peut plus être utilisée de cette façon avant l'aube suivante.
