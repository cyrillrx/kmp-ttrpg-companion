id: candle-of-invocation
source: dmg_2024
type: wondrous_item
rarity: very_rare
attunement: true
translations:
  en:
    name: Candle of Invocation
    subtype: null
    description: |-
      This candle's magic is activated when the candle is lit, which requires a Magic action. After burning for 4 hours, the candle is destroyed. You can snuff it out early for use at a later time. Deduct the time it burned in increments of 1 minute from its total burn time.
      
      While lit, the candle sheds Dim Light in a 30-foot radius. While you are within that light, you have Advantage on D20 Tests. In addition, a Cleric or Druid in the light can cast level 1 spells they have prepared without expending spell slots.
      
      Alternatively, when you light the candle for the first time, you can cast *[Gate](https://www.aidedd.org/spell/gate)* with it. Doing so destroys the candle. The portal created by the spell links to a particular Outer Plane chosen by the DM or determined by rolling on the following table.
      
      | 1d100 | Outer Plane |
      | --- | --- |
      | 01–05 | Abyss |
      | 06–10 | Acheron |
      | 11–17 | Arborea |
      | 18–25 | Arcadia |
      | 26–33 | Beastlands |
      | 34–41 | Bytopia |
      | 42–46 | Carceri |
      | 47–54 | Elysium |
      | 55–59 | Gehenna |
      | 60–64 | Hades |
      | 65–69 | Limbo |
      | 70–77 | Mechanus |
      | 78–85 | Mount Celestia |
      | 86–90 | Nine Hells |
      | 91–95 | Pandemonium |
      | 96–00 | Ysgard |
  fr:
    name: Cierge d'invocation
    subtype: null
    description: |-
      La magie de ce cierge s'active lorsqu'il est allumé, ce qui nécessite une action Magie. Après 4 heures de combustion, le cierge est détruit. Vous pouvez l'éteindre plus tôt pour le réutiliser ultérieurement. Déduisez le temps de combustion par tranches de 1 minute de sa durée totale.
      
      Lorsqu'il est allumé, le cierge diffuse une Lumière faible sur un rayon de 9 mètres. Lorsque vous êtes dans cette lumière, vous bénéficiez d'un Avantage aux jets de d20. De plus, un clerc ou un druide dans la lumière peut lancer les sorts de niveau 1 qu'il a préparés sans dépenser d'emplacements de sort.
      
      Alternativement, lorsque vous allumez le cierge pour la première fois, vous pouvez lancer *[portail](https://www.aidedd.org/spell/fr/portail)* avec. Cela détruit le cierge mais le portail créé par le sort est relié à un plan Extérieur particulier choisi par le MD ou déterminé par un jet de dés sur la table suivante.
      
      | 1d100 | Plan Extérieur |
      | --- | --- |
      | 01–05 | Abysses |
      | 06–10 | Achéron |
      | 11–17 | Arborée |
      | 18–25 | Arcadie |
      | 26–33 | Terres des Bêtes |
      | 34–41 | Bytopie |
      | 42–46 | Carcères |
      | 47–54 | Élysée |
      | 55–59 | Géhenne |
      | 60–64 | Hadès |
      | 65–69 | Limbes |
      | 70–77 | Méchanus |
      | 78–85 | Mont Céleste |
      | 86–90 | Neuf Enfers |
      | 91–95 | Pandémonium |
      | 96–00 | Ysgard |
