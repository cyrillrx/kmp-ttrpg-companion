id: candle-of-invocation
source: dmg_2024
type: wondrous_item
rarity: very_rare
attunement: true
translations:
  en:
    name: Candle of Invocation
    subtype: null
    description: |-
      <p>This candle's magic is activated when the candle is lit, which requires a Magic action. After burning for 4 hours, the candle is destroyed. You can snuff it out early for use at a later time. Deduct the time it burned in increments of 1 minute from its total burn time.<br />
      While lit, the candle sheds Dim Light in a 30-foot radius. While you are within that light, you have Advantage on D20 Tests. In addition, a Cleric or Druid in the light can cast level 1 spells they have prepared without expending spell slots.<br />
      Alternatively, when you light the candle for the first time, you can cast <em><a href="https://www.aidedd.org/spell/gate">Gate</a></em> with it. Doing so destroys the candle. The portal created by the spell links to a particular Outer Plane chosen by the DM or determined by rolling on the following table.<br />
      1d100| Outer Plane<br />
      ---|---<br />
      01–05| Abyss<br />
      06–10| Acheron<br />
      11–17| Arborea<br />
      18–25| Arcadia<br />
      26–33| Beastlands<br />
      34–41| Bytopia<br />
      42–46| Carceri<br />
      47–54| Elysium<br />
      55–59| Gehenna<br />
      60–64| Hades<br />
      65–69| Limbo<br />
      70–77| Mechanus<br />
      78–85| Mount Celestia<br />
      86–90| Nine Hells<br />
      91–95| Pandemonium<br />
      96–00| Ysgard</p>
  fr:
    name: Cierge d'invocation
    subtype: null
    description: |-
      <p>La magie de ce cierge s'active lorsqu'il est allumé, ce qui nécessite une action Magie. Après 4 heures de combustion, le cierge est détruit. Vous pouvez l'éteindre plus tôt pour le réutiliser ultérieurement. Déduisez le temps de combustion par tranches de 1 minute de sa durée totale.<br />
      Lorsqu'il est allumé, le cierge diffuse une Lumière faible sur un rayon de 9 mètres. Lorsque vous êtes dans cette lumière, vous bénéficiez d'un Avantage aux jets de d20. De plus, un clerc ou un druide dans la lumière peut lancer les sorts de niveau 1 qu'il a préparés sans dépenser d'emplacements de sort.<br />
      Alternativement, lorsque vous allumez le cierge pour la première fois, vous pouvez lancer <em><a href="https://www.aidedd.org/spell/fr/portail">portail</a></em> avec. Cela détruit le cierge mais le portail créé par le sort est relié à un plan Extérieur particulier choisi par le MD ou déterminé par un jet de dés sur la table suivante.<br />
      1d100| Plan Extérieur<br />
      ---|---<br />
      01–05| Abysses<br />
      06–10| Achéron<br />
      11–17| Arborée<br />
      18–25| Arcadie<br />
      26–33| Terres des Bêtes<br />
      34–41| Bytopie<br />
      42–46| Carcères<br />
      47–54| Élysée<br />
      55–59| Géhenne<br />
      60–64| Hadès<br />
      65–69| Limbes<br />
      70–77| Méchanus<br />
      78–85| Mont Céleste<br />
      86–90| Neuf Enfers<br />
      91–95| Pandémonium<br />
      96–00| Ysgard</p>
