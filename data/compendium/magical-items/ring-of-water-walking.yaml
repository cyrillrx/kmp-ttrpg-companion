  en:
    name: Ring of Water Walking
    subtype: null
    description: |-
      While wearing this ring, you cast *[Water Walk](https://www.aidedd.org/spell/water-walk)* from it, targeting only yourself.
  fr:
    name: Anneau de marche sur l'eau
    subtype: null
