id: weapon-of-warning
source: dmg_2024
type: weapon
rarity: uncommon
attunement: true
translations:
  en:
    name: Weapon of Warning
    subtype: Any Simple or Martial
    description: |-
      <p>As long as this weapon is within your reach and you are attuned to it, you and allies within 30 feet of you gain the following benefits.<br />
      <strong>Alarm</strong>. The weapon magically awakens each subject who is sleeping naturally when combat begins. This benefit doesn't wake a subject from magically induced sleep.<br />
      <strong>Supernatural Readiness</strong>. Each subject has Advantage on its Initiative rolls.</p>
  fr:
    name: Arme vigilante
    subtype: courante ou de guerre
    description: |-
      <p>Tant que cette arme est à portée d'allonge et que vous êtes lié avec elle, vous et vos alliés situés dans un rayon de 9 mètres bénéficiez des avantages suivants :<br />
      <strong>Alarme</strong>. L’arme réveille magiquement chaque sujet endormi naturellement lorsqu'un combat commence. Cet avantage ne s’applique pas aux sujets endormis magiquement.<br />
      <strong>Vigilance surnaturelle</strong>. Chaque sujet a un Avantage à ses jets d’initiative.</p>
