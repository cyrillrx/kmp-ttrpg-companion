id: tome-of-understanding
source: dmg_2024
type: wondrous_item
rarity: very_rare
attunement: false
translations:
  en:
    name: Tome of Understanding
    subtype: null
    description: <p>This book contains intuition and insight exercises, and its words
      are charged with magic. If you spend 48 hours over a period of 6 days or fewer
      studying the book's contents and practicing its guidelines, your Wisdom increases
      by 2, to a maximum of 30. The manual then loses its magic, but regains it in
      a century.</p>
  fr:
    name: Traité de compréhension
    subtype: null
    description: <p>Ce livre contient des exercices d'intuition et de perspicacité,
      et ses mots sont chargés de magie. Si vous consacrez 48 heures, réparties sur
      une période de 6 jours ou moins, à étudier le contenu du livre et à mettre en
      pratique ses principes, votre Sagesse augmente de 2, jusqu'à un maximum de 30.
      Le manuel perd alors sa magie mais il la retrouvera au bout d'un siècle.</p>
