id: bag-of-holding
source: dmg_2024
type: wondrous_item
rarity: uncommon
attunement: false
translations:
  en:
    name: Bag of Holding
    subtype: null
    description: |-
      <p>This bag has an interior space considerably larger than its outside dimensions—roughly 2 feet square and 4 feet deep on the inside. The bag can hold up to 500 pounds, not exceeding a volume of 64 cubic feet. The bag weighs 5 pounds, regardless of its contents. Retrieving an item from the bag requires a Utilize action.<br />
      If the bag is overloaded, pierced, or torn, it is destroyed, and its contents are scattered in the Astral Plane. If the bag is turned inside out, its contents spill forth unharmed, but the bag must be put right before it can be used again. The bag holds enough air for 10 minutes of breathing, divided by the number of breathing creatures inside.<br />
      Placing a <em>Bag of Holding</em> inside an extradimensional space created by a <em>Heward's Handy Haversack, Portable Hole</em> , or similar item instantly destroys both items and opens a gate to the Astral Plane. The gate originates where the one item was placed inside the other. Any creature within a 10-foot-radius Sphere centered on the gate is sucked through it to a random location on the Astral Plane. The gate then closes. The gate is one-way and can't be reopened.</p>
  fr:
    name: Sac sans fond
    subtype: null
    description: |-
      <p>Ce sac possède un espace intérieur considérablement plus grand que ses dimensions extérieures : environ 60 cm de côté et 1,20 m de profondeur. Il peut contenir jusqu'à 250 kg, sans dépasser un volume de 1800 litres. Le sac pèse 2,5 kg, quel que soit son contenu. Retirer un objet du sac nécessite une action Utilisation.<br />
      Si le sac est surchargé, percé ou déchiré, il est détruit et son contenu est dispersé dans le plan Astral. S'il est retourné, son contenu se répand sans dommage, mais il doit être remis en place avant de pouvoir être réutilisé. Le sac contient suffisamment d'air pour 10 minutes de respiration, divisées par le nombre de créatures qui y respirent.<br />
      Placer un <em>sac sans fond</em> dans un espace extradimensionnel créé par un <em>havresac d'Huard</em> , un <em>puits portable</em> ou tout autre objet similaire détruit instantanément les deux objets et ouvre un portail vers le plan Astral. Le portail prend naissance là où l'un des objets a été placé dans l'autre. Toute créature se trouvant dans une Sphère de 3 mètres de rayon centrée sur le portail est aspirée vers un emplacement aléatoire du plan Astral. Le portail se referme alors. Il est à sens unique et ne peut être rouvert.</p>
