id: dimensional-shackles
source: dmg_2024
type: wondrous_item
rarity: rare
attunement: false
translations:
  en:
    name: Dimensional Shackles
    subtype: null
    description: |-
      You can take a Utilize action to place these shackles on a creature that has the Incapacitated condition. The shackles adjust to fit a creature of Small to Large size. The shackles prevent a creature bound by them from using any method of extradimensional movement, including teleportation or travel to a different plane of existence. They don't prevent the creature from passing through an interdimensional portal.
      
      You and any creature you designate when you use the shackles can take a Utilize action to remove them. Once every 30 days, the bound creature can make a DC 30 Strength (Athletics) check. On a successful check, the creature breaks free and destroys the shackles.
  fr:
    name: Menottes dimensionnelles
    subtype: null
    description: |-
      Vous pouvez prendre une action Utilisation pour placer ces menottes sur une créature Incapable d'agir. Les menottes s'ajustent à la taille d'une créature de taille P à G. Elles empêchent la créature liée d'utiliser tout moyen de déplacement extradimensionnel, y compris la téléportation ou le voyage vers un autre plan d'existence. Elles ne l'empêchent pas de traverser un portail interdimensionnel.
      
      Lorsque vous utilisez les menottes, vous et toute créature que vous désignez pouvez prendre une action Utilisation pour les retirer. Une fois tous les 30 jours, la créature liée peut effectuer un jet de Force (Athlétisme) DD 30. En cas de réussite, la créature se libère et détruit les menottes.
