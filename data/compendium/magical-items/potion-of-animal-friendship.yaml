id: potion-of-animal-friendship
source: dmg_2024
type: potion
rarity: uncommon
attunement: false
translations:
  en:
    name: Potion of Animal Friendship
    subtype: null
    description: |-
      <p>When you drink this potion, you can cast the level 3 version of the <em><a href="https://www.aidedd.org/spell/animal-friendship">Animal Friendship</a></em> spell (save DC 13).<br />
      Agitating this potion's muddy liquid brings little bits into view: a fish scale, a hummingbird feather, a cat claw, or a squirrel hair.</p>
  fr:
    name: Potion d'amitié avec les animaux
    subtype: null
    description: |-
      <p>Lorsque vous buvez cette potion, vous pouvez lancer la version niveau 3 du sort <em><a href="https://www.aidedd.org/spell/fr/amitie-avec-les-animaux">amitié avec les animaux</a></em> (sauvegarde DD 13).<br />
      Remuer le liquide boueux de cette potion fait apparaître de petits fragments : une écaille de poisson, une plume de colibri, une griffe de chat ou un poil d'écureuil.</p>
