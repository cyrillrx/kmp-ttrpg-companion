id: wand-of-enemy-detection
source: dmg_2024
type: wand
rarity: rare
attunement: true
translations:
  en:
    name: Wand of Enemy Detection
    subtype: null
    description: |-
      This wand has 7 charges. While holding it, you can take a Magic action to expend 1 charge. For 1 minute, you know the direction of the nearest creature Hostile to you within 60 feet, but not its distance from you. The wand can sense the presence of Hostile creatures that are Invisible, ethereal, disguised, or hidden, as well as those in plain sight. The effect ends if you stop holding the wand.\
      **Regaining Charges**. The wand regains 1d6 + 1 expended charges daily at dawn. If you expend the wand's last charge, roll 1d20. On a 1, the wand crumbles into ashes and is destroyed.
  fr:
    name: Baguette de détection de l'ennemi
    subtype: null
    description: |-
      Cette baguette possède 7 charges. Lorsque vous la tenez, vous pouvez prendre une action Magie pour dépenser 1 charge. Pendant 1 minute, vous connaissez la direction de la créature hostile la plus proche dans un rayon de 18 mètres, mais pas sa distance. La baguette peut détecter la présence de créatures hostiles invisibles, éthérées, déguisées ou cachées, ainsi que celles visibles. L'effet prend fin si vous cessez de tenir la baguette.\
      **Récupération des charges**. La baguette récupère 1d6 + 1 charges dépensées chaque jour à l'aube. Si vous dépensez la dernière charge de la baguette, lancez 1d20. Sur un 1, la baguette se réduit en cendres et est détruite.
