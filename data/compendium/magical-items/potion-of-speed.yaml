id: potion-of-speed
source: dmg_2024
type: potion
rarity: very_rare
attunement: false
translations:
  en:
    name: Potion of Speed
    subtype: null
    description: |-
      <p>When you drink this potion, you gain the effect of the <em><a href="https://www.aidedd.org/spell/haste">Haste</a></em> spell for 1 minute (no Concentration required) without suffering the wave of lethargy that typically occurs when the effect ends.<br />
      This potion's yellow fluid is streaked with black and swirls on its own.</p>
  fr:
    name: Potion de vitesse
    subtype: null
    description: |-
      <p>Lorsque vous buvez cette potion, vous bénéficiez de l'effet du sort <em><a href="https://www.aidedd.org/spell/fr/hate">hâte</a></em> pendant 1 minute (aucune concentration requise) sans subir la vague de léthargie qui survient généralement à la fin de l'effet.<br />
      Le liquide jaune de cette potion est strié de noir et tourbillonne tout seul.</p>
