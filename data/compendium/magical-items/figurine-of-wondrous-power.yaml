id: figurine-of-wondrous-power
source: dmg_2024
type: wondrous_item
rarity: varies
attunement: false
translations:
  en:
    name: Figurine of Wondrous Power
    subtype: null
    description: |-
      A *Figurine of Wondrous Power* is a statuette small enough to fit in a pocket. If you take a Magic action to throw the figurine to a point on the ground within 60 feet of yourself, the figurine becomes a living creature specified in the figurine's description below. If the space where the creature would appear is occupied by other creatures or objects, or if there isn't enough space for the creature, the figurine doesn't become a creature.
      
      The creature is Friendly to you and your allies. It understands your languages, obeys your commands, and takes its turn immediately after you on your Initiative count. If you issue no commands, the creature defends itself but takes no other actions.
      
      The creature exists for a duration specific to each figurine. At the end of the duration, the creature reverts to its figurine form. It reverts to a figurine early if its creature form drops to 0 Hit Points or if you take a Magic action while touching the creature to make it revert to figurine form. When the creature becomes a figurine again, its property can't be used again until a certain amount of time has passed, as specified in the figurine's description.
      
      ***Bronze Griffon (Rare)***. This bronze statuette is of a griffon rampant. It can become a **Griffon** for up to 6 hours. Once it has been used, it can't be used again until 5 days have passed.
      
      ***Ebony Fly (Rare)***. This ebony statuette, carved in the likeness of a horsefly, can become a **Giant Fly** for up to 12 hours and can be ridden as a mount. Once it has been used, it can't be used again until 2 days have passed.
      
      ***Golden Lions (Rare)***. These gold statuettes of lions are always created in pairs. You can use one figurine or both simultaneously. Each can become a **Lion** for up to 1 hour. Once a lion has been used, it can't be used again until 7 days have passed.
      
      ***Ivory Goats (Rare)***. These ivory statuettes of goats are always created in sets of three. Each goat looks unique and functions differently from the others. Their properties are as follows:
      
      **Goat of Terror**. This figurine can become a **Giant Goat** for up to 3 hours. The goat can't attack, but you can (harmlessly) remove its horns and use them as weapons. One horn becomes a +1 Lance, and the other becomes a +2 Longsword. Removing a horn requires a Magic action, and the weapons disappear and the horns return when the goat reverts to figurine form. While you ride the goat, any Hostile creature that starts its turn within a 30-foot Emanation originating from the goat must succeed on a DC 15 Wisdom saving throw or have the Frightened condition for 1 minute, until you are no longer riding the goat, or until the goat reverts to figurine form. The Frightened creature repeats the save at the end of each of its turns, ending the effect on itself on a success. Once it succeeds on the save, a creature is immune to this effect for the next 24 hours. Once the figurine has been used, it can't be used again until 15 days have passed.
      
      **Goat of Traveling**. This figurine can become a Large goat with the same statistics as a **Riding Horse**. It has 24 charges, and each hour or portion thereof it spends in goat form costs 1 charge. While it has charges, you can use it as often as you wish. When it runs out of charges, it reverts to a figurine and can't be used again until 7 days have passed, when it regains all expended charges.
      
      **Goat of Travail**. This figurine can become a **Giant Goat** for up to 3 hours. Once it has been used, it can't be used again until 30 days have passed.
      
      ***Marble Elephant (Rare)***. This marble statuette resembles a trumpeting elephant. It can become an **Elephant** for up to 24 hours. Once it has been used, it can't be used again until 7 days have passed.
      
      ***Obsidian Steed (Very Rare)***. This polished obsidian horse can become a **Nightmare** for up to 24 hours. The nightmare fights only to defend itself. Once it has been used, it can't be used again until 5 days have passed.
      
      The figurine has a 10 percent chance each time you use it to ignore your orders, including a command to revert to figurine form. If you mount the nightmare while it is ignoring your orders, you and the nightmare are instantly transported to a random location on the plane of Hades, where the nightmare reverts to figurine form.
      
      ***Onyx Dog (Rare)***. This onyx statuette of a dog can become a **Mastiff** for up to 6 hours. The mastiff has an Intelligence of 8 and can speak Common. It also has Blindsight with a range of 60 feet. Once it has been used, it can't be used again until 7 days have passed.
      
      ***Serpentine Owl (Rare)***. This serpentine statuette of an owl can become a **Giant Owl** for up to 8 hours. The owl can communicate telepathically with you at any range if you and it are on the same plane of existence. Once it has been used, it can't be used again until 2 days have passed.
      
      ***Silver Raven (Uncommon)***. This silver statuette of a raven can become a **Raven** for up to 12 hours. Once it has been used, it can't be used again until 2 days have passed. While in raven form, the figurine grants you the ability to cast Animal Messenger on it.
  fr:
    name: Figurine merveilleuse
    subtype: null
    description: |-
      Une *figurine merveilleuse* est une statuette qui tient dans la poche. Si vous entreprenez l'action Magie pour lancer la figurine en un point du sol situé dans un rayon de 18 m, elle devient une créature vivante précisée dans la description de la figurine ci-après. Si l'espace où la créature est censée apparaître est occupé par d'autres créatures ou objets, ou si cet espace est insuffisant pour la créature, la figurine ne se transforme pas.
      
      La créature est Amicale envers vous et vos compagnons. Elle comprend les mêmes langues que vous, obéit à vos ordres et joue son tour juste après vous à votre rang d'initiative. Si vous ne prononcez aucune instruction, la créature se défend si besoin, mais n'entreprend pas d'autre action.
      
      La créature existe pour une durée propre à chaque figurine. À la fin de cette durée, elle retrouve son état de figurine. Elle reprend cette forme prématurément si la créature tombe à 0 point de vie ou si vous consacrez l'action Magie à toucher la créature afin qu'elle redevienne une figurine. Quand la créature retrouve l'état de figurine, sa propriété ne peut plus être réutilisée pendant un certain temps, comme indiqué dans sa description.
      
      **Chèvres d'ivoire (rare)**. Ces statuettes de chèvre en ivoire sont toujours créées par série de trois. Chaque chèvre a un aspect unique et fonctionne différemment des autres. Leurs propriétés se déclinent comme suit :
      
      **Chèvre industrieuse**. Cette figurine peut se transformer en **chèvre géante** pendant un maximum de 3 heures. Une fois cette figurine utilisée, vous ne pouvez plus y recourir pendant 30 jours.
      
      **Chèvre terrifiante**. Cette figurine peut se transformer en **chèvre géante** pendant un maximum de 3 heures. Cette chèvre ne peut pas porter d'attaque, mais vous pouvez retirer ses cornes (de façon inoffensive) et les utiliser comme armes. L'une des cornes devient une lance d'arçon +1, l'autre une épée longue +2. Retirer une corne nécessite l'action Magie. Quand la chèvre retrouve sa forme de figurine, elle récupère aussi ses cornes et les armes disparaissent. Tant que vous chevauchez la chèvre, toute créature Hostile qui débute son tour dans une Émanation de 9 m centrée sur la chèvre doit réussir un jet de sauvegarde de Sagesse DD 15 sous peine subir l'état Effrayé pendant 1 minute (l'état prend également fin si vous ne chevauchez plus la chèvre ou que celle-ci retrouve sa forme de figurine). Une créature Effrayée réitère le JS à la fin de chacun de ses tours et met un terme à l'effet sur elle-même en cas de réussite. En cas de réussite, une créature est immunisée contre cet effet pendant 24 heures. Une fois cette figurine utilisée, vous ne pouvez plus y recourir pendant 15 jours.
      
      **Chèvre voyageuse**. Cette figurine se transforme en chèvre de taille G avec le profil du **cheval de selle**. Elle dispose de 24 charges, et chaque heure ou fraction d'heure passée sous forme de chèvre coûte 1 charge. Tant qu'il lui reste des charges, vous pouvez l'utiliser aussi souvent que vous le souhaitez. Quand elle n'a plus de charge, elle redevient une figurine à laquelle vous ne pouvez plus recourir pendant 7 jours, échéance à laquelle elle récupère toutes ses charges.
      
      **Chien d'onyx (rare)**. Cette statuette de chien en onyx se transforme en **molosse** pendant un maximum de 6 heures. Ce molosse est doté d'une Intelligence de 8 et parle le commun. Il dispose en outre de la Vision aveugle sur 18 m. Une fois cette figurine utilisée, vous ne pouvez plus y recourir pendant 7 jours.
      
      **Chouette de serpentine (rare)**. Cette statuette de chouette en serpentine peut se transformer en **chouette géante** pendant un maximum de 8 heures. La chouette communique par télépathie avec vous, quelle que soit la distance qui vous en sépare, à condition de se trouver sur le même plan d'existence que vous. Une fois cette figurine utilisée, vous ne pouvez plus y recourir pendant 2 jours.
      
      **Corbeau d'argent (peu courant)**. Cette statuette en argent se transforme en **corbeau** pendant un maximum de 12 heures. Une fois cette figurine utilisée, vous ne pouvez plus y recourir pendant 2 jours. Sous forme de corbeau, la figurine vous octroie le pouvoir de lancer messager animal sur elle.
      
      **Destrier d'obsidienne (très rare)**. Ce cheval d'obsidienne polie se transforme en **horriflamme** pendant un maximum de 24 heures. L'horriflamme ne combat que pour se défendre. Une fois cette figurine utilisée, vous ne pouvez plus y recourir pendant 5 jours.
      
      Chaque fois que vous utilisez la figurine, il y a 10 % de chances qu'elle reste sourde à vos ordres, y compris si vous lui intimez de retrouver sa forme de figurine. Si vous chevauchez l'horriflamme alors qu'elle est sourde à vos ordres, vous-même et la créature êtes instantanément transportés vers un endroit aléatoire du plan d'existence d'Hadès, où l'horriflamme retrouve sa forme de figurine.
      
      **Éléphant de marbre (rare)**. Cette statuette de marbre figure un éléphant qui barrit. Elle se transforme en **éléphant** pendant un maximum de 24 heures. Une fois cette figurine utilisée, vous ne pouvez plus y recourir pendant 7 jours.
      
      **Griffon de bronze (rare)**. Cette statuette en bronze représente un griffon rampant (cabré, en héraldique). Elle peut se transformer en **griffon** pendant un maximum de 6 heures. Une fois cette figurine utilisée, vous ne pouvez plus y recourir pendant 5 jours.
      
      **Lions d'or (rare)**. Ces statuettes de lion en or sont toujours créées par paire. Vous pouvez utiliser une figurine ou les deux simultanément. Chacune peut se transformer en **lion** pendant un maximum de 1 heure. Une fois un lion utilisé, vous ne pouvez plus recourir à sa figurine pendant 7 jours.
      
      **Mouche d'ébène (rare)**. Cette statuette d'ébène, taillée à l'effigie d'un taon, peut se transformer en **mouche géante** pendant un maximum de 12 h et peut faire office de monture. Une fois cette figurine utilisée, vous ne pouvez plus y recourir pendant 2 jours.
