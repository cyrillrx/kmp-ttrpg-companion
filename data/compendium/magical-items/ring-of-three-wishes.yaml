id: ring-of-three-wishes
source: dmg_2024
type: ring
rarity: legendary
attunement: false
translations:
  en:
    name: Ring of Three Wishes
    subtype: null
    description: <p>While wearing this ring, you can expend 1 of its 3 charges to
      cast <em><a href="https://www.aidedd.org/spell/wish">Wish</a></em> from it.
      The ring becomes nonmagical when you use the last charge.</p>
  fr:
    name: Anneau de triple souhait
    subtype: null
    description: <p>Lorsque vous portez cet anneau, vous pouvez dépenser une de ses
      trois charges pour lancer <em><a href="https://www.aidedd.org/spell/fr/souhait">souhait</a></em>.
      L'anneau devient non magique lorsque vous utilisez la dernière charge.</p>
