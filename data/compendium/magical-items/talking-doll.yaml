id: talking-doll
source: dmg_2024
type: wondrous_item
rarity: common
attunement: true
translations:
  en:
    name: Talking Doll
    subtype: null
    description: |-
      While this doll is within 5 feet of you, you can spend a Short Rest telling it to say up to six phrases, none of which can be more than six words long, and set a condition under which the doll speaks each phrase. You can also replace old phrases with new ones. Whatever the condition, it must occur within 5 feet of the doll to make it speak. For example, whenever someone picks up the doll, it might say, "I want a piece of candy." The doll's phrases are lost when your Attunement to the doll ends.
  fr:
    name: Poupée qui parle
    subtype: null
    description: |-
      Tant que cette poupée se trouve dans un rayon de 1,50 mètre autour de vous, vous pouvez utiliser un Repos court pour lui faire dire jusqu'à six phrases, chacune ne pouvant excéder six mots, et définir une condition pour que la poupée les prononce. Vous pouvez également remplacer les anciennes phrases par de nouvelles. Quelle que soit la condition, elle doit se produire à 1,50 mètre ou moins de la poupée pour qu'elle parle. Par exemple, lorsqu'on prend la poupée dans ses bras, elle pourrait dire « je veux un bonbon ». Les phrases de la poupée disparaissent lorsque votre Lien avec elle prend fin.
