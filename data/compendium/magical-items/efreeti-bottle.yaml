id: efreeti-bottle
source: dmg_2024
type: wondrous_item
rarity: very_rare
attunement: false
translations:
  en:
    name: Efreeti Bottle
    subtype: null
    description: |-
      When you take a Magic action to remove the stopper of this painted brass bottle, a cloud of thick smoke flows out of it. At the end of your turn, the smoke disappears with a flash of harmless fire, and an Efreeti appears in an unoccupied space within 30 feet of you.\
      The first time the bottle is opened, the DM rolls on the following table to determine what happens.\
      
      | 1d10 | Effect |
      | --- | --- |
      | 1 | The efreeti attacks you. After fighting for 5 rounds, the efreeti disappears, and the bottle loses its magic. |
      | 2–9 | The efreeti understands your languages and obeys your commands for 1 hour, after which it returns to the bottle, and a new stopper contains it. The stopper can't be removed for 24 hours. The next two times the bottle is opened, the same effect occurs. If the bottle is opened a fourth time, the efreeti escapes and disappears, and the bottle loses its magic. |
      | 10 | The efreeti understands your languages and can cast *Wish* once for you. It disappears when it grants the wish or after 1 hour, and the bottle loses its magic. |
  fr:
    name: Bouteille de l'éfrit / du mauvais génie
    subtype: null
    description: |-
      Lorsque vous prenez une action Magie pour retirer le bouchon de cette bouteille en laiton peint, un épais nuage de fumée s'en échappe. À la fin de votre tour, la fumée disparaît dans un éclair de feu inoffensif, et un éfrit apparaît dans un espace libre dans un rayon de 9 mètres.\
      La première fois que la bouteille est ouverte, le MD effectue un jet sur la table suivante pour déterminer ce qui se passe.\
      
      | 1d10 | Effet |
      | --- | --- |
      | 1 | L'éfrit vous attaque. Après 5 rounds de combat, il disparaît et la bouteille perd sa magie. |
      | 2–9 | L'éfrit comprend vos langues et obéit à vos ordres pendant 1 heure, après quoi il retourne dans la bouteille, fermée par un nouveau bouchon. Le bouchon ne peut être retiré pendant 24 heures. Les deux ouvertures suivantes de la bouteille produisent le même effet. Si la bouteille est ouverte une quatrième fois, l'éfrit s'échappe et disparaît, et la bouteille perd sa magie. |
      | 10 | L'éfrit comprend vos langues et peut lancer *souhait* pour vous. Il disparaît lorsqu'il exauce le souhait ou après 1 heure, et la bouteille perd sa magie. |
