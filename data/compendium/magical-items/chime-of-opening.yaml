id: chime-of-opening
source: dmg_2024
type: wondrous_item
rarity: rare
attunement: false
translations:
  en:
    name: Chime of Opening
    subtype: null
    description: |-
      <p>This hollow metal tube measures about 1 foot long and weighs 1 pound. As a Magic action, you can strike the chime to cast <em><a href="https://www.aidedd.org/spell/knock">Knock</a></em>. The spell's customary knocking sound is replaced by the clear, ringing tone of the chime, which is audible out to 300 feet.<br />
      The chime can be used 10 times. After the tenth time, it cracks and becomes useless.</p>
  fr:
    name: Carillon d'ouverture
    subtype: null
    description: |-
      <p>Ce tube métallique creux mesure environ 30 cm de long et pèse 500 g. Par une action Magie, vous pouvez frapper le carillon pour lancer <em><a href="https://www.aidedd.org/spell/fr/deblocage">déblocage</a></em>. Le son habituel du sort est remplacé par la sonorité claire et sonore du carillon, audible jusqu'à 90 mètres.<br />
      Le carillon peut être utilisé 10 fois. Au-delà de la dixième fois, il se fissure et devient inutilisable.</p>
