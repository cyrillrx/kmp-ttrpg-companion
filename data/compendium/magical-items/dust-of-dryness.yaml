id: dust-of-dryness
source: dmg_2024
type: wondrous_item
rarity: uncommon
attunement: false
translations:
  en:
    name: Dust of Dryness
    subtype: null
    description: |-
      This small packet contains 1d6 + 4 pinches of dust. As a Utilize action, you can sprinkle a pinch of the dust over water, turning up to a 15-foot Cube of water into one marble-sized pellet, which floats or rests near where the dust was sprinkled. The pellet's weight is negligible. A creature can take a Utilize action to smash the pellet against a hard surface, causing the pellet to shatter and release the water the dust absorbed. Doing so destroys the pellet and ends its magic.\
      As a Utilize action, you can sprinkle a pinch of the dust on an Elemental within 5 feet of yourself that is composed mostly of water (such as a **Water Elemental** or a **Water Weird**). Such a creature exposed to a pinch of the dust makes a DC 13 Constitution saving throw, taking 10d6 Necrotic damage on a failed save or half as much damage on a successful one.
  fr:
    name: Poudre dessiccative
    subtype: null
    description: |-
      Ce petit paquet contient 1d6 + 4 pincées de poussière. Par une action Utilisation, vous pouvez saupoudrer une pincée de poussière sur de l'eau, transformant ainsi un Cube d'eau de 4,50 mètres de côté en une boulette de la taille d'une bille, qui flotte ou se pose près de l'endroit où la poussière a été saupoudrée. Le poids de la boulette est négligeable. Une créature peut prendre une action Utilisation pour écraser la boulette contre une surface dure, la faisant éclater et libérant l'eau absorbée par la poussière. Cela détruit la boulette et met fin à sa magie.\
      Par une action Utilisation, vous pouvez saupoudrer une pincée de poussière sur un Élémentaire composé principalement d'eau (comme un **Élémentaire de l'eau** ou un **sibylle de l'eau**) situé à 1,50 mètre ou moins de vous. Une telle créature exposée à une pincée de poussière effectue un jet de sauvegarde de Constitution DD 13, subissant 10d6 dégâts nécrotiques en cas d'échec ou la moitié de ces dégâts en cas de réussite.
