id: helm-of-teleportation
source: dmg_2024
type: wondrous_item
rarity: rare
attunement: true
translations:
  en:
    name: Helm of Teleportation
    subtype: null
    description: |-
      This helm has 3 charges. While wearing it, you can expend 1 charge to cast *[Teleport](https://www.aidedd.org/spell/teleport)* from it. The helm regains 1d3 expended charges daily at dawn.
  fr:
    name: Heaume de téléportation
    subtype: null
    description: |-
      Ce casque possède 3 charges. Lorsque vous le portez, vous pouvez dépenser 1 charge pour lancer *[téléportation](https://www.aidedd.org/spell/fr/teleportation)*. Le casque récupère 1d3 charges dépensées chaque jour à l'aube.
