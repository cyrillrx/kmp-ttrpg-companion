id: tsunami
source: phb_2024
level: 8
school: conjuration
concentration: true
ritual: false
components:
  verbal: true
  somatic: true
  material: false
availableClasses:
- druid
translations:
  en:
    name: Tsunami
    castingTime: 1 minute
    range: 1 mile
    duration: Concentration, up to 6 rounds
    materialDescription: null
    description: A wall of water springs into existence at a point you choose within
      range. You can make the wall up to 300 feet long, 300 feet high, and 50 feet
      thick. The wall lasts for the duration.<br/>When the wall appears, each creature
      in its area makes a Strength saving throw, taking 6d10 Bludgeoning damage on
      a failed save or half as much damage on a successful one.<br/>At the start of
      each of your turns after the wall appears, the wall, along with any creatures
      in it, moves 50 feet away from you. Any Huge or smaller creature inside the
      wall or whose space the wall enters when it moves must succeed on a Strength
      saving throw or take 5d10 Bludgeoning damage. A creature can take this damage
      only once per round. At the end of the turn, the wall's height is reduced by
      50 feet, and the damage the wall deals on later rounds is reduced by 1d10. When
      the wall reaches 0 feet in height, the spell ends.<br/>A creature caught in
      the wall can move by swimming. Because of the wave's force, though, the creature
      must succeed on a Strength (Athletics) check against your spell save DC to move
      at all. If it fails the check, it can't move. A creature that moves out of the
      wall falls to the ground.<br/>
  fr:
    name: Tsunami
    castingTime: 1 minute
    range: 1,5 km
    duration: Concentration, jusqu'à 6 rounds
    materialDescription: null
    description: Une muraille d'eau se matérialise en un point que vous choisissez
      à portée. Ce mur peut atteindre jusqu'à 90 m de longueur, 90 m de hauteur et
      15 m d'épaisseur. Le mur persiste pour toute la durée.<br/>Quand le mur apparaît,
      chaque créature prise dans sa zone effectue un jet de sauvegarde de Force et
      subit 6d10 dégâts contondants en cas d'échec, la moitié en cas de réussite.<br/>Au
      début de chacun de vos tours suivant son apparition, le mur et toutes les créatures
      qu'il englobe s'éloignent de 15 m de vous. Toutes les créatures de taille TG
      ou inférieure qui occupent un espace dans lequel le mur se déplace doivent réussir
      un jet de sauvegarde de Force sous peine de subir 5d10 dégâts contondants. Une
      même créature ne peut subir ces dégâts qu'une fois par round. À la fin du tour,
      la hauteur du mur diminue de 15 m et les dégâts qu'il peut infliger aux rounds
      suivants diminuent de 1d10. Une fois que la hauteur du mur est de 0 m, le sort
      prend fin.<br/>Une créature prise dans le mur ne peut se déplacer qu'en nageant.
      La force de la vague est toutefois telle que la créature doit pour ce faire
      réussir un jet de Force (Athlétisme) contre le DD de sauvegarde de votre sort.
      En cas d'échec, elle ne peut pas se déplacer. Une créature qui se déplace hors
      du mur tombe au sol.<br/>
