id: levitate
source: phb_2024
level: 2
school: transmutation
concentration: true
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- sorcerer
- wizard
translations:
  en:
    name: Levitate
    castingTime: Action
    range: 60 feet
    duration: Concentration, up to 10 minutes
    materialDescription: a metal spring
    description: |-
      One creature or loose object of your choice that you can see within range rises vertically up to 20 feet and remains suspended there for the duration. The spell can levitate an object that weighs up to 500 pounds. An unwilling creature that succeeds on a Constitution saving throw is unaffected.
      
      The target can move only by pushing or pulling against a fixed object or surface within reach (such as a wall or a ceiling), which allows it to move as if it were climbing. You can change the target's altitude by up to 20 feet in either direction on your turn. If you are the target, you can move up or down as part of your move. Otherwise, you can take a Magic action to move the target, which must remain within the spell's range.
      
      When the spell ends, the target floats gently to the ground if it is still aloft.
      
  fr:
    name: Lévitation
    castingTime: Action
    range: 18 m
    duration: Concentration, jusqu'à 10 minutes
    materialDescription: un ressort métallique
    description: |-
      Une créature ou un objet mobile de votre choix, que vous pouvez voir à portée, s'élève verticalement jusqu'à 6 mètres et reste suspendu pendant toute la durée du sort. Le sort peut faire léviter un objet pesant jusqu'à 250 kg. Une créature non consentante qui réussit un jet de sauvegarde de Constitution n'est pas affectée.
      
      La cible ne peut se déplacer qu'en s'appuyant contre un objet ou une surface fixe à portée (comme un mur ou un plafond), ce qui lui permet de se déplacer comme si elle grimpait. Vous pouvez modifier l'altitude de la cible jusqu'à 6 mètres dans les deux sens pendant votre tour. Si vous êtes la cible, vous pouvez vous déplacer vers le haut ou vers le bas. Sinon, vous pouvez prendre une action Magie pour déplacer la cible, qui doit rester à portée du sort.
      
      À la fin du sort, la cible retombe doucement au sol si elle est toujours en l'air.
