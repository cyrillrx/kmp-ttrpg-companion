translations:
  en:
    name: Mordenkainen's Magnificent Mansion
    castingTime: 1 minute
    range: 300 feet
    duration: 24 hours
    materialDescription: a miniature door worth 15+ GP
    description: |-
      You conjure a shimmering door in range that lasts for the duration. The door leads to an extradimensional dwelling and is 5 feet wide and 10 feet tall. You and any creature you designate when you cast the spell can enter the extradimensional dwelling as long as the door remains open. You can open or close it (no action required) if you are within 30 feet of it. While closed, the door is imperceptible.

      Beyond the door is a magnificent foyer with numerous chambers beyond. The dwelling's atmosphere is clean, fresh, and warm.

      You can create any floor plan you like for the dwelling, but it can't exceed 50 contiguous 10-foot Cubes. The place is furnished and decorated as you choose. It contains sufficient food to serve a nine-course banquet for up to 100 people. Furnishings and other objects created by this spell dissipate into smoke if removed from it.

      A staff of 100 near-transparent servants attends all who enter. You determine the appearance of these servants and their attire. They are invulnerable and obey your commands. Each servant can perform tasks that a human could perform, but they can't attack or take any action that would directly harm another creature. Thus the servants can fetch things, clean, mend, fold clothes, light fires, serve food, pour wine, and so on. The servants can't leave the dwelling.

      When the spell ends, any creatures or objects left inside the extradimensional space are expelled into the unoccupied spaces nearest to the entrance.
  fr:
    name: Manoir somptueux de Mordenkainen
    castingTime: 1 minute
    range: 90 m
    duration: 24 heures
    materialDescription: une porte miniature d'une valeur minimale de 15 po
    description: |-
      Vous invoquez une porte chatoyante à portée, qui persiste pour toute la durée. La porte, large de 1,50 m et haute de 3 m, ouvre sur une demeure extradimensionnelle. Vous et toute créature que vous désignez à l'incantation du sort pouvez pénétrer dans cette demeure tant que la porte reste ouverte. Vous pouvez l'ouvrir ou la refermer (pas d'action requise) si vous vous trouvez dans un rayon de 9 m d'elle. Tant qu'elle est fermée, on ne peut pas la percevoir.

      Par-delà la porte, un magnifique vestibule se dévoile, ouvrant sur de nombreuses pièces. L'atmosphère y est propre, douce et agréable.

      La configuration des étages est laissée à votre discrétion, mais l'espace total ne peut excéder l'équivalent de 50 Cubes contigus de 3 m. La demeure est meublée et décorée selon vos désirs. Elle renferme suffisamment de nourriture pour servir un banquet composé de neuf plats pour 100 convives. Les meubles et autres objets créés par ce sort se dissipent en fumée si on les sort du manoir.

      100 serviteurs quasi transparents accueillent les invités. Vous décidez de l'aspect visuel de ces domestiques et de leur livrée. Invulnérables, ils obéissent à vos ordres. Les serviteurs peuvent accomplir toute tâche à la portée d'un humain, mais ils ne peuvent attaquer ni entreprendre d'action qui pourrait nuire directement à une autre créature. Ils peuvent donc aller chercher des objets, nettoyer, réparer, repasser les vêtements, allumer un feu, servir à manger et à boire, etc. Les domestiques ne peuvent pas quitter la demeure.

      Quand le sort prend fin, tous les objets et créatures qui occupent son espace extradimensionnel sont renvoyés dans les espaces inoccupés les plus proches de l'entrée.
