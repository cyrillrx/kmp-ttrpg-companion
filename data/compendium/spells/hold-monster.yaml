translations:
  en:
    name: Hold Monster
    castingTime: Action
    range: 90 feet
    duration: Concentration, up to 1 minute
    materialDescription: a straight piece of iron
    description: Choose a creature that you can see within range. The target must
      succeed on a Wisdom saving throw or have the Paralyzed condition for the duration.
      At the end of each of its turns, the target repeats the save, ending the spell
      on itself on a success.<br/><strong><em>Using a Higher-Level Spell Slot</em></strong>.
      You can target one additional creature for each spell slot level above 5.<br/>
  fr:
    name: Immobilisation de monstre
    castingTime: Action
    range: 27 m
    duration: Concentration, jusqu'à 1 minute
    materialDescription: un brin de fer
    description: Choisissez une créature que vous pouvez voir à portée. La cible doit
      réussir un jet de sauvegarde de Sagesse ou subir l'état Paralysé pendant toute
      la durée du sort. À la fin de chacun de ses tours, la cible renouvelle son jet
      de sauvegarde, mettant fin au sort sur elle-même en cas de réussite.<br/><strong><em>Emplacement
      de niveau supérieur</em></strong>. Vous pouvez cibler une créature supplémentaire
      pour chaque niveau d'emplacement de sort supérieur à 5.<br/>
