id: hold-monster
source: phb_2024
level: 5
school: enchantment
concentration: true
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- bard
- sorcerer
- warlock
- wizard
translations:
  en:
    name: Hold Monster
    castingTime: Action
    range: 90 feet
    duration: Concentration, up to 1 minute
    materialDescription: a straight piece of iron
    description: |-
      Choose a creature that you can see within range. The target must succeed on a Wisdom saving throw or have the Paralyzed condition for the duration. At the end of each of its turns, the target repeats the save, ending the spell on itself on a success.

      ***Using a Higher-Level Spell Slot***. You can target one additional creature for each spell slot level above 5.
  fr:
    name: Immobilisation de monstre
    castingTime: Action
    range: 27 m
    duration: Concentration, jusqu'à 1 minute
    materialDescription: un brin de fer
    description: |-
      Choisissez une créature que vous pouvez voir à portée. La cible doit réussir un jet de sauvegarde de Sagesse ou subir l'état Paralysé pendant toute la durée du sort. À la fin de chacun de ses tours, la cible renouvelle son jet de sauvegarde, mettant fin au sort sur elle-même en cas de réussite.

      ***Emplacement de niveau supérieur***. Vous pouvez cibler une créature supplémentaire pour chaque niveau d'emplacement de sort supérieur à 5.
