translations:
  en:
    name: Wish
    castingTime: Action
    range: Self
    duration: Instantaneous
    materialDescription: null
    description: |-
      <em>Wish</em> is the mightiest spell a mortal can cast. By simply speaking aloud, you can alter reality itself.<br/>The basic use of this spell is to duplicate any other spell of level 8 or lower. If you use it this way, you don't need to meet any requirements to cast that spell, including costly components. The spell simply takes effect.<br/>Alternatively, you can create one of the following effects of your choice:<br/><strong>Object Creation</strong>. You create one object of up to 25,000 GP in value that isn't a magic item. The object can be no more than 300 feet in any dimension, and it appears in an unoccupied space that you can see on the ground.<br/><strong>Instant Health</strong>. You allow yourself and up to twenty creatures that you can see to regain all Hit Points, and you end all effects on them listed in the <em><a href="./greater-restoration">Greater Restoration</a></em> spell.<br/><strong>Resistance</strong>. You grant up to ten creatures that you can see Resistance to one damage type that you choose. This Resistance is permanent.<br/><strong>Spell Immunity</strong>. You grant up to ten creatures you can see immunity to a single spell or other magical effect for 8 hours.<br/><strong>Sudden Learning</strong>. You replace one of your feats with another feat for which you are eligible. You lose all the benefits of the old feat and gain the benefits of the new one. You can't replace a feat that is a prerequisite for any of your other feats or features.<br/><strong>Roll Redo</strong>. You undo a single recent event by forcing a reroll of any die roll made within the last round (including your last turn). Reality reshapes itself to accommodate the new result. For example, a <em>Wish</em> spell could undo an ally's failed saving throw or a foe's Critical Hit. You can force the reroll to be made with Advantage or Disadvantage, and you choose whether to use the reroll or the original roll.<br/><strong>Reshape Reality</strong>. You may wish for something not included in any of the other effects. To do so, state your wish to the DM as precisely as possible. The DM has great latitude in ruling what occurs in such an instance; the greater the wish, the greater the likelihood that something goes wrong. This spell might simply fail, the effect you desire might be achieved only in part, or you might suffer an unforeseen consequence as a result of how you worded the wish. For example, wishing that a villain were dead might propel you forward in time to a period when that villain is no longer alive, effectively removing you from the game. Similarly, wishing for a Legendary magic item or an Artifact might instantly transport you to the presence of the item's current owner. If your wish is granted and its effects have consequences for a whole community, region, or world, you are likely to attract powerful foes. If your wish would affect a god, the god's divine servants might instantly intervene to prevent it or to encourage you to craft the wish in a particular way. If your wish would undo the multiverse itself, threaten the City of Sigil, or affect the Lady of Pain in any way, you see an image of her in your mind for a moment; she shakes her head, and your wish fails.<br/>The stress of casting <em>Wish</em> to produce any effect other than duplicating another spell weakens you. After enduring that stress, each time you cast a spell until you finish a Long Rest, you take 1d10 Necrotic damage per level of that spell. This damage can't be reduced or prevented in any way. In addition, your Strength score becomes 3 for 2d4 days. For each of those days that you spend resting and doing nothing more than light activity, your remaining recovery time decreases by 2 days. Finally, there is a 33 percent chance that you are unable to cast <em>Wish</em> ever again if you suffer this stress.<br/>
  fr:
    name: Souhait
    castingTime: Action
    range: Personnelle
    duration: Instantanée
    materialDescription: null
    description: |-
      <em>Souhait</em> est le sort le plus puissant que puisse lancer un mortel. De votre seule voix, vous pouvez influer sur la réalité même.<br/>L'utilisation standard du sort revient à reproduire le sort de votre choix du 8e niveau ou inférieur. Dans cette version, vous n'avez pas besoin de remplir les conditions habituelles du sort, y compris ses composantes coûteuses. Le sort prend tout simplement effet.<br/>Une autre approche vous permet de produire l'un des effets suivants, au choix :<br/><strong>Création d'objet</strong>. Vous créez un objet non magique d'une valeur maximale de 25 000 po. Aucune des dimensions de l'objet ne peut dépasser 90 m et il apparaît au sol, en un espace inoccupé que vous voyez.<br/><strong>Santé souveraine</strong>. Vous permettez à un maximum de vingt créatures que vous voyez de récupérer tous leurs points de vie et mettre un terme à tous les effets qui les touchent parmi ceux décrits pour le sort <em><a href="./fr/restauration-supreme">restauration suprême</a></em>.<br/><strong>Résistance</strong>. Vous octroyez la Résistance au type de dégâts de votre choix à un maximum de dix créatures que vous voyez. Cette Résistance est permanente.<br/><strong>Immunité magique</strong>. Vous octroyez l'Immunité contre un sort (ou un effet magique) unique pendant 8 heures, à un maximum de dix créatures que vous voyez.<br/><strong>Apprentissage instantané</strong>. Vous remplacez l'un de vos dons par un autre don pour lequel vous remplissez les prérequis. Vous perdez tous les bénéfices de l'ancien don au profit de tous ceux du nouveau. Vous ne pouvez pas remplacer un don qui figure parmi les prérequis d'un autre don ou d'une aptitude.<br/><strong>Caprice des dés</strong>. Vous modifiez un événement récent en faisant rejouer un jet de dés intervenu au cours du dernier round (ce qui comprend votre dernier tour). La réalité s'adapte alors à ce nouveau résultat. <em>Souhait</em> peut ainsi annuler le jet de sauvegarde raté d'un allié ou le Coup critique d'un ennemi. Vous pouvez décider que le jet se rejoue avec un Avantage ou un Désavantage, et vous décidez en connaissance de cause lequel s'applique entre le jet d'origine et le nouveau.<br/><strong>Réalité remodelée</strong>. Vous pouvez souhaiter quelque chose qui n'entre pas dans le cadre de ces effets. Si vous avez une idée qui n'entre pas dans leur cadre, faites-en part à votre MD, le plus précisément possible. Le MD est alors seul juge de ce qui peut se passer : plus le souhait est ambitieux, plus il risque d'engendrer des incidents. Le sort pourrait tout simplement échouer, ou ne produire que partiellement l'effet désiré, ou vous pourriez connaître un imprévu fâcheux en raison d'une formulation hasardeuse. Si vous faites par exemple le souhait que votre grand ennemi meure, vous pourriez vous retrouver projeté dans l'avenir, à une époque où cet adversaire n'est effectivement plus en vie, mais votre héros quitterait du même coup la partie. De même, souhaiter mettre la main sur un objet magique légendaire ou un artefact pourrait vous transporter aussitôt face à l'actuel propriétaire. Si votre souhait est exaucé et que ses effets pèsent sur toute une communauté, une région ou un monde, vous risquez fort d'attirer de puissants adversaires. Si votre souhait est susceptible d'affecter un dieu, ses serviteurs divins pourraient bien intervenir dans l'instant pour empêcher ce souhait ou pour vous inciter à le formuler de manière très spécifique. Si votre souhait menace d'anéantir le multivers même, il n'est pas exaucé.<br/>Dès lors qu'il ne s'agit pas seulement de reproduire les effets d'un autre sort, lancer <em>souhait</em> est une véritable épreuve. Après une telle gageure, chaque fois que vous jetez un sort sans avoir terminé un Repos long, vous subissez 1d10 dégâts nécrotiques par niveau du sort. Ces dégâts ne peuvent être réduits ni évités d'aucune manière. De plus, votre valeur de Force passe à 3 pendant 2d4 jours. Chaque jour que vous passez alors à vous reposer en vous contentant de menues tâches déduit 2 jours de cette période de convalescence. Enfin, cette épreuve entraîne un risque de 33 pour cent que vous ne soyez plus jamais capable de relancer <em>souhait</em>.<br/>
