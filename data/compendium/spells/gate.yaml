id: gate
source: phb_2024
level: 9
school: conjuration
concentration: true
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- cleric
- sorcerer
- warlock
- wizard
translations:
  en:
    name: Gate
    castingTime: Action
    range: 60 feet
    duration: Concentration, up to 1 minute
    materialDescription: a diamond worth 5,000+ GP
    description: You conjure a portal linking an unoccupied space you can see within
      range to a precise location on a different plane of existence. The portal is
      a circular opening, which you can make 5 to 20 feet in diameter. You can orient
      the portal in any direction you choose. The portal lasts for the duration, and
      the portal's destination is visible through it.<br/>The portal has a front and
      a back on each plane where it appears. Travel through the portal is possible
      only by moving through its front. Anything that does so is instantly transported
      to the other plane, appearing in the unoccupied space nearest to the portal.<br/>Deities
      and other planar rulers can prevent portals created by this spell from opening
      in their presence or anywhere within their domains.<br/>When you cast this spell,
      you can speak the name of a specific creature (a pseudonym, title, or nickname
      doesn't work). If that creature is on a plane other than the one you are on,
      the portal opens next to the named creature and transports it to the nearest
      unoccupied space on your side of the portal. You gain no special power over
      the creature, and it is free to act as the DM deems appropriate. It might leave,
      attack you, or help you.<br/>
  fr:
    name: Portail
    castingTime: Action
    range: 18 m
    duration: Concentration, jusqu'à 1 minute
    materialDescription: un diamant d'une valeur minimale de 5000 po
    description: Vous invoquez un portail reliant un espace inoccupé que vous voyez
      à portée à un lieu précis sur un autre plan d'existence. Le portail se présente
      comme une ouverture circulaire dont le diamètre peut aller de 1,50 m à 6 m.
      Vous l'orientez dans la direction de votre choix. Le portail persiste pour toute
      la durée, sa destination étant visible par l'ouverture.<br/>Le portail est doté
      d'une face avant et d'une face arrière, sur chaque plan où il apparaît. Emprunter
      le portail n'est possible que si on le franchit par sa face avant. Tout ce qui
      le franchit ainsi est aussitôt transporté sur l'autre plan, pour apparaître
      dans l'espace inoccupé le plus proche du portail.<br/>Les divinités et autres
      souverains planaires peuvent empêcher les portails engendrés par ce sort de
      s'ouvrir en leur présence, voire où que ce soit en leur domaine.<br/>À l'incantation
      du sort, vous pouvez prononcer le nom d'une créature donnée (un pseudonyme,
      un titre ou un surnom ne suffisent pas). Si cette créature se trouve sur un
      plan autre que celui que vous occupez, le portail s'ouvre à proximité de la
      créature nommée et la transporte jusqu'à l'espace inoccupé le plus proche du
      portail, sur votre plan. Vous n'avez nulle emprise particulière sur la créature,
      qui est libre d'agir à l'appréciation du MD. Elle peut ainsi s'en aller, vous
      attaquer ou vous aider.<br/>
