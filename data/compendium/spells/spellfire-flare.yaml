translations:
  en:
    name: Spellfire Flare
    castingTime: Action
    range: 60 feet
    duration: Instantaneous
    materialDescription: null
    description: You unleash a blast of brilliant fire. Make a ranged spell attack against a target within range; a target gains no benefit from Half Cover or Three-Quarters Cover for this attack roll. On a hit, the target takes 2d10 Radiant damage.<br/><strong>Using a Higher-Level Spell Slot.</strong> You create an additional blast for each spell slot level above 1. You can direct the blasts at the same target or at different ones. Make a separate attack roll for each blast.<br/>
  fr:
    name: Lueur de magefeu
    castingTime: Action
    range: 18 m
    duration: Instantanée
    materialDescription: null
    description: Vous déchaînez une déflagration de feu brillant. Effectuez une attaque de sort à distance contre une cible à portée ; la cible ne bénéficie d'aucun avantage de la Demi-couverture ou de l'Abri aux trois quarts pour ce jet d'attaque. En cas de coup, la cible subit 2d10 dégâts radieux.<br/><strong>Emplacement de niveau supérieur.</strong> Vous créez une déflagration supplémentaire par niveau d'emplacement au-delà du 1er. Vous pouvez diriger les déflagrations vers la même cible ou vers des cibles différentes. Effectuez un jet d'attaque séparé pour chaque déflagration.<br/>
