id: goodberry
source: phb_2024
level: 1
school: conjuration
concentration: false
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- druid
- ranger
translations:
  en:
    name: Goodberry
    castingTime: Action
    range: Self
    duration: 24 hours
    materialDescription: a sprig of mistletoe
    description: |-
      Ten berries appear in your hand and are infused with magic for the duration. A creature can take a Bonus Action to eat one berry. Eating a berry restores 1 Hit Point, and the berry provides enough nourishment to sustain a creature for one day.\
      Uneaten berries disappear when the spell ends.\
  fr:
    name: Baies nourricières
    castingTime: Action
    range: Personnelle
    duration: 24 heures
    materialDescription: une branche de gui
    description: |-
      Dix baies imprégnées de magie pendant toute la durée du sort apparaissent dans votre main. Une créature peut prendre une action Bonus pour en manger une. Manger une baie restaure 1 point de vie et fournit suffisamment de nourriture pour nourrir une créature pendant une journée.\
      Les baies non consommées disparaissent à la fin du sort.\
