translations:
  en:
    name: Thunderclap
    castingTime: Action
    range: Self
    duration: Instantaneous
    materialDescription: null
    description: |-
      Each creature in a 5-foot Emanation originating from you must succeed on a Constitution saving throw or take 1d6 Thunder damage. The spell's thunderous sound can be heard up to 100 feet away.
      
      ***Cantrip Upgrade***. The damage increases by 1d6 when you reach levels 5 (2d6), 11 (3d6), and 17 (4d6).
      
  fr:
    name: Coup de tonnerre
    castingTime: Action
    range: Personnelle
    duration: Instantanée
    materialDescription: null
    description: |-
      Toute créature dans une Émanation de 1,50 mètre provenant de vous doit réussir un jet de sauvegarde de Constitution ou subir 1d6 dégâts de tonnerre. Le son tonitruant du sort peut être entendu jusqu'à 30 mètres.
      
      ***Amélioration de sort mineur***. Les dégâts augmentent de 1d6 lorsque vous atteignez les niveaux 5 (2d6), 11 (3d6) et 17 (4d6).
