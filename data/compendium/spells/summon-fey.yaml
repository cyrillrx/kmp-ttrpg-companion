id: summon-fey
source: phb_2024
level: 3
school: conjuration
concentration: true
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- druid
- ranger
- warlock
- wizard
translations:
  en:
    name: Summon Fey
    castingTime: Action
    range: 90 feet
    duration: Concentration, up to 1 hour
    materialDescription: a gilded flower worth 300+ GP
    description: |-
      You call forth a Fey spirit. It manifests in an unoccupied space that you can see within range and uses the **[Fey Spirit](https://www.aidedd.org/monster/fey-spirit)** stat block. When you cast the spell, choose a mood: Fuming, Mirthful, or Tricksy. The creature resembles a Fey creature of your choice marked by the chosen mood, which determines certain details in its stat block. The creature disappears when it drops to 0 Hit Points or when the spell ends. The creature is an ally to you and your allies. In combat, the creature shares your Initiative count, but it takes its turn immediately after yours. It obeys your verbal commands (no action required by you). If you don't issue any, it takes the Dodge action and uses its movement to avoid danger.
      
      ***Using a Higher-Level Spell Slot***. Use the spell slot's level for the spell's level in the stat block.
      
  fr:
    name: Convocation de fée
    castingTime: Action
    range: 27 m
    duration: Concentration, jusqu'à 1 heure
    materialDescription: une fleur dorée d'une valeur minimale de 300 po
    description: |-
      Vous invoquez l'esprit d'un être féerique. Celui-ci se manifeste dans un espace libre que vous pouvez voir à portée et utilise le profil de l'**[esprit féerique](https://www.aidedd.org/monster/fr/esprit-feerique)**. Lorsque vous lancez le sort, choisissez une humeur : furibonde, rieuse ou espiègle. La créature ressemble à une créature féerique de votre choix, marquée par l'humeur choisie, qui détermine certains détails de son profil. La créature disparaît lorsqu'elle tombe à 0 point de vie ou à la fin du sort.
      
      Cette créature est votre alliée et celle de vos alliés. En combat, elle partage votre Initiative, mais son tour commence immédiatement après le vôtre. Elle obéit à vos ordres verbaux (aucune action requise). Si vous n'en donnez pas, elle prend l'action Esquive et utilise son mouvement pour éviter le danger.
      
      ***Emplacement de niveau supérieur***. Utilisez le niveau de l'emplacement de sort pour le niveau du sort dans le profil.
