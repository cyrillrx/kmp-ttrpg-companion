translations:
  en:
    name: Guiding Bolt
    castingTime: Action
    range: 120 feet
    duration: 1 round
    materialDescription: null
    description: You hurl a bolt of light toward a creature within range. Make a ranged
      spell attack against the target. On a hit, it takes 4d6 Radiant damage, and
      the next attack roll made against it before the end of your next turn has Advantage.<br/><strong><em>Using
      a Higher-Level Spell Slot</em></strong>. The damage increases by 1d6 for each
      spell slot level above 1.<br/>
  fr:
    name: Rayon traçant
    castingTime: Action
    range: 36 m
    duration: 1 round
    materialDescription: null
    description: Vous lancez un éclair de lumière vers une créature à portée. Effectuez
      une attaque de sort à distance contre la cible. Si l'attaque touche, elle subit
      4d6 dégâts radiants et le prochain jet d'attaque effectué contre elle avant
      la fin de votre prochain tour bénéficie d'un Avantage.<br/><strong><em>Emplacement
      de niveau supérieur</em></strong>. Les dégâts augmentent de 1d6 pour chaque
      niveau d'emplacement de sort supérieur à 1.<br/>
