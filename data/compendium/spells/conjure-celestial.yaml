id: conjure-celestial
source: phb_2024
level: 7
school: conjuration
concentration: true
ritual: false
components:
  verbal: true
  somatic: true
  material: false
availableClasses:
- cleric
translations:
  en:
    name: Conjure Celestial
    castingTime: Action
    range: 90 feet
    duration: Concentration, up to 10 minutes
    materialDescription: null
    description: |-
      You conjure a spirit from the Upper Planes, which manifests as a pillar of light in a 10-foot-radius, 40-foot-high Cylinder centered on a point within range. For each creature you can see in the Cylinder, choose which of these lights shines on it:\
      **Healing Light**. The target regains Hit Points equal to 4d12 plus your spellcasting ability modifier.\
      **Searing Light**. The target makes a Dexterity saving throw, taking 6d12 Radiant damage on a failed save or half as much damage on a successful one.\
      Until the spell ends, Bright Light fills the Cylinder, and when you move on your turn, you can also move the Cylinder up to 30 feet.\
      Whenever the Cylinder moves into the space of a creature you can see and whenever a creature you can see enters the Cylinder or ends its turn there, you can bathe it in one of the lights. A creature can be affected by this spell only once per turn.\
      ***Using a Higher-Level Spell Slot***. The healing and damage increase by 1d12 for each spell slot level above 7.\
  fr:
    name: Invocation de céleste
    castingTime: Action
    range: 27 m
    duration: Concentration, jusqu'à 10 minutes
    materialDescription: null
    description: |-
      Vous invoquez un esprit des Plans Supérieurs, qui se manifeste telle une colonne de lumière ; un Cylindre de 3 m de rayon et 12 m de haut, centré sur un point à portée. Pour chaque créature que vous voyez dans le Cylindre, choisissez par laquelle des lumières suivantes elle est baignée :\
      **Lumière calcinante**. La cible effectue un jet de sauvegarde de Dextérité, et subit 6d12 dégâts radiants en cas d'échec, la moitié en cas de réussite.\
      **Lumière guérisseuse**. La cible récupère autant de points de vie que 4d12 + votre modificateur de caractéristique d'incantation.\
      Jusqu'à la fin du sort, le Cylindre est empli d'une Lumière vive et, quand vous vous déplacez à votre tour, vous pouvez également déplacer le Cylindre d'un maximum de 9 m.\
      Chaque fois que le Cylindre se déplace dans l'espace d'une créature que vous voyez, ainsi que chaque fois qu'une créature que vous voyez pénètre dans le Cylindre ou y termine son tour, vous pouvez la baigner de l'une des lumières. Une même créature ne peut être affectée par ce sort plus d'une fois par tour.\
      ***Emplacement de niveau supérieur***. Les soins et les dégâts augmentent de 1d12 pour chaque niveau d'emplacement de sort supérieur à 7.\
