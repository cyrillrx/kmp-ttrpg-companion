translations:
  en:
    name: Wall of Force
    castingTime: Action
    range: 120 feet
    duration: Concentration, up to 10 minutes
    materialDescription: a sharp of glass
    description: |-
      An Invisible wall of force springs into existence at a point you choose within range. The wall appears in any orientation you choose, as a horizontal or vertical barrier or at an angle. It can be free floating or resting on a solid surface. You can form it into a hemispherical dome or a globe with a radius of up to 10 feet, or you can shape a flat surface made up of ten 10-foot-by-10-foot panels. Each panel must be contiguous with another panel. In any form, the wall is 1/4 inch thick and lasts for the duration. If the wall cuts through a creature's space when it appears, the creature is pushed to one side of the wall (you choose which side).\
      Nothing can physically pass through the wall. It is immune to all damage and can't be dispelled by *[Dispel Magic](./dispel-magic)*. A *Disintegrate* spell destroys the wall instantly, however. The wall also extends into the Ethereal Plane and blocks ethereal travel through the wall.\
  fr:
    name: Mur de force
    castingTime: Action
    range: 36 m
    duration: Concentration, jusqu'à 10 minutes
    materialDescription: un éclat de verre
    description: |-
      Un mur de force invisible apparaît à l'endroit que vous choisissez et à portée. Le mur apparaît dans l'orientation de votre choix : barrière horizontale, verticale ou inclinée. Il peut flotter librement ou reposer sur une surface solide. Vous pouvez lui donner la forme d'un dôme hémisphérique ou d'un globe d'un rayon maximal de 3 mètres, ou encore d'une surface plane composée de dix panneaux de 3 mètres sur 3 mètres. Chaque panneau doit être contigu à un autre. Quelle que soit sa forme, le mur a une épaisseur de 6 mm et dure toute la durée du sort. Si le mur traverse l'espace d'une créature lors de son apparition, celle-ci est repoussée d'un côté (selon votre choix).\
      Rien ne peut physiquement traverser le mur. Il est immunisé contre tous les dégâts et ne peut être dissipé par *[dissipation de la magie](./fr/dissipation-de-la-magie)*. Un sort de *désintégration* détruit cependant le mur instantanément. Le mur s'étend également dans le plan Éthéré et bloque le voyage éthéré à travers le mur.\
