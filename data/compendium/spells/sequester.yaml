id: sequester
source: phb_2024
level: 7
school: transmutation
concentration: false
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- wizard
translations:
  en:
    name: Sequester
    castingTime: Action
    range: Touch
    duration: Until dispelled
    materialDescription: gem dust worth 5,000+ GP, which the spell consumes
    description: |-
      With a touch, you magically sequester an object or a willing creature. For the duration, the target has the Invisible condition and can't be targeted by Divination spells, detected by magic, or viewed remotely with magic.
      
      If the target is a creature, it enters a state of suspended animation; it has the Unconscious condition, doesn't age, and doesn't need food, water, or air.
      
      You can set a condition for the spell to end early. The condition can be anything you choose, but it must occur or be visible within 1 mile of the target. Examples include “after 1,000 years” or “when the tarrasque awakens.” This spell also ends if the target takes any damage.
      
  fr:
    name: Dissimulation suprême
    castingTime: Action
    range: Contact
    duration: Jusqu'à dissipation
    materialDescription: poudre de gemme d'une valeur minimale de 5000 po, que le
      sort consomme
    description: |-
      D'un contact, vous isolez magiquement un objet ou une créature consentante. Pour toute la durée, la cible a l'état Invisible et les sorts de Divination ne peuvent pas la cibler, aucune magie ne peut la détecter ni l'observer à distance.
      
      Si la cible est une créature, elle sombre dans un état d'animation suspendue ; elle subit l'état Inconscient, ne vieillit pas et se passe de nourriture, d'eau et d'air.
      
      Vous pouvez fixer une condition qui mettra un terme prématuré au sort. Vous êtes libre de choisir n'importe quelle condition, mais elle doit intervenir ou être visible dans un rayon de 1,5 km de la cible. Ce peut être « au bout de 1 000 ans » ou « lorsque la tarasque s'éveillera », par exemple. Le sort prend également fin si la cible subit des dégâts.
