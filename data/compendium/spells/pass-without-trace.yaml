translations:
  en:
    name: Pass without Trace
    castingTime: Action
    range: Self
    duration: Concentration, up to 1 hour
    materialDescription: ashes from a burned mistletoe
    description: You radiate a concealing aura in a 30-foot Emanation for the duration.
      While in the aura, you and each creature you choose have a +10 bonus to Dexterity
      (Stealth) checks and leave no tracks.<br/>
  fr:
    name: Passage sans trace
    castingTime: Action
    range: Personnelle
    duration: Concentration, jusqu'à 1 heure
    materialDescription: les cendres d'une feuille de gui calcinée
    description: Une aura de dissimulation rayonne autour de vous sous forme d'Émanation
      de 9 mètres pendant toute la durée du sort. Tant que vous êtes dans l'aura,
      vous et Toute créature que vous choisissez bénéficiez d'un bonus de +10 aux
      jets de Dextérité (Discrétion) et ne laissez aucune trace.<br/>
