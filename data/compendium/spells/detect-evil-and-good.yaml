translations:
  en:
    name: Detect Evil and Good
    castingTime: Action
    range: Self
    duration: Concentration, up to 10 minutes
    materialDescription: null
    description: For the duration, you sense the location of any Aberration, Celestial,
      Elemental, Fey, Fiend, or Undead within 30 feet of yourself. You also sense
      whether the <em><a href="./hallow">Hallow</a></em> spell is active there and,
      if so, where.<br/>The spell is blocked by 1 foot of stone, dirt, or wood; 1
      inch of metal; or a thin sheet of lead.<br/>
  fr:
    name: Détection du mal et du bien
    castingTime: Action
    range: Personnelle
    duration: Concentration, jusqu'à 10 minutes
    materialDescription: null
    description: Pendant la durée du sort, vous détectez l'emplacement de toute aberration,
      céleste, élémentaire, fée, fiélon ou mort-vivant dans un rayon de 9 mètres autour
      de vous. Vous détectez également si le sort <em><a href="./fr/sanctification">sanctification</a></em>
      est actif par ici et, si oui, où.<br/>Le sort est bloqué par 30 cm de pierre,
      de terre ou de bois, par 2,50 cm de métal, ou par une fine feuille de plomb.<br/>
