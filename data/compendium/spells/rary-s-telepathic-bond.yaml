id: rary-s-telepathic-bond
source: phb_2024
level: 5
school: divination
concentration: false
ritual: true
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- bard
- wizard
translations:
  en:
    name: Rary's Telepathic Bond
    castingTime: Action or Ritual
    range: 30 feet
    duration: 1 hour
    materialDescription: two eggs
    description: You forge a telepathic link among up to eight willing creatures of
      your choice within range, psychically linking each creature to all the others
      for the duration. Creatures that can't communicate in any languages aren't affected
      by this spell.<br/>Until the spell ends, the targets can communicate telepathically
      through the bond whether or not they share a language. The communication is
      possible over any distance, though it can't extend to other planes of existence.<br/>
  fr:
    name: Lien télépathique de Rary
    castingTime: Action ou Rituel
    range: 9 m
    duration: 1 heure
    materialDescription: deux oeufs
    description: Vous créez un lien télépathique entre un maximum de huit créatures
      consentantes de votre choix à portée, reliant psychiquement chaque créature
      à toutes les autres pendant la durée du sort. Les créatures qui ne peuvent communiquer
      dans aucune langue ne sont pas affectées par ce sort.<br/>Jusqu'à la fin du
      sort, les cibles peuvent communiquer télépathiquement grâce au lien, qu'elles
      partagent ou non une langue. La communication est possible à n'importe quelle
      distance, mais ne peut s'étendre à d'autres plans d'existence.<br/>
