id: mass-suggestion
source: phb_2024
level: 6
school: enchantment
concentration: false
ritual: false
components:
  verbal: true
  somatic: false
  material: true
availableClasses:
- bard
- sorcerer
- wizard
translations:
  en:
    name: Mass Suggestion
    castingTime: Action
    range: 60 feet
    duration: 24 hours
    materialDescription: a snake's tongue
    description: You suggest a course of activity—described in no more than 25 words—to
      twelve or fewer creatures you can see within range that can hear and understand
      you. The suggestion must sound achievable and not involve anything that would
      obviously deal damage to any of the targets or their allies. For example, you
      could say, “Walk to the village down that road, and help the villagers there
      harvest crops until sunset.” Or you could say, “Now is not the time for violence.
      Drop your weapons, and dance! Stop in an hour.”<br/>Each target must succeed
      on a Wisdom saving throw or have the Charmed condition for the duration or until
      you or your allies deal damage to the target. Each Charmed target pursues the
      suggestion to the best of its ability. The suggested activity can continue for
      the entire duration, but if the suggested activity can be completed in a shorter
      time, the spell ends for a target upon completing it.<br/><strong><em>Using
      a Higher-Level Spell Slot</em></strong>. The duration is longer with a spell
      slot of level 7 (10 days), 8 (30 days), or 9 (366 days).<br/>
  fr:
    name: Suggestion de groupe
    castingTime: Action
    range: 18 m
    duration: 24 heures
    materialDescription: une langue de serpent
    description: 'Vous suggérez une ligne de conduite par 25 mots ou moins afin d''influencer
      magiquement un maximum de douze créatures que vous voyez à portée et qui vous
      entendent et vous comprennent. La suggestion doit paraître raisonnable et ne
      pas présenter de risque évident d''infliger des dégâts aux cibles ni à leurs
      alliés. Vous pourriez ainsi dire : « Marchez jusqu''au village suivant pour
      aider la population à la moisson jusqu''au crépuscule. » Ou bien : « L''heure
      n''est pas à la violence. Lâchez vos armes et dansez ! Cessez dans une heure
      ».<br/>Chaque cible doit réussir un jet de sauvegarde de Sagesse sous peine
      de subir l''état Charmé pour toute la durée ou jusqu''à que vous ou l''un de
      vos alliés lui infligiez des dégâts. Chaque cible Charmée se soumet à la suggestion
      de son mieux. L''activité suggérée peut s''étendre sur toute la durée, mais
      s''il est possible de l''accomplir plus tôt, le sort prend fin sur la cible
      dès qu''elle en a terminé.<br/><strong><em>Emplacement de niveau supérieur</em></strong>.
      La durée rallonge avec un emplacement de sort de niveau 7 (10 jours), 8 (30
      jours) et 9 (366 jours).<br/>'
