id: call-lightning
source: phb_2024
level: 3
school: conjuration
concentration: true
ritual: false
components:
  verbal: true
  somatic: true
  material: false
availableClasses:
- druid
translations:
  en:
    name: Call Lightning
    castingTime: Action
    range: 120 feet
    duration: Concentration, up to 10 minutes
    materialDescription: null
    description: A storm cloud appears at a point within range that you can see above
      yourself. It takes the shape of a Cylinder that is 10 feet tall with a 60-foot
      radius.<br/>When you cast the spell, choose a point you can see under the cloud.
      A lightning bolt shoots from the cloud to that point. Each creature within 5
      feet of that point makes a Dexterity saving throw, taking 3d10 Lightning damage
      on a failed save or half as much damage on a successful one.<br/>Until the spell
      ends, you can take a Magic action to call down lightning in that way again,
      targeting the same point or a different one.<br/>If you're outdoors in a storm
      when you cast this spell, the spell gives you control over that storm instead
      of creating a new one. Under such conditions, the spell's damage increases by
      1d10.<br/><strong><em>Using a Higher-Level Spell Slot</em></strong>. The damage
      increases by 1d10 for each spell slot level above 3.<br/>
  fr:
    name: Appel de la foudre
    castingTime: Action
    range: 36 m
    duration: Concentration, jusqu'à 10 minutes
    materialDescription: null
    description: Un nuage d'orage apparaît à un point visible au-dessus de vous. Il
      prend la forme d'un Cylindre de 3 mètres de haut et de 18 mètres de rayon.<br/>Lorsque
      vous lancez le sort, choisissez un point visible sous le nuage. Un éclair jaillit
      du nuage jusqu'à ce point. Toute créature dans un rayon de 1,50 mètre effectue
      un jet de sauvegarde de Dextérité, subissant 3d10 dégâts de foudre en cas d'échec
      ou la moitié de ces dégâts en cas de réussite.<br/>Jusqu'à la fin du sort, vous
      pouvez prendre une action Magie pour invoquer à nouveau la foudre de cette manière,
      en ciblant le même point ou un autre.<br/>Si vous êtes à l'extérieur sous un
      orage lorsque vous lancez ce sort, celui-ci vous donne le contrôle de cet orage
      au lieu d'en créer un nouveau. Dans ces conditions, les dégâts du sort augmentent
      de 1d10.<br/><strong><em>Emplacement de niveau supérieur</em></strong>. Les
      dégâts augmentent de 1d10 pour chaque niveau d'emplacement de sort supérieur
      à 3.<br/>
