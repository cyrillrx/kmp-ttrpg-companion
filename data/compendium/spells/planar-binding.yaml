translations:
  en:
    name: Planar Binding
    castingTime: 1 hour
    range: 60 feet
    duration: 24 hours
    materialDescription: a jewel worth 1,000+ GP, which the spell consumes
    description: |-
      You attempt to bind a Celestial, an Elemental, a Fey, or a Fiend to your service. The creature must be within range for the entire casting of the spell. (Typically, the creature is first summoned into the center of the inverted version of the *[Magic Circle](./magic-circle)* spell to trap it while this spell is cast.) At the completion of the casting, the target must succeed on a Charisma saving throw or be bound to serve you for the duration. If the creature was summoned or created by another spell, that spell's duration is extended to match the duration of this spell.
      
      A bound creature must follow your commands to the best of its ability. You might command the creature to accompany you on an adventure, to guard a location, or to deliver a message. If the creature is Hostile, it strives to twist your commands to achieve its own objectives. If the creature carries out your commands completely before the spell ends, it travels to you to report this fact if you are on the same plane of existence. If you are on a different plane, it returns to the place where you bound it and remains there until the spell ends.
      
      ***Using a Higher-Level Spell Slot***. The duration increases with a spell slot of level 6 (10 days), 7 (30 days), 8 (180 days), and 9 (366 days).
      
  fr:
    name: Entrave planaire
    castingTime: 1 heure
    range: 18 m
    duration: 24 heures
    materialDescription: un joyau d'une valeur minimale de 1000 po, que le sort consomme
    description: |-
      Vous tentez de lier un Céleste, un Élémentaire, une Fée ou un Fiélon à votre service. La créature doit être à portée pendant toute la durée du sort (en général, la créature est d'abord invoquée au centre de la version inversée du sort *[cercle-magique](./fr/cercle magique)* pour la piéger pendant l'incantation). À la fin de l'incantation, la cible doit réussir un jet de sauvegarde de Charisme ou être liée à votre service pendant toute la durée du sort. Si la créature a été invoquée ou créée par un autre sort, la durée de ce dernier est prolongée pour correspondre à celle de ce sort.
      
      Une créature liée doit obéir à vos ordres du mieux qu'elle peut. Vous pouvez lui ordonner de vous accompagner dans une aventure, de garder un lieu ou de délivrer un message. Si la créature est Hostile, elle s'efforce de déformer vos ordres pour atteindre ses propres objectifs. Si elle exécute entièrement vos ordres avant la fin du sort, elle se rend à vous pour vous le signaler si vous êtes sur le même plan d'existence. Si vous êtes sur un autre plan, elle retourne à l'endroit où vous l'avez lié et y reste jusqu'à la fin du sort.
      
      ***Emplacement de niveau supérieur***. La durée augmente avec un emplacement de sort de niveau 6 (10 jours), 7 (30 jours), 8 (180 jours) et 9 (366 jours).
