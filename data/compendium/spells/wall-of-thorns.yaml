id: wall-of-thorns
source: phb_2024
level: 6
school: conjuration
concentration: true
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- druid
translations:
  en:
    name: Wall of Thorns
    castingTime: Action
    range: 120 feet
    duration: Concentration, up to 10 minutes
    materialDescription: a handful of thorns
    description: You create a wall of tangled brush bristling with needle-sharp thorns.
      The wall appears within range on a solid surface and lasts for the duration.
      You choose to make the wall up to 60 feet long, 10 feet high, and 5 feet thick
      or a circle that has a 20-foot diameter and is up to 20 feet high and 5 feet
      thick. The wall blocks line of sight.<br/>When the wall appears, each creature
      in its area makes a Dexterity saving throw, taking 7d8 Piercing damage on a
      failed save or half as much damage on a successful one.<br/>A creature can move
      through the wall, albeit slowly and painfully. For every 1 foot a creature moves
      through the wall, it must spend 4 feet of movement. Furthermore, the first time
      a creature enters a space in the wall on a turn or ends its turn there, the
      creature makes a Dexterity saving throw, taking 7d8 Slashing damage on a failed
      save or half as much damage on a successful one. A creature makes this save
      only once per turn.<br/><strong><em>Using a Higher-Level Spell Slot</em></strong>.
      Both types of damage increase by 1d8 for each spell slot level above 6.<br/>
  fr:
    name: Mur d'épines
    castingTime: Action
    range: 36 m
    duration: Concentration, jusqu'à 10 minutes
    materialDescription: une poignée d'épines
    description: Vous créez un mur fait d'un enchevêtrement végétal hérissé d'épines
      acérées. Le mur apparaît à portée sur une surface solide et persiste pour toute
      la durée. Vous pouvez ainsi ériger un mur dont l'épaisseur n'excède pas 1,50
      m ; pour le reste, vous avez le choix entre un mur droit long d'un maximum de
      18 m et haut de 3 m ou moins, et un mur circulaire dont le diamètre et la hauteur
      ne dépassent pas 6 m. Le mur bloque le champ de vision.<br/>Quand le mur apparaît,
      chaque créature prise dans sa zone effectue un jet de sauvegarde de Dextérité
      et subit 7d8 dégâts perforants en cas d'échec, la moitié en cas de réussite.<br/>Une
      créature peut se déplacer à travers ces ronces, mais l'opération est lente et
      douloureuse. Toute distance parcourue à travers le mur lui coûte le quadruple
      en termes de déplacement. De plus, la première fois d'un tour qu'une créature
      pénètre dans la haie ou qu'elle y termine son propre tour, elle effectue un
      jet de sauvegarde de Dextérité et subit 7d8 dégâts tranchants en cas d'échec,
      la moitié en cas de réussite. Une même créature n'effectue en aucun cas ce JdS
      plus d'une fois par tour.<br/><strong><em>Emplacement de niveau supérieur</em></strong>.
      Les dégâts des deux types augmentent de 1d8 pour chaque niveau d'emplacement
      de sort supérieur à 6.<br/>
