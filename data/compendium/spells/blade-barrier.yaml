translations:
  en:
    name: Blade Barrier
    castingTime: Action
    range: 90 feet
    duration: Concentration, up to 10 minutes
    materialDescription: null
    description: |-
      You create a wall of whirling blades made of magical energy. The wall appears within range and lasts for the duration. You make a straight wall up to 100 feet long, 20 feet high, and 5 feet thick, or a ringed wall up to 60 feet in diameter, 20 feet high, and 5 feet thick. The wall provides Three-Quarters Cover, and its space is Difficult Terrain.
      
      Any creature in the wall's space makes a Dexterity saving throw, taking 6d10 Force damage on a failed save or half as much damage on a successful one. A creature also makes that save if it enters the wall's space or ends it turn there. A creature makes that save only once per turn.
      
  fr:
    name: Barrière de lames
    castingTime: Action
    range: 27 m
    duration: Concentration, jusqu'à 10 minutes
    materialDescription: null
    description: |-
      Vous créez un mur de lames tourbillonnantes d'énergie magique. Le mur apparaît à portée et persiste pour toute la durée. Vous érigez ainsi un mur dont la hauteur n'excède pas 6 m et l'épaisseur 1,50 m ; pour le reste, vous avez le choix entre créer un mur droit long de 30 m au maximum ou un mur circulaire dont le diamètre ne dépasse pas 18 m. Le mur octroie un Abri supérieur et son espace constitue un Terrain difficile.
      
      Toute créature prise dans l'espace du mur effectue un jet de sauvegarde de Dextérité, et subit 6d10 dégâts de force en cas d'échec, la moitié en cas de réussite. Une créature effectue aussi ce JdS si elle pénètre dans l'espace du mur ou y termine son tour. Une même créature n'effectue en aucun cas ce JdS plus d'une fois par tour.
