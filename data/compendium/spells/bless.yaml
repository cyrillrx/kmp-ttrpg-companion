id: bless
source: phb_2024
level: 1
school: enchantment
concentration: true
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- cleric
- paladin
translations:
  en:
    name: Bless
    castingTime: Action
    range: 30 feet
    duration: Concentration, up to 1 minute
    materialDescription: a Holy Symbol, worth 5+ GP
    description: You bless up to three creatures within range. Whenever a target makes
      an attack roll or a saving throw before the spell ends, the target adds 1d4
      to the attack roll or save.<br/><strong><em>Using a Higher-Level Spell Slot</em></strong>.
      You can target one additional creature for each spell slot level above 1.<br/>
  fr:
    name: Bénédiction
    castingTime: Action
    range: 9 m
    duration: Concentration, jusqu'à 1 minute
    materialDescription: un symbole sacré d'une valeur minimale de 5 po
    description: Vous bénissez jusqu'à trois créatures à portée. Chaque fois qu'une
      cible effectue un jet d'attaque ou de sauvegarde avant la fin du sort, elle
      ajoute 1d4 à son jet d'attaque ou de sauvegarde.<br/><strong><em>Emplacement
      de niveau supérieur</em></strong>. Vous pouvez cibler une créature supplémentaire
      pour chaque niveau d'emplacement de sort supérieur à 1.<br/>
