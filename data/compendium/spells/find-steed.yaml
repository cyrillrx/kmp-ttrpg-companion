translations:
  en:
    name: Find Steed
    castingTime: Action
    range: 30 feet
    duration: Instantaneous
    materialDescription: null
    description: You summon an otherworldly being that appears as a loyal steed in
      an unoccupied space of your choice within range. This creature uses the <strong><a
      href="https://www.aidedd.org/monster/otherworldly-steed">Otherworldly Steed</a></strong>
      stat block. If you already have a steed from this spell, the steed is replaced
      by the new one.<br/>The steed resembles a Large, rideable animal of your choice,
      such as a horse, a camel, a dire wolf, or an elk. Whenever you cast the spell,
      choose the steed's creature type—Celestial, Fey, or Fiend—which determines certain
      traits in the stat block.<br/><strong>Combat</strong>. The steed is an ally
      to you and your allies. In combat, it shares your Initiative count, and it functions
      as a controlled mount while you ride it (as defined in the rules on mounted
      combat). If you have the Incapacitated condition, the steed takes its turn immediately
      after yours and acts independently, focusing on protecting you.<br/><strong>Disappearance
      of the Steed</strong>. The steed disappears if it drops to 0 Hit Points or if
      you die. When it disappears, it leaves behind anything it was wearing or carrying.
      If you cast this spell again, you decide whether you summon the steed that disappeared
      or a different one.<br/><strong><em>Using a Higher-Level Spell Slot</em></strong>.
      Use the spell slot's level for the spell's level in the stat block.<br/>
  fr:
    name: Appel de destrier
    castingTime: Action
    range: 9 m
    duration: Instantanée
    materialDescription: null
    description: Vous invoquez un être surnaturel qui apparaît comme un destrier fidèle
      dans une case libre de votre choix à portée. Cette créature utilise le profil
      de la <strong><a href="https://www.aidedd.org/monster/fr/monture-d-outremonde">monture
      d'Outremonde</a></strong>. Si vous possédez déjà un destrier grâce à ce sort,
      il est remplacé par ce nouveau.<br/>Le destrier ressemble à un animal de taille
      G de votre choix, comme un cheval, un chameau, un loup sanguinaire ou un élan.
      Chaque fois que vous lancez ce sort, choisissez le type de créature du destrier (Céleste,
      Fée ou Fiélon), qui détermine certains traits du profil.<br/><strong>Combat</strong>.
      Le destrier est votre allié et celui de vos alliés. En combat, il partage votre
      Initiative et fonctionne comme une monture contrôlée lorsque vous le montez
      (comme défini dans les règles du combat monté). Si vous avez l'état Incapable
      d'agir, le destrier prend son tour immédiatement après le vôtre et agit seul,
      se concentrant sur votre protection.<br/><strong>Disparition de la monture</strong>.
      Le destrier disparaît s'il tombe à 0 point de vie ou si vous mourez. Lorsqu'il
      disparaît, il laisse derrière lui tout ce qu'il portait. Si vous relancez ce
      sort, vous décidez si vous invoquez le destrier disparu ou un autre.<br/><strong><em>Emplacement
      de niveau supérieur</em></strong>. Utilisez le niveau de l'emplacement de sort
      pour le niveau du sort dans le profil.<br/>
