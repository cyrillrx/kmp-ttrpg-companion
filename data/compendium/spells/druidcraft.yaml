translations:
  en:
    name: Druidcraft
    castingTime: Action
    range: 30 feet
    duration: Instantaneous
    materialDescription: null
    description: Whispering to the spirits of nature, you create one of the following
      effects within range.<br/><strong>Weather Sensor</strong>. You create a Tiny,
      harmless sensory effect that predicts what the weather will be at your location
      for the next 24 hours. The effect might manifest as a golden orb for clear skies,
      a cloud for rain, falling snowflakes for snow, and so on. This effect persists
      for 1 round.<br/><strong>Bloom</strong>. You instantly make a flower blossom,
      a seed pod open, or a leaf bud bloom.<br/><strong>Sensory Effect</strong>. You
      create a harmless sensory effect, such as falling leaves, spectral dancing fairies,
      a gentle breeze, the sound of an animal, or the faint odor of skunk. The effect
      must fit in a 5-foot Cube.<br/><strong>Fire Play</strong>. You light or snuff
      out a candle, a torch, or a campfire.<br/>
  fr:
    name: Druidisme
    castingTime: Action
    range: 9 m
    duration: Instantanée
    materialDescription: null
    description: En chuchotant aux esprits de la nature, vous créez l'un des effets
      suivants à portée.<br/><strong>Capteur climatique</strong>. Vous créez un effet
      sensoriel inoffensif de taille TP qui prédit le temps qu'il fera à votre emplacement
      pour les prochaines 24 heures. Cet effet peut se manifester par un orbe doré
      pour un ciel dégagé, un nuage pour la pluie, des flocons de neige pour la neige,
      etc. Cet effet persiste pendant 1 round.<br/><strong>Floraison</strong>. Vous
      faites instantanément éclore une fleur, ouvrir une gousse ou éclore un bourgeon.<br/><strong>Effet
      sensoriel</strong>. Vous créez un effet sensoriel inoffensif, comme des feuilles
      qui tombent, des fées dansantes spectrales, une légère brise, le bruit d'un
      animal ou la faible odeur d'une mouffette. L'effet doit tenir dans un Cube de
      1,50 mètre de côté.<br/><strong>Jeu avec le feu</strong>. Vous allumez ou éteignez
      une bougie, une torche ou un feu de camp.<br/>
