translations:
  en:
    name: Forcecage
    castingTime: Action
    range: 100 feet
    duration: Concentration, up to 1 hour
    materialDescription: ruby dust worth 1,500+ GP, which the spell consumes
    description: |-
      An immobile, Invisible, Cube-shaped prison composed of magical force springs into existence around an area you choose within range. The prison can be a cage or a solid box, as you choose.
      
      A prison in the shape of a cage can be up to 20 feet on a side and is made from 1/2-inch diameter bars spaced 1/2 inch apart. A prison in the shape of a box can be up to 10 feet on a side, creating a solid barrier that prevents any matter from passing through it and blocking any spells cast into or out from the area.
      
      When you cast the spell, any creature that is completely inside the cage's area is trapped. Creatures only partially within the area, or those too large to fit inside it, are pushed away from the center of the area until they are completely outside it.
      
      A creature inside the cage can't leave it by nonmagical means. If the creature tries to use teleportation or interplanar travel to leave, it must first make a Charisma saving throw. On a successful save, the creature can use that magic to exit the cage. On a failed save, the creature doesn't exit the cage and wastes the spell or effect. The cage also extends into the Ethereal Plane, blocking ethereal travel.
      
      This spell can't be dispelled by *[Dispel Magic](./dispel-magic)*.
      
  fr:
    name: Cage de force
    castingTime: Action
    range: 30 m
    duration: Concentration, jusqu'à 1 heure
    materialDescription: poudre de rubis d'une valeur minimale de 1500 po, que le
      sort consomme
    description: |-
      Une prison cubique, immobile et Invisible de force magique se matérialise autour d'une zone que vous choisissez à portée. Il peut s'agir d'une cage ou d'une cellule aux parois pleines, à votre convenance.
      
      Une prison qui se présente comme une cage peut atteindre 6 m par côté. Elle se compose de barreaux de 1,25 cm de diamètre, espacés d'autant. Une prison aux parois pleines peut atteindre 3 m par côté. Ses parois empêchent toute matière d'y pénétrer et bloquent tout sort qui tenterait de les franchir dans un sens ou dans l'autre.
      
      À l'incantation du sort, toute créature entièrement comprise dans la zone de la prison s'y retrouve bloquée. Les créatures partiellement comprises dans la zone, ou trop grandes pour y loger, sont écartées du centre de la prison jusqu'à se retrouver entièrement en dehors.
      
      Une créature bloquée dans la prison ne peut en sortir par des moyens non magiques. Si un détenu tente de recourir à la téléportation ou au voyage interplanaire pour s'évader, il effectue d'abord un jet de sauvegarde de Charisme. En cas de réussite, la créature peut se servir de cette magie pour quitter la prison. En cas d'échec, elle ne sort pas de la zone et gaspille l'utilisation du sort ou de l'effet correspondant. La cage de force s'étend en outre dans le Plan Éthéré, ce qui empêche le voyage éthéré.
      
      *[Dissipation de la magie](./fr/dissipation-de-la-magie)* ne permet pas de dissiper ce sort.
