translations:
  en:
    name: Wrathful Smite
    castingTime: Bonus Action, which you take immediately after hitting a creature
      with a Melee weapon or an Unarmed Strike
    range: Self
    duration: 1 minute
    materialDescription: null
    description: The target takes an extra 1d6 Necrotic damage from the attack, and
      it must succeed on a Wisdom saving throw or have the Frightened condition until
      the spell ends. At the end of each of its turns, the Frightened target repeats
      the save, ending the spell on itself on a success.<br/><strong><em>Using a Higher-Level
      Spell Slot</em></strong>. The damage increases by 1d6 for each spell slot level
      above 1.<br/>
  fr:
    name: Châtiment de courroux
    castingTime: Action bonus, que vous prenez immédiatement après avoir frappé une
      créature avec une arme de corps à corps ou une frappe à mains nues
    range: Personnelle
    duration: 1 minute
    materialDescription: null
    description: La cible subit 1d6 dégâts nécrotiques supplémentaires suite à l'attaque,
      et doit réussir un jet de sauvegarde de Sagesse ou subir l'état Effrayé jusqu'à
      la fin du sort. À la fin de chacun de ses tours, la cible effrayée renouvelle
      son jet de sauvegarde, mettant fin au sort sur elle-même en cas de réussite.<br/><strong><em>Emplacement
      de niveau supérieur</em></strong>. Les dégâts augmentent de 1d6 pour chaque
      niveau d'emplacement de sort supérieur à 1.<br/>
