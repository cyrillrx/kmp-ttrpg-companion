translations:
  en:
    name: Weird
    castingTime: Action
    range: 120 feet
    duration: Concentration, up to 1 minute
    materialDescription: null
    description: You try to create illusory terrors in others' minds. Each creature
      of your choice in a 30-foot-radius Sphere centered on a point within range makes
      a Wisdom saving throw. On a failed save, a target takes 10d10 Psychic damage
      and has the Frightened condition for the duration. On a successful save, a target
      takes half as much damage only.<br/>A Frightened target makes a Wisdom saving
      throw at the end of each of its turns. On a failed save, it takes 5d10 Psychic
      damage. On a successful save, the spell ends on that target.<br/>
  fr:
    name: Ennemi subconscient
    castingTime: Action
    range: 36 m
    duration: Concentration, jusqu'à 1 minute
    materialDescription: null
    description: Vous tentez de produire une terreur illusoire dans l'esprit d'autrui.
      Chaque créature que vous choisissez dans une Sphère de 9 m de rayon centrée
      sur un point à portée effectue un jet de sauvegarde de Sagesse. En cas d'échec,
      elle subit 10d10 dégâts psychiques, ainsi que l'état Effrayé pour toute la durée.
      En cas de réussite, elle subit uniquement la moitié de ces dégâts.<br/>Une cible
      Effrayée effectue un JdS Sagesse à la fin de chacun de ses tours. En cas d'échec,
      elle subit 5d10 dégâts psychiques. En cas de réussite, le sort prend fin pour
      elle.<br/>
