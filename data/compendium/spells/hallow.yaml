id: hallow
source: phb_2024
level: 5
school: abjuration
concentration: false
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- cleric
translations:
  en:
    name: Hallow
    castingTime: 24 hours
    range: Touch
    duration: Until dispelled
    materialDescription: incense worth 1,000+ GP, which the spell consumes
    description: |-
      You touch a point and infuse an area around it with holy or unholy power. The area can have a radius up to 60 feet, and the spell fails if the radius includes an area already under the effect of *Hallow*. The affected area has the following effects.\
      ***Hallowed Ward***. Choose any of these creature types: Aberration, Celestial, Elemental, Fey, Fiend, or Undead. Creatures of the chosen types can't willingly enter the area, and any creature that is possessed by or that has the Charmed or Frightened condition from such creatures isn't possessed, Charmed, or Frightened by them while in the area.\
      ***Extra Effect***. You bind an extra effect to the area from the list below:\
        **Courage**. Creatures of any types you choose can't gain the Frightened condition while in the area.\
        **Darkness**. Darkness fills the area. Normal light, as well as magical light created by spells of a level lower than this spell, can't illuminate the area.\
        **Daylight**. Bright light fills the area. Magical Darkness created by spells of a level lower than this spell can't extinguish the light.\
        **Peaceful Rest**. Dead bodies interred in the area can't be turned into Undead.\
        **Extradimensional Interference**. Creatures of any types you choose can't enter or exit the area using teleportation or interplanar travel.\
        **Fear**. Creatures of any types you choose have the Frightened condition while in the area.\
        **Resistance**. Creatures of any types you choose have Resistance to one damage type of your choice while in the area.\
        **Silence**. No sound can emanate from within the area, and no sound can reach into it.\
        **Tongues**. Creatures of any types you choose can communicate with any other creature in the area even if they don't share a common language.\
        **Vulnerability**. Creatures of any types you choose have Vulnerability to one damage type of your choice while in the area.\
  fr:
    name: Sanctification
    castingTime: 24 heures
    range: Contact
    duration: Jusqu'à dissipation
    materialDescription: encens d'une valeur minimale de 1000 po, que le sort consomme
    description: |-
      Vous touchez un point et imprégnez une zone environnante de puissance sacrée ou impie. La zone peut avoir un rayon maximal de 18 mètres, et le sort échoue si le rayon inclut une zone déjà sous l'effet de *sanctification*. La zone affectée a les effets suivants :\
      ***Barrière sacrée***. Choisissez un ou plusieurs des types de créatures suivants : Aberration, Céleste, Élémentaire, Fée, Fiélon ou Mort-vivant. Les créatures des types choisis ne peuvent pas entrer volontairement dans la zone, et toute créature possédée par ces créatures ou souffrant de l'état Charmé ou Effrayé par elles n'est ni possédée, ni charmée, ni effrayée par celles-ci tant qu'elles se trouvent dans la zone.\
      ***Effet supplémentaire***. Vous liez un effet supplémentaire à la zone parmi la liste ci-dessous :\
        **Courage**. Les créatures des types choisis ne peuvent avoir l'état Effrayé tant qu'elles se trouvent dans la zone.\
        **Ténèbres**. Les Ténèbres emplissent la zone. La lumière normale, ainsi que la lumière magique créée par des sorts d'un niveau inférieur à celui-ci, ne peuvent pas éclairer la zone.\
        **Lumière du jour**. Une Lumière vive emplit la zone. Les Ténèbres magiques créées par des sorts d'un niveau inférieur à celui-ci ne peuvent pas éteindre la lumière.\
        **Repos paisible**. Les cadavres enterrés dans la zone ne peuvent pas être transformés en morts-vivants.\
        **Interférence extradimensionnelle**. Les créatures des types choisis ne peuvent entrer ou sortir de la zone par téléportation ou voyage interplanaire.\
        **Peur**. Les créatures des types choisis ont l'état Effrayé lorsqu'elles se trouvent dans la zone.\
        **Résistance**. Les créatures des types choisis ont une Résistance à un type de dégâts de votre choix lorsqu'elles se trouvent dans la zone.\
        **Silence**. Aucun son ne peut émaner de la zone, et aucun son ne peut l'atteindre.\
        **Don des langues**. Les créatures des types choisis peuvent communiquer avec n'importe quelle autre créature dans la zone, même si elles ne partagent pas la même langue.\
        **Vulnérabilité**. Les créatures des types choisis ont une Vulnérabilité à un type de dégâts de votre choix lorsqu'elles se trouvent dans la zone.\
