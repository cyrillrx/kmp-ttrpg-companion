translations:
  en:
    name: Magic Circle
    castingTime: 1 minute
    range: 10 feet
    duration: 1 hour
    materialDescription: salt and powdered silver worth 100+ GP, which the spell consumes
    description: 'You create a 10-foot-radius, 20-foot-tall Cylinder of magical energy
      centered on a point on the ground that you can see within range. Glowing runes
      appear wherever the Cylinder intersects with the floor or other surface.<br/>Choose
      one or more of the following types of creatures: Celestials, Elementals, Fey,
      Fiends, or Undead. The circle affects a creature of the chosen type in the following
      ways:<br/>• The creature can''t willingly enter the Cylinder by nonmagical means.
      If the creature tries to use teleportation or interplanar travel to do so, it
      must first succeed on a Charisma saving throw.<br/>• The creature has Disadvantage
      on attack rolls against targets within the Cylinder.<br/>• Targets within the
      Cylinder can''t be possessed by or gain the Charmed or Frightened condition
      from the creature.<br/>Each time you cast this spell, you can cause its magic
      to operate in the reverse direction, preventing a creature of the specified
      type from leaving the Cylinder and protecting targets outside it.<br/><strong><em>Using
      a Higher-Level Spell Slot</em></strong>. The duration increases by 1 hour for
      each spell slot level above 3.<br/>'
  fr:
    name: Cercle magique
    castingTime: 1 minute
    range: 3 m
    duration: 1 heure
    materialDescription: poudre d'argent et de sel d'une valeur minimale de 100 po,
      que le sort consomme
    description: 'Vous créez un Cylindre d''énergie magique de 3 mètres de rayon et
      6 mètres de haut, centré sur un point au sol que vous pouvez voir à portée.
      Des runes lumineuses apparaissent à chaque intersection du cylindre avec le
      sol ou une autre surface.<br/>Choisissez un ou plusieurs des types de créatures
      suivants : célestes, élémentaires, fées, fiélons ou morts-vivants. Le cercle
      affecte une créature du type choisi des manières suivantes :<br/>• La créature
      ne peut pas entrer volontairement dans le cylindre par des moyens non magiques.
      Si elle tente d''utiliser la téléportation ou le voyage interplanaire pour y
      parvenir, elle doit d''abord réussir un jet de sauvegarde de Charisme.<br/>•
      La créature a un Désavantage aux jets d''attaque contre les cibles situées dans
      le Cylindre.<br/>• Les cibles situées dans le Cylindre ne peuvent pas être possédées
      par la créature ni subir l''état Charmé ou Effrayé de sa part.<br/>Chaque fois
      que vous lancez ce sort, vous pouvez inverser sa magie, empêchant une créature
      du type spécifié de quitter le Cylindre et protégeant les cibles situées à l''extérieur.<br/><strong><em>Emplacement
      de niveau supérieur</em></strong>. La durée augmente d''une heure pour chaque
      niveau d''emplacement de sort supérieur à 3.<br/>'
