id: rope-trick
source: phb_2024
level: 2
school: transmutation
concentration: false
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- wizard
translations:
  en:
    name: Rope Trick
    castingTime: Action
    range: Touch
    duration: 1 hour
    materialDescription: a segment of rope
    description: |-
      You touch a rope. One end of it hovers upward until the rope hangs perpendicular to the ground or the rope reaches a ceiling. At the rope's upper end, an Invisible 3-foot-by-5-foot portal opens to an extradimensional space that lasts until the spell ends. That space can be reached by climbing the rope, which can be pulled into or dropped out of it.
      
      The space can hold up to eight Medium or smaller creatures. Attacks, spells, and other effects can't pass into or out of the space, but creatures inside it can see through the portal. Anything inside the space drops out when the spell ends.
      
  fr:
    name: Corde enchantée
    castingTime: Action
    range: Contact
    duration: 1 heure
    materialDescription: un morceau de corde
    description: |-
      Vous touchez une corde. Une extrémité se dresse vers le haut jusqu'à ce qu'elle soit perpendiculaire au sol ou atteigne le plafond. À son extrémité supérieure, un portail invisible de 90 cm sur 1,50 mètre s'ouvre sur un espace extradimensionnel qui perdure jusqu'à la fin du sort. Cet espace est accessible en grimpant à la corde, qui peut être tirée ou lâchée. Cet espace peut accueillir jusqu'à huit créatures de taille M ou inférieure. Les attaques, sorts et autres effets ne peuvent y pénétrer ni en sortir, mais les créatures à l'intérieur peuvent voir à travers le portail. Tout ce qui se trouve à l'intérieur tombe à la fin du sort.
