translations:
  en:
    name: Leomund's Tiny Hut
    castingTime: 1 minute or Ritual
    range: Self
    duration: 8 hours
    materialDescription: a crystal bead
    description: |-
      A 10-foot Emanation springs into existence around you and remains stationary for the duration. The spell fails when you cast it if the Emanation isn't big enough to fully encapsulate all creatures in its area.\
      Creatures and objects within the Emanation when you cast the spell can move through it freely. All other creatures and objects are barred from passing through it. Spells of level 3 or lower can't be cast through it, and the effects of such spells can't extend into it.\
      The atmosphere inside the Emanation is comfortable and dry, regardless of the weather outside. Until the spell ends, you can command the interior to have Dim Light or Darkness (no action required). The Emanation is opaque from the outside and of any color you choose, but it's transparent from the inside.\
      The spell ends early if you leave the Emanation or if you cast it again.\
  fr:
    name: Petite hutte de Léomund
    castingTime: 1 minute ou Rituel
    range: Personnelle
    duration: 8 heures
    materialDescription: une bille de cristal
    description: |-
      Une Émanation de 3 mètres de diamètre apparaît autour de vous et reste immobile pendant toute la durée du sort. Le sort échoue si l'Émanation n'est pas suffisamment grande pour englober toutes les créatures présentes.\
      Les créatures et objets présents dans l'Émanation peuvent la traverser librement au moment où vous lancer le sort. Les autres créatures et objets ne le peuvent pas. Les sorts de niveau 3 ou inférieur ne peuvent pas être lancés à travers elle, et leurs effets ne peuvent pas s'y propager.\
      L'atmosphère à l'intérieur de l'Émanation est confortable et sèche, quelle que soit la météo extérieure. Jusqu'à la fin du sort, vous pouvez commander à l'intérieur une Lumière faible ou des Ténèbres (aucune action requise). L'Émanation est opaque de l'extérieur et de la couleur de votre choix, mais elle est transparente de l'intérieur.\
      Le sort prend fin prématurément si vous quittez l'Émanation ou si vous le relancez.\
