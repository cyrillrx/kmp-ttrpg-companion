id: darkness
source: phb_2024
level: 2
school: evocation
concentration: true
ritual: false
components:
  verbal: true
  somatic: false
  material: true
availableClasses:
- sorcerer
- warlock
- wizard
translations:
  en:
    name: Darkness
    castingTime: Action
    range: 60 feet
    duration: Concentration, up to 10 minutes
    materialDescription: bat fur and a piece of coal
    description: |-
      For the duration, magical Darkness spreads from a point within range and fills a 15-foot-radius Sphere. Darkvision can't see through it, and nonmagical light can't illuminate it.

      Alternatively, you cast the spell on an object that isn't being worn or carried, causing the Darkness to fill a 15-foot Emanation originating from that object. Covering that object with something opaque, such as a bowl or helm, blocks the Darkness.

      If any of this spell's area overlaps with an area of Bright Light or Dim Light created by a spell of level 2 or lower, that other spell is dispelled.
  fr:
    name: Ténèbres
    castingTime: Action
    range: 18 m
    duration: Concentration, jusqu'à 10 minutes
    materialDescription: une touffe de fourrure de chauve-souris et un bout de charbon
    description: |-
      Pendant la durée du sort, des Ténèbres magiques se propagent depuis un point à portée et remplissent une Sphère de 4,50 mètres de rayon. Vision dans le noir ne peut la traverser, et la lumière non magique ne peut l'illuminer.

      Vous pouvez également lancer le sort sur un objet non porté, ce qui fait que les Ténèbres remplissent une Émanation de 4,50 mètres provenant de cet objet. Recouvrir cet objet d'un objet opaque, comme un bol ou un casque, bloque les Ténèbres.

      Si une partie de la zone d'effet de ce sort chevauche une zone de Lumière vive ou de Lumière faible créée par un sort de niveau 2 ou inférieur, cet autre sort est dissipé.
