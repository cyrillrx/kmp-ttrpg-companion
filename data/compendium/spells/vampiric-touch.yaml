translations:
  en:
    name: Vampiric Touch
    castingTime: Action
    range: Self
    duration: Concentration, up to 1 minute
    materialDescription: null
    description: The touch of your shadow-wreathed hand can siphon life force from
      others to heal your wounds. Make a melee spell attack against one creature within
      reach. On a hit, the target takes 3d6 Necrotic damage, and you regain Hit Points
      equal to half the amount of Necrotic damage dealt.<br/>Until the spell ends,
      you can make the attack again on each of your turns as a Magic action, targeting
      the same creature or a different one.<br/><strong><em>Using a Higher-Level Spell
      Slot</em></strong>. The damage increases by 1d6 for each spell slot level above
      3.<br/>
  fr:
    name: Caresse du vampire
    castingTime: Action
    range: Personnelle
    duration: Concentration, jusqu'à 1 minute
    materialDescription: null
    description: Le contact de votre main enveloppée d'ombre peut siphonner la force
      vitale des autres pour soigner vos blessures. Effectuez une attaque de sort
      au corps à corps contre une créature à portée. Si l'attaque touche, la cible
      subit 3d6 dégâts nécrotiques et vous récupérez des points de vie égaux à la
      moitié des dégâts nécrotiques infligés.<br/>Jusqu'à la fin du sort, vous pouvez
      relancer l'attaque à chacun de vos tours par une action Magie, en ciblant la
      même créature ou une autre.<br/><strong><em>Emplacement de niveau supérieur</em></strong>.
      Les dégâts augmentent de 1d6 pour chaque niveau d'emplacement de sort supérieur
      à 3.<br/>
