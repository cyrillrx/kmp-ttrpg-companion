translations:
  en:
    name: Daylight
    castingTime: Action
    range: 60 feet
    duration: 1 hour
    materialDescription: null
    description: For the duration, sunlight spreads from a point within range and
      fills a 60-foot-radius Sphere. The sunlight's area is Bright Light and sheds
      Dim Light for an additional 60 feet.<br/>Alternatively, you cast the spell on
      an object that isn't being worn or carried, causing the sunlight to fill a 60-foot
      Emanation originating from that object. Covering that object with something
      opaque, such as a bowl or helm, blocks the sunlight.<br/>If any of this spell's
      area overlaps with an area of Darkness created by a spell of level 3 or lower,
      that other spell is dispelled.<br/>
  fr:
    name: Lumière du jour
    castingTime: Action
    range: 18 m
    duration: 1 heure
    materialDescription: null
    description: Pendant la durée du sort, une lumière solaire se propage depuis un
      point à portée et remplit une Sphère de 18 mètres de rayon. La zone d'effet
      est dans une Lumière vive et diffuse une Lumière faible sur 18 mètres supplémentaires.<br/>Vous
      pouvez également lancer le sort sur un objet non porté. Dans ce cas la lumière
      solaire remplit une Émanation de 18 mètres provenant de cet objet. Recouvrir
      cet objet avec quelque chose d'opaque, comme un bol ou un casque, bloque la
      lumière solaire.<br/>Si une partie de la zone d'effet de ce sort chevauche une
      zone de Ténèbres créée par un sort de niveau 3 ou inférieur, cet autre sort
      est dissipé.<br/>
