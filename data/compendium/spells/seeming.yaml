id: seeming
source: phb_2024
level: 5
school: illusion
concentration: false
ritual: false
components:
  verbal: true
  somatic: true
  material: false
availableClasses:
- bard
- sorcerer
- wizard
translations:
  en:
    name: Seeming
    castingTime: Action
    range: 30 feet
    duration: 8 hours
    materialDescription: null
    description: |-
      You give an illusory appearance to each creature of your choice that you can see within range. An unwilling target can make a Charisma saving throw, and if it succeeds, it is unaffected by this spell.\
      You can give the same appearance or different ones to the targets. The spell can change the appearance of the targets' bodies and equipment. You can make each creature seem 1 foot shorter or taller and appear heavier or lighter. A target's new appearance must have the same basic arrangement of limbs as the target, but the extent of the illusion is otherwise up to you. The spell lasts for the duration.\
      The changes wrought by this spell fail to hold up to physical inspection. For example, if you use this spell to add a hat to a creature's outfit, objects pass through the hat.\
      A creature that takes the Study action to examine a target can make an Intelligence (Investigation) check against your spell save DC. If it succeeds, it becomes aware that the target is disguised.\
  fr:
    name: Apparence trompeuse
    castingTime: Action
    range: 9 m
    duration: 8 heures
    materialDescription: null
    description: |-
      Vous donnez une apparence illusoire à toute créature de votre choix que vous pouvez voir à portée. Une cible non consentante peut effectuer un jet de sauvegarde de Charisme et, en cas de réussite, elle n'est pas affectée par ce sort.\
      Vous pouvez donner la même apparence ou des apparences différentes aux cibles. Le sort peut modifier l'apparence du corps et de l'équipement des cibles. Vous pouvez faire paraître chaque créature plus petite ou plus grande de 30 cm, plus lourde ou plus légère. La nouvelle apparence d'une cible doit avoir la même disposition de membres que la cible, mais l'étendue de l'illusion est à votre discrétion.\
      Les changements apportés par ce sort ne résistent pas à une inspection physique. Par exemple, si vous utilisez ce sort pour ajouter un chapeau à la tenue d'une créature, les objets passent à travers le chapeau.\
      Une créature qui prend l'action Étude pour examiner une cible peut effectuer un jet d'Intelligence (Investigation) contre le DD de sauvegarde de votre sort. En cas de réussite, elle se rend compte que la cible est déguisée.\
