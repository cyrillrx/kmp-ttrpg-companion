id: moonbeam
source: phb_2024
level: 2
school: evocation
concentration: true
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- druid
translations:
  en:
    name: Moonbeam
    castingTime: Action
    range: 120 feet
    duration: Concentration, up to 1 minute
    materialDescription: a moonseed leaf
    description: |-
      A silvery beam of pale light shines down in a 5-foot-radius, 40-foot-high Cylinder centered on a point within range. Until the spell ends, Dim Light fills the Cylinder, and you can take a Magic action on later turns to move the Cylinder up to 60 feet. When the Cylinder appears, each creature in it makes a Constitution saving throw. On a failed save, a creature takes 2d10 Radiant damage, and if the creature is shape-shifted (as a result of the *Polymorph* spell, for example), it reverts to its true form and can't shape-shift until it leaves the Cylinder. On a successful save, a creature takes half as much damage only. A creature also makes this save when the spell's area moves into its space and when it enters the spell's area or ends its turn there. A creature makes this save only once per turn.

      ***Using a Higher-Level Spell Slot***. The damage increases by 1d10 for each spell slot level above 2.
  fr:
    name: Rayon de lune
    castingTime: Action
    range: 36 m
    duration: Concentration, jusqu'à 1 minute
    materialDescription: une feuille de cocculus
    description: |-
      Un rayon de lumière pâle et argentée éclaire un Cylindre de 1,50 mètre de rayon et 12 mètres de haut, centré sur un point à portée. Jusqu'à la fin du sort, une Lumière faible emplit le Cylindre, et vous pouvez prendre une action Magie lors des tours suivants pour le déplacer jusqu'à 18 mètres. Lorsque le Cylindre apparaît, Toute créature à l'intérieur effectue un jet de sauvegarde de Constitution. En cas d'échec, la créature subit 2d10 dégâts radiants, et si elle a changé de forme (par exemple grâce au sort *métamorphose*), elle reprend sa forme véritable et ne peut plus se métamorphoser tant qu'elle se trouve dans le cylindre. En cas de réussite, la créature subit seulement la moitié des dégâts. Une créature effectue également ce jet de sauvegarde lorsque la zone du sort se déplace dans son espace et lorsqu'elle y pénètre ou y termine son tour. Une créature n'effectue ce jet qu'une seule fois par tour.

      ***Emplacement de niveau supérieur***. Les dégâts augmentent de 1d10 pour chaque niveau d'emplacement de sort supérieur à 2.
