id: hellish-rebuke
source: phb_2024
level: 1
school: evocation
concentration: false
ritual: false
components:
  verbal: true
  somatic: true
  material: false
availableClasses:
- warlock
translations:
  en:
    name: Hellish Rebuke
    castingTime: Reaction, which you take in response to taking damage from a creature
      that you can see within 60 feet of yourself
    range: 60 feet
    duration: Instantaneous
    materialDescription: null
    description: |-
      The creature that damaged you is momentarily surrounded by green flames. It makes a Dexterity saving throw, taking 2d10 Fire damage on a failed save or half as much damage on a successful one.
      
      ***Using a Higher-Level Spell Slot***. The damage increases by 1d10 for each spell slot level above 1.
      
  fr:
    name: Représailles infernales
    castingTime: Réaction, que vous prenez en réponse aux dégâts subis par une créature
      que vous pouvez voir dans un rayon de 18 m
    range: 18 m
    duration: Instantanée
    materialDescription: null
    description: |-
      La créature qui vous a blessé est momentanément entourée de flammes vertes. Elle effectue un jet de sauvegarde de Dextérité et subit 2d10 dégâts de feu en cas d'échec, ou la moitié en cas de réussite.
      
      ***Emplacement de niveau supérieur***. Les dégâts augmentent de 1d10 pour chaque niveau d'emplacement de sort supérieur à 1.
