id: water-walk
source: phb_2024
level: 3
school: transmutation
concentration: false
ritual: true
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- cleric
- druid
- ranger
- sorcerer
translations:
  en:
    name: Water Walk
    castingTime: Action or Ritual
    range: 30 feet
    duration: 1 hour
    materialDescription: a piece of cork
    description: This spell grants the ability to move across any liquid surface—such
      as water, acid, mud, snow, quicksand, or lava—as if it were harmless solid ground
      (creatures crossing molten lava can still take damage from the heat). Up to
      ten willing creatures of your choice within range gain this ability for the
      duration.<br/>An affected target must take a Bonus Action to pass from the liquid's
      surface into the liquid itself and vice versa, but if the target falls into
      the liquid, the target passes through the surface into the liquid below.<br/>
  fr:
    name: Marche sur l'eau
    castingTime: Action ou Rituel
    range: 9 m
    duration: 1 heure
    materialDescription: un morceau de liège
    description: Ce sort confère la capacité de se déplacer sur toute surface liquide
      (eau, acide, boue, neige, sables mouvants ou lave) comme s'il s'agissait d'un
      sol inoffensif (les créatures traversant la lave en fusion peuvent néanmoins
      subir des dégâts de chaleur). Jusqu'à dix créatures consentantes de votre choix
      à portée bénéficient de cette capacité pendant la durée du sort.<br/>Une cible
      affectée doit prendre une action Bonus pour passer de la surface du liquide
      au liquide, et vice versa. Si la cible tombe dans le liquide, elle traverse
      la surface pour rejoindre le liquide en dessous.<br/>
