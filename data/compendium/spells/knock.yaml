translations:
  en:
    name: Knock
    castingTime: Action
    range: 60 feet
    duration: Instantaneous
    materialDescription: null
    description: Choose an object that you can see within range. The object can be
      a door, a box, a chest, a set of manacles, a padlock, or another object that
      contains a mundane or magical means that prevents access.<br/>A target that
      is held shut by a mundane lock or that is stuck or barred becomes unlocked,
      unstuck, or unbarred. If the object has multiple locks, only one of them is
      unlocked.<br/>If the target is held shut by <em><a href="./arcane-lock">Arcane
      Lock</a></em>, that spell is suppressed for 10 minutes, during which time the
      target can be opened and closed.<br/>When you cast the spell, a loud knock,
      audible up to 300 feet away, emanates from the target.<br/>
  fr:
    name: Déblocage
    castingTime: Action
    range: 18 m
    duration: Instantanée
    materialDescription: null
    description: Choisissez un objet visible à portée. Il peut s'agir d'une porte,
      d'une boîte, d'un coffre, de menottes, d'un cadenas ou de tout autre objet contenant
      un moyen ordinaire ou magique empêchant un accès.<br/>Une cible maintenue par
      un verrou ordinaire, coincée ou barrée, devient déverrouillée, débloquée ou
      libérée. Si l'objet possède plusieurs verrous, un seul est déverrouillé.<br/>Si
      la cible est maintenue par <em><a href="./fr/verrou-arcanique">verrou arcanique</a></em>,
      ce sort est supprimé pendant 10 minutes, pendant lesquelles la cible peut être
      ouverte et fermée.<br/>Lorsque vous lancez le sort, un coup puissant qui émane
      de la cible retentit dans un rayon de 90 mètres.<br/>
