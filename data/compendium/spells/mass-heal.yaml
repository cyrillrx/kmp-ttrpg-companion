translations:
  en:
    name: Mass Heal
    castingTime: Action
    range: 60 feet
    duration: Instantaneous
    materialDescription: null
    description: A flood of healing energy flows from you into creatures around you.
      You restore up to 700 Hit Points, divided as you choose among any number of
      creatures that you can see within range. Creatures healed by this spell also
      have the Blinded, Deafened, and Poisoned conditions removed from them.\
  fr:
    name: Guérison de groupe
    castingTime: Action
    range: 18 m
    duration: Instantanée
    materialDescription: null
    description: Vous projetez une vague d'énergie curative vers les créatures qui
      vous entourent. Vous restituez un maximum de 700 points de vie, répartis à votre
      guise entre les créatures de votre choix parmi celles que vous voyez à portée.
      Les créatures soignées par ce sort se débarrassent en outre des états Assourdi,
      Aveuglé et Empoisonné.\
