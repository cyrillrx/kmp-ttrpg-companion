translations:
  en:
    name: Symbol
    castingTime: 1 minute
    range: Touch
    duration: Until dispelled or triggered
    materialDescription: powdered diamond worth 1,000+ GP, which the spell consumes
    description: |-
      You inscribe a harmful glyph either on a surface (such as a section of floor or wall) or within an object that can be closed (such as a book or chest). The glyph can cover an area no larger than 10 feet in diameter. If you choose an object, it must remain in place; if it is moved more than 10 feet from where you cast this spell, the glyph is broken, and the spell ends without being triggered.<br/>The glyph is nearly imperceptible and requires a successful Wisdom (Perception) check against your spell save DC to notice.<br/>When you inscribe the glyph, you set its trigger and choose which effect the symbol bears: Death, Discord, Fear, Pain, Sleep, or Stunning. Each one is explained below.<br/><strong>Set the Trigger</strong>. You decide what triggers the glyph when you cast the spell. For glyphs inscribed on a surface, common triggers include touching or stepping on the glyph, removing another object covering it, or approaching within a certain distance of it. For glyphs inscribed within an object, common triggers include opening that object or seeing the glyph.<br/>You can refine the trigger so that only creatures of certain types activate it (for example, the glyph could be set to affect Aberrations). You can also set conditions for creatures that don't trigger the glyph, such as those who say a certain password.<br/>Once triggered, the glyph glows, filling a 60-foot-radius Sphere with Dim Light for 10 minutes, after which time the spell ends. Each creature in the Sphere when the glyph activates is targeted by its effect, as is a creature that enters the Sphere for the first time on a turn or ends its turn there. A creature is targeted only once per turn.<br/><strong>Death</strong>. Each target makes a Constitution saving throw, taking 10d10 Necrotic damage on a failed save or half as much damage on a successful save.<br/><strong>Discord</strong>. Each target makes a Wisdom saving throw. On a failed save, a target argues with other creatures for 1 minute. During this time, it is incapable of meaningful communication and has Disadvantage on attack rolls and ability checks.<br/><strong>Fear</strong>. Each target must succeed on a Wisdom saving throw or have the Frightened condition for 1 minute. While Frightened, the target must move at least 30 feet away from the glyph on each of its turns, if able.<br/><strong>Pain</strong>. Each target must succeed on a Constitution saving throw or have the Incapacitated condition for 1 minute.<br/><strong>Sleep</strong>. Each target must succeed on a Wisdom saving throw or have the Unconscious condition for 10 minutes. A creature awakens if it takes damage or if someone takes an action to shake it awake.<br/><strong>Stunning</strong>. Each target must succeed on a Wisdom saving throw or have the Stunned condition for 1 minute.<br/>
  fr:
    name: Symbole
    castingTime: 1 minute
    range: Contact
    duration: Jusqu'à dissipation ou déclenchement
    materialDescription: poudre de diamant d'une valeur minimale de 1000 po, que le sort consomme
    description: |-
      Vous inscrivez un glyphe nuisible à d'autres créatures, soit sur une surface (comme un pan de mur ou de sol), soit à l'intérieur d'un objet que l'on peut fermer (comme un livre ou un coffre). Le glyphe peut recouvrir une zone dont le diamètre ne dépasse pas 3 m. Si vous optez pour un objet, celui-ci doit rester à sa place ; si on le déplace de plus de 3 m de l'endroit où vous avez lancé le sort, le glyphe est rompu et le sort prend fin sans avoir été activé.<br/>Le glyphe est pratiquement imperceptible, au point qu'il faut réussir un jet de Sagesse (Perception) contre le DD de sauvegarde de votre sort pour le remarquer.<br/>Lors de l'inscription du glyphe, vous décidez de son déclencheur et de l'effet porté par le symbole : discorde, douleur, étourdissement, mort, sommeil ou terreur. Chaque effet est expliqué ci-après.<br/><strong>Déclencheur</strong>. Vous décidez ce qui le déclenche à l'incantation du sort. Dans le cas des glyphes de surface, les déclencheurs courants sont les suivants : toucher le glyphe, le fouler, retirer un objet qui le recouvre ou s'approcher dans un certain rayon. Pour les glyphes inscrits dans un objet, les déclencheurs courants sont l'ouverture de l'objet et la vue du glyphe.<br/>Vous pouvez préciser le déclencheur afin que seules les créatures d'un type donné l'activent (le glyphe ne pourrait ainsi affecter que les Aberrations). Vous pouvez aussi définir les critères de créatures qui ne déclenchent pas le glyphe, comme le fait de prononcer un certain mot de passe.<br/>Quand il s'active, le glyphe se met à luire en emplissant une Sphère de 18 m de rayon de Lumière faible pendant 10 minutes, après quoi le sort prend fin. Chaque créature prise dans la Sphère au moment de l'activation du glyphe est ciblée par son effet, de même que toute créature qui pénètre dans la Sphère pour la première fois d'un tour ou y termine son tour. Une même créature ne peut être ciblée qu'une fois par tour.<br/><strong>Discorde</strong>. Chaque cible effectue un jet de sauvegarde de Sagesse. En cas d'échec, la cible se chamaille verbalement avec une autre créature pendant 1 minute. Tout ce temps, elle est incapable de communiquer de manière cohérente et ses jets d'attaque et jets de caractéristique s'effectuent avec un Désavantage.<br/><strong>Douleur</strong>. Chaque cible doit réussir un jet de sauvegarde de Constitution sous peine de subir l'état Incapable d'agir pendant 1 minute.<br/><strong>Étourdissement</strong>. Chaque cible doit réussir un jet de sauvegarde de Sagesse sous peine de subir l'état Étourdi pendant 1 minute.<br/><strong>Mort</strong>. Chaque cible effectue un jet de sauvegarde de Constitution et subit 10d10 dégâts nécrotiques en cas d'échec, la moitié en cas de réussite.<br/><strong>Sommeil</strong>. Chaque cible doit réussir un jet de sauvegarde de Sagesse sous peine de subir l'état Inconscient pendant 10 minutes. Une telle créature reprend connaissance si elle subit des dégâts ou si quelqu'un consacre une action à la secouer.<br/><strong>Terreur</strong>. Chaque cible doit réussir un jet de sauvegarde de Sagesse sous peine de subir l'état Effrayé pendant 1 minute. Tant qu'une cible est ainsi Effrayée, elle doit s'éloigner au minimum de 9 m du glyphe à chacun de ses tours si elle en a la possibilité.<br/>
