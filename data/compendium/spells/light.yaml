translations:
  en:
    name: Light
    castingTime: Action
    range: Touch
    duration: 1 hour
    materialDescription: a firefly or phosphorescent moss
    description: You touch one Large or smaller object that isn't being worn or carried
      by someone else. Until the spell ends, the object sheds Bright Light in a 20-foot
      radius and Dim Light for an additional 20 feet. The light can be colored as
      you like.<br/>Covering the object with something opaque blocks the light. The
      spell ends if you cast it again.<br/>
  fr:
    name: Lumière
    castingTime: Action
    range: Contact
    duration: 1 heure
    materialDescription: une luciole ou de la mousse phosphorescente
    description: Vous touchez un objet de taille G ou inférieure qui n'est pas porté
      par quelqu'un d'autre. Jusqu'à la fin du sort, l'objet émet une Lumière vive
      sur un rayon de 6 mètres et une Lumière faible sur 6 mètres supplémentaires.
      La lumière peut être colorée à votre guise. Recouvrir l'objet par quelque chose
      d'opaque bloque la lumière. Le sort prend fin si vous le relancez.<br/>
