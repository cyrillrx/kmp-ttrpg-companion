translations:
  en:
    name: Blur
    castingTime: Action
    range: Self
    duration: Concentration, up to 1 minute
    materialDescription: null
    description: Your body becomes blurred. For the duration, any creature has Disadvantage
      on attack rolls against you. An attacker is immune to this effect if it perceives
      you with Blindsight or Truesight.<br/>
  fr:
    name: Flou
    castingTime: Action
    range: Personnelle
    duration: Concentration, jusqu'à 1 minute
    materialDescription: null
    description: Votre corps devient flou. Pendant la durée du sort, toutes les créatures
      ont un Désavantage aux jets d'attaque contre vous. Un attaquant est immunisé
      contre cet effet s'il vous perçoit avec Vision aveugle ou Vision véritable.<br/>
