translations:
  en:
    name: Mind Sliver
    castingTime: Action
    range: 60 feet
    duration: 1 round
    materialDescription: null
    description: You try to temporarily sliver the mind of one creature you can see
      within range. The target must succeed on an Intelligence saving throw or take
      1d6 Psychic damage and subtract 1d4 from the next saving throw it makes before
      the end of your next turn.<br/><strong><em>Cantrip Upgrade</em></strong>. The
      damage increases by 1d6 when you reach levels 5 (2d6), 11 (3d6), and 17 (4d6).<br/>
  fr:
    name: Piqûre mentale
    castingTime: Action
    range: 18 m
    duration: 1 round
    materialDescription: null
    description: Vous essayez de rompre temporairement l'esprit d'une créature que
      vous pouvez voir à portée. La cible doit réussir un jet de sauvegarde d'Intelligence
      ou subir 1d6 dégâts psychiques et soustraire 1d4 du prochain jet de sauvegarde
      qu'elle effectue avant la fin de votre prochain tour.<br/><strong><em>Amélioration
      de sort mineur</em></strong>. Les dégâts augmentent de 1d6 lorsque vous atteignez
      les niveaux 5 (2d6), 11 (3d6) et 17 (4d6).<br/>
