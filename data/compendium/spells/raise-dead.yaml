id: raise-dead
source: phb_2024
level: 5
school: necromancy
concentration: false
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- bard
- cleric
- paladin
translations:
  en:
    name: Raise Dead
    castingTime: 1 hour
    range: Touch
    duration: Instantaneous
    materialDescription: a diamond worth 500+ GP, which the spell consumes
    description: With a touch, you revive a dead creature if it has been dead no longer
      than 10 days and it wasn't Undead when it died.<br/>The creature returns to
      life with 1 Hit Point. This spell also neutralizes any poisons that affected
      the creature at the time of death.<br/>This spell closes all mortal wounds,
      but it doesn't restore missing body parts. If the creature is lacking body parts
      or organs integral for its survival—its head, for instance—the spell automatically
      fails.<br/>Coming back from the dead is an ordeal. The target takes a −4 penalty
      to D20 Tests. Every time the target finishes a Long Rest, the penalty is reduced
      by 1 until it becomes 0.<br/>
  fr:
    name: Rappel à la vie
    castingTime: 1 heure
    range: Contact
    duration: Instantanée
    materialDescription: un diamant d'une valeur minimale de 500 po, que le sort consomme
    description: D'un simple contact, vous ressuscitez une créature morte depuis au
      plus 10 jours et qui n'était pas un mort-vivant au moment de sa mort.<br/>La
      créature revient à la vie avec 1 point de vie. Ce sort neutralise également
      les poisons qui l'ont affectée au moment de sa mort.<br/>Ce sort guérit toutes
      les blessures mortelles, mais ne restaure pas les parties du corps manquantes.
      Si la créature ne possède plus des parties de son corps ou des organes essentiels
      à sa survie (sa tête, par exemple), le sort échoue automatiquement.<br/>Revenir
      d'entre les morts est une épreuve. La cible subit un malus de -4 à ses jets
      de d20. Chaque fois que la cible termine un Repos long, le malus est réduit
      de 1 jusqu'à atteindre 0.<br/>
