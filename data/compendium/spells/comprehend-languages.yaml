translations:
  en:
    name: Comprehend Languages
    castingTime: Action or Ritual
    range: Self
    duration: 1 hour
    materialDescription: a pinch of soot and salt
    description: For the duration, you understand the literal meaning of any language
      that you hear or see signed. You also understand any written language that you
      see, but you must be touching the surface on which the words are written. It
      takes about 1 minute to read one page of text. This spell doesn't decode symbols
      or secret messages.<br/>
  fr:
    name: Compréhension des langues
    castingTime: Action ou Rituel
    range: Personnelle
    duration: 1 heure
    materialDescription: une pincée de suie et de sel
    description: Pendant toute la durée du sort, vous comprenez le sens littéral de
      toute langue que vous entendez ainsi que le langage des signes. Vous comprenez
      également toute langue écrite que vous voyez, mais vous devez toucher la surface
      sur laquelle les mots sont écrits. Il faut environ une minute pour lire une
      page de texte. Ce sort ne décode pas les symboles ni les messages secrets.<br/>
