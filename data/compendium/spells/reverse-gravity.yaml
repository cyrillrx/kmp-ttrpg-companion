id: reverse-gravity
source: phb_2024
level: 7
school: transmutation
concentration: true
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- druid
- sorcerer
- wizard
translations:
  en:
    name: Reverse Gravity
    castingTime: Action
    range: 100 feet
    duration: Concentration, up to 1 minute
    materialDescription: a lodestone and iron filings
    description: |-
      This spell reverses gravity in a 50-foot-radius, 100-foot high Cylinder centered on a point within range. All creatures and objects in that area that aren't anchored to the ground fall upward and reach the top of the Cylinder. A creature can make a Dexterity saving throw to grab a fixed object it can reach, thus avoiding the fall upward.
      
      If a ceiling or an anchored object is encountered in this upward fall, creatures and objects strike it just as they would during a downward fall. If an affected creature or object reaches the Cylinder's top without striking anything, it hovers there for the duration. When the spell ends, affected objects and creatures fall downward.
      
  fr:
    name: Inversion de la gravité
    castingTime: Action
    range: 30 m
    duration: Concentration, jusqu'à 1 minute
    materialDescription: une magnétite et de la limaille de fer
    description: |-
      Ce sort inverse la gravité dans un Cylindre de 15 m de rayon et 30 m de haut centré sur un point à portée. Tous les objets et créatures de la zone qui ne sont pas ancrés au sol « chutent » vers le haut pour atteindre le sommet du Cylindre. Une créature a droit à un jet de sauvegarde de Dextérité pour saisir un objet fixé à portée d'allonge et ainsi éviter la « chute ».
      
      Si un plafond ou un objet ancré se présente en travers de la chute, les objets et créatures qui tombent le heurtent comme ils le feraient lors d'une chute normale. Les objets et créatures qui atteignent le sommet du Cylindre sans rien heurter y restent en suspension pour toute la durée. À la fin du sort, les objets et créatures affectés retombent vers le bas.
