translations:
  en:
    name: Locate Animals or Plants
    castingTime: Action or Ritual
    range: Self
    duration: Instantaneous
    materialDescription: fur from a bloodhound
    description: Describe or name a specific kind of Beast, Plant creature, or nonmagical
