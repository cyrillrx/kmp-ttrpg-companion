      of that kind within 5 miles, if any are present.\
  fr:
    name: Localisation d'animaux ou de plantes
    castingTime: Action ou Rituel
    range: Personnelle
    duration: Instantanée
    materialDescription: une touffe de poils de limier
    description: Décrivez ou nommez une créature de type bête ou plante, ou une plante
      non magique. Vous connaissez la direction et la distance entre vous et la créature
      ou plante correspondante la plus proche dans un rayon de 7,5 km, le cas échéant.\
