id: haste
source: phb_2024
level: 3
school: transmutation
concentration: true
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- sorcerer
- wizard
translations:
  en:
    name: Haste
    castingTime: Action
    range: 30 feet
    duration: Concentration, up to 1 minute
    materialDescription: a shaving of licorice root
    description: Choose a willing creature that you can see within range. Until the
      spell ends, the target's Speed is doubled, it gains a +2 bonus to Armor Class,
      it has Advantage on Dexterity saving throws, and it gains an additional action
      on each of its turns. That action can be used to take only the Attack (one attack
      only), Dash, Disengage, Hide, or Utilize action.<br/>When the spell ends, the
      target is Incapacitated and has a Speed of 0 until the end of its next turn,
      as a wave of lethargy washes over it.<br/>
  fr:
    name: Hâte
    castingTime: Action
    range: 9 m
    duration: Concentration, jusqu'à 1 minute
    materialDescription: un copeau de racine de réglisse
    description: Choisissez une créature consentante que vous pouvez voir à portée.
      Jusqu'à la fin du sort, la Vitesse de la cible est doublée, elle gagne un bonus
      de +2 à la Classe d'Armure, bénéficie d'un Avantage aux jets de sauvegarde de
      Dextérité et obtient une action supplémentaire à chacun de ses tours. Cette
      action peut être utilisée uniquement pour prendre les actions Attaque (une seule
      attaque), Pointe, Désengagement, Furtivité ou Utilisation.<br/>Lorsque le sort
      prend fin, la cible subit l'état Incapable d'agir et sa Vitesse est de 0 jusqu'à
      la fin de son prochain tour, tandis qu'une vague de léthargie la submerge.<br/>
