translations:
  en:
    name: Synaptic Static
    castingTime: Action
    range: 120 feet
    duration: Instantaneous
    materialDescription: null
    description: |-
      You cause psychic energy to erupt at a point within range. Each creature in a 20-foot-radius Sphere centered on that point makes an Intelligence saving throw, taking 8d6 Psychic damage on a failed save or half as much damage on a successful one.\
      On a failed save, a target also has muddled thoughts for 1 minute. During that time, it subtracts 1d6 from all its attack rolls and ability checks, as well as any Constitution saving throws to maintain Concentration. The target makes an Intelligence saving throw at the end of each of its turns, ending the effect on itself on a success.\
  fr:
    name: Perturbations synaptiques
    castingTime: Action
    range: 36 m
    duration: Instantanée
    materialDescription: null
    description: |-
      Vous faites jaillir de l'énergie psychique en un point à portée. Chaque créature dans une Sphère de 6 mètres de rayon centrée sur ce point effectue un jet de sauvegarde d'Intelligence, subissant 8d6 dégâts psychiques en cas d'échec, ou seulement la moitié des dégâts en cas de réussite. En cas d'échec, la cible est également perturbée pendant 1 minute. Pendant ce temps, elle soustrait 1d6 à tous ses jets d'attaque et de caractéristique, ainsi qu'à ses jets de sauvegarde de Constitution pour maintenir sa Concentration. La cible effectue un jet de sauvegarde d'Intelligence à la fin de chacun de ses tours, mettant fin à l'effet en cas de réussite.\
