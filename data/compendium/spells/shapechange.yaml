id: shapechange
source: phb_2024
level: 9
school: transmutation
concentration: true
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- druid
- wizard
translations:
  en:
    name: Shapechange
    castingTime: Action
    range: Self
    duration: Concentration, up to 1 hour
    materialDescription: a jade circlet worth 1,500+ GP
    description: |-
      You shape-shift into another creature for the duration or until you take a Magic action to shape-shift into a different eligible form. The new form must be of a creature that has a Challenge Rating no higher than your level or Challenge Rating. You must have seen the sort of creature before, and it can't be a Construct or an Undead.<br/>When you cast the spell, you gain a number of Temporary Hit Points equal to the Hit Points of the first form into which you shape-shift. These Temporary Hit Points vanish if any remain when the spell ends*.<br/>Your game statistics are replaced by the stat block of the chosen form, but you retain your creature type; alignment; personality; Intelligence, Wisdom, and Charisma scores; Hit Points; Hit Point Dice; proficiencies; and ability to communicate. If you have the Spellcasting feature, you retain it too.<br/>Upon shape-shifting, you determine whether your equipment drops to the ground or changes in size and shape to fit the new form while you're in it.<br/>
  fr:
    name: Changement de forme
    castingTime: Action
    range: Personnelle
    duration: Concentration, jusqu'à 1 heure
    materialDescription: diadème de jade d'une valeur minimale de 1500 po
    description: |-
      Vous vous métamorphosez en une autre créature pour toute la durée, mais avez la possibilité d'entreprendre l'action Magie pour adopter une autre forme couverte par le sort. La nouvelle forme doit être une créature dont le facteur de puissance n'est pas supérieur à votre niveau ou FP. Vous devez avoir déjà vu une telle créature, qui ne peut être ni un Artificiel ni un Mort-vivant.<br/>En lançant ce sort, vous recevez autant de points de vie temporaires que les points de vie de la première forme adoptée. Ces points de vie temporaires disparaissent s'il en reste à la fin du sort.<br/>Votre profil de jeu est remplacé par celui de la créature retenue, mais vous conservez certains de vos aspects : type de créature, alignement, personnalité, valeurs d'Intelligence, de Sagesse et de Charisme, points de vie, dés de vie, maîtrises et facultés de communication. Si vous disposez de l'aptitude Sorts ou Incantation, vous la conservez aussi.<br/>Lors de la transformation, vous déterminez si votre équipement tombe au sol ou change de taille et de configuration pour s'adapter à votre nouvelle forme.<br/>
