id: creation
source: phb_2024
level: 5
school: illusion
concentration: false
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- sorcerer
- wizard
translations:
  en:
    name: Creation
    castingTime: 1 minute
    range: 30 feet
    duration: Special
    materialDescription: a paintbrush
    description: |-
      You pull wisps of shadow material from the Shadowfell to create an object within range. It is either an object of vegetable matter (soft goods, rope, wood, and the like) or mineral matter (stone, crystal, metal, and the like). The object must be no larger than a 5-foot Cube, and the object must be of a form and material that you have seen.

      The spell's duration depends on the object's material, as shown in the Materials table. If the object is composed of multiple materials, use the shortest duration. Using any object created by this spell as another spell's Material component causes the other spell to fail.

      | Material | Duration |
      | --- | --- |
      | Vegetable matter | 24 hours |
      | Stone or crystal | 12 hours |
      | Precious metals | 1 hour |
      | Gems | 10 minutes |
      | Adamantine or mithral | 1 minute |



      ***Using a Higher-Level Spell Slot***. The Cube increases by 5 feet for each spell slot level above 5.
  fr:
    name: Création
    castingTime: 1 minute
    range: 9 m
    duration: Spéciale
    materialDescription: un pinceau
    description: |-
      Vous extrayez des volutes de matière d'ombre de la Gisombre pour créer un objet à portée. Il peut s'agir d'un objet végétal (matière souple, corde, bois, etc) ou minéral (pierre, cristal, métal, etc). L'objet ne doit pas dépasser un cube de 1,50 mètre de côté, et sa forme et sa matière doivent être connues.

      La durée du sort dépend de la matière de l'objet, comme indiqué dans la table ci-dessous. Si l'objet est composé de plusieurs matériaux, utilisez la durée la plus courte. Utiliser un objet créé par ce sort comme matière d'un autre sort entraîne l'échec de ce dernier.

      | Matière | Durée |
      | --- | --- |
      | Matière végétale | 24 heures |
      | Pierre ou cristal | 12 heures |
      | Métal précieux | 1 heure |
      | Gemme | 10 minutes |
      | Adamantium ou mithral | 1 minute |



      ***Emplacement de niveau supérieur***. La taille du cube augmente de 1,50 mètre pour chaque niveau d'emplacement de sort supérieur à 5.
