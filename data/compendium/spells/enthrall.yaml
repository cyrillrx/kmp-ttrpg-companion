id: enthrall
source: phb_2024
level: 2
school: enchantment
concentration: true
ritual: false
components:
  verbal: true
  somatic: true
  material: false
availableClasses:
- bard
- warlock
translations:
  en:
    name: Enthrall
    castingTime: Action
    range: 60 feet
    duration: Concentration, up to 1 minute
    materialDescription: null
    description: You weave a distracting string of words, causing creatures of your
      choice that you can see within range to make a Wisdom saving throw. Any creature
      you or your companions are fighting automatically succeeds on this save. On
      a failed save, a target has a −10 penalty to Wisdom (Perception) checks and
      Passive Perception until the spell ends.<br/>
  fr:
    name: Discours captivant
    castingTime: Action
    range: 18 m
    duration: Concentration, jusqu'à 1 minute
    materialDescription: null
    description: Vous vous lancez dans un discours distrayant, obligeant les créatures
      de votre choix que vous pouvez voir à portée à effectuer un jet de sauvegarde
      de Sagesse. Toute créature que vous ou vos compagnons combattez réussit automatiquement
      ce jet. En cas d'échec, la cible subit un malus de -10 aux jets de Sagesse (Perception)
      et de Perception passive jusqu'à la fin du sort.<br/>
