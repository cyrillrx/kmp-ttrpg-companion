id: dragon-s-breath
source: phb_2024
level: 2
school: transmutation
concentration: true
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- sorcerer
- wizard
translations:
  en:
    name: Dragon's Breath
    castingTime: Bonus Action
    range: Touch
    duration: Concentration, up to 1 minute
    materialDescription: a hot pepper
    description: You touch one willing creature, and choose Acid, Cold, Fire, Lightning,
      or Poison. Until the spell ends, the target can take a Magic action to exhale
      a 15-foot Cone. Each creature in that area makes a Dexterity saving throw, taking
      3d6 damage of the chosen type on a failed save or half as much damage on a successful
      one.<br/><strong><em>Using a Higher-Level Spell Slot</em></strong>. The damage
      increases by 1d6 for each spell slot level above 2.<br/>
  fr:
    name: Souffle du dragon
    castingTime: Action bonus
    range: Contact
    duration: Concentration, jusqu'à 1 minute
    materialDescription: un piment
    description: Vous touchez une créature consentante et choisissez acide, froid,
      feu, foudre ou poison. Jusqu'à la fin du sort, la cible peut prendre une action
      Magie pour souffler un Cône de 4,50 mètres. Toute créature dans cette zone effectue
      un jet de sauvegarde de Dextérité, subissant 3d6 dégâts du type choisi en cas
      d'échec, ou la moitié de ces dégâts en cas de réussite.<br/><strong><em>Emplacement
      de niveau supérieur</em></strong>. Les dégâts augmentent de 1d6 pour chaque
      niveau d'emplacement de sort supérieur à 2.<br/>
