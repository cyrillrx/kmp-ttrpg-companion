id: telepathy
source: phb_2024
level: 8
school: divination
concentration: false
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- wizard
translations:
  en:
    name: Telepathy
    castingTime: Action
    range: Unlimited
    duration: 24 hours
    materialDescription: a pair of linked silver rings
    description: |-
      You create a telepathic link between yourself and a willing creature with which you are familiar. The creature can be anywhere on the same plane of existence as you. The spell ends if you or the target are no longer on the same plane.

      Until the spell ends, you and the target can instantly share words, images, sounds, and other sensory messages with each other through the link, and the target recognizes you as the creature it is communicating with. The spell enables a creature to understand the meaning of your words and any sensory messages you send to it.
  fr:
    name: Télépathie
    castingTime: Action
    range: Illimitée
    duration: 24 heures
    materialDescription: deux bagues jointes en argent
    description: |-
      Vous créez un lien télépathique entre vous et une créature consentante que vous connaissez. La créature peut se trouver n'importe où sur le même plan d'existence que vous. Le sort prend fin si vous ou la cible n'êtes plus sur le même plan.

      Jusqu'à la fin du sort, vous et la cible pouvez instantanément vous partager des mots, des images, des sons et d'autres messages sensoriels via ce lien, et la cible vous reconnaît comme la créature avec laquelle elle communique. Le sort permet à une créature de comprendre le sens de vos mots et de tous les messages sensoriels que vous lui envoyez.
