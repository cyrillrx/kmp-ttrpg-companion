translations:
  en:
    name: Spellfire Storm
    castingTime: Action
    range: 60 feet
    duration: Concentration, up to 1 minute
    materialDescription: null
    description: |-
      You conjure a pillar of spellfire in a 20-foot-radius, 20-foot-high Cylinder centered on a point within range. The area of the Cylinder is Bright Light, and each creature in it when it appears makes a Constitution saving throw, taking 4d10 Radiant damage on a failed save or half as much damage on a successful one. A creature also makes this save when it enters the spell's area for the first time on a turn or ends its turn there. A creature makes this save only once per turn.\
      In addition, whenever a creature in the Cylinder casts a spell, that creature makes a Constitution saving throw. On a failed save, the spell dissipates with no effect, and the action, Bonus Action, or Reaction used to cast it is wasted. If that spell was cast with a spell slot, the slot isn't expended.\
      When you cast this spell, you can designate creatures to be unaffected by it.\
      **Casting as a Circle Spell.** In addition to the spell's usual components, you must provide a special component (a blue star sapphire worth 25,000+ GP), which the spell consumes. The spell's range increases to 1 mile, and it no longer requires Concentration. When the spell is cast, each secondary caster must expend a level 3+ spell slot; otherwise, the spell fails.\
      **Using a Higher-Level Spell Slot.** The damage increases by 1d10 for every spell slot level above 4.\
      The number of secondary casters determines the spell's area of effect and duration, as shown in the table below. The spell ends early if any caster who participated in this casting contributes to another casting of Spellfire Storm as a Circle spell.\
  fr:
    name: Tempête de magefeu
    castingTime: Action
    range: 18 m
    duration: Concentration, jusqu'à 1 minute
    materialDescription: null
    description: |-
      Vous invoquez un pilier de flamme arcaniste dans un Cylindre de 6 mètres de rayon et 6 mètres de haut, centré sur un point à portée. La zone du Cylindre est illuminée d'une Lumière vive, et chaque créature qui s'y trouve lorsqu'il apparaît effectue un jet de sauvegarde de Constitution, subissant 4d10 dégâts radieux en cas d'échec, ou la moitié en cas de réussite. Une créature effectue également ce jet de sauvegarde lorsqu'elle entre dans la zone du sort pour la première fois lors d'un tour ou y termine son tour. Une créature n'effectue ce jet de sauvegarde qu'une seule fois par tour.\
      En outre, lorsqu'une créature dans le Cylindre lance un sort, elle effectue un jet de sauvegarde de Constitution. En cas d'échec, le sort se dissipe sans effet, et l'action, l'action bonus ou la Réaction utilisée pour le lancer est gaspillée. Si ce sort a été lancé avec un emplacement de sort, l'emplacement n'est pas dépensé.\
      Lorsque vous lancez ce sort, vous pouvez désigner des créatures pour qu'elles ne soient pas affectées.\
      **Incantation en tant que sort de Cercle.** En plus des composantes habituelles du sort, vous devez fournir une composante spéciale (un saphir étoilé bleu d'une valeur minimale de 25 000 po), que le sort consomme. La portée du sort passe à 1,5 km et ne nécessite plus de Concentration. Lors du lancement du sort, chaque incantateur secondaire doit dépenser un emplacement de sort de niveau 3 ou supérieur ; sinon, le sort échoue.\
      **Emplacement de niveau supérieur.** Les dégâts augmentent de 1d10 par niveau d'emplacement au-delà du 4e.\
      Le nombre d'incantateurs secondaires détermine la zone d'effet et la durée du sort, comme indiqué dans le tableau ci-dessous. Le sort prend fin prématurément si l'un des incantateurs ayant participé à ce lancement contribue à un autre lancement de Tempête de flamme arcaniste en tant que sort de Cercle.\
