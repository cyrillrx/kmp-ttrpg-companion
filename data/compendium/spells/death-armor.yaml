id: death-armor
source: heroes_of_faerun
level: 2
school: necromancy
concentration: false
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- sorcerer
- wizard
translations:
  en:
    name: Death Armor
    castingTime: Action
    range: Touch
    duration: 1 hour
    materialDescription: an onyx worth 50+ GP, which the spell consumes
    description: |-
      For the duration, an inky aura surrounds one creature you touch. The target has Advantage on Death Saving Throws, and once per turn, when a creature within 5 feet of the target hits it with a melee attack roll, the attacker takes 2d4 Necrotic damage.
  fr:
    name: Armure de mort
    castingTime: Action
    range: Contact
    duration: 1 heure
    materialDescription: un onyx d'une valeur minimale de 50 po, que le sort consomme
    description: |-
      Pour toute la durée du sort, une aura sombre entoure une créature que vous touchez. La cible bénéficie de l'Avantage à ses jets de sauvegarde contre la mort, et une fois par tour, lorsqu'une créature à 1,50 mètre ou moins de la cible la touche avec un jet d'attaque au corps à corps, l'attaquant subit 2d4 dégâts nécrotiques.
