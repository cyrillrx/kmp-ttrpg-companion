translations:
  en:
    name: Charm Monster
    castingTime: Action
    range: 30 feet
    duration: 1 hour
    materialDescription: null
    description: One creature you can see within range makes a Wisdom saving throw.
      It does so with Advantage if you or your allies are fighting it. On a failed
      save, the target has the Charmed condition until the spell ends or until you
      or your allies damage it. The Charmed creature is Friendly to you. When the
      spell ends, the target knows it was Charmed by you.<br/><strong><em>Using a
      Higher-Level Spell Slot</em></strong>. You can target one additional creature
      for each spell slot level above 4.<br/>
  fr:
    name: Charme-monstre
    castingTime: Action
    range: 9 m
    duration: 1 heure
    materialDescription: null
    description: Une créature que vous pouvez voir à portée effectue un jet de sauvegarde
      de Sagesse. Elle a un Avantage si vous ou vos alliés la combattez. En cas d'échec,
      la cible subit l'état Charmé jusqu'à la fin du sort ou jusqu'à ce que vous ou
      vos alliés la blessiez. La créature charmée est amicale envers vous. À la fin
      du sort, la cible sait que vous l'avez charmée.<br/><strong><em>Emplacement
      de niveau supérieur</em></strong>. Vous pouvez cibler une créature supplémentaire
      pour chaque niveau d'emplacement de sort supérieur à 4.<br/>
