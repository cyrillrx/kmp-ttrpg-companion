id: wall-of-ice
source: phb_2024
level: 6
school: evocation
concentration: true
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- wizard
translations:
  en:
    name: Wall of Ice
    castingTime: Action
    range: 120 feet
    duration: Concentration, up to 10 minutes
    materialDescription: a piece of quartz
    description: |-
      You create a wall of ice on a solid surface within range. You can form it into a hemispherical dome or a globe with a radius of up to 10 feet, or you can shape a flat surface made up of ten 10-foot-square panels. Each panel must be contiguous with another panel. In any form, the wall is 1 foot thick and lasts for the duration.
      
      If the wall cuts through a creature's space when it appears, the creature is pushed to one side of the wall (you choose which side) and makes a Dexterity saving throw, taking 10d6 Cold damage on a failed save or half as much damage on a successful one.
      
      The wall is an object that can be damaged and thus breached. It has AC 12 and 30 Hit Points per 10-foot section, and it has Immunity to Cold, Poison, and Psychic damage and Vulnerability to Fire damage. Reducing a 10-foot section of wall to 0 Hit Points destroys it and leaves behind a sheet of frigid air in the space the wall occupied.
      
      A creature moving through the sheet of frigid air for the first time on a turn makes a Constitution saving throw, taking 5d6 Cold damage on a failed save or half as much damage on a successful one.
      
      ***Using a Higher-Level Spell Slot***. The damage the wall deals when it appears increases by 2d6 and the damage from passing through the sheet of frigid air increases by 1d6 for each spell slot level above 6.
      
  fr:
    name: Mur de glace
    castingTime: Action
    range: 36 m
    duration: Concentration, jusqu'à 10 minutes
    materialDescription: un morceau de quartz
    description: |-
      Vous créez un mur de glace sur une surface solide à portée. Vous pouvez le façonner en dôme hémisphérique ou en globe d'un rayon maximal de 3 m, ou en faire une surface plane composée de dix pans de 3 m sur 3. Chaque pan doit être contigu avec un autre. Quelle que soit sa forme, le mur est épais de 30 cm et persiste pour toute la durée.
      
      Si le mur traverse l'espace d'une créature à son apparition, la créature est repoussée du côté du mur que vous choisissez et effectue un jet de sauvegarde de Dextérité ; elle subit 10d6 dégâts de froid en cas d'échec, la moitié en cas de réussite.
      
      Le mur est un objet que l'on peut endommager, ce qui permet d'y ouvrir une brèche. Doté d'une CA de 12 et de 30 points de vie par section de 3 m de côté, il bénéficie de l'Immunité contre les dégâts de froid, de poison et psychiques, et subit la Vulnérabilité aux dégâts de feu. Une section de 3 m de côté réduite à 0 point de vie est détruite et laisse une nappe d'air glacial dans l'espace qu'elle occupait.
      
      Une créature qui traverse une telle nappe pour la première fois d'un tour effectue un jet de sauvegarde de Constitution et subit 5d6 dégâts de froid en cas d'échec, la moitié en cas de réussite.
      
      ***Emplacement de niveau supérieur***. Les dégâts infligés par le mur à son apparition augmentent de 2d6 et ceux de la nappe d'air glacial de 1d6 pour chaque niveau d'emplacement de sort supérieur à 6.
