translations:
  en:
    name: Etherealness
    castingTime: Action
    range: Self
    duration: Up to 8 hours
    materialDescription: null
    description: |-
      You step into the border regions of the Ethereal Plane, where it overlaps with your current plane. You remain in the Border Ethereal for the duration. During this time, you can move in any direction. If you move up or down, every foot of movement costs an extra foot. You can perceive the plane you left, which looks gray, and you can't see anything there more than 60 feet away.

      While on the Ethereal Plane, you can affect and be affected only by creatures, objects, and effects on that plane. Creatures that aren't on the Ethereal Plane can't perceive or interact with you unless a feature gives them the ability to do so.

      When the spell ends, you return to the plane you left in the spot that corresponds to your space in the Border Ethereal. If you appear in an occupied space, you are shunted to the nearest unoccupied space and take Force damage equal to twice the number of feet you are moved.

      This spell ends instantly if you cast it while you are on the Ethereal Plane or a plane that doesn't border it, such as one of the Outer Planes.

      ***Using a Higher-Level Spell Slot***. You can target up to three willing creatures (including yourself) for each spell slot level above 7. The creatures must be within 10 feet of you when you cast the spell.
  fr:
    name: Forme éthérée
    castingTime: Action
    range: Personnelle
    duration: Jusqu'à 8 heures
    materialDescription: null
    description: |-
      Vous pénétrez dans les régions frontalières du Plan Éthéré, bordure où il chevauche votre plan actuel. Vous demeurez dans la Frontière éthérée pour toute la durée. Durant cet intervalle, vous pouvez vous déplacer dans n'importe quelle direction. Si vous vous déplacez vers le haut ou le bas, toute distance parcourue vous coûte le double. Vous percevez ce qui se passe sur le plan d'où vous venez, mais tout est nuances de gris et votre vision ne porte que sur 18 m.

      Tant que vous êtes sur le Plan Éthéré, seuls les créatures, objets et effets de ce plan peuvent vous affecter, et réciproquement. Les créatures qui ne s'y trouvent pas ne vous perçoivent pas et ne peuvent interagir avec vous, à moins de disposer d'une aptitude qui leur en donne la possibilité.

      Quand le sort prend fin, vous retournez aussitôt sur votre plan de départ, à l'endroit équivalent à l'espace que vous occupez actuellement dans la Frontière éthérée. Si vous apparaissez dans un espace occupé, vous subissez un transfert dans l'espace inoccupé le plus proche, chaque tranche de 30 cm de ce transfert forcé vous infligeant 2 dégâts de force.

      Ce sort prend fin sur-le-champ si vous le lancez tandis que vous êtes sur le Plan Éthéré ou un plan avec lequel il n'a pas de frontière, comme les Plans Extérieurs.

      ***Emplacement de niveau supérieur***. Vous pouvez cibler un maximum de trois créatures consentantes (y compris vous) pour chaque niveau d'emplacement de sort supérieur à 7. Ces créatures doivent se trouver dans un rayon de 3 m de vous à l'incantation du sort.
