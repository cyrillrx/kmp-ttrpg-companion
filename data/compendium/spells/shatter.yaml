id: shatter
source: phb_2024
level: 2
school: evocation
concentration: false
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- bard
- sorcerer
- wizard
translations:
  en:
    name: Shatter
    castingTime: Action
    range: 60 feet
    duration: Instantaneous
    materialDescription: a chip of mica
    description: A loud noise erupts from a point of your choice within range. Each
      creature in a 10-foot-radius Sphere centered there makes a Constitution saving
      throw, taking 3d8 Thunder damage on a failed save or half as much damage on
      a successful one. A Construct has Disadvantage on the save.<br/>A nonmagical
      object that isn't being worn or carried also takes the damage if it's in the
      spell's area.<br/><strong><em>Using a Higher-Level Spell Slot</em></strong>.
      The damage increases by 1d8 for each spell slot level above 2.<br/>
  fr:
    name: Fracassement
    castingTime: Action
    range: 18 m
    duration: Instantanée
    materialDescription: un fragment de mica
    description: Un bruit sourd retentit depuis un point de votre choix à portée.
      Toute créature dans une Sphère de 3 mètres de rayon centrée sur ce point effectue
      un jet de sauvegarde de Constitution, subissant 3d8 dégâts de Tonnerre en cas
      d'échec ou la moitié de ces dégâts en cas de réussite. Une créature artificielle
      a un Désavantage au jet.<br/>Un objet non magique non porté subit également
      les dégâts s'il se trouve dans la zone d'effet du sort.<br/><strong><em>Emplacement
      de niveau supérieur</em></strong>. Les dégâts augmentent de 1d8 pour chaque
      niveau d'emplacement de sort supérieur à 2.<br/>
