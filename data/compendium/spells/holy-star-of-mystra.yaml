id: holy-star-of-mystra
source: heroes_of_faerun
level: 8
school: evocation
concentration: true
ritual: false
components:
  verbal: true
  somatic: true
  material: false
availableClasses:
- cleric
- wizard
translations:
  en:
    name: Holy Star of Mystra
    castingTime: Bonus Action
    range: Self
    duration: Concentration, up to 1 minute
    materialDescription: null
    description: |-
      You create a glowing mote of energy that hovers above you for the duration. The mote sheds Bright Light in a 5-foot radius and Dim Light for an additional 5 feet.\
      When you cast this spell and as a Bonus Action on later turns, you can unleash a shining bolt from the mote, targeting one creature within 120 feet of yourself. Make a ranged spell attack. On a hit, the target takes Force or Radiant damage (your choice) equal to 4d10 plus your spellcasting ability modifier.\
      In addition, while the mote is present, you have Three-Quarters Cover, and if you succeed on a saving throw against a spell of level 7 or lower that targeted only you and didn't create an area of effect, you can take a Reaction to deflect that spell back at the spell's caster; the caster makes a saving throw against that spell using that caster's own spell save DC.\
  fr:
    name: Étoile sacrée de Mystra
    castingTime: Action bonus
    range: Personnelle
    duration: Concentration, jusqu'à 1 minute
    materialDescription: null
    description: |-
      Vous créez un point d'énergie lumineux qui flotte au-dessus de vous pour toute la durée. Ce point diffuse une Lumière vive sur un rayon de 1,50 mètre et une Lumière faible sur 1,50 mètre supplémentaire.\
      Lorsque vous lancez ce sort et en tant qu'action bonus lors de vos tours suivants, vous pouvez déchaîner un rayon brillant depuis le point, ciblant une créature à 36 mètres ou moins de vous. Effectuez une attaque de sort à distance. En cas de coup, la cible subit des dégâts de force ou radieux (au choix) égaux à 4d10 plus votre modificateur de caractéristique d'incantation.\
      En outre, tant que le point est présent, vous bénéficiez d'un Abri aux trois quarts, et si vous réussissez un jet de sauvegarde contre un sort de niveau 7 ou inférieur qui vous ciblait uniquement et ne créait pas de zone d'effet, vous pouvez utiliser une Réaction pour renvoyer ce sort sur son incantateur ; l'incantateur effectue un jet de sauvegarde contre ce sort en utilisant son propre DD de sauvegarde de sorts.\
