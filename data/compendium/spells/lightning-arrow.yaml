id: lightning-arrow
source: phb_2024
level: 3
school: transmutation
concentration: false
ritual: false
components:
  verbal: true
  somatic: true
  material: false
availableClasses:
- ranger
translations:
  en:
    name: Lightning Arrow
    castingTime: Bonus Action, which you can take immediately after hitting or missing
      a target with a ranged attack using a weapon
    range: Self
    duration: Instantaneous
    materialDescription: null
    description: |-
      As your attack hits or misses the target, the weapon or ammunition you're using transforms into a lightning bolt. Instead of taking any damage or other effects from the attack, the target takes 4d8 Lightning damage on a hit or half as much damage on a miss. Each creature within 10 feet of the target then makes a Dexterity saving throw, taking 2d8 Lightning damage on a failed save or half as much damage on a successful one.\
      The weapon or ammunition then returns to its normal form.\
      ***Using a Higher-Level Spell Slot***. The damage for both effects of the spell increases by 1d8 for each spell slot level above 3.\
  fr:
    name: Flèche de foudre
    castingTime: Action bonus, que vous pouvez prendre immédiatement après avoir touché
      ou manqué une cible avec une attaque à distance en utilisant une arme
    range: Personnelle
    duration: Instantanée
    materialDescription: null
    description: |-
      Lorsque votre attaque touche ou rate la cible, l'arme ou la munition utilisée se transforme en éclair. Au lieu de subir les dégâts ou autres effets de l'attaque, la cible subit 4d8 dégâts de foudre si l'attaque touche ou la moitié de ces dégâts si elle rate. Chaque créature dans un rayon de 3 mètres autour de la cible effectue alors un jet de sauvegarde de Dextérité, subissant 2d8 dégâts de foudre en cas d'échec ou la moitié de ces dégâts en cas de réussite.\
      L'arme ou la munition reprend alors sa forme normale.\
      ***Emplacement de niveau supérieur***. Les dégâts des deux effets du sort augmentent de 1d8 pour chaque niveau d'emplacement de sort supérieur à 3.\
