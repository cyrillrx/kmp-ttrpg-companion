id: leomund-s-secret-chest
source: phb_2024
level: 4
school: conjuration
concentration: false
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- wizard
translations:
  en:
    name: Leomund's Secret Chest
    castingTime: Action
    range: Touch
    duration: Instantaneous
    materialDescription: a chest, 3 feet by 2 feet by 2 feet, constructed from rare
      materials worth 5,000+ GP, and a Tiny replica of the chest made from the same
      materials worth 50+ GP
    description: |-
      You hide a chest and all its contents on the Ethereal Plane. You must touch the chest and the miniature replica that serve as Material components for the spell. The chest can contain up to 12 cubic feet of nonliving material (3 feet by 2 feet by 2 feet).

      While the chest remains on the Ethereal Plane, you can take a Magic action and touch the replica to recall the chest. It appears in an unoccupied space on the ground within 5 feet of you. You can send the chest back to the Ethereal Plane by taking a Magic action to touch the chest and the replica.

      After 60 days, there is a cumulative 5 percent chance at the end of each day that the spell ends. The spell also ends if you cast this spell again or if the Tiny replica chest is destroyed. If the spell ends and the larger chest is on the Ethereal Plane, the chest remains there for you or someone else to find.
  fr:
    name: Coffre secret de Léomund
    castingTime: Action
    range: Contact
    duration: Instantanée
    materialDescription: un coffre, de 90 cm par 60 cm par 60 cm, fait de matériaux
      rares d'une valeur minimale de 5000 po, et sa réplique de taille TP faite des
      mêmes matériaux d'une valeur minimale de 50 po
    description: |-
      Vous cachez un coffre et tout son contenu sur le plan Éthéré. Vous devez toucher le coffre et la réplique miniature qui servent de composantes matérielles au sort. Le coffre peut contenir jusqu'à un cube de 90 cm x 60 cm x 60 cm de matière inerte.

      Tant que le coffre reste sur le plan Éthéré, vous pouvez prendre une action Magie et toucher la réplique pour le rappeler. Il apparaît dans un espace libre au sol dans un rayon de 1,50 mètre. Vous pouvez renvoyer le coffre sur le plan Éthéré en prenant une action Magie pour toucher le coffre et la réplique.

      Après 60 jours, le sort a 5 % de chances cumulées à la fin de chaque journée de se terminer. Il prend également fin si vous le lancez à nouveau ou si la réplique miniature du coffre est détruite. Si le sort prend fin et que le coffre plus grand se trouve sur le plan Éthéré, le coffre y reste. À vous ou à quelqu'un d'autre de le trouver.
