translations:
  en:
    name: Hex
    castingTime: Bonus Action
    range: 90 feet
    duration: Concentration, up to 1 hour
    materialDescription: the petrified eye of a newt
    description: |-
      You place a curse on a creature that you can see within range. Until the spell ends, you deal an extra 1d6 Necrotic damage to the target whenever you hit it with an attack roll. Also, choose one ability when you cast the spell. The target has Disadvantage on ability checks made with the chosen ability.

      If the target drops to 0 Hit Points before this spell ends, you can use a Bonus Action on a later turn to curse a new creature.

      ***Using a Higher-Level Spell Slot***. Your Concentration can last longer with a spell slot of level 2 (up to 4 hours), 3-4 (up to 8 hours), or 5+ (up to 24 hours).
  fr:
    name: Maléfice
    castingTime: Action bonus
    range: 27 m
    duration: Concentration, jusqu'à 1 heure
    materialDescription: un oeil pétrifié de triton
    description: |-
      Vous jetez une malédiction sur une créature que vous pouvez voir à portée. Jusqu'à la fin du sort, vous infligez 1d6 dégâts nécrotiques supplémentaires à la cible à chaque jet d'attaque. Choisissez également une caractéristique lorsque vous lancez le sort. La cible subit un désavantage aux jets de caractéristique effectués avec la caractéristique choisie.

      Si la cible tombe à 0 point de vie avant la fin du sort, vous pouvez utiliser une action Bonus lors d'un tour ultérieur pour maudire une nouvelle créature.

      ***Emplacement de niveau supérieur***. Votre concentration peut durer plus longtemps avec un emplacement de sort de niveau 2 (jusqu'à 4 heures), 3 ou 4 (jusqu'à 8 heures) ou 5 ou supérieur (jusqu'à 24 heures).
