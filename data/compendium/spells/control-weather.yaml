id: control-weather
source: phb_2024
level: 8
school: transmutation
concentration: true
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- cleric
- druid
- wizard
translations:
  en:
    name: Control Weather
    castingTime: 10 minutes
    range: Self
    duration: Concentration, up to 8 hours
    materialDescription: burning incense
    description: |-
      You take control of the weather within 5 miles of you for the duration. You must be outdoors to cast this spell, and it ends early if you go indoors.

      When you cast the spell, you change the current weather conditions, which are determined by the DM. You can change precipitation, temperature, and wind. It takes 1d4 × 10 minutes for the new conditions to take effect. Once they do so, you can change the conditions again. When the spell ends, the weather gradually returns to normal.

      When you change the weather conditions, find a current condition on the following tables and change its stage by one, up or down. When changing the wind, you can change its direction.



      **Precipitation**

      | Stage | Condition |
      | --- | --- |
      | 1 | Clear |
      | 2 | Light clouds |
      | 3 | Overcast or ground fog |
      | 4 | Rain, hail, or snow |
      | 5 | Torrential rain, driving hail, or blizzard |



      **Temperature**

      | Stage | Condition |
      | --- | --- |
      | 1 | Heat wave |
      | 2 | Hot |
      | 3 | Warm |
      | 4 | Cool |
      | 5 | Cold |
      | 6 | Freezing |



      **Wind**

      | Stage | Condition |
      | --- | --- |
      | 1 | Calm |
      | 2 | Moderate wind |
      | 3 | Strong wind |
      | 4 | Gale |
      | 5 | Storm |
  fr:
    name: Contrôle du climat
    castingTime: 10 minutes
    range: Personnelle
    duration: Concentration, jusqu'à 8 heures
    materialDescription: de l'encens qui brûle
    description: |-
      Vous prenez le contrôle du climat dans un rayon de 7,5 km pour toute la durée. Vous devez vous trouver en extérieur pour lancer ce sort, qui prend fin prématurément dès que vous êtes à l'intérieur.

      À l'incantation du sort, vous altérez les conditions climatiques du moment, déterminées par le MD. Vous pouvez modifier les précipitations, la température et le vent. Les nouvelles conditions mettent 1d4 x 10 minutes à prendre effet. Après ce laps de temps, vous pouvez à nouveau altérer les conditions. Quand le sort prend fin, le temps revient progressivement à la normale.

      Lorsque vous changez les conditions climatiques, identifiez celles du moment dans les tables qui suivent et changez-en le stade d'un cran, vers le haut ou le bas. Lorsque vous modifiez le vent, vous pouvez en changer la direction.



      **Précipitations**

      | Stade | Conditions |
      | --- | --- |
      | 1 | Ciel dégagé |
      | 2 | Quelques nuages |
      | 3 | Ciel chargé ou brume au sol |
      | 4 | Pluie, grêle ou neige |
      | 5 | Pluie torrentielle, grêle battante ou blizzard |



      **Température**

      | Stade | Conditions |
      | --- | --- |
      | 1 | Caniculaire |
      | 2 | Chaud |
      | 3 | Doux |
      | 4 | Frais |
      | 5 | Froid |
      | 6 | Glacial |



      **Vent**

      | Stade | Conditions |
      | --- | --- |
      | 1 | Calme |
      | 2 | Vent modéré |
      | 3 | Vent fort |
      | 4 | Vent violent |
      | 5 | Tempête |
