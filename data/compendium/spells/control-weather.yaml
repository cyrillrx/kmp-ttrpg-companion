id: control-weather
source: phb_2024
level: 8
school: transmutation
concentration: true
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- cleric
- druid
- wizard
translations:
  en:
    name: Control Weather
    castingTime: 10 minutes
    range: Self
    duration: Concentration, up to 8 hours
    materialDescription: burning incense
    description: You take control of the weather within 5 miles of you for the duration.
      You must be outdoors to cast this spell, and it ends early if you go indoors.<br/>When
      you cast the spell, you change the current weather conditions, which are determined
      by the DM. You can change precipitation, temperature, and wind. It takes 1d4
      × 10 minutes for the new conditions to take effect. Once they do so, you can
      change the conditions again. When the spell ends, the weather gradually returns
      to normal.<br/>When you change the weather conditions, find a current condition
      on the following tables and change its stage by one, up or down. When changing
      the wind, you can change its direction.<br/><br/><strong>Precipitation</strong><br/><table><tr><th>Stage</th><th>Condition</th></tr><tr><td
      class="center">1</td><td>Clear</td></tr><tr><td class="center">2</td><td>Light
      clouds</td></tr><tr><td class="center">3</td><td>Overcast or ground fog</td></tr><tr><td
      class="center">4</td><td>Rain, hail, or snow</td></tr><tr><td class="center">5</td><td>Torrential
      rain, driving hail, or blizzard</td></tr></table><br/><strong>Temperature</strong><br/><table><tr><th>Stage</th><th>Condition</th></tr><tr><td
      class="center">1</td><td>Heat wave</td></tr><tr><td class="center">2</td><td>Hot</td></tr><tr><td
      class="center">3</td><td>Warm</td></tr><tr><td class="center">4</td><td>Cool</td></tr><tr><td
      class="center">5</td><td>Cold</td></tr><tr><td class="center">6</td><td>Freezing</td></tr></table><br/><strong>Wind</strong><br/><table><tr><th>Stage</th><th>Condition</th></tr><tr><td
      class="center">1</td><td>Calm</td></tr><tr><td class="center">2</td><td>Moderate
      wind</td></tr><tr><td class="center">3</td><td>Strong wind</td></tr><tr><td
      class="center">4</td><td>Gale</td></tr><tr><td class="center">5</td><td>Storm</td></tr></table><br/>
  fr:
    name: Contrôle du climat
    castingTime: 10 minutes
    range: Personnelle
    duration: Concentration, jusqu'à 8 heures
    materialDescription: de l'encens qui brûle
    description: Vous prenez le contrôle du climat dans un rayon de 7,5 km pour toute
      la durée. Vous devez vous trouver en extérieur pour lancer ce sort, qui prend
      fin prématurément dès que vous êtes à l'intérieur.<br/>À l'incantation du sort,
      vous altérez les conditions climatiques du moment, déterminées par le MD. Vous
      pouvez modifier les précipitations, la température et le vent. Les nouvelles
      conditions mettent 1d4 x 10 minutes à prendre effet. Après ce laps de temps,
      vous pouvez à nouveau altérer les conditions. Quand le sort prend fin, le temps
      revient progressivement à la normale.<br/>Lorsque vous changez les conditions
      climatiques, identifiez celles du moment dans les tables qui suivent et changez-en
      le stade d'un cran, vers le haut ou le bas. Lorsque vous modifiez le vent, vous
      pouvez en changer la direction.<br/><br/><strong>Précipitations</strong><br/><table><tr><th>Stade</th><th>Conditions</th></tr><tr><td
      class="center">1</td><td>Ciel dégagé</td></tr><tr><td class="center">2</td><td>Quelques
      nuages</td></tr><tr><td class="center">3</td><td>Ciel chargé ou brume au sol</td></tr><tr><td
      class="center">4</td><td>Pluie, grêle ou neige</td></tr><tr><td class="center">5</td><td>Pluie
      torrentielle, grêle battante ou blizzard</td></tr></table><br/><strong>Température</strong><br/><table><tr><th>Stade</th><th>Conditions</th></tr><tr><td
      class="center">1</td><td>Caniculaire</td></tr><tr><td class="center">2</td><td>Chaud</td></tr><tr><td
      class="center">3</td><td>Doux</td></tr><tr><td class="center">4</td><td>Frais</td></tr><tr><td
      class="center">5</td><td>Froid</td></tr><tr><td class="center">6</td><td>Glacial</td></tr></table><br/><strong>Vent</strong><br/><table><tr><th>Stade</th><th>Conditions</th></tr><tr><td
      class="center">1</td><td>Calme</td></tr><tr><td class="center">2</td><td>Vent
      modéré</td></tr><tr><td class="center">3</td><td>Vent fort</td></tr><tr><td
      class="center">4</td><td>Vent violent</td></tr><tr><td class="center">5</td><td>Tempête</td></tr></table><br/>
