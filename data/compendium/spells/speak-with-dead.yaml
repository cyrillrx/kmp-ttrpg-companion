id: speak-with-dead
source: phb_2024
level: 3
school: necromancy
concentration: false
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- bard
- cleric
- wizard
translations:
  en:
    name: Speak with Dead
    castingTime: Action
    range: 10 feet
    duration: 10 minutes
    materialDescription: burning incense
    description: |-
      You grant the semblance of life to a corpse of your choice within range, allowing it to answer questions you pose. The corpse must have a mouth, and this spell fails if the deceased creature was Undead when it died. The spell also fails if the corpse was the target of this spell within the past 10 days.

      Until the spell ends, you can ask the corpse up to five questions. The corpse knows only what it knew in life, including the languages it knew. Answers are usually brief, cryptic, or repetitive, and the corpse is under no compulsion to offer a truthful answer if you are antagonistic toward it or it recognizes you as an enemy. This spell doesn't return the creature's soul to its body, only its animating spirit. Thus, the corpse can't learn new information, doesn't comprehend anything that has happened since it died, and can't speculate about future events.
  fr:
    name: Communication avec les morts
    castingTime: Action
    range: 3 m
    duration: 10 minutes
    materialDescription: de l'encens qui brule
    description: |-
      Vous accordez un semblant de vie à un cadavre de votre choix à portée, lui permettant de répondre à vos questions. Le cadavre doit avoir une bouche, et ce sort échoue si la créature décédée était un mort-vivant au moment de sa mort. Il échoue également si le cadavre a déjà été la cible de ce sort au cours des 10 derniers jours.

      Jusqu'à la fin du sort, vous pouvez poser au cadavre jusqu'à cinq questions. Le cadavre ne connaît que ce qu'il savait de son vivant, y compris les langues qu'il connaissait. Les réponses sont généralement brèves, cryptiques ou répétitives, et le cadavre n'est pas tenu de donner une réponse honnête si vous lui êtes hostile ou s'il vous reconnaît comme un ennemi. Ce sort ne rend pas l'âme de la créature à son corps, seulement son esprit. Ainsi, le cadavre ne peut pas apprendre de nouvelles informations, ne comprend rien de ce qui s'est passé depuis sa mort et ne peut pas spéculer sur les événements futurs.
