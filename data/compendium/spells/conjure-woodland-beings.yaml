id: conjure-woodland-beings
source: phb_2024
level: 4
school: conjuration
concentration: true
ritual: false
components:
  verbal: true
  somatic: true
  material: false
availableClasses:
- druid
- ranger
translations:
  en:
    name: Conjure Woodland Beings
    castingTime: Action
    range: Self
    duration: Concentration, up to 10 minutes
    materialDescription: null
    description: You conjure nature spirits that flit around you in a 10-foot Emanation
      for the duration. Whenever the Emanation enters the space of a creature you
      can see and whenever a creature you can see enters the Emanation or ends its
      turn there, you can force that creature to make a Wisdom saving throw. The creature
      takes 5d8 Force damage on a failed save or half as much damage on a successful
      one. A creature makes this save only once per turn.<br/>In addition, you can
      take the Disengage action as a Bonus Action for the spell's duration.<br/><strong><em>Using
      a Higher-Level Spell Slot</em></strong>. The damage increases by 1d8 for each
      spell slot level above 4*.<br/>
  fr:
    name: Invocation d'êtres sylvestres
    castingTime: Action
    range: Personnelle
    duration: Concentration, jusqu'à 10 minutes
    materialDescription: null
    description: Vous invoquez des esprits de la nature qui voltigent autour de vous
      sous forme d'Émanation de 3 mètres pendant la durée du sort. Chaque fois que
      l'Émanation pénètre dans l'espace d'une créature que vous pouvez voir, ou chaque
      fois qu'une créature que vous pouvez voir y pénètre ou y termine son tour, vous
      pouvez forcer cette créature à effectuer un jet de sauvegarde de Sagesse. La
      créature subit 5d8 dégâts de Force en cas d'échec, ou la moitié de ces dégâts
      en cas de réussite. Une créature n'effectue ce jet qu'une seule fois par tour.<br/>De
      plus, vous pouvez prendre l'action Désengagement comme action Bonus pendant
      la durée du sort.<br/><strong><em>Emplacement de niveau supérieur</em></strong>.
      Les dégâts augmentent de 1d8 pour chaque niveau d'emplacement de sort supérieur
      à 4.<br/>
