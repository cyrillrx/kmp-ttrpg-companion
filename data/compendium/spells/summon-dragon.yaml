id: summon-dragon
source: phb_2024
level: 5
school: conjuration
concentration: true
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- wizard
translations:
  en:
    name: Summon Dragon
    castingTime: Action
    range: 60 feet
    duration: Concentration, up to 1 hour
    materialDescription: an object with the image of a dragon engraved on it worth
      500+ GP
    description: |-
      You call forth a Dragon spirit. It manifests in an unoccupied space that you can see within range and uses the **[Draconic Spirit](https://www.aidedd.org/monster/draconic-spirit)** stat block. The creature disappears when it drops to 0 Hit Points or when the spell ends.

      The creature is an ally to you and your allies. In combat, the creature shares your Initiative count, but it takes its turn immediately after yours. It obeys your verbal commands (no action required by you). If you don't issue any, it takes the Dodge action and uses its movement to avoid danger.

      ***Using a Higher-Level Spell Slot***. Use the spell slot's level for the spell's level in the stat block.
  fr:
    name: Convocation de dragon
    castingTime: Action
    range: 18 m
    duration: Concentration, jusqu'à 1 heure
    materialDescription: un objet gravé d'une représentation de dragon d'une valeur
      minimale de 500 po
    description: |-
      Vous invoquez l'esprit d'un dragon. Celui-ci se manifeste dans un espace libre que vous pouvez voir à portée et utilise le profil de l'**[esprit draconique](https://www.aidedd.org/monster/fr/esprit-draconique)**. La créature disparaît lorsqu'elle tombe à 0 point de vie ou à la fin du sort.

      Cette créature est votre alliée et celle de vos alliés. En combat, elle partage votre Initiative, mais son tour commence immédiatement après le vôtre. Elle obéit à vos ordres verbaux (aucune action requise). Si vous n'en donnez pas, elle prend l'action Esquive et utilise son mouvement pour éviter le danger.

      ***Emplacement de niveau supérieur***. Utilisez le niveau de l'emplacement de sort pour le niveau du sort dans le profil.
