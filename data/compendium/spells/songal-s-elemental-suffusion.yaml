id: songal-s-elemental-suffusion
source: heroes_of_faerun
level: 5
school: transmutation
concentration: true
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- druid
- sorcerer
- wizard
translations:
  en:
    name: Songal's Elemental Suffusion
    castingTime: Action
    range: Self
    duration: Concentration, up to 1 minute
    materialDescription: a pearl worth 100+ GP
    description: |-
      You imbue yourself with the elemental power of genies. You gain the following benefits until the spell ends:<br/><strong>Elemental Immunity.</strong> When you cast this spell, choose one of the following damage types: Acid, Cold, Fire, Lightning, or Thunder. You have Resistance to the chosen damage type.<br/><strong>Elemental Pulse.</strong> When you cast this spell and at the start of each of your subsequent turns, you release a burst of elemental energy in a 15-foot Emanation originating from yourself. Each creature of your choice in that area makes a Dexterity saving throw. On a failed save, a creature takes 2d6 Acid, Cold, Fire, Lightning, or Thunder damage (your choice) and has the Prone condition. On a successful save, a creature takes half as much damage only.<br/><strong>Flight.</strong> You gain a Fly Speed of 30 feet and can hover.<br/><strong>Casting as a Circle Spell.</strong> If the spell is cast as a Circle spell, its casting time increases to 1 minute, and its duration increases to Concentration, up to 10 minutes. For each secondary caster who participates in the casting, you can choose one additional creature, to a maximum of nine additional creatures. The chosen creatures also gain the benefits of the spell for its duration.<br/>When the spell is cast, each secondary caster must expend a level 2+ spell slot; otherwise, the spell fails.<br/>
  fr:
    name: Imprégnation élémentaire de Songal
    castingTime: Action
    range: Personnelle
    duration: Concentration, jusqu'à 1 minute
    materialDescription: une perle d'une valeur minimale de 100 po
    description: |-
      Vous vous imprégnez du pouvoir élémentaire des génies. Vous bénéficiez des avantages suivants jusqu'à la fin du sort :<br/><strong>Immunité élémentaire.</strong> Lorsque vous lancez ce sort, choisissez l'un des types de dégâts suivants : acide, froid, feu, foudre ou tonnerre. Vous bénéficiez de la Résistance au type de dégâts choisi.<br/><strong>Impulsion élémentaire.</strong> Lorsque vous lancez ce sort et au début de chacun de vos tours suivants, vous libérez une déflagration d'énergie élémentaire dans une Émanation de 4,50 mètres autour de vous. Chaque créature de votre choix dans cette zone effectue un jet de sauvegarde de Dextérité. En cas d'échec, une créature subit 2d6 dégâts d'acide, de froid, de feu, de foudre ou de tonnerre (au choix) et subit l'état À terre. En cas de réussite, la créature ne subit que la moitié de ces dégâts.<br/><strong>Vol.</strong> Vous gagnez une Vitesse de vol de 9 mètres et pouvez planer.<br/><strong>Incantation en tant que sort de Cercle.</strong> Si le sort est lancé en tant que sort de Cercle, son temps d'incantation passe à 1 minute et sa durée devient Concentration, jusqu'à 10 minutes. Pour chaque incantateur secondaire participant à l'incantation, vous pouvez choisir une créature supplémentaire, dans la limite de neuf créatures supplémentaires. Les créatures choisies bénéficient également des effets du sort pour toute sa durée.<br/>Lors du lancement du sort, chaque incantateur secondaire doit dépenser un emplacement de sort de niveau 2 ou supérieur ; sinon, le sort échoue.<br/>
