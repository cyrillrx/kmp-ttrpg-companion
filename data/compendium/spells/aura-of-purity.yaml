  fr:
    name: Aura de pureté
    castingTime: Action
    range: Personnelle
    duration: Concentration, jusqu'à 10 minutes
    materialDescription: null
    description: |-
      Une aura rayonne autour de vous sous forme d'Émanation de 9 mètres pendant toute la durée du sort. Tant que vous êtes dans l'aura, vous et vos alliés bénéficiez d'une résistance aux dégâts de poison et d'un Avantage aux jets de sauvegarde pour éviter ou mettre fin aux états Aveuglé, Charmé, Assourdi, Effrayé, Paralysé, Empoisonné ou Étourdi.
