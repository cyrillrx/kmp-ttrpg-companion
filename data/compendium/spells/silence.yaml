id: silence
source: phb_2024
level: 2
school: illusion
concentration: true
ritual: true
components:
  verbal: true
  somatic: true
  material: false
availableClasses:
- bard
- cleric
- ranger
translations:
  en:
    name: Silence
    castingTime: Action or Ritual
    range: 120 feet
    duration: Concentration, up to 10 minutes
    materialDescription: null
    description: |-
      For the duration, no sound can be created within or pass through a 20-foot-radius Sphere centered on a point you choose within range. Any creature or object entirely inside the Sphere has Immunity to Thunder damage, and creatures have the Deafened condition while entirely inside it. Casting a spell that includes a Verbal component is impossible there.
      
  fr:
    name: Silence
    castingTime: Action ou Rituel
    range: 36 m
    duration: Concentration, jusqu'à 10 minutes
    materialDescription: null
    description: |-
      Pendant toute la durée du sort, aucun son ne peut être émis depuis ni traverser une Sphère de 6 mètres de rayon centrée sur un point de votre choix à portée. Toute créature ou objet entièrement à l'intérieur de la Sphère est immunisé aux dégâts de tonnerre, et les créatures ont l'état Assourdi tant qu'elles y sont entièrement. Il est impossible de lancer un sort comportant une composante verbale dans la zone.
