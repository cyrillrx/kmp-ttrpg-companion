id: melf-s-acid-arrow
source: phb_2024
level: 2
school: evocation
concentration: false
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- wizard
translations:
  en:
    name: Melf's Acid Arrow
    castingTime: Action
    range: 90 feet
    duration: Instantaneous
    materialDescription: powdered rhubarb leaf
    description: |-
      A shimmering green arrow streaks toward a target within range and bursts in a spray of acid. Make a ranged spell attack against the target. On a hit, the target takes 4d4 Acid damage and 2d4 Acid damage at the end of its next turn. On a miss, the arrow splashes the target with acid for half as much of the initial damage only.

      ***Using a Higher-Level Spell Slot***. The damage (both initial and later) increases by 1d4 for each spell slot level above 2.
  fr:
    name: Flèche acide de Melf
    castingTime: Action
    range: 27 m
    duration: Instantanée
    materialDescription: une feuille de rhubarbe en poudre
    description: |-
      Une flèche verte scintillante fonce vers une cible à portée et explose dans un jet d'acide. Effectuez une attaque de sort à distance contre la cible. Si l'attaque touche, la cible subit 4d4 dégâts d'acide, puis 2d4 dégâts d'acide à la fin de son prochain tour. En cas d'échec, la flèche éclabousse la cible d'acide, lui infligeant la moitié des dégâts initiaux.

      ***Emplacement de niveau supérieur***. Les dégâts (initiaux et ultérieurs) augmentent de 1d4 pour chaque niveau d'emplacement de sort supérieur à 2.
