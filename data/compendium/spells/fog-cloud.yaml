translations:
  en:
    name: Fog Cloud
    castingTime: Action
    range: 120 feet
    duration: Concentration, up to 1 hour
    materialDescription: null
    description: You create a 20-foot-radius Sphere of fog centered on a point within
      range. The Sphere is Heavily Obscured. It lasts for the duration or until a
      strong wind (such as one created by <em><a href="./gust-of-wind">Gust of Wind</a></em>)
      disperses it.<br/><strong><em>Using a Higher-Level Spell Slot</em></strong>.
      The fog's radius increases by 20 feet for each spell slot level above 1.<br/>
  fr:
    name: Nappe de brouillard
    castingTime: Action
    range: 36 m
    duration: Concentration, jusqu'à 1 heure
    materialDescription: null
    description: Vous créez une Sphère de brouillard de 6 mètres de rayon centrée
      sur un point à portée. La Sphère est une zone de Visibilité nulle. Elle se maintient
      pendant toute la durée du sort ou jusqu'à ce qu'un vent fort (comme celui créé
      par <em><a href="./fr/bourrasque">bourrasque</a></em>) la disperse.<br/><strong><em>Emplacement
      de niveau supérieur</em></strong>. Le rayon du brouillard augmente de 6 mètres
      pour chaque niveau d'emplacement de sort supérieur à 1.<br/>
