id: create-undead
source: phb_2024
level: 6
school: necromancy
concentration: false
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- cleric
- warlock
- wizard
translations:
  en:
    name: Create Undead
    castingTime: 1 minute
    range: 10 feet
    duration: Instantaneous
    materialDescription: one 150+ GP black onyx stone for each corpse
    description: You can cast this spell only at night. Choose up to three corpses
      of Medium or Small Humanoids within range. Each one becomes a <strong><a href="https://www.aidedd.org/monster/ghoul">Ghoul</a></strong>
      under your control.<br/>As a Bonus Action on each of your turns, you can mentally
      command any creature you animated with this spell if the creature is within
      120 feet of you (if you control multiple creatures, you can command any of them
      at the same time, issuing the same command to them). You decide what action
      the creature will take and where it will move on its next turn, or you can issue
      a general command, such as to guard a particular place. If you issue no commands,
      the creature takes the Dodge action and moves only to avoid harm. Once given
      an order, the creature continues to follow the order until its task is complete.<br/>The
      creature is under your control for 24 hours, after which it stops obeying any
      command you've given it. To maintain control of the creature for another 24
      hours, you must cast this spell on the creature before the current 24-hour period
      ends. This use of the spell reasserts your control over up to three creatures
      you have animated with this spell rather than animating new ones.<br/><strong><em>Using
      a Higher-Level Spell Slot</em></strong>. If you use a level 7 spell slot, you
      can animate or reassert control over four Ghouls. If you use a level 8 spell
      slot, you can animate or reassert control over five Ghouls or two <strong><a
      href="https://www.aidedd.org/monster/ghast">Ghasts</a></strong> or <strong><a
      href="https://www.aidedd.org/monster/wight">Wights</a></strong>. If you use
      a level 9 spell slot, you can animate or reassert control over six Ghouls, three
      Ghasts or Wights, or two <strong><a href="https://www.aidedd.org/monster/mummy">Mummies</a></strong>.<br/>
  fr:
    name: Création de mort-vivant
    castingTime: 1 minute
    range: 3 m
    duration: Instantanée
    materialDescription: un onyx noir d'une valeur minimale de 150 po pour chaque cadavre
    description: Vous ne pouvez lancer ce sort que de nuit. Choisissez jusqu'à trois
      cadavres d'Humanoïdes de taille M ou P à portée. Chaque cadavre devient une
      <strong><a href="https://www.aidedd.org/monster/fr/goule">goule</a></strong>
      sous votre contrôle.<br/>Par une action Bonus à chacun de vos tours, vous pouvez
      donner des ordres mentaux à toute créature que vous avez créée par ce sort et
      qui se trouve dans un rayon de 36 m de vous. Vous pouvez ainsi contrôler plusieurs
      créatures, en les choisissant, à condition de leur intimer le même ordre. Vous
      décidez quelle action la créature va entreprendre et où elle se déplacera à
      son tour suivant, ou pouvez vous contenter de donner une instruction générale,
      comme garder un lieu donné. Sans instruction de votre part, la créature entreprend
      l'action Esquive et ne se déplace que pour éviter les dangers. Une fois qu'elle
      a reçu un ordre, la créature s'y soumet jusqu'à ce que la tâche soit accomplie.<br/>La
      créature reste sous votre contrôle pendant 24 heures, après quoi elle cesse
      d'obéir aux ordres que vous lui avez donnés. Pour garder le contrôle du Mortvivant
      pendant 24 heures de plus, vous devez relancer ce sort sur lui avant la fin
      des 24 heures en cours.<br/>Relancer le sort ainsi réaffirme votre emprise sur
      un maximum de trois créatures que vous avez animées par ce sort, au lieu d'en
      animer de nouvelles.<br/><strong><em>Emplacement de niveau supérieur</em></strong>.
      Avec un emplacement de niveau 7, vous prenez ou prolongez le contrôle de quatre
      goules. Avec un emplacement de niveau 8, vous prenez ou prolongez le contrôle
      de cinq goules, ou de deux <strong><a href="https://www.aidedd.org/monster/fr/bleme">blêmes</a></strong>
      ou <strong><a href="https://www.aidedd.org/monster/fr/necrophage-necronte">nécrophages</a></strong>.
      Avec un emplacement de niveau 9, vous prenez ou prolongez le contrôle de six
      goules, de trois blêmes ou nécrontes, ou de deux <strong><a href="https://www.aidedd.org/monster/fr/momie">momies</a></strong>.<br/>
