id: project-image
source: phb_2024
level: 7
school: illusion
concentration: true
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- bard
- wizard
translations:
  en:
    name: Project Image
    castingTime: Action
    range: 500 miles
    duration: Concentration, up to 1 day
    materialDescription: a statuette of yourself worth 5+ GP
    description: |-
      You create an illusory copy of yourself that lasts for the duration. The copy can appear at any location within range that you have seen before, regardless of intervening obstacles. The illusion looks and sounds like you, but it is intangible. If the illusion takes any damage, it disappears, and the spell ends.
      
      You can see through the illusion's eyes and hear through its ears as if you were in its space. As a Magic action, you can move it up to 60 feet and make it gesture, speak, and behave in whatever way you choose. It mimics your mannerisms perfectly.
      
      Physical interaction with the image reveals it to be illusory, since things can pass through it. A creature that takes the Study action to examine the image can determine that it is an illusion with a successful Intelligence (Investigation) check against your spell save DC. If a creature discerns the illusion for what it is, the creature can see through the image, and any noise it makes sounds hollow to the creature.
      
  fr:
    name: Image projetée
    castingTime: Action
    range: 750 km
    duration: Concentration, jusqu'à 1 jour
    materialDescription: une statuette à votre effigie d'une valeur minimale de 5
      po
    description: |-
      Vous créez une réplique illusoire de vous-même qui persiste pour toute la durée. Ce double peut apparaître en n'importe quel lieu à portée que vous avez déjà vu, quels que soient les obstacles qui vous en séparent. L'illusion présente votre aspect et sonne comme vous, mais elle est intangible. Si elle subit des dégâts, l'illusion disparaît et le sort prend fin.
      
      Vous voyez et entendez comme si vous vous trouviez dans son espace. Au prix de l'action Magie, vous pouvez déplacer votre double d'un maximum de 18 m et le faire bouger, parler et se comporter à votre guise. Il reproduit à merveille votre façon d'être.
      
      Toute interaction physique avec l'image percera l'illusion, car elle n'est pas tangible. Une créature qui entreprend l'action Étude pour examiner l'image peut comprendre qu'il s'agit d'une illusion en réussissant un jet d'Intelligence (Investigation) contre le DD de sauvegarde de votre sort. Une créature qui perce l'illusion voit à travers l'image, tout son produit par l'illusion sonnant par ailleurs creux à ses oreilles.
