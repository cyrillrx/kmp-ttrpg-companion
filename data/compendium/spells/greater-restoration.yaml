id: greater-restoration
source: phb_2024
level: 5
school: abjuration
concentration: false
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- bard
- cleric
- druid
- paladin
- ranger
translations:
  en:
    name: Greater Restoration
    castingTime: Action
    range: Touch
    duration: Instantaneous
    materialDescription: diamond dust worth 100+ GP, which the spell consumes
    description: |-
      You touch a creature and magically remove one of the following effects from it:

      - 1 Exhaustion level
      - The Charmed or Petrified condition
      - A curse, including the target's Attunement to a cursed magic item
      - Any reduction to one of the target's ability scores
      - Any reduction to the target's Hit Point maximum
  fr:
    name: Restauration suprême
    castingTime: Action
    range: Contact
    duration: Instantanée
    materialDescription: poudre de diamant d'une valeur minimale de 100 po, que le
      sort consomme
    description: |-
      Vous touchez une créature et lui retirez magiquement l'un des effets suivants :

      - 1 niveau d'Épuisement
      - L'état Charmé ou Pétrifié
      - Une malédiction, y compris le lien de la cible avec un objet magique maudit
      - Toute réduction d'une des valeurs de caractéristique de la cible
      - Toute réduction du maximum de points de vie de la cible
