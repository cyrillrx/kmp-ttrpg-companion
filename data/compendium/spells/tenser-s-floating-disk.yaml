id: tenser-s-floating-disk
source: phb_2024
level: 1
school: conjuration
concentration: false
ritual: true
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- wizard
translations:
  en:
    name: Tenser's Floating Disk
    castingTime: Action or Ritual
    range: 30 feet
    duration: 1 hour
    materialDescription: a drop of mercury
    description: |-
      This spell creates a circular, horizontal plane of force, 3 feet in diameter and 1 inch thick, that floats 3 feet above the ground in an unoccupied space of your choice that you can see within range. The disk remains for the duration and can hold up to 500 pounds. If more weight is placed on it, the spell ends, and everything on the disk falls to the ground.
      
      The disk is immobile while you are within 20 feet of it. If you move more than 20 feet away from it, the disk follows you so that it remains within 20 feet of you. It can move across uneven terrain, up or down stairs, slopes and the like, but it can't cross an elevation change of 10 feet or more. For example, the disk can't move across a 10-foot-deep pit, nor could it leave such a pit if it was created at the bottom.
      
      If you move more than 100 feet from the disk (typically because it can't move around an obstacle to follow you), the spell ends.
      
  fr:
    name: Disque flottant de Tenser
    castingTime: Action ou Rituel
    range: 9 m
    duration: 1 heure
    materialDescription: une goutte de mercure
    description: |-
      Ce sort crée un plan de force circulaire et horizontal, de 90 cm de diamètre et 2,50 cm d'épaisseur, flottant à 90 cm du sol dans un espace libre de votre choix que vous pouvez voir et à portée. Le disque reste en place pendant toute la durée du sort et peut supporter jusqu'à 250 kg. Si un poids supplémentaire est placé dessus, le sort prend fin et tout ce qui se trouve sur le disque tombe au sol.
      
      Le disque est immobile tant que vous n'êtes pas à plus de 6 mètres de lui. Si vous vous en éloignez de plus de 6 mètres, le disque vous suit et reste à 6 mètres ou moins de vous. Il peut se déplacer sur un terrain accidenté, monter ou descendre des escaliers, des pentes, etc, mais il ne peut pas franchir un dénivelé de 3 mètres ou plus. Par exemple, le disque ne peut pas franchir une fosse de 3 mètres de profondeur, ni en sortir s'il avait été créé au fond.
      
      Si vous vous éloignez de plus de 30 mètres du disque (généralement parce qu'il ne peut pas contourner un obstacle pour vous suivre), le sort prend fin.
