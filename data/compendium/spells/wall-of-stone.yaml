translations:
  en:
    name: Wall of Stone
    castingTime: Action
    range: 120 feet
    duration: Concentration, up to 10 minutes
    materialDescription: a cube of granite
    description: |-
      A nonmagical wall of solid stone springs into existence at a point you choose within range. The wall is 6 inches thick and is composed of ten 10-foot-by-10-foot panels. Each panel must be contiguous with another panel. Alternatively, you can create 10-foot-by-20-foot panels that are only 3 inches thick.
      
      If the wall cuts through a creature's space when it appears, the creature is pushed to one side of the wall (you choose which side). If a creature would be surrounded on all sides by the wall (or the wall and another solid surface), that creature can make a Dexterity saving throw. On a success, it can use its Reaction to move up to its Speed so that it is no longer enclosed by the wall.
      
      The wall can have any shape you desire, though it can't occupy the same space as a creature or object. The wall doesn't need to be vertical or rest on a firm foundation. It must, however, merge with and be solidly supported by existing stone. Thus, you can use this spell to bridge a chasm or create a ramp.
      
      If you create a span greater than 20 feet in length, you must halve the size of each panel to create supports. You can crudely shape the wall to create battlements and the like.
      
      The wall is an object made of stone that can be damaged and thus breached. Each panel has AC 15 and 30 Hit Points per inch of thickness, and it has Immunity to Poison and Psychic damage. Reducing a panel to 0 Hit Points destroys it and might cause connected panels to collapse at the DM's discretion.
      
      If you maintain your Concentration on this spell for its full duration, the wall becomes permanent and can't be dispelled. Otherwise, the wall disappears when the spell ends.
      
  fr:
    name: Mur de pierre
    castingTime: Action
    range: 36 m
    duration: Concentration, jusqu'à 10 minutes
    materialDescription: un cube de granit
    description: |-
      Un mur de pierre solide et non magique apparaît à l'endroit que vous choisissez et à portée. Ce mur a une épaisseur de 15 cm et est composé de dix panneaux de 3 mètres sur 3 mètres. Chaque panneau doit être contigu à un autre. Vous pouvez également créer des panneaux de 3 mètres sur 6 mètres de seulement 7,50 cm d'épaisseur.
      
      Si le mur traverse l'espace d'une créature lors de son apparition, celle-ci est repoussée d'un côté du mur (selon votre choix). Si une créature est entourée de tous côtés par le mur (ou par le mur et une autre surface solide), elle peut effectuer un jet de sauvegarde de Dextérité. En cas de réussite, elle peut utiliser sa Réaction pour se déplacer jusqu'à sa Vitesse et ainsi sortir du mur.
      
      Le mur peut prendre la forme de votre choix, mais il ne peut pas occuper le même espace qu'une créature ou un objet. Il n'est pas nécessaire qu'il soit vertical ni qu'il repose sur des fondations solides. Il doit cependant fusionner avec de la pierre existante et être solidement soutenu par elle. Vous pouvez donc utiliser ce sort pour combler un gouffre ou créer une rampe.
      
      Si vous créez une portée supérieure à 6 mètres de long, vous devez diviser par deux la taille de chaque panneau pour créer des supports. Vous pouvez façonner grossièrement le mur pour créer des créneaux, etc.
      
      Le mur est un objet en pierre qui peut être endommagé et donc percé. Chaque panneau a une CA de 15, 30 points de vie par tranche de 2,50 cm d'épaisseur, et est immunisé contre le poison et les dégâts psychiques. Réduire un panneau à 0 point de vie le détruit et peut provoquer l'effondrement des panneaux connectés, à la discrétion du MD.
      
      Si vous maintenez votre concentration sur ce sort pendant toute sa durée, le mur devient permanent et ne peut être dissipé. Sinon, il disparaît à la fin du sort.
