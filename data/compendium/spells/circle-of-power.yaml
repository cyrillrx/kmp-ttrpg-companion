id: circle-of-power
source: phb_2024
level: 5
school: abjuration
concentration: true
ritual: false
components:
  verbal: true
  somatic: false
  material: false
availableClasses:
- paladin
translations:
  en:
    name: Circle of Power
    castingTime: Action
    range: Self
    duration: Concentration, up to 10 minutes
    materialDescription: null
    description: |-
      An aura radiates from you in a 30-foot Emanation for the duration. While in the aura, you and your allies have Advantage on saving throws against spells and other magical effects. When an affected creature makes a saving throw against a spell or magical effect that allows a save to take only half damage, it takes no damage if it succeeds on the save.\
  fr:
    name: Cercle de pouvoir
    castingTime: Action
    range: Personnelle
    duration: Concentration, jusqu'à 10 minutes
    materialDescription: null
    description: |-
      Une aura rayonne autour de vous sous forme d'Émanation de 9 mètres pendant toute la durée du sort. Tant que vous êtes dans l'aura, vous et vos alliés bénéficiez d'un Avantage aux jets de sauvegarde contre les sorts et autres effets magiques. Lorsqu'une créature affectée effectue un jet de sauvegarde contre un sort ou un effet magique pour ne subir que la moitié des dégâts, elle ne subit aucun dégât si elle réussit son jet.\
