id: conjure-barrage
source: phb_2024
level: 3
school: conjuration
concentration: false
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- ranger
translations:
  en:
    name: Conjure Barrage
    castingTime: Action
    range: Self
    duration: Instantaneous
    materialDescription: a Melee or Ranged weapon worth at least 1 CP
    description: You brandish the weapon used to cast the spell and conjure similar
      spectral weapons (or ammunition appropriate to the weapon) that launch forward
      and then disappear. Each creature of your choice that you can see in a 60-foot
      Cone makes a Dexterity saving throw, taking 5d8 Force damage on a failed save
      or half as much damage on a successful one.<br/><strong><em>Using a Higher-Level
      Spell Slot</em></strong>. The damage increases by 1d8 for each spell slot level
      above 3.<br/>
  fr:
    name: Invocation de projectiles
    castingTime: Action
    range: Personnelle
    duration: Instantanée
    materialDescription: une arme de corps à corps ou à distance d'une valeur minimale
      de 1 pc
    description: Vous brandissez l'arme utilisée pour lancer le sort et invoquez des
      armes spectrales similaires (ou des munitions adaptées à l'arme) qui se projettent
      vers l'avant puis disparaissent. Chaque créature de votre choix que vous pouvez
      voir dans un Cône de 18 mètres effectue un jet de sauvegarde de Dextérité, subissant
      5d8 dégâts de Force en cas d'échec ou la moitié de ces dégâts en cas de réussite.<br/><strong><em>Emplacement
      de niveau supérieur</em></strong>. Les dégâts augmentent de 1d8 pour chaque
      niveau d'emplacement de sort supérieur à 3.<br/>
