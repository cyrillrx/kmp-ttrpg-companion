id: giant-insect
source: phb_2024
level: 4
school: conjuration
concentration: true
ritual: false
components:
  verbal: true
  somatic: true
  material: false
availableClasses:
- druid
translations:
  en:
    name: Giant Insect
    castingTime: Action
    range: 60 feet
    duration: Concentration, up to 10 minutes
    materialDescription: null
    description: You summon a giant centipede, spider, or wasp (chosen when you cast
      the spell). It manifests in an unoccupied space you can see within range and
      uses the <strong><a href="https://www.aidedd.org/monster/giant-insect">Giant
      Insect</a></strong> stat block. The form you choose determines certain details
      in its stat block. The creature disappears when it drops to 0 Hit Points or
      when the spell ends.<br/>The creature is an ally to you and your allies. In
      combat, the creature shares your Initiative count, but it takes its turn immediately
      after yours. It obeys your verbal commands (no action required by you). If you
      don't issue any, it takes the Dodge action and uses its movement to avoid danger.<br/><strong><em>Using
      a Higher-Level Spell Slot</em></strong>. Use the spell slot's level for the
      spell's level in the stat block.<br/>
  fr:
    name: Insecte géant
    castingTime: Action
    range: 18 m
    duration: Concentration, jusqu'à 10 minutes
    materialDescription: null
    description: Vous invoquez un mille-pattes, une araignée ou une guêpe géante (choisie
      lors du lancement du sort). L'insecte se manifeste dans un espace libre que
      vous pouvez voir à portée et utilise le profil de l'<strong><a href="https://www.aidedd.org/monster/fr/insecte-geant">insecte
      géant</a></strong>. La forme choisie détermine certains détails de son profil.
      La créature disparaît lorsqu'elle tombe à 0 point de vie ou à la fin du sort.<br/>Cette
      créature est votre alliée et celle de vos alliés. En combat, elle partage votre
      Initiative, mais son tour commence immédiatement après le vôtre. Elle obéit
      à vos ordres verbaux (aucune action requise). Si vous n'en donnez pas, elle
      prend l'action Esquive et utilise son mouvement pour éviter le danger.<br/><strong><em>Emplacement
      de niveau supérieur</em></strong>. Utilisez le niveau de l'emplacement de sort
      pour le niveau du sort dans le profil.<br/>
