id: doomtide
source: heroes_of_faerun
level: 4
school: conjuration
concentration: true
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- bard
- cleric
- warlock
translations:
  en:
    name: Doomtide
    castingTime: Action
    range: 120 feet
    duration: Concentration, up to 1 minute
    materialDescription: soot and a dried eel
    description: |-
      You create a 20-foot-radius Sphere of inky fog within range. The fog is magical Darkness and lasts for the duration or until a strong wind (such as the one created by the Gust of Wind spell) disperses it, ending the spell.\
      Each creature in the Sphere when it appears makes a Wisdom saving throw. On a failed save, a creature takes 5d6 Psychic damage and subtracts 1d6 from its saving throws until the end of its next turn. On a successful save, a creature takes half as much damage only. A creature also makes this save when the Sphere moves into its space, when it enters the Sphere, or when it ends its turn inside the Sphere. A creature makes this save only once per turn.\
      The Sphere moves 10 feet away from you at the start of each of your turns.\
      **Casting as a Circle Spell.** Casting this as a Circle spell requires a minimum of five secondary casters. In addition to the spell's usual components, you must provide a special component (a string of three black pearls from Pandemonium), which the spell consumes. The spell's range increases to 1 mile, and its duration increases to until dispelled (no Concentration required). The spell ends early if any caster who participated in this casting contributes to another casting of Doomtide as a Circle spell.\
      When the spell is cast, each secondary caster must expend a level 3+ spell slot; otherwise, the spell fails.\
  fr:
    name: Marée de malheur
    castingTime: Action
    range: 36 m
    duration: Concentration, jusqu'à 1 minute
    materialDescription: de la suie et une anguille séchée
    description: |-
      Vous créez une Sphère de brouillard obscur d'un rayon de 6 mètres à portée. Le brouillard est une Obscurité magique et persiste pour toute la durée ou jusqu'à ce qu'un vent violent (tel que celui créé par le sort Bourrasque) le disperse, mettant fin au sort.\
      Chaque créature dans la Sphère lorsqu'elle apparaît effectue un jet de sauvegarde de Sagesse. En cas d'échec, une créature subit 5d6 dégâts psychiques et soustrait 1d6 de ses jets de sauvegarde jusqu'à la fin de son prochain tour. En cas de réussite, une créature ne subit que la moitié de ces dégâts. Une créature effectue également ce jet de sauvegarde lorsque la Sphère se déplace dans son espace, lorsqu'elle entre dans la Sphère ou lorsqu'elle termine son tour à l'intérieur. Une créature n'effectue ce jet de sauvegarde qu'une seule fois par tour.\
      La Sphère se déplace de 3 mètres en s'éloignant de vous au début de chacun de vos tours.\
      **Incantation en tant que sort de Cercle.** L'incantation de ce sort en tant que sort de Cercle requiert au minimum cinq incantateurs secondaires. En plus des composantes habituelles du sort, vous devez fournir une composante spéciale (un chapelet de trois perles noires de Pandémonium), que le sort consomme. La portée du sort passe à 1,5 km, et sa durée devient jusqu'à dissipation (sans nécessiter de Concentration). Le sort prend fin prématurément si l'un des incantateurs ayant participé à ce lancement contribue à un autre lancement de Marée funeste en tant que sort de Cercle.\
      Lors du lancement du sort, chaque incantateur secondaire doit dépenser un emplacement de sort de niveau 3 ou supérieur ; sinon, le sort échoue.\
