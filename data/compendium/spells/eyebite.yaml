id: eyebite
source: phb_2024
level: 6
school: necromancy
concentration: true
ritual: false
components:
  verbal: true
  somatic: true
  material: false
availableClasses:
- bard
- sorcerer
- warlock
- wizard
translations:
  en:
    name: Eyebite
    castingTime: Action
    range: Self
    duration: Concentration, up to 1 minute
    materialDescription: null
    description: |-
      For the duration, your eyes become an inky void. One creature of your choice within 60 feet of you that you can see must succeed on a Wisdom saving throw or be affected by one of the following effects of your choice for the duration.
      
      On each of your turns until the spell ends, you can take a Magic action to target another creature but can't target a creature again if it has succeeded on a save against this casting of the spell.
      
      **Asleep**. The target has the Unconscious condition. It wakes up if it takes any damage or if another creature takes an action to shake it awake.
      
      **Panicked**. The target has the Frightened condition. On each of its turns, the Frightened target must take the Dash action and move away from you by the safest and shortest route available. If the target moves to a space at least 60 feet away from you where it can't see you, this effect ends.
      
      **Sickened**. The target has the Poisoned condition.
      
  fr:
    name: Mauvais oeil
    castingTime: Action
    range: Personnelle
    duration: Concentration, jusqu'à 1 minute
    materialDescription: null
    description: |-
      Pour toute la durée, vos yeux sont d'un noir d'encre. Une créature que vous choisissez parmi celles que vous voyez dans un rayon de 18 m doit réussir un jet de sauvegarde de Sagesse pour ne pas être affectée par l'un des effets suivants de votre choix, pour toute la durée.
      
      À chacun de vos tours jusqu'à la fin du sort, vous pouvez entreprendre l'action Magie à cibler une autre créature, sans toutefois pouvoir choisir une créature qui a réussi son JdS contre cette incantation du sort.
      
      **Endormie**. La cible subit l'état Inconscient. Elle reprend conscience si elle subit des dégâts ou si une autre créature consacre une action à la secouer.
      
      **Nauséeuse**. La cible subit l'état Empoisonné.
      
      **Paniquée**. La cible subit l'état Effrayé. Ainsi Effrayée, la cible doit à chacun de ses tours entreprendre l'action Pointe et s'éloigner de vous par le chemin le plus sûr et le plus court. Si la cible atteint un espace distant de plus de 18 m de vous d'où elle ne vous voit plus, cet effet prend fin.
