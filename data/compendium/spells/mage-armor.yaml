id: mage-armor
source: phb_2024
level: 1
school: abjuration
concentration: false
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- sorcerer
- wizard
translations:
  en:
    name: Mage Armor
    castingTime: Action
    range: Touch
    duration: 8 hours
    materialDescription: a piece of cured leather
    description: |-
      You touch a willing creature who isn't wearing armor. Until the spell ends, the target's base AC becomes 13 plus its Dexterity modifier. The spell ends early if the target dons armor.\
  fr:
    name: Armure de mage
    castingTime: Action
    range: Contact
    duration: 8 heures
    materialDescription: un morceau de cuir traité
    description: |-
      Vous touchez une créature consentante qui ne porte pas d'armure. Jusqu'à la fin du sort, la CA de base de la cible passe à 13, plus son modificateur de Dextérité. Le sort prend fin prématurément si la cible enfile une armure.\
