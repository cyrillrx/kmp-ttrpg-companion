translations:
  en:
    name: Arcane Vigor
    castingTime: Bonus Action
    range: Self
    duration: Instantaneous
    materialDescription: null
    description: You tap into your life force to heal yourself. Roll one or two of
      your unexpended Hit Point Dice, and regain a number of Hit Points equal to the
      roll's total plus your spellcasting ability modifier. Those dice are then expended.<br/><strong><em>Using
      a Higher-Level Spell Slot</em></strong>. The number of unexpended Hit Dice you
      can roll increases by one for each spell slot level above 2.<br/>
  fr:
    name: Vigueur arcanique
    castingTime: Action bonus
    range: Personnelle
    duration: Instantanée
    materialDescription: null
    description: Vous puisez dans votre force vitale pour vous soigner. Lancez un
      ou deux de vos dés de vie non dépensés et récupérez un nombre de points de vie
      égal au total du jet, plus votre modificateur de caractéristique d'incantation.
      Ces dés sont ensuite dépensés.<br/><strong><em>Emplacement de niveau supérieur</em></strong>.
      Le nombre de dés de vie non dépensés que vous pouvez lancer augmente de un pour
      chaque niveau d'emplacement de sort supérieur à 2.<br/>
