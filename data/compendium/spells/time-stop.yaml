id: time-stop
source: phb_2024
level: 9
school: transmutation
concentration: false
ritual: false
components:
  verbal: true
  somatic: false
  material: false
availableClasses:
- sorcerer
- wizard
translations:
  en:
    name: Time Stop
    castingTime: Action
    range: Self
    duration: Instantaneous
    materialDescription: null
    description: |-
      You briefly stop the flow of time for everyone but yourself. No time passes for other creatures, while you take 1d4 + 1 turns in a row, during which you can use actions and move as normal.

      This spell ends if one of the actions you use during this period, or any effects that you create during it, affects a creature other than you or an object being worn or carried by someone other than you. In addition, the spell ends if you move to a place more than 1,000 feet from the location where you cast it.
  fr:
    name: Arrêt du temps
    castingTime: Action
    range: Personnelle
    duration: Instantanée
    materialDescription: null
    description: |-
      Vous mettez un bref coup d'arrêt à l'écoulement du temps, pour tout le monde sauf vous-même. Le temps s'arrête pour les autres créatures tandis que vous prenez 1d4 +1 tours d'affilée, durant lesquels vous pouvez entreprendre des actions et vous déplacer comme en temps normal.

      Ce sort prend fin si l'une des actions que vous entreprenez durant l'intervalle, ou l'un des effets créés, affecte une créature autre que vous ou un objet porté par quelqu'un d'autre que vous. Il se termine également si vous vous déplacez en un lieu distant de plus de 300 m de l'endroit où vous l'avez lancé.
