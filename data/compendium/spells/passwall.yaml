id: passwall
source: phb_2024
level: 5
school: transmutation
concentration: false
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- wizard
translations:
  en:
    name: Passwall
    castingTime: Action
    range: 30 feet
    duration: 1 hour
    materialDescription: a pinch of sesame seeds
    description: |-
      A passage appears at a point that you can see on a wooden, plaster, or stone surface (such as a wall, ceiling, or floor) within range and lasts for the duration. You choose the opening's dimensions: up to 5 feet wide, 8 feet tall, and 20 feet deep. The passage creates no instability in a structure surrounding it.
      
      When the opening disappears, any creatures or objects still in the passage created by the spell are safely ejected to an unoccupied space nearest to the surface on which you cast the spell.
      
  fr:
    name: Passe-muraille
    castingTime: Action
    range: 9 m
    duration: 1 heure
    materialDescription: une pincée de graines de sésame
    description: |-
      Un passage apparaît à un endroit que vous pouvez voir sur une surface en bois, en plâtre ou en pierre (comme un mur, un plafond ou un sol) à portée et persiste pendant toute la durée du sort. Vous choisissez les dimensions de l'ouverture : jusqu'à 1,50 m de large, 2,50 m de haut et 6 m de profondeur. Le passage ne crée aucune instabilité dans la structure environnante.
      
      Lorsque l'ouverture disparaît, toutes les créatures ou objets encore présents dans le passage créé par le sort sont éjectés en toute sécurité vers un espace libre proche de la surface sur laquelle vous avez lancé le sort.
