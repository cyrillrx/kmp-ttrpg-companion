translations:
  en:
    name: Revivify
    castingTime: Action
    range: Touch
    duration: Instantaneous
    materialDescription: a diamond worth 300+ GP, which the spell consumes
    description: |-
      You touch a creature that has died within the last minute. That creature revives with 1 Hit Point. This spell can't revive a creature that has died of old age, nor does it restore any missing body parts.\
  fr:
    name: Retour à la vie
    castingTime: Action
    range: Contact
    duration: Instantanée
    materialDescription: un diamant d'une valeur minimale de 300 po, que le sort consomme
    description: |-
      Vous touchez une créature morte dans la dernière minute. Cette créature ressuscite avec 1 point de vie. Ce sort ne peut pas ressusciter une créature morte de vieillesse, ni restaurer les parties manquantes de son corps.\
