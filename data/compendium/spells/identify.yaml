id: identify
source: phb_2024
level: 1
school: divination
concentration: false
ritual: true
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- bard
- wizard
translations:
  en:
    name: Identify
    castingTime: 1 minute or Ritual
    range: Touch
    duration: Instantaneous
    materialDescription: a pearl worth 100+ GP
    description: |-
      You touch an object throughout the spell's casting. If the object is a magic item or some other magical object, you learn its properties and how to use them, whether it requires Attunement, and how many charges it has, if any. You learn whether any ongoing spells are affecting the item and what they are. If the item was created by a spell, you learn that spell's name.

      If you instead touch a creature throughout the casting, you learn which ongoing spells, if any, are currently affecting it.
  fr:
    name: Identification
    castingTime: 1 minute ou Rituel
    range: Contact
    duration: Instantanée
    materialDescription: une perle d'une valeur minimale de 100 po
    description: |-
      Vous touchez un objet pendant l'incantation du sort. S'il s'agit d'un objet magique, vous connaissez ses propriétés et son utilisation, si un lien est nécessaire et combien de charges il possède, le cas échéant. Vous savez si des sorts en cours affectent l'objet et lesquels. Si l'objet a été créé par un sort, vous connaissez le nom de ce sort.

      Si par contre vous touchez une créature pendant l'incantation, vous savez quels sorts l'affectent, le cas échéant.
