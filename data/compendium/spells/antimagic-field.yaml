id: antimagic-field
source: phb_2024
level: 8
school: abjuration
concentration: true
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- cleric
- wizard
translations:
  en:
    name: Antimagic Field
    castingTime: Action
    range: Self
    duration: Concentration, up to 1 hour
    materialDescription: iron filings
    description: An aura of antimagic surrounds you in 10-foot Emanation. No one can
      cast spells, take Magic actions, or create other magical effects inside the
      aura, and those things can't target or otherwise affect anything inside it.
      Magical properties of magic items don't work inside the aura or on anything
      inside it.<br/>Areas of effect created by spells or other magic can't extend
      into the aura, and no one can teleport into or out of it or use planar travel
      there. Portals close temporarily while in the aura.<br/>Ongoing spells, except
      those cast by an Artifact or a deity, are suppressed in the area. While an effect
      is suppressed, it doesn't function, but the time it spends suppressed counts
      against its duration.<br/><em><a href="./dispel-magic">Dispel Magic</a></em>
      has no effect on the aura, and the auras created by different <em>Antimagic
      Field</em> spells don't nullify each other.<br/>
  fr:
    name: Champ antimagie
    castingTime: Action
    range: Personnelle
    duration: Concentration, jusqu'à 1 heure
    materialDescription: limaille de fer
    description: Une aura d'antimagie vous entoure sous forme d'une Émanation de 3
      m. Nul ne peut lancer de sorts dans la zone, ni y entreprendre l'action Magie
      ou y produire des effets magiques. De tels effets, quelle que soit leur source,
      n'ont en outre aucun effet sur les cibles dans la zone. Les propriétés magiques
      des objets magiques ne fonctionnent pas à l'intérieur de l'aura ni sur ce qui
      s'y trouve.<br/>Les zones d'effet produites par des sorts ou effets magiques
      n'englobent pas l'aura et nul ne peut se téléporter ou recourir au voyage planaire
      pour entrer dans l'aura ou en sortir. Les portails sont fermés tant qu'ils sont
      dans l'aura.<br/>Les sorts en cours, à l'exception de ceux qui émanent d'un
      artefact ou d'une divinité, sont réprimés dans l'aura. Tant qu'un effet est
      réprimé, il n'est pas actif, mais tout le temps qu'il passe ainsi réprimé est
      décompté de sa durée.<br/><em><a href="./fr/dissipation-de-la-magie">Dissipation
      de la magie</a></em> reste sans effet sur l'aura, et les auras créées par plusieurs
      sorts <em>champ antimagie</em> ne s'annulent pas mutuellement.<br/>
