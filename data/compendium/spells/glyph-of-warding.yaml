id: glyph-of-warding
source: phb_2024
level: 3
school: abjuration
concentration: false
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- bard
- cleric
- wizard
translations:
  en:
    name: Glyph of Warding
    castingTime: 1 hour
    range: Touch
    duration: Until dispelled or triggered
    materialDescription: powdered diamond worth 200+ GP, which the spell consumes
    description: You inscribe a glyph that later unleashes a magical effect. You inscribe
      it either on a surface (such as a table or a section of floor) or within an
      object that can be closed (such as a book or chest) to conceal the glyph. The
      glyph can cover an area no larger than 10 feet in diameter. If the surface or
      object is moved more than 10 feet from where you cast this spell, the glyph
      is broken, and the spell ends without being triggered.<br/>The glyph is nearly
      imperceptible and requires a successful Wisdom (Perception) check against your
      spell save DC to notice.<br/>When you inscribe the glyph, you set its trigger
      and choose whether it's an explosive rune or a spell glyph, as explained below.<br/><strong>Set
      the Trigger</strong>. You decide what triggers the glyph when you cast the spell.
      For glyphs inscribed on a surface, common triggers include touching or stepping
      on the glyph, removing another object covering it, or approaching within a certain
      distance of it. For glyphs inscribed within an object, common triggers include
      opening that object or seeing the glyph. Once a glyph is triggered, this spell
      ends.<br/>You can refine the trigger so that only creatures of certain types
      activate it (for example, the glyph could be set to affect Aberrations). You
      can also set conditions for creatures that don't trigger the glyph, such as
      those who say a certain password.<br/><strong>Explosive Rune</strong>. When
      triggered, the glyph erupts with magical energy in a 20-foot-radius Sphere centered
      on the glyph. Each creature in the area makes a Dexterity saving throw. A creature
      takes 5d8 Acid, Cold, Fire, Lightning, or Thunder damage (your choice when you
      create the glyph) on a failed save or half as much damage on a successful one.<br/><strong>Spell
      Glyph</strong>. You can store a prepared spell of level 3 or lower in the glyph
      by casting it as part of creating the glyph. The spell must target a single
      creature or an area. The spell being stored has no immediate effect when cast
      in this way.<br/>When the glyph is triggered, the stored spell takes effect.
      If the spell has a target, it targets the creature that triggered the glyph.
      If the spell affects an area, the area is centered on that creature. If the
      spell summons Hostile creatures or creates harmful objects or traps, they appear
      as close as possible to the intruder and attack it. If the spell requires Concentration,
      it lasts until the end of its full duration.<br/><strong><em>Using a Higher-Level
      Spell Slot</em></strong>. The damage of an explosive rune increases by 1d8 for
      each spell slot level above 3. If you create a spell glyph, you can store any
      spell of up to the same level as the spell slot you use for the <em>Glyph of
      Warding</em>.<br/>
  fr:
    name: Glyphe de garde
    castingTime: 1 heure
    range: Contact
    duration: Jusqu'à dissipation ou déclenchement
    materialDescription: poudre de diamant d'une valeur minimale de 200 po, que le
      sort consomme
    description: Vous inscrivez un glyphe qui déclenche ensuite un effet magique.
      Vous l'inscrivez soit sur une surface (comme une table ou un morceau de sol),
      soit dans un objet pouvant être fermé (comme un livre ou un coffre) pour le
      dissimuler. Le glyphe peut couvrir une zone ne dépassant pas 3 mètres de diamètre.
      Si la surface ou l'objet est déplacé à plus de 3 mètres de l'endroit où vous
      avez lancé le sort, le glyphe est brisé et le sort prend fin sans être déclenché.<br/>Le
      glyphe est presque imperceptible et nécessite un jet de Sagesse (Perception)
      réussi contre le DD de sauvegarde de votre sort pour le remarquer.<br/>Lorsque
      vous inscrivez le glyphe, vous définissez son déclencheur et choisissez s'il
      s'agit d'une rune explosive ou d'un glyphe à sort, comme expliqué ci-dessous.<br/><strong>Déclencheur</strong>.
      Vous décidez ce qui déclenche le glyphe lorsque vous lancez le sort. Pour les
      glyphes inscrits sur une surface, les déclencheurs courants incluent le fait
      de toucher ou de marcher dessus, de retirer un autre objet le recouvrant ou
      de s'en approcher à une certaine distance. Pour les glyphes inscrits dans un
      objet, les déclencheurs courants incluent l'ouverture de cet objet ou la vue
      du glyphe. Une fois le glyphe déclenché, le sort prend fin.<br/>Vous pouvez
      affiner le déclencheur afin que seules les créatures de certains types l'activent
      (par exemple, le glyphe pourrait être configuré pour affecter les Aberrations).
      Vous pouvez également définir des conditions pour les créatures qui ne déclenchent
      pas le glyphe, comme celles qui prononcent un mot de passe particulier.<br/><strong>Rune
      explosive</strong>. Lorsqu'il est déclenché, une énergie magique jaillit du
      glyphe en une Sphère de 6 mètres de rayon centrée sur le glyphe. Chaque créature
      dans la zone effectue un jet de sauvegarde de Dextérité. Une créature subit
      5d8 dégâts d'acide, de froid, de feu, de foudre ou de tonnerre (au choix lors
      de la création du glyphe) en cas d'échec, ou la moitié de ces dégâts en cas
      de réussite.<br/><strong>Glyphe à sort</strong>. Vous pouvez stocker un sort
      préparé de niveau 3 ou inférieur dans le glyphe en le lançant lors de la création
      du glyphe. Le sort doit cibler une seule créature ou une zone. Le sort stocké
      n'a pas d'effet immédiat lorsqu'il est lancé de cette manière.<br/>Lorsque le
      glyphe est déclenché, le sort stocké prend effet. Si le sort a une cible, il
      cible la créature qui a déclenché le glyphe. Si le sort affecte une zone, la
      zone est centrée sur cette créature. Si le sort invoque des créatures hostiles
      ou crée des objets ou des pièges nuisibles, celles-ci apparaissent au plus près
      de l'intrus et l'attaquent. Si le sort requiert de la Concentration, il dure
      jusqu'à la fin de sa durée totale.<br/><strong><em>Emplacement de niveau supérieur</em></strong>.
      Les dégâts d'une rune explosive augmentent de 1d8 pour chaque niveau d'emplacement
      de sort supérieur à 3. Si vous créez un glyphe de sort, vous pouvez stocker
      n'importe quel sort jusqu'à un niveau identique à celui de l'emplacement de
      sort utilisé pour le <em>glyphe de garde</em>.<br/>
