translations:
  en:
    name: Find Traps
    castingTime: Action
    range: 120 feet
    duration: Instantaneous
    materialDescription: null
    description: You sense any trap within range that is within line of sight. A trap,
      for the purpose of this spell, includes any object or mechanism that was created
      to cause damage or other danger. Thus, the spell would sense the <em><a href="./alarm">Alarm</a></em>
      or <em><a href="./glyph-of-warding">Glyph of Warding</a></em> spell or a mechanical
      pit trap, but it wouldn't reveal a natural weakness in the floor, an unstable
      ceiling, or a hidden sinkhole.<br/>This spell reveals that a trap is present
      but not its location. You do learn the general nature of the danger posed by
      a trap you sense.<br/>
  fr:
    name: Détection des pièges
    castingTime: Action
    range: 36 m
    duration: Instantanée
    materialDescription: null
    description: Vous détectez tout piège à portée qui se trouve dans votre champ
      de vision. Un piège, pour ce sort, inclut tout objet ou mécanisme créé pour
      causer des dégâts ou tout autre danger. Ainsi, le sort peut détecter les sorts
      <em><a href="./fr/alarme">alarme</a></em> ou <em><a href="./fr/glyphe-de-garde">glyphe
      de garde</a></em>, ou un piège mécanique, mais ne révélerait pas une faiblesse
      naturelle du sol, un plafond instable ou un gouffre caché.<br/>Ce sort révèle
      la présence d'un piège, mais pas son emplacement. Vous apprenez la nature générale
      du danger que représente un piège détecté.<br/>
