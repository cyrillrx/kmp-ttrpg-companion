id: feign-death
source: phb_2024
level: 3
school: necromancy
concentration: false
ritual: true
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- bard
- cleric
- druid
- wizard
translations:
  en:
    name: Feign Death
    castingTime: Action or Ritual
    range: Touch
    duration: 1 hour
    materialDescription: a pinch of graveyard dirt
    description: |-
      You touch a willing creature and put it into a cataleptic state that is indistinguishable from death.\
      For the duration, the target appears dead to outward inspection and to spells used to determine the target's status. The target has the Blinded and Incapacitated conditions, and its Speed is 0.\
      The target also has Resistance to all damage except Psychic damage, and it has Immunity to the Poisoned condition.\
  fr:
    name: État cadavérique
    castingTime: Action ou Rituel
    range: Contact
    duration: 1 heure
    materialDescription: une pincée de terre de cimetière
    description: |-
      Vous touchez une créature consentante et la plongez dans un état cataleptique impossible à distinguer de la mort.\
      Pendant la durée du sort, la cible paraît morte à une inspection extérieure et aux sorts utilisés pour déterminer son état. Elle subit les états Aveuglé et Incapable d'agir, et sa Vitesse est de 0.\
      Elle bénéficie également d'une résistance à tous les dégâts, sauf les dégâts psychiques, et d'une immunité à l'état Empoisonné.\
