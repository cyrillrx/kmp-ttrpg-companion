translations:
  en:
    name: Animal Shapes
    castingTime: Action
    range: 30 feet
    duration: 24 hours
    materialDescription: null
    description: Choose any number of willing creatures that you can see within range.
      Each target shape-shifts into a Large or smaller Beast of your choice that has
      a Challenge Rating of 4 or lower. You can choose a different form for each target.
      On later turns, you can take a Magic action to transform the targets again.<br/>A
      target's game statistics are replaced by the chosen Beast's statistics, but
      the target retains its creature type; Hit Points; Hit Point Dice; alignment;
      ability to communicate; and Intelligence, Wisdom, and Charisma scores. The target's
      actions are limited by the Beast form's anatomy, and it can't cast spells. The
      target's equipment melds into the new form, and the target can't use any of
      that equipment while in that form.<br/>The target gains a number of Temporary
      Hit Points equal to the Hit Points of the first form into which it shape-shifts.
      These Temporary Hit Points vanish if any remain when the spell ends. The transformation
      lasts for the duration or until the target ends it as a Bonus Action.<br/>
  fr:
    name: Métamorphose animale
    castingTime: Action
    range: 9 m
    duration: 24 heures
    materialDescription: null
    description: Choisissez autant de créatures consentantes que vous souhaitez, parmi
      celles que vous voyez à portée. Chaque cible se transforme en Bête de taille
      G ou inférieure de votre choix, dont le facteur de puissance ne dépasse pas
      4. Vous pouvez opter pour une forme différente pour chaque cible. Aux tours
      suivants, vous pouvez entreprendre l'action Magie pour de nouveau transformer
      les cibles.<br/>Le profil de jeu de chaque cible est remplacé par celui de la
      Bête choisie, à l'exception de son type de créature, de ses points de vie et
      dés de vie, de sa faculté de communication, de son alignement et de ses valeurs
      d'Intelligence, Sagesse et Charisme, qui restent les siens. Les actions de la
      cible sont limitées par l'anatomie de la Bête retenue et elle ne peut pas lancer
      de sorts. L'équipement porté par la cible se fond dans sa nouvelle forme, sachant
      qu'elle ne peut pas recourir à cet équipement tant qu'elle reste sous cette
      forme.<br/>La cible reçoit autant de points de vie temporaires que les points
      de vie de la première forme adoptée. Ces points de vie temporaires disparaissent
      s'il en reste à la fin du sort. La transformation persiste pour toute la durée,
      sauf si la cible y met un terme par une action Bonus.<br/>
