id: searing-smite
source: phb_2024
level: 1
school: evocation
concentration: false
ritual: false
components:
  verbal: true
  somatic: false
  material: false
availableClasses:
- paladin
translations:
  en:
    name: Searing Smite
    castingTime: Bonus Action, which you take immediately after hitting a target with
      a Melee weapon or an Unarmed Strike
    range: Self
    duration: 1 minute
    materialDescription: null
    description: |-
      As you hit the target, it takes an extra 1d6 Fire damage from the attack. At the start of each of its turns until the spell ends, the target takes 1d6 Fire damage and then makes a Constitution saving throw. On a failed save, the spell continues. On a successful save, the spell ends.
      
      ***Using a Higher-Level Spell Slot***. All the damage increases by 1d6 for each spell slot level above 1.
      
  fr:
    name: Châtiment de fournaise
    castingTime: Action bonus, que vous prenez immédiatement après avoir touché une
      cible avec une arme de corps à corps ou une frappe à mains nues
    range: Personnelle
    duration: 1 minute
    materialDescription: null
    description: |-
      Lorsque vous touchez la cible, elle subit 1d6 dégâts de feu supplémentaires. Au début de chacun de ses tours jusqu'à la fin du sort, la cible subit 1d6 dégâts de feu, puis effectue un jet de sauvegarde de Constitution. En cas d'échec, le sort continue. En cas de réussite, le sort prend fin.
      
      ***Emplacement de niveau supérieur***. Tous les dégâts augmentent de 1d6 pour chaque niveau d'emplacement de sort supérieur à 1.
