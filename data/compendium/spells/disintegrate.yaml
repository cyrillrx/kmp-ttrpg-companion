id: disintegrate
source: phb_2024
level: 6
school: transmutation
concentration: false
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- sorcerer
- wizard
translations:
  en:
    name: Disintegrate
    castingTime: Action
    range: 60 feet
    duration: Instantaneous
    materialDescription: a lodestone and dust
    description: |-
      You launch a green ray at a target you can see within range. The target can be a creature, a nonmagical object, or a creation of magical force, such as the wall created by *[Wall of Force](./wall-of-force)*.

      A creature targeted by this spell makes a Dexterity saving throw. On a failed save, the target takes 10d6 + 40 Force damage. If this damage reduces it to 0 Hit Points, it and everything nonmagical it is wearing and carrying are disintegrated into gray dust. The target can be revived only by a *[True Resurrection](./true-resurrection)* or a *[Wish](./wish)* spell.

      This spell automatically disintegrates a Large or smaller nonmagical object or a creation of magical force. If such a target is Huge or larger, this spell disintegrates a 10-foot-Cube portion of it.

      ***Using a Higher-Level Spell Slot***. The damage increases by 3d6 for each spell slot level above 6.
  fr:
    name: Désintégration
    castingTime: Action
    range: 18 m
    duration: Instantanée
    materialDescription: une magnétite et de la poussière
    description: |-
      Vous projetez un rayon vert vers une cible que vous voyez à portée. La cible peut être une créature, un objet non magique ou une création de force magique, telle que la paroi formée par *[mur de force](./fr/mur-de-force)*.

      Une créature ciblée par ce sort effectue un jet de sauvegarde de Dextérité. En cas d'échec, elle subit 10d6 + 40 dégâts de force. Si ces dégâts la font tomber à 0 point de vie, elle est désintégrée en poussière grise avec tout objet non magique ce qu'elle porte. La cible ne peut être ramenée à la vie que par *[résurrection suprême](./fr/resurrection-supreme)* ou *[souhait](./fr/souhait)*.

      Ce sort désintègre automatiquement un objet de taille G ou inférieure non magique, de même qu'une création de force magique dans la limite de cette taille. Dans le cas d'une taille TG ou supérieure, la désintégration ne concerne qu'une portion équivalente à un Cube de 3 m.

      ***Emplacement de niveau supérieur***. Les dégâts augmentent de 3d6 par chaque niveau d'emplacement de sort supérieur à 6.
