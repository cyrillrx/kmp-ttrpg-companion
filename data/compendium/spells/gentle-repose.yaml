id: gentle-repose
source: phb_2024
level: 2
school: necromancy
concentration: false
ritual: true
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- cleric
- paladin
- wizard
translations:
  en:
    name: Gentle Repose
    castingTime: Action or Ritual
    range: Touch
    duration: 10 days
    materialDescription: 2 copper pieces, which the spell consumes
    description: You touch a corpse or other remains. For the duration, the target
      is protected from decay and can't become Undead.<br/>The spell also effectively
      extends the time limit on raising the target from the dead, since days spent
      under the influence of this spell don't count against the time limit of spells
      such as <em><a href="./raise-dead">Raise Dead</a></em>.<br/>
  fr:
    name: Doux repos
    castingTime: Action ou Rituel
    range: Contact
    duration: 10 jours
    materialDescription: 2 pièces de cuivre, que le sort consomme
    description: Vous touchez un cadavre ou d'autres restes. Pendant la durée du sort,
      la cible est protégée de la décomposition et ne peut pas devenir un mort-vivant.<br/>Ce
      sort prolonge également le délai de résurrection de la cible, car les jours
      passés sous son influence ne sont pas décomptés du délai de résurrection de
      sorts tels que <em><a href="./fr/rappel-a-la-vie">rappel à la vie</a></em>.<br/>
