id: summon-elemental
source: phb_2024
level: 4
school: conjuration
concentration: true
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- druid
- ranger
- wizard
translations:
  en:
    name: Summon Elemental
    castingTime: Action
    range: 90 feet
    duration: Concentration, up to 1 hour
    materialDescription: air, a pebble, ash, and water inside a gold-inlaid vial worth
      400+ GP
    description: |-
      You call forth an Elemental spirit. It manifests in an unoccupied space that you can see within range and uses the **[Elemental Spirit](https://www.aidedd.org/monster/elemental-spirit)** stat block. When you cast the spell, choose an element: Air, Earth, Fire, or Water. The creature resembles a bipedal form wreathed in the chosen element, which determines certain details in its stat block. The creature disappears when it drops to O Hit Points or when the spell ends.

      The creature is an ally to you and your allies. In combat, the creature shares your Initiative count but it takes its turn immediately after yours. It obeys your verbal commands (no action required by you). If you don't issue any, it takes the Dodge action and uses its movement to avoid danger.

      ***Using a Higher-Level Spell Slot***. Use the spell slot's level for the spell's level in the stat block.
  fr:
    name: Convocation d'élémentaire
    castingTime: Action
    range: 27 m
    duration: Concentration, jusqu'à 1 heure
    materialDescription: de l'air, un caillou, des cendres et de l'eau dans un flacon
      incrusté d'or d'une valeur minimale de 400 po
    description: |-
      Vous invoquez l'esprit d'un élémentaire. Celui-ci se manifeste dans un espace libre que vous pouvez voir à portée et utilise le profil de l'**[esprit élémentaire](https://www.aidedd.org/monster/fr/esprit-elementaire)**. Lorsque vous lancez le sort, choisissez un élément : Air, Terre, Feu ou Eau. La créature ressemble à une forme bipède enveloppée dans l'élément choisi, ce qui détermine certains détails de son profil. La créature disparaît lorsqu'elle tombe à 0 point de vie ou à la fin du sort.

      Cette créature est votre alliée et celle de vos alliés. En combat, elle partage votre Initiative, mais son tour commence immédiatement après le vôtre. Elle obéit à vos ordres verbaux (aucune action requise). Si vous n'en donnez pas, elle prend l'action Esquive et utilise son mouvement pour éviter le danger.

      ***Emplacement de niveau supérieur***. Utilisez le niveau de l'emplacement de sort pour le niveau du sort dans le profil.
