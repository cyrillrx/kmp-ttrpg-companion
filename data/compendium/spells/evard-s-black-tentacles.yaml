id: evard-s-black-tentacles
source: phb_2024
level: 4
school: conjuration
concentration: true
ritual: false
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- wizard
translations:
  en:
    name: Evard's Black Tentacles
    castingTime: Action
    range: 90 feet
    duration: Concentration, up to 1 minute
    materialDescription: a tentacle
    description: |-
      Squirming, ebony tentacles fill a 20-foot square on ground that you can see within range. For the duration, these tentacles turn the ground in that area into Difficult Terrain.

      Each creature in that area makes a Strength saving throw. On a failed save, it takes 3d6 Bludgeoning damage, and it has the Restrained condition until the spell ends. A creature also makes that save if it enters the area or ends it turn there. A creature makes that save only once per turn.

      A Restrained creature can take an action to make a Strength (Athletics) check against your spell save DC, ending the condition on itself on a success.
  fr:
    name: Tentacules noirs d'Evard
    castingTime: Action
    range: 27 m
    duration: Concentration, jusqu'à 1 minute
    materialDescription: un tentacule
    description: |-
      Des tentacules noirs se tortillant occupent une zone de 6 mètres de côté que vous pouvez voir à portée. Pendant la durée du sort, ces tentacules transforment le sol de cette zone en Terrain difficile.

      Toute créature présente dans cette zone effectue un jet de sauvegarde de Force. En cas d'échec, elle subit 3d6 dégâts contondants et l'état Entravé jusqu'à la fin du sort. Une créature effectue également ce jet de sauvegarde si elle entre dans la zone ou y termine son tour. Une créature n'effectue ce jet qu'une seule fois par tour.

      Une créature entravée peut effectuer un jet de Force (Athlétisme) contre le DD de sauvegarde de votre sort, mettant fin à son état en cas de réussite.
