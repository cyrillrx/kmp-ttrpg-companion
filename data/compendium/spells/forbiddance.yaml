id: forbiddance
source: phb_2024
level: 6
school: abjuration
concentration: false
ritual: true
components:
  verbal: true
  somatic: true
  material: true
availableClasses:
- cleric
translations:
  en:
    name: Forbiddance
    castingTime: 10 minutes or Ritual
    range: Touch
    duration: 1 day
    materialDescription: ruby dust worth 1,000+ GP
    description: |-
      You create a ward against magical travel that protects up to 40,000 square feet of floor space to a height of 30 feet above the floor. For the duration, creatures can't teleport into the area or use portals, such as those created by the <em><a href="./gate">Gate</a></em> spell, to enter the area. The spell proofs the area against planar travel, and therefore prevents creatures from accessing the area by way of the Astral Plane, the Ethereal Plane, the Feywild, the Shadowfell, or the <em><a href="./plane-shift">Plane Shift</a></em> spell.<br/>In addition, the spell damages types of creatures that you choose when you cast it. Choose one or more of the following: Aberrations, Celestials, Elementals, Fey, Fiends, and Undead. When a creature of a chosen type enters the spell's area for the first time on a turn or ends its turn there, the creature takes 5d10 Radiant or Necrotic damage (your choice when you cast this spell).<br/>You can designate a password when you cast the spell. A creature that speaks the password as it enters the area takes no damage from the spell.<br/>The spell's area can't overlap with the area of another <em>Forbiddance</em> spell. If you cast <em>Forbiddance</em> every day for 30 days in the same location, the spell lasts until it is dispelled, and the Material components are consumed on the last casting.<br/>
  fr:
    name: Interdiction
    castingTime: 10 minutes ou Rituel
    range: Contact
    duration: 1 jour
    materialDescription: poudre de rubis d'une valeur minimale de 1000 po
    description: |-
      Vous créez une barrière contre le voyage magique qui protège jusqu'à 3 600 m2 d'espace au sol, sur une hauteur de 9 m. Pour toute la durée, aucune créature ne peut se téléporter dans la zone ou y pénétrer par le biais d'un accès magique comme celui que crée le sort <em><a href="./fr/portail">portail</a></em>. Le sort proscrit tout voyage planaire dans la zone, ce qui empêche quiconque de s'y rendre depuis le Plan Astral, le Plan Éthéré, la Féerie ou la Gisombre, ou par le biais du sort <em><a href="./fr/changement-de-plan">changement de plan</a></em>.<br/>De plus, le sort inflige des dégâts aux types de créature que vous désignez à l'incantation. Choisissez un ou plusieurs types parmi les suivants : Aberrations, Célestes, Élémentaires, Fées, Fiélons et Morts-vivants. Lorsqu'une créature désignée entre dans la zone pour la première fois d'un tour ou y termine son tour, elle subit 5d10 dégâts nécrotiques ou radiants (vous choisissez à l'incantation du sort).<br/>Vous pouvez choisir un mot de passe à l'incantation du sort. Une créature qui prononce ce sésame en pénétrant dans la zone ne subit aucun dégât du sort.<br/>La zone du sort ne peut pas chevaucher celle d'un autre sort d'<em>interdiction</em>. Si vous lancez chaque jour <em>interdiction</em> au même endroit pendant 30 jours, le sort persiste jusqu'à dissipation, les composantes matérielles étant détruites à la dernière incantation.<br/>
