    castingTime: Action
    range: 36 m
    duration: Instantanée
    materialDescription: null
    description: Vous lancez trois rayons de feu. Vous pouvez les lancer sur une cible
      à portée ou sur plusieurs. Effectuez une attaque de sort à distance pour chaque
      rayon. Si l'attaque touche, la cible subit 2d6 dégâts de Feu.<br/><strong><em>Emplacement
