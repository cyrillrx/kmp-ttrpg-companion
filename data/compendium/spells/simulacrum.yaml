translations:
  en:
    name: Simulacrum
    castingTime: 12 hours
    range: Touch
    duration: Until dispelled
    materialDescription: powdered ruby worth 1,500+ GP, which the spell consumes
    description: You create a simulacrum of one Beast or Humanoid that is within 10
      feet of you for the entire casting of the spell. You finish the casting by touching
      both the creature and a pile of ice or snow that is the same size as that creature,
      and the pile turns into the simulacrum, which is a creature. It uses the game
      statistics of the original creature at the time of casting, except it is a Construct,
      its Hit Point maximum is half as much, and it can't cast this spell.<br/>The
      simulacrum is Friendly to you and creatures you designate. It obeys your commands
      and acts on your turn in combat. The simulacrum can't gain levels, and it can't
      take Short or Long Rests.<br/>If the simulacrum takes damage, the only way to
      restore its Hit Points is to repair it as you take a Long Rest, during which
      you expend components worth 100 GP per Hit Point restored. The simulacrum must
      stay within 5 feet of you for the repair.<br/>The simulacrum lasts until it
      drops to 0 Hit Points, at which point it reverts to snow and melts away. If
      you cast this spell again, any simulacrum you created with this spell is instantly
      destroyed.<br/>
  fr:
    name: Simulacre
    castingTime: 12 heures
    range: Contact
    duration: Jusqu'à dissipation
    materialDescription: poudre de rubis d'une valeur minimale de 1500 po, que le
      sort consomme
    description: 'Vous façonnez un simulacre d''une Bête ou d''un Humanoïde qui se
      trouve dans un rayon de 3 m pendant tout le temps d''incantation du sort. Vous
      terminez l''incantation en touchant physiquement la créature en même temps qu''un
      tas de neige ou de glace de même taille que la créature, le tas prenant alors
      la forme du simulacre ; une nouvelle créature. Il reprend le profil de la créature
      d''origine au moment de l''incantation, si ce n''est qu''il s''agit d''un Artificiel,
      que son maximum de points de vie est moitié moindre et qu''il ne peut pas lancer
      de sorts.<br/>Le simulacre est Amical envers vous et les créatures que vous
      désignez. Il obéit à vos ordres et agit à votre tour au combat. Le simulacre
      ne peut pas gagner de niveaux ni prendre de Repos, courts ou longs.<br/>Si le
      simulacre subit des dégâts, le seul moyen de lui restituer des points de vie
      consiste à le réparer lors d''un Repos long de votre part, durant lequel vous
      devez dépenser des composantes : l''équivalent de 100 po par point de vie restitué.
      Le simulacre doit rester dans un rayon de 1,50 m de vous durant toute l''opération.<br/>Le
      simulacre persiste jusqu''à ce qu''il tombe à 0 point de vie, après quoi il
      retrouve sa substance aqueuse et fond. Si vous relancez ce sort, tout autre
      simulacre actif que vous avez créé par ce même sort est aussitôt détruit.<br/>'
