name: KMP Client CI

on:
  pull_request:
    branches: [main]
    paths: ['cmp-ttrpg-companion/**']
  push:
    branches: [main]
    paths: ['cmp-ttrpg-companion/**']
  workflow_dispatch:

jobs:
  kmp-tests:
    name: CMP Client - JVM Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        working-directory: cmp-ttrpg-companion
        run: chmod +x gradlew

      - name: Run JVM tests and generate Kover reports
        working-directory: cmp-ttrpg-companion
        run: ./gradlew jvmTest koverXmlReportJvm --no-daemon

      - name: Upload Kover reports
        uses: actions/upload-artifact@v4
        with:
          name: kover-reports
          path: |
            cmp-ttrpg-companion/composeApp/build/reports/kover/reportJvm.xml
            cmp-ttrpg-companion/shared/core/build/reports/kover/reportJvm.xml

  sonar:
    name: CMP Client - SonarCloud
    runs-on: ubuntu-latest
    needs: kmp-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for Sonar branch/PR analysis

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        working-directory: cmp-ttrpg-companion
        run: chmod +x gradlew

      - name: Download Kover reports
        uses: actions/download-artifact@v4
        with:
          name: kover-reports
          path: cmp-ttrpg-companion

      - name: SonarCloud analysis
        working-directory: cmp-ttrpg-companion
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar --no-daemon --no-configuration-cache
