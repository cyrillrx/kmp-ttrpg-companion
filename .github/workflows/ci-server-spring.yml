name: Spring Server CI

on:
  pull_request:
    branches: [main]
    paths: ['spring-server/**']
  push:
    branches: [main]
    paths: ['spring-server/**']
  workflow_dispatch:

jobs:
  spring-server-tests:
    name: Spring Server - Tests & Sonar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for Sonar branch/PR analysis

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        working-directory: spring-server
        run: chmod +x gradlew

      - name: Run tests and generate Kover report
        working-directory: spring-server
        run: ./gradlew test koverXmlReport --no-daemon

      - name: SonarCloud analysis
        working-directory: spring-server
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar --no-daemon
