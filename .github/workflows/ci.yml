name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  kmp-tests:
    name: CMP Client - JVM Tests & Sonar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for Sonar branch/PR analysis

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        working-directory: cmp-ttrpg-companion
        run: chmod +x gradlew

      - name: Run JVM tests and generate Kover reports
        working-directory: cmp-ttrpg-companion
        run: ./gradlew jvmTest koverXmlReportJvm --no-daemon

      - name: SonarCloud analysis
        working-directory: cmp-ttrpg-companion
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar --no-daemon --no-configuration-cache

  rust-server-tests:
    name: Rust Server - Build, Test & Clippy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Build
        working-directory: server-rust
        run: cargo build

      - name: Test
        working-directory: server-rust
        run: cargo test

      - name: Clippy
        working-directory: server-rust
        run: cargo clippy -- -D warnings

  spring-server-tests:
    name: Spring Server - Tests & Sonar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for Sonar branch/PR analysis

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        working-directory: spring-server
        run: chmod +x gradlew

      - name: Run tests and generate Kover report
        working-directory: spring-server
        run: ./gradlew test koverXmlReport --no-daemon

      - name: SonarCloud analysis
        working-directory: spring-server
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar --no-daemon
