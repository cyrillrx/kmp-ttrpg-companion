// Compose stability configuration.
//
// Domain entities are effectively immutable value holders (all `val`, collections exposed read-only
// and never mutated after construction). They live in the pure-Kotlin `shared/core` module and must
// not depend on Compose, so they cannot be annotated `@Immutable`. Declaring them stable here lets
// Compose skip list items by value equality instead of by instance reference.
com.cyrillrx.core.domain.**
com.cyrillrx.rpg.spell.domain.**
com.cyrillrx.rpg.creature.domain.**
com.cyrillrx.rpg.magicalitem.domain.**
com.cyrillrx.rpg.character.domain.**
