// Compose stability configuration.
//
// The domain entities below are fully immutable value holders (all `val`, no observable mutable
// state; their collection fields are never mutated after construction). They live in the pure-Kotlin
// `shared/core` module and must not depend on Compose, so they cannot be annotated `@Immutable`.
// Declaring them stable here makes the list-item composables that take them skippable, which they
// otherwise would not be (a type from another module with unknown stability is treated as unstable).
//
// Compose decides to skip by comparing the previous and new argument with `equals`. Only `Character`
// is a `data class`, so it skips by value equality; `Spell`, `Monster` and `MagicalItem` are plain
// classes with identity `equals`, so they skip only when the *same instance* is passed again (the
// case during scroll, where the list data is unchanged). Reconstructing an entity (e.g. re-parsing on
// a search filter) yields a new instance and will not skip for those three.
//
// CONTRACT: these classes must stay immutable. Compose skips recomposition when an instance is
// `equals` to the previous one, so introducing an observable mutable field (or mutating a collection
// field in place) here would surface stale UI without any compiler warning.
//
// Listed class by class (not by package wildcard) so the stability assertion covers only the
// entities we have audited as immutable — a new, potentially mutable class added to these packages
// is not silently declared stable. These are the entities rendered as list items; add an entity
// here only after confirming it is immutable.
com.cyrillrx.rpg.spell.domain.Spell
com.cyrillrx.rpg.creature.domain.Monster
com.cyrillrx.rpg.magicalitem.domain.MagicalItem
com.cyrillrx.rpg.character.domain.Character
