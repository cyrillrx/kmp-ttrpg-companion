appId: com.cyrillrx.rpg
---
- launchApp:
    clearState: true

# Navigate to My Spell Lists and create a list to delete
- tapOn:
    text: "Spellbooks"
- tapOn:
    text: "Create"
- tapOn:
    id: "input_list_name"
- inputText: "List to Delete"
- tapOn:
    text: "Create"
- assertVisible:
    text: "List to Delete"

# Swipe LEFT (EndToStart) to trigger the optimistic delete
- swipe:
    direction: LEFT
    duration: 100
    from:
      text: "List to Delete"

# Snackbar with Undo should appear
- assertVisible:
    text: "Undo"

# Tap Undo to restore the list
- tapOn:
    text: "Undo"

# Verify the list is still visible
- assertVisible:
    text: "List to Delete"
